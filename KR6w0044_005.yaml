body:
  text: 六淨土論有五門等者彼論中明禮等五門此之五門為偏發願為行願別若行即願者前三業行與第四願有何差別各別列之若其一者應無五門若行願異者行願既異故知前三行門後二作願回向也問彼論五念皆應是行何分行願故論云若善男子善女人修五念門行成就畢竟得生安樂國土又云心常作願一心專念畢竟往生安樂國土欲如實修行奢摩他故前𢝰五念名行後別作願名行加之和尚云一門與上三心合隨起業行不問多少答論文多含非偏明故師資各述謂彼論文不言前三是行後二是願亦不言同行不可分行願故有異釋但準今意會論文者修五念門行者願行具足𢝰名修行非是一名為行門又心常作願乃至如實修行奢摩他者先作願為觀察等行名如實行此如實行能止諸𢙣名奢摩他非作願偏得修行名故論注云一心專念阿㫆𨹔如來願生彼土此如來名號及彼國土名號能止一切𢙣故約五門分別行願更無其妨問彼本論文意業觀察置第四門今何不次答為列三業行於一處越其次第非有別意禮讃亦同問本論只云口業讃歎何故名為口業念佛答彼讃歎者稱讃阿㫆𨹔名與無得光義相應故彼論云何歎問帖口業讃嘆自下答能讃稱彼如來名如彼如來光明智相如彼名義欲如實修行相應故所讃佛名必有勝能故從轉名念佛又為顯念佛非別時改讃歎門立念佛門例如天台首楞嚴四種授記改彼密記立現前記今復亦爾雖依彼論以別義故探經元意改立而已七起信論等者彼起信論至極大乘甚深祕典破諸疑網生不退信談如法義窮究竟果念佛往生若夫別時何故論𢝰立五緣中至苐四修行信心分明專念方便生淨土故知天親造攝論亦不可以念佛門用為別時有八因緣者起信論云問曰有何因緣而造此論答曰是因緣有八種云何為八一者因緣相謂為令衆生離一切苦得究竟樂非求𠀍間名利敬故初一為立義分作正因緣二者為欲解釋如來根本之義令諸衆生正解不故三者為令善根成就衆生於摩訶衍法堪任不退信故為解釋分作正因緣四者為令善根小衆生修習信心故五者為示方便消𢙣業鄣善護其心遠離癡慢出邪故六者為示修習止觀對治凡夫二乘心過故七者為示專念方便生於佛前必定不退信心故八者為示利益勸修行故次四為修行信心分作正因緣後一為勸修利益分作正因緣復次衆生初學是法者此下正論文釋摩訶衍論云此中衆生得十信前四心更不能勝進下品衆生謂生是𠀍界信心成極怖畏故以勝緣力而為安立正定聚故又云彼十信位下品衆生雖親聼受甚深法門而其心根極下劣故怖二大事不能勝進為欲退故云何為二一者國土二者勝緣言國土者即此娑婆𠀍界處𢙣衆生濁亂起淨心為勤修行甚極切難故以者何於彼心中逆境界於一切時於一切處常恆現前信心面中不捨離故言勝緣者於此𠀍界依正濁亂一切諸佛出𠀍極鮮無量菩薩起感時節極遠諸佛菩薩出現於𠀍隨順清心之鏡淨不淨故以此義故彼修行者不值勝緣極怖畏故發退意耳諸佛如來有不思議甚極妙大方便力故能善攝護彼八信心轉勝進故云何名為勝妙方便為專念如來方便云何專念謂專住意憶念他方淨土種依正其念相續令不絶故以諸如來不可思議方便力故隨自願即得往生妙樂土生彼土已眼見如來具相好像耳聞聖深妙音聲永離𢙣名從空不動心海澄淨身躰明白依妙正清經文相明故不須重釋已上修多羅者觀經等專念佛者若釋論意約色相觀今論意者在稱名本論義含各述一意若觀彼佛等者明觀真如法身往生淨𭃯明知馬鳴龍樹大德同許凡夫往生淨土八若以念佛者依觀經進退徵難而顯念佛非別時行於中先審次難若是行者者是一邊難謂十六觀若是行者其許行門地觀法與下品念佛罪㓛齊往生德同何故彼觀行而此念非行彼觀得生此念不生若俱非行者此下設難次師不言十六觀皆是願故謂若十六觀俱非行者韋提侍女佛記往生彼往生為由作此觀得生為由作餘行得生此上審自下難若由此觀得生者此既非行如何得生若雖作觀不得生者何須夫人請不生法如來為不生法耶又若是者此下重責十六觀是願非行謂若一種願門者何須分為十六觀耶又為此解者此下重誡成過𭁆謂若為十六觀非行門解非是直不曉觀經文亦正見即二利耳人法無益者自他名於人無益不曉經文為於法無益若解經義零落故本若唯發願至別時意耶重徵唯願即別時義文意易了不須重釋佛以衆生至不須疑惑答願別時相文有四意一初至別時之教明聞淨土教有四類不同二佛對前二至別時意也別明苐三唯發願類成別時相三上來以衆至別時之意結成攝論別時唯願不能起行四又攝論文下更以別義宣別時意苐一明中亦有其二初明聞法種類差別於中依正兩報四種莊嚴者通別依報通別正報是名四種如玄義分或寶地三種莊嚴上更加正報聖衆莊嚴佛本主故屬莊嚴不攝四種也鄣有輕重者廣直四類煩惱業障名為障重障有二一者尤重苐一類是聞法謗自沉坑故二者次重苐二類是聞淨土教深信不謗五欲𮉐心墮𢙣趣異前尤重故苐二類即名次重輕障有二一者尤輕苐四類是故下文云善根深厚煩惱輕微此人聞法深生信心願行具足臨終往生二者次輕苐三類是聞法發願更不願求有漏果報煩惱因緣耽著五欲唯願無行今雖不生終可得往故苐三類即名次輕悟有淺深者別冠三四苐三唯願悟是淺雖聞即願而不行故苐四往生所悟即深聞而已願而行故問障輕重既廣通四類悟淺深何三四類答輕重雖異障通四類於義無妨前二類者無悟可論故悟淺深苐三四輕重之義隨應判耳或淺深亦通於四類推尋可知遂令依教勝劣者唯障輕重及悟淺深更亦可論依教勝劣或前二類依教之劣無得益故後二類者依教之勝順次多生如次益故次有一類下別列釋四類中苐一類者一向是𢙣謂論其因唯謗不信若其果報正在𢙣道絶無淨緣故云全遠苐二類者因該善染果通沉謂聞淨教深信不謗是因善也心樂穢土於淨土境未發願行是因染也或生人天是果也沉淪𢙣趣是果沉也若因若果雖雜於善此人未發淨土願行若望生西無有是處非啻苐一是亦不生故云亦遠以並無心趣求又誹謗呰故者結釋二類與淨土遠謂以二類並無心求又苐一類還誹謗故前二類者與淨土遠也清淨平覺經言者正證苐一類西方遠經云聞如不聞反生誹謗故兼證苐二類西方遠經云未得解故問彼經更無聞如不聞及誹謗言又未得解者只苐一類從𢙣道來殃𢙣未𥁞未得解何言兼證苐二類耶答會初難者彼經下云佛言其有善男子善女人聞無量清淨聲慈心歡喜一時踊躍心意清淨身毛為起如拔出者昔前𠀍宿命作佛道廣乃至其有人民男子女人聞無量清淨佛聲不信有佛者不信經語不信有比丘僧心中狐疑都無信者皆故從𢙣道中來狐疑不信向耳已上心中狐疑聞如不聞相論家為堅證苐一類更加反生誹謗言也都不信還墮𢙣道應生誹謗理在絶言會次難者苐二類全無願行故不可得生亦沉𢙣趣未得解言何不兼於此類乎故亦全下顯經未得意通苐二類也苐三類者文有多節與阿㫆𨹔佛宿願緣𤎼者明發願相文相可見問宿願緣𤎼重淨心信何成別時答緣𤎼有厚薄淨信有淺深機類不一何致難耶謂此人分宿緣𤎼故聞起淨信即立勝願非𭫸𤎼故不為修行成別時機雖名淨信而下品信其信既退作𢙣業故若人得起上品信心善心一發永無退失𢙣業畢竟不重犯故今信者即淺信也問彼玄義云聞他西方快樂願我亦生言畢更不相續故名願不言緣𤎼淨心信敬及不願求有漏果報只為快樂白地發願何今相答文委不委義非𭆞差雖有此願者明不修行成別時機適雖發願未曾起行文有五由一者內有煩惱緣故貪著五欲不能起行二者外遇𢙣友緣故廣造十𢙣不能起行三者臨終無善友故以無人勸不能起行四者以身重病故狂亂失心不能起行五者多日𭁆意故不解人語不能起行前二即約平生緣後三是約臨終緣後二緣中初之一者雖心明了是無人勸不能自覺忘却懈怠不得往生當知往生近勝因緣無先臨終善知識者後之二者縱有知識狂亂失念及𭁆意故不覺其人不解其語問狂亂𭁆心𭁆意者有何差別答狅謂心狂亂即心亂若狂亂者失其正念故云𭁆心舉王顯數可云𭁆念唯識論云𭁆念於諸緣不能明記為性能障正念散亂依為業謂𭁆念者心散亂故已上有情心狂必在意識依五因起俱舍論云有情心狂唯在意識若在五識必無心狂以五識身無分別故由五因故有情心狂一由有情業異𤎼起謂由彼用藥物咒術令他心狂或復令他飲非欲若毒若酒或現威嚴怖禽獸或放猛火焚燒山澤或作坑陷墜衆生或餘事業令他𭁆念由此業因於當來𠀍感別異𤎼能令心狂依𢙣業因感不平異𤎼大種依此大種㔟力心便𭁆念故為狂心狂雖業異𤎼生躰非異𤎼善𢙣皆容狂故光記正理論云由此心狂躰非異𤎼善𢙣心皆容狅故二由驚怖謂非人現可怖形來相逼迫有情見已遂致心狂三由傷𭓯謂因事業惱非人由彼嗔故傷其支節遂致心狂四由乖謂由身內風淡界互相反大種乖故致心狂五由愁憂謂因喪𭁆親愛事愁毒𮉐懷心遂發狂如婆私婆娑論云婆私瑟婆羅門女失心發狂亂露形馳走見𠀍尊已還得本心又𣵀槃苐十六云舍衛城中婆羅門女姓婆私吒唯有一子愛之甚重遇病命終爾時女人愁毒入心狂亂失性裸身無耻遊行四衢帝𡘈失聲唱言子何周通城邑無有疲已而是女人已於先佛植衆德本善男子我於是女起慈愍心是時女人即得見我德想還得本心前抱我身嗚唼我口我時即告侍者阿難汝可持衣與是女人既與衣已便為種諸法是女聞法發菩提心我於爾時實非彼子彼非我母亦無抱持當知皆是慈善根力令彼女人見如是事已上若準俱舍以此心狂對於心亂應作四句苐一句狂非亂者謂狂者不染心𭁆念故名狂不染行故名非亂苐二句亂非狂者謂不狂者諸染行心染行故名亂不𭁆念故非狂苐三句狂亦亂者謂諸狂者諸染𣲇心𭁆念故名狂染行故名亂苐四句非狂非亂者謂不不染行心不𭁆念故非狂不染𣲇故非亂應知彼論染名為亂失念名狂今狂亂者即苐三句捐此狂亂即名𭁆心次𭁆意者明了意識已𭁆故不分別境似如睡眠及悶絶時故與前異遂使空願下結成據五因遂空有願未曾修行不修行故雖不重生遠是生因或由發願至得生西方明發願㓛當起行故比前二類有遠生義故經記歎生西方於中有二初先並舉二類唯願顯此等人雖未起行當有其㓛唯願二類者一唯發願曾無行意或由發願等文是也二發願上兼將起行或但起行等文是也但言恐錯應為將字彼雖下並辨二類當有起行之㓛也又或但起行者為顯發願者必有起行㓛因明但行者必有起行意謂能發願雖不直生其㓛不空後必修行方得往生若願心但起行者不如發願終成㓛也彼雖者還明發願當有起行問但起行者何不成遠生因耶答彼雖亦成遠結緣不及發願㓛用勝妙也次方前二類下正述願㓛有遠生義謂發願者比前苐一苐二無益二類遠有生理故佛記歎得生也記者授記歎即讃歎其㓛能記具往生言經者若準迦才㫆𨹔經淨土論云如小阿㫆𨹔經云若有人已發願今發願當發願於彼國土若已生若當生也如是等經是別時意不得即生也已上雖有此釋不應文理言文者彼經先勸應當發願生彼國後教稱念令至七日即言臨終聖衆來前願後行願行具足即得往生故諸佛證云誠實言行者亦為一切諸佛護念故三𠀍發願皆悉得生能化尺迦見此利故即勸為言若有信者應當發願生彼國土故知先應當發願生彼國諸上善善人俱會一處㣪勸發宣已發願皆得不退阿耨菩提同明實生更非別時次理者三部典明凡夫往生莫非㫆𨹔本願勝用四十八願若不徒設𭂫類得生豈是唐捐三經往生若非小經發願寧別時乎故迦才解背理匱教可傷之甚蓋在斯焉問非三經者是何經耶魏論云如無量壽經若有衆生願取無量壽𠀍界即生爾準此論今指經應㫆𨹔經答三部妙典更不可別時意趣已顯示訖若爾論所指應非是三經謂聖道門諸經中因明唯願往生淨土論可指彼若來漢朝若月𫞕諸經廣多其中何無別時經如毗曇云無量諸經今已沒云何定經無耶今復如是何言諸譯指經是除三經外更無其經又念多寶別時經未來此土往生別時經何必將來矣若小經中別時者三部妙袟文義俱壞一代勸便為徒但魏論言無量壽經彼不分別即生別時㫆𨹔事名無量壽是從非呼別題如唯識論名起𥁞經成實論號七漏經又前後譯本末合論凡有七部餘六部中唯言經更不別言無量壽經此譯立經之別號恐筆授誤例如了義燈云巍梁隋唐同本異譯餘本無故筆授此釋梁論云如須𨹔洹道前有四方便菩薩聖道有四種方便有三釋中苐三之解愚人將謂者此下明本論師設別時釋謂經記歎遠生之因為生西方然愚人謂即得往生不別修因論師為正愚者迷釋此經文別時之意非唯發願而得往生然復後人讀論不解即言行亦不得往生今論為正後人錯計釋彼論文間唯願者願行具足必得往生苐四類者此是願行具足往生文意易知苐二佛對下別明成別時相中即有其三初明論師分離唯願立別時意二故願下正明唯願是別時相先次合㣪證可知問金錢在成佛別時今何用答梁隋二論及唐𠀍親釋論之中同前別時舉於此無性釋論釋二別時後用此故彼論云別時意趣者謂觀懈怠不能於法精勤學者故是言若誦多寶如來名者便得決定由唯發願便得往生極樂𠀍界此意長養先時善根如𠀍間但由一錢而得於千已上準此論故通引用之和尚亦爾諸譯釋論置初顯㣪意無乖必須通二三又如念下因明成佛別時蕳異唯願別時初標次尺中不退位者十住初心者問梁本論云若人誦持多寶佛名決定於無上菩提不更退墮尺曰是懶墮善根以誦持多寶佛名為進上品㓛德佛意為顯上品㓛德於淺行中欲令捨懶墮勤修道不由唯誦佛名即不退墮決定得無上菩提已上此論文意以菩提果為別時果故和尚云凡言菩提乃是佛果之名亦是正報又云正報難期一行雖精未尅今何相答論言決定無上菩提不更退墮者初住不退若得此位決定至果不更退墮故也若直即至無上佛果何云決定不退墮耶不退墮言便歎因位不退㓛能故無性云若誦多寶如來名者便得決定又𠀍親云此中意趣顯誦多寶如來名因是進因非唯誦名便於無上正等菩提已得決定決定即是不退異名故今文順本末諸論但和尚尺且約終可至佛果位更非約初住不退此人當念多寶佛時者顯此人始誦佛名位謂或十信前種姓住或信初心也者等取十信中心未可念多寶佛等者明此等人不可疾得初住不退謂信位初誦佛名人不可由念即超十信一万劫行忽至初住以然者以須中間更修八万四千波羅密行方至初住也念多寶行雖不直至初住不退而與不退為遠緣故名別時意苐三上來下結成可知苐四又攝論下更以別義宣別時者上來已釋以佛力故凡夫生淨非是別時畢彼約報義消別時意而今別義辨報淨土凡夫生者別時意趣謂報淨土凡夫不生故若唯願及願上行必不可生若爾彼論言別時者意在於斯若化淨土凡夫生故若唯願者及願上行必即得生慈恩意論安養報化便有二義一唯報土二通報化若唯報義凡夫往主即屬別時與今意同如三身章義林章等不能繁引如花嚴經不須疑惑者證極樂化土凡夫生極樂化者如彼經賢首土等十阿僧諸佛國中極樂最下豈非屬化亦凡夫者前引經云初發心𭂫夫菩薩願生淨土即得往生問縱雖化土𭂫夫唯願何輕得生答對上報土方作此謂若報土𭂫夫作皆不至故唯願及行俱絶其望翻對於此且為此以實而論設雖化土必具願行亦可往生本往生衆生至得往生不是苐七問上來會諸相明凡夫往生義訖自下就凡往生料蕳其本住處文有二意先問餘趣往生次問中有往生言道者即是中有如言途趣外別問故言已終者故本於五趣中至生極樂國答苐七問文有其三初直爾許於五趣中修業往生二案諸天既至諸佛淨土經證成三以此準知下結也苐一直尺中於五趣中悉能修者問大乘性相於𢙣趣中唯起俱生不發分別若爾不起發業之惑何得能修西方淨業發報業無明支是第六相應分別癡故答次引諸經以為其證經非一何足疑難是則準依俱舍性相故俱舍論第十五云何界何趣能造幾業諸界諸趣或善或𢙣隨其應皆容造四開如是若就別於地獄中善除順現無愛果故餘皆得造已上言造四者諸界諸趣方造善𢙣順現受等四種諸業若就等者於中別謂地獄趣不能造作善現受業以地獄中無愛果故餘皆得造如是四業除順現受餘三便通引滿二業故同論云幾業能引衆同分耶能引唯三除順現受現身同分先業引故已上若據婆娑一師者順受業亦感同分如彼論百十四云問幾業能衆同分幾能滿耶或有者二能引衆同分亦能滿謂順次生受業順㣪次受業二能滿衆同分不能引謂順現法受業順不定業復有者三能衆同分亦能滿謂除順現法受一能滿衆同分不能謂順現法受復有欲令順現法受業亦能引衆同分若作是此四種業皆能衆同分滿衆同分已上順現受業感同分者光法師云又解此文據常途現業非感同分若據延壽由別緣力現業亦感同分而延壽中但言感命非同分者略舉一邊以實而言亦感同分言別緣者即布施邊際定力明知諸趣能造滿善𢙣二業大乘性相亦據一途豈閞諸乎又於𢙣趣修淨業者昔人天中作淨業人依妄念雖墮𢙣趣而開宿善得生淨土非於彼趣始修業諸經只明往生熏發因緣問小乘亦許於𢙣趣中不起見惑云何能作善𢙣二業答小乘論意發業煩惱只是修惑非見斷惑俱舍論云見斷惑不能發業大小性相其義遙異問大乘之意發淨業癡不善有䨱中是何耶答若發輪回於欲界業能發無明唯不善攝不通有䨱故唯識六云若欲界繫分別起者皆不善攝發𢙣行故已上而發知足安養淨業能發無明雖欲界繫而有䨱攝故了義燈云又復求生知足淨土亦是生死由定信故攝彼無明是有䨱性定者三摩地心非禪定也第二證中即有其四於中觀經及稱讃經文意分明不須重釋三引菩薩胎中化生龍持八閞齊戒等者彼經云佛告智積菩薩言吾昔一時無央數劫為金翅鳥王七寶宮殿後浴池皆七寶成遊戲觀心得自在乃入大海求龍為食時彼海中有化生龍子八日十四日十五日受如來齊八禁戒法時金翅鳥王身長八千由旬左右翅各長四千由旬大海縱纊三百三十六万里金翅鳥以翅斫水取龍水未合項𮕣龍飛出金翅鳥法欲食龍時先從尾而吞到須㫆山北有大鐵樹高下六万里𮕣龍至彼欲得食噉龍㢢其尾不令知處以徑日夜明日龍出尾語金翅鳥化生龍者我身是也我不持八閞齊法汝即灰我金翅鳥聞之悔過自責佛之威神甚深難量我有宮殿去此不遠共我至彼以相娛樂龍即從金翅鳥至宮殿觀者今此眷屬不聞如來八閞齊法唯願指授禁戒威儀爾時金翅鳥聞龍子所受八閞齊法口自發言自今以後盡形壽不𭣦生如諸佛教金翅鳥眷屬受三自歸已即從龍子到海宮殿彼宮殿中有七寶諸佛諸法深藏別有七寶函滿中佛經十二因緣𢝰持三昧見彼龍子及諸龍女香花供養禮拜羕仕爾時龍子復與金翅鳥而頌曰云此頌時龍子龍女心意開解壽終之後皆當往生阿㫆陀佛國已上略抄唯長阿含第十八大海北面有大樹名究羅映摩羅團七由旬高百由旬枝五十由旬樹東有卵生龍宮又有卵生金翅鳥宮南胎西濕北化各有其龍鳥宮並有七重行樹衆鳥和鳴取龍之時翅摶海水卵生摶開二百由旬胎四百由旬濕八百化千六百胎卵濕化如是次第噉一二三四龍問龍持戒者為發律儀若言發者俱舍等意於𢙣趣中戒躰不發故經龍持八戒會屬妙行答今依胎經𢩾一途梵等於𢙣趣中發大乘戒小戒亦然又準小乘胎經八戒只是處中非得律儀處中妙行亦名戒故四隨願中若以立者嚴身具等者問此經便明依追善力得生淨土何為𢙣趣修淨業證答追善只為重發之緣依此緣故亡者自修淨業得生如心地觀經云以其男女追修福有大金光照地獄光中演深妙法開悟父母令發意口稱南無三世佛得無暇苦難身口稱寶是自業因唯由他作出離生死無有是處諸法種子生於現行不可偏依他修薰力也又樞要有多釋彼上云若種子生果應取熏中同身非相離者即為亡人七齊追福何有他作而得自身受勝果等又異趣身如何受果有解前趣有善𢙣相令受罪者能發善心又經云地獄者上有白黑𢟷表善𢙣相令彼罪人發善心故若爾鬼畜人天無白黑𢟷應不受果有解但是化後俗語何必得果我𭣦還我上走避亦難故又解作願者勝願資故令受罪者七分得一又由亡者曾有處分作善𢙣事現在為作果遂本心故有果報同趣可受異趣難成已上問何故不尺中有往生有無相耶答隨願經文雖證地獄趣中得生而兼顯示中有往生追修所𮠪不𢩁本有亦容通中有利益故復有一義文中前三文證在趣往生後隨願證中有往生問若爾何故經可得彼地獄之䰡結文唯云五趣衆生悉得往生不結中有答轉地獄中有往生淨土故云地獄非必本有彼經云命終之人在中隂中身如小兒罪福未定應為修福願亡者神使生十方無量剎土羕此㓛德必得往生是明中有往生之義今之所引亦復如是結文從初不結中有非文不釋又五趣言亦攝中有中有能往雖非所趣以趣因故相從本有亦得名趣如唯識云或諸趣言通能所趣諸趣資外器具亦得趣名疏三釋云何故能趣亦名為趣是所趣業惑中有相從名趣又云謂器世間是趣所須趣之資具相從所趣故亦名趣已上故今通結止之二尺非獨趣耳雖有二義前義為正此經若限證中有往生五趣證中缺地獄證故問轉中有位往生淨土其理不明俱舍論云中有不可轉謂人中有起但往生人趣必不可令人中有沒餘中有趣天等亦然如何答衆生𤎼不簡時處設雖中有何無往生淨業𤎼者於中有位開發宿善容得往生彼俱舍論且約輪回不出離是故彼許中般聖者小乘自力聖道既爾何大乘難思妙業能純𤎼者佛本願力為增上緣加之大乘許中有轉故對法論六云或時移轉者謂於此位往餘生處強緣現前如得第四靜慮起阿羅漢增上慢比丘彼地中有生時由謗解邪見故轉生地獄中有已上唯識第六亦同之矣此比丘得第四禪定起增上慢謂第四果既受中有後有起故便謗釋種無有𣵀槃此色界身起下邪見及相應癡或許有瞋𣵀槃故俱行思業乘此𢙣業色中有沒墮地獄也小乘有部許本有見第四禪相謗真解墮於地獄大乘不許故本疏六云既生地獄由邪見力非色界邪見不𭠡下苦故非於欲界身起此邪見彼言中有生時起故色界中有欲界本有如何見之非定通力住散心故古師多作此解非也已上問中有往生者為由宿業為中有位始修淨業答二俱可有本業可思彼始修者對法論云住中有中亦能集諸業先串習力所善等思現行故已上既造善𢙣一切諸業盍修淨業四禪比丘亦其例也本於此三界至有中有不是第八問往來傳識具有四有者非傳識位直有四有今論中有傳識之次廣令知其有四有也言四有者一中有謂死有後生有之前受五薀其身微薄非淨天眼及同類眼無能見之其形如似當有形狀且人中有如五六歲餘趣準知五趣中有隨其果報用善𢙣香以為所食彼位五薀中識薀攝第八識者是𢝰報故自中有初至當有盡無有改轉除此之外皆滿果故移生有時能便捨別感生有踈強色身問何故名中有答婆婆論云此於二有中間生故名中有問餘生有等在二有間可名中有答婆婆論云若於二有中間生非趣所攝者名中有餘雖二有中間生而是趣攝不名中有已上二生有謂轉中有宿住胎等最初之位彼位唯在真異𤎼餘轉識及色薀等是名十二中識支位三本有謂生有之後至一期𥁞中間五薀問何故此位名為本有答婆娑論云此是前時所造業生故名本有問若爾何有非前業生答婆娑論云若是前時所造業生顯易覺明了現見者名本有餘雖前時所造業生而難覺非明了現見是以不已上四死有謂至最後明了轉識皆悉捨離但有第八本識位也若大乘意死生之位身心惛昧明了轉識不可現起故唯識論第三云謂死生時身心惛昧如睡無夢悶絶時明了轉識必不現起又云真異𤎼識極微細故行相所緣俱不可了是引業果一期相續恆無轉變是散有心名生死心已上斯是遙異小乘教中唯以第六為生死識亦以同分為𢝰報果本此有二尺至受生隂耶答第八問文有二義初不正義二今尺此義下明正義初義意者始坐臺時感淨土身此身一得不可捨如處胎後不其身故生隂攝而非中有次義意者文分為二初非前義二且如穢下正成義於中亦二初例穢土受生顯淨土往生亦可有中隂謂若坐臺時名生有此生有處即可名淨其生有者生處故若此坐處名為淨土淨穢相監如欲界死生於色界受中有身至彼色界方受生隂無有欲界受色生隂生於淨土義亦如斯處指西方隔塵剎莫謂乘臺即如處胎若亦生有在於此處生處在彼者生有名言更不可立據此理故要須至彼淨土寶池方成生隂也二又無色界等者重立道理釋成有義如無色界以無色故可無中隂傳識受生淨土色處如何不許在於中隂傳識至彼問衆生善業純𤎼㫆𨹔願力相𭷣前念命終後念至彼受生中間無隔他念云何得論中生二有故和尚云前念命終後念即生彼國穢中隂捨成生有坐時得淨土色質永不可捨若不捨者更不可類穢土中有答若有可有中有理者設雖速疾何不許之故法花云於此命終即往安樂世界生蓮花中寶座之上所言往者即是中有生蓮華者生有也加之胎經懈慢往生順中有義前後念者明其速相非無剎那或中有身淨土生故指乘花臺名為即生例如俱舍會經無間必定生那落迦言或誰不許中有是生那落迦名亦通中有死有無間中有起時亦得名生方便故如先卷引中隂捨不未見所準穢義推可捨中隂得淨生隂中生有身細異故或不可捨淨剎色身非可捨法故方不可同穢土色質此捨彼得但中有身可轉捨以不可及彼本有妙質故雖有兩義尚是一途難當正理請訪賢哲彼通贊具今論文辨中有義明知此論慈恩猶為依憑而已本若有中隂至有何殊別自下四番問重難有義今是其初若有中隂則當生彼至寶池中方應入花中坐後花乃開如何猶在此穢土中則入花中若入花中與彼生隂有何殊別是提前不正義意難於此坐花可無中隂初應字當也後應字可也玉篇云應於陵切當也本豈以中隂至是何耶更救前難文即有三初先非難二生彼下至中生相似正明同處花而中生二有異三然此下二義正不結歸中有義第二正明中亦二初正尺義中生彼淨土福德力勝等者顯示淨土福德勝故雖是中隂而異穢生乘花往生雖中生隂同在花中等者正明同坐花而有差別即以二由分二隂差一色身優劣根性明晦謂中有色劣生有色優明晦亦爾是故以分中生二隂二中隂趣生隂至生謂能趣名趣生如下文云淨土中隂坐趣受生所至名至生是故以分中生二隂非約有花無花分二若謂同在花中等者還兩方徵若謂中生同在花故二隂難分無中隂者亦穢二隂同無有花何論中隂生隂差別若謂穢土中生二隂雖俱無花中有化生生有胎等是為別者卵等三生可有差別化生隂如何得與中隂殊耶以此故知有中隂也二又如地獄下重翻例顯同處花中而二隂別謂如地獄感中生隂𢙣業類同雖俱火燒中生二隂豈無差別翻顯淨土感彼二隂善業類同中生相似雖同在花豈無二差第三結歸中不爾去身是何耶者若不許中有之義者自此去至彼身不言中有是何耶本若有中隂至衣不著衣第二重論衣有無應知本無經論文至皆有衣服釋淨土中隂可有衣文標尺結起盡可見第二尺中初例次尺初例中俱舍論言欲界中隂等者論第九云色界中有量如本有與衣俱生慙愧增故欲界中有不與衣俱由皆宿習無慙愧故唯有鮮白苾尼由本願力故彼於世有自然衣恆不離身隨時改變乃至最後般𣵀槃時即以此衣𮉐尸焚葬已上又慈恩傳二云梵衍那國有一伽藍中有商諾迦縛娑舊曰商那和修訛也所持鐵鉢量可八九𫝣及僧伽胝衣赤絳色其人五百身中隂生隂恆著此衣從胎俱出後變為袈裟因緣廣如別傳已上付法藏傳一云乃往過去阿僧劫商那和須時為商主共諸賈客五百人俱欲入大海採求𭹀寶於其前路見辟支佛身𭒱重病氣命羸惙與諸商人即便停住推求醫藥而療治之盡心羕給無所乏少病遂除差躰力充足是辟支佛著商那衣爾時商主以諸香湯浴辟支佛上妙疊衣而用奉獻白言大聖此商那衣極為㢢𢙣唯願受我所奉衣服辟支佛言施主冝知我以此衣出家成道復當著此而入𣵀槃商主聞之甚懷悲惱白言大聖願勿度冝可與我共入大海吾當終身供給所須衣服臥具病瘦湯藥辟支佛言不能入海我於今者欲槃𣵀槃汝於福田冝至深心未來必當獲大果報即就空作十八變還就坐木而入𣵀槃商主悲哀啼𡘈哽鳴積諸香木而同闍毗收集舍利起供養因發誓曰願我來世值遇聖師復過於是便我有諸功德聚威儀法式及衣服如今此聖等無有異由斯願力甚大雄猛處於母胎著商那衣乃至與身俱共增長出家受戒得道𣵀槃是商那衣未嘗離躰因即號曰商那和須已上準此等商那和須亦由本願有自然衣俱舍言唯學者思擇問欲界人天善業所感善業必與慙愧心俱何云無慙愧耶答欲界善業所雜𢙣名黑白業善心起位雖有慙愧前後不善雜無慙愧故令其果懷裸形耻色界定善不雜𢙣故名純白業其心恆與慙愧俱故令其果衣服隨身也問若爾以欲界業生淨土者中隂無衣修善之心為無慙愧所陵雜故答今修淨業欣佛剎者雖欲界繫不同有漏輪回界繫即有四由一故制諸𢙣生慙愧故二念珠淨潔澄惑濁故三佛願緣引重障故四聖衆提㯕相將去故由斯義故雖欲界心而如色界慙愧增德不善力終至受中隂定與衣服俱如彼處花殊欲中有豈於此獨貽疑殆以此下結如文解尺本淨土中隂行相如何第三重論其行狀行謂往行自此往彼也相謂狀相即形狀也俱舍論明眼等九門中第九行狀門也本亦以義唯至坐趣受生釋淨土中有行狀文有二義初義準依生天中隂足下頭上今生淨土足下頭上即此經坐蓮花中其頭上相也地獄中隂頭下足上等者便顯餘趣行狀不同次義生天中隂與淨土中隂行狀即別天立受生淨坐受生是故別也穢土生中天上報勝故雖頭上而立受生是表輪回忩迫生死經營未罷淨土不爾安坐受生是表卑竟安穩道場坐處將得問初經坐蓮花中文今亦云坐受生似二義混答前證坐故是頭上今證坐故異天立文雖是一義通兩邊所望異故更無相濫問中有頭足上下行狀為依業果勝劣為在所上下若謂依果報勝劣者俱舍論云天首上三撗地獄頭歸下是明人中死生諸趣謂人生天首上足下若亦生人及生鬼畜即得撗行若生地獄足上頭下若據果報生鬼畜時不可言撗若謂據在處上下者淨土人間非處高下而今既言淨土中有頭上足下明依業報不由在所答在處上下亦依報殊雖果報別與處上下不可相頭足上下可報為本故俱舍論云又天中有首正上如從座起人鬼畜生中有行相還如人等地獄中有頭下足上顛墜其中故伽𨹔顛墜於地獄足上頭歸下由謗諸仙樂寂修苦行豈非顛倒業令最上頭倒歸下耶但二撗者鬼畜二趣雖𢙣業果而有漏果猶善業感故異地獄其行狀撗故云三撗問鬼畜雜受處可交善業果若純受處無異地獄不雜善業彼何撗行答對天勝善果及地獄純𢙣指鬼畜以屬撗行非委分別雜純受處若約鬼畜純苦處者應如地獄足上頭下論在處二趣本處同在人下如應可知光記引婆娑七十云且依人中命終者若地獄死還生地獄不必頭下足上而行若天中死還生天趣不必足下頭上而行若地獄死生於人趣應首上若天中死生人趣應頭歸下鬼及傍生二趣中有隨住處如應當知此是婆娑正義應知人鬼傍生各自往趣中有行還如人等傍行馳赴如鳥飛空如畫飛仙本淨土中隂至食何食耶第四重問其食俱舍論明眼等九門中第六所食門云中有以香為食由食香故名健達此云尋香若少福者唯食𢙣香若多福者妙香為食雜集論六云亦名意生受化生身唯心為因故亦名健達香所故是隨遂於香往受生處義已上今準之故就淨土中有問其食相也本欲界中隂至不可具釋淨土中有所食文有二義初明不須食次明聞諸佛妙香而為食起𥁞可見初義之中生緣未合多時者俱舍論中即有四第一云大德言此無定限生緣未合中有恆存第二云有餘師極多七日第三云尊者世友極至七日第四云毗婆娑師此住少時以中有中樂求生有故非久住即往結生已上今依第一大德法救婆娑論云謂此部內有二論師一者覺天二者法救既是二大論師中之其一生緣未合中有恆存道理分明故得依彼又雜集六云極住七日或有中者此約速得生緣者若過七日不得生緣必定命終還生中有如是展轉乃至七遍更不得過已上設據此應言多時次義之中食諸佛香者其人所引無漏現行万德薰成微妙神香身意怡然而往受生故云諸佛土香若入占匐林更不嗅餘香故福德人能得至彼詫寶蓮臺唯聞淨妙香若非念佛誰輒得者行人須願我等早晚關于瑞雲感於奇香其中有義無量繁多者𢝰結顯示不可具本何故如來至物生信耶是第九問文有其二一難舌相證誠有無謂佛設教悉為信者不為疑者而如來諸經會中或有舌相勸物生信或有不爾直宣妙理此有何意故藥師經言者本願藥師經云有諸衆生信根不具聞諸佛甚深行處作是思惟云何但念藥師琉璃光如來一佛名號便獲爾㓛德勝利由此不信返生誹謗彼於長夜𭁆大利樂墮諸𢙣趣流轉無窮若得聞世尊藥師琉璃光如來名號至心受持不生疑惑墮𢙣趣者無有是處已上加之處言淨信善男子善女人明知不為疑者也二又甚深下難於事相淨土經時有舌相證謂深法凡夫難曉懷疑生謗如法花經會小歸大二乘之人及未證凡夫不生信故金身多寶涌寶證三周之實牟尼𠀍尊舒舌相明一乘之真其理冝然今㫆𨹔經唯西方依正二嚴勸物往生文義易解正信可生何勞得須諸佛舌證於中會二歸一者法花實相會於二乘入一乘故是三車宗非四乘意也二乘人等不生信心者若天台意舍利弗等三周聲聞得圎初住證無生忍授作佛記現得位限當來成道不須貽疑多寶證明只為未達法相不然不定性人雖回心小執難捨位在信前而尚未未來時事故云二乘不生信心佛舒舌相者法花神力品明第一神力云現大神力出廣長舌上至梵天三陳當信之言者彼經壽量品云佛告諸菩薩及一切大衆諸善男子汝等當信解如來誠諦之語又復告諸大衆汝等當信解如來誠諦之語是名三陳當信之言及以三申誠諦之語本案稱讃淨土至令生淨土答第九門文有二意一會初難二又往生下通次難初中亦三一稱讃經明此經獨有難信難言謂佛雖百千諸經不言難唯稱讃經僅有九恆沙諸佛同歎難信我釋迦佛亦稱難佛意不輕定有深趣二蓋以佛下正明難信相於中佛等者顯示餘十二部經佛諸弟子悉生信故不假證誠今等者顯示宣㫆𨹔經時雖佛弟子尚難生信故持為證誠五逆十𢙣衆生者準觀經意顯得受機次下文約下品生機亦其義也所謂今㫆𨹔經言五逆十𢙣罪根衆生唯能念佛不假餘善皆生淨土㓛少利雖佛弟子亦方生疑現見等者寄於現證成難信相三一切種智下明須舌相證明謂諸佛種智鏡不蔭衆生疑惑影預現故同舒舌相俱加讃言表法至真勸物修學故此經特有舒舌證非餘經也一切種智者理趣分疏云觀空性智名一切智即正躰智觀有中分之為二一觀無漏道名道相智二觀所餘法相者相狀差別之相即後得智此智觀無漏道名道相智觀所餘法名一切相智一切種智分為二故已上又智度論二十七云道種智了一切諸道一切智了諸法相一切種智了諸法別相已上若天台意釋大品三智與此等異云云問諸經亦有難之言何言唯㫆𨹔經獨有此答大品經等能化釋迦雖明難無諸佛舒舌相同歎諸佛釋迦同稱難信獨此經故非有咎第二會次難中有其二先明菩薩往生凡夫亦信𢙣人往生菩薩不疑謂三賢位及龍樹等十地往生極𢙣凡夫亦正生信彼諸菩薩所修福惠極以甚多三賢經歷一大僧行六度故十地證入二空真如斷二障故堪生淨土有何可怪五逆十𢙣凡夫往生十地三賢諸菩薩衆亦信此事不起疑心菩薩能知諸法祕藏故辨諸佛行處故為彼往生及其信心並不可設舌相證明次唯下正明須舌相證誠於中唯下品等者先不信相疑者有三類初下品人自還生疑謂聞下品逆𢙣人十念即生還自不信我等既是罪𢙣凡夫無始已來罪𠍴皆犯念佛十聲有何㓛德令我重罪則得除山嶽能埋江海多劫熏修應除重垢尺澤尚溢一滴十念佛名安淨剎計㓛少利大接之言也或是遠聲等者三階師計謂第三階絶不往生名為遠聲如其第二階造逆者明一切逆人悉往生故名近聲若論其實經五逆類往生者是第二階非第三階具如下明或言別時者通論家計如上已種異解等者明由異計謗多信少故此言教者此下正明為此等疑須舒舌證謂益難思疑慮忽生如十地論云疑者於不思議處不生信故已上是故諸佛吐舌相於三千𡸁證明於六字證法不護念行人若謂方便誘引言者非直迷𭁆一代教意亦則壞亂諸佛舌相故慈恩云不了之教𣵀槃之會尺通淨土一門雙林更無疑決十方諸佛舒舌印成據斯二義故非方便也已上證法不等者顯示證誠即護念義證法至真將護行者令生信故和尚云證誠此事故名護念但護念廣相不一準或佛自來攝護信心或遣聖衆令守行者或放光明攝取不捨或𡸁證誠將護疑惑如斯護念其相多雖相非一護念義齊故證誠亦護念義也本如花嚴經至有何意也是第十問文意可見花嚴經諸佛平等者六十本第二十四十地品中初地菩薩十大願訖云諸佛子菩薩摩訶薩住歡喜地以十願為首生如是等百萬阿僧大願同偈云一切微塵中諸佛成佛道發於如是等無量無邊願十地論三云此十大願一願中有百千万阿僧大願以為眷屬故十住論三偈云如是諸菩薩十大願為首廣大如空盡於未來際及餘無量願亦各別下論釋曰一切十方世界諸大菩薩皆有是願餘無量願者諸菩薩成就無量希有㓛德故諸所有願不可盡同經二十三十回向品云菩薩如是回向時安住法界等無量清淨行願又云菩薩以此法施等一切善根悉回向已成就普賢無量無邊一切行願悉能嚴淨無量無邊空法界等一切佛剎已上明知一切菩薩必具無量行願方得成佛也悲花經四十八願者彼經願數起盡難分學者詳之本此兩經意至不相也答第十問文有其三一摽二據實至和湯處分正釋三故此下結第二正釋文有法初法中二一初至之機也正明兩經各據一義於中亦二先依花嚴而明諸佛因果平等諸佛悉具一切妙願者顯示因同其文可觀若有一願不圓等者顯示果同謂若有一行願不滿一不成正覺名一切智人二縱成佛諸佛德有不平等過維摩經言者兼彼合花嚴意次藥師下明壽經等對緣𤎼機願數殊斯乃捨機論佛諸佛因果齊等無差提機談佛諸佛因果更互有異如花嚴鈔云以佛就機因果俱異機就佛因果俱同已上二諸佛教化下明對所被別願𤎼不不同由就之亦二一初至事即難周𢝰明諸佛願不同相於中諸佛教化等者預示諸佛各化衆生皆約有緣其有緣者即依本願謂諸衆生共佛有緣必依佛願若離佛願無有其緣諸佛利生皆乘弘誓若離弘誓無起其應諸佛本發等者正明本願緣𤎼不同所謂諸佛本住廣大無際之心欲令一切皆歸𣵀槃然衆生界無有邊數菩薩修行時節有限衆生無邊不可遍共一衆生悉見菩薩修行結緣時分有定菩薩不可遍衆生界教化繫屬是故衆生結緣未盡能化菩薩已成正覺其菩提心雖是廣大利衆生事即難周悉由此義故一諸佛本願各異利益亦別不可遍共等者衆生多故為顯其多一切不共不可文下安衆生字亦加共言菩薩不可遍等者菩薩一故為顯其一本無共義不可文上安菩薩字亦共言或容衆生兩字亦置不可言下今文互顯無有妨矣二然於因地下別明二佛願不同相於中然於因地等者直明兩佛因願差別謂於菩薩因地行時娑婆衆生於其菩薩十二大願見聞供養至誠殷重其願今𤎼㫆𨹔本願亦復如是娑婆衆生於其菩薩四十八願見聞供養至誠殷重其願今𤎼因地衆生四字流至㫆𨹔願文雖彼兩佛等者明能化佛知其機𤎼塵沙願中偏別數謂雖兩佛各具無量塵沙諸願對緣𤎼機論願所被似彼此異所謂衆生於藥師十二願根𤎼佛唯十二不論有四十八於㫆𨹔四十八根𤎼佛唯六八不論有十二二如下中二初次佛亦下合文意可辨問一諸佛皆發塵沙諸別願者其理不明若在因地未離執時菩薩分各別發願各修淨土故南嶽云若離我執證得心平等之時實無十方三世之異但本在因地未離我執時各別發願各修淨土各化衆生如是等業差別不同薰於淨心性依別業之力故現此十方三世諸佛依正二報相別和尚云諸佛所證平等是一若以願行來𭠎非無因緣然㫆𨹔世尊本發深重誓願以光明名號攝化十方等十住論三云一切去來今佛成力㓛德智惠無量深法等無差別但隨諸佛本願因緣或有壽命無量或有見者即得必定聞名者亦得必定女人見者即成男子身若聞名者亦轉女身或有聞名者即得往生或有無量光明衆生過者離諸障蓋或以光明即入必定或以光明一切苦惱乃至廣此等人師并論藏豈非因位分本願悉不同哉答佛果平等因願何別菩薩行利他為先衆生無盡願亦無窮豈藥師但照十二機發十二願㫆𨹔但照四十八機起六八願此理必然花嚴等行願平等但大乘止觀等述根𤎼別願非同義問諸佛所發無量本願為一成就為有不成就若悉成就者今此論云心雖廣大事即難周此乃明菩薩願不遍衆生成就也璟興師云諸佛所有誓願雖有未必遂果而法藏菩薩所發之願皆有成辨選擇集云一切菩薩雖立其願或有已成就亦有未成就未審法藏菩薩四十八願已為成就將為未成就也若有未成者一諸願皆替正覺若有一願不成就者菩薩不可成於佛道答一諸願皆悉成就菩薩不可立誑願故若不成就者不可成佛故而今釋迦或十二四十八約此土機若約他方亦應藥師四十八願及㫆𨹔十二願今論及興師不釋此旨者是文省略也但有未成就願者且約一土機緣通論十方根𤎼無一願而不成就問若約一土機法藏菩薩所發誓願亦有不就以有與機緣不合故而何興師言諸佛所有誓願雖有未必遂果而法藏菩薩所發之願皆有成辨答且約此土有諸佛願猶未果遂法藏發四十八願一成辨如云藥師於此土衆生十二大願救現在苦㫆𨹔亦爾為此土緣四十八願一成就故云法藏所願一成辨更所不𢏏𨹔餘願不𤎼此土亦名未成本往生衆生至證知相不是第十一問衆生雖修往生淨業未知得不只如暗夜發矢不辨所至方作此問甚為規摸本有三聖教至得生淨土答第十一問文有其三一摽示有三聖教為定生證二一如下正據證釋相三行者等下結明隨與一經相應即知得生第二正釋中先依稱讃經能生信解受持演者若人有信於善無倦如攝論云經言若人有信心則於善無猒應知信心決定無轉念佛讀經不生懈倦此人決定往生淨土次依清淨經若人聞淨土教門身毛為竪者若有宿善聞法歡喜如俱舍云若人聞生死有失𣵀槃有德歡喜流淚身毛為竪當知此人過去久殖解分善今重聞法故令然也又玄贊引智論云不退菩薩深愛法故聞則深心身毛皆竪念佛慈悲則惻愴泣淚若聞深法則大歡喜如軍敗怖懼倒地悶絶死者親見之欲知活者以杖鞭足則起隱軫不起隱軫即知不活菩薩亦爾若聞佛㓛德妙理歡喜毛竪色異悲泣當知此輩必得菩提異此聞經都無異相當知此輩無菩提分已上應知聞教歡喜踊躍決定往生次依賢護經求生此者常當繫心正念相續者若人於境繫心不絶其事必尅如智論云隨心所重而受身形是故菩薩繫心念佛生常得不離佛前應知繫念淨土相續不絶決定往生第一信不飽善第二歡喜餘身第三繫念不絶隨具一相應定得生問賢護經正念相續觀稱念中指何名念答異譯一卷般舟經云阿㫆𨹔報言欲生者當念我名有休息則得往生若準之者應是稱念故第五卷云又般舟三昧大集賢護等經教諸衆生七日七夜一心專念阿㫆𨹔佛得見佛已請問佛言衆生行何法得生淨土阿㫆𨹔佛報言欲生我國常念我名莫有休息即生我國三卷本及賢護經大智度論約色相觀此乃佛意包含通𭠎觀稱二念不可偏執也至第五卷具可明之問菩薩既成現前三昧應是淨土往生去行何更咨問得生之業答修此三昧元為一百二十種益而非必為樂往生故因三昧見㫆𨹔時別問其土得生淨業一百二十種益者如第七記本如此穢土至色界等天是第十二問亦無憂苦但有喜樂者五識相應不恱之受名為苦受意識相應不恱之受名為憂受言不恱者是惱義此之二受唯在欲界不通色界故言亦無苦受者身淨妙故又彼無有不善法故無憂根者由奢摩他潤相續故又彼定無惱𭓯事故身淨妙故顯非苦依無不善故顯無苦境定潤身故顯非憂依無惱害故顯無憂境已上有部意也若依經部苦樂隨身至四禪憂喜隨心至有須彼宗意有身即有苦樂有心即有憂喜非今論意五識相應恱之受名為樂受言恱者是攝益義及第三定心相應受能攝益者亦名樂根第三定中無有身受五識無故心恱名樂但在第三除第三於下欲界及初二禪名為喜根第三靜慮心恱安靜離喜貪故唯名樂根下三地中心恱動有喜貪故唯名喜根於色界中有此喜樂與彼淨土有何勝劣唯願淨土不樂色界耶問所言喜樂為通四禪答五識相應樂受唯在初禪彼眼耳身三識有故意識相應樂受唯在第三如向已辨喜受即通初二靜慮若第四定但是捨受無有喜樂故知今言喜樂在色界者只是約下三靜慮也本彼色界天至不退故也答第十二問文有其三一略示行佛道者不願色天二略以八義下正釋上界不可依三具斯八義下結釋第一略示中無有憂苦唯有喜樂者唯言蕳憂苦非無捨受終有憂苦受者退沒之後終生憂苦非彼直有第二正釋中先摽列八義次第釋第一上無樂者上者顯示所得無上上界依身無始入聖獲得擇故言無大𣵀槃之樂生彼凡夫不能尅證者即其義也顯揚論云戚非𢙣趣欣非上二唯欲界人天佛出世現觀現觀即見道名同釋論云於𢙣趣中不起現觀苦受恆隨𫽄憂戚故不能證得三摩地故色界亦無現觀欣掉重故猒𮊵劣故是故二界三趣不起現觀唯一欲界人天二趣有佛出世能起現觀又興疏云或有處𢙣趣雖有勝猒而無勝依上界雖有勝依而無增猒故欲天六人三具二種故能入現觀第二下墮苦輪中欲界業𤎼還生下方者問得上定時欲界繫業煩惱等皆不成就易地捨故况生上界永捨下界諸善𢙣業何云業𤎼還生下界答若造欲業其業未謝生上界時雖不成就沒上界時必起感用下界生故光記十五云夫業感果非要須成如從上沒生下界時雖不成下諸善𢙣業亦感果故又大乘意第八本識執持三界善𢙣種子生上界時猶持下種故云欲界業𤎼第三無聖歸依中色界雖有五淨居天等者第四靜慮即有八天後五天中唯居不還淨聖者故名淨居天雖有此天而是小聖何比西方多第十地補處耶色五淨唯在第四不與下三禪為所歸下三靜慮雖有聖非歸依多故不如彼多補處也第四不聞正法中彼色界天豈方淨土等者色界之中希雖菩薩法令聞彼為一機一時之何比淨土恆聞妙法又受用身於色界頂雖唱成道而那砌更非有漏諸天境界故不可比𫽄樂聞法也第五有諸味定中彼色界中雖有淨定多諸味定者上四靜慮及四無色八等至中前七各具味淨無漏三種等至有頂等至唯有二種彼地昧劣無漏故其味禪者俱舍論云初味等至謂愛相應愛能味著故名為味彼相應故此得味名光記云初味等至謂愛相應愛能味著淨定故名為味等至與彼相應故此等至得味名已上已得淨定當地繫愛起味著彼故所味著是名淨定彼得定與味相應故名味定若愛味起不名淨定淨定無貪等相應故謂前𭃯那淨定已無間味定即生愛味前淨定前之淨定已雖得味相應定今亦生故名為味定次淨定者俱舍論云淨等至名因世善定與無貪等諸白淨法相應起故此得淨名即味相應味著境此無間彼味定生緣過去淨深生味著爾時雖名出味定於能味定得名為入光記云淨等至名因諸世間有漏善定與無貪等自性善諸白淨法相應起故此等至得淨名即是第一味相應所味著境此淨定無間彼味定生緣過去淨定深生味著不緣現在以必不觀自性等故不緣未來未曾領故過去曾領故偏過去爾時雖名出味定於能味定得名為入已上問淨定有四謂順退分及順住分順勝進分順決擇分淨定無間生味定者是何淨定答順退分定順生味定順退分者便順生自地煩惱順住分者順生自地有漏功德順勝進者順生上地有漏㓛德順決擇者順生無漏故知退分便生味定或住分定有生味定故娑婆云淨定等無間煩惱現在前者當知此從順退分或順住分起已上順住分定順自地故亦能順生自地煩惱凡八等至中四靜四靜慮中無漏淨定具四五支四無色定及四禪中味定不具支林㓛德問四靜慮中無漏淨定具支相何答初靜慮中即有五支謂尋伺喜樂定第四樂者是輊安樂第五定者即是靜慮若薩婆多定是靜慮亦靜慮支餘之四支是靜慮支而非靜慮若經部意㧾而言之五皆靜慮別而言之靜慮之支象馬車步名四支軍別支惣軍取別成惣軍即是假靜慮五支應知亦爾若別即支𢝰是靜慮取別成𢝰靜慮即假第二靜慮即有四支謂內淨喜樂定其中內淨即是信根所言樂者亦輕安樂第三靜慮具有五支謂捨念惠樂定捨者行捨樂者即是意識相應樂受第四靜慮即有四支謂捨念中受定捨者行捨言中受者即是捨受問法有無量何故唯立尋等為支答雜集論九釋此難云對治支故利益支故二所依自性支故由此三種支分滿足不待餘故初靜慮中尋伺二種是對治支能斷欲界欲恚害等尋伺故喜樂二種是利益支由尋伺支治治已得離生喜樂故心一境性是彼依自性故依止定力尋等轉故第二靜慮中內等淨是對治支由此能治尋伺故喜樂是利益支心一境性是彼二所依自性支義如前第三靜慮中捨念正知是對治支由此三能治喜故樂是利益支心一境性是彼依自性支義如前第四靜慮中捨念是對治支由此二能治樂故不苦不樂受是利益支心一境性是彼二所依自性支義如前已上問無色定何故無此等支答雜集論云諸無色中不立支分以奢摩他一味性故已上問味定何故無此等支答先初靜慮味無喜樂無離煩惱喜樂生故但有尋伺及定三支俱舍論云初染中無離生喜樂非離煩惱而得生故正理論云初染中無離生喜樂非離煩惱而得生故雖染𣲇定亦喜相應非因離生故非支攝此不唯離欲生喜亦因離自地染生以經先作是離諸欲𢙣不善法已復作是言離生喜樂此中重離生言者為顯亦有喜離自地惑生為顯喜支唯是善性故薄伽梵與樂合輕安相應必是善故由此染定必無喜支故初染支唯有三種已上第二染中無有內淨彼為煩惱所擾濁故亦無樂者如初定唯有喜定正理論云第二染中無內等淨彼為煩惱所擾濁故雖諸世間有染信而不信攝故不立支樂輕安唯善性攝例同初定故不重故此染支唯有二種第三染中無正念惠為染𣲇樂所攝亂故又無行捨唯有樂定正理論云第三染中無正念惠彼為染樂所迷亂故染𣲇定中雖有念惠而得失念不正惠名故此二支染中非有行捨唯是大善法攝例同第四故此不故此染支唯有二種例同第四者例第四定無行捨也第四染中無有捨念彼為煩惱所染𣲇故唯有中受及以定二正理論云第四染中無捨念淨彼為煩惱所染𣲇故由此第四染唯有二支已上是依俱舍論一意且止傍論須釋本文第六邪見惑增中通諸外道有生邪見者𢝰明色界諸外道有生邪見又受無想等者別明無想天中生邪見類將生𥁞心生者顯示彼生將𥁞心生無想初生及後沒位心必生故俱舍論五云生死位中多時有想言無想者由彼有情中間長時想不起故謗聖𣵀槃者顯示昔因身在上界不作欲業故謗聖者指昔修定加行所作也墮地獄者即出婆娑論一師即彼論云有生地獄有生𢙣趣如是者處不定或生𢙣趣或天或人已上今捨評家依初師言墮地獄為顯輪回重苦難故舉初耳問何故如斯有生𢙣趣善趣不同答無想有情法爾而有欲順後業然於善𢙣有異者光記婆娑云將修無想加行時造以彼強勝故今先受謂諸外道將修無想或起邪見謗釋種𣵀槃或起見取計彼為真或起戒取計彼為道如是等惑為𢙣趣因既修此定後須離欲或起生得或聞或思如是等善為善趣因餘生雖有順後受業加行中造㔟力𭤽故乘彼受生或善亦通後起位造應知將生北俱盧州欲界天業亦於人中修無我觀加行時造以彼𭤽勝故今先受或亦通於後起位起將生北州業純淨故彼沒生天將生無想善𢙣雜起故從彼沒通生五趣已上第七三災壞境中三禪已下初火次水後風所壞者成住壞空名四大劫一大劫各有二十劫合八十劫至壞劫末器界將壞初火災起火災起時有七日現或一日成七倍如是之日由燒故火生燒𭁆或由有情業力𥁞故即隨近處災火即生乃至梵宮皆所焚燎不至二禪火災七起一水災起水災起者由雨霖注或從第三定邊雨灰大水或從下水輪際水即涌生或有情業力𥁞故即隨近處有災水有乃至二禪悉所流𭁆不至三禪水災七起亦七火起一風災起風災起者由風相擊或從第四定邊起大暴風或從下風輪際有猛風起或有情業力𥁞故即隨近處有災風生乃至三禪咸所破壞不至四禪問何故火災唯至初禪乃至風災唯至三禪第四禪中災都不至答外遇三災由內三災謂初禪尋伺為內災伺㔟惱心等外火災故第二禪喜受為內災與輕安俱潤身如水而相似故謂第二禪內心喜受與身輕安潤澤依身如水潤故喜為內災遇外水災也第三禪動息為內災息即是風其相似風故為內災第四靜慮以離如是等內災故不遇外災彼地器由有情不假災力所謂能居有情時所居宮殿隨故也第八難成身中長壽天難者今文意𢝰上二界為長壽天難又興大經疏云有難有八𢙣趣有三即三𢙣趣也人間有四一盲聾瘖啞二世智辨聼三佛前佛後四北俱慮州天上有一謂無想故八難中三塗為菩薩濟之人天苦微故云諸間菩薩勤化故云不間此亦不然天上有一即餘經非想天為第八難故又人天難言諸間者有諸人天非難攝應非菩薩之化故已上此尺亦似上界諸天𢝰屬難處斯乃以無佛出不遇教法故為難處也既有如斯之八種𭁆雖暫離憂惱終不苦沉若與淨土論勝劣者比泥土於天金檀於凡木是非懸隔更不可類也本願生淨土至延伇懸隔是第十三問舉𫽄小修因難𫽄長感果一日夜齊戒福最小唯孝養二親世福最小此之二福若感人天且𨵻浮壽約佛出時不越百年欲天上壽他化自在万六千歲然以此善若生淨土壽命無量阿僧劫修因無別果報何異本此義甚深至惟勞生感答第十三問文分為二初顯示義難圖度經陳業力不思議者大經云行業果報不可思議又對法論云如世尊有情業異𤎼不可思議又智度論明五不思議中有業力不思議問云何不可思議云何可思議答雜集論八云謂諸善業於人天趣得可愛異𤎼是可思議諸不善業墮三𢙣趣得不愛異𤎼是可思議由善𢙣業往善𢙣趣感得可愛不可愛異𤎼世間智者能思議故由此能發正見等㓛德故已上可思議即由此業感諸有情自身異𤎼等種差別不思議謂內身等異𤎼有形色等無量差別難可思議除一切智不能思議強思議者發狂等過故復次即善不善業處差別事差別因差別異𤎼差別品類差別等皆不可思議由即此業處差別等無量無邊難可思議故處者謂住如是處造如是業或於城邑或於村落如是等事者謂所依事或有情數或非有情數因者謂善不善根如其所應異𤎼者謂異𤎼內身品類者謂種差別無量品類又有種外事差別能感業用不可思議由何等業感𣗥等鎽鋩銛利如是等類又未尼珠藥草咒術相應業用不可思議末尼相應業者謂月愛珠等能出水等業用難思藥相應業者謂執持此藥藏隱形等咒相應業者謂誦此咒便不燒等術相應業者謂由彼彼術故治病等又觀行者威德業用不可思議云何彼心威德力故能動大地空等又諸菩薩自在業用不可思議謂諸菩薩由命自在力持諸壽行隨所欲樂爾許時住由心自在力隨其所樂於三摩地入出自在由勝解自在力輪轉大地等為水火等勝解自在由願自在力隨其所樂能無數自利利他圎滿大願由神通自在力為欲攝化無量有情顯示種神通變現由智自在力於諸法義訓釋言詞無滯辨圎滿究竟由法自在力以無量種名句文身建立素怛等無上數法隨其所應乃至一切有情於一時間能令彼心皆大歡喜又一切佛所作事業用不可思議云何如來到於究竟無㓛用處證得清淨一味法界諸佛世尊之所應作利益安樂諸有情事隨時如應皆能成立如是諸佛及佛境界不可思議已上次今正一釋下正辨即有二義一明受戒用心由有勝劣一種之戒感果不同謂若本以清淨願心樂求淨剎心求勝故戒成妙因感遐長果若願人天順生死流增長有業心非勝故戒成劣因報命不幾戒雖是同由戒緣別成勝劣業感果有異如行事鈔云若下品心者乃至羅漢戒是下品毗律曰發心我今求道當救一切衆生皆惜壽命以此事受是下品軟心雖得佛戒猶非上勝餘二就義明之云何中品若言我今正心向道解衆生疑我為一切作津梁亦能自利後利他人受持正戒云何上品若言我今發心受戒為成三聚淨戒故趣三解門正求泥洹果已上又婆娑論云有新學苾以上品心起有表業受諸律儀有阿羅漢以下品心起有表業受諸律儀如是新學苾成就上品律儀而阿羅漢成就下品律儀已上此則由心勝劣戒成勝劣例也二又戒因下明戒因雖等由緣別果有勝劣謂前義者由受戒心有上下別戒成勝劣感果不同今雖戒等念願有殊緣勝助因便生淨土且如分假者此下舉例如彼分假變易業者雖同有漏而潤緣殊果成勝劣謂貪愛緣潤漏業時感於分假劣果報若無漏定願增上緣潤漏業時成於變易細妙色身此亦如是戒因雖等由助緣異令所得果成差別也問若以往生念願受戒者戒躰自然可成上勝何云戒等答未遇淨教前二同受戒品一值知識回所受戒願淨土故因此願念為助緣故便生淨土一以不遇善知識故只生人天論此二人戒品雖等依願有無二人果異也上來二義不論佛力文略而已本若本期心至之命根重難前第二義謂彼義意雖受戒品未為淨土後願淨土得往生故今此難若本期心願生淨土受戒品者心清淨故戒成勝因生淨可𭠡遐長壽命若本不期往生淨土只為人天受持戒品後願淨土何將先所受劣無作㓛德即得能感阿僧命無作㓛德者戒無表也新譯名為表無表業身語所作人皆表知名為表業從身語表所起七支人無表知故名無表具如光記舊家言作無作身口運動之所造作故名為作業成就後無其所作故名無作復言教無教言教者作無教無作鈔枇賔記云新譯經論名表無表釋此名者謂是思業思起身語表彰善𢙣故名為表言無表者而非表示令他人知故名無表言教無教者準表釋也作無作者作即動作義稍踈僻已上七支皆通善𢙣二業今語善業故云㓛德本諸業不定至所度量也更救前難文即有三一𢝰明諸業不定更無定量二行者下正釋依後願往生三佛力下還結歸諸業不思議第一明諸業不定中具如經者放鉢等轉重輕受又和尚引喻惟無淨度三昧等經即證延年轉壽利益是皆諸業不定相也第二正釋中亦二初顯示緣力強勝謂行雖劣以後願強資前戒品轉令增勝佛願加令壽長遠問今釋即是前第二義而上文云戒因齊等今如何言轉增殊勝答上言戒等顯先所受戒無差別今明由後願轉增殊勝故更非相二如捨下舉例釋成謂如羅漢留多壽行前作命業權是短促依後發願等勝緣力資短命業成長壽果今亦如是以後願𭤽令前戒轉也俱舍論三釋命根唯異𤎼果而非等流等果云若如是者諸阿羅漢留多壽行此即命根如是命根誰之異𤎼如本論云何苾茤留多壽行謂阿羅漢成就神通得心自在若於僧衆若於別人以諸命緣衣鉢等物隨分布已發願即入第四邊際靜慮從定起已心念口言諸我能感富異𤎼業願皆轉𭠡壽異𤎼果時彼能感富異𤎼業則皆轉𭠡壽異𤎼果復有欲令引取宿業殘果彼前生曾所受業有異𤎼由今所取邊際定力引取受用光云若如是者至誰之異𤎼者問若唯異𤎼阿羅漢留命或經百年或千年等皆由現在布施衣等壽續前應非異𤎼如是命根誰之異𤎼而言唯定異𤎼如本論至壽異𤎼果答如本論云何苾茤留多壽行答文有六一人勝謂阿羅漢即聲聞𫽄果蕳異學人二解成就神通顯俱解蕳惠解三修習勝得心自在顯不動姓蕳時解四福田勝若於僧衆若於別人僧衆謂四人已上別人謂初從慈定無淨定𥁞定見道修道起者以諸活命緣衣鉢針簡等物隨分布施謂正行施業蕳異劣田五依止勝施已發願或願得自在入邊際定或願此𭠡異𤎼果即入第四邊際靜慮諸定上品即名邊際止觀均等中此㔟用最勝故入此定蕳異餘定及不發願六轉業勝從定起已心念口言諸我感富異𤎼業願皆轉𭠡壽異𤎼果恐不能感故出定已復審定之作是願已時彼能𭠡富異𤎼業即皆轉𭠡壽異𤎼果蕳不轉業此家意以布施時無貪相應思正能感現異𤎼命根以邊際定等為緣能轉富業令感壽果此即現業感現命果已上問業力必然何轉富業能感壽命答於定業者實不可轉今言轉者是不定業問羅漢所轉福業者為宿業為現業答光法師意今布施時無貪相應思為福業躰應是現業若寶師意先世福業問光記不明布施邊際俱轉業緣轉先世福業為今命業也何以今時無貪之思為所轉躰捨壽行時亦用布施等何彼相應思為所轉業躰答羅漢既以清淨思業行於布施豈非業躰是故轉彼令感壽果何論文分別壽命云先世業果名為壽行現在業果名為命行已上既有現業所感命根準此故現在布施時相應思為富業也捨壽行時雖行布施而布施力隨時用異謂捨壽行為轉業緣留壽行時直為業躰此有何失問寶記不明論舉兩初唯云轉於富業不云宿業後言宿業殘異𤎼明知初轉現業也論下云現在業果名為命行初豈非此義答寶法師意命根引果非滿果故非布施相應思業是故論云捨壽行時亦行布加之婆娑布邊際為轉業緣故寶法師依此文理如斯釋也但雖初後同言宿業其意遙異後殘業初富業故非相濫問羅漢捨壽行相如何答俱舍論云謂阿羅漢成就神通得心自在於僧衆等如前布施已發願即入第四邊際靜慮從定起已心念口言諸我能感壽異𤎼業願皆轉𭠡富異𤎼果時彼能感壽異𤎼業則皆轉𭠡富異𤎼果已上問羅漢留多壽行有何故耶答論云謂為利益安樂他故或為聖教久住世故觀知自身壽行將𥁞觀他無此二種堪能已上一為利益安樂他故二為令聖教久住世故觀知自身壽行將𥁞他無如斯二種堪能我若不留壽者不可有此二利益故留壽行也問羅漢捨多壽行有何故耶答論云彼阿羅漢自觀住世於他利益安樂事少或為病等苦逼自身如有頌言梵行妙成立聖道已善修壽𥁞時歡喜猶如捨衆病已上一自住世利益甚少人恣故二觀聖教有人住持故三遇病等苦逼自身故次頌意明捨壽相梵行即持戒聖道是無漏也補闕章中散資定資分別凡夫二乘延壽非俱舍意不遑廣述捨衣鉢業延彼命根者以布施思為轉業躰則同光記也佛力等者結應知本念阿㫆陀至乃生西方是第十四問文意易了本案藥師絰至求生安養答第十四問文有三意一略經意二為此人下至義亦無自釋經意三若不得聞下結成第一經中若四輩弟子等者明此人本積㓛於西方彼經云若有四衆茤苾尼塢婆素迦塢婆斯迦及餘淨信善男子善女人等有能受持八分齊戒或經一年或復三月受持學處以此善根願生西方𫽄樂世界無量壽佛𥊸聞正法彼經更不言一日七日唯或經一年三月只是大師準例諸經行法時分亦準下七日七夜受八分齊等或亦容依異譯經耳或復中間悔聞我等者明中悔㫆陀歸藥師遂往生彼經云而未定者若聞世尊藥師琉璃光如來名號臨命終時有八菩薩乘神通來示其道路即於彼界種雜色衆寶花中自然化生經不中悔唯云而未定者文雖既殊義則允八菩薩者本願藥師經不列其名而彼經四卷疏云有八菩薩者舊藥師經云𥁞其壽命欲終之日有八菩薩多和菩薩羅鄰揭菩薩橋日𫥢菩薩那羅達菩薩須㫆深菩薩摩訶薩和菩薩因位檀達菩薩和輪調菩薩皆當飛往其精神灌頂第十二云𥁞其壽命欲終之日有八菩薩文殊師利菩薩觀世音菩薩大㔟至菩薩無𥁞意菩薩寶檀花菩薩藥王菩薩藥上菩薩㫆勒菩薩皆當飛往其精神已上迦才論云或彼中悔聞我琉璃光佛本願㓛德𥁞其壽命欲終之日有八菩薩文殊師利菩薩觀世音菩薩大㔟至菩薩寶檀花菩薩無𥁞意菩薩藥王菩薩藥上菩薩㫆勒菩薩皆當飛往其精神不𨒬八難生蓮花中自然音樂而相娛樂釋曰依此經七日念佛縱令生悔聞藥師佛名還得生也已上第二釋經中為此人初願生西方等者明依悔心不可往生聞藥師佛名等者明助緣謂依歸藥師消悔障助成西業預八菩薩來往生𫽄樂亦由前持戒等者明正因謂此人今雖捨西方本深念㫆𨹔成就𫽄樂業不唐捐遂生安養當知淨業雖成不除悔障不可往生然歸藥師消障故助成本業即得往生本修業成其正因念藥師善忽作助緣第三結尺中若不得聞藥師佛名等者結歸藥師德信知雖成往生勝業若值緣故作罪障抑所成業不得往生乞願同舟淩海行者從傾心之曉至右脅之夕設捨身命無犯重障三業有誠四修無倦念不捨聲相續廓爾而見三尊於眼前翛如而證無生於身後狐疑氷解猶預路定唯須行焉更無矣若無悔者其人終日等者結成依生悔心臨終不念㫆𨹔更借藥師威應知本準依法花至求西方耶是第十五問難此界淨土欣他方佛𭃯維摩安地法花反土寸步不遠近在此砌何勞屏十万億𭃯之霞遙望九品清之月乎本雖有聖教至無淨土也答第十五問文則有二一初至於淨土也明此界淨土不為往生現二由𫽄樂下明令衆生偏勸𫽄樂第一明此方淨中二初直明雖有淨土不勸往生於中雖有聖教等者惣據諸教示此穢處即有淨土同處同時不障得者如第一記然維摩等者別舉二經明此界淨土文無勸往生謂雖兩經同此方淨土而無一處勸生其國豈得以有淨土言即云我生𥁞於品末者恐是應言始末一經始末不勸生故或指淨土一品文謂維摩佛國品法花壽量品等竟無勸處偏言末者顯品終意故言𥁞耳二問所現下明此淨土為別益現不為往生初問應知次答中二一今現等者揔示現淨自為別益二別益下徵釋別益相於中如維摩等者明維摩淨土為別益現即有二由一為舍利弗等聞心淨土淨生疑心故令其見淨明了所聖教除却疑心文如第一記二又為寶積等者亦明別由寶積菩薩所將眷屬五百長者當佛自現淨土之時得無生忍故彼經上云當佛現此國土嚴淨之時寶積所將五百長者等皆得無生法忍八万四千人皆發阿耨多羅三藐三菩提心佛攝神足於是世界還復如故求聲聞乘者三萬二千天及人知有為法皆悉無常遠塵離垢得法眼淨八千比丘不受諸法漏𥁞意解已上若大人見現淨獲益若小根輩見復於穢即證得果明知現土只為此益非勸生也又法花等者明法花淨土為別益現顯一乘妙二乘為者二乘昔聞一乘今初穢後淨用須表示寶已前名為初穢三變之後即曰後淨於中亦有種得益今不別明表二乘一乘初後義也貟足第二明偏勸𫽄樂中即有二由一𫽄樂㓛德勝餘方故二不論上下衆生者皆不退故或𫽄樂淨土內正外依㓛德勝餘方故下品衆生亦不退更非別由餘佛淨土不如斯殊勝事故偏勸生𫽄樂世界非此方無淨土也
