body:
  text: 本分假生死至如何解釋是第八問先次難智論三十七云人身中有八万戶蟲侵食其身是阿鞞致菩薩摩訶薩身無是蟲何以故是菩薩㓛德出過世間以是故菩薩無是蟲戶是菩薩㓛德增益隨其㓛德得身清淨已上此約初地法身菩薩肉身菩薩雖在初地未免血肉蟲戶身也故彼論七十四云三世十方諸佛真智惠中信力故通達無礙是名菩薩無生忍法入菩薩位名阿鞞致是菩薩雖從初發心已來名阿鞞致相未具足故不與授記何以故外道聖人諸天小菩薩等作此念佛見是人有何等事而與授記是人於佛道因緣中未住云何與授記是故佛未與授記是菩薩有二種一者生死肉身二者法性身得無生忍法斷諸煩𢙉捨是身後得法性生身肉身阿鞞致亦有二種有於佛前得授記有不於佛前授記已上大品經言阿鞞致無有戶蟲亦是初地法性身也大品大論約於初地無生忍及阿鞞致故又演祕云分假生死身名為蟲身有蟲故智增初地悲增八地得變易身如應可判其分𫨻義難意應見不可重釋本淨土衆生至是諸蟲身答第八問文即有三一先會難二次例三正釋成第二例中先色界次灾壞雖是分假而無戶蟲何况淨土清淨妙色縱分假得有諸蟲三决壞時人身無蟲者正理論云由此准知傍生鬼趣時人身內無有諸蟲與佛身同傍生壞故有二趣於人益者壞與人俱餘者先壞如是二前為善已上俱舍論云人天雜居者與人天同壞光記云正理評取前家此論非以正理為量同彼後亦無有失已上今論即據正理前非據俱舍又寶積經云初出胎時經於七日八万戶蟲從身而生縱撗食噉已上准此者七日嬰兒亦身無蟲非但壞劫本何故稱讃至請辨其義是第九問稱讃經過百千俱𦙠那𢈔多佛土小本經言過十万億佛土般舟經明去是間千億万佛𭃯賢護經宣經途去此過百千億諸佛國土陂經述去是佛國當過百千億佛界大阿㫆𨹔經云去是閻浮提地界千億万平等覺經全同此此等所即是處遠觀經何言去此不遠四遠中處遠者俱舍二十一云𫝊遠性𢝰有四種一相遠性四大種雖復俱在一聚中生以相異故亦名為遠二治遠性如持犯戒雖復俱在一身行以相治故亦名為遠三處遠性如東西海雖復俱在一世界中方處隔故亦名為遠四時遠性如過未世雖復俱依一法上立時分隔故亦名為遠本案極樂之至名不遠也答第九問文即有二一許稱讃誠是處遠二今言下正會觀經不遠文自十義先摽次釋後結起盡可見於十義中前九依觀經後一由𣵀槃前九之中初二定善緣言佛力者釋迦如來威神加𡸁護念故方便力者釋迦如來善巧方便開定觀門教觀見故由此差故分為二義次二如次第七八觀前彼如來應現力故後衆生觀念力故次二如次第十二一觀前彼如來擁護力故後此衆生有緣力故第七一義第十三觀由本願力定觀成故此一義令被前六義前六義皆是定觀益以諸定益咸由本願故也次二同是散善利益十一門中第九第十正出流轉究竟門故今為兩義第十一義佛法𢝰䡄令被前九若定若散不放逸故近於佛故本觀經言是至能作佛也是第十問先經文次問其相本案唯識之至即其義也答第十問文即有二一初至皆心變現𢝰明唯識道理万法即自心作二當用此心下正明從心想生之義第一文中万法万相皆是自心者衆生則有染淨二心其心必熏染淨二種其種能變善𢙣二報其果報者不出十界若正𠰥依正諸法躰相万差皆是心作故云万法万相皆是自心或法是本質法相則影像相若本質若相分莫不心作故云万法万相皆是自心如宗鏡云森羅及万像一法之所凡所見色皆是見心不自心因色故心色不自色因心故色故經云見色即是見心已上故起信下證而成起信論云一切諸法唯依妄念而有差別若離心念則無一切境界之相一切境者即十界境相依心差生妄心若一空寂靜一切境界皆不現前如古人云翳在目千花亂空一妄在心恆沙生翳除華盡妄證真維摩二文亦證十界唯心所作心淨土淨十地菩薩佛位因果心名因上名果心穢生穢三賢二乘六凡因果心名因生名果上依顯正下正顯依影略互顯十界依正據心而成故知万法皆心變現者結染淨諸法皆自心變所謂心若有戒定惠為是諸善本人天聲聞緣覺菩薩如來六界由此而生心有貪瞋癡為是諸𢙣根修羅傍生餓鬼地獄四界由此而出善𢙣雖異同心為宗是故可謂調達三藍弗四隂聲聞七覺如來十力皆一心作非他因緣也第二正明經義中先解次證初解中當用此心等者先分別心境第六識名以為此心此識有十五種不共德獨能觀心故言衆生觀心緣彼阿㫆𨹔佛為本性相者若約業力所變境者第六意識緣無法時無本質緣實境時自第八變為本質境變相分影為親所緣若約他力所變境者界地自他則不决定謂依定通等所力而緣異地遠境等時杖他所變以為本質由斯義故依十六觀緣淨境時不杖自變唯扙他佛所變境為本性相變自相分以緣彼境故言阿㫆𨹔佛為本性相不謂杖自第八所變也况佛願力為增上緣有憶想者得見境相故不假自所變無妨衆生觀心等者顯於本質能發觀想名見分心當觀心時變作影像名相分心見相兩分者此下正釋經文中先釋是心作佛之義謂上所言能觀見分所緣相分皆不能離於自證分見分之力現相分故見分能作是名是心相分所作是名作佛或自證分名為是心四分之中名心自證分是心體性故見相二分第三分用不離躰故能緣見分所緣相分自證分作用躰作故故是心者正自證分言作佛者相分心見分能緣雖變相分而亦見分心作用故非能作心兩分不離自證分者即此意也此相分者下釋是心是佛謂上所言此相分心即是自證分心無別有躰性故自證分心即相分佛故是心者自證分心言是佛者相分影像由斯義故二文意異是心作佛躰用不同能作所作其義亦別故言作佛是心是佛不別躰用直指心躰名為是佛影像相分心躰自證無別躰故文釋作佛方言不離於自證分釋是佛言無別躰表此差別也欲觀如來等者顯經結意謂若行者欲觀如來色心等一切㓛德皆是自心所變相分故名諸佛正遍知海從心想生此文即結上是心作佛等文也或由心想等者以別義顯從心想生前義意觀他佛質變自心影名心想生今義意因行不空果德必成名心想生若存此義上是心作佛等文亦可兼含酬因成果修種種行者表因万行既成万德即顯故言正遍知海從心想生也問第八觀文明觀佛時彼佛乘心眼前顯現何言修因成於佛果名心想生答佛意深廣何唯一義故以二義顯示佛包於諸意雖立一義非捨一義互存而已次故賢護下二經者𢝰證三界唯是一心自他迷悟皆依心成初引賢護中菩薩亦爾者上喻云如人欲觀己形好醜即便取器盛彼清油淨水精明鏡用此四物觀己面像善𢙣好醜現分明於此四處面像現時是非先有是非先無是非在內是非在外唯彼四物清明無濁其形隨現而彼現像不從四物出亦非餘處來非自然有非人造作當知彼像無所從來亦無所去無生無無有住所諸物清淨彼色明朗影像自現不用多劫菩薩亦爾一心善思見諸如來乃至廣如今所引見已即住者菩薩思惟見諸如來見已便尚安住定心故陂云在佛面見住上定意見便難問已上安住定已問佛於義佛解釋問菩薩聞心大歡喜即能思惟所法門故般舟云欲見佛即見即問即報聞經大歡喜作是念佛從何處來等已上此經住言聞經者定中佛答即名為經故𭤩决云見已即問佛答所問聞佛所心大歡喜雖在三昧者是佛故曰聞經已上今此佛下出思惟相於中先思惟佛身我身無去來處今此三界等者思惟欲色無色三界果報皆心所作是心有佛者四字本經無恐轉寫誤或為顯示生佛在心論主加歟今我從心等者正明佛即心作非他所作謂三昧成從心見佛信知我心作佛我心是佛作佛是佛約四分釋義如向辨此句遣他作情我心是如來等者重明所見佛身能見我身共我心故我心見佛我心見我此句遣能所情心不知心不見心者明雖見佛求能見者及意緣知畢竟𮞄得是則遣於遍計所執能令悟入二空妙理也故經即云心有想念則成生死心無想念即是𣵀槃諸法不真思想緣起所思既能想亦空已上華嚴可解勿勞文心有垢位等者結歸維摩意雖如斯解不辨四分難細文意粗示𮈣概將覺後學夫一切境皆自心用若離心則無有一法此心即有四分作用一相分二見分三自證分四證自證分謂心者名慮知之法若無所知何因心生以此緣起理必然故心心所生自躰轉變為所慮用此所託用為親所緣亦名相分既現定有緣之能緣作用是名見分既起亦有知之內緣作用此知見分能緣作用名自證分此用既起亦有知之內緣作用此知自證能緣作用名證自證此用既起亦有知之內緣作用是則還亦前自證分如是證知心用滿足故但四分更無增减雖心與境慮非慮異而一心用如幻假豈心外別有堅實法是故諸法從心而起皆如夢境無實能取所取差別更執何物為心外哉問設雖境躰實心外有而心起緣慮知義成何言心躰轉不成境更無所知若無所知心不可生是難相分答不許心外有實法境有多文理唯識論等破於外道餘乘實我實法所執種種文理即皆是也且舉阿毗達摩經四智成就菩薩所觀略顯心外無有實境言四智者一相識相智謂於一處人天等所見各別境若實有豈如此隨見者業力種種轉變二無所緣識智謂緣過去未來夢等非實境時境非實有心現緣知心若必託外境起者云何緣無以之准知一切境界皆是心變三自應無倒智謂境若實一切凡夫皆應是聖本來證悟心外境故若爾不可假於㓛用有得自然成就何不然耶四隨三智轉智言三智者一隨自在者智轉智謂已證得心自在者隨自所欲轉變水等能成金等境若實有何可如是隨心轉變二隨觀察者智轉智謂得勝定修法觀者隨觀一境青瘀等相種種顯現境若實有豈如此耶三隨無別智轉智謂起證實無分別智一切境相皆不現前境若實有云何證實皆不現乎菩薩成就此四智時於唯識理决定悟入是故不許心外實境也問雖相分現而自證分直緣相分自證分者是心躰故起見分用別為能緣有何所以答自證分內緣現量還知心用豈直得緣外境相分是故必起緣外境用是名見分不可猥四分作用問設起見分心境義足何見分外立自證分答能量所量必有量果相分所量見分能量若無自證分量見分於此量知無所果成豈應道理是故必定有第三分證知見分如有人而持丈尺量等時等所量丈尺能量人是量果丈尺能量為令所量證知其人若不能引人證知者丈尺能量等所量有何要乎丈尺能量等之時人能證知所計尺分故能所量義能成立若無丈尺人何得知等分濟若無等人亦何用能計丈尺若無其人誰知丈尺能量等三分妙理亦復如是相分所量見分能量見分能量相分之時內必證知見分能量知之義由斯成立若無見分心豈知境若無相分心起緣用有何所用若無自證誰知見分能變相分是故定立第三分也問設立自證見分還緣第三自證三分義足何用第四如自證分緣見分上還能緣證自證分故不立五分答緣內心用㔟用微細故必現量而其見分是外緣用理通三量謂五八識見分現量第七見分必是非量第六見分能通三量𢝰合論則八識見分即通三量如何得知己內躰耶若約見分現量時者若彼比量非量轉時誰知自躰明知見分以緣似外境現相分用故設雖現量無證自能由斯義故第二見分無還而知自躰分也一不第四第三能量應無量果豈非大失其自證分既居中間內緣現量是故能知見分內法及證自證亦是內法問相分心所知法故心定可緣後三分心能緣中差何𭤽證知見分乃至證自證分若不爾者有何失耶答四分𢘻是心分㓛能皆應證知若不爾者一心中有自所不知不應道理故後三分雖皆能緣其中猶有如是微細相緣之義皆成所知豈非深妙問今此四分何識相應答八識一皆有四分相應心所亦復如是且於眼識明四分者眼識生時以第八識所變色塵為踈所緣眼識自躰轉現色影以此影像為親所緣其親所緣名為相分緣斯作用名為見分此二分是心自躰上所現作用起此二用所依自躰名自證分證自躰用名證自分餘識四分亦以例知色等五境如其次第眼等五識各緣知第六意識緣十八界一切諸法為境隨應變現諸法相分影像隨應能起緣慮作用第七未那但緣藏識見分為境本識變現種子五根器界三境餘義如前諸後二分皆是現量但緣內故見分隨識三量不同如向已辨諸識相分皆非緣慮非三量攝諸識相應心所四分准之應知問八識相分皆有本質答第七五識必有本質五識唯詫第八相分為本質故所謂三種境中器界五塵為躰第七恆緣第八見分為本質故第六識境本質有無隨時不定或時有質緣色等時或時無質緣無法時第八識境一向無質依先業力任運變境不假所杖本質故也然踈所緣有無不定依身器界他有情變為踈所緣正根種子但親所緣無踈所緣本質之與踈所緣大旨雖同少分有異云云四分大𮈣取略如斯委在𥝠記不能廣述清辨論師相有見無正量部師見有相無安惠一分唯有自證相見俱無難𨹔二分相見俱有陳那三分證自證護法四分教理俱成但本論頌多依三分今亦三分不明第四恐文略也本觀經言若至無見頂相是十一問先次難無見頂相者以十地已還無能見者故約其㓛能名無見頂故觀佛經一云惟其頂上五大梵相生時摩耶及佛姨母皆悉不見其五梵相開現光明至梵世復過上方無量世界化成雲臺諸佛境界十地菩薩之所不見今為父王生頂相是生王宮時無見頂相准知佛相問丈六佛身何不見頂答佛證自在長短無妨妙智所變不可思議是則摽佛勝出諸也本有釋者言至生見此相答十一問文自二義第一義中即有其三一釋二三合以少從多𢝰言得見八万四千實不可見一無見頂如文可解第二義中文即有三一宗二立理三例一宗中先會無見名次觀行者依佛威神而見彼相二然他下立理中先惣立理為物現身何貽一相不示他耶次為顯此相者下別述為令他人受用尊重可現此相三引例中如釋迦佛剃除髮者問觀佛經一云昔我在宮乳母為我沐頭時大愛道來至我所悉達生時多諸奇特有人若問我汝子之髮為長幾許我云何答今當量髮知其尺度即勑我申髮母以尺量長一丈二尺五寸放已右旋還成螺文納妃時復更沐頭母復勑言前者量髮正長一丈二尺五寸今當更量即伸量之長丈三五寸我出家時天神捧去亦長丈三五寸今父王欲者髮相不父王白言唯然天尊樂見佛髮如來即以手伸其髮從尼𤘽樓𨹔精舍至父王宮如紺琉璃繞城七匝於佛髮中大衆皆見若亍色光不可具是一光普照一切作紺琉璃色於琉璃色中有諸化佛不可稱數現是相已斂髮卷光右旋轉還住佛頂即成螺文𣵀槃經四云於𨵻浮提生七日已又示剃髮諸人皆謂我是嬰兒初始剃髮一切天人魔王波旬沙門婆羅門無有能見我頂相者有持刀臨之剃髮若有持刀至我頂者無有是處已上大智度論惠上菩薩經亦同𣵀槃此等諸文不言剃髮又不許見佛頂如何答五分律云菩薩出家至頂摩那樹下有剃髮師求令除髮毗尼母論云佛在王舍城佛髮已長有優婆離童子共父母來到佛所白佛剃髮時瞿婆羅王子是佛髮還國供養佛本行經云自剃螺髮今依此等言佛剃髮之時令人見頂其理必然但𣵀槃生天乃至剃髮等相皆是示現而非實義若依此令見頂者是示現耳若爾兩文互無鉾揗即令一切衆生見此相者依例釋成謂毫觀力令諸衆生見此頂相一切衆生即毫觀成就衆生或指餘別緣力令見此相而已本如觀經第至方諸佛耶是十二問准餘文者先觀經云以見諸佛故名念佛三昧文而後可難然今直難不引略也本此有三義至見十方佛答十二問先摽次釋中自三第一義中先釋次證釋文可見次文殊般若中能見三世佛者智論三十三云問曰十方現在世界可見過去未來諸佛世界云何得見答曰菩薩有見過去未來三昧入是三昧已見過去未來事如夢中所見已上餘義文明不須解詳本觀經言作至生諸佛前是十三問先引次難本此有四尺至諸佛前也答十三問文自四義第一義第九觀行者真觀成就時見阿㫆𨹔佛十方佛此行亦有可生餘佛淨土㓛能故若改願生所現諸佛國土通生何𭃯故言生諸佛前第二義中先難前義次而言下正述自義行者得生西方之時非直爾見阿㫆𨹔佛不起亍座即見十方一切諸佛或歷事諸佛遊遍十方故言生諸佛前第三義指無數化佛名為諸佛此義不明觀行之前所現諸佛十方別佛得生之時所見諸佛何一佛化經豈非因果相順見諸佛身生諸佛前答見時實見十方諸佛生時實生一佛之前應道理故於義無妨皆來摩頂者表示大悲養育衆生栖復抄云手摩其頂者頂是衆生心頂法花經教名手口名摩或教於心名摩頂也已上第四義諸佛共變者唯識論十云餘二身土隨諸如來所化有情有共不共所化共者同處同時諸佛各變為身為土形狀相似不相障㝵展轉相雜為增上緣令所化生自識變現謂於一土有一佛身為現神通法饒益於不共者唯一佛變諸有情類無始時來種姓法爾更相繫屬或多屬一或一屬多故所化生有共不共不爾多佛久住世間各事劬勞實為無益一佛能益一切生故本法華經言至若為通釋是十四問先次難三度如第一卷已辨知佛心者出中阿𭇥經第八卷如下婆娑文意全同故不能別目連他心智觀佛心者𣵀槃十四云爾時世尊告文殊師利諦𦗟善男子我成佛已過三十年住王舍城爾時我告諸比丘今此衆中誰能為我受持如來十二部經供給左右所須之事亦使不失自身善利時橋陳如在彼衆中來白我言我能受持十二部經供給左右不失所作自利益事我言橋陳如汝已扝邁當須使人云何方欲為我給使時舍利弗復作是言我能受持佛一切語供給所須不失所作自利益事我言舍利弗汝已扝邁當須使人云何方欲為我給使乃至五百諸阿羅漢皆亦如是我悉不受爾時目連在大衆中作是思惟如來今者不受五百比丘給使佛意為欲令誰作耶思惟是已即便入定見如來心在阿難許如日初出光照西壁見是事已即從定起語嬌陳如大德我觀如來欲令阿難給使左右已上如日照壁者大目揵連觀知佛心明白無隂故以之又如來心欲阿難方為侍者如日初出定照西壁故而已本薩婆多部至知佛心也答十四問即有其二一依小解二依大尺初小中言薩婆多有二種者婆娑論九十九云如來無漏心所法及未曾得有漏心所法心無能知者若如來曾得有漏心所法欲令他知者即知謂佛若欲令鈍根者知我心非利根者則般特等亦知佛心舍利弗等皆不能知若欲令傍生趣等亦知佛心人及天趣皆不能知云何知然經故謂經一時佛住㽵嚴城池測重閣精舍時諸苾以世尊鉢及彼自鉢皆𣇣露處有下娑羅樹來趣鉢處時苾恐彼鉢竸驅遂之佛言汝等不應驅逐彼有別意須當知時取世尊鉢徐還上樹盛滿流蜜持奉世尊以有蟲故世尊不受佛起曾得心品令彼去蟲知即住一處擇去蟲已來奉世尊未作淨故佛復不受佛起曾得有漏心品令彼以水遍灑作淨即知退住一處以水作淨還奉世尊於是世尊哀愍而受歡喜出家勤修梵行不久便獲阿羅漢果世尊號為蜜上座尊者以伽𨹔讃佛曰無上天人調御士能令𢙣趣亦知心𠰥住甚深微妙定乃至人天不能知已上問何名曾得心答補闕章云曾得未曾得者生得善名曾得加行善名未曾得又解有漏善名曾得無漏法名未曾得已上前義意與婆娑論同有漏心中論曾未曾無漏心中無其義故婆娑九十九云曾得有漏心所法有十五種是他心智所應取境謂欲界及四靜慮各有下中上三品心所法曾得有漏他心智有十二謂四靜慮各有下中上三品他心智此中初靜慮曾得有漏他心智下品者能知欲界三品及初靜慮下品曾得有漏心所法中品者能知欲界三品及初靜慮下中二品曾得有漏心所法上品者能知欲界及初靜慮各三品曾得有漏心所法如是展轉乃至第四靜慮曾得有漏上品他心智能知欲界及四靜慮各三品曾得有漏心所法如曾得有漏十二種他心智知十五種曾得有漏心所法未曾得有漏十二種他心智知十五種未曾得有漏心所法亦爾無漏心所法有十二種是他心智所應取境無漏他心智亦有十二種謂四靜慮各有三品此中第二靜慮無漏他心智下品者能知初靜慮及第二靜慮各唯下品無漏心所法中品者能知初靜慮及第二靜慮各下中二品無漏心所法上品者能知初靜慮及第二靜慮各三品無漏心所法如是展轉乃至第四靜慮上品無漏他心智能知四靜慮各三品無漏心所法問何故上地下中品有漏他心智能知下地三品有漏心所法上地下品無漏他心智不知下地中上品無漏心所法耶答有漏無漏心所法建立各異謂有漏心所法依相續建立有一身相續中成立三品有漏心所法無漏心所法依根品建立無一身相續中成就二品無漏心所法有成就三者建立既別故知有異已上次義意與唯識論同惣有漏言曾得故唯識十云二能斷道謂能永斷二障隨眠此道定非有漏加行有漏曾習相執所引未泯相故加行趣求所證所引未成辨故疏云以有漏心加行智及有漏後得智一是曾習二相執所三未能泯伏此相故不能斷惑四或加行智是能趣求所證真如趣求所引無分別智未成辨故不斷惑由無分別智是加行所引真如是加行所趣求證即由所引無分別智皆能證所證真如成辨能斷二障非加行智演祕云問何以曾習不能斷惑答言曾習者是曾得也此曾習道若能斷者即應二障無始不成以能治道先已起故雖道曾得而障不亡故知曾習非能斷也已上第二解深下依大中先證次釋初證中解深蜜經佛自釋言者彼經中都無有此文第三分別瑜伽品中言由彼影像唯是識故我識所緣唯識所現等雖明能緣所緣躰一而未分別佛果二分知不知相此論之定有所據然唯識論第十云然變化身及他受用雖無真實心及心所而有化現心所法無上覺者神力難思故能化現無形質法若不爾者云何如來現貪嗔等久已斷故云何聲聞及傍生等知如來心如來實心等覺菩薩尚不知故已上化無形法者即相分心此相分聲聞及畜等皆能知如來實心者是見分心此見分心唯佛與佛所行境故十地等覺尚不知也問何故見分不知相分能知答如來實心深細微妙故因位衆生不能覺知然為引他令相分心現似緣慮雖似緣慮實非了知故十地論云此實相分似見分現無慮知故為他現故如來相分令物能知故觀經言亦見佛心也然佛有下廣約四分辨知不知於中先明佛位二心因位不知謂緣理內證知心自證分心者是根本智緣事外觀衆生見心者是後得智此之二心佛佛相知十地不測問護法正義佛果見分直緣真如何自證分屬緣理心見分一向言後得智答實如所難見分直緣真如妙理但今論者護法徒中有一義故且順彼歟如疏三云雖緣真如非外以見分用外故亦不得緣演祕釋云雖有處言見分緣如見既用外實不得緣詳曰且依見分不緣如義為順此中見名外故非盡理矣已上次緣理及事等者明佛果位一相分心一切能知緣理外觀衆生相分心者他受用等所現心法雖實非緣為引他示緣理相故名緣理外觀衆生相分心緣事外觀衆生相分心者示緣事相令知他故准例可知雖示緣理及緣事相實是相分故等亦能得知也問瑜伽九十八云於四事不能化一根二心三心所四業何言相分變現心等答唯識論會云雖變化無根心等而依餘不依如來又化色根心所法無根等用故不有本九品生人至以分九品是十五問上來雜釋經論相自下料蕳九品位行此問意言九品生人信等位中依何位地論九品別本分九品至佛果圎滿答十五問先搮次釋中有二一尺二家二釋細多家第一明有摽釋結釋中二家初家言九品並是十信菩薩然為九品者住而不退十信心行是上三品𨿽同不退行有淺深分成三品故摽言約住是安住不動本位就退十信即有二類一退大心行起小心行是中三品雖同小乘行有淺深分成三品故文摽言約退造善二退大行起生死心罪有輕重分成三品故文摽言約退造𢙣次家言上三品發大菩提心修菩薩行中三品發小菩提心修聲聞行行有淺深各成三品未詳次位學者思擇下品三人如文可知第二明細先摽次釋中有二初出諸師九品次明無生次位不同初上三品有六師中三品有四師之下三品中不舉異上三品中先舉諸所以下述不同由謂此等師觀經所即悟無生擬諸經論無生故經論無生異不同釋上三品諸師解異也故下仁王等五部經論明無生忍高下不同問誰師所由何經論答第一師依仁王經謂彼經無生法忍在七八九三地中故此師即上品上生即悟無生四五六地菩薩往生所得益也第二三四依諸論諸論廣申或在初地或在忍位故三師即悟無生十廽向等菩薩往生所得益也初地無生在智論等忍位無生出攝論等依宗異隨應詳義第五師依瓔珞經謂彼經明無生法忍在十住中七住已上故此師即悟無生十住初心菩薩往生所得益也第六師依花嚴占察謂花嚴無生忍在六信已上占察經無生法忍在十信前故此師依花嚴經即悟無生十信初人往生即得六信無生若依占察即悟無生十信已前凡夫往生即悟信前無生忍也問下引花嚴唯言十信不言在六信已上何答第四卷信不退在六信已上此下論解無生在十信後所言後者蕳前五信准知彼此今言花嚴無生忍在十信者即依六信不退意也問依占察經十信前人往生而得信前忍者何是進得益義耶答未得信前無生忍人往生之後進得彼忍是為進謂生得善生淨土者於彼土得聞惠無生也問花嚴不十信之名何言彼經無生在信答法花記云彼經不列十信之名唯於住前觀十梵行自古講者為十信故今之以為信位已上古來諸德得十梵行為十信故今亦爾耳問無生忍者名除斷執及煩𢙉惠十信已前無有此義何立無生法忍名耶故玄贊云無生是境無所執生法者是教詮無生教地前昔聞未能智證印名無生法忍印證義攝釋云今依大般若經略為二釋一法無生名無生法故彼經三百七十六及第五十六怢並同云謂令一切煩𢙉不生深妙智惠常無間斷觀一切法畢竟不生是名無生法忍意云謂能斷彼煩𢙉之智觀彼一切遍計所執畢竟不生此能觀智名無生忍無生即法無生法之忍依主釋也無躰之法亦名法故二智所斷惑畢竟不起名為無生智了諸行同影炎等名之為忍無生即法無生法之忍亦依主釋也已上答無生法忍有淺深者諸師所許所難之或是地上不閞淺位如花嚴十信立無生忍豈必深位故占察經信前立無生忍者非所出難玄贊等意故占察經下云漸能向一行三昧若到一行三昧者則成廣大微妙行心名得相似無生法忍以能得聞我名字故亦能得聞十方諸佛名字故以能至心禮拜供養故已上是則凡夫聞佛名號名相似忍是名信前無生忍相中下三品文自分明次無生忍有六位者下明無生忍淺深不同助成所舉諸師異又迦才論云然無生法忍亦有四種一緣教故得無生法忍謂一切凡夫及十信位人讀大乘經論作無生解即是聞惠二緣觀得無生法忍謂十解已上乃至十廽向謂作三無生觀解万法無生即是思惠三證理得無生法忍謂初地已上由證遍滿法界二空真如即是修惠四約位得無生法忍謂八地已上由得真俗雙行即是無㓛用智是修惠也已上本未知往生至得不退轉是十六問小經生者皆是阿鞞致六經明皆𢘻住於正定之聚此文相觀經中𨒬於七日得不退轉故有此問下答文中言此兩經即其義也本此上品中至不相也答十六問先釋觀經次會小經初文中言十信五心已前者前四信人𨒬於七日得第六心名不退轉若准之者上品上生第五心人往生即證六心不退經名即悟無生也上品下生十信初心往生彼土經三七日見佛聞法亦可證第六信不退上品三人俱應十信入住菩薩故也問何以得知上品上生即悟無生是信不退誰知十信後心菩薩往生即證初住無生答上三品人因行大同花開得益何得懸隔計知此人前五信中由有小別雖有即悟七三七異所得之益同應第六信不退也上品中生既第六信上生寧遙叶十住耶但今論中𦆵雖明上品中生一品位未詳餘品故所述義難當論意學者思擇問七日不退第六信者依何文理答九品皆是𭂫夫人故往生得益不可深位是為道理花嚴經信位無生是為文證問若依花嚴十信忍與第六師有何相答雖同由彼位少異文其相明不可迷矣次會小經中處不退者如第四記本何因九品至有何意也是十七問意應見本准依四十至而得往生答十七問文自二義第一易了第二義中三一正釋義二藥師下引例釋成三為無下引證結歸初述中二先正明非本願來經不宣謂中三品發小乘行無菩提心然佛以大慈大悲故臨終之時而來攝非是本願不佛非是經問非本願故不者何上二品來相答二來𨒦顯以慈悲𭤽𡸁來下之一品不來顯非本願故上下文更不相次以四十下明不來不本願謂本願言發菩提心臨命終時致來攝然此三人未發心故佛不來更無願二藥師經引例中即有其二先引藥師經例謂有八菩薩示其道路者彼非專心决定類故不順本願至心信樂雖不來不本願又彼經等者上明彼機同中品機自下更明彼所明行亦當此行謂彼經八齊戒行同中品小戒授法行既小戒定如中品以不可發菩提心故非當本願也次引處胎經例謂墮懈𢢔不專行業發願不勤由斯義故不應本願故佛寧來而生懈𢢔問如中三品雖不順願慈悲來預道路類墮懈𢢔輩雖不應願何不慈悲𡸁來耶答中三品人不應本願發菩提心言故雖不來至心决定起慈悲來彼二類者心未定故尚無慈悲而來也問彼二類人同非至心有何所由一類得往生一類墮懈𢢔答雖同非至心决定者八菩薩藥師𡸁威為增上緣得生極樂墮懈𢢔者無別緣故墮雜修失且留中途也三為無量下引證結歸中縱令不見等者明下輩尚發菩提心有來義夢見往生屬佛故問夢境幻何屬來答夢有實如風雨夜若吹眠夢中所見表裏不調首尾背等皆是夢十夢灼然表遺法事五夢不祥感泥洹如斯先皆是真實如攝釋言智論第六有五種夢一氣多夢見火見黃見赤二冷氣多見水白三風氣多見青黑四見聞事多思念故則夢見五天與夢而欲令知未來事故今經所明即是第五縱佛菩薩加之令見夢亦第五收類相似故已上故夢彼佛來表示今屬相於義無妨彼四安樂行夢唱八相此下品生業眠見三尊𪯱修雖異感應惟同寧非奇瑞故賢護經三昧成相云若於晝時不能見者若於夜分或睡夢中阿㫆𨹔必當現也已上大乘意夢覺所見皆心所變縱眠夢心所變為佛何異覺見佛加亦同莫聊爾矣如空藏經云時空藏菩薩觀彼衆生隨所應見於其夢中現種形即以方便而為法若有衆生應於𥧝覺即於目前見種形即以方便開正直道已上明知佛鍳於其機類起覺夢應也本何故觀經至少多有異是十八問如文可解本此有二意至億劫重罪答十八問文自二義第一義文有摽釋結釋中有二一但以下先直釋謂三品人罪有多小故下上品罪少唯有五十億劫感生死罪障生西方是故除所有罪根下二品人罪漸多故一念能八十億劫生死之罪漸多者若下中品多下上罪下品多下中品罪故言漸多據罪階降多少非是念佛㓛德差殊有罪異二如下舉釋成於中先次此義下釋成下品問第一義言罪不同依障有無非一念㓛有差別者下品下生何不一念所有罪積於十念除盡諸罪答案問端意下上一念五十億下二一念八十億相對致難故第一釋下中下一念各八十億劫以為本會上品一念唯五十謂彼罪輕限五十億故但能非其餘彼品若有八十億劫生死罪者一念㓛力亦可盡而下品罪過八十故一念力不能盡方滿十念除障往生此義意者一念之力非八十億劫餘也問不思議佛法豈㓛有齊限答一念能八十億劫寧可思議又非佛力有齊限故限八十億只是凡夫心力不及故罪障令有分齊也問依心力別論罪差是第二義何存此義答就八十億劫中罪第一依罪第二依心是為差別一念之力不及八十億外罪者縱雖何義言凡夫念力所不及有何相監問何故凡夫心力不出八十億劫答除不思議佛法之外餘一切法力有分限例如𭂫夫二乘通緣於過來限八万劫不及其餘緣現在境𭂫夫限一四天下二乘人限二三千界不至其餘皆是衆生法爾因果不足疑問第二義中先正釋義次重問答義意言念佛㓛德雖無差降由念佛名至心別故令其罪多少不同下品上生死無𢙣相怖心不極隨分至誠但五十下品中生猛火忽現罪人忙怖真心徹到能八十問以至心輕故但五十者雖有餘罪尚得往生又下中品至心念佛何限八十又下品十念何故念罪齊等無別答下品上生罪障本輕至心輕微但所有得生淨土縱有餘罪非有可障往生𭤽用次下中品至極心力不過八十故唯八十不言餘如前已辨次下品念別罪其功齊者行者心念前後不改同八十更無差異上來二義非乖成約罪有無約心輕重更互相順存一邊耳本問若然者下至八十億劫難第二義若下中品忙怖至心八十者下品下生怖畏尤重一念應多百億劫何故同前下品中生念別唯除八十億劫本行者命終至多少不同重救前義先釋次如文易解本何因聞十至他諸佛也是十九問聞經廣亘十二部名稱佛狹一唱之念何因罪聞罪少稱罪多又非就善躰多少致問難准般若聞經德勝稱佛㓛劣故成疑端般若經不二義言般若者金剛般若經云須菩提我念過去無量阿僧劫於燃燈佛前得值八百四千万億那由他諸佛悉皆供養羕事無空過者若復有人於後未世能受持讀誦此經所得㓛德於我所供養諸佛㓛德百分不及一千万億分乃至算數喻所不能及本彼經供養至彼聞經也答十九問即有其二先會所難經次釋今觀經義初會經中立於二由會佛經德一供佛好時持經是𢙣時言好時者即佛在世言𢙣時者即佛後佛世供養不可希奇𢙣世持法甚為希有故𢙣時經㓛德深妙如法花𢙣世𭤩經若有𢙣人以不善心於一劫中現於佛前常罵佛其罪尚輕若一𢙣言呰讀誦法華經者其罪甚重已上謗罪如斯信德應知肩所荷擔即其義也二供佛有相心持經無相心㓛德少多量而可知惣而論之𢙣世中以無相心持經超過好時中以相心供佛般若空理為心故未世受持亦依融故言作無相心持經也次釋今經文為三意一今此下至但有相正明今經聞經念佛異彼經謂彼經供佛聞經時異心異今經所聞經稱佛時同心同於時心同論勝劣者應聞經劣稱佛勝故異彼經也二然與下立理釋成一㫆𨹔佛與下品機宿緣𤎼故經機不爾故二𢙣世稱佛生信極難故聞經生信非難故問何故爾耶答惣信大乘𭤽非極難別信稱念一佛名號往生淨土極難信故既信難信豈非勝耶三佛能𭤩經故三是以下結以此三義故稱佛罪多聞經本下品下生至生淨土耶是二十問下品下生罪雖多於下品中生僅所增罪五𨒫謗法𨒫謗合受生死苦不可過六劫所增之罪既以不多念佛多少不可懸隔若爾何因下品中生但聞佛德即得往生下品下生乃須具足十念方往生淨土耶本有二釋一言至得生淨土答二十問文自二義第一義中即有其二一計五𨒫等者先𤗊問理計彼所增五𨒫等𠍴五𨒫滿五劫謗法增一劫只合六劫受生死苦五𨒫感五劫者非有部意彼計隨𨒫多少不同雖有受苦輕重差別壽報不過一中劫故俱舍云感地獄中大䎡身多猛苦具受二三四五倍重苦光記云𨒫罪漸多其身轉大轉復䎡苦具漸加受苦轉增造多𨒫中初是業後是滿業故正理云造多𨒫人唯一能引餘助滿故復正理云如是造多𨒫前後滿已上對法第四同於此彼論云於一生中頓受一切所得異𤎼無有過失所以者若造衆多無間業者所感身形最極䎡所感苦具衆多猛利由此頓受種大苦已上故今論者若經部意若正量經部意言唯造一𨒫一劫受報若造二𨒫同感初一中劫亦能同感第二中劫若具五𨒫同感第一劫報乃至亦同感第五劫然五𨒫罪順生業者約感初後劫五𨒫亦通順後受業故光記云若依成實論若造一𨒫一劫受果若造二𨒫二劫同受如是乃至若造五𨒫五劫同受餘後四劫從初為名同名生報業成實多依經部宗一業感多生亦多業感一身已上正量部言一𨒫一劫乃至五𨒫五劫受報感初劫𨒫不感後四劫感第五劫不感初四劫故光記云若依正量部若造二𨒫二劫受果如是乃至若造五𨒫五劫受果於中初劫是生報業餘後四劫是後報業各別感已上謗法感一劫者稱㓛德經謗法罪者五劫墮獄餘大乘受多劫報今擬一劫相從五𨒫實可多劫雖許多劫少中多也不可言感九八十億劫以可異第二義故也二然有下正釋有餘多劫重罪此亦有二先直釋中然有餘九八十億劫罪者以此人造茲𨒫謗時長養過去所餘諸業令有力故能招餘九八十億劫生死之報如雜集第七云或有業由一業力𭷣得一身謂由一業力長養一生異𤎼種子故或有業由一業力𭷣得多身謂由一業力長養多生異𤎼種子故或有業由多業力𭷣得一身謂由多業𭃯那數長養一生異𤎼種子故或有業由多業力𭷣得多身謂多𭃯那業更相資待展轉長養多生異𤎼種子故已上今文即是當第二句次如一念下准例釋成謂一念瞋能燒一切善根障百千法門准例此業亦復如是能增𢙣業能障淨報也華嚴三十二云若菩薩起一瞋恚者一切𢙣中無過此𢙣何以故起瞋恚心即受百千障㝵法門何等百千所謂受不見菩提障不聞正法障生不淨國障生𢙣道障廣乃至我不見有一𢙣法出過菩薩一瞋恚心彼遺教經亦有此雖諸煩𢙉皆𢘻遍障一切聖道然瞋一種親障菩薩大悲利物是故偏誡如决定毗尼經中菩薩寧起百千貪心不起一瞋以害大悲莫過此故善戒經中亦同此第二義中先釋次證後結應知證中言如大品者文在彼經第十卷泥梨品中佛藏經者如第四記觀佛經及法花等中亦謗罪展轉果報雖一謗罪感多報故十聲稱佛餘九八十億劫罪而得往生也本何意往生至有何義耶是二十一問往生法門非唯一種定散事理一切善業各往生何意臨終閣於餘行唯教念佛本命終之人至終時念佛答二十一問有摽釋結起盡可見一勝者先歎佛德後令稱名以德勝故唱念益巨先嘆德者天上天下無過於佛道風德香薰𩡘一切凡聖佛為最尊煩𢙉所知二障斷盡四智具足三身成就慈悲念住力無畏等自行化他万德周圎名佛𨹔故如佛地論二云法王成就四種勝故一自在勝二力勝三眷屬勝四種姓勝何者諸佛自在勝於煩𢙉障智障得解自在彼於此處心智無暗隨意所受無上樂故此云何知偈言諸佛無等故謂一切智故復如空世間法不能染無明煩𢙉習氣故無等者諸佛比餘衆生彼非等故等者此彼法身等故何故不但無等示現等正覺故何者諸佛力勝具足十力故能伏一切邪智壞魔𭜨故此云何知偈言十力無畏等故何者佛眷屬勝具攝菩薩聲聞諸衆故此云何知偈言無量諸衆首故彼菩薩是初衆故無量者阿僧故諸衆首者佛於世間最勝上故何者佛種姓勝謂家姓勝故此云何知偈言釋迦姓法生故何故唯歎此佛種姓以現見故復以法為家非但生家法家者如法中住故已上自覺等者𣵀槃經云佛者名覺既自覺悟復能覺他如有覺知有𮚆無能為菩薩摩訶薩能覺一切無量煩𢙉既覺了已令諸煩𢙉無所能為是故名佛已上既覺了已者覺行窮滿義也故今論文依此經言自覺者超人天自迷故言覺他者超二乘自調故覺行窮者超菩薩未滿故歸依處者歸謂所歸依是所依即諸有情安穩本處名歸依處如𣵀槃經六云是名四人四果出現於世多能利益憐愍世間為世間依安樂人天中最尊最勝猶如如來名人中勝為歸依處已上又雜集論第八釋擇異名中云何故此名歸依處無有妄意樂加行所依處故由於彼所發意樂及正加行無妄性所依處故所依止義是歸依義已上佛證此有其能故亦名歸依處也言洲渚者十輪經云一切智妙寶洲渚能無㓛用轉大法輪又云如寶洲渚種𭹀寶死滿其中此善男子亦復如是成就種覺支𭹀寶已上爾雅云水中可居曰洲能水使旁廽曰渚生死海中佛為洲渚生諸妙寶能資益故又雜集論八云何故此復名洲渚三界隔絶故於生死大海出高原故洲渚已上佛證此有其能故亦洲渚也言救歸者救謂救濟歸謂歸趣如十住論三云菩薩故作是言我當為無救作救無歸作歸無依作依已上又花嚴六云為衆生舍為救為歸為趣為炬為明為燈為導為無上導又雜集論云何故此復名𭤩濟能一切大苦灾撗故證得此生老病等諸苦灾撗永遠離故又云何故此名勝歸趣能為歸趣一切最勝聖性所依處故由此寂能為歸趣最勝聖性所依止處故已上佛證此有其能故亦名救歸也二少者唱念六字言辭少故時迫臨終命在一瞬豈輒得修其餘多法問有一二字𨹔羅尼法如何偏少答約觀經定散二善論其勝劣何以祕密神咒等法致疑難耶顯蜜門異機應宗別不可一溉彼神咒餘勝德義不可必具也三四兩勝其義可知五緣者法藏菩薩於万行中唯願稱名發此願時我等衆生供給所須隨喜讃嘆乃至知識能成因緣故於念佛別論宿緣以菩薩無願餘行故不約餘行論宿舊緣惣明宿緣雖餘行者非無其義六者以念佛力罪垢𢘻除故感嚴重來餘行來不及念佛故云不然問何故念佛來勝於餘行耶答案九品相一佛來有勝劣者由是機緣罪障輕重若爾念佛罪用𭤽一稱舌端三障罪消佛容月晴聖衆星烈預奇異儀感殊勝相餘行不然罪不𭤽餘殃難盡見劣來問若依觀經九品者上品餘行感勝來下品念佛見劣䡄儀何言念佛見勝來答就齊等機論此義也上下品異善𢙣機別何得相對論見勝劣謂上六品大小乘善純𤎼人故所感來勝於下品下三品人曾無佛法世俗善根唯知作𢙣無餘方便若不遇念佛威力者下劣來猶不可感見勝相故不可就善𢙣相論此事也又義云餘法不然者指雜行也其雜修者多生懈𢢔不感來又八菩薩示道路者信心未定行不純一不預來此等皆是修行餘法不專一故也餘行來或有或無故望專修正行定有指雜修行言餘法者也問唯約念佛論七義勝何取正行蕳雜行耶答正行隨分有此勝德故不可攝餘法言如彼云實非雜善得為比類也約助正五種俱𬾨七勝義乎七生者本願念佛攝護異他感應自然十聲一聲易往生故名生勝以餘行業非本願故雖生非勝理在絶言問果德平等遠離是非斷除愛憎無有分別我所等意如智論二云諸佛世尊若人以刀割一臂若人以𣞀香泥一臂如左右眼心無愛憎已上𣵀槃第三亦有此於益事猶以如是念佛餘行同是㓛德攝護何別答佛果平等雖離差別而因位中未離執時既修如是行願各逗如是如是機緣由此薰習至果滿時雖無分別利益任運所謂㫆𨹔因中別發生因一願第十八稱名願是也此願普及十方界故如其本願攝念佛者非分別心護念攝取幽谷無私有至斯響供鐘受無來不應如佛地論三云如是如來住漏界雖無一切我所等作意戲論種分別而先所修大願力故能起一切智所變化利衆生事如來雖無如是分別我於如是事業當作不作而本願力一切能作如先發願或入睡眠或入定雖無作意隨所要期覺悟出定如海惠經作如是如諸苾要期鐘聲而入定不聞鐘聲亦無分別由要期力應時出定如是廣已上故知稱名超過万善利甚於風益滋於兩正首願求出離行者誰不信行嗚呼我等無量劫中難聞今聞㫆𨹔本願大善名號猶貧財之人入大寶聚似渴水之者到清池抱膏肓之嘗善見之藥迷險難之途得明達之捐久居暗室忽臨朝陽之光常處裸形頓受天衣之服勤行忘疲急歸本家本一念十念至無上㓛德是二十二問先審定次正難若唯一念能得往生不藉餘法一念㓛少如何經無上㓛德本㓛德無量至知多㓛德答二十二問文即有二一𢝰顯示㓛多少非必由藉時節長短二又以下正辨一念名㓛大第一文中先釋次例後合次例文中初引經次釋經義日日三時長時𣱵劫捨恆沙身布諸佛其福蓋少一念發信聞般若福力勝彼大聖挍量非凡所測三今此下合釋應知第二又以下正辨中先釋次例後合次例文中初法花顯示暫時唱觀音名及供一種齊等長劫四事供養六十二億恆沙菩薩及持名號於中先後釋中計用時節已經百千万億劫者經言盡形不明劫數然准餘定經多劫如般若百千億劫十輪經述百大劫等論主義推故曰計用供養一種者四事隨一名為一種是顯少修但天台作實之釋入大乘明事理義次十輪有二挍量一顯暫時念地藏名過百大劫念觀音名於中先引次若百下准十輪重顯法華所挍量謂百大劫念觀音名雖不及稱念地藏前法花所述挍量即當超過受持百千万億恆河沙菩薩名號及供四事意則欲顯稱地藏超勝百千万億不可恆沙菩薩名號供益問觀音即是救世之母無畏之主百大劫中稱念㓛德何不能及一食之項念地藏名答如斯比隨冝安立各有利益𠈟信無疑若准論藏意趣門中方便耳二顯多劫稱念地藏不如一聲念㫆𨹔佛問何多劫中念地藏菩薩不及一聲念㫆𨹔佛答因果㓛德勝劣異故念者福力多少殊也如是將佛者下惣比挍顯念㫆𨹔㓛德無邊顯以此挍量知壽經一念無上㓛德義也問雖有此解尚以難信夫一鈎之器不能容以江河之流百石之車不可滿以斗筲之粟躰隨大小用亦細物皆如斯理數常也如何一念無上㓛德答夫君子者外無怖故內不二言法王亦爾正習並亡所誠諦然自三部典覃一代教處廣嘆念佛㓛德寧懷疑慮徒生疲勞乎龍門魚之難大行牛難以德報𭜨人之難以信修法道之難經言難信蓋其義也五不思議中佛法為第一何不一念𬾨多德故安樂集釋一念力能斷諸障云依諸部大乘顯念佛三昧㓛能不可思議也何者如花嚴經云譬如有人用師子以為琴絃音聲一𫝤一切餘絃𢘻以斷壞𠰥人菩提心中行念佛三昧者一切煩𢙉一切諸鄣𢘻皆斷亦如有人搆取牛羊驢馬一切諸乳𣇣一器中若持師子乳一渧投之直過無難一切諸乳𢘻皆破壞變為清水若人但能菩提心中行念佛三昧者一切𢙣魔諸部直過無難已上又以事示之亦非無例好堅處地芽已百圍頻伽在聲勝衆鳥王子生七歲惠流四海之內龍子生七日德䨱六天之上如是比類不可勝言况佛法力凡慮何及寸管不可窺天小難為酌海燕雀焉測鴻鵠之志驢𮪀寧踏龍𤉢之躘須捨情𠈟信莫疑本若以此挍至往生淨土是二十三問文有其二先縱前章比挍所顯多㓛德義次而法下引成佛例難一稱即得往生於中先審後若得下兩方成難若一稱人皆成佛者即應十方無一𭂫夫𢘻能稱佛皆能成佛一稱佛名極以易故若一稱力不直成佛漸積㓛終成道者例此臨終一念十念亦須薰修諸波羅蜜方得往生何必即時而生淨土例難齊等如何會通本此不成例至不可為例答二十三問先惣非次正釋後結成釋中佛無九品差別等者佛果純一無九品差万德圎𬾨須假長修謂法花經對聲聞人作如是此聲聞發菩提心故乃至散亂一稱名號皆是佛因故皆成雖成佛唯一稱力不直成故漸積㓛然後究竟不例觀經等往生義也一聲十聲等者正釋不成例謂一念等雖生淨土而往生後還是凡夫亦次位異有九品別其行業雖許多少還是𭂫夫所攝起行何妨凡夫一念即生還為凡夫若淨土無九品差別修因一種不異佛因必須修万行方成十方世雄既不然故不可為例也
