body:
  text: 次禪師救曰下破重救中亦二先舉救次正破牒救中今言悉是五逆者救意云今苐三階類悉是五逆者未必現作害親等業正有逆𠍴方名逆者但是其人根機𭫸𢙣愛憎𮉐情樂倒具身五種之不救人故雖非即行其五逆業然逆根機故與逆名㧾以除也害二親者列其五逆婆娑論云一背恩愛二壞福田背恩類者害父害母壞福田者謂餘三種已上故此五種名為逆邪正俱邪善𢙣者見壞名邪戒破名𢙣正善翻之苐三階內最鈍根者正見成就持戒品故雖有戒見俱不破者而人天機非乘被不免輪回再論之者不出火宅故屬邪𢙣如上廣明七憎七愛未離六情者十輪經鈔云於三寶中用七憎七愛法一順情者信情者不信二順情者讃嘆情者呰三順情者羕事情者不羕事四順情者敬情者不敬五順情者供養情者不供養六順情者有言皆聼受情者有言不聼受七順情者守護願得常存情者不守護願欲斷却又云於三寶中七憎七愛成十𢙣輪是治障於三寶境修三普行成十善輪即能治道謂普守護普敬普供養已上六識為六情有識名情故十輪鈔云順情情與今苻合憎愛如次嗔貪心貪嗔即通六識心王故云未離於六情也又六情者即是六根有情識故根名情有財釋也智論四十云眼五情名為內身色五塵名為外身金光明云心處六情如鳥投常處諸根隨逐諸塵唯識疏云情即根是名薩故此諸文名根為情斯乃憎愛依止六根緣色境便成過失故云未離於六情也五樂豈捨於三業者五欲快樂名為五樂謂𭂫愚人貪染五境深生樂著身口意業未離五欲迷惑洪基無過於斯弘決八引增一云魔有五力謂五塵佛聖弟子一力能拒謂不放逸慈行鈔云攀心於佛界猶是云𭑭馳思於五塵寧當道耶色如金丸執則燒手聲如毒塗鼓聞則傷命香如㢢龍氣嗅則成醉味如蜜丸飲則喉觸如臥師子觸則害已上當知色障佛道魔劫法戝賊行者遠離勿樂𨈣玩既具十二顛倒者常樂我淨四倒各通心見故三四十二名十二倒謂三見生起四倒名見四倒言三見者五見之中邊見取及身見也彼邊見中一分常見生常顛倒見取見中但取苦下計樂淨者為樂淨倒有漏法中無真樂淨然𭑭計故即是非勝計勝見取見為也有身見中但取我見以為我倒故四倒必是三見此見相應想數與見俱取顛倒差別形相名想四倒相應心王與見同分別顛倒行相名心四倒故想心倒不出見倒光記云理唯見倒想心隨見亦立倒名與見相應行相同故相從倒躰非推度非四倒攝已上相從倒者顯示想心實非顛倒謂顛倒者由三因故一向倒二椎度性三𭑭增益然彼想心雖隨其見行相是同彼自躰非推度性故既以闕三因中一因故非實倒問受心亦見相應行相既同何不立倒答俱舍論云彼於世間不成故謂心想倒世間成受不然故經不光記云受世間不極成故謂心想倒世間成如言此事惱我心想而不言惱我受故經不具如俱舍論苐十九及光記釋又婆娑一百四云謂經於無常起常想顛倒心顛倒見顛倒於苦起樂於無我起我於不淨起淨想顛倒心顛倒見顛倒由此故知一切顛倒有十二種於中八種唯見斷謂常我中各取三種樂淨中各唯取見顛倒四種通修斷謂樂淨中各取想心二顛倒或七倒四倒如常五者想倒於彼四種淨樂我常起𭑭想分別六見倒於彼𭑭想分別中忍可樂欲建立執著七心倒於執著貪煩惱此依玄贊及攝釋意樞要亦同俱舍小異佛性論只明三種倒謂想見心是皮貌心三煩惱也五種之不救者種言通漫法躰未顯古今學者無由了別今案若是攝論明五種救濟名為五種謂諸佛有五種力能救難救然苐三階最極𢙣故諸佛有五種濟力猶不及故云五種之不救梁論十五云論曰一救濟交橫為業由惟現聾狂疾惱交橫能滅除故釋曰此明大悲力若定業報衆生如來於中則無自在此如前釋若不定業報或現在過失或有對治業如此衆生若至佛如來作意及不作意皆能令離此災橫論曰二救濟𢙣道為業從𢙣趣引安立於善處故釋曰此明正行力如來作意及不作意一切衆生若至佛無不息𢙣行善論曰三救濟行非方便為業諸外道加行非方便降伏安立於佛正教故釋曰此明威德力諸外道多行非方便若常見外道多行苦行以計有未來生故斷見外道多行樂行以計無未來生故或思惟自在天為道或思惟我為道或思惟自性為道或思惟我自性中間為道如此悉是非方便行如來以通惠導降伏其高慢以記心導降伏其不信以正教導降伏其邪見既降伏已隨其根性安立於三乘正教中論曰四救濟行身見為業為過度三界能顯導聖道方便故釋曰此明方便力一切三界衆生無離身見身見者若為多物成躰是無常故名身為五隂和合成故名多物未有已有故名無常外道於多計一於無常執常謂是一是常為我為破此見亦非常故名身見若離身見則得過三界集度三界苦正教名顯生彼三惠為導苦法忍以去乃至阿羅漢果名聖道從出家受戒乃至世苐一法為聖道方便顯導令修方便得聖道又如來令衆生離身見出三界此未是真實聖道但是聖道方便先顯導令修此方便聖道為得真實聖道緣由論曰五救濟乘為業諸菩薩欲偏行別乘及未定根性聲聞能安立彼為修行大乘故釋曰此明真實教力乘有人法人有大乘人有小乘人法有方便乘法有正乘法轉方便乘修治正乘故名救濟乘已上魏論即有五種之言合今述五種之言文義全應悉之二難曰下正難重救先㧾顯示救不救謂此救雖似救減過亦全不救太過之難次然此下摽數隨辨一難文先牒救次正難後結次但苐五七缺牒救文至下當辨此一釋者則指救太減失也一兩階無異難先牒救次正難先牒救者謂苐三階以造逆故未造五逆名逆機者次正難者即苐二階亦能造逆其未造類同可名逆起逆是同兩階何異問此難不尓苐二階亦雖能造逆不壞正見少時懺悔消犯罪設不懺悔而入地獄還速得出何類苐三階戒見俱壞諸佛不度諸教不化故苐三階未造逆罪可名逆者苐二階人未造逆𢙣戒見俱成三乘根機寧㧾名逆答有苐六難故此責不可來謂彼若救言如今難兩階機根既不同者苐三階人以逆根機雖未造逆名為五逆苐二階人以非逆機雖已造逆應非逆者是苐六難既有此難不可返難苐一階人根正者因注令知三階機分如上已辨二得戒不成難先牒救次正難有二初直難五逆難何成比丘亦應無戒不名破戒然何得言苐三階類成大比丘及能破戒若謂者設難若汝救謂但有根機未現造故成具戒者彼絰唯除其五逆未造如何即名造逆同除之耶十三難者案律名句云一邊罪難先受五八十戒後犯四重人即名佛海邊外之人如大海中不留死尸此人一生永大戒不可受故佛海邊外名邊罪難二行尼難未受戒時犯淨戒𡰱即是難此約比丘𡰱初犯故三𮚆住難白衣及沙㫆時住於寺中聞羯磨已以盜心掠法戝故成難也四破內外道難曾為外道後受佛戒受戒之後亦還捨戒入外道家此人後更不能受戒五黃門難無根人也六𭣦父難七𭣦母難八𭣦阿羅漢難九破法輪僧難破法輪僧及破羯磨僧十出佛身血難十一非人難天修鬼獄四類以神變力化作人形十二畜生難龍變化人形十三二形難一身中具男女二根此諸人不成大戒故云難三邪不未決難先牒救次正難中有二先審次難若邪定者猶未造逆若不定者何言彼經除逆言攝屬彼屬此俱有難矣四𭂫夫名聖難先牒救次正難意亦復可云具淨戒人遂可得聖故雖未證無漏聖道亦應名聖若彼持戒言我聖人便成正定者應捨異生性而何不能捨又成𭑭語波羅夷罪何持戒人亦可兩字訓亦可言具淨戒人終得聖者俱舍論云將趣見諦道應住戒勤修𣵀槃經云戒是渡生死海船笩戒是菩提山𭪺橙戒是治煩惱病良藥戒是剪業障根利力如四分中持戒有四一𮚆分齊如諂女媚勝他邪命名利二罪分齊畏三途三福分齊欲天樂四道分齊謂為解除為前三種持恐不𭣺戒故知淨戒必可得聖下文名聖授戒斯義也聖人便成定聚者一切衆生即有三類一正定聚謂聖人二邪定聚謂能造五無間業者三不定聚謂餘𭂫夫問何故諸聖人名正性定聚答俱舍論云言正性者謂𣵀槃定者是聖有無漏道遠一切𢙣故名為聖獲得畢竟離繫得故定𥁞煩惱故名為定聖於正性得決定故名正性定問何故造五無間業者名邪性定聚答同論云言邪性者謂三𢙣趣定謂造無間人也造五無間必墮𢙣趣故名為定造無間人於邪性中得決定故名邪性定也問何故正邪外餘𭂫夫名不定性聚答同論云不定性者除正邪外餘有情遇聖入聖遇邪入邪名不定性聚又淨影觀經疏云若依毗曇外𭂫常沒名為邪定五停止觀㧾別念處𤏙順二心名為不定此有退故名不定忍心以去堅固不退名為正定若依成實外凡常沒名為邪定聞思二惠行有退轉為不定五停止觀名為聞惠㧾別念處為思惠𤏙頂以去名為修惠現見法空永不退轉故名正定大乘法中善趣已前名為邪定善趣位中數進數退名不定習種已去位分不退為正定已上應捨異生之性者若有部意不相應法非得之中無始已來不令衆生得聖道法名聖非得指非得名異生性故俱舍云許聖道非得名異生性已上入見道時捨彼非得成無漏得故云應捨異生之性若依大乘十地之位斷十重障其中初地見道斷名異生性障是即煩惱知二障分別起者依彼種子立異生性二乘見道現在前時唯斷煩惱障分別種名得聖性菩薩見道現在前時俱斷二障分別起種名得聖性故唯識論九云一異生性障謂二障中分別起者依彼種立異生性故了義燈云異者有二一別異名異謂聖唯生人天二趣此通五趣不同於聖趣異二變異名異此轉變為邪見故聖者皆同有正見故此約見異生謂生趣生類即趣見類別異生趣性者躰由此性故令趣見異又瑜伽五十二三界見斷種子唯未永害量名異生性即通二障種子假立已上唯識義云依煩惱知二種分別種子生異見生異趣受異類故二障分別種子之上立異生性之名已上成波羅夷罪者太賢古迹云波羅夷者此云他勝處善自𢙣他𢙣法勝戒是持犯依名處已上光記云由犯四重立他勝名梵名波羅夷此云他勝善法名自𢙣法名他若善勝𢙣法名為自勝若𢙣法勝善名他勝故犯重人名為他勝已上與大賢同但不論處是為異矣鈔枇云撿薩婆多論波羅夷者名不如意處如二人共鬪一勝一負比丘受戒欲出生死與四魔共鬪若犯此戒則墮負處翻言雖異於義無言罪者俱舍論四云為諸善士訶猒法名為罪又玄贊云罪者可可責可怖可猒之義若因若果可猒者皆名為罪五兩經相難意易了文不牒救是略而已又結文云非是根機故不重牒也六逆不名逆難先牒救次正難意可見上來六難直就苐三階造逆根機故言未造者亦名造逆而能難自下一難論王設難謂苐一難自言苐二階亦造逆故其未造類可名逆者乘彼難㔟設破也七三品成一難先牒計次正難中二初直難意下品三人同成一品有逆無逆皆名逆故若通難者更應當言九品往生同成一機彼計修行念佛誦經往生淨土皆苐二階故今且就造𢙣根機故言下品次又應華開者成難之上重以徵責謂若三品成一品者又應華開無遲速差別罪寧有多少不同問苐一難首置於一言次五難始置於又言今苐七難何只言若不摽別尺答苐七設破非難本計故云若也𣵀槃經者上來七種別難已竟自下引經㧾難約其根機以言除如來言雖有七種未見機根即齊已作若言因語此亦非尓現在造業定可感果故在因位立召果名是名因語是即因中果名也今絇根機與此遙異未造逆人非殖當來造逆之因然名為逆故非因中果根機屬造假是因語未造逆人絇於因語除何益問何故㧾難文注字模答有傳云漢土之法刻雕之時字若落破模作注補滿缺處諸聖教中注不可注是義也今亦此例歟或七正難外惣引經難故注而令知非別難也泛明七種語者彼三十五云善男子如來法為衆生故有七種語一者因語二者果語三者因果語四者喻語五者不應語六者世流布語七者如意語云何名因語現在因中未來果如我善男子汝見衆生樂𭣦乃至樂行邪見當觀是人即地獄人善男子若有衆生不樂𭣦生乃至邪見當觀是人即是天人是名因語云何果語現在果中過去因如經中善男子如汝見貧窮衆生顏貌醜陋不得自在當知是人定有破戒妬心嗔心無慙愧心若見衆生多戝巨富諸根完具威德自在當知是人定有戒施精進慙愧無有妬嗔是名果語云何因果語如經中善男子衆生現在六入觸因是過去業果如來亦名之為業是業因緣得未來果名因果語云何喻語如師子王者即喻我身大象王大龍王波利質多樹七寶聚大海須㫆山大地大雨船師導師調御丈夫力士牛王波羅門沙門城多羅樹如是喻經名為喻語云何不應語我經中天地可合河不入海如為波斯匿王四方山來如為母優婆夷若波羅樹能受八戒則得受於人天之樂如十住菩薩有退轉心不如來有二種語寧須陀洹人墮三𢙣道不十信有退轉心其名不應語云何世流布語如佛男女大小去來坐臥車乘房舍瓶衣衆生常樂我淨軍林城邑僧房合散是名世流布語云何如意語如我呵責禁之人令彼自責護持禁戒如我讃嘆須𨹔恆人令諸𭂫夫生於善心讃嘆菩薩為令衆生發菩提心三𢙣道有苦惱為令修習諸善法故一切燒唯為一切有為法故無我亦尓諸衆生悉有佛性為令一切不放逸故是名如意語已上上來苐一破言除一切苐三階救已竟自下苐二破有釋者但除苐三階造逆中亦二先舉救次正難牒救中不造五逆苐三階人者其救意云除五逆言非除未造逆苐三階人若行普法彼可往生故不可除也如造逆縱行普法而不往故法藏弘願唯除苐三階造逆者菩薩既知普法可攝不除未造故無減失若其苐三階者明禪師開其當根機普真普法化苐三階謂苐三階未造逆者行普可生是以禪師悲智𬾨開當根法攝苐三階未造逆者皆令能生西方極樂純邪純𢙣者尚被未造也此乃者顯示禪師化儀超絶諸佛問次向文云苐三階未造逆者修行普法可生淨故法藏比丘願中不除明許法藏能知普法又集録中引諸部經辨普別法知許釋迦能普法若尓何云法藏不論釋迦不答邪僻之不能會通且代會者法藏願釋迦傳俱別法故方不論化苐三階是只明別法不化苐三階非法藏知其普法釋迦亦普如集録云苐三階人諸佛不化雖逢佛教而人天機此明別法不化彼人莫謂不許普法利益今亦如斯望別法願言不論故非相問若尓何云獨開答雖彼本願不普法信行禪師依餘經考出普法為當根法如神眆云獨釋此經欲使學必依根法皆應病此豈非言依十輪經釋於普法令病藥應故曰諸佛者引集録意合已解故云故曰集録之意如前廣明我欣聞者喜嘆遇其妙良藥法更𭇎別真別正修行𮕷哉汝固執前非者顯示諸衆之非集録已前人不知普行不當根皆墮地獄集録已後須行當根普正之法而猶因執前舊執非還讀別經造地獄業邪見成就苐三階機若行別法自墮愛憎成𢙣趣業故集録云讀絰誦經雖無邪𨩈謗佛謗法亦能得生一切貪嗔煩惱復不能得與一切無名相法相應以乃至讀經誦經亦名不淨法如前廣明故知善皇者證顯示普別二法為苐三階益既別略明法界衆生根機𢙣法門云𣵀槃經善星比丘受持十二部經而親近𢙣友生邪見墮阿鼻獄月藏分經一万羅剎王於鳩留如來法中曾得出家受持八万法聚而於阿蘭若比丘起嗔怒心於彼命終生於地獄取略抄是為善星等苐三階行別法相集録二云法華不輊菩薩品內廣明不輕菩薩禮敬一切道俗上下分齊淨行優婆塞經內亦不輕菩薩禮敬一切道俗上下分齊又云法華經不輕菩薩品文當明出家比丘菩薩唯學一切普禮拜一切禮拜一切最大𢙣四衆唯學菩薩想作當來佛相已上是為不輊等苐三階行普法益相善星比丘受持法藏者彼經三十三云善星比丘是佛菩薩時子出家之後受持讀誦分別十二部經壞欲界結獲得四禪云何如來記善星是一闡提斯下之人地獄劫住不可治人已上清彼岸者近指六根清淨位遠示三覺圎滿時有漏穢染亦為沉淪無漏異此故云清如演祕云無漏清對彼有漏名之為墮世間名此岸𣵀槃名彼岸或煩惱名此岸六度名彼岸故演祕案智論云度貪嗔諸煩惱海至究竟故名到彼岸即以六障而為此岸六度為彼岸又此岸是世間彼岸是𣵀槃即以生死𣵀槃二種為此彼岸已上子不能監者玉篇云監公初切視也或本云鑒義亦無生無由生者若修別法雖云往生更無由生今為者明彼設尺謂為此不辨普別者尺行別法𭁆修普法德可除其惑也責曰雖彼者次正難中亦二一豫述徵難由重申此者前救之外有此救故雖有重尺疑論㫆增故云深疑再陳徵難者前難之外此難故欲尺深疑須作妙故云高二難曰下正難中三先㧾顯示救不救次未知下審定普別後若是普法下別分普別難謂十念若普法者即有四難十念若別法者即有九難就普有四難者一十念不普難謂十念若普者十念阿㫆𨹔佛此念別佛非能遍念一切諸佛如何是普二經屬二階難謂十念若普者應苐三階法何判此壽經觀經為苐二階教三同法成別難謂十念若普者此十念與觀經下品十念有何差別而彼別法此是普法同是一種十念何遂成普別四別法救逆難謂十念若普者亦可救苐三階造逆者何唯救未造除其造逆耶汝謂普法救苐三階唯救未造何為別法救苐二階亦救其逆為是苐三階人者重徵責正難外故即注之耳若此十念下就別有九難者一除取俱𠍴難謂十念若別者別法除人招減過𭁆如前已辨何但除人有其過減失亦乃取人多少𠍴斯乃翻除明取謂別法可取苐二階逆而言唯除逆不取苐二階造逆故名取少𠍴翻除太過以彼除不可除苐二階逆故又別法不可取苐三階未造而言唯除逆取苐三階未造逆故名取多𠍴翻除太減以彼不除可除苐三階未造逆是取不可取苐三階未造逆故若進論除若退論取俱不遁難故云進退或取為進除名退如應無二去留不盡難文有其二一惣明願普別得𭁆不同二若於下正屬別難初文亦二先明菩薩若願普取捨義周謂改願文言修行普法若不生者陳於普教文義顯然即除有逆苐三階取無逆苐三階晈然無惑逆無逆名二類三階及蕳別苐二階造逆晈然無惑但菩薩陳此願門者明菩薩願門除取有在謂陳願門事非聊尓其幽鍵欲令未來學者於此定去往生留不可生兩機分齊是故若斯願門普取捨義周言幽鍵者深要為義幽是深也鍵猶鑰也開閇門戶莫先於鍵故欲顯其要即以鍵也次如也斯門別下明菩薩若願別去留不盡謂菩薩若願別言唯除五逆者不苐二階逆者去可往生盡亦不苐三階未造留不可生盡故願文有不盡理𭁆二若於下正難中進退兩開者普名為進別名為退此進退間願文是別不見陳普縱令餘經雖有普盡去留義何救此願文不盡𭁆餘如文了三聖不願普難法藏菩薩若地前位悲智不遍唯願別法可攝二階然如經讃十地聖人悲智具足何唯願別救苐二階不願普法攝苐三階既捨重病豈極愛一子大悲願耶四三同敗種難文意可了言敗種者杇敗種子不生苗芽故苐三階竟無往生理若天台者依維摩證果二乘以喻敗種故維摩經云聲聞之人猶如敗種設使溉灌不生芽荎又𣵀槃經於一闡提立敗種名故彼經云一闡提輩斷菩提故如杛敗子不能生芽五不𡸁普難謂為苐三階難可得生而彼菩薩不能𡸁普法救彼不取其苐三階人耶六悲心不及難謂為復雖解𡸁普法救苐三階方惜其法不救衆生悲心不及此苐三階不攝令生於淨土也七難化付與難謂為菩薩雖具悲智直為此苐三階之類難可成化菩薩今自不能度彼遙鑒未來付與信行苐五智不足苐六悲不及苐七雖具悲智化度難成是為難旨八信行有緣難唯有弘海者𭤩即廣也海是教也指彼本願名為弘海本願教𭤩不捨機故然苐三階菩薩無緣不蒙利益唯空有願故云唯有餘如文𧣈九佛不普難此之一難若開應二一佛不普難二又無量壽經下留別時難今合為一不彼普與留別意不相故初佛不普難者法藏菩薩居學地故行未圎容許願普攝生不盡釋迦如來既成正覺何因不普度斯人四𭤩之願不周者度衆生願中不攝苐三階故四恩之意不盡者𠀍親攝論九云得一切衆生心平釋曰即明苐六得勝恩養果恩養有四種一廣大二最極三無邊四無倒由此四義故於衆生得平恩養心已上是名四恩又四攝法名為四恩超日月三昧經云但為一切不念已身導為四心慈悲喜捨加以四恩惠仁愛利人利一切救濟危厄已上遺重病子者𣵀槃經二十云如一人而有七子是七子中一子遇病父母之心非不平然於病子心則偏多大王如來亦尓於諸衆生非不平然於罪者心則偏重於放逸者佛則慈念不放逸者心則放捨何名為不放逸者謂六住菩薩已上經廣住前以病子今𢩁喻苐三階故云重耳空言應度者者遺教經云若我住世一劫餘亦當減會而不離終不可得自利人皆具足若我久住更無益應可度者若天上人間皆悉已度其未度者皆亦已作得度因緣自今已後我諸弟子展轉行之則是如來法身常在而不滅也已上難解採拾普教者彼普正法甚深徵妙非淺智境是名難解依華嚴十輪諸經捃拾建立普別二法故名採拾餘文易了不須重尺次留別時難者文亦可見時當來運者來謂未來運即時運普教時當未時運何因不留彼法化生別教更非化𢙣時法何留別經害物耶大悲逗機豈冝如斯何但釋迦者此下㧾結難謂九難中前八就法藏難後一就釋迦難今㧾就釋迦諸佛及法藏難故知前九別今是惣難矣於中一切智一切種智者至下當辨恩行四悲同一子者四無量心名為四玄贊引增一阿含云如來恆行慈悲喜捨四之心已上大悲視生同於一子故𣵀槃經云視於一切衆生猶如一子如是諸佛共匿普法不救斯苐三階人耶問云何四無量心答俱舍論云無量衆生為緣故引無量福故感無量果故已上慈者緣無量衆生與樂悲者緣無量衆生苦喜者令欣歷無量衆生得樂離苦時快喜故捨者𭜨親平捨𭜨捨親故此四種法於諸衆生無差別故名為四教被三千化流百億者釋迦淨土教法被此娑婆三千世界一三千中即有百億四天下故名化百億四十八願遍滿十方者㫆𨹔本願不限此界以願皆言十方衆生故斯乃釋迦一化且𢩁自剎㫆𨹔大誓廣他國故教被三千願通十方也始於輪王發心者顯示發願已後至觀音成佛經尓許劫撗竪利生不及苐三階遂除而不取悲華經苐三云爾時法藏如來讃轉輪王言善哉大王今者願甚深取淨土是中衆生其心亦淨大王汝見西方過百千万億佛土有世界名尊善無垢彼世界有佛名尊音王如來今現在為諸菩薩於正法彼界無有聲聞辟支佛名無有小乘法者純一大乘清淨無雜彼佛世界有㓛德清淨莊嚴悉如大王願今改汝字為無量清淨尓時世尊便告無量清淨彼尊王佛過一中劫當般𣵀槃已正法住𠀍滿十中劫正法滅已過六十中劫彼土轉名㫆樓光明當有如來出現於𠀍不思議㓛德王如來是佛猶如音王如來𠀍界莊嚴如尊善無垢無有異其佛壽命六十中劫佛度已正法住𠀍六十中劫正法已過千中劫是時世界故名尊善無垢復有佛出寶光明如來世界有壽命多少正法住世亦如不可思議㓛德王佛無有異正法已是時世界轉名善堅復有佛出寶尊王如來世界莊嚴如前無異佛壽三十五中劫佛度後正法住世滿七中劫正法已復有無量無邊諸佛次苐出世有世界壽命正法悉亦如是我今皆見如是諸佛始初成道及其度是時世界常住不異無有成敗大王如是諸佛度已㣪過一恆河沙阿僧劫入苐二恆河沙阿僧劫是時世界轉名安樂汝於是時當得作佛號無量壽如來略抄又十方諸佛授記云刪提嵐界善持劫中人壽八万歲有佛出世號曰寶藏有轉輪聖王名無量淨王四天下三月供養寶藏如來及比丘僧以是善根故過一恆河沙阿僧劫已始入苐二恆河沙阿僧劫當得作佛號無量壽世界名安樂常身光照縱廣周匝十方各如恆河沙諸佛𠀍界又苐一太子願云願令轉輪聖王過苐一恆河沙阿僧劫已始入苐二恆河沙阿僧劫是時世界名曰安樂大王成佛號無量壽世界莊嚴衆生清淨作正法王是佛世尊於無量劫作佛事已作已辨入無餘𣵀槃乃至正法住時我於其修菩薩道即是時能作佛事是佛正法於初夜即其後夜成阿耨多羅三菩提玄一師小經疏云昔阿㫆𨹔佛於寶藏心過一恆河沙阿僧劫始入苐二恆河沙阿僧劫作佛此苐二恆河僧劫分為二分初分佛住後分正法住此苐二恆河沙阿僧劫㣪分之餘後夜觀音成道如悲華然即彼佛壽命半恆河沙阿僧劫未知為始為終為遣此疑故言於今十劫已上義𭓬壽經疏亦同之準此寶藏佛處發願之後過一恆河沙阿僧劫已始入苐二恆河沙阿僧劫𨹔成佛於無量劫作佛事已作已辨入無餘𣵀槃乃至正法住持觀音於中修菩薩道是佛正法於初夜即後夜觀音得成阿耨菩提故知輪王發心在初恆河沙阿僧劫之前觀音補處在苐二恆河沙劫之後如是長時發大誓願為諸佛證為衆生依竪三界撗亘四生何於此中不及三階遂除不取耶諸佛菩薩以聖智觀察者此下顯示釋迦諸佛及法藏菩薩劣於信行還居下位罷以正法教手之令出淤𭰖者俱舍論讃佛利他德云衆生出生死𭰖者由彼生死是諸衆生沉處故難可出故以𭰖衆生於中淪無救世尊𮕷愍隨授應正法教手濟令出光記云謂衆生出生死𭰖此顯恩德受衆多生死故名衆生夫生必死言生可以攝死故言衆生死不必生如入𣵀槃是故不言衆死或舉後顯初生死無邊深廣難出故以喻𭰖已上據禪師計佛𭁆此德是故云罷是息也即於無上調御翻成有上世尊者信行慈悲勝於釋迦故佛有上無者便成過正覺者禪師智惠過無量壽故佛有過上之與過俱是勝義故諸佛還為居淺位猶有過上言調御者智度論二尺十號中云是名可化丈夫調御師佛以大悲大智故有時耎美語有時苦切語有時雜語以此調御令不𭁆道如偈佛法為車弟子馬實法寶王佛調御若馬出道𭁆正徹如是當治令調伏若小不調輊法治好善成立為上首若不可治便捨以是調御為無上玄贊云新翻云無上丈夫調御士舊云無上士調御大夫智無故無過上故無上於現法中佛身具相好是大夫又多分調御無量大夫最苐一故極尊勝故天台文句云無與名無上士調他心名調御大夫無者瑜伽論云是無者無與故無者去來今無與者故上三世下與正覺者無垢稱疏云正覺諸法覺諸法名正覺於戲腐木不可以為柱卑人不可以為主柮哉彼徒敬崇禪師為貴於佛又如癡狗不從大家求食反從作務者禪師之黨愚過於斯非現無益當墮深坑苐二又難若言下明經乃至十念言中文有其三一舉計正難二禪師救曰下述彼救三難曰下重泛難初正難中先牒彼計由逆有二三階殊也已分除取者明彼本計而示表詮不由念有少多以明除取者述彼詮為今難故破表詮門為苐一假詮門為當假意也次何因下難於中何因除逆者正明經何故不於者兼明表經大師何為者並以結破須不須如次表異名也謂佛大師何故汝計之門𭤽安乃至十念具足十念之文十念之言含二十念表之門竟無二三階字乎二明彼救中觀經九品者先明觀經壽經㧾別異謂觀經九品善𢙣別故為其最𢙣下品位不一念是善人生法故但十念十念是𢙣人生法故是故唯言具足十念不言乃至十念也壽經兩假本願成就名兩假善𢙣合言含一念十念多少之法義㧾若善若𢙣往生之人斯乃顯示觀經安具足之言壽經量乃至之語是㧾別異非除取由次是以下廣明壽經兩假乃至之言㧾冝善𢙣謂前本願言乃至十念從二向十之辭也故此文中必具一念善人之法後願成就言乃至一念從十向一之辭也故此文中必具十念𢙣人之法故僅以為下成就文乃至言中必有十念乃至言中含十念法幽隱難顯是故云僅猶𦆵也或本云僕是豫也禪師卑下自字僕也十念之法施於𢙣人者明兩假十念俱為𢙣人謂𢙣人位中苐三階邪𢙣人苐三階正𢙣人相雜是故蕳別邪正之人為除其邪言除逆謗斯乃觀經取是苐二階正𢙣人壽經除是苐三階邪𢙣人何閞由一念少故除逆謗哉三重泛難中即有其三一初至𢙣二人耶㧾牒述計二𢙣人位中至取亦除正徵難三禪師下結破初牒述中有逆無逆為善𢙣二人者先牒計謂彼計意有逆為𢙣人無逆為善人苐二階為正人苐三階為邪人豈不邪正者次述計若如汝計豈不苐三階邪人位即有逆無逆善𢙣二人苐二階正人位亦有逆無逆善𢙣二人斯乃為招自下諸難先預牒述諸難言雖廣不出此大𮈣二𢙣人位中下正難中即有其九一邪善𢙣雜難謂汝若云𢙣人位中邪𢙣人苐三階造逆正𢙣人苐二階造逆相雜是故十念𢙣人之法蕳邪人言除逆謗亦復可云善人位中邪善人苐三階未造逆正善人苐二階未造逆相雜何不一念善人之法蕳邪善人言除非逆謗邪善人而乃以非邪𢙣人邪善人之類同於邪𢙣人齊於十念𢙣人法下雷同除耶雖同邪人善𢙣遙異不可相雜十念法下除邪善人是一念法下可被除故二除邪𢙣人難謂汝若云壽經一念與十念極略之言故一念善人法中取正善人略不除邪善人何由俱極略法十念𢙣人法中取正𢙣人而亦除邪𢙣人耶三除邪善𢙣難謂汝若云十念𢙣人法中取正𢙣除彼邪善及邪𢙣亦復可云一念善人法中取正善除彼邪善及邪𢙣若尓一念善人之法不除邪善又不可除邪𢙣非對故四論除邪𢙣難謂一念善人法中唯論取正善可除邪善人不言除若例之者十念𢙣人法中唯論正𢙣可除邪𢙣人不可除然何𢙣人法中論取亦即論除五善𢙣處除難謂邪𢙣應於十念𢙣人法處除經即不於一念善人法處除邪善應於善處除何為即於十念𢙣人法處除六邪𢙣不名善難謂一念善人法中邪善人乃名邪𢙣人十念𢙣人法中除之者何不十念𢙣人法中邪𢙣人而亦名邪善人一念善人法中除之問今論文只辨得名相不論除取何云除取答前後諸難就除取能為難破今亦須然七正不除𢙣難謂𢙣人法中雖有邪正經取正𢙣人除邪𢙣人者何不許苐二階正人法中雖有善𢙣經取善人除其𢙣者斯乃彼師善𢙣相對邪正論故善𢙣中𢙣即分邪正論除取者邪正中正亦有善𢙣句只取善不除𢙣耶八十念除取不齊難謂壽經十念取正𢙣除邪𢙣者十念法同何觀經唯取正𢙣不除邪𢙣耶九一念除取不異難謂兩經俱十念除取已異觀經唯取不論除壽經取亦論除者何不兩經俱陳非十念一念法名非十念除取亦異觀經一念唯取不論除壽經一念取亦除斯乃舉兩經十念除取已異難兩經一念俱取不除禪師下㧾結非也苐三禪師又難下還舉難顯正義中即有二先舉禪師難次答曰下論主正救初中禪師又難者今已難彼又還難故云又難意可見次正答中此非難也者㧾非佛意欲明者㧾明佛意謂彼佛意欲明臨命終人若能稱佛一聲乃至十聲悉得往生故唯除五逆謗法此經之意者別明無逆多少同生即述上㧾中一聲乃至樂世界文謂此經意欲顯一聲命終若此之人乃至十聲命終並能得生以佛意者別明有逆多則雖生少不生故言唯除即述上㧾中唯除五逆謗正法者文謂以佛意欲顯無逆之輩若一念若十念俱能往生有逆之儔一念至九即不可生要須滿十方得往生欲蕳無逆多少俱生故言除逆謗何開除邪逆者哉或本曰以不佛意不言增也若一切下立理而責有逆無逆俱臨終日若必滿十可如汝責彼一念法不除逆謗若容計有衆生不滿十念命終逆人亦不滿十念其命已終其不滿念逆不可生寧遣此逆不言除逆人若不滿十念者不可生故若不言除諸佛本願有不定𭁆意云設我得佛十方衆生一念命終乃至十念命終多少俱生若不生者不取正覺唯除五逆誹謗正法彼多念雖生少念不生故若如此會彼難不來興師破似禪師難意會彼如之問大乘妙理㓛能難思况本願力利益何𢩁十念除逆一念須然九念若不十念恐難消今家義似佛法德如何通尺答攝逆觀經安具足言除逆壽經置乃至語誠證為足不可致疑何處經論一念能逆謗但大乘法㓛力難測者十念能五逆謗法是為奇持何剩言一念九念法亦能彼只信佛語莫懷情執本大集月藏至念佛三昧是苐二問文即有三一引經文二準經難三同禪師難之意起盡可見於中苐一五百年學惠堅固者問經云解論言學惠似成相又燈明記云初三五百年如次戒定惠三法堅固住如何鉾楯答擇𣵀槃能離一切煩惱𮉐名為解故栖復鈔云解即𣵀槃堅固即真實已上擇力能得此𣵀槃故從能證惠言惠堅固經證故言解安樂集亦云惠堅固即此義也燈明記文未詳其意彼先文云初得聖果名為解已上淨惠能證解聖果在初五百解若堅智惠堅固亦在初箇然以惠置苐三五百似前後今試會之如燈明記逆次配屬戒定惠歟謂惠在苐一戒在苐三也但實難知更𪞚賢哲經文只舉惠定二學準常途者持戒多在正法之中苐三五百必是像法難言戒學堅固者也苐二五百年禪定堅固者應多是有漏修惠定無漏靜慮在初五百與彼聖果俱堅固故苐三五百年學惠多聞者問經云讀誦多聞如何相苐一云學惠堅固何重論惠答改於讀誦而言學惠應生得惠受持讀誦生得惠能故舉能生惠顯生讀誦又應聞惠讀誦能可發聞惠故經舉能發論顯發故不相苐一修惠故非重疊或本缺惠若據此本略於讀誦只明多聞問多聞智惠有何差別答聞者依經典聞知識辭辨彼文解種義內外覽事理齊達惠者觀察一境不亘於諸偏住修行不假解義若唯偏聞不修其觀如數他寶無半錢利徒携文義他寶無有入實自利鎮諍是非還沇生死近來義解學近多是若唯偏觀不解其義如夢成覺後即迷謂即心是己則均佛不辨迷悟不論沉生見起慢終墮𢙣道當世禪門達悟多是若聞惠𬾨道悟不遠聞故不迷惠故能觀目足具𬾨至安空百論有跛之牟子明行之義淨土學者亦以可覺聞者學十六觀門解九品文義明本願極達真宗精要惠者任解分齊一心依行四修靡墜三業不雜專修不倦西路惟通偏𭁆準前但念佛者𠈟信佛願口稱無解無亦佳他力故智度論作四句云有惠無多聞是不知實相如大暗中有目無見多聞無智惠亦不知實相如大明中有燈而無照多聞利智惠是應受無聞無智惠是名人身牛天台玄云如貧窮人日夜數多寶自無半錢分偏聞之𭁆也下文云未得謂得未證謂證偏觀之𭁆何者視聼馳散如風中燈照物不明但貴耳入口出都不治心自是淩人增見長非抱刃自傷解𭷣𢙣道由其不習觀若觀心人謂即心而是已即均佛都不尋經論墮增上慢此則抱炬自燒行𭷣𢙣道由其不習聞也若欲免貧窮當勤三觀欲免上慢當聞六即修心內觀則有法財正信外聞無復上慢已上華嚴苐六文殊問曰云何衆生聞正法而不能斷隨淫怒癡隨慢忿法首菩薩答有十偈廣誡偏聞數他寶在於其中當知不修習其觀行偏好多戈為大𭁆矣就中稱名𠈟信為先徒波浪莫沉深海方竸寸隂不一念學者用心只在於斯苐五百年白法隱滯者如來三學名為白法苐十卷禪戒者去後賢護經云正法時故諸諍鬪戰名為諍訟苐十卷自他國兵起賢護經云諸國相伐時故經文不言有善法今論加義推必是念佛三昧賢護經云如是時此三昧典復當流布故餘法皆此法獨留故云有若準本經假名比丘法教道作物福田檀越供養招無量福指彼作福亦名善法福力㔟少直不至道故云有大集月藏分苐九云正法於我後五百年中諸比丘猶於我法解堅固次五百年於我之正法禪定三昧得住堅固次五百年於我法讀誦多聞得住堅固次五百年於我法中多造寺得住堅固次五百年於我法中鬪諍言訟白法隱沒減堅固從是以後於我法中雖復剃除髮身著袈裟呰禁戒行不如法假名比丘如是破戒名字比丘若有檀越捨供養護持養育我是人猶得無量阿僧大福德聚何以故猶能饒益多衆生故何我今現在於世如真金無價之寶乃至廣若無淨戒行比丘為無上若汗戒剃除髮身袈裟名字比丘為無上寶比餘九十五種異道最尊苐一應受世供為物福田何以故能示衆生可怖畏故若有護持養育安置是人不久得住忍地已上此並是定惠法者問彼經學惠在苐一者應是入聖無漏妙惠證解故今十六觀及念佛者是有漏惠何依彼經證十六觀在初二答彼經惠學何𢩁無漏有漏修惠亦是無漏方便道故無漏若堅有漏亦然故下文云初二五百年解禪定得堅固者此色界修惠定心也已上既合地觀正受三昧明知有漏修惠法在初二也今三階學者多引此文者問彼師意者千年已㣪苐三階機皆行普法並得往生而大集經明苐三箇多聞讀誦行別而非普既自許何引彼經答千年以後行普行者絇出離道經言讀誦明人天法若遠結緣非直出因故不也本十六觀與至何其矣答苐二問文分為二一正會難二而信行下還破彼師初文亦二先直明十六觀門及念佛三昧有淺深次初二五百下明三惠通𢩁會其難先明淺深中深即於四靜慮者依於六地得修惠心作十六觀念佛三昧觀經名正受三昧即是也淺即依欲界聞思惠心者聞思即散欲界心故觀經中名思惟定即是也具如苐一記泛明之故觀經者地觀文證淺深定想成粗見欲界聞思即證於淺三昧明了色界修惠即證於深次會難中初二五百年者明彼經絇修惠故解禪定在初二五百年若聞思心想成者明觀經聞思想成通苐三後問觀經思惟正受廣為未來𢙣世衆生何修惠定唯𢩁苐二不通苐三已後時耶故經處為未來觀念門云設有見聞者不須驚怪也答經不分三惠㧾為未來若細分別有指時長短不同通法淺深差異謂修惠定正像時為未來聞思二定遠通未法為未來有何相不須驚疑未云必是修惠故非難異又今論者依大集經一相之文且明三學堅固之義據實而論修惠亦通苐三已後若堅犱文初箇無定二無戒惠三無三學然苐三後三學自益如唯識義引善見論云未法之中有懷子法師國王聞此法師言證聖果又引律云未法之中有佛弟子爾時國王遇一比丘發心受戒證果比丘亦證聖果已上明知彼經亦堅住論消經故𢩁在初二更不應少分通義况觀佛由㫆𨹔佛宿願力故有憶想者必得成就難思佛願豈抅時候和尚即是末世導師彼觀念門為自他益廣明正受何空設不然者下引賢護證聞惠三昧通後五百初引苐三卷中四十年中廣行於世者如來後四十年間廣行于世四十年後雖亦流行不如四十年中滋盛終至苐五百年未一百歲中復當流布於𨵻浮提具如彼戒行品中𣵀槃經六云佛告迦善男子我𣵀槃後四十年中於𨵻浮提廣流布然後乃當隱沒於地又云迦菩薩白佛言世尊如來後四十年中是大乘典大𣵀槃經於𨵻浮提廣行流布過是已後沒於地者却後久近復當還出佛言善男子若我正法餘八十年前四十年是經復當於𨵻浮提雨大法雨已上𣵀槃𫤭雖似念佛非無其異四十年中廣行流布彼此即同𣵀槃還出在佛正法餘八十年前四十年念佛流布即在苐五百年末後一百年彼在正法此通末法彼四十年此一百年遠近長短不能比類𣵀槃經沒於地念佛不然不沒故斯乃三昧㓛能超利益像未餘不及佛見是利威神加令法久住遙異餘教壽經即我以慈悲賢護亦宣佛威神故近來異見抑念佛蓋是蟷蜋禦隆車耳天下神器不可力爭三昧流布亦復如是豈以人力竸佛威耶餘文易了本大集月藏至淨土者哉是苐三問文意可覺不須重尺本若如三階至其能處也答苐三問文有二意一反難二禪師下結難初反難中亦二一寄苐二階難二寄苐三階難先寄苐三階反難中若如三階者先牒審定若不得生者此下正難即有其五一偏執經文難謂若苐二階作謗法彼擯而不生者何因將彼擯經文偏證苐三階者不生誰知亦苐二階𢙣二謗法不生難謂若苐二階作謗法不而往生者此人既作謗法罪即當檳何因得生三闡提不謗難若苐二階不作謗即無檳故得生者汝集録中許苐二階作一闡提暫入地獄如前已引闡提撥無世出因果何不謗法四謗法不難謂若苐二階作謗而不故得往生者請出聖教何經文謗非障五取相難謂若苐二階雖作謗淨土擯而根正過輕得生者何彼經此經便取次又一切下就苐三階反難中一切苐三階人者先牒計審若悉謗者此下正難即有其四一胎生謗難謂若苐三階咸謗法者在於胎藏豈能作謗耶胎藏者瑜伽苐二明人八位一處胎位二出生位三嬰孩位四童子位五少年位六中年位七老年位八耄𤎼位今為令知不謗法位舉初三位略後而已二經證不成難謂若苐三階亦有不謗法者非當之限何因㧾亦言不得生而引此經證一切苐三階為謗三不知曾謗難謂若苐三階今現生雖未謗過去謗者寧知二階不過去謗過去若謗應如苐三階亦不生四經有二𭁆難謂若經意欲顯苐三階謗與不謗咸不得生苐二階人與不悉得往生故唯明苐三階者此大集經還有二𭁆一太過𭁆者浪不可擯苐二階謗故二太減失者不可苐三階不謗故二結難中下愚者論主謙下之辭也未見者彼解大常途聖教故未敢見其好判處也本依佛藏經至定不得生是苐四問文有其二初廣辨破戒𭁆次於此下正明不可生淨土初文中佛以手者佛藏經二云如來悉𥊸一切世間皆至我破戒之人如來手非我苐二何一日住我法中不許踐僧伽藍之足跟地者俱舍論十五云又犯重人世尊不許食僧食下至一摶踐毗訶羅一足跟地出一切苾事業大師依彼如是言應速除稻禾稗莠應速蕳乘腐杇棟𭩮應速簸揚種中粳粃如是應速驅衆中實非苾光記云經部師又引經顯犯重捨戒僧謂僧伽此云衆謂有僧伽有名曰僧即是衆有食名僧食毗訶羅義翻為寺是住處義犯重之人非實苾自稱苾以此故知律中自稱苾是犯重人餘文可知薩婆多許雖犯四重不捨戒躰故經部師引證而破且經部引律四苾難薩婆多今亦依律故引符合律中自稱苾者上論述曰由律自尺有四苾一名想苾二自稱苾三乞匂苾四破惑苾名想者由羯磨受戒方立苾名故云名想苾之名從於想生或能生想故云名想自稱者犯重之人實非苾而自稱言我是苾故云自稱乞丐者出家之人以乞自活故云自活破惑者聖得無漏真破惑故名為破惑如斷多羅樹者以喻顯戒不反生𣵀槃經云犯重比丘不能復生善芽種子如斷多羅樹俱舍論云然彼非犯一邊一切律儀應遍捨者彼言便是徵誥大師此中立如是喻如多羅樹若被斷頭必不復能生長廣大諸苾犯重亦然已上此牒有部經部返生難即喻犯重余戒皆捨非苾衆今㧾通喻一切破戒光記云多羅樹形似此間蘆樹然此間無不受破戒尸尸者智論二十二云衆僧大海中結戒為畔際若有破戒者終不在僧數如大海水不共死尸宿已上海有八德不宿尸尸其隨一也一切法事不足僧數者佛藏經云或如死人死蛇死最為臭穢清淨諸天欲遊戲時不應得見若見則遠智者遠離不與同事布薩自恣又云破戒比丘當於百千万億劫數割截身以償施主若生畜生身常負重以者如折一髮為千億分破戒比丘尚不能消一分供養能消他衣服飲食卧具醫藥猶尚不應入寺一步何受得一飲之水乃至牀榻何以故如是𢙣人於天人中是為大𮚆一切世間皆應遠離是壞人是𭜨家已上餘文可知於此穢土僧中寺內尚不容身為𮚆行住純淨土唯居聖人此之𢙣人能得並生本準依經律至應依取捨答苐四問文即有五一惣明開二門與不同二彼已前經下廣門會前經三今淨土經下廣述開門成觀經義四雖於釋迦下明二佛讃如父母教示五亦如犯重下引證結歸苐一惣明中開二門大小兩教者分於二門為大小諸大乘法即是開門小乘之教即是門淺深法異罪差故前是後即開先誡後誘攝引法故若細分別小乘開化教制教各別故大乘開梵網觀經開前後兩各有開準可知今與者開異名開必有與之義與非必是開也不可直信者責其偏信如智度論二十二云佛演或時惣而或時而聼或聼而不或而不聼此四皆順苐一義諦又𣵀槃十八云諸佛制四重之法乃至七諍法為衆生故或或開十二部經亦復如是何以故佛知國土時莭各異衆生不同利鈍差別是故或或開有輕重如良醫為病服乳為病乳病聼服冷病則如來亦爾觀諸衆生煩惱病根亦開亦已上偏據於不許開門豈不成𭁆苐二彼已下廣述門中彼已前經律門者即是㧾標或小乘者此下別明相非一即有其七一小乘法多不許重故二是如來呵嘖語故三為令罪人生於慚愧懺悔心故四為令樂求五欲衆生發菩提心故五為令樂居雜染穢土生猒心故六如來若不先罪門衆生無心怖罪恆造諸𢙣故須先勸無作罪犯破戒法七據雖復罪可免𭰖梨今已破戒不可食用僧物故苐三廣述開門中今淨土教發菩提心者蕳上苐四未發心故深生慚愧懺悔往罪改修來善者蕳上苐三未生懺故樂離三界欣生淨土者蕳上苐五樂居雜染故乘佛本願罪福生者蕳上苐一不許罪故深怖當來𢙣道苦報者蕳上苐六無心怖罪故隨順佛教斷𢙣修善於佛法內苐二健兒者蕳上苐七戒根已壞不食僧物故作已能悔諸佛讃者蕳上苐二如來呵嘖語故次苐雖異翻論開於中苐二健兒者𣵀槃十九耆婆諫闍王云佛法中有二健兒一生來不造𢙣二造已能悔已上過而不改是謂為過罪障亦尓知有犯者急須懺悔如理諫悔反同不犯故方云三五戒至二百五十戒如是懺悔若不還生無有是處請觀音云破梵行人作十𢙣業蕩除糞穢還得清淨已上若䨱藏罪是不良人碩為自害如隂隱有癰䨱諱不治則死矣苐四雖於下明二佛讃中先法次後合起盡可見於中言及濡語皆歸苐一義者以言𭇎嘖以懦語誘引悉為成就衆生令歸苐一義𣵀槃二十闍王聞法發菩提心以偈讃佛云諸佛常𢡼語為衆故語及𢡼語皆歸苐一義是故我今者歸依於世尊如來語一味猶如大海水是名苐一諦故無義語如來今種無量法男女大小聞同獲苐一義又準𣵀槃十七云佛有三種善巧方便一者必須𢡼語然後受化二者必須語然後受化三者不𢡼不然後受化聲聞之人無此三故無四無得受化必入苐一義諦故二三語皆令人歸一實理也苐五亦如下結歸二門中先律經相對明開有異罪戒生者彼陀羅𡰱集經處雖誦除四重五逆罪而未曾見戒法還生彼不空譯九品往生三摩地集𨹔羅𡰱經阿㫆𨹔大咒㓛能云若苾𡰱優婆夷犯根本十𢙣四重罪誦七返已即時還得戒品清淨此經亦極樂世界有九品別阿㫆𨹔佛有十二光次引𣵀槃已未入例開二門未入我法者至苐五卷具當記之此亦如是應依取捨者此𣵀槃未入佛法時名決定業亦如門已入法時名不定業亦如開門故云亦如是學者應依取捨離是非矣本無量壽經至經道𥁞是苐五問先正引經次問其𥁞時本如三階禪至當此時也答苐五問辨𥁞時即有三一信行師正法千年後一百歲為止住時二有尺者末法万年後一百歲為止住時三有尺者增劫人壽七万歲初法亦沒後一百歲為止住時苐一尺中二初舉彼師尺二細尋下還破義初舉彼計中如三階師者明彼門人刾依集録千年已後修普別法得𭁆之相今無量下正明淨土法止住時謂此別法千年已前合修行之千年已後百歲住世只合一千百年故止住百歲正法千年後一百歲何以知下證行普別益相如不輕者先引法華證像法時行普利益法華經云乃往古昔過無邊不可思議阿僧劫有佛名威音王如來劫名離𮕱國名大成佛壽四十万億那由他恆河沙劫正法住世劫數如一𨵻浮微塵像法住世劫數如四天下微塵於像法中增上慢比丘有大㔟力爾時有一菩薩比丘名常不輕略抄不專讀誦者同經云是比丘𭂫有見若比丘𡰱優婆塞優婆夷皆悉禮拜讃歎而作是言我深敬汝不敢輕慢以者何汝皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜已上故知千年正法後增上慢盛像法時中不能得學別讀別誦但得學普即其文也由學普故得六根淨更增壽命此為當根善星者次引𣵀槃證苐三階行別過𭁆善星誦經如前已辨二細尋下還破中先㧾非次反徵若以千年者此下正難有其六一錯止別法難先牒彼計次此即下正難應知二不止普法難先牒彼計次佛下正難易詳三非佛普難先牒彼計次禪師下正難又何下責自語相四返異佛化難先牒計次普不下正難謂若諸大乘經有普別二教者其中普法雖不言留而屬當根其中別法雖言止住而嫌背根豈非返異如來悲化既無聖教留普法亦明當根孰辨學普正修別邪五持經得益難先牒計次何因下正難謂若像法不讀經者何因經不輕菩薩聞經受持能淨六根更增壽命是故經云是比丘臨欲終時於空中具聞威音王佛先法華二十千万億偈悉能受持即得如上眼根清淨耳鼻舌身意根清淨得是六根清淨已更增壽命二百万億那由他歲廣為人是法華經六經墮獄難先牒計次何為下正難謂若苐三階不得讀誦大乘經者何為不輕為苐三階增上慢人法華經令墮地獄又藥王下惣引經成千年後可讀誦經先引法華藥王發願次何因下正難可知又引般若及賢護經意與前同寧容千年之後不合讀誦大乘勸請學流者此下傷歎勸學先勸次傷如文解尺第二尺中大悲經正法千年者月藏智度毗尼母等明如來正法五百年大悲及俱舍等一千年如傳通記委細分別刀兵劫時者準俱舍論每中劫末一災必起謂住劫有二十增減中減劫未至於人壽十歲之時刀疾飢災隨一而起初減刀兵第二疾疫第三飢饉故俱舍云謂中劫末十歲時人為非法貪染汙相續不平等愛映蔽其心邪法縈𮉐嗔毒增上相見便起猛利害心如今獵師見野貪獸隨手所執皆成利刀各逞凶狂互相殘害又中劫未十歲時人由具如前諸過𭁆故非人吐毒疾疫流行遇輒命終難可救療又中劫未十歲時人亦具如前諸過𭁆故天龍忿責不降甘雨由是𠀍間多𮞸飢饉既無支濟多分命終光記云以此文證小三災各於別中劫未起論明三災皆云中劫未十歲時故知三災別劫未隨一災起也問若依此今苐九減應飢饉災何云刀兵答玄相傳言第一減真諦等師言第九減今據三藏屬刀兵災光記十一云㫆勒菩薩何劫上生下生答𣳾法師云依立世經㫆勒菩薩第九住劫釋迦如來百歲時出上都叟多天至第十劫八万歲初減時方下生應勘彼經真諦法師亦作此然和上云釋迦牟𡰱當生劫苐一劫出世於此劫中已有四佛出世即拘盧孫佛至釋迦佛若勒佛當苐二住下生已上傳教亦引阿含判苐一劫釋迦出世但劫章頌疏意者頌慈恩疏遍知一中劫未三災俱起三十歲時飢饉災起二十歲時疾疫災起十歲之時刀兵災起若依此別劫之未十歲之時必應刀兵故無過𭁆故彼頌云人壽三十方飢饉七年七月七日滿聚骨運籌多己二十歲時疾病侵七月七日災𭤧畢至十歲時刀兵起七日七夜相𭣦傷餘少人民不𥁞怖災造福延壽命子年倍父增八万從彼減劫慈法𫤭疏文廣故略而不載七年七月七日時俱舍亦同此章頌也問修何業人不遇此災答論引有聖教云若人有能一晝一夜持不𭣦命戒決定不逢刀兵劫起若有能以一訶梨恆錐舊云訶利勒起殷淨心奉施衆僧決定不逢疾疫劫起若有能以一之食起殷淨心奉施衆僧決定不逢飢饉災起問此三災時死人生何處答起世經云刀兵劫死必墮地獄互懷害心嗔毒盛故疾病劫死必生人天互起慈悲相憐哀故飢饉劫死必生餓鬼貪欲猛利希求多故略抄問此三災時幾人不死答起世經云此三災時一𨵻浮提內人數一万餘人殘而不死遍知疏同身長二肘者二十四撗為肘長圎暉師意一尺六寸光記一尺八寸為肘餘文可知璟𫤭破此義存苐三義今不許取俱云有尺和尚及基苐二義也苐三尺中尊者慶友法住記者彼記玄奘譯云此南瞻部州人壽長至十嵗刀兵劫起互相誅佛法爾時當暫沒力兵劫後人壽增至百歲後此州人猒前刀兵殘害苦惱後樂修善時此十六大阿羅漢與諸眷屬復來人中稱楊顯無上正法度無量衆令其出家為諸有情作饒益事如是乃至此州人壽六万歲時無上正法流行世間熾然無息後至人壽七万歲時無上正法求沒此十六阿羅漢與諸眷屬於此州地俱來集會以神通力用諸七寶造都婆嚴麗高廣釋迦牟𡰱如來應正覺有遺身馱都皆集其內爾時十六大羅漢與諸眷屬繞都婆以諸香華持用供養敬讃嘆繞百千匝瞻𠈟禮已俱空向都婆作如是言乃至如論入無餘𣵀槃光定願力火起焚身如燈無遺時都婆便陷入地至金輪際方乃停住尓時世尊釋迦牟𡰱佛無上正法於此三千大千世界永不現已上彼記不言淨土教法道理應有不須疑壽經𥁞百年當彼時故𫤭師云十六大聖取佛遺骨立一時唯弘此淨土之教至滿百歲方取度時都婆便陷入地從此無間下明此界他方淨教不故此經道下㧾結應知本無量壽經至止住百年重問前經謂一切教皆利衆生何餘悉此法獨留斯乃禪師不許別法至十歲時故重難問顯彰實義故釋云驗彼當根不得信於人語也本大聖世尊至不依佛語救前重難文即有四一㧾明一化始終以為留由二衆生宿有下別明三學教法先隱沒三唯有念佛下別明易行念佛獨不四以此經文下驗於當根破他解苐一㧾明中一音法者先摽法悟道非一維摩經如苐二記或得四道果者刾益差別先明果報次論華報果有大小四果即小無生是大華有與離三𢙣趣苦之益也生人天淨與樂之利也此益即通在世後故云一時及沽遠代苐二明三學沒中衆生宿有聞法者顯示宿福受持佛教以為薄福感法由衆生薄福感化緣絶者正明薄福衆生感佛法故三學沒海三衣變色布薩羯磨不成者明戒律戒學為多在像時布薩者新云布灑他此云長養謂聞戒長養善根故羯磨者此云辨事亦翻云業謂作事業成辨故大乘真如非知者明定惠定惠為多在未時由不受戒不知定惠故三學法漸隱沒不行於世淨影疏云大𣵀槃經示佛性聖教中深聖人先隱為是𭁆璟𫤭疏云大𣵀槃經廣顯佛性聖教中深遂聖人而先沒此經唯聞淨土令人求生濟凡中之要故獨留百年機冝既異沒前後不可怪已上斯乃機緣淺薄法不發應如琴瑟有曲羊類不賞亦可法躰深高機不生感如川水至清魚族不捿機法互俱成過𭁆餘教先沒蓋此謂也苐三明念佛獨不中易修易學者㓛成大字時通一念故名易修聞往生只𠈟立信故名易學名其修即行也當根利速是我分易行蓋深安可思議慈悲特留誠有在矣淨影疏云法𥁞時後一百年聞者尚得利益往生淨土今聞者何有不生𫤭師同之霜雪克非青業之時松柏爭彰貞木之名濁風卒非枯甘泉之莭念佛獨薰芳之德學者能辨須依行矣餘文可解不須重釋本十輪經至諸佛不救是苐六間先引次難起𥁞可見十𢙣輪罪者案彼經四始標何為十後結上十然中間唯七種罪謂謗持戒僧互謗三乘法斷罪破戒僧受用僧物罵多聞法師寺莊田薗林作𭣦十𢙣自稱我是住戒廣如經是為七種餘三𢙣輪更可撿之輪者即是摧破善義故彼經云於上十種𢙣輪或隨成一或具成就先修集一切善根摧壞燒皆為灰燼命終定生無間地獄是人究竟自他一切諸佛不能救已上本此不救言至以祛疑滯答苐六問文有其四一反問顯義二復宋下正難禪師計三計尋下明念佛輪罪四若以下結難苐一反問中即三前二反問兼顯經義初反問意謂為是怖諸造罪者欲令畏罪不行非故言不救耶此乃顯彰為懼將作令不敢作如來密意言不救也次反問意謂為此人造十輪已無懺悔故欲令懺悔言不救耶此乃顯彰為令已作生於懺悔故如來方便言不救也後一設問非顯經意如是反問其堅犱義未一定何犱經言佛不救故定不生乎苐二復未知下寄苐二階正難彼計先徵問苐二階人輪罪造不次若言下別難有三一不造十輪難謂若苐二階人不得造十輪者此人能造五逆重罪何不能造十𢙣輪罪二偏執經難謂若苐二階造十輪諸佛不救者此顯苐二階人亦不得生淨何因偏證苐三階人不生淨土三經文不蕳難謂若苐二階造十𢙣而亦諸佛救者經文但言造此罪者諸佛不救禪師下重責立理經文無蕳二三階殊何道理言此十輪中苐二階佛救苐三階不救此乃人解非大聖教意釋經不當聖肙二救三不救者絇佛救不救二生三不生者絇機生不生故非重疊苐三明念佛罪中先直顯示念佛力五逆十輪次五逆經言者例五逆成十輪除彼五逆罪雖言定業念佛能此十𢙣輪雖稱不救何佛苐四結文如文辨矣本如佛藏經至往西方也是苐七問例謗法罪多劫不難念佛速罪得生先引次難起𥁞可見本由五勝故至不同餘類答苐七問文成五對顯念佛德先標次列後依列釋苐一發心勝中發大乘心一念超過二乘心者止觀引寶𭩮經云當知小乘之極果不及大乘之初心𣵀槃經六云聲聞之人雖有天眼故名眼學大乘者雖有眼乃名佛眼何以故是大乘經名為佛乘而此佛乘最上最勝已上果猶不及大乘初心𭂫位行寧比大乘一念㓛力故大般若云若諸菩薩雖多發起五欲相應非理作意而起一念無上菩提相應之心即能折苐二求生勝者彼不求淨此求勝生故得罪是故名勝上二依心論其勝劣苐三本願勝中過去久遠善根純𤎼者本願雖是為其強緣若內因不遇願故論久善文云宿世見諸佛即能信此事故知依有過去善熟能信佛願加持如龍得水故云一念即而已苐三苐五依外緣力辨其勝劣苐四㓛德勝者念佛三昧㓛德超勝不能及一切善根故經稱曰一念即是無上㓛德小乘四念處觀耶舉罪用顯其躰勝故云能除生死重罪是絇行躰論於勝劣苐五威力勝者阿㫆𨹔佛是佛初地㓛德威力稍異常徒以彼威力加持行者故能成勝加謂加被持謂護持攝取義也苐三願力今是威力故為差別五種力中願力威力其躰異故問就於佛位有十地者豈非果滿有不平答彼經意者從佛德別論於十地非初地劣乃至十地勝於前佛謂佛智德𥁞細習氣於諸法中得最自在名為初地今威力者自在力也是佛境非諸菩薩二乘之行處故云異常徒故經下云佛有十地一切菩薩及聲聞𮝻支佛不能行何者為十一名甚深難知廣明智德地除細習氣得自在故二名清淨身分威嚴不思議明德地轉正法輪顯深義故三名善明日幢實相海藏地顯三乘差別法故四名精妙金光㓛德神通智德地八万法降四魔故五名大輪威藏明德地權異耶法伏𢙣行故六名空內清淨無垢炎光開相地現六神通示無常事故七名廣勝法界藏明界地為諸菩薩顯菩提故八名最淨普覺智藏能淨無垢遍無礙智通地為諸菩薩授記別故九名無邊德莊嚴回向能照明地為諸菩薩現方便故十名毗盧舍那智海藏地為諸菩薩能法故又云海妙深持自在智通菩薩復問言世尊唯願世尊現初佛地住彼初地顯現一切如來境界及諸聲聞𮝻支佛歡喜踊躍爾時世尊現自佛𭃯多無邊阿僧㓛德諸寶具蓋不可思議莊嚴佛𭃯土縱廣百千億那由他恆河沙數無有須㫆諸山及瓦礫無有地獄𢙣趣此佛𭃯中有地際皆琉璃成平整如掌彼如來身亦復如是無有血及以骨髓彼佛世尊衆相具足是佛初地名甚深難知廣明智德復有阿㫆𨹔如來蓮華開敷星王如來寶德如來有如是生淨佛𭃯得道者彼諸如來得初佛地略抄明知初地㓛德亦通諸佛乃至十地亦復如是然形別德故以一佛擬於一地於中顯現自在力故於淨佛剎成覺利物名為初地更非不具餘地德也
