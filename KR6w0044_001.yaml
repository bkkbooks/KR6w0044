body:
  text: 本釋淨土群疑論卷第一釋者解釋開演之義幽隱未顯今名開先略難知廣談為演又約機為初機曰開為久機曰演又釋者成立之義安教立理名曰釋也又是答義故此論中解其問難皆言釋曰又準瑜伽論釋有三一解釋二訓釋解釋者釋難義訓釋者釋直義今是解釋解經論中諸難義故淨土者居𭃯土皎潔無濁目之淨土淨即是土持業釋也若泛論時亦通十方今指安養別名淨土就此淨土設衆多疑故言群疑群者衆也諸也疑者猶預能障不疑令惠不決是故開解生信除疑論者議也量也謂假立賔主往復徵所議量正理故名為論此論始終𢝰有七卷此卷居初故名第一或言第一帶𢾗釋也問瑜伽論云佛及弟子已見諦理無倒分別諸法躰性名摩咀理迦此翻本母論藏名也又地持論云菩薩入摩得勒伽造不顛倒論摩得勒伽此云智母菩薩入智母三昧觀見衆生根緣不同作論申經令法久住是則地持九種大禪中第八此世他世禪復有九種中第七造不顛倒論若爾未得證悟真理成獲智母觀知根緣人師製何名為論答智母有淺深觀機有優劣設居凡地未見聖諦須如法惠斫決正理何不號論故慈恩會瑜伽論云然此論中且論弟子見諦者顯離諸失有證故若實而論通取未見聖諦者造亦是彼攝况釋家既證發三昧德入義解造文袟名論應理矣本佛有幾身淨土有幾種是第一𢝰問身土數問今就極樂問答料蕳何故通明諸佛身上答為定㫆陀身土先𢝰致此問答謂為先𢝰定身土各有三種不同後別明西方淨土彼三種中何攝屬也故第二問云今此西方極樂世界三種土中何土攝也本佛有三身至莊嚴為躰答第一問文有三意一舉身土數正答問二三身者至身土躰性辨身土相釋成其義三此受用變下別明二土躰性有三種異第一正答中佛有三身土有三種者佛身增減諸教不同或惣名一佛寶或分為二本業經下云佛身有二法身一果極法身二應化法身其應化法身如影隨形以果身常故應身亦常古昔諸佛二身道同又佛地論七云或處佛有二種身一者生身二者法身若自性身若實受用俱名法身諸㓛德法依止故諸㓛德法集成故若變化身若他受用俱名生身隨衆冝數現生故又般若論二一真佛二非真佛初是法身後余二身或分為三如今明此據常途或四種楞伽經云一應化佛二㓛德佛三智惠佛四如佛初是化身中二是報身後一是法身金光明經亦四種一化非應佛為物現龍鬼等形不為佛身名化非應二應身非化謂地前菩薩所見佛身依定而現非五趣攝名應非化即四善根見一大千一應身也三亦應亦化謂諸聲聞所見佛身見相修成故名為應見人同類故名為化四非應非化謂佛真身前三是化後是法報佛地論亦四一受用非變化謂自受用身二變化非受用謂變化身化地前類三亦受用亦變化謂他受用身化十地菩薩四非受用非變化謂法身佛或十種佛地論經云一現等覺佛華嚴亦十身彼名無著佛安住世間成正覺故二𭤩誓願佛彼名願佛願出生故三業異𤎼佛彼名業報佛信成就故諸行皆因且一信四住持佛彼名持佛隨順世間不斷絶故五變化佛彼名𣵀槃佛示度故六法界佛於一切處無不現故七心佛善安住故此上二名花嚴亦同八定佛彼名三昧佛成就無量㓛德無著故九本性佛彼名性佛善定故十隨樂佛彼名如意佛以普䨱故前五世俗後五勝義隨其所應三身所攝已上三身攝者玄贊九云前五是化佛攝以名世俗故法界一種是法身攝本性一種通法及受用餘三一向是受用故論云以五是勝義故雖法及受用不同形前變化皆勝義也已上問法身之名自性身何故前經通言法身答法身之名非獨真理𢝰而言之亦通三身唯識論十云此牟尼尊得二果永離二障亦名法身無量無邊力無畏等大㓛德法所莊嚴故非淨法界獨名法身二轉依果皆此攝故如是法身有三相別一自性身二受用身三變化身彼疏云唯我世尊大牟尼尊二轉依果亦名法身者非三身中之法身也佛得二名離煩惱故名解身離所知障具無邊德名為法身此中意有為無為名於自身㓛德法依名法身故已上解身名通於二乘所得二種轉依之果彼斷煩惱障解生死故法身之名不通二乘彼不斷除餘所知障不得無量㓛德依故由解身故二乘與佛平等以由法身故二乘與佛差別法身之名由斷知障之故也疏瑜伽深蜜意第二辨中亦三先摽列身土次法性身居至居變化土明三種身各居自土三法性身土下正辨身土於中三身次第文相可見先列中法性身者唯識論十云一自性身謂諸如來真淨法界受用變化平等依離相然絁諸論具無邊際真常㓛德是一切法平等實性即此自性亦名法身大㓛德法所依止故彼疏云離相者無十相也然者尋思路絶也絶諸論者離語言也諸佛自性名自性身有為無為㓛德法依名曰法身已上無十相者𣵀槃經三十一云是故𣵀槃名為無相善男子無十相故何等為十所謂色相聲相香相味相觸相生住壞相男相女相是名十相已上但佛地論除於住相即加異相彼論一云相謂十相一色二聲三香四味五觸六男七女八生九老十死即是𣵀槃無此等相故名無相又俱舍二十八云十相者色等五男女二種三有為相光記釋云住濫無為故不住𣵀槃住更撿他本是諸法平等實自性名自性身名法性身各文字略具名應謂法自性身故論釋自性身名云是一切法平等實性故言法性法謂諸法性謂自性諸法自性故名法性唯識章云明躰不染真實法性名自性清淨心諸法躰性名為自性煩惱不染名為清淨以真實義名為心也疏九云性者躰義一切法躰故名法性理趣分述贊中云法性者一切諸法真實本躰大乘止觀云法者一切法以淨心能與諸法作躰也又性者躰實不改義諸法之相自有生故名妄此心真實不改不故名法性也但指心法直名法性相宗談字訓同故今之也亦名法身力無畏等諸㓛德法所依止故唯識云亦名法身大㓛德法所依止故言身者唯識論云躰依聚義𢝰名身疏云何故名身躰性義依止義衆德聚義具三義故名為身故通三身若別若𢝰已上佛地論七云體義依義衆德聚義𢝰名為身問躰依聚義具在法身答唯然問真如諸法躰亦諸法依故應具躰依二種之義無為即無積聚之義何得有聚義名為身真淨法界捨離十種不清淨過成就十種清淨之相其中第九積聚過故佛地論云不清淨過有十種者一差別過二雜過三有行過四有為過五增減過六行動過七斷常過八勞㢢過九積聚過十攝衆過十清淨相者謂無差別相無雜染相非有行相非有為相無增減相無行動相非斷常相無勞㢢相非積聚相無我所相已上答無為法無積聚義者無因緣成漸積義也非無本有万德自然具足義也依之論云具無邊際真常㓛德是則衆德積聚義也又疏云具三義故名為身故通三身若別若𢝰知通三身具足三義受用身者唯識論十云二受用身此有二種一自受用謂諸如來三無數劫修集無量福惠資糧所起無邊真實㓛德及極圓淨常遍色身相續湛然𥁞未來際恆自受用廣大法樂疏云衆相咸𬾨各極圓躰離衆患名極淨無間無斷名極常無所不在名極遍積聚有礙之躰名色身此即㓛德之所依身一是常不斷常故二是遍量同空故言相續者蕳自性身有生故言湛然者蕳他受用及蕳化身彼時斷故已上是自受用廣大甚深妙法樂故名自受用身義準前又論云二他受用謂諸如來由平等智示現微妙淨㓛德身居純淨土為住十地諸菩薩衆現大神通轉正法輪決衆疑令彼受用大乘法樂疏云他受用中現身土由平等智現通法等由觀察智已上令他十地諸大菩薩受用大乘法樂故名他受用問變化身示現通法令凡二乘受用法樂是亦可名他受用身答疏云化土雖復法神通增故立變化名法樂義劣已上變化身者佛地論云變化身者一切神變圓滿為相居淨穢土現種形種法成就下位菩薩二乘及異生衆令入大地出離三界諸𢙣趣唯識論云三變化身謂諸如來由成事智變現無量隨類化身居淨穢土為未登地諸菩薩衆二乘異生稱彼機冝現通法令各獲得諸利樂事已上變化者謂成事智由彼難思神通之力起三業變化境也變謂轉變化謂化現變成事智相分之心現三業事名為變化神通作故立變化名如神境通起十四化是故此身亦名隨類化現身也應知此中以用顯躰名變化身非此三業即是智躰但是上現相分三業化作者佛地論云第一身化復有三種一現神通化二現受生化三現業果化第二語化亦有三種一慶慰語化二方便語化三辨語化第三意化復有四種一決擇意化二造作意化三發起意化四受領意化彼論六廣釋又演祕云論三業化身等者按佛地經云身語及心化善巧方便業論第七云此顯成作智起三業化由此智能善巧方便能起身語心三業化身化三種一自身相應謂化自身為輪王等種形類及現種諸本生事二他身相應謂化魔王為佛身等變舍利子為天女等寄他身上示現種變化形類三非身相應謂現大地為七寶等或現無量佛化身或放光明照無邊界如是等類離自他身別現化作情非情色種形類動地放光風香等事皆為利樂諸有情故一切皆名佛身化業語業亦三一自身相應謂佛自身化現梵音遍告無邊諸世界等種語業二他身相應謂令聲聞大弟子等以佛梵音宣大乘甚深法等是故聲聞諸菩薩等非己分甚深妙法皆是如來變化作非彼自力三非身相應謂化大海草木等類乃至空亦出音聲大法等如是皆名變化語業心化唯二一自身相應謂自心上化種心及心法影像差別二他身相應謂令他身亦現種心及心法影像差別此並相分似見分現問云何不化非情令心相現答非情已是心等相分云何復令有心相現若心相現則名有情非情攝是故化心但有二種問既許化作非情色相如化佛等於此現心非身化斯有何失答色有離質化通非身心法不然無非身化彼論復有異師云心不可化但由定力能令自心解非分法名化自心若加被他令愚昧者解甚深法令失念者得正憶念名化他心前為正義彼佛地論異師解三業化中不許意化次明身各居土中法性身居法性土等者問何𭤽作身土相對釋答身土一具故如是釋唯識論舉能居名亦復如是疏釋曰還隨自受用土下二身隨自土亦爾非離身別有土名故是釋論自受用身還依自土文問如此三土在何處住為與三界同一處為別處在答法性土是法界理故更不可論在此在彼自受用土亦遍無際不可言離三界處在三界處他受用土不一準花嚴經十地經深蜜經瑜伽論對法論顯論在淨居佛地論出三義彼論一云有義各別有處淨居天上有處在西方等故有義同處與三界同處淨土周圎無有邊際遍法界故如實義者實受用土周遍法界無處不有不可言離三界處亦不可即三界處若隨菩薩冝現者或在色界淨居天上或西方等處不定已上此等中且依佛地如實義者應言他受用土處不定謂第十地方能究竟受佛位時居大城稱大自在宮兮他受用土此之菩薩成就唯識觀解無境而不隨心證得平等法性無法而不得躰如幻悟前所現之土寧定方𫭫心若清淨其處即淨何得必捨此而至彼是故薩埵將受法位不立樹下變自在宮不動坐處見花藏界一毛之中納四海波一芥之內攝十方塵况所居淨剎寧同傍布耶故正義意不可云即不可云離謂能變者心淨穢異故不可言即淨穢二土共死滿故不可言離若隨機冝或在色界或在西方教被一機雖示一處言色究竟而論其實如幻無得隨應見土故佛土章此文云隨冝而現何得定方別指一處欲令衆生起勝欣心別指處隨心淨處即佛土淨已上問菩薩欲成覺方可往勝所設證如幻何無定方故瑜伽第四云超過淨居大自在天第十地菩薩極熏修故得生其中故既成佛已身充法界顯論正與此同十地經論明第十地花報云後報利益者摩𨢸首羅智處生故唯識論云彼必生在淨居天上慈恩上生經疏云此處定在色究竟上此等相如何會通答唯識妙𣥜無定𫭫者向己辨訖心開悟時必應見土何求勝所故義燈會十地論云然自在宮受佛位處居他受用土處不定何以得知唯十地經云是時菩薩三昧現前有大寶蓮花王周遍如十阿僧百千三千大千諸佛世界是時菩薩其身殊妙稱可花座世界既有十方非同有部傍布故自在宮處所不定然十地經論後報利益摩𨢸首羅智處生故者第十地初往而第十地滿欲受佛位所居之土未必住在自在宮處已上此文意彼第十地初往菩薩於此處現花報淨土是名初往大自在宮地前所修業所感土其量狡少齊第四禪指此而後報利益非受佛位大自在宮瑜伽唯識文言惣𭇥其意應通二自在宮初往土在色究竟天若受佛位處不定但彼菩薩未捨異𤎼從此之識所變土者猶有屬色究竟義邊能變本識界地攝故義燈云菩薩有漏諸現起識猶是屬界地故非離三界有別衆生隨生何土約第八識皆屬界故約此而言十地菩薩由極熏修超五淨居生自在宮故亦無失而自在宮非淨居攝瑜伽第四云色界之中十八住處無相天者廣果天攝非別處既云十八住處故自在宮非五淨居淨居攝應十七處非十八故已上上生經疏準之可會初往大自在宮淨穢攝不更應思擇三正辨相中有其三所謂三身先辨法性身土中法性身土俱以真如清淨法界以為躰性者問言法性者名一如理何分身土答今次文云此以覺照性義名身法真理躰名土是其身土差別相也故唯識論十云又自性身依法性土雖此身土躰無差別而屬佛法相性異故疏云即法身亦名自性身法性土者以屬佛法相性異故以佛義是相謂有為㓛德法所依故衆德聚義故二身自躰故法是性義㓛德自性故能持自性故諸法自性故躰為土義為身已上以佛義是下明身義文有三因法是性義下明土義亦有三因躰為土下並結土身結文之中義者義相躰上㓛能指此㓛能即名為身躰者躰性能持㓛能真理躰也指此理躰即名為土今準論疏覺照性義名身者覺照即是有為無漏㓛德法也指此為有為㓛德法所依性㓛能為義此義名身疏云有為㓛德法所依故等即此意也法真理躰名為土者真理即是諸法自性名之為躰此躰名土疏云㓛德自性故等即此義也𢝰而言之理躰之上㓛能名身㓛德之下躰性名土亦佛土章稱讚大乘㓛德經言薄迦梵住法界藏彼經之文證法性身土差別云以義相為身以躰性為圡以覺相為身以法性為土此佛身土俱非色攝非心所但依一如差別義已上宗鏡録云於真如中以性成万德為身以空之理為土得義即別躰不相離已上此等解釋與今同矣問何故真如名為真如又清淨法界是何義耶答對法論二云何故真如名真如由彼自性無變異故謂一切時無我實性無改轉故無變異當知此則是無我性離二我故唯識論云真謂真實顯非妄如謂如常表無變易謂此真實於一切位常如其性故曰真如即是湛然不妄義同論二云理非妄倒故名真如清淨法界者理性無染名為清淨作聖法因故曰法界中邊論云由聖法因義為法界以一切聖法緣此生故此中界者即是因義已上凡真理名其數多唯識章中依般若等立十四名謂法界法性不妄不變異性平等性離生性法定法住法位真際空界無我勝義不思議界自餘衆名不遑具述十二之名列大般若法位名在法花中無我勝義出中邊論如般若等者自下證法性身土中三經三文證身躰性二經四文證土躰性今般若者羅什所譯金般若經偈云彼如來妙躰即法身諸佛法躰不可見彼識不能知或本無之恐落也故魏留支陳真諦譯并義淨玄譯及無著天親論同有此偈言雖少異文意不殊就中天親論文言全同如法界躰性經者文意易了貞元録云入法界躰性經一卷或云入法界經闍那崛多譯此經中無所之文更撿多本維摩經云如自觀身實等者彼經下云爾時世尊問維摩詰汝欲見如來為以何等觀如來乎維摩詰言如自觀身實相觀佛亦然我觀如來前際不來後際不去今則不住不觀五隂如不觀薀非四大起同於空六入無積已上如般若云莊嚴土等者金般若經云若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來莊嚴佛土者即非莊嚴是名莊嚴天親般若論上云智習唯識通如是取淨土非形第一體非莊嚴意此義云何諸佛無有莊嚴國土事唯諸佛如來真實智惠習識通達是故彼土不可取若人取彼國土形相作是言我成就清淨佛國土彼菩薩不實如經何以故須菩提如來所莊嚴佛土者則非莊嚴是名莊嚴佛土故何故如是偈言非形第一體非莊嚴莊嚴意故莊嚴有二種一者形相二者第一義相是故莊嚴又非莊嚴佛土者無有形相故非莊嚴如是無莊嚴第一莊嚴何以故以一切㓛德成就莊嚴故已上準之上言非莊嚴者遮於依他形相莊嚴下言莊嚴第一義諦㓛德莊嚴是則遮情表德義也又維摩經云雖知諸佛國者彼經中卷偈云雖知諸佛國及與衆生空而常修淨土教化於群生今半偈證國土空下文具明二諦義又云諸佛國土者已下二文如下所雖知身土並一真如已下明由設安立門於一如理論身土差其義如上施設安立門者瑜伽等論建立二門一安立門二非安立門先安立者瑜伽論云何安立真實謂聖諦苦由苦故集由集故由故道由道故已上是則差別施設四諦言施設者安立異名即假設義謂四聖諦安世間出世立於因果法是皆施設安立義也非安立者瑜伽論云何非安立真實謂諸法真如圓成實自性聖智所行聖智境界聖智所緣已上是則真如非四諦中所安立故只是聖智所行境界非𭂫所行故名非安立也唯識章云瑜伽等中顯不可施設名非安立又云瑜伽論中施設非施設淺深異故名為安立非安立諦即勝鬘經有作四聖諦無作四聖諦唯識義云安立非安立者新人之言有作無作者古人之詞也已上問有作無作四諦差別如何答玄贊云有作四聖諦者分假生死十二因緣名苦煩惱及業名集擇為生空智品名道無作四聖諦者變易生死五薀名苦所知障名集無住𣵀槃名法空智品名道已上攝釋云小乘觀諦望後更有大乘諦觀可修習故名有作大乘觀諦望後更無餘觀可修故名無作亦名有無量四諦小乘法中雖觀四諦惣相兼知名為有量大乘法中隨別細知名為無量如一苦中知塵沙苦集道三亦復如是已上問瑜伽論意四諦名安立一真法界名非安立彼勝經有作無作俱是四諦無作四諦與非安立躰義既殊而何章主判為同耶答無作四諦雖名四諦不為差別觀二空一實故名無作無者是非義作者安立義無作非安立名字雖異義躰惟同故無作四諦即非安立故攝釋四云問非安立者詮為義言無作者無後可作名為無作然可施設二義既差云何相即答非安立名通於二義一唯詮與無作別即瑜伽謂非安立諦唯是一也二言非者即是無義安立是作名字有別義躰無差已上疏釋加行位云此位菩薩於安立諦非安立諦皆亦學緣或𢝰作一實真如或別作二空別三心相見道中初二心人法各別觀名別𢝰第三心𢝰空人法名𢝰也三心別𢝰合是三心也非安立不唯作四諦差別觀勝鬘經有作無作四諦無作四諦即非安立有差別名言者名安立無差別離名言者非安立也已上唯識義疏文已云既以勝經無作四諦同一實二空非安立故知瑜伽非安立勝無作四諦躰義是同可見唯識義第四卷辨受用身土中此有二種自他受用先辨自受用身土中以菩薩行等者𢝰明身土修因圎滿謂菩薩因位三無數劫修習圓滿能可感成微妙身土自利無漏純淨㓛德是名八万四千波羅蜜行八万四千翻塵勞波羅蜜者到彼岸義恆沙果德等者此下別明身土果成於中先明身謂所起因位之資糧四智圎滿二利成就五薀具足為彼身躰自利他者問唯識論云又自性身正自利攝靜安樂無動作故亦兼利他為增上緣令諸有情得利樂故又與受用及變化身為所依止故俱利攝自受用身唯屬自利若他受用及變化身唯屬利他為他現故已上準此論文自受用身一向自利何故今云自利他答二利㓛德已圎滿故自受用身亦兼利他而唯識論偏屬自利依相增非遮利他故摳要云其自用身修因本為利他故修又為利他所依止故不對他受用等自利義微所以不理亦不遮三身章云又有二因大智大悲自利他隨增義自受用身大智自利因他受用變化身大悲利他因法身通二因或皆通二菩薩利他為自利故菩薩自利為利他故已上此等解釋與今符合淨五薀等者無漏五薀名淨五薀言色薀者鏡智相應淨識所持五根種子無邊善根所生故變為清淨微妙色身斯乃第八淨識所變相分色也受等薀者四智相應受想行識等者等取處界諸法諸根相好一無邊無限善根所生故㓛德智惠雖非色法然諸㓛德隨所依身智惠隨如亦可言遍一切處即以智上等者次明土謂由昔所修習純淨佛土因緣成就鏡智相應第八淨識相分而變純淨佛土舉智攝識故言智上所現如佛地論云謂自心上現種心及心法影像差別已上無限善根所生故遍一切處其量難測故言微細周遍其躰無漏色香味觸故言清淨四塵唯是極佛所依住處非因位境故言唯佛而住唯識論云自受用身還依自土明自身居自土謂圎鏡智相應淨識明能變淨識由昔所修自利無漏純淨佛土因緣成就明彼識中昔所修習純淨土因緣成就從初成佛𥁞未來際相續變為純淨佛土周圎無際衆寶莊嚴自受用身常依而住明淨識所變國土殊妙如淨土量身量亦爾諸根相好一無邊無限善根所生故明昔所修無漏㓛德感得自利色身㓛德智惠既非色法雖不可形量大小而依所證及所依身亦可言遍一切處已上佛地論第一云一自受用謂諸如來三無數劫所修無邊善根所感周遍法界為自受用大法樂故從初得佛𥁞未來際相續無變如諸㓛德諸大菩薩亦不能見但可得聞如是淨土以無量故諸佛雖見亦不能測其量邊際已上問自受用身是有為法既非常法何遍法界故唯識論第一云諸非常者必不遍故一根周遍法界豈非無見頂相混足下千輪眼精青蓮至頂上焉瑟耶又如何辨至不至作用故摳要云依用遍非實躰遍此釋叶理如何會通答如來實身無邊善根所感之報因既無限果寧有邊非如有漏業有分限其果報身大小長短故三身章云大劫修因得勝根境一相好周遍法界不同生死業有分限所感身形有小有大已上但會難者雖遍法界根互不混上下根處亦不相亂大小隨順長短相應佛果境界非凡所測故心地觀云雖遍法界無障得如是妙境不思議次至論文與所依法身非一非異故亦有常住不變之義是故周遍法界而已彼摳要有遍不遍義所難即是第二義也故三身章及義林章唯述遍義不遍義明知一往非𥁞理已佛果根用至不至義對法抄中即有二釋欲知更撿問若佛身土是無漏者不可言具五薀等四塵為躰十八界中十五有漏八無記等諸論故答佛果色必三科攝不西天論師雖存異義護法正義三科攝在謂佛十八界無漏種子所生起故道諦所攝便是善性故瑜伽論佛智通等皆屬道諦又賢護經云諸如來色無漏故受亦無漏乃至行識亦無漏又戒定惠解知見悉亦無漏乃至如來所有言及一切法皆無漏也已上而攝論等十五有漏八無記者但就二乘淺境非約如來大菩薩境故論十云有義如來㓛德身土如應攝在薀處界中彼三皆通有漏無漏集論等十五界等唯有漏者彼依二乘淺境非一切謂餘成就十八界中唯有後三通無漏攝佛成就者雖皆無漏而非二乘所知境攝然餘處佛㓛德等非界等者不同二乘劣智所知界等相故理必應爾所以者何有為法皆薀攝故一切法界處攝故十九界等聖所遮故若絶論便非界等亦不應即無漏界善常安樂解身等又處轉無常薀獲得常薀界等亦然寧如來非薀處界故言非者是密意又五識性散亂者餘成者非佛所成故佛身中十八界等皆悉具足而純無漏已上此是第三護法正義又述第一師云有義如來㓛德身土甚深微妙非有非無離諸分別絶諸論非界處等法門所攝故與彼理不相又述第二師云有義如來五根五境妙定生故法界色攝非佛五識雖依此變然細異非五境攝如來五識非五識界經佛心恆在定故論五識性散亂故已上佛地論一云有義十八界通有漏無漏皆有善性然據二乘境界相似言十八界中十五有漏八無記等是當護法正義有義淨土定心所變雖有色等似十界相非十界攝非諸世間五識所得如遍處等所緣青等皆是自在所生色故法界所攝是故淨土雖用色等為其躰性是無漏善亦不相若爾菩薩五識不緣受用土耶雖依彼力自識變為如來定心所變淨圡為增上緣菩薩自識變為淨土然相妙不相似故如來所生妙菩薩所變非五境攝如來定心所生青等非五境攝也如來五識可不緣耶佛緣事心作用相似假名五識實非五識恆在定故餘處宣五識躰是自性散亂無有定故若爾不從五根生耶如來五根及色聲等相同根境假名五根及色等境定心變故實是法界自在生色若爾四智應不同時無有一時一類多識一身起故此師意許無五識故成所作智與第六識相應起化若爾觀察成事應不並生一類二識不俱起故許亦何失許不並起於理無失如實義者如來身土甚深微妙非有非無非是有漏亦非無漏非善非𢙣亦非無記非薀界等法門所攝但隨所冝種異餘處言十八界中十五有漏八無記等但就二乘異生等境相分別不就諸佛大菩薩甚深境界故餘處如來非實薀界處攝所有善等皆是示現乃至廣十五有漏者五根五境五識八界無記者眼等五根香味觸三今案玄贊理趣分疏三身章補闕章等意第三如實義者非親灮義是非正義學者用意云云次辨他受用身土中平等性智擊發鏡智利他㓛德者鏡智之處具足恆沙自利他一切㓛德彼智微細不得獨現平等性智為增上緣顯彼鏡智利他㓛德故云擊發佛地論五云隨諸有情意樂見如來色身差別如來示現如是色身如來雖居無論位由平等智增上力故大圎鏡智相應淨識現瓔珞等微妙色身但唯識論直言平等智現非謂擊發鏡智㓛德故論十云平等智品現他受用身淨土相演祕云傳有三尺一云觀察擊發平等故示現之二云平等擊發圎鏡智而令示現從彼能擊平等現三云平等自能示現不假他擊亦不擊他詳云後釋為正既自在智非唯根本現身土相何理不能第二理通鏡智本故初釋非也已上今依佛地當第二釋隨其所應現一分細相者於利他身有細別謂變化身是其分他受用身便其細分是故對一分名一分細故佛地論七云為地上菩薩所現一分細相攝受用身若為地前諸菩薩等所現一分相化用攝變化身已上又十種身隨其所冝各現一分細身相化身亦現一分相準可知唯識論云他受用身亦依自土謂平等智大慈悲力由昔所修利他無漏純淨佛土因緣成就隨住十地菩薩所冝變為淨土或小或大或劣或勝前後改轉他受用身依之而住能依身量亦無定限義演云初地菩薩所見他受用佛名小名劣二地菩薩所見名大名勝乃至已後準知前後改轉者即改前劣依勝已上佛地論一云二他受用謂諸如來為令地上諸菩薩衆受大法樂進修勝行隨冝而現或勝或劣或小或大改轉不定如變化土如是淨土以有邊故地上菩薩及諸如來皆測其量但就地前言不能測又云謂隨初地菩薩所冝現小現劣如是展轉乃至十地最大最勝於地中初中後等亦復如是已上如是大小勝劣不同言隨其所應等也問何故平等性智現他受用答轉第七識得平等性智相應心遠離二執自他差別證得一切平等性故唯識論云二平等性智相應心品謂此心品觀一切法自他有情悉皆平等大慈悲等恆共相應隨諸有情所樂示現受用身土影像差別疏云平等性真如理智緣於此故言平等此在因中有我執故自他差別今無我故自他平等準此等文平等性智觀平等理及觀自他平等之義初地已上諸菩薩等亦分證得平等之理亦知自他有情平等故應機冝此智隨現身影像通贊鈔云一平等性是真如此智從所緣真而彰名即依主釋也二返有漏以彰名有漏執我自他不等無漏無執自他平等從用立名持業釋也已上因論何故名圎鏡智答唯識論十云不忘不愚一切境相性相清淨離諸雜染純淨圎德現種依持能現能生身土智影無間不斷窮未來際如大圎鏡現衆色像疏云諸不愚者不迷暗義由此如來如一切種智及一切智若不忘者恆現前義由此如來成不忘失法自性明善名為清淨有漏永亡離諸雜染純淨圓德者純者無雜淨者離染圓者滿義純蕑因無漏淨蕳一切有漏圓蕳二乘無學㓛德現種依持者現行㓛德之依種子㓛德之持㓛德種故能現能生身土智影者自心所不緣著本質如現餘三智影等名為能現餘色根等身土等德名能生親照本質故又身土等法親緣之境於識上現名為能現三智等法親緣不著但從此生名為能生乃至無間就時無斷就方一切時能現一切處影故如大圓鏡現衆色像佛地經云如依圓鏡衆像影現依佛智鏡諸處境識衆像影現平等故以為喻已上佛地論中釋彼經文即有三義第一義云大圎鏡智是能生能現諸法影像平等因緣謂諸如來第八淨識能現能生智等影像如大圎鏡能現世間一切影像智相應故假名智言諸處者謂內六處即是眼等言諸境者謂外六境即是色等此內六處外六境界十二處緣此十二生三智品心及心所識為主故𢝰名諸識即此諸識名衆像影種行相差別現故已上此義意者如來即以妙觀平等成所作智緣十二處能緣三智影像顯現圓鏡智上彼之所緣十二處影隨亦顯現圓鏡智上故云諸處境識皆於中現識者三智及相應數𢝰名為識第二義云又處境識三事各別處謂六根境謂六塵識謂六識即十八界衆像影現此衆像影隨其所應三智品現觀察智等𥁞所有性如所有性皆能現故如來鏡智相應淨識為緣生此三智影像故名為現亦唯如來智等所現已上此義意者即以三智緣十八界其能緣智影像差別皆以鏡智為緣生故顯現大圓鏡智之上彼之所緣十八界影隨亦顯現鏡智之上故云皆於中現第三義云又十八界皆在如來大圓鏡智相應心品影現以諸如來鏡智生時皆能照了一切境故諸處境識猶如影像在此智中分明顯現由此鏡智攝受彼相而生起故已上此義意者十八界影像顯現鏡智中以圓鏡智生起之時皆能照了一切境故云諸處境識皆於中現此三義中唯識義意以第三判為正義彼佛地論第四卷中廣明鏡智不遑具述辨變化身土中以成所作智擊發鏡智利他㓛德者成所作智為增上緣擊發鏡智利他㓛德準前應知佛地論六云成所作智增上緣力擊發鏡智相應淨識令現如是三業化用問何故成事智成變化身答唯識論云成所作智相應心品謂此心品為欲利樂諸有情故普於十方示現種變化三業成本願力所應作事已上轉於五識得成事智是在因位各緣一境不能廣緣一切境界今證悟時廣緣六境但不緣理化有色身各別執情迷衆生其義相應故此智現化身三業問轉前五識得成事智其義不明所以者何莊嚴論頌云四智鏡不動三智之所依八七五六識次第轉得故釋論云轉第八識得鏡智轉第七識得平等智轉五識得觀智轉第六識得成事智已上又攝論第九無性釋云轉五現識故得妙觀察智具足一切陀羅尼門三摩地乃至轉意識故得成所作智普於十方一切世界能現變化疏云無性菩薩及莊嚴論且觀智轉五識等如何答轉識得智次第非私設即依佛地唯識論佛地論第三有二師初師正義破後師云此不應爾非次第故法斷疑周遍觀察非五用故唯識論轉識得智門云此轉有漏八七六五識相應品如次而得已上明知佛地論如實義者及唯識論意同觀智第六識得事智五現識得也但莊嚴論與無性菩薩一親光菩薩所破也可酙之疏云八七六五如次而得無性菩薩及莊嚴且觀智轉五識等此中唯轉第六識得佛地論中有二師彼非次故法斷疑非五用故廣如佛地不能繁與此無此文意云無性後解及莊嚴論非正義佛地論有二師初師破後師云此不應爾非次第故法斷疑非五用故演祕釋云問莊嚴頌云八七六五識如次得故即轉五識得妙觀察智如何相答佛地第三有二師釋正義同此第二師云轉第六識得成事智轉五識得妙觀察智正義破云此不應爾非次第故法斷疑周遍觀察非五用故釋曰彼第二師意同莊嚴正義顯彼莊嚴論非次第也故不相已上問莊嚴論是慈尊所佛地論是親光之作親光菩薩慈氏弟子何破師答實如所難若應是破天竺得論傳誦之誤直不可破慈氏所又義燈云本有二解一云莊嚴不依次非言轉六得成事智故不相二疏外別解云莊嚴論中據第六識能作神通等諸成業云得事智五識因位不觀察果位方能云得觀察故亦不無性兩釋各隨一義不二論然佛地論破轉五識得觀察智云法斷疑非五識能者是破別師非破莊嚴如理門論破古因明言諸師異釋繁不具本有二解者諸論之中轉識得智本有二解一者轉六得觀智轉五得事智二者轉六得事智轉五得觀智此二解本在諸論中非今所釋故云本有二解一云等者今義燈師作二解會初解意者莊嚴論意非次第法等正義師非轉六得事智既不可依莊嚴論故此唯識論無相失次解意者若至佛果第六識有起於神通變化作業五識亦有觀察諸法自共相德互有能故各顯一邊謂莊嚴顯所兼能言轉六得事智等唯識論顯其正能言如次得無生菩薩能得兩意方作二解是故不莊嚴唯識二論所然佛地者會佛地論謂彼論破有余師執因位五識方有法斷疑能故言轉五識得觀察智非破莊嚴論言果位五識起觀察故轉得觀智如理門論師破古因明師之言不破𢏏勒世親等更破余古師問轉識得智者改識成智不答唯識論云智雖非識而依識轉識為主故轉識得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故轉八識而得此四智已上此有二初意者惠心所若有漏之位王亦有漏惠若轉成無漏之時識亦得轉而攝心所從心王故名為轉識實更可言轉惠得智次意者有漏位中智劣識強無漏位中智𭤽識劣為令𭄿有情捨有漏識得無漏智故名為轉識得智也問何故名成所作智答唯識論云成本願力所應作事通贊鈔云成謂成就所作者度生願此智能成就所作度生願故成所作即智成所作之智持業依王二釋如次已上問妙觀察智亦現身土答不爾唯識論十云觀察智品觀察自他功德過失雨大法雨破諸疑利樂有情疏云妙觀察智通二土法已上佛地論六云妙觀察智助平等性智為增上緣擊發鏡智相應淨識現受用身種衆會威德熾盛雨大法雨為令地上諸大菩薩受大法樂亦助如來成所作智為增上緣擊發鏡智相應淨識現變化身種衆會威德熾盛雨大法雨為令地前所化有情受用法樂已上問圓鏡智現自受用身土平等智現他受用身土成事智現變化身土三智既爾此智何獨不現身土答此四智品雖皆能起一切作用而就𭤽多作用各別故觀察智法斷疑觀得失等其用偏增若據實論觀察智即現身土餘智準知故佛地論云當知四智一能起一切作用就𭤽多分平等智起受用身成所作智起變化身妙觀察智觀察一切自相共相陀羅尼門三摩地等大圎鏡智能現一切諸法影像如一一根取一切境非無強用此亦如是已上疏云據實二身四智俱現摳要云此中諸土皆四智境由隨增勝本擊發因智別現不爾便非遍智過鏡水寺拪復抄云若約平等道理解四箇智能現身皆能法已上此等皆依佛地論問何故名妙觀察智耶答疏云神用莫方稱之為妙具緣諸法自共相等名為觀察籌量境相妙用勝故已上妙觀察即智持業釋也問四智皆具本後二智答三智皆有根本後得成所作智若唯識論但屬後得成所作故唯識論云隨作意生緣事相境起化業故後得智攝疏云行相淺近緣事智故但遮無為如文證成已上成事智品行相淺近緣俗智故不緣無為除無為外自餘六境皆廣緣之如論文中佛地經證成事智緣六境義論云佛地經成所作智起作三業諸變化事決擇有情心行差別領受去來現在等義若不遍緣無此能故若佛地論如實義者許成事智亦緣真如故佛地論七云經曰法智彼所緣自在無𥁞相論曰法者大圓鏡智者平等性智彼所緣者即余二智妙觀成事由對治力轉去世間分別六識轉得清淨依他起性或出世間正智或出世後所得緣上真如及法智等依他起性以為境界唯識義之問二論之義以何為正答慈恩意者二論俱用不判是非故唯識章云佛果通八識能為唯識觀三智通真俗理事二門成事非真唯觀俗識此解依論理或有真已上文意因位第六識獨為唯識觀餘識不爾而佛果位八識皆通為唯識觀三智通觀真俗二門成所作智觀俗非真此解便依唯識論意若據道理或有事智緣如之義又下文云或亦通真自在滿故又疏五云為緣如不西方二一云許緣佛智通故二云不緣名成所作緣事智故準下論文此解為勝然甚難知已上信知基意亦用佛地論緣真義而已若爾者如何會通唯識論答且依顯相辨事智名非𥁞理也但此且依子嶋傳意問何故因位第六作觀餘七不觀答第六意識超過餘識有十五種不共作業故能觀境斷除煩惱故唯識章云若能觀識因唯第六瑜伽第一云能離欲是第六意識不共業故已上第七未那第六所雖為能觀非實能觀不能惑其十五種不共業者瑜伽論一云又諸意識望餘識身有勝作業謂分別所緣審慮所緣若醉若狂若夢若覺若悶若醒若能發起身業語業若能離欲退若斷善根若續善根若死若生等摳要下作頌云分別審所緣醉狂夢覺悶醒發業離欲退斷續生死問何以故名根本後得答佛地論三云要達真理方了事俗故雖一心義先後或似後得名後得名後得智唯識論十云緣真如故是無分別緣餘境故後得智攝其躰是一隨用分二了俗由證真故為後得餘一分二準此應知此釋鏡智根本後得相餘者餘平等等智也疏云了俗由證真證真為先緣俗智生故名後得已上問唯識論意成所作智不緣真如先不證真何因得立後得智名答如上三智後得智亦能緣俗故緣義同後得智攝問何今化身不立淨穢例如受用分自他身答佛地論唯識論變化身土分淨穢差而今不論凡先分別三身三土源為成立西方淨土相也因茲問言佛有幾身淨土有幾不問穢土答言此二淨土衆寶莊嚴但明淨土故知今文且論淨土不穢也第三明二土躰中二土躰性者問上明三土今何唯論二土躰性不明法性土躰性耶答上文云法性身土俱以真如清淨法界以為躰性故不重舉問若言上明故重不明者受用變化土躰同上明之何今重論耶答法性之土除真理外更無別躰故不重論餘土不然有三躰故別令知也攝事歸真者事謂事相有為事相皆以真理為其躰性故報化土同用真理可以為躰故疏云攝相歸性皆如為躰補闕章云攝相歸性者相謂事相性謂真如二十九句莊嚴淨土入一法句即此義也攝相歸心者相所變相分一切相分唯識所現故報化土同用如來菩薩淨心以為其躰彼如來等淨心所現相分土故疏云攝境從心一切唯識義林章云攝境從識躰即一切法皆是唯識如來等淨心所現者等言等取十地菩薩二乘凡夫於中十地變報佛土二乘凡夫現變化土所謂如來淨心所現妙淨土以為本質變為所化自心相分而見此故所見淨土皆是能見心所變也今受用土應通自他自受用土唯如來變非所化變他受用土通能所變化土亦爾通於如來二乘等變問凡夫未得無漏淨心何等取彼耶答準下論文淨心多種所謂真實相似究竟非究竟其中相似淨者有漏善心此乃凡夫信慚堅固分伏不善欣淨土故託於如來淨心所變自心變見極似佛變清淨土故亦攝淨心也或相從佛菩薩而云淨心以實言之菩薩心獨得淨名故維摩佛菩薩淨心之文故維摩等者別證淨土必心為躰下文之而明十地及如來心名為淨心即唯識等者𢝰證万法皆心為躰唯識攝論所宗大䣭在於斯如下廣明本末別明者本謂實法末謂假法謂實之外別論假法此之二土衆寶和合以為其躰故玄一云假實別論和合為躰行薀攝故已上唯識疏云𢝰論出躰略有四重一攝相歸性皆如為躰故經言一切法亦如也至於𣃥勒亦如也二攝境從心一切唯識如經中三界唯心三攝假從實如不相應色心分位對法論是假立故也四性用別論色心假實各別處𢪛瑜伽論色薀攝彼十處全等無垢稱疏義林章等亦明四躰不遑廣問今論何故不論攝假隨實躰耶答不論者是文略也若論應云攝假從實四塵為躰衆寶莊嚴四塵為躰故玄一云若假從實四塵為躰以金銀等種事物四塵為躰故已上問何故略耶答次上文云清淨四塵為自受用土躰他受用土及變化土亦以須然讓彼而略耳本今此西方至是何土攝是第二問極樂身土前一問答𢝰判身土自下別明西方極樂從𢝰之別其意顯明本此有三釋至文六觀也答第二問文有三釋一明極樂他受用土二明變化土三明通二土此是同於佛地經會所現淨土有三師佛地論一云有義此土變化土攝此經佛是變化身聲聞等衆住此土中現對如來聞是經歡喜信受而奉行故佛心所現故出三界淨識為相為勝法化此地前諸有情類令其欣樂修行彼因故暫化作清淨佛土殊妙化身神力加衆令暫得見若不爾者聲聞等衆應俱不見有義此土受用土攝此經佛是受用身此淨土量無邊際故路乘門等是實德故受用如是清淨佛土一向淨妙一向安樂一向無罪一向自在餘處故解深蜜經三地已上乃得生故此經佛具後所二十一種實㓛德故餘經時不列如是佛㓛德故若暫化作如是淨土如是妙身加衆令見應如餘經分明顯然不故是受用土及受用身聲聞等衆是佛化作或諸菩薩現作此身莊嚴佛土法會故若爾此是地上菩薩所應見聞何故於此化佛土中結集流布傳法菩薩為欲示現一切智者及所居處超過一切世間法故如是示現欲令所化生欣樂故為令發願當生如是清淨佛土見如是佛聞如是法修彼因故如實義者釋迦牟尼此經時地前大衆見變化身居此穢土為其法地上大衆見受用身居佛淨土為其法所聞雖同所見各別雖俱歡喜信受奉行解有淺深所行各異而傳法者為令衆生聞勝希願勤修彼因當生淨土證佛㓛德故就勝者所見結集言薄伽梵住最勝等乃至廣已上第一唯報義中即有三證一第九觀以佛身廣大故二㫆陀經多有一生補處故三經但受諸樂故問三證俱不明先佛身廣大何必報身誰知淨土化身六十万億恆河沙由旬次多有一生補處不可必屬報身淨土化身亦有一生補處故次無衆苦故何云唯報化淨土亦不可有苦故答先通初難何聖教云變化土主身量六十万億恆沙何况於此廣大身上有八万四千相好土亦無邊豈非報身如佛地論唯報義云此淨土量無邊際故路乘門等是實德故下具明之通次難者阿㫆陀經即是大乘所明一生補處定應第十地因滿位若以十地為補處者何是化佛化身非十地能化故安樂集云今此無量壽國即是從真𡸁報國也何以得知依觀音授記經云未來觀音成佛替阿㫆陀處故知是報也已上佛土章云又觀音授記經言阿㫆𨹔佛度之後觀音菩薩次當補處十地大行記當補處非他受用是何佛耶此等同今况化身補處不可數多例如釋尊𢏏勒一人得其補處既多有一生補處豈非報身輔翼圓滿變易繫生若得感成不可再生故名一生十地滿身智佛處將登正覺故名補處此乃觀音等後身大士名一生補處也會後難者梁攝論明喜樂圓滿云復次受用如此淨土清淨一向淨一向樂一向無失一向自在釋曰恆無雜穢故言一向淨但受諸樂無苦無捨故言一向樂唯是實善無𢙣及無記故言一向無失一切事悉不觀外緣皆由自心成故名一向自在已上佛地亦同知一向樂無有憂苦是報土相化淨土中雖無重苦非無輕苦所謂佛入𣵀槃等今此三證後漸傍也第二唯化義中何妨淨土變化之身高六十万等者問變化身量六十万億其證若無何成立耶何八万四千相好諸教皆屬報身相好何云唯化答若如所難何處亦定六十万億必是報身化身何無八万四千相好以凡夫二乘類生證為化土如佛地論第一義證變化土云聲聞等衆住此土中現對如來聞是經第三通報化義中地前見變化土地上見他受用土等者如佛地論第三正義云地前大衆見變化身居此穢土地上大衆見受用居佛淨土所聞雖同所見各別雖俱歡喜信受奉行解有淺深所行各異由此經言下便雜觀文證通二身謂非凡夫境者證報身土作丈六觀者證化身土問第十三觀阿㫆陀佛自在德謂或現大身滿空中或現小身丈六八尺何故以一時化現丈六等文證通化義是觀行者觀自在德不可必為彼佛實通地前所見變化身證答自在所現大小身中即有丈六以化丈六為其本故證化身此有何失况第十三初觀池水丈六後觀所現大小今所當初丈六境何不證化問設觀丈六而是為不堪觀大身如來方便暫教令觀一小身也更不應為化身之證何况以此一丈六文證通化義淨土地前見化身者豈是丈六同穢土佛答此義雖通是一往證實證者可用凡夫往生之文是故上證唯化身義據觀經等凡夫生佛地論證如上所諸師中存化身土者亦由凡夫二乘往生之故演祕云一云二乘異生亦生故觀經等皆誠故西方要決通贊疏等皆據斯也本前第一釋至上聖人生重難前第一第二義若如前第一義極樂是受用土者云何地前凡夫生佛地唯識瑜伽對法等諸論他受用土聖人生故若如第二義極樂是變化土者云何地上聖人生諸論同明變化土中凡夫生故所以不難第三義者以難答初二容其義㔟自顯故不別難又無指咎會諸文無妨礙故本計彼地前至亦無有過通前二難文有二意初至心見佛會凡夫生報土難二言變化土下通聖人生化土難大文第一明凡生報土中有三初明凡夫聲聞由佛願力見齊菩薩故名生受用土次又縱令地下至他受用土明地前地上所見雖異法樂齊故名生報土三又起信論下起信同佛地論一師所解還得釋成凡生報義第一明見同故即名生報中亦有其五一直辨地前凡夫識心雖劣託佛願故還同地上所變淨土二佛地論等下和會相三只如眼下例釋成佛地論依大分自因不預他力四而定自在下重例證成他力義五問若然者下因前問起一直辨中地前菩薩聲聞凡夫已下先辨此等人不堪入報遍滿真如者攝大乘及唯識論等立十真如為十地證今遍滿者初地所證梁攝大乘并佛地論同稱遍滿唐攝大乘及唯識論俱號遍行名雖小異義無相梁論十云於初地由一切遍滿義應知法界釋曰真如法界於一切法中遍滿無餘何以故諸法中無有一法非無我故人法二執所起分別䨱蕆法界一切遍滿義由此障故願行位人不得入初地若除此障即見真如遍滿義人法二義永得清淨由觀此義得入初地論曰於二地由最勝義釋曰人法二空攝一切法𥁞是遍滿義此義於一切法中最勝清淨由觀此義得入二地論曰於三地由勝流義釋曰真如於一切法中最勝由緣真如起無分別智無分別智是真如所流此智於諸智中最勝因此智流出無分別後得所生大悲此大悲於一切定中最勝因此大悲如來欲安立正法救濟衆生大乘十二部經此法是大悲所流此法於一切中最勝菩薩為得此法一切難行能行難忍能忍由觀此法得入三地論云於四地由無攝義釋曰於最勝真如及真如所流法菩薩於中見無攝義謂此法非我所攝非他所攝何以故自他及法三義不可得故譬如北鬱單越人於外塵不生自他攝想菩薩於法界亦爾故法愛不得生由觀此義得入四地論云於五地由相續不異義釋曰此法雖復無攝三世諸佛於中相續不異不如眼等諸根色等諸塵及六道衆生相續有異何以故如此等法分別所作故相續有異三世諸佛真如所顯故相續不異若觀此義得入五地論曰於六地由無染淨義釋曰三世諸佛於此法中雖復相續不異此法於未來佛無染以本性染故於過去現在佛無淨以本性無染故由觀此義得入六地論曰於七地由種法無別義釋曰十二部經所顯法門由種義成立有異由一味修行一味通達一味至得故不見有異由觀此義得入七地論云於八地由不增減義釋曰菩薩見一切法道成時不增或時無減如此智是相自在及土自在依止相自在者如所欲求相以自在故即得現前土自在者若菩薩起分別願此土皆成頗梨柯等故以自在故如所願即成初自在為成就佛法後自在為成就衆生此二自在由不增減智得成即以不增減智為依止由觀此義得入八地論云於九地由定自在依止義由土自在依止義由智自在依止義釋曰初二依止義如前釋智自在者四無礙解所顯名智此智以無分別後智為躰何以故遍一切法門悉無倒故由得此智故成大法師令無窮大千世界衆生入甚深義如意能成故名自在此自在以無分別智為依止由得此自在故入九地又釋通達法界為智自在依止故得四無礙解由觀此義得入九地論曰於十地由業自在依止義由陀羅尼門三摩提門自在依止義應知法界釋曰通達法界為作衆生利益事若得諸佛三業及得陀羅尼門三摩提門則能通達如來一切祕蜜法藏得入十地等唯識論等十釋十真如亦同問若菩薩入初地見真如盡何以故真如無分數故若見真如不盡真如則有分數若有分數則同有為答攝論云真如實無一二分數若約真如躰不可立有十種差別真如有十種㓛德能生十種正行由無明䨱故不見此㓛德由不見㓛德故正行不成為所障㓛德正行有十種故分別能障無明亦有十種唯識論曰雖真如性實無差別而隨勝德假立十種已上言勝德者能證智品有勝德故佛地論七云躰唯一味隨相分多或二種謂生空無我法空無我真如實非空無我性離分別故絶論故但由修習空無我觀障真如我所執而證得故名空無我或三種謂善不善無記真如是此三法真實性故或四種謂三界擊不擊真如是此四法真實性故或五種謂心真如廣乃至無為真如亦是五法真實性故或六種謂色真如廣乃至無為真如五薀無為真實性故或七種一流轉真如謂一切行無始世來流轉實性二實相真如謂一切法二空無我所顯實性三唯識真如謂一切法唯識實性四安立真如謂有漏法苦諦實性五邪行真如謂業煩惱集諦實性六清淨真如謂善無為諦實性七正行真如謂諸有為無漏善法道諦實性或八種謂不生不不斷不常不一不異不來不去八遣相門所顯真如或九種謂九品道除九品障所顯真如或十種謂於十地除十無明所顯真如即十法界如攝大乘廣辨名相如是增數乃至窮盡一切法門皆是真如差別之相而真如躰非二非多分別言皆不能辨由離一切妄顛倒假名真如能為一切善法所依假名法界離減謗假名實有離增益謗假名空無分折推求諸法假極至於此更不可度唯此是真假名實際是無分別最勝聖智所證境界假名勝義已上人法二執者人我見亦名補特伽羅我見補特伽羅此云數取趣生異趣故於無堅實主宰自在義諸有情人畜等狀既起我人遍計所執故名我執亦名人執我者主宰自在義如國之主得自在故亦如輔宰能割故主有自在力宰有割斷力義同我故是故呼我言主宰義夫識所變五薀諸法取集和合所作㓛能假似有常一主宰物五根五塵心所等若不和合寧有人等相狀㓛能於此假和合作用上妄起遍計執實常等次法執者謂法我見法者䡄持䡄謂䡄範可生物解持謂任持不捨自性即執堅實法自性有所謂妄執五根五塵心所等五薀法躰實自然有自然我義色心法躰一切如夢非有似有無有堅實自然自性只是依他衆緣所成假事相然二乘凡夫不知此理妄起遍計即執法躰是自然有先人我見其位是短法執起位不必帶人執故後法我見其位即長人執起位決定帶法執故唯識論第五云補特伽羅我見起位彼法我見亦必現前我執必依法執而起如要迷機等方謂人等故已上此二執為二障依故一切迷惑莫不依執謂煩惱障即執遍計所執實我人我見本生諸煩惱我見若無煩惱隨斷此我見通見修二斷為煩惱本雖小乘意身邊二見唯見斷攝而大乘意身邊即通分別俱生故也是為上首百二十八根本煩惱及彼等流諸隨煩惱亦得生長百二十八本煩惱者見道所斷欲界四十四諦各有十煩惱故若上二界各三十六二界四諦各除嗔故是故四九三十六也并修道十六一百二十八修十六者欲界有六貪嗔癡慢身見邊見色界有五除嗔無色有五除嗔合即十六如是見斷一切煩惱見斷我見為本而生修斷煩惱修斷我見為本而生是皆擾惱有情身心能障𣵀槃名煩惱障生死發業潤生㓛能皆由煩惱障㔟力生所知障者謂執遍計所執實法我見本生彼見疑無明愛慢及諸隨惑所知品數與煩惱同煩惱所知二障必俱不相離故而迷作用煩惱障有多品類易可了知此故二乘所斷境界但是不善與有䨱性故以頭數顯云一百二十八等彼迷法躰所知障細難分品類極難了知但菩薩斷亦通異𤎼無記所攝故不顯數能䨱所知有為諸境及無顛倒真如實理由䨱此境令智不生能障菩提名所知障彼煩惱障煩惱即障持業釋也此所知障於所知之障依主釋也𢝰而論之二障躰性非各別物只是貪等十煩惱性此十煩惱迷用起生死邊名煩惱障迷躰起細䨱智等邊名所知障煩惱障兼障所知境所知障兼障真如理雖然由障用增盛故煩惱名障𣵀槃所知名障菩提初地入心始斷分別人法二執證得二空真如妙理地前不爾未曾斷障一味和合平等性智未現行故二乘見道現觀生時雖斷人執僅證生空所顯真如未斷法執及證法空所顯真理未能現觀諸法平等受用和合一味事智故云未證遍滿真如未斷人法執也問二障同躰其理不明煩惱障則發業潤生所知障是䨱所知境㓛用既別躰性寧同何况二乘聖者斷煩惱時不斷所知十地菩薩斷所知時不斷煩惱躰若同者何不互斷故義燈云經論誠二障躰別答二障一躰有文有理先文者唯識論十云體雖無異而用有別故二隨眠隨聖道用有勝有劣斷惑前後佛地論曰躰雖無異然用有別如一識躰取境多用由此薰生一種子躰亦有多用次理者我法二執於一境轉為能所依若別躰法何於一相分能轉哉如彼斷常二見等者行相躰性別故於一時中不能俱起二障俱起為能所依故知彼躰必非別物而二乘菩薩各別斷者聖道㓛力有分限故各斷一用亦有斷彼所依躰義故演祕云用既有差斷彼一分用所依躰聖道㓛力有分限故已上次會燈文二用異故以躰望用且云別躰非實言別是則為破西明師許三相別躰顯示二障不同彼三故義燈云不同二障用殊性伏斷各差別經論誠二障躰別無文此三相別躰已上問煩惱所知二障現種伏斷位何答唯識論十云煩惱障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種金喻定現在前時一切頓斷彼障現起地前漸伏初地以上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失八地以上畢竟不行所知障中見所斷種於極喜地見道初斷彼障現起地前已伏修所斷種於十地中漸次斷金喻定現在前時方永斷𥁞彼障現起地前漸伏乃至十地方永伏𥁞八地以上六識俱者不復現行無漏觀心及果相續能彼故第七俱者猶可現行法空智果起位方伏前五轉識設未轉依無漏伏故障不現起雖於修道十地位中皆不斷煩惱障種而彼重亦漸由斯故二障重一皆有三住斷義雖諸住中皆斷重而三位顯是故偏已上論明分別煩惱障斷位相言於極喜地見道初斷者疏云以見道位躰性稍寬乃至相見道後得智起位久時猶名見道今簡於相唯真見道中唯取無間惑智生故初斷非相見道亦能斷故已上問分別煩惱障現行地前已伏者何故瑜伽五十八世間道唯伏俱生愛恚等不言伏分別煩惱答疏會通云此據異生二乘性等若直往菩薩彼障現起地前已伏故前鬼云唯能伏除分別二取此在加行位若資糧位此現行亦能伏二細現行即未能伏至加行位分別細者亦皆能伏由此菩薩正願勝解世間道力邪見疑等伏而不行已上論明俱生煩惱障現起相言彼障現起地前漸伏等者疏云瓔珞經三賢菩薩唯伏不斷正與此同前卷中云俱生現起未全伏除也言暫起者謂十地中前三猶起我見等故七地已前尚起貪嗔等故已上問地前已伏者與地上已伏者有何差別答地前道力微故雖已伏者有失念起故少分伏不能全伏入地已去能頓伏𥁞如阿羅漢是故疏云道力猶微不能伏𥁞為煩惱副少分自行即我我貪等有失念起故地前已能少伏非有別相地前伏之入地已去能頓伏𥁞如阿羅漢已上問初地已上故起煩惱者一切菩薩皆亦爾耶答菩薩有二種一怖煩惱二不怖煩惱今故起者是不怖煩惱類也故疏云有不怖者故起煩惱怖者不然問何故八地已上不起煩惱答疏云八地已去亦不故起任運不行道力勝故已上問菩薩不猒生死唯以欣智為先若爾何故伏之不起答疏云菩薩加行唯欣於智見道已前唯伏法執其煩惱障隨此而伏然由所知加行伏故煩惱伏非前加行故伏煩惱已上論明俱生所知障斷伏相言於地中漸次斷等者疏云由於地能為障故十地中漸次能斷乃至十地方永伏盡由前道力折伏後地所知障現令其不行名之為伏已上論言八地以上六識俱者不復現行等者第六識俱所知障是八地以上不能現行二空無漏無分別智及此果定後得智等相續不斷能第六識二執故論言第七俱者猶可現行者第七識俱所知障是八地以上猶得現行第六人觀不彼第七俱所知障故若第六識法空智位第七相應平等性智即是無漏凡未那識有三位差一人我見相應位通異生二乘有學七地以前有漏心一類有學漸悟有漏心位彼我執未那緣阿賴耶起人我見二法我見相應位通異生二乘菩薩法空智果不現前位彼法執未那緣異𤎼識起智我見三平等智相應位通如來菩薩見道及修道中法空智果現前位彼位未那緣無垢異𤎼識等起平等性智當知第六單生空時八地以上第七識猶起法我見所知障俱也論言前五轉識設未轉依無漏伏故障不現起者於十地中前五現識雖未得成淨無漏智以第六識勝無漏道勝㔟力故而伏於彼五識二障不令現起彼所知障地分斷能障地故設是後地所斷者於前地中亦能伏之現行於種能於道故又八地以去五識俱者由第六俱無漏伏故令不現起七地以前猶現起第六識者準此應知亦地斷亦能伏故已上疏意問若言地斷所知障煩惱障斷初地金者何故瑜伽四十八一切或障三住斷𥁞如彼論於極喜住一切𢙣趣諸煩惱品所有重皆悉永斷一切上中煩惱品皆不現行於無加行無㓛用無相住中一切能障無生法忍諸煩惱品所有重皆悉永斷一切煩惱皆不現前於最上成滿菩薩住中當知一切煩惱習氣隨眠障得皆悉永斷入如來住故所知障重有三一在皮極喜住皆永斷二在膚無加行無㓛用無相住永斷三在如來住中皆悉永斷得一切障極清淨智如來住已斷名斷也若準此論二障斷位三住何答論雖於修道至三住斷義釋此妨難言釋意者瑜伽三住斷約二障重重非種子故言三住問重亦地斷何唯三住斷答論雖諸住中至是故偏釋此妨難言釋意者𫐠記云三劫成滿位故無漏觀心初起無間圓滿別故現起二障多分少分全分無故一切煩惱分別俱生永害不行畢竟離故無生法忍少淨多淨極淨別故初捨異生分假變易有差別故於無漏心未得有相無相滿故已上問斷七轉識二障種子漸頓相何答第七識俱煩惱障種三乘將得無學果時一剎那中三界頓斷所知障種菩薩將登正覺之時一剎那中一切頓斷此第七識俱所知障任運內起不可分別細異故雖有八十品差別皆同非想第九品障金喻定即頓斷除凡第七識不與分別諸惑相應任運細起行相不似猛利見故唯俱生能得相應餘前六識煩惱障種見所斷者真見道位一切頓斷五識尚有分別惑故言前六識煩惱障種見道斷也修所斷者菩薩要須金喻定一剎那中三界頓斷前六識俱所知障種見所斷者初地初心一切頓斷修所斷者於十地中地漸斷乃至正起金喻定一剎那中方皆斷𥁞此皆論井疏意也問分別俱生其義云何答言俱生者無始時來妄熏習自因力故生我法執恆與身俱不待邪教及邪分別任運而轉故名俱生言分別者要待邪教及邪分別然後方起我法執故名為分別二執故易斷入於初地住二空𮗚一時頓斷俱生二執細難斷故彼法執後十地位中數修習勝法空觀方能除我執即是金心位永則斷除唯識論等委明其相如第四記述二種我見差別且止傍論應釋本文識心劣者有漏位中識強智劣故雖有智只舉識攝其識浮踈㓛力𮊵𭋘故云劣微細智心者智相應心名為智心無漏位中智𭤽識劣故雖有識只舉智攝其智其深德用勝妙故云微細二心所變土成優劣故不可以地前所變土同於地上所變淨土也
