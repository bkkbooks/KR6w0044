body:
  text: 本為一切眾至不平等過是第一問先審次難初文應知次難兩邊初一邊二若一切眾生悉得生者一為度盡無窮生故不可佛國土壞敗何因極樂有終盡日阿㫆𨹔佛有𣵀槃時二菩薩不應𤼵願菩薩願云若有眾生徃生未盡我先生者不取正覺故知為先一切徃生菩薩不可有後生義而言眾生生盡我生明一切眾生不可𢘻生也次一邊三若一切眾生有不生者一道理謂𨒫謗者尚得徃生有何罪人更重此者不得徃生二經文謂觀經言亦令一切眾生得生若有不得應非眾生三大悲謂大悲願普遍法界何隔一數而不令生無限大悲有不平等過本此有二釈至一切者也荅第一問文自二義第一亦二初正弁義一切眾生𢘻可徃生以佛大悲無有限量普起慈心咸與利樂廣大願不蕳𭜨親平等攝故次若尒下徵難述成若𢘻生者前所設之初邊難復云何通荅意云雖盡令生眾生志願種種差別不能並生即有五因一不信正法二樂著小乗三愛處穢方四苦住穢五樂求餘國如是種異行異心雖皆可生無盡生者譬如眾生悉有佛性雖當成佛未必盡成如也盡成眾生界盡此亦如是於義無妨且觀一類者下正所難謂觀一類樂生西方機緣略盡菩薩𤼵願如來入一切眾生非無生理第二義意有眾生中不徃生者如經言者引遺教經釈迦化顕㫆𨹔義其義可解雖佛廣大者下正會難雖無限悲盡眾生界然其受化唯度有緣故徃生等者據理釈成故徃生機即有限量如來度菩薩後徃觀音補處故徃生徒非遍一切者也初義相似皆成佛宗言佛慈悲所及眾生皆有生理如一切眾生皆有佛性故次義稍同相宗繫属言佛慈悲雖遍法界機緣有分限有不生理故問報佛何荅據授記經且述化邊或報身佛有入義本既言淨土至何有母耶是第二問既言淨土者捐三十種益無女人如何等者出其相若無女人等者正難謂彼經云尒時世尊告諸比丘今當為汝宣西方安樂世界今現有佛号阿㫆𨹔若有四眾能正受持彼佛名号以此㓛德臨命終時阿㫆𨹔佛即與大眾徃其人所令其得見已尋慶恱倍增㓛德以是因緣所生之處永離胞胎欲之形純處群寳蓮華中自然化生具大神通光明𭴢赫阿㫆𨹔與聲聞俱其國号清𣳾聖王所住其城縱廣十千由旬於中死滿𭃯利之種阿㫆𨹔如來應正遍知父名月上廣乃至阿㫆𨹔佛與大比丘六万人俱問智度論云阿㫆𨹔佛亦有嚴淨不嚴淨土如釈迦文誰知清𣳾別穢土故安樂集明㫆𨹔國土通淨穢彼經云尒時阿㫆𨹔佛與聲聞眾俱國号清𣳾廣乃至上來所並是化身之土若是淨土豈有輪王及城女人等也已上准所引意料蕳經文初明極樂阿㫆𨹔佛與聲聞俱下別更穢土清𣳾要集亦㨿安樂集義是應道理何極樂處有女人義荅者經文㔟一具不殊更不可言別淨穢故今問荅及第五卷證淨土義又慈恩佛土章中以彼經為化淨土玄賛等中為報土海東亦釈化身淨土小經記云或聲王中有父母是顕彼佛所在穢土者是義不然所以者何彼經既寳蓮華中自然化生具大神通光明赫𭴩又文言有二菩薩一名觀世音二名大㔟至此二菩薩侍左右此等皆是淨土相故不異觀經之所故當知彼經所提婆達多及魔王等皆於淨土變化所作已上同宗要意亦復同之安樂集等人情而已本今為二釈至成等正覺荅第二問文自三義第一釈中即有其二一明佛有受用變化兩經不謂觀經第九觀佛是受用身皷音聲有父母等是淨土中變化身也二又受用等者明受用身中化分叚變易兩種菩薩故所現既異謂他受用所化眾中有二菩薩一分叚身悲增七地已前諸位此諸菩薩三家受生即有父母親属等類示同此眾能化亦現父母王國等種相二變易身智增初地悲增八地已上諸位此諸菩薩捨穢質身受淨妙報無礙自在為此類故佛現化生便無見母此一義分可為二義所以合者觀經所属報義同故不別立問他受用身於色究竟大自在宮成等正覺何為分叚身現父母等耶荅諸佛應機如水順器故他受用為化二位現異種身有何妨㝵謂為變易身諸菩薩示化生身於色究竟成菩提道為分叚身現胎生身捨國城等得究竟果故玄賛七云他受用身有父母等皷音王經阿㫆𨹔佛父名月上母名殊勝妙顏有子有魔等化七地已前有分叚死故有父母等為八地已上有變易生理無此事不生死故三身章云此他受用雖有父母亦現受生無實女人佛及菩薩化為母等化分叚身故現此相化變易身未見誠又拪復鈔云問阿㫆𨹔佛准經所陳乃是報身何有度荅是他受用身他受用身應八地已前悲增菩薩可有度示同所化受分叚身有生故故㫆𨹔父名月上母名殊勝妙顏若對智增八地已上他受用身生即無已上問佛土章云第三弁因行門云西方通於報化二土報土文證如前所化土證者皷音王經云阿㫆𨹔佛父名月上母名殊勝妙顏有子有魔亦有調達亦有王城若非化身寧有此事故觀經九品生中有阿羅漢湏陀洹等已上是皷音經以属化土一師解釈何成相荅慈恩即存通報化義故約一義述經文耳彼下釈曰其土通報化二土若依前解此是他受用身示現亦有父母王國實即無之實無女人𢙣道怖等九品生中阿羅漢等借彼名實是菩薩二釈任情取捨随情已上無垢稱䟽全同之矣准此等釈若約化土父母等是實業所生若約報土父母等是佛假示現第二義二一者畧解二言國下一廣釈初略解中先釈次例後結應知例中如維摩經者彼經上云尒時會中有菩薩名普現色身問維摩詰言居士父母妻子親戚眷属吏民知識𢘻為是誰奴婢僮僕𠌵馬車乗皆何所在於是維摩詰以偈荅智度菩薩母方便以為父一切眾導師無不由是生法喜以為妻慈悲心為女善心誠實男畢竟空舎弟子眾塵勞随意之所轉道品善知識由是成正覺諸度法等侶四攝為妓女歌詠誦法言以此為眾樂𢝰持之林無漏法林樹覺意淨妙花解智恵菓八解之浴池定水湛然滿布以七淨花浴此無垢人象馬五通馳大乗以為車調御以一心遊於八正路相具以嚴客眾好餙其姿慚愧之上服深心為花富有七財寳教授以滋㤙如所修行迴向為大利四禪為床㘴從於淨命生多聞增智恵以為自覺者甘吕法之食解味為漿淨心以澡浴戒品為塗香又梁攝論云一方便為父二般若為母三禪定為胎四慈悲為眷育五信樂大乗為種子已上經論意同故引而合如文殊等者重引花嚴顕示物名是㓛德法六十花嚴四十六云尒時文殊師利菩薩建立彼諸比丘菩提心已與眷属漸遊南方至覺城東住嚴幢娑羅林中大廟處過去諸佛所遊止處已上雖不顕覺城東者是法門名准下偈文定應表法所謂文云尒時善財童子從文殊師利聞佛如是諸㓛德專求菩提以偈頌曰三有為城墎高𢢔為圍墉諸趣為刧歒漸愛為塗壍故探玄記云准下文城山處等所有名義皆是法門之所表也謂覺者表於生死有覺察故城者防歒外難內守法故即覺用也東者開明之始表是覺𤼵之初蕳終位之覺故云也已上又上四十四云無上轉輪王勝妙三昧城空觀妙宮殿慈悲大㽵嚴已上准知城者必所表耳二言國下廣解釈中雖有諸法之所表等不出理智禪定慈悲如其所應詳審觀察於中性淨曰清者真如法界其性明白無垢無染故云清淨躰寛稱泰者泰是大也理躰廣大稱曰泰也佛界所有過恒沙德皆依真理如万物依止大地故國表理鏡智亦依圎成實性如城依國故城表顕大圎鏡智真智𭇥十智者其圎鏡智現十智影一世俗智二法智三類智四苦智五集智六智七道智八他心智九盡智十無生智若約二乗束十為二有漏無漏性差別故若鏡智影十智無漏如來無有漏種故問何佛俗智荅後得無漏能緣世間俗事轉故問何法類等荅法類二種如其次第以欲上界四諦為境法智類智由境差別分為苦集道四智他心智者如通中弁言盡智者謂無學位若正自知我已知苦我已断集我已證我已修道由此所有智見明覺解恵光觀是名盡智智謂决断或謂重知見謂推度或謂觀照明謂照明覚謂覚悟解謂達解恵謂蕳択光謂恵光觀謂觀察智等八種並恵異名又雜集論十云盡智者謂由因盡所得智或緣盡為境所以者何由有盡故而起此智名為盡智或緣盡為境故名盡智此義意言於此位中由永断集令無有餘所得智名盡智或緣因盡為境故名盡智由因盡所得智者集諦名因由集諦断所得勝智名為盡智緣囙盡為境者煩𢙉盡名為因盡緣此理而為境智名為盡智無生智者謂正自知我已知苦不應更知我已断集不應更断我已證不應更證我已修道不應更修由此所有智見明等名無生智又雜集論十云謂由果断所得智或緣果不生為境所以者何由有無生故所得智名無生智或緣無生為境名無生智此義意言由有當來一切苦果畢竟不生法性故而得此智雖緣餘諦為境亦名無生智或緣苦諦無生為境故名無生智准前盡智可解文意能有十力者一智各有一力用故合曰十力或准俱舎處非處等十力即以十智為躰故曰十智能有十力具如第五卷記因十度成者十智十力皆依等十波羅蜜而得成就如是多十𢘻具足故名為十千鏡智中有法王種子者鏡智相應第八淨識執持如來法王恒沙無漏㓛德諸法種子無减故如第一記金喻定勝餘三昧者此定能居修道㝡後断結道位准對法論具四義故勝餘三摩地一無間二堅固三一味四遍滿無間者謂此相續流非世間行所間故堅固者非一切障所壞能壞一切障𫽄堅固故一味者無分別性純一味故遍滿者緣一切所知法共相真如為境故彼論引經云為顕此義薄伽梵如大石山無無隔無一叚𫽄善圎滿十方猛風所不動轉已上平等性智常觀鏡智者果位性智常觀大圎鏡智㓛德能為利益所謂𮗚知鏡智㓛德能擊𤼵𡸁利他益也此三智居鏡智之後者轉識三智随順本智如世間第從舎兄後故曰居後三智影從鏡智種生如世間子從父母生故曰生子觀諸煩𢙉即是𣵀槃者智能觀達煩𢙉即息是名為煩𢙉𠰥妙智此顕言即菩提非謂煩𢙉躰即菩提性宗明義惑躰即智不足釈問若依此義自受用身必由智度及方便等應有父母若許即有莫大過失荅憬所難非必盡理就化他土有此相作表示釈經不自受用土故釈亦不釈餘文可解不湏重詳第三義二一先明菩薩成道不同二今阿下依例釈成初文中二先𢝰摽次別釈釈中亦二一廣明因行果成依願不同二別明末後出家成道不同一廣明中或有菩薩至亦無有異如悲花經第三卷㔟至成道觀音成道名㓛德山王彼佛在世㔟至輔翼請轉法輪随其法所經時節於其中閒行菩薩道佛𣵀槃後正法已次得成佛其界㽵嚴及國刧名與前佛世等無有異或有菩薩至更別立稱如同經阿𢏏𨹔佛正覺已前尊音王佛不可思議㓛德王佛等無量佛次第出世界常住無有變異然國刧名與前各異如或名㫆樓光明或名尊善無垢等也問一世界名各別者經文分明刧名異者經未何荅界名已轉刧何不然無量無邊諸佛出世佛壽命各久遠定非同刧故云尒也或有菩薩至經中具案授記經悲華第三觀音成道彼土轉名一切𭹀寳所成就世界所有種㽵嚴無量無邊安樂世界之所不及故云皆轉或有菩薩至悲花經悲花經明無上念一千王子八万四千諸小王等徃他方界成等正覺此等者結二又如下別明中菩薩童子出家成道者如梵網言釈迦菩薩七歲出家但常途更勘餘菩薩納妻等者如智論云釈迦菩薩十九踰城捨國王位三十成道教化眾生大通佛等亦此例也龍女作佛鶖子成道及餘文明不能更解本如舎利弗至所能生也是第三問難五通超舎利弗等非是凢夫聲聞五通不越三千大千界者問俱舎論云即此五通於世界境作用廣狹諸聖不同謂大聲聞麟喻大覺不𫽄作用如次能於一二三千諸世界境起行化等自在作用若𫽄作意如次能於二千三千無數世界智論九云弟子中天眼第一阿泥盧豆暫觀見小千國土諦觀見二千國土辟支佛暫觀見三千大千國土地持論三十住論九亦復同此若准此應言聲聞五通境界不過二千何言不越三千大千荅今約二乗𢝰云三千等者等取餘羅漢及麟喻覺故故至荅文通以二乗挍量大乗又智論五云小羅漢小用心見一千國土大用心見二千國土大羅漢小用心見二千國土大用心見三千國土辟支佛亦尒言亦尒者大小支佛各有大小用心差故若㨿此舎利囙連等大聲聞通至三千故今無失前解為正順常途故合荅文故本此義不定至有漏善根荅第三問文有其二先質次釈初文可知第二只如下正釈亦二初例釈次引證成例中亦二先舉人閒北欝單越定無中叐有頂八万還有中以例淨土雖是凢夫緣力勝故通力超過此方聖者言緣勝者即有五種一業力勝𤼵菩提心修定散行一念㓛德深廣難測二乗修㓛之所不及此之勝業為增上緣徃生淨土故曰業勝二果報勝謂淨土報乗佛願力五通自然豈同小乗自力熏習三威靈勝謂佛菩薩大威神德加𬾨力故𤼵通𫽄強非二乗境四資緣勝謂淨土生大乗法味之所潤持故資緣好法能𤼵恵能起通故勝二乗五妙定勝謂大乗定㓛力難思故所𤼵通超過二乗所緣通境不可倍㨿此五勝淨土𭂫夫勝此方聖何所恠也次又五趣等者舉業通超二乗通以例淨土𭂫夫神通勝於此聖中有業通過二乗者俱舎論九釈中有行速門云一切通中業通㝡今文依斯問業通雖何過二乗神境通力故婆娑神境通力行㔟迅速勝諸中有荅光記云問此論中一切通中業通㝡是即中有行㝡何故婆娑第七十云如是者神境通力行㔟迅速非諸中有解云此論言者是無㝵義謂無能㝵徃受生故言㝡非謂行婆娑據行故言神境通速非諸中有故婆娑通經云經業力勝神通者依無障礙業力勝𭂫欲受生上至佛等亦不能若依行㔟而作論者應神通勝於中有謂獨覺等佛能㝵佛不作意不能出三千界亦有所礙此中有去無能㝵者若作此同婆娑論又解神境通有三種謂意㔟勝解運身此論言一切通中業通㝡者約運身而㨿少分一切謂此中有望彼運身速婆娑約意㔟勝解故言神境通非諸中有各㨿一義亦不相已上問初解不明俱舎明中有行速門言業通何無㝵義無㝵門第四別門似二門混次解不明既言一切豈唯運身荅若言不約無㝵邊者婆娑過故者俱舎上述一切通中㝡下結上至世尊無能是非兼無㝵明行速義耶第四無㝵與此義異謂五根五塵𫽄微成有對質㝵然中有身其躰薄不金故㨿此義立第四門第一無㝵佛力法力不能留難速至生處名為無㝵故雖同言無㝵義異耳次解意者業通雖速𫝊識受生可經多時全不可等勝解意㔟極以速迅故約運身釈少分義二故經下引證成中經等者寳𭩮經云若𤼵菩提心求一切智是人受衣敷大地受揣食若湏㫆山亦能畢報主之恩當知小乗之極果不及大乗之初心已上又𣵀槃對小乗天眼讃菩薩肉眼如第三記問小乗人空無漏善根即是菩薩生空真如何彼生空比類初心有漏善根荅大小所證生空妙理雖是義等能顯之人心品有異謂小乗者意樂狹少上不求菩提下不化有情是故不及大乗初心菩薩一念菩提心也故花嚴云菩薩於生死㝡初𤼵心時一向求菩提堅固不可動彼一念㓛德深廣無涯底本未知徃生至變易生死是第四問文意可知分叚變易如前本彼土菩薩至微妙難思荅第四問文即有二一直解問二然壽下會通伏難初文中八地已上是變易者彼位無漏相續不断不起煩𢙉無潤生義故離分叚唯受變易唯識義六如第四記七地已還初果已上或是分叚或是變易者悲增分叚七地已前猶分叚故智增變易初地已上成變易故言初果者即捐初地始得無漏證生空故大嚴論初地見道名法眼淨是初果名今亦如是又七地已還者顯示直徃七地已還初地已上依有智增悲增差別而有變易分叚不同初果已上者顯示迃廻預流已上支佛已前智增機類異故或是分叚或是變易論言巧便互顯而已直徃三賢及十信等皆分叚者羅漢迴心十信三賢猶有變易為蕳彼類別云直徃也次然壽下通伏難者伏難意云若分叚身一壽命短促此死生彼二形色𤰞穢血肉質㝵三心智擁滯應不自在故會通云雖分叚身然合佛願壽命遐長若非願者無捨壽死會初難亦佛願力顏容端正色相具足無無𫽄壽經上云顏貌端正超世希有容色微妙非天非人皆受自然無之身無𫽄之躰憬興釈云無𫽄者無障故希有故通二難復佛願故得神通身心自在微妙難思解二難此等義如三十種益本淨土之中至無何苦也是第五問文意分明三苦者俱舎二十二釈諸有漏合三苦故皆是苦諦云有三苦性一苦性二行苦性三壞苦性諸有漏行如其所應與此三種苦性合皆是苦諦亦無有失由三苦合名苦無失此中可意有漏行法與壞苦合故名為苦諸非可意有漏行法與苦合故名為苦除此所餘有漏行法與行苦合故名為苦與壞苦合𢝰名壞苦與苦合𢝰名苦與行苦合𢝰名行苦謂樂等三受如其次第由三受力令順樂受等諸有漏行得可意等名由樂受力令順樂受相應俱有等諸有漏行得可意名由苦受力令順苦受相應俱有等諸有漏行得不可意各由捨受力令順捨受相應俱有等諸有漏行得非可意非不可意名又論云若諸樂受由壞成苦性如經言諸樂受生時樂住時樂壞時苦正理五十七尺經云樂受生時住持樂者由彼樂受性是樂故壞時苦者謂諸有情未離染時心求樂壞位起憂愁等故樂受為壞苦性樂受壞時設無苦受似苦顕現亦名為苦若諸苦受由躰成苦性如𭑕經言諸苦受生時住時苦若諸苦受由躰成苦性經言苦受生時苦住時苦故名為苦壞時樂故正理釈經云苦受生時住時苦者由彼苦受性是苦故壞時樂者受壞時設無樂受由苦受息似樂顕現故亦名樂於相續息位立以壞名故苦受息時名苦受壞不苦不樂受由行成苦性眾緣造故如經言若非常即是苦捨受由生無常行成苦性眾緣造故其性不安念生如經言若非常即是苦故正理云不苦不樂受生時住時皆非苦非樂性是捨故即彼壞時苦樂随一容現前故可言俱有苦樂壞時無容有二故佛於此作異雜集論五云云何苦性幾是苦行為何義故觀苦性耶謂苦受自相故随順苦受法自相故是苦性義苦受自相者謂苦受即用苦躰為自相故名苦性随順苦受法自相者謂能生此受根境及相應法随順苦受故名苦性一切一分是苦性為捨執著有苦我故觀察苦性薀界處三科一分名一切一分云何壞苦性幾是壞苦性為何義故觀壞苦性耶謂樂受變壞自相故随順樂受變壞法自相故於彼愛心變壞故是壞苦性義此中樂受及随順樂受法於變壞位能生憂𢙉故此變壞是壞苦性又由愛故令心變壞亦是壞苦如經中入變壞心一切一分是壞苦性為捨犱著有樂我故觀察懷苦性云何行苦性幾是行苦性為何義故觀行苦性耶謂不苦不樂受自性故随順不苦不樂受法自相故彼二重所攝受故不離二無常所随不安隱故是行苦性義不苦不樂受者謂阿頼耶識相應受随順不苦不樂受者謂順此受諸行彼重所攝受者謂苦壞二苦重所随故不離二無常所随不安穩者謂不解二苦故或於一時堕在苦位或於一時堕在樂位非一切時唯不苦不樂位是故無常所随不安穏義是行苦性除三界二處諸薀一分一切行苦性三界者謂意界法界意識界二處者謂意處法處一分者除無漏相為捨執著有不苦不樂我觀察行苦性已上若約界分別者摳要下云若依生苦相初二唯欲後一通三若㨿其性苦唯欲有迫緣故壞苦通色界有樂受故如經中變壞心後一通三界已上次八苦者婆娑七十八云生是一切苦安足處苦之良由故名生苦老能𮕱變可愛盛年故名老苦病能壞可愛安故名病苦死能断可愛壽命故名死苦不可愛境與身合時引生眾苦故名非愛會苦諸可愛境遠離身時引生眾苦故名愛別離苦永如意事不果遂時引生眾苦故名求不得苦如是諸苦皆是有漏取薀所攝故名略一切五取薀苦雜集論六云生眾苦所逼故餘苦所依故眾苦所逼者謂曾於母胎生𤎼藏間具受種種𫽄不淨物所逼迫苦正出胎時復受支躰通切大苦餘苦所依者謂有生故老病死等眾苦随逐老時分變壞苦故病大種變異苦故死壽命變壞苦故𭜨增會合會生苦故愛別離生苦故求不得所希不果生苦故略攝一切五取薀重苦故如是八種略攝為六謂逼迫苦轉變苦合會苦別離苦所希不果苦重苦如是六種廣開為八轉變苦中分三種故若六若八平等已上本若依小乗至苦壞苦也荅第五問文即有二一解佛果苦有無相二十地下明因位苦有無相第一解果苦中亦二先小次大初小中若依小乗者指示所依佛身猶有三苦等者摽列苦數於中先明三苦皆具次明具八苦中五苦三苦具者准有五苦可知其相謂佛前十五界一向有漏後三界亦通有漏故次明有五中以如來等者述有八苦中五苦由謂如來身十八界法前十五界唯是有漏道諦無為所不攝故謂五根五境是色法無了別故非道諦無漏亦有為故非無為無漏故唯有漏五識雖心無強蕳択故非道諦無滿道諦能蕳択故亦有為故非無為法是故凢聖前十五界皆是有漏非無漏也復三界法通漏無漏所謂意界及意識界唯有二類道諦所攝即是無漏不漏增故餘唯有漏随增故法界有三一有為無漏道諦所攝二無為無漏空非択二漏不緣故名為無漏非道諦因非諦果故染不緣三有漏法謂除前二餘名有漏随增故此與大乗經部等異如來身心是有漏故有生等五苦性也然断貪嗔等者述無八苦中三苦由謂以佛断貪愛等故能得遠離愛別等三愛別離苦是愛結故断愛即離𭜨增會苦是恚結故断嗔能離求不得苦是貪結故断貪亦離佛雖愍諸等者顕示如來離三苦相瑠璃王誅諸釈種者顕因果集引增一云波斯匿王太子毗瑠璃登王位後集四兵眾向迦毗羅取諸釈種九千九百九十万人放酔象令踏𭣦於諸種竟還歸本國過七日後王及兵眾身壞命終堕阿鼻獄比丘問佛釈種徃昔有何因緣今受此報佛告比丘過去久遠此羅城有捕魚𢩭時世飢儉有大池水又多饒魚城中人民捕魚食之時有二魚一名𭷖璅二名兩舌各相謂言我等無咎人民𭣦食若我等身中有微少善者必於將來當報此𭜨昔捕魚者今釈種是昔𭷖璅魚今瑠璃王是昔兩舌魚今好共梵士是此諸釈種由𭣦魚故無數刧中堕獄受苦餘殃未盡今受此報以此因緣一切眾生勿行𭣦生已上𣵀槃經𭣦多釈種切割諸釈女手足等如第五記非愛別離苦者𣵀槃卜四云瑠璃太子𭣦諸釈𫞕壞迦毗羅城阿難尒時心懷愁𢙉𤼵聲大𡘈來至我所作如是言我與如來俱生此城同一尺種云何如來光顏如常我則憔悴我時荅言阿難我修空定故不同汝已上誠知世尊断除諸愛等證得我空故無此苦下之二苦無准知調達出血者諸經是五𨒫中第五之𨒫亦九𢙉中第三之𢙉栴繫盂者興起行經下云佛告舎利弗徃昔阿僧刧前尒時有佛名盡勝如來尒時有兩種比丘一名無勝一名常歎尒時波羅㮈城有長者名大愛有婦名曰善幻兩種比丘徃於其家以為檀越善幻婦者供養無勝四事無乏供養常歡至為微薄何以故無勝比丘断於諸漏六通具足常歡比丘結使未盡未成道故也常歡自言無勝比丘與善幻通不以道法供養自以恩愛耳汝知尒時盡勝如來弟子常歡者則我身是善幻婦人者則今波羅門女名栴者是我尒時無故誹謗無勝羅漢以是罪故無數千歲在地獄中受諸苦痛今雖為佛為諸大眾法要時以餘殃故多舌童女舞盂起腹來至我所曰沙門何故不自家事乃他事為汝今獨自樂不知我苦耶何以故汝先共我通使我有身今當臨月事湏蘓油養於小兒盡當給我尒時眾會皆𫢏頭默然時釈提桓因侍後扇佛以神力化作一鼠入其衣裏嚙於舞盂忽然落地尒時諸四部弟子及六師徒等見盂堕地皆大歡喜揚聲稱慶欣笑無量已上西𫭫記云眾中一人起持木盂示彼女曰汝兒耶是時也地自開圻今身墜䧟入無間獄及受其殃火坑毒飯者十輪經云眾魔外道於我自身及我徒眾深生憎嫉為害我故假設𭹀饍雜以毒藥暗𣇣火坑偽敷林座西𫭫記云摩羯陀國有大深坑室利毱多唐言勝蜜以火坑毒飯𭓯佛處勝密者宗信外道深著邪見諸梵志曰𠳮荅摩國人尊敬遂令我徒無恃頼汝今可請至家飯食門穿火坑滿中縱火𢯆以杇木䨱以燥土凢諸飯食皆雜毒藥若𪞁火坑當遭毒食勝密羕命設毒食城中之人皆知勝密於世尊所起𢙣害心咸皆勸請願佛勿徃世尊告曰無得懷憂如來之身物莫能害於是受請而徃足履門閫火坑成池清瀾澄鍳蓮華㫆澷勝勝密見已憂惶無措謂其徒曰以術免火尚有毒食世尊飯食已訖為妙法勝密聞已謝咎歸依已上增一四十一同斯乞食空鉢者智度論云婆羅門城王作制限法若有與佛食聼佛語者輸五百金錢其後佛到其國入城乞食眾人閇門鉢空而歸是時有一老女持破瓦器盛涳出門將見佛鉢空漸來思惟如是神人降身行乞愍一切故信心清淨慚愧白佛且欲設供更不能得今此㢢食湏者可取佛知其心受其施食微咲出五色光普照天地告阿難言是老女佛食故十五刧間天上人中受福快樂後得男身出家學道成支佛尒時佛邊波羅門立設偈云汝是日種𭃯利性淨飯國王之太子而以食故大妄語如是臰食報何重是時世尊出廣長舌䨱面上至髮際時婆羅門忽然合掌白佛若人舌能䨱鼻言不妄何髮際心開意解五躰投地悔過甚深時佛為種法得初道果即举手大聲言一切眾人甘露門開如何不出城中一切婆羅門皆送五百金錢與王佛供養破制限法永歸佛法尼𤘽𨹔樹成小因大果義今略抄遇飢饉世者出喻經如序分義凢佛生身現受如此種苦𢙉必依宿業有此事故智論明受九罪報一者梵士女𭮑𨹔利謗五百阿羅漢亦被謗二者婆羅門女繫大杵作腹謗佛三者提婆達推山壓佛傷足大指四者迸木脚五者毗樓璃王興兵𭣦諸釈子佛時頭痛六者受阿𦒿達多婆羅門請而食馬麦七者冷風動故脊痛八者六年苦行九者入婆羅門聚落乞食不得空鉢而還復有冬至前後八夜寒風破竹索三衣禦寒又復患阿難在後扇佛如來等世界小事佛皆受之已上興起行經有十緣上卷六下卷宣四一𭮑𨹔利謗二𦒿奢㫆謗三頭痛四者節煩疼五背痛六木槍脚七提婆達多擲石八婆羅門女栴謗九馬麦十苦行舎利弗請問經七緣云云次大乗明義者以佛三科皆無漏故一切不善皆𢘻断除一切善法畢竟成就云何今實有不善報方可受得感生死等諸苦患耶但為眾生方便示現塵土坋身𮓜狼畏心故智論云阿泥盧豆與一支佛食故受無量世樂心念飲食應意即得何佛世割肉出髄以施眾生而𠧒食不得空鉢而歸以是事故知佛方便為度眾生故受此諸罪云何方便憐愍未來世五眾佛弟子施福薄故𠧒種自活之具不能得諸白衣言汝衣食不能得有病不除何能得道以益於人是五眾當荅我等雖無活身小事有行道福德我等今日眾苦是先身罪報今之㓛德利在將來我等大師入婆羅門聚落乞食尚亦不得空鉢而還佛亦有諸病釈子畢罪時佛亦頭痛何我等薄福下人諸白衣聞已嗔心則息便以四種供養佛供給比丘身得安穩㘴禪得道是為方便故非實受罪乃至廣諸罪因緣皆亦如是已上故𣵀槃等者證而顕諸佛所得常住無有生死等苦言法常者𣵀槃法是自性常故餘五薀是或不断常三常住如第二卷記次維摩𢝰證佛身無漏故無三苦八苦佛三科是皆無漏者如第一記瑜伽等第二明因位苦相中先摽次釈自二義第一義二一初至諸報身故略明有八苦一三苦中二又於下廣明三苦八苦有無相初文中二先摽苦數次以十下明有苦所由謂若分叚若變易皆是有漏業異𤎼報故未得免五取薀苦及行壞苦變易生死實是有漏三界攝者如第一記次廣釈中二初至唯無苦明三苦有無又於行苦等者明有行苦蕳無漏行有為無漏雖是流非行苦故問道諦有為何非行苦荅俱舎二十二云道諦非苦害聖心是行苦相非聖道起𨒫聖心由此能引眾苦盡故已上有漏樂生等者明有壞苦蕳無漏樂無漏快樂無退壞故又無漏能破眾苦故彼無逼迫等者顕無苦既稱極樂何有逼迫身心憂苦次初受下明八苦有無於中初受彼身等者明無生苦即有二因一非眾苦依故二無逼迫受故生苦有二因一眾苦逼迫故二眾苦所依故如向已雜集論今翻彼耳命極長遠等者明無死苦壽命長久不可勝言縱雖𭂫夫終成變易究竟成佛無有死苦以本願故修短自在雖捨彼命生於餘國而非業報受苦之死此五薀等者明有薀苦若分叚若變易報從惑生躰是有漏故五取薀苦也行壞二苦取薀一苦有漏為因故畧廣中明有三苦由皆有漏言問要集云金之報無五盛苦與今何荅作者本宗是各別故謂今論者位登十地身成變易未捨異𤎼躰是有漏故言猶有漏故言猶有五取薀苦要集意者許變易實無漏色質無漏金更無壞故約終得法性法身言無隂苦此相宗義彼台家意以由斯故二義異耳導和尚云淨土之中一切聖人皆以無漏為躰大悲為用畢竟常住離於分叚之生恐與要集其義同焉淨佛國土者明無病苦夫𤼵病緣畧有其五一四大不順故二飲食不節故三㘴禪不調故四鬼魔得便故五前業所感故四大不順者地水火風其性各殊鵄梟共捿蟒鼠同更互侵無時有安外㔟助火火𭤽破水是增火病外寒助水增害火是為水病外風助氣吹火火動水是為風病或三大增傷𭓯於地名等分病或身分增𭓯餘三大亦是等分属地大病此四既動眾病竸生力均和不生𢙉患淨佛國土四大調適無有增减所以者何寒暑外調不冷不善業內𤎼是妙是勝內外因緣能相應故令其四大而安穩也今文偏表四大安穩為無病由若廣論則非無餘緣飲食不節者或有不計多少成病或有不節時候生𢙉或噉不安食俄起急患或食不應藏漸為宿痾千病万病無不依食故要𭣄云夫病從口入禍從口出故君子慎言語節飲食彼安養𭃯若欲食時百味飲食自然盈滿雖有此食實無食者見色聞香自然飽足身心懦無所味著此是㫆𨹔後得大悲之所變現無漏妙味寧生有患㘴禪不調者或身儀不正或心增怠𢢔魔得其便使人身躰背瘠骨節疼痛或止觀不平若上若下若急若緩悉成病患而極樂界定水湛然八解浴池能洗塵勞恵日赫𭴩三明朗光方卷翳膜定恵克調寧結病根鬼魔得便者𢙣鬼邪魔令人時心忽狂乱撗𤼵勞𢙉修道病累多依於斯諸淨土中無有鬼魔縱令雖有或是應現護持正法無作事業如何𤼵病業所𤼵者前世犯罪今生必感多病短命或現破戒動先世業之故成病身口意病三業罪生根藏腑從五戒犯起彼西方者佛願風扇罪障塵𭠎淨業花開妙果實結有何所催招業乎故知淨土諸緣𢘻無病苦也形無𮕱等者已下明無老等四苦其義可知第二義中二初明八苦同前次三苦下明三苦中唯有行苦無餘二苦於中由受等者述有行苦所由分叚變易躰是有為有漏報故未離念流行苦故有行苦也雖有樂受等者述無壞苦由淨土快樂相續無断究竟永證寂真樂若轉捨受雖有少息不生苦受非壞苦也文不解無苦所由同前義故彼下結也本既彼淨土至為極樂也重難第二義意兼第一義謂彼淨土雖無三苦中苦壞二及八苦中生等七苦而猶得有三中行苦八中隂苦如何名為極樂國土故上等三中壞苦八中七苦下等取八中隂苦問何故知但難第二義荅下解文唯第二義故或又𢝰問前之二義然荅文者為少属無偏述第二非不會前若會一義前一義亦能被會故本三苦之中至為極樂也救其重難文自二義第一義者𦆵雖有三八中餘一以少歸無名為極樂如𣵀槃者下例而成其義可知又逼迫下為第二義通迫身心令不安穩憂苦彼無名為極樂不可以有行隂致難行隂兩苦雖名為苦非重逼故在身在心者逼迫之受在五識苦在心識憂五識必属有根身起故名為身憂強思起故唯在心本觀經言分至苦眾生耶是第六問先引次難文易可了本今言度苦至土苦眾生文即有二一自反徵二自通會經言度苦通度自土他土苦也或今言下至苦眾生耶猶是問餘謂上正難今因問其自他土苦荅通度等者先荅自他土若尒釈日兩字恐增是𭂁誤也本自土既無至他方苦耶徵難通度自他土苦難意易了本自國眾生至多怒𭓯處正救難通自他土苦兼會本難弁通自他土相則度苦之義自顕故也文有二叚一明度自二明度他第一度自土者自國眾生雖無苦然非無彼二種生死微細行苦其相已弁如來同集為妙法令速出離故名度苦二他國下述度他土苦即有三相一化佛菩薩自徃他方親為救故分身佛遍滿十方如此土人淨業成就臨命終時化佛菩薩來徃彼或冝身下至來徃彼文是也如此土者舉於一方顕餘九方示於一土令知多土二遍十方界分身佛等歸還本土遠為利益故集本國救他方沇或冝歸下文是也遠為益者於極樂界遙談利生方便事故又於本國遙為加𬾨成利益故三化佛菩薩雲集極樂化諸菩薩令興大悲捨自土樂度他方苦或言度下文是也救他方苦雖出三相次二正會集極樂文初一身徃成救濟故更非雲集本國義也如經論者引例而成覺動大悲如十地經論第十八地菩薩𨈣寂樂上不見菩提可求下不見眾生可利諸佛七勸令趣利他言七勸者第一勸為成就諸佛十力無畏十八不共等㓛德故勤求精進乃至第七勸觀十方無量眾生無量法差別通達彼事七勸已云若諸佛不為此菩薩起智恵門轉者是菩薩尒時即入𣵀槃棄捨利益一切眾生以諸佛與此菩薩無量無邊起智恵門故於一念中所起智業比從初𤼵心以來乃至竟第七地百分不及乃至無量無邊阿僧分亦不及一已上又本業下云菩薩無生觀捨三界報變易果用入中忍無相恵出有入無化現無常自見己身當果諸佛摩頂法身心別行不可思議故名不動地問唯識三云又不動地以上菩薩一切煩𢙉永不行故法駛流中任運轉故能諸行中起諸行故𭃯那轉增進故此位方名不退菩薩已上真俗雙行二利任運何沇無相海濟度計耶荅䟽釈法駛流中任運轉故引十地論云八地已去菩薩於無相海任運而轉諸佛勸等乃至廣𭃯那真俗雙運以無㓛用故任運轉又餘處䟽云第八地中得無相樂𨈣著不肯進修諸佛七勸方能進起撲法華攝釈云問案十地論云八地菩薩𨈣寂酒十方諸佛摩頂七勸唯識亦云於利他中不欲行障如何今任運而行七勸有障皆㨿利他不能任運非依自利實能任運進故又八地中有入住出勸為創入任運㨿後已上初釈意者第八地中未断利他中不欲行障故利他㓛德不任運行是故諸佛勸令利生自行㓛德任運增進不假㓛用故八地任運而轉次釈意者第八地中有入住出七勸在入任運在後住出已去二尺俱許自利任運於利他行作異尺故不任運轉論文也問論注云菩薩於七地中得大寂上不見諸佛可求下不見眾生可度欲捨佛道證於實際尒時若不得十方諸佛神力加勸即便度與二乗無異今言八地豈非相荅七地滿心八地創故論註約七地終言於七地中攝釈就八地始言勸為創入故准撲一義意者論註不今八地文又智論十云七住菩薩觀諸法空無所有不生不如是觀已於一切世界中心不著欲放捨六波羅蜜入𣵀槃尒時十方諸佛皆放光明照菩薩身以右手摩其頭語言善男子勿生此心汝當念汝本願欲度眾生汝雖知空眾生不解汝當集諸㓛德教化眾生共入𣵀槃汝未得金色三十二相八十種好無量光明三十三業汝今治得一無生法門莫便大喜是時菩薩聞諸佛教誨還生本心行六波羅蜜以度眾生已上言七住者即是七地所以知者僧偘䟽會十地經言十地就終云在八地智論尅實七地終心恵影同之故知論註依智論智論若不十地者今亦何乖曇師所解故維摩等者初文顕示淨土菩薩化佛等勸令興大悲謂彼經言穢土菩薩於苦眾生大悲堅固知淨土中不見受苦故於眾生大悲不堅由斯義故化佛菩薩雲集本國令捨自樂救他苦次文顕示諸佛所勸大悲起故淨𭃯來至穢處故此二文釈成第三本阿㫆𨹔經至受相應乎是第七問意可覺本八識之中至捨受相應荅第七問文有其二一明七八兩識恒與捨受相應二餘六轉下明三受相應第一明七八識中亦二先惣顕示因果七八恒捨相應次令准知極樂七八亦捨相應初文中言一類相續等者明因七八唯捨相應唯識論三尺因八云此識行相極不明了不能分別順境相微細一類相續而轉是故唯與捨受相應䟽云一極不明了是捨受相若苦樂受必明了故此中憂喜入苦樂中依三受門不言憂喜二不能分別順境相取中容境是捨受相若是餘受取順境故三由微細若是餘受行相必四由一類若是餘受必是易此行相定故成一類五相續而轉若是餘受必有間断此恒相續故唯捨受若許明了行相可知便應不能攝益相續若能分別順境相非真異𤎼真異𤎼者取境定故若動者應如餘心非異𤎼主顕行相難知異餘識也若許易即善𢙣趣皆𢘻不能互攝彼種許是善識能持𢙣種與理相攝論第三亦有此解若有間断便非彼生亦不受熏已捨壽故性非堅故如餘心等由此五義必具有故便能受熏持種相續已上准之今論亦具五義一類第四相續第五緣境微細是彼第三難可了知是第一二謂難可了第一不了難知第二不能分別論文言巧妙𭇥五義但第七識有三師義第一師云唯有喜受恒內執我生喜受故我既欣行故唯喜俱第二師云前義不然應許喜受乃至有頂聖言故謂此識受一類而轉若許喜俱此喜應通三界九地若言通者瑜伽第十二初定出憂第二定出苦第三定出喜第四定出樂於無想中出捨根等若許喜樂通在有頂應許憂苦通三界有應第七四受相應謂生𢙣趣憂受相應緣不善業所引果報第八識故生人欲天初二靜慮喜受相應緣有喜地善業果報第八識故第三靜慮樂受相應緣有樂地善業果報第八識故第四靜慮乃至有頂捨受相應緣唯捨地善業果報第八識故第三師云前第二亦不應理此無始來任運一類緣內執我恒無轉易與變異受不相應故謂任運故恒一類故無變故唯捨受非是捨受可名變異有易故瑜伽六十三證俱生捨受第八識俱非可起餘憂喜等受亦證此義然樂憂等皆思惟引𤼵此識任運如何不起捨已上三由論䟽抄今㨿第三正義故言第七識與捨相應縱處阿鼻等者顕示極苦極樂之處此識同唯捨受想應三界九地一類而轉無變易故乃至佛果等者明果七八亦捨相應唯識論三釈佛果第八識云此亦唯與捨受相應任運恒時平等轉故䟽云亦如本識因中唯與捨受相應任運轉故不作分別故非有易故不可動搖故如佛地論不可動搖非如餘智已上同論五尺佛果第七識云如第八識已轉依位唯捨受俱任運轉故恒於平等轉故已上明知七八至佛果位亦唯捨受准如是因果七八捨極樂世界七八二識亦應恒與捨受相應第二明六識俱受中餘六轉識三受相應者惣明彼六識喜樂相應於中在意與喜樂受相應者若小乗意有樂者第三禪樂若大乗恱之受意識相應或名樂受謂恱五根名為樂受恱意名喜第三禪根本近分意地恱皆名樂受若與五識相應恱恒名樂受故唯識論五云諸恱受五識相應恒名為樂意識相應若在欲界初二靜慮近分名喜但恱心故若在初二靜慮根本名樂名喜恱身心故若在第三靜慮近分根本名樂安靜尤重無分別故䟽云大乗初二近分有喜瑜伽五十七未至地十一根有喜故顕第二亦然何以無樂以彼恱不遍五根故但意識及身處少分彼論自言不充遍恱故五十七中亦尒如下當知根本初二名喜樂者恱五根故由動勇故復名為喜欲界可知已上憂苦二受亦通意識謂人天中意地不恱恒名為憂非尤重故傍生鬼趣重名為苦輕名為憂捺落迦中唯名苦受純受尤重無分別故唯識五云諸逼迫受五識相應恒名為苦意識俱者有義唯憂逼迫心故有義通二人天中者恒名為憂非尤重故傍生鬼界名憂名苦雜受純受有輕重故捺落迦中唯名為苦純受尤重無分別故已上後護法義大異小乗俱舎等捨受通與一切相應者捨受通與六識俱故於六識名為一切非如餘受分相應也以稱讃等者證有喜樂無有憂苦無妨有捨者此下別述有捨受理喜樂二受在彼圡者理不應疑捨可思慮故別立理即有三由一喜樂終必住捨故如俱舎云㔟力𮕱歇必住捨受二捨受躰善業感故瓔珞下云是名三受三苦苦行苦壞苦苦受樂受捨受二受善緣因果苦𢙣因果俱舎論云捨行微細順於善故故唯善感光記引婆娑云問何故捨根唯善業感非不善耶荅捨根行相微細寂靜智者所樂故善業感諸不善業性是動故不能感捨受異𤎼已上三未至等諸定捨故問瑜伽顕唯識等論初二近分皆是喜受如何今言未至定捨荅且依小乗而作此俱舎等許八近分皆捨故大乗不然如向所弁以此准知者㨿理釈成以此三理得准例知雖名極樂亦有捨也若謂不然者計重釈若謂名極樂故不可捨相應者亦不得與喜相應以彼土名極樂界故𨿽名極樂與喜相應何妨名極樂亦捨受相應問依三受門樂攝喜故可名極樂何例捨受荅稱讃經云無有憂苦唯有喜樂故名極此約五受立極樂名故今論釈於義無失問若許有捨諸聖悲花本願云山陵塠阜大小䥫圍湏㫆大海亦無隂蓋及諸障礙煩𢙉之聲無三𢙣道八難之名無有受苦之名及不苦不樂名寳積十八云彼極樂世界亦無苦受不苦不樂受名尚無假何實苦是故彼國名為極樂世親攝論十云受用如是清淨佛土一向淨妙者謂淨土中無有不淨糞穢等事唯有樂受無有苦受無記受一向無罪者謂淨土中無有不善亦無記一向自在者謂淨土中不待外緣一向所欲随自心故𭩮論十五云但受妙樂無苦無捨故言一向樂已上悲花寳積別極樂前後攝論明淨土故知一切淨妙土中無有捨受荅可有捨受道理分明唯識論意七八兩識至佛果位尚恒捨受如前論前六轉識猶佛果位與三受俱謂喜樂捨故論五云得自在位唯樂喜捨諸佛已断憂苦事故已上佛果八識與捨相應淨土眾生寧無捨受但會經論恱之受恒可得起見聞覺知皆順心故捨受不然起希有故若喜樂心歇减之位若入捨定雖得起而非恒時故少属無以為無捨
