body:
  text: 本為一切衆至不平等過是第一問先審次難初文應知次難兩邊初一邊二若一切衆生悉得生者一為度盡無窮生故不可佛國土壞敗何因極樂有終盡日阿㫆𨹔佛有𣵀槃時二菩薩不應發願菩薩願云若有衆生往生未盡我先生者不取正覺故知為先一切往生菩薩不可有後生義而言衆生生盡我生明一切衆生不可悉生也次一邊三若一切衆生有不生者一道理謂逆謗者尚得往生有何罪人更重此者不得往生二經文謂觀經言亦令一切衆生得生若有不得應非衆生三大悲謂大悲願普遍法界何隔一數而不令生無限大悲有不平等過本此有二釋至一切者也答第一問文自二義第一亦二初正辨義一切衆生悉可往生以佛大悲無有限量普起慈心咸與利樂廣大願不蕳𭜨親平等攝故次若爾下徵難述成若悉生者前所設之初邊難復云何通答意云雖盡令生衆生志願種種差別不能並生即有五因一不信正法二樂著小乘三愛處穢方四苦住穢五樂求餘國如是種異行異心雖皆可生無盡生者譬如衆生悉有佛性雖當成佛未必盡成如也盡成衆生界盡此亦如是於義無妨且觀一類者下正所難謂觀一類樂生西方機緣略盡菩薩發願如來入一切衆生非無生理第二義意有衆生中不往生者如經言者引遺教經釋迦化顯㫆𨹔義其義可解雖佛廣大者下正會難雖無限悲盡衆生界然其受化唯度有緣故往生等者據理釋成故往生機即有限量如來度菩薩後往觀音補處故往生徒非遍一切者也初義相似皆成佛宗言佛慈悲所及衆生皆有生理如一切衆生皆有佛性故次義稍同相宗繫屬言佛慈悲雖遍法界機緣有分限有不生理故問報佛何答據授記經且述化邊或報身佛有入義本既言淨土至何有母耶是第二問既言淨土者捐三十種益無女人如何等者出其相若無女人等者正難謂彼經云爾時世尊告諸比丘今當為汝宣西方安樂世界今現有佛號阿㫆𨹔若有四衆能正受持彼佛名號以此㓛德臨命終時阿㫆𨹔佛即與大衆往其人所令其得見已尋慶恱倍增㓛德以是因緣所生之處永離胞胎欲之形純處群寶蓮華中自然化生具大神通光明𭴢赫阿㫆𨹔與聲聞俱其國號清𣳾聖王所住其城縱廣十千由旬於中死滿𭃯利之種阿㫆𨹔如來應正遍知父名月上廣乃至阿㫆𨹔佛與大比丘六万人俱問智度論云阿㫆𨹔佛亦有嚴淨不嚴淨土如釋迦文誰知清𣳾別穢土故安樂集明㫆𨹔國土通淨穢彼經云爾時阿㫆𨹔佛與聲聞衆俱國號清𣳾廣乃至上來所並是化身之土若是淨土豈有輪王及城女人等也已上準所引意料蕳經文初明極樂阿㫆𨹔佛與聲聞俱下別更穢土清𣳾要集亦據安樂集義是應道理何極樂處有女人義答者經文㔟一具不殊更不可言別淨穢故今問答及第五卷證淨土義又慈恩佛土章中以彼經為化淨土玄贊等中為報土海東亦釋化身淨土小經記云或聲王中有父母是顯彼佛所在穢土者是義不然所以者何彼經既寶蓮華中自然化生具大神通光明赫𭴩又文言有二菩薩一名觀世音二名大㔟至此二菩薩侍左右此等皆是淨土相故不異觀經之所故當知彼經所提婆達多及魔王等皆於淨土變化所作已上同宗要意亦復同之安樂集等人情而已本今為二釋至成等正覺答第二問文自三義第一釋中即有其二一明佛有受用變化兩經不謂觀經第九觀佛是受用身鼓音聲有父母等是淨土中變化身也二又受用等者明受用身中化分假變易兩種菩薩故所現既異謂他受用所化衆中有二菩薩一分假身悲增七地已前諸位此諸菩薩三家受生即有父母親屬等類示同此衆能化亦現父母王國等種相二變易身智增初地悲增八地已上諸位此諸菩薩捨穢質身受淨妙報無礙自在為此類故佛現化生便無見母此一義分可為二義所以合者觀經所屬報義同故不別立問他受用身於色究竟大自在宮成等正覺何為分假身現父母等耶答諸佛應機如水順器故他受用為化二位現異種身有何妨得謂為變易身諸菩薩示化生身於色究竟成菩提道為分假身現胎生身捨國城等得究竟果故玄贊七云他受用身有父母等鼓音王經阿㫆𨹔佛父名月上母名殊勝妙顏有子有魔等化七地已前有分假死故有父母等為八地已上有變易生理無此事不生死故三身章云此他受用雖有父母亦現受生無實女人佛及菩薩化為母等化分假身故現此相化變易身未見誠又拪復鈔云問阿㫆𨹔佛準經所陳乃是報身何有度答是他受用身他受用身應八地已前悲增菩薩可有度示同所化受分假身有生故故㫆𨹔父名月上母名殊勝妙顏若對智增八地已上他受用身生即無已上問佛土章云第三辨因行門云西方通於報化二土報土文證如前所化土證者鼓音王經云阿㫆𨹔佛父名月上母名殊勝妙顏有子有魔亦有調達亦有王城若非化身寧有此事故觀經九品生中有阿羅漢須陀洹等已上是鼓音經以屬化土一師解釋何成相答慈恩即存通報化義故約一義述經文耳彼下釋曰其土通報化二土若依前解此是他受用身示現亦有父母王國實即無之實無女人𢙣道怖等九品生中阿羅漢等借彼名實是菩薩二釋任情取捨隨情已上無垢稱疏全同之矣準此等釋若約化土父母等是實業所生若約報土父母等是佛假示現第二義二一者略解二言國下一廣釋初略解中先釋次例後結應知例中如維摩經者彼經上云爾時會中有菩薩名普現色身問維摩詰言居士父母妻子親戚眷屬吏民知識悉為是誰奴婢僮僕裊馬車乘皆何所在於是維摩詰以偈答智度菩薩母方便以為父一切衆導師無不由是生法喜以為妻慈悲心為女善心誠實男畢竟空舍弟子衆塵勞隨意之所轉道品善知識由是成正覺諸度法等侶四攝為妓女歌詠誦法言以此為衆樂𢝰持之林無漏法林樹覺意淨妙花解智惠果八解之浴池定水湛然滿布以七淨花浴此無垢人象馬五通馳大乘以為車調御以一心遊於八正路相具以嚴客衆好飾其姿慚愧之上服深心為花富有七財寶教授以滋恩如所修行回向為大利四禪為床坐從於淨命生多聞增智惠以為自覺者甘吕法之食解味為漿淨心以澡浴戒品為塗香又梁攝論云一方便為父二般若為母三禪定為胎四慈悲為眷育五信樂大乘為種子已上經論意同故引而合如文殊等者重引花嚴顯示物名是㓛德法六十花嚴四十六云爾時文殊師利菩薩建立彼諸比丘菩提心已與眷屬漸遊南方至覺城東住嚴幢娑羅林中大廟處過去諸佛所遊止處已上雖不顯覺城東者是法門名準下偈文定應表法所謂文云爾時善財童子從文殊師利聞佛如是諸㓛德專求菩提以偈頌曰三有為城墎高慢為圍墉諸趣為劫歒漸愛為塗塹故探玄記云準下文城山處等所有名義皆是法門之所表也謂覺者表於生死有覺察故城者防歒外難內守法故即覺用也東者開明之始表是覺發之初蕳終位之覺故云也已上又上四十四云無上轉輪王勝妙三昧城空觀妙宮殿慈悲大莊嚴已上準知城者必所表耳二言國下廣解釋中雖有諸法之所表等不出理智禪定慈悲如其所應詳審觀察於中性淨曰清者真如法界其性明白無垢無染故云清淨躰寬稱泰者泰是大也理躰廣大稱曰泰也佛界所有過恆沙德皆依真理如万物依止大地故國表理鏡智亦依圎成實性如城依國故城表顯大圎鏡智真智𭇥十智者其圎鏡智現十智影一世俗智二法智三類智四苦智五集智六智七道智八他心智九盡智十無生智若約二乘束十為二有漏無漏性差別故若鏡智影十智無漏如來無有漏種故問何佛俗智答後得無漏能緣世間俗事轉故問何法類等答法類二種如其次第以欲上界四諦為境法智類智由境差別分為苦集道四智他心智者如通中辨言盡智者謂無學位若正自知我已知苦我已斷集我已證我已修道由此所有智見明覺解惠光觀是名盡智智謂決斷或謂重知見謂推度或謂觀照明謂照明覺謂覺悟解謂達解惠謂蕳擇光謂惠光觀謂觀察智等八種並惠異名又雜集論十云盡智者謂由因盡所得智或緣盡為境所以者何由有盡故而起此智名為盡智或緣盡為境故名盡智此義意言於此位中由永斷集令無有餘所得智名盡智或緣因盡為境故名盡智由因盡所得智者集諦名因由集諦斷所得勝智名為盡智緣因盡為境者煩惱盡名為因盡緣此理而為境智名為盡智無生智者謂正自知我已知苦不應更知我已斷集不應更斷我已證不應更證我已修道不應更修由此所有智見明等名無生智又雜集論十云謂由果斷所得智或緣果不生為境所以者何由有無生故所得智名無生智或緣無生為境名無生智此義意言由有當來一切苦果畢竟不生法性故而得此智雖緣餘諦為境亦名無生智或緣苦諦無生為境故名無生智準前盡智可解文意能有十力者一智各有一力用故合曰十力或準俱舍處非處等十力即以十智為躰故曰十智能有十力具如第五卷記因十度成者十智十力皆依等十波羅蜜而得成就如是多十悉具足故名為十千鏡智中有法王種子者鏡智相應第八淨識執持如來法王恆沙無漏㓛德諸法種子無減故如第一記金喻定勝餘三昧者此定能居修道最後斷結道位準對法論具四義故勝餘三摩地一無間二堅固三一味四遍滿無間者謂此相續流非世間行所間故堅固者非一切障所壞能壞一切障𫽄堅固故一味者無分別性純一味故遍滿者緣一切所知法共相真如為境故彼論引經云為顯此義薄伽梵如大石山無無隔無一假𫽄善圎滿十方猛風所不動轉已上平等性智常觀鏡智者果位性智常觀大圎鏡智㓛德能為利益所謂𮗚知鏡智㓛德能擊發𡸁利他益也此三智居鏡智之後者轉識三智隨順本智如世間第從舍兄後故曰居後三智影從鏡智種生如世間子從父母生故曰生子觀諸煩惱即是𣵀槃者智能觀達煩惱即息是名為煩惱𠰥妙智此顯言即菩提非謂煩惱躰即菩提性宗明義惑躰即智不足釋問若依此義自受用身必由智度及方便等應有父母若許即有莫大過失答憬所難非必盡理就化他土有此相作表示釋經不自受用土故釋亦不釋餘文可解不須重詳第三義二一先明菩薩成道不同二今阿下依例釋成初文中二先𢝰摽次別釋釋中亦二一廣明因行果成依願不同二別明末後出家成道不同一廣明中或有菩薩至亦無有異如悲花經第三卷㔟至成道觀音成道名㓛德山王彼佛在世㔟至輔翼請轉法輪隨其法所經時節於其中間行菩薩道佛𣵀槃後正法已次得成佛其界莊嚴及國劫名與前佛世等無有異或有菩薩至更別立稱如同經阿𢏏𨹔佛正覺已前尊音王佛不可思議㓛德王佛等無量佛次第出世界常住無有變異然國劫名與前各異如或名㫆樓光明或名尊善無垢等也問一世界名各別者經文分明劫名異者經未何答界名已轉劫何不然無量無邊諸佛出世佛壽命各久遠定非同劫故云爾也或有菩薩至經中具案授記經悲華第三觀音成道彼土轉名一切𭹀寶所成就世界所有種莊嚴無量無邊安樂世界之所不及故云皆轉或有菩薩至悲花經悲花經明無上念一千王子八万四千諸小王等往他方界成等正覺此等者結二又如下別明中菩薩童子出家成道者如梵網言釋迦菩薩七歲出家但常途更勘餘菩薩納妻等者如智論云釋迦菩薩十九踰城捨國王位三十成道教化衆生大通佛等亦此例也龍女作佛鶖子成道及餘文明不能更解本如舍利弗至所能生也是第三問難五通超舍利弗等非是凡夫聲聞五通不越三千大千界者問俱舍論云即此五通於世界境作用廣狹諸聖不同謂大聲聞麟喻大覺不𫽄作用如次能於一二三千諸世界境起行化等自在作用若𫽄作意如次能於二千三千無數世界智論九云弟子中天眼第一阿泥盧豆暫觀見小千國土諦觀見二千國土辟支佛暫觀見三千大千國土地持論三十住論九亦復同此若準此應言聲聞五通境界不過二千何言不越三千大千答今約二乘𢝰云三千等者等取餘羅漢及麟喻覺故故至答文通以二乘挍量大乘又智論五云小羅漢小用心見一千國土大用心見二千國土大羅漢小用心見二千國土大用心見三千國土辟支佛亦爾言亦爾者大小支佛各有大小用心差故若據此舍利因連等大聲聞通至三千故今無失前解為正順常途故合答文故本此義不定至有漏善根答第三問文有其二先質次釋初文可知第二只如下正釋亦二初例釋次引證成例中亦二先舉人間北鬱單越定無中叐有頂八万還有中以例淨土雖是凡夫緣力勝故通力超過此方聖者言緣勝者即有五種一業力勝發菩提心修定散行一念㓛德深廣難測二乘修㓛之所不及此之勝業為增上緣往生淨土故曰業勝二果報勝謂淨土報乘佛願力五通自然豈同小乘自力熏習三威靈勝謂佛菩薩大威神德加𬾨力故發通𫽄強非二乘境四資緣勝謂淨土生大乘法味之所潤持故資緣好法能發惠能起通故勝二乘五妙定勝謂大乘定㓛力難思故所發通超過二乘所緣通境不可倍據此五勝淨土𭂫夫勝此方聖何所怪也次又五趣等者舉業通超二乘通以例淨土𭂫夫神通勝於此聖中有業通過二乘者俱舍論九釋中有行速門云一切通中業通最今文依斯問業通雖何過二乘神境通力故婆娑神境通力行㔟迅速勝諸中有答光記云問此論中一切通中業通最是即中有行最何故婆娑第七十云如是者神境通力行㔟迅速非諸中有解云此論言者是無得義謂無能得往受生故言最非謂行婆娑據行故言神境通速非諸中有故婆娑通經云經業力勝神通者依無障礙業力勝𭂫欲受生上至佛等亦不能若依行㔟而作論者應神通勝於中有謂獨覺等佛能得佛不作意不能出三千界亦有所礙此中有去無能得者若作此同婆娑論又解神境通有三種謂意㔟勝解運身此論言一切通中業通最者約運身而據少分一切謂此中有望彼運身速婆娑約意㔟勝解故言神境通非諸中有各據一義亦不相已上問初解不明俱舍明中有行速門言業通何無得義無得門第四別門似二門混次解不明既言一切豈唯運身答若言不約無得邊者婆娑過故者俱舍上述一切通中最下結上至世尊無能是非兼無得明行速義耶第四無得與此義異謂五根五塵𫽄微成有對質得然中有身其躰薄不金故據此義立第四門第一無得佛力法力不能留難速至生處名為無得故雖同言無得義異耳次解意者業通雖速傳識受生可經多時全不可等勝解意㔟極以速迅故約運身釋少分義二故經下引證成中經等者寶𭩮經云若發菩提心求一切智是人受衣敷大地受揣食若須㫆山亦能畢報主之恩當知小乘之極果不及大乘之初心已上又𣵀槃對小乘天眼讃菩薩肉眼如第三記問小乘人空無漏善根即是菩薩生空真如何彼生空比類初心有漏善根答大小所證生空妙理雖是義等能顯之人心品有異謂小乘者意樂狹少上不求菩提下不化有情是故不及大乘初心菩薩一念菩提心也故花嚴云菩薩於生死最初發心時一向求菩提堅固不可動彼一念㓛德深廣無涯底本未知往生至變易生死是第四問文意可知分假變易如前本彼土菩薩至微妙難思答第四問文即有二一直解問二然壽下會通伏難初文中八地已上是變易者彼位無漏相續不斷不起煩惱無潤生義故離分假唯受變易唯識義六如第四記七地已還初果已上或是分假或是變易者悲增分假七地已前猶分假故智增變易初地已上成變易故言初果者即捐初地始得無漏證生空故大嚴論初地見道名法眼淨是初果名今亦如是又七地已還者顯示直往七地已還初地已上依有智增悲增差別而有變易分假不同初果已上者顯示迃回預流已上支佛已前智增機類異故或是分假或是變易論言巧便互顯而已直往三賢及十信等皆分假者羅漢回心十信三賢猶有變易為蕳彼類別云直往也次然壽下通伏難者伏難意云若分假身一壽命短促此死生彼二形色卑穢血肉質得三心智擁滯應不自在故會通云雖分假身然合佛願壽命遐長若非願者無捨壽死會初難亦佛願力顏容端正色相具足無無𫽄壽經上云顏貌端正超世希有容色微妙非天非人皆受自然無之身無𫽄之躰憬興釋云無𫽄者無障故希有故通二難復佛願故得神通身心自在微妙難思解二難此等義如三十種益本淨土之中至無何苦也是第五問文意分明三苦者俱舍二十二釋諸有漏合三苦故皆是苦諦云有三苦性一苦性二行苦性三壞苦性諸有漏行如其所應與此三種苦性合皆是苦諦亦無有失由三苦合名苦無失此中可意有漏行法與壞苦合故名為苦諸非可意有漏行法與苦合故名為苦除此所餘有漏行法與行苦合故名為苦與壞苦合𢝰名壞苦與苦合𢝰名苦與行苦合𢝰名行苦謂樂等三受如其次第由三受力令順樂受等諸有漏行得可意等名由樂受力令順樂受相應俱有等諸有漏行得可意名由苦受力令順苦受相應俱有等諸有漏行得不可意各由捨受力令順捨受相應俱有等諸有漏行得非可意非不可意名又論云若諸樂受由壞成苦性如經言諸樂受生時樂住時樂壞時苦正理五十七尺經云樂受生時住持樂者由彼樂受性是樂故壞時苦者謂諸有情未離染時心求樂壞位起憂愁等故樂受為壞苦性樂受壞時設無苦受似苦顯現亦名為苦若諸苦受由躰成苦性如𭑕經言諸苦受生時住時苦若諸苦受由躰成苦性經言苦受生時苦住時苦故名為苦壞時樂故正理釋經云苦受生時住時苦者由彼苦受性是苦故壞時樂者受壞時設無樂受由苦受息似樂顯現故亦名樂於相續息位立以壞名故苦受息時名苦受壞不苦不樂受由行成苦性衆緣造故如經言若非常即是苦捨受由生無常行成苦性衆緣造故其性不安念生如經言若非常即是苦故正理云不苦不樂受生時住時皆非苦非樂性是捨故即彼壞時苦樂隨一容現前故可言俱有苦樂壞時無容有二故佛於此作異雜集論五云云何苦性幾是苦行為何義故觀苦性耶謂苦受自相故隨順苦受法自相故是苦性義苦受自相者謂苦受即用苦躰為自相故名苦性隨順苦受法自相者謂能生此受根境及相應法隨順苦受故名苦性一切一分是苦性為捨執著有苦我故觀察苦性薀界處三科一分名一切一分云何壞苦性幾是壞苦性為何義故觀壞苦性耶謂樂受變壞自相故隨順樂受變壞法自相故於彼愛心變壞故是壞苦性義此中樂受及隨順樂受法於變壞位能生憂惱故此變壞是壞苦性又由愛故令心變壞亦是壞苦如經中入變壞心一切一分是壞苦性為捨犱著有樂我故觀察懷苦性云何行苦性幾是行苦性為何義故觀行苦性耶謂不苦不樂受自性故隨順不苦不樂受法自相故彼二重所攝受故不離二無常所隨不安隱故是行苦性義不苦不樂受者謂阿賴耶識相應受隨順不苦不樂受者謂順此受諸行彼重所攝受者謂苦壞二苦重所隨故不離二無常所隨不安穩者謂不解二苦故或於一時墮在苦位或於一時墮在樂位非一切時唯不苦不樂位是故無常所隨不安穩義是行苦性除三界二處諸薀一分一切行苦性三界者謂意界法界意識界二處者謂意處法處一分者除無漏相為捨執著有不苦不樂我觀察行苦性已上若約界分別者摳要下云若依生苦相初二唯欲後一通三若據其性苦唯欲有迫緣故壞苦通色界有樂受故如經中變壞心後一通三界已上次八苦者婆娑七十八云生是一切苦安足處苦之良由故名生苦老能𮕱變可愛盛年故名老苦病能壞可愛安故名病苦死能斷可愛壽命故名死苦不可愛境與身合時引生衆苦故名非愛會苦諸可愛境遠離身時引生衆苦故名愛別離苦永如意事不果遂時引生衆苦故名求不得苦如是諸苦皆是有漏取薀所攝故名略一切五取薀苦雜集論六云生衆苦所逼故餘苦所依故衆苦所逼者謂曾於母胎生𤎼藏間具受種種𫽄不淨物所逼迫苦正出胎時復受支躰通切大苦餘苦所依者謂有生故老病死等衆苦隨逐老時分變壞苦故病大種變異苦故死壽命變壞苦故𭜨增會合會生苦故愛別離生苦故求不得所希不果生苦故略攝一切五取薀重苦故如是八種略攝為六謂逼迫苦轉變苦合會苦別離苦所希不果苦重苦如是六種廣開為八轉變苦中分三種故若六若八平等已上本若依小乘至苦壞苦也答第五問文即有二一解佛果苦有無相二十地下明因位苦有無相第一解果苦中亦二先小次大初小中若依小乘者指示所依佛身猶有三苦等者摽列苦數於中先明三苦皆具次明具八苦中五苦三苦具者準有五苦可知其相謂佛前十五界一向有漏後三界亦通有漏故次明有五中以如來等者述有八苦中五苦由謂如來身十八界法前十五界唯是有漏道諦無為所不攝故謂五根五境是色法無了別故非道諦無漏亦有為故非無為無漏故唯有漏五識雖心無強蕳擇故非道諦無滿道諦能蕳擇故亦有為故非無為法是故凡聖前十五界皆是有漏非無漏也復三界法通漏無漏所謂意界及意識界唯有二類道諦所攝即是無漏不漏增故餘唯有漏隨增故法界有三一有為無漏道諦所攝二無為無漏空非擇二漏不緣故名為無漏非道諦因非諦果故染不緣三有漏法謂除前二餘名有漏隨增故此與大乘經部等異如來身心是有漏故有生等五苦性也然斷貪嗔等者述無八苦中三苦由謂以佛斷貪愛等故能得遠離愛別等三愛別離苦是愛結故斷愛即離𭜨增會苦是恚結故斷嗔能離求不得苦是貪結故斷貪亦離佛雖愍諸等者顯示如來離三苦相琉璃王誅諸釋種者顯因果集引增一云波斯匿王太子毗琉璃登王位後集四兵衆向迦毗羅取諸釋種九千九百九十万人放醉象令踏𭣦於諸種竟還歸本國過七日後王及兵衆身壞命終墮阿鼻獄比丘問佛釋種往昔有何因緣今受此報佛告比丘過去久遠此羅城有捕魚𢩭時世飢儉有大池水又多饒魚城中人民捕魚食之時有二魚一名𭷖璅二名兩舌各相謂言我等無咎人民𭣦食若我等身中有微少善者必於將來當報此𭜨昔捕魚者今釋種是昔𭷖璅魚今琉璃王是昔兩舌魚今好共梵士是此諸釋種由𭣦魚故無數劫中墮獄受苦餘殃未盡今受此報以此因緣一切衆生勿行𭣦生已上𣵀槃經𭣦多釋種切割諸釋女手足等如第五記非愛別離苦者𣵀槃卜四云琉璃太子𭣦諸釋𫞕壞迦毗羅城阿難爾時心懷愁惱發聲大𡘈來至我所作如是言我與如來俱生此城同一尺種云何如來光顏如常我則憔悴我時答言阿難我修空定故不同汝已上誠知世尊斷除諸愛等證得我空故無此苦下之二苦無準知調達出血者諸經是五逆中第五之逆亦九惱中第三之惱栴繫盂者興起行經下云佛告舍利弗往昔阿僧劫前爾時有佛名盡勝如來爾時有兩種比丘一名無勝一名常歎爾時波羅㮈城有長者名大愛有婦名曰善幻兩種比丘往於其家以為檀越善幻婦者供養無勝四事無乏供養常歡至為微薄何以故無勝比丘斷於諸漏六通具足常歡比丘結使未盡未成道故也常歡自言無勝比丘與善幻通不以道法供養自以恩愛耳汝知爾時盡勝如來弟子常歡者則我身是善幻婦人者則今波羅門女名栴者是我爾時無故誹謗無勝羅漢以是罪故無數千歲在地獄中受諸苦痛今雖為佛為諸大衆法要時以餘殃故多舌童女舞盂起腹來至我所曰沙門何故不自家事乃他事為汝今獨自樂不知我苦耶何以故汝先共我通使我有身今當臨月事須蘇油養於小兒盡當給我爾時衆會皆𫢏頭默然時釋提桓因侍後扇佛以神力化作一鼠入其衣裏嚙於舞盂忽然落地爾時諸四部弟子及六師徒等見盂墮地皆大歡喜揚聲稱慶欣笑無量已上西𫭫記云衆中一人起持木盂示彼女曰汝兒耶是時也地自開圻今身墜陷入無間獄及受其殃火坑毒飯者十輪經云衆魔外道於我自身及我徒衆深生憎嫉為害我故假設𭹀膳雜以毒藥暗置火坑偽敷林座西𫭫記云摩羯陀國有大深坑室利毱多唐言勝蜜以火坑毒飯𭓯佛處勝密者宗信外道深著邪見諸梵志曰喬答摩國人尊敬遂令我徒無恃賴汝今可請至家飯食門穿火坑滿中縱火𢯆以杇木䨱以燥土凡諸飯食皆雜毒藥若𪞁火坑當遭毒食勝密羕命設毒食城中之人皆知勝密於世尊所起𢙣害心咸皆勸請願佛勿往世尊告曰無得懷憂如來之身物莫能害於是受請而往足履門閫火坑成池清瀾澄鑒蓮華㫆漫勝勝密見已憂惶無措謂其徒曰以術免火尚有毒食世尊飯食已訖為妙法勝密聞已謝咎歸依已上增一四十一同斯乞食空鉢者智度論云婆羅門城王作制限法若有與佛食聼佛語者輸五百金錢其後佛到其國入城乞食衆人閇門鉢空而歸是時有一老女持破瓦器盛涳出門將見佛鉢空漸來思惟如是神人降身行乞愍一切故信心清淨慚愧白佛且欲設供更不能得今此㢢食須者可取佛知其心受其施食微笑出五色光普照天地告阿難言是老女佛食故十五劫間天上人中受福快樂後得男身出家學道成支佛爾時佛邊波羅門立設偈云汝是日種𭃯利性淨飯國王之太子而以食故大妄語如是臰食報何重是時世尊出廣長舌䨱面上至髮際時婆羅門忽然合掌白佛若人舌能䨱鼻言不妄何髮際心開意解五躰投地悔過甚深時佛為種法得初道果即舉手大聲言一切衆人甘露門開如何不出城中一切婆羅門皆送五百金錢與王佛供養破制限法永歸佛法尼㸸𨹔樹成小因大果義今略抄遇飢饉世者出喻經如序分義凡佛生身現受如此種苦惱必依宿業有此事故智論明受九罪報一者梵士女𭮑𨹔利謗五百阿羅漢亦被謗二者婆羅門女繫大杵作腹謗佛三者提婆達推山壓佛傷足大指四者迸木腳五者毗樓璃王興兵𭣦諸釋子佛時頭痛六者受阿𦒿達多婆羅門請而食馬麥七者冷風動故脊痛八者六年苦行九者入婆羅門聚落乞食不得空鉢而還復有冬至前後八夜寒風破竹索三衣禦寒又復患阿難在後扇佛如來等世界小事佛皆受之已上興起行經有十緣上卷六下卷宣四一𭮑𨹔利謗二𦒿奢㫆謗三頭痛四者節煩疼五背痛六木槍腳七提婆達多擲石八婆羅門女栴謗九馬麥十苦行舍利弗請問經七緣云云次大乘明義者以佛三科皆無漏故一切不善皆悉斷除一切善法畢竟成就云何今實有不善報方可受得感生死等諸苦患耶但為衆生方便示現塵土坌身𮓜狼畏心故智論云阿泥盧豆與一支佛食故受無量世樂心念飲食應意即得何佛世割肉出髓以施衆生而𠧒食不得空鉢而歸以是事故知佛方便為度衆生故受此諸罪云何方便憐愍未來世五衆佛弟子施福薄故𠧒種自活之具不能得諸白衣言汝衣食不能得有病不除何能得道以益於人是五衆當答我等雖無活身小事有行道福德我等今日衆苦是先身罪報今之㓛德利在將來我等大師入婆羅門聚落乞食尚亦不得空鉢而還佛亦有諸病釋子畢罪時佛亦頭痛何我等薄福下人諸白衣聞已嗔心則息便以四種供養佛供給比丘身得安穩坐禪得道是為方便故非實受罪乃至廣諸罪因緣皆亦如是已上故𣵀槃等者證而顯諸佛所得常住無有生死等苦言法常者𣵀槃法是自性常故餘五薀是或不斷常三常住如第二卷記次維摩𢝰證佛身無漏故無三苦八苦佛三科是皆無漏者如第一記瑜伽等第二明因位苦相中先摽次釋自二義第一義二一初至諸報身故略明有八苦一三苦中二又於下廣明三苦八苦有無相初文中二先摽苦數次以十下明有苦所由謂若分假若變易皆是有漏業異𤎼報故未得免五取薀苦及行壞苦變易生死實是有漏三界攝者如第一記次廣釋中二初至唯無苦明三苦有無又於行苦等者明有行苦蕳無漏行有為無漏雖是流非行苦故問道諦有為何非行苦答俱舍二十二云道諦非苦害聖心是行苦相非聖道起逆聖心由此能引衆苦盡故已上有漏樂生等者明有壞苦蕳無漏樂無漏快樂無退壞故又無漏能破衆苦故彼無逼迫等者顯無苦既稱極樂何有逼迫身心憂苦次初受下明八苦有無於中初受彼身等者明無生苦即有二因一非衆苦依故二無逼迫受故生苦有二因一衆苦逼迫故二衆苦所依故如向已雜集論今翻彼耳命極長遠等者明無死苦壽命長久不可勝言縱雖𭂫夫終成變易究竟成佛無有死苦以本願故修短自在雖捨彼命生於餘國而非業報受苦之死此五薀等者明有薀苦若分假若變易報從惑生躰是有漏故五取薀苦也行壞二苦取薀一苦有漏為因故略廣中明有三苦由皆有漏言問要集云金之報無五盛苦與今何答作者本宗是各別故謂今論者位登十地身成變易未捨異𤎼躰是有漏故言猶有漏故言猶有五取薀苦要集意者許變易實無漏色質無漏金更無壞故約終得法性法身言無隂苦此相宗義彼台家意以由斯故二義異耳導和尚云淨土之中一切聖人皆以無漏為躰大悲為用畢竟常住離於分假之生恐與要集其義同焉淨佛國土者明無病苦夫發病緣略有其五一四大不順故二飲食不節故三坐禪不調故四鬼魔得便故五前業所感故四大不順者地水火風其性各殊鵄梟共捿蟒鼠同更互侵無時有安外㔟助火火𭤽破水是增火病外寒助水增害火是為水病外風助氣吹火火動水是為風病或三大增傷𭓯於地名等分病或身分增𭓯餘三大亦是等分屬地大病此四既動衆病竸生力均和不生惱患淨佛國土四大調適無有增減所以者何寒暑外調不冷不善業內𤎼是妙是勝內外因緣能相應故令其四大而安穩也今文偏表四大安穩為無病由若廣論則非無餘緣飲食不節者或有不計多少成病或有不節時候生惱或噉不安食俄起急患或食不應藏漸為宿痾千病万病無不依食故要攬云夫病從口入禍從口出故君子慎言語節飲食彼安養𭃯若欲食時百味飲食自然盈滿雖有此食實無食者見色聞香自然飽足身心懦無所味著此是㫆𨹔後得大悲之所變現無漏妙味寧生有患坐禪不調者或身儀不正或心增怠慢魔得其便使人身躰背瘠骨節疼痛或止觀不平若上若下若急若緩悉成病患而極樂界定水湛然八解浴池能洗塵勞惠日赫𭴩三明朗光方卷翳膜定惠克調寧結病根鬼魔得便者𢙣鬼邪魔令人時心忽狂亂撗發勞惱修道病纍多依於斯諸淨土中無有鬼魔縱令雖有或是應現護持正法無作事業如何發病業所發者前世犯罪今生必感多病短命或現破戒動先世業之故成病身口意病三業罪生根藏腑從五戒犯起彼西方者佛願風扇罪障塵𭠎淨業花開妙果實結有何所催招業乎故知淨土諸緣悉無病苦也形無𮕱等者已下明無老等四苦其義可知第二義中二初明八苦同前次三苦下明三苦中唯有行苦無餘二苦於中由受等者述有行苦所由分假變易躰是有為有漏報故未離念流行苦故有行苦也雖有樂受等者述無壞苦由淨土快樂相續無斷究竟永證寂真樂若轉捨受雖有少息不生苦受非壞苦也文不解無苦所由同前義故彼下結也本既彼淨土至為極樂也重難第二義意兼第一義謂彼淨土雖無三苦中苦壞二及八苦中生等七苦而猶得有三中行苦八中隂苦如何名為極樂國土故上等三中壞苦八中七苦下等取八中隂苦問何故知但難第二義答下解文唯第二義故或又𢝰問前之二義然答文者為少屬無偏述第二非不會前若會一義前一義亦能被會故本三苦之中至為極樂也救其重難文自二義第一義者𦆵雖有三八中餘一以少歸無名為極樂如𣵀槃者下例而成其義可知又逼迫下為第二義通迫身心令不安穩憂苦彼無名為極樂不可以有行隂致難行隂兩苦雖名為苦非重逼故在身在心者逼迫之受在五識苦在心識憂五識必屬有根身起故名為身憂強思起故唯在心本觀經言分至苦衆生耶是第六問先引次難文易可了本今言度苦至土苦衆生文即有二一自反徵二自通會經言度苦通度自土他土苦也或今言下至苦衆生耶猶是問餘謂上正難今因問其自他土苦答通度等者先答自他土若爾釋日兩字恐增是𭂁誤也本自土既無至他方苦耶徵難通度自他土苦難意易了本自國衆生至多怒𭓯處正救難通自他土苦兼會本難辨通自他土相則度苦之義自顯故也文有二假一明度自二明度他第一度自土者自國衆生雖無苦然非無彼二種生死微細行苦其相已辨如來同集為妙法令速出離故名度苦二他國下述度他土苦即有三相一化佛菩薩自往他方親為救故分身佛遍滿十方如此土人淨業成就臨命終時化佛菩薩來往彼或冝身下至來往彼文是也如此土者舉於一方顯餘九方示於一土令知多土二遍十方界分身佛等歸還本土遠為利益故集本國救他方沇或冝歸下文是也遠為益者於極樂界遙談利生方便事故又於本國遙為加𬾨成利益故三化佛菩薩雲集極樂化諸菩薩令興大悲捨自土樂度他方苦或言度下文是也救他方苦雖出三相次二正會集極樂文初一身往成救濟故更非雲集本國義也如經論者引例而成覺動大悲如十地經論第十八地菩薩𨈣寂樂上不見菩提可求下不見衆生可利諸佛七勸令趣利他言七勸者第一勸為成就諸佛十力無畏十八不共等㓛德故勤求精進乃至第七勸觀十方無量衆生無量法差別通達彼事七勸已云若諸佛不為此菩薩起智惠門轉者是菩薩爾時即入𣵀槃棄捨利益一切衆生以諸佛與此菩薩無量無邊起智惠門故於一念中所起智業比從初發心以來乃至竟第七地百分不及乃至無量無邊阿僧分亦不及一已上又本業下云菩薩無生觀捨三界報變易果用入中忍無相惠出有入無化現無常自見己身當果諸佛摩頂法身心別行不可思議故名不動地問唯識三云又不動地以上菩薩一切煩惱永不行故法駛流中任運轉故能諸行中起諸行故𭃯那轉增進故此位方名不退菩薩已上真俗雙行二利任運何沇無相海濟度計耶答疏釋法駛流中任運轉故引十地論云八地已去菩薩於無相海任運而轉諸佛勸等乃至廣𭃯那真俗雙運以無㓛用故任運轉又餘處疏云第八地中得無相樂𨈣著不肯進修諸佛七勸方能進起撲法華攝釋云問案十地論云八地菩薩𨈣寂酒十方諸佛摩頂七勸唯識亦云於利他中不欲行障如何今任運而行七勸有障皆據利他不能任運非依自利實能任運進故又八地中有入住出勸為創入任運據後已上初釋意者第八地中未斷利他中不欲行障故利他㓛德不任運行是故諸佛勸令利生自行㓛德任運增進不假㓛用故八地任運而轉次釋意者第八地中有入住出七勸在入任運在後住出已去二尺俱許自利任運於利他行作異尺故不任運轉論文也問論注云菩薩於七地中得大寂上不見諸佛可求下不見衆生可度欲捨佛道證於實際爾時若不得十方諸佛神力加勸即便度與二乘無異今言八地豈非相答七地滿心八地創故論注約七地終言於七地中攝釋就八地始言勸為創入故準撲一義意者論注不今八地文又智論十云七住菩薩觀諸法空無所有不生不如是觀已於一切世界中心不著欲放捨六波羅蜜入𣵀槃爾時十方諸佛皆放光明照菩薩身以右手摩其頭語言善男子勿生此心汝當念汝本願欲度衆生汝雖知空衆生不解汝當集諸㓛德教化衆生共入𣵀槃汝未得金色三十二相八十種好無量光明三十三業汝今治得一無生法門莫便大喜是時菩薩聞諸佛教誨還生本心行六波羅蜜以度衆生已上言七住者即是七地所以知者僧侃疏會十地經言十地就終云在八地智論尅實七地終心惠影同之故知論注依智論智論若不十地者今亦何乖曇師所解故維摩等者初文顯示淨土菩薩化佛等勸令興大悲謂彼經言穢土菩薩於苦衆生大悲堅固知淨土中不見受苦故於衆生大悲不堅由斯義故化佛菩薩雲集本國令捨自樂救他苦次文顯示諸佛所勸大悲起故淨𭃯來至穢處故此二文釋成第三本阿㫆𨹔經至受相應乎是第七問意可覺本八識之中至捨受相應答第七問文有其二一明七八兩識恆與捨受相應二餘六轉下明三受相應第一明七八識中亦二先惣顯示因果七八恆捨相應次令準知極樂七八亦捨相應初文中言一類相續等者明因七八唯捨相應唯識論三尺因八云此識行相極不明了不能分別順境相微細一類相續而轉是故唯與捨受相應疏云一極不明了是捨受相若苦樂受必明了故此中憂喜入苦樂中依三受門不言憂喜二不能分別順境相取中容境是捨受相若是餘受取順境故三由微細若是餘受行相必四由一類若是餘受必是易此行相定故成一類五相續而轉若是餘受必有間斷此恆相續故唯捨受若許明了行相可知便應不能攝益相續若能分別順境相非真異𤎼真異𤎼者取境定故若動者應如餘心非異𤎼主顯行相難知異餘識也若許易即善𢙣趣皆悉不能互攝彼種許是善識能持𢙣種與理相攝論第三亦有此解若有間斷便非彼生亦不受熏已捨壽故性非堅故如餘心等由此五義必具有故便能受熏持種相續已上準之今論亦具五義一類第四相續第五緣境微細是彼第三難可了知是第一二謂難可了第一不了難知第二不能分別論文言巧妙𭇥五義但第七識有三師義第一師云唯有喜受恆內執我生喜受故我既欣行故唯喜俱第二師云前義不然應許喜受乃至有頂聖言故謂此識受一類而轉若許喜俱此喜應通三界九地若言通者瑜伽第十二初定出憂第二定出苦第三定出喜第四定出樂於無想中出捨根等若許喜樂通在有頂應許憂苦通三界有應第七四受相應謂生𢙣趣憂受相應緣不善業所引果報第八識故生人欲天初二靜慮喜受相應緣有喜地善業果報第八識故第三靜慮樂受相應緣有樂地善業果報第八識故第四靜慮乃至有頂捨受相應緣唯捨地善業果報第八識故第三師云前第二亦不應理此無始來任運一類緣內執我恆無轉易與變異受不相應故謂任運故恆一類故無變故唯捨受非是捨受可名變異有易故瑜伽六十三證俱生捨受第八識俱非可起餘憂喜等受亦證此義然樂憂等皆思惟引發此識任運如何不起捨已上三由論疏抄今據第三正義故言第七識與捨相應縱處阿鼻等者顯示極苦極樂之處此識同唯捨受想應三界九地一類而轉無變易故乃至佛果等者明果七八亦捨相應唯識論三釋佛果第八識云此亦唯與捨受相應任運恆時平等轉故疏云亦如本識因中唯與捨受相應任運轉故不作分別故非有易故不可動搖故如佛地論不可動搖非如餘智已上同論五尺佛果第七識云如第八識已轉依位唯捨受俱任運轉故恆於平等轉故已上明知七八至佛果位亦唯捨受準如是因果七八捨極樂世界七八二識亦應恆與捨受相應第二明六識俱受中餘六轉識三受相應者惣明彼六識喜樂相應於中在意與喜樂受相應者若小乘意有樂者第三禪樂若大乘恱之受意識相應或名樂受謂恱五根名為樂受恱意名喜第三禪根本近分意地恱皆名樂受若與五識相應恱恆名樂受故唯識論五云諸恱受五識相應恆名為樂意識相應若在欲界初二靜慮近分名喜但恱心故若在初二靜慮根本名樂名喜恱身心故若在第三靜慮近分根本名樂安靜尤重無分別故疏云大乘初二近分有喜瑜伽五十七未至地十一根有喜故顯第二亦然何以無樂以彼恱不遍五根故但意識及身處少分彼論自言不充遍恱故五十七中亦爾如下當知根本初二名喜樂者恱五根故由動勇故復名為喜欲界可知已上憂苦二受亦通意識謂人天中意地不恱恆名為憂非尤重故傍生鬼趣重名為苦輕名為憂捺落迦中唯名苦受純受尤重無分別故唯識五云諸逼迫受五識相應恆名為苦意識俱者有義唯憂逼迫心故有義通二人天中者恆名為憂非尤重故傍生鬼界名憂名苦雜受純受有輕重故捺落迦中唯名為苦純受尤重無分別故已上後護法義大異小乘俱舍等捨受通與一切相應者捨受通與六識俱故於六識名為一切非如餘受分相應也以稱讃等者證有喜樂無有憂苦無妨有捨者此下別述有捨受理喜樂二受在彼圡者理不應疑捨可思慮故別立理即有三由一喜樂終必住捨故如俱舍云㔟力𮕱歇必住捨受二捨受躰善業感故瓔珞下云是名三受三苦苦行苦壞苦苦受樂受捨受二受善緣因果苦𢙣因果俱舍論云捨行微細順於善故故唯善感光記引婆娑云問何故捨根唯善業感非不善耶答捨根行相微細寂靜智者所樂故善業感諸不善業性是動故不能感捨受異𤎼已上三未至等諸定捨故問瑜伽顯唯識等論初二近分皆是喜受如何今言未至定捨答且依小乘而作此俱舍等許八近分皆捨故大乘不然如向所辨以此準知者據理釋成以此三理得準例知雖名極樂亦有捨也若謂不然者計重釋若謂名極樂故不可捨相應者亦不得與喜相應以彼土名極樂界故雖名極樂與喜相應何妨名極樂亦捨受相應問依三受門樂攝喜故可名極樂何例捨受答稱讃經云無有憂苦唯有喜樂故名極此約五受立極樂名故今論釋於義無失問若許有捨諸聖悲花本願云山陵塠阜大小鐵圍須㫆大海亦無隂蓋及諸障礙煩惱之聲無三𢙣道八難之名無有受苦之名及不苦不樂名寶積十八云彼極樂世界亦無苦受不苦不樂受名尚無假何實苦是故彼國名為極樂世親攝論十云受用如是清淨佛土一向淨妙者謂淨土中無有不淨糞穢等事唯有樂受無有苦受無記受一向無罪者謂淨土中無有不善亦無記一向自在者謂淨土中不待外緣一向所欲隨自心故𭩮論十五云但受妙樂無苦無捨故言一向樂已上悲花寶積別極樂前後攝論明淨土故知一切淨妙土中無有捨受答可有捨受道理分明唯識論意七八兩識至佛果位尚恆捨受如前論前六轉識猶佛果位與三受俱謂喜樂捨故論五云得自在位唯樂喜捨諸佛已斷憂苦事故已上佛果八識與捨相應淨土衆生寧無捨受但會經論恱之受恆可得起見聞覺知皆順心故捨受不然起希有故若喜樂心歇減之位若入捨定雖得起而非恆時故少屬無以為無捨
