body:
  text: 本依對法論至以潤生也是第八問上來𫥢西方相對辨勝劣等已竟自下料蕳得生業惑起不起相即準穢土𦀽生詢淨𭃯潤生謂生三界皆當有惑以為𭷣生今論往生依何煩惱對法論九種命終者彼論第五云相續力者有九種命終心與自躰愛相應於三界中各命終欲色無色生相續謂從欲界沒還生欲界者即以欲界自躰愛相應命終心結生相續若生色無色界者即以色無色界自躰愛相應命終心結生相續如是從色無色界沒若生彼若生餘處有六種心如其所應盡當知又此自躰愛唯是俱生不了所緣境有䨱無記性攝而能分別我自躰生差別境界由此㔟力諸異生輩令無間中有相續未離欲聖者亦爾臨命終時乃至未至不明了想位其中能起此愛現行然能了別以對治力之所攝伏已離欲聖者對治力強故雖未永斷然此愛不復現行彼由隨眠㔟力令生相續中有初相續𭃯那唯無䨱無記以是異𤎼攝故從此已後或善或不善或無記隨其所應除彼沒心以中有沒心常是染𣲇猶如死有生有相續心𭃯那亦唯無䨱無記若諸菩薩願力受生者命終等心當知一切一向是善唯識論八云愛取二支唯修所斷貪求當有而潤生故九種命終心俱生愛俱故尺十二支三斷門也疏云愛取唯修斷貪求當生潤生之愛明非見斷見斷愛等緣見等起故對法第五九種命終心三界生各潤生心各有三故已上此命終心自躰愛相應者生欲界者起欲繫愛欲界生為我有故名自躰愛乃至可生無色界者起彼繫愛無色生為我有故名自躰愛斯乃生此起此地愛貪生有故名自躰愛非愛此身名自躰愛故唯識貪求當有疏述貪求當生泛論愛者其相多且約自躰境界論已得未得者有其四種一於已得自身起愛二於未得自身起後有愛三於已得境界起貪喜俱行愛四於未得境界起彼希樂愛具如雜集第六分別今是第二未得自身起後有愛也問準俱舍等臨命終心可通三性何對法論云有䨱無記性攝又九種中上二界愛有䨱無記欲界愛何有䨱無記欲界中唯身邊二見有䨱無記其餘煩惱皆不善故答案大乘意命終之心即有三位一明了心位謂通起善𢙣無記三性心若此位中初起六識後意獨明廣緣諸境三性改轉有生淨土能見聖境感希瑞等即此位也二自躰愛位五識已去微細意識獨殘昧劣是故不起餘善𢙣心但是有䨱無記心三不明了位六識皆去第八識殘異𤎼無記此位名為最後終時死生之心第八識故雜集六云死有三種謂或善心死或不善心死或無記心死善心死者謂於明利心現行位或由自善根力所持故或由他所攝故發起善心趣命終位不善心死者謂亦於明利心現行位或由自不善根力所持故或由他所攝故起不善心趣命終心無記心死者謂若於明利現行位若於不明利心現行位或由闕二緣故自他二緣或由加行無㓛能故起無記心趣命終位此中所言善等心死者當知依我愛相應將命終心位前已上於明利位起三性心者第一明了位我愛相應將命終心者第二自躰愛位自躰愛位屬將命終故知此後更亦可有異𤎼無記正命終位是第三不明了位故瑜伽抄云死有三位一正死即末後𭃯那唯識論為第八識對法論死有未心生有初𭃯那中有初𭃯那唯無記性二次前潤生心唯第六識我愛相應對法論為九種命終心唯有䨱無記三次前明利心即此三性是想現行故細想現行無記心者即我愛心此第六意識若兼第八即末後心故不能憶善𢙣法已上義寂壽經疏云問見佛來等在何時為未死時為已死答此將終未死時命終位有三種一明了心通起善𢙣無記之心二自躰愛唯起有䨱無記之心三最後不明了心唯有異𤎼無記之心也此中見佛來等事即在第一明了心位或是已死起中有時轉欲色業往生彼者應受中有往彼處故觀經云自見其身乘金臺隨從佛後如彈指項往生彼國乘臺往彼者非中有是何以中有行疾於通故彼此雖隔十万億𭃯如彈指項能生彼也已上故今所論九種命終心者第二自躰愛現起位故云唯是有䨱無記又大乘意欲界六識相應貪等及隨煩惱亦通無記故其有䨱無記心愛為潤生緣結生相續非小乘談也問俱舍等論中有沒心生有𭃯那起潤生惑今何死位起結生惑答大小談異不及會通若小乘意命終之心通三性故起善無記無發惑義故生有𭃯那論潤生惑起若大乘意細想現行位起有䨱無記彼心必潤行等六支令當果起故大小異也問俱舍論云諸煩惱中無一煩惱於結生位無潤㓛能非由自力現起𮉐垢已上準此文者諸結生時除自力起緾垢之外餘相應并十本惑皆起潤能何今偏舉俱生愛耶答貪愛猶如水能濕故潤生㓛能極強勝故以俱生愛為正潤生論助潤生餘惑亦起結生㓛能如下文明十二支中引瑜伽等設雖小乘正潤生應是貪煩惱故俱舍云倒心趣欲境濕化染香處又光記云然諸結生唯惑力并無慙無愧昏沉悼舉以是本惑相應緾故能助潤非由自力緾垢可能現起已上明知貪是正潤生惑所餘煩惱助潤生也本此有二尺至亦無有過答第八問文自為二一明欲色愛現起潤義二有尺下明種子潤生義第一文二先明欲色煩惱如應可潤淨土欲色謂極樂是三界攝故未離欲者欲惑為緣生淨欲界已離欲者色惑為緣生淨色界若離欲色得無色定其退性者退起欲色煩惱而生淨土若不退者無生淨理次彼下明得無色定者不生淨土之由即有二初云淨土欲色二界攝故得無色業不生而已是上所述三界攝義故云彼次云雖非欲色二界所攝色相土故不得無色定生色土非是三界所攝之義故云有問三界不攝義何煩惱潤淨土生若欲色惑者能引惑業既是欲色所感果報何非三界若非三界惑者除彼之外更有何惑潤淨土果若無惑潤者淨穢雖異受生之法必據惑緣如卉木種依水潤緣能生芽荎答此義可許欲色繫惑結淨土生雖非三界猶分假攝能生人未得變易故分假生必據煩惱潤三界繫外無有別惑故欲色惑可為潤惑業惑二俱雖界繫攝而所得果非三界攝所以者何佛本願力不思議故令界繫惑業能感非繫報若欲業果極長不過万六千歲若色業果極長不過万六千劫而感淨土遂得壽命無量無邊阿僧劫豈非佛力之令然由此義故約惑業躰可得名為欲色惑業若因攝果唯可得名淨土惑業此事具如第一論釋彼偏論業今更加惑問三福業躰本是妙有隨其機欲能感人天及淨土報是故感淨可名淨業煩惱不爾繫地堅窂而性染故設潤淨生安名淨惑既稱惑染不順淨故答此難不爾名淨惑者非言惑躰即是清淨由佛願故此惑能潤淨土勝生從感㓛能盍名淨惑雖業是善若離佛力不可生淨而由佛願感淨土故名為淨業惑亦可爾已引淨土容名淨惑亦所知障潤變易故名變易惑或名實報微細無明從於所感亦立能感名準例可知此有何過第二明種子潤義中二先明生淨愛不可起謂聖加祐令心不倒若起煩惱即名顛倒不可顛倒故知不起次然受下明亦可有緣謂雖惑不起然受生之法莫不依惑增上緣力是故乃用煩惱種子亦潤有友令生相續言有支者更無別躰行等六支被愛潤緣近有當果名為有友是故應言煩惱種子潤行等友而潤有友者因中果稱潤有支如世間人泥即瓶縷即是衣此例非一此即通三界攝不攝二義種子潤生不二故本有學聖人至種子潤生重難次義言有學者指第三果初二果聖猶依現起以潤生故對法云未離欲聖猶如異生以現行惑而能潤生對治𭋘故已離欲聖由煩惱種令生相續對治強故具上引之唯識義六云問悲增上悲願勝八地以上猶可分假身何受反易答八地已上第六識無漏相續無有漏心起故不能故起煩惱受分假身故受變易身也問十地菩薩不斷煩惱種子何以其種子不受生答菩薩唯以煩惱現行潤生不用種子故也摳要有四句可見之問何故不用種子答燈云已伏惑種潤生無能云云菩薩入初地時伏煩惱現行故雖有種子潤生無力也問若爾何不還聖者以已伏惑種潤生答不還聖對治力強正潤生位不起煩惱故以所伏惑種潤生也十地菩薩不用煩惱對治道故云起現行潤生也然云已伏惑種潤生無能者多分約異生也若釋十地菩薩唯現潤生亦可用此義也已上不還聖者已起俱生煩惱障對治聖道故雖未永斷上界煩惱而彼界愛不能現行唯以所伏惑種潤生十地菩薩未起煩惱障對治聖道故起煩惱為結生緣然云已伏惑種潤生無㓛能者多分約異生若言十地菩薩唯現潤生亦可用此已伏惑種無潤能義也問不還聖者雖起欲界對治聖道能斷欲惑而未能起上界對治何故不起彼惑潤生下地治道非是上界能對治故答不還聖者源出瑜伽對法等護法論主述其故云然不還者對治力強正潤生位不起煩惱但由惑種潤土地生退案文意欲界煩惱二性繁雜其力強勝第三果人除此強障治道圎滿故雖非起上界能治依彼㔟力上惑不起也摳要有二尺以第二種子潤義而為正尺問若言欲界治道圓滿故惑不起者不還聖人恆不可起上界諸惑見道雖見惑治道滿足而初二聖起惑潤生不還果聖設雖欲界治道圓滿何不起上界惑潤生答非潤生時現起煩惱惑不現起學者異義若依一義言不現起此有何過彼見道位見惑能治雖已圎滿一界治道未圎滿故不可為例問若爾何故疏八云未臨命終起現惑故豈非餘時現起煩惱答不還向位起現行惑即證不還生上界時正潤生惑雖唯種子而以向位所起之惑遠助潤故言未臨命終起現惑也本論據穢土至義亦無失更救重難文即有二一直救所難二惑起下還許現行義初文中言論者指對法論彼論凡夫現潤生者據穢土生以諸凡夫穢土受生煩惱熾盛命終𭜧倒淨土不爾佛願力故與聖衆來万德圓滿之毫相秋月映徹於半天之境百福莊嚴之光芒曉星照耀於五雲之衢伎樂沸空聲不屏浮生之耳寶翻風影令慶有為之眼濃香芳郁海岸之香讓薰鮮花繽紛吳山之花褊𮎠是平等性智現行之靈儀抑亦後得大悲薰成之嚴粧也行者始見無漏聖境身意恬然不生猖狂故知慈悲加祐心不顛倒如無心死者例而證無心位死不起煩惱然猶潤生淨土亦爾種子結生問經諸有情類受生命終必住散心非無心定何許無心命終義耶答瑜伽決擇分無心地中五位無心一悶絶二睡眠三定四無相定五無想果生死二位亦無六識不別者即悶絶攝此五位中雖無六識非無本識故無轉識雖名無心本識猶在為生死心所𭑕經唯識論證有第八文若無本識生死時心不應有故謂彼位中身心惛昧明了轉識必不現起故唯第八識生死心由斯故必住散位及與有心方得受生及命終理小乘不知計入定心與無心時無死生義故疏四瑜伽第八十云諸無學者要先入定後方入無餘亦無心命終彼無六識非無第八由斯即顯若以六識為命終識彼如何成若意識受生命終彼由無學願力致然即有第八亦非無心又諸異生有學不相也已上本生淨土者至生是何攝是第九問意者上文既云生淨土者愛潤行等六友種子感淨土生此業愛等是三界攝若許此義已生淨土從此種子所令現行分位緣生是何攝耶為如行等三界所攝為是淨報非三界所攝言分位者名現行友謂大乘意識等種子為實支躰從此種子未來現起識名色等此現起分位建立十二緣起名分位緣生也故唯識論云或依當來現起分位有次第故有前後疏云或依當來生起分位或依現在已起分位有次第故因五種前後不同非行薰時及實生果有前後也此依分位非實躰也已上若小乘意緣起有四一𭃯那緣起謂情非情諸法因緣和合生一𭃯那位若依一𭃯那緣起但約有情二連緣起謂因果法無間連續約情非情念生光記云無間名連相續為或鄰次名連相屬名故正理論云連緣起謂同異類因果無間相屬而起已上三分位緣起謂三世中五薀分位建立十二過去生中起煩惱時名宿惑位此位五薀惣名無明乃至未來名色等四位所有五薀惣名老死故分位者五薀分位建立故名分位也光記云此約前後所有五薀無間相續名為分位此約生及不定業煩惱故正理云分位緣起謂三生中十二五薀無間續生已上四遠續緣起謂前分位緣起隔越通順後受及不定業遠續因果光記云此即分位緣起隔越相續名為遠續此約順後及不定故正理云遠續緣起謂前後際有順後受及不定受業煩惱故已上於四種中第三分位即是有情業因感果正行相也今約大乘而為問答所以知者答文中云五果種子還是欲界若是小乘更不可云五果種子問若大乘者何故四假明十二耶謂無明行者是過去二因故合為一假識等五種是現在五果故合為一假愛取有三支是現在三因故合為一假生死二支是未來兩果故合為一假明知小乘三世兩重十二緣起而非大乘二世一重緣起意也答初二合明能支故次五合明所支故次三合明能生支故次二合明所生支故引因引果生因生果至下明之是故大乘一重因果非小乘兩重因果也本此有二尺至攝法不𥁞答第九問文自為二一明淨土十二支是欲色界攝二有下明十二支於淨不論第一義中淨土即三界所攝者先摽謂已生淨土現行分位十二支三界所攝次未離下尺中無明支等者十因既欲二果亦爾故云寧非未離欲者發業無明欲界惑故所發業行即是欲繫識名色等五果種子還是欲界五種子者一者本識能生種子是名識支二者名色所攝種子謂除本識能生種子及六處觸受種子外所餘異𤎼無記種子名色支三者眼等六根種子名六處支四者異𤎼觸數種子名為觸支五者異𤎼受數種子是名受支此五種子落在本識為業種子能所資助可生當來苦果依正名五果種然異𤎼法其性𮊵劣不能獨生自果現行必待於他強勝法助故隨善𢙣資助㔟力或生好果或生𢙣果好𢙣雖異皆無記性未離欲時是欲界繫心所變故名為欲攝然此行等六支種子必蒙愛潤而生現行設如外種雖在地中不獨出生由水潤力方生牙荎內法種子亦復如是其潤緣者即諸煩惱雖諸煩惱皆有潤力以貪為本貪愛如水殊有潤生㓛力故也故臨終時至細想位俱生下品微細貪愛法爾而起顧戀自躰及境界等其時行等六支種子始被潤澤而未至極此下品貪名為愛支愛數相續遂起上品俱生貪等爾時行等六支種子潤緣圓滿生果㓛能悉決定訖此上品貪是名取支此愛及取亦欲界繫第六相應俱生煩惱所潤六支合名有支故愛取有亦欲界攝十因既是欲界所繫所生當來依正二報寧非欲界所謂有支至於託生最初𭃯那正生苦果依正二報其苦果報有根身等自未𮕱變𢝰名生支𮕱變已後至命終位𢝰名老死故此現行生老死位十因所起與能起因同繫地攝淨土亦爾因既欲界彼生老死亦欲界攝淨土雖無老死生彼後𥁞分假變易二種生死義當老死若已離欲得色界心所變緣起亦色界攝十二次第準而可知義便廣明大小十二支欲令學者知流轉相先大乘二世一重者謂無明等十支現在生老死未來故唯識論云此十二支十因二果定不同世因中前七與愛取有或異或同若二三七各定同世如是十二一重因果足顯輪轉及離斷常設兩重實為無用或應過此便致無窮疏云十因二果但是一重因一果一故非如小乘二世因二世果二重因果也已上因中前七與愛取有或異或同者若約今生起業煩惱順次感果因中前七與愛取有必定同世謂現世能發業癡名無明支所發之業是名行支行支資助苦果種子可生當果至最後位起愛取支潤行等種已潤之後名為有支後有故約順次感其果者十因同世是云或同若約順後業感果者前七現在愛取有三非在現在故前之七與愛取有非是同世故云或異若二三七各定同世者生及老死二必同世愛取有三必定同世前七同世故云各定同世也第六識相應分別癡名無明支由此無明心極不了所謂不知因果道理依不知故所起善𢙣二種心行皆悉成於流轉業因雖諸煩惱皆能發業無明力𭤽立無明支愛支亦爾從𭤽得名故唯識論云雖諸煩惱皆能發潤而發業位無明力增以具十一殊勝事故謂所緣等廣如經於潤業位愛力偏增愛如水能潤故已上十一殊勝者疏云一所緣勝遍緣染淨故二行相勝隱真顯妄故三因緣勝惑業生本故四等起勝等能發起能所能生所生緣起法故五轉異勝隨眠𮉐相應不共四轉異故六邪行勝於諦起增益及減行故七相狀勝微細自相遍愛非愛共相轉故八作業勝作流轉所依事作寂止能障事故九障得勝法及廣法故十隨轉勝乃至有頂猶隨轉故十一對治勝二種妙智所對治故不餘惑亦名發業支已上無明所起善𢙣業者亦第六識相應思數此思心所或時信等善心所俱身口意中隨應造作一切善法或時貪等諸煩惱俱身口意中隨應造作一切𢙣法此之善𢙣三業思數各薰種子其諸種子皆悉落在自己第八本識之中是名行支隨能資助本識所持識等苦果種子所資種子即有五種乃至二果如向所辨今此一期亦起無明發業乃至起愛潤種與前次第等無有異如是輪轉無窮無始不絶故生死流無明為源其無明者即從無明種子而生其種子者即彼過去現行之所薰習其所薰種在本識中自類相生無有間斷如是生起無明如是如是生無明故如是輪轉不絶能持本識亦種子生其本識種子還在本識中即是六七二識所變相分所薰本質種子六七轉識亦從六七識種子生其之種子即六七識自所薰也薰已亦在彼本識中如斯一切種子皆在第八識中自類相生設如瀑流相續不絶無始已來種生現行現薰種子種生種故生死流轉猶如車輪問何故發業無明唯立一無明支潤生之貪開立愛取二支耶答發業之法無重發義故立一支謂業一發無重發義如外種一生牙莖不可再生潤生之法數溉灌故立二支如水潤外種之時方數灑故唯識論云要數溉灌方生有牙且依初後分愛取二無重發義立一無明疏云若生有牙必數溉灌如灌田等今者且依愛之初後分愛取二其實有多現行愛惑十地第八經云愛增名取故初名愛後名取也發業之義不可重發立一無明如一牙生不可再生水潤時可言得數問準瑜伽論第九取支可通諸惑何唯愛增故彼論四取為躰言四取者一欲取謂欲貪二見取三戒禁取四我語取即是三見故知取支見修所斷一切煩惱答取支之躰實通諸惑而十地經及唯識論愛增名取愛潤用勝故愛增非餘惑故瑜伽論會十地云雖取支中有諸煩惱而愛潤勝非無餘惑疏云取支通取一切煩惱瑜伽論一切煩惱令生續故即通見修所有煩惱令生相續又下文正唯修斷助潤通見問於十二支如何略抄立為四支答一能支謂無明行能識等五果種故二所引支謂本識內親生當來異𤎼果攝識等五種是前二支所發故問此之識等五種子為前後薰亦一時薰答同時薰發無有前後問若爾如何五前後答論第八云識等五種由業薰發雖實同時而依主伴𢝰別勝劣因果相異故諸聖教假前後或依當來現起分位有次第故有前後已上文意云識等五種雖實同時而依主伴等相異故假前後謂本識主異𤎼主故餘名色等四即是伴非主異𤎼助伴生故先識次餘四就後四中名色是𢝰躰性寬故餘三即別義用狹故就後三中六處是勝觸等依故餘二即劣依處生故就後二中觸是因勝能生受故受是果躰觸所生故由如是相諸教假有前後也或依當來生起分位或依現在已起分位有次第故因五種前後不同非行薰時及實生果有前後異此依分位非實躰也三能生支謂愛取有近生當來生老死故四所生支謂生老死是愛取有近所生故遠名因果近生名生因生果今論四假舉十二支是四支攝如上已尺問何故老死合立一支答唯識論云老非定有附死立支疏雜集云所以老死合立支者為顯離老得有死故非於胎生身中離名色等得有六處等故是故各別立支已上問老不定故附死合立病亦不定應合立支答論會之云不遍定故老雖不定遍故立支疏云謂此病法非直不遍三界五趣隨所應有趣界之中亦非定有如尊者薄抅羅年過八十曾不患小故不立支廣乃至然此病法非如老法雖非必定一切有情皆悉有之遍諸趣界故立為支病不定遍故不立也已上問何以得知諸色無色亦有老耶答唯識論云諸界趣生除中者將終皆有𮕱杇行故疏云界趣生等皆有𮕱杇非中者臨終異前根識𮕱杇故是遍趣得立為支除中者顯不定故瑜伽第十三云問云何應知上界有老答彼諸行有杇壞腐敗性故正與此同已上問病不遍故不立支者名色不遍何故立支謂色界全欲界化生六處頓起何有名色答論有二尺初非正義次依正理初答文云定故立支胎卵濕生者六處未滿定有名色故已上是除化生余胎卵濕乃至六處未滿以來有名色支故亦立支次答文云又名色支亦是遍有色化生初受生位雖具五根而未有用爾時未名六處支故初生無色雖定有意根而不明了未名意處故由此論十二有支一切一分上二界有已上既云上界有十二有支一切一分若無名色非一切也又俱舍論許上二界十二不滿婆娑評家許十二滿故彼論云色界五根雖定頓起而生未久根不猛利爾時但是名色支攝無色雖無色及五根而有名及意根彼應作是識緣名緣意處意處緣觸是故三界皆具十二已上婆娑評家同唯識名者四薀色者色薀故於無色唯云緣名色言焉次明小乘者三世雨重無明行支過去二因識等五支現在五果成二世一重愛取有支現在三因生老死支未來兩果亦二世一重合而論之三世兩重過去二因中無明者俱舍頌云宿惑位無明是過去生起煩惱時名宿惑位五薀至今異𤎼𢝰名無明雖有五薀獨表無明彼論釋云彼與無明俱時行故由無明力彼現行故如王行非無導從王但勝故𢝰謂王行彼者即是宿惑位五薀也次行支者同頌云宿諸業名行是過去中起諸業位五薀𢝰名為業名行者造作義故現在五果中先識支者同頌云識正結生薀是於胎等正結生時一𭃯那位五薀名識受生之位識偏𭤽故別摽名也次名色者同頌云六處先名色是結生後六處生先中間諸位所有五薀𢝰稱名色中間位者自羯羅藍至鉢羅奢凡有五位次六處者問頌云從生眼等根三和前六處是鉢羅奢伽此位通多念名色已後三和以前生眼等根此位五薀名六處始滿根相顯故但摽六處次觸支者同頌云於三受因果未了知名觸三受因者苦樂捨三受之境名境為因能生受故出胎之後兩三歲來根境識三能有對觸此位五薀𢝰名為觸相顯故以觸摽名於三受境未能了知故未名受次受支者同頌云至愛前受五六歲去十四五來了三受境未起貪此位五薀𢝰名為受用勝故別以摽名現在三因中先愛者同頌云貪資具愛十五以去貪妙資具愛現行未廣追求此位五薀𢝰名為愛用勝故別摽愛名次取支者同頌云為得諸境界遍馳求名取年既長大貪五欲境四方馳求不憚勞倦此位五薀𢝰名為取用勝故初起名愛相續㫆盛名以為取次有支者同頌云有謂正能造𭷣當有果業由取馳求積集能𭷣當有果業此位五薀𢝰名為有業名為有有當果故以業勝故摽以有名未來二果中先生支者同頌云結當有各生從此捨命正結當有此位五薀𢝰名生支次老死者同頌云至當受老死受生以後名色支等四位五薀𢝰老死是名三世雨重十二支大小雖異輪回義齊行者觀達須離綿鎖第二義中二先明於淨土不分別緣起謂淨土非三界所攝十二支三界所攝故於淨土不論十二緣起也次又此下明穢土支攝法不𥁞以成淨土非十二攝於中如唯別定業等者指示緣起不攝法躰唯識論八明能支云此中無明唯取能發正感後世善𢙣業者即彼所發乃名為行由此一切順現受業別助當業皆非行支已上由此下蕳非行支攝謂能發業無明有三一但發𢝰業無明二但發別業無明三通發𢝰別無明此十二支中無明者於三種中取初後二不取第二但發別業即彼初後二癡所發乃名為行故所發業亦有三中如前次第取初後二不取第二但感別報由此道理諸現報業別助當業皆非行支一切現業皆唯能感別報果故亦由此文即證現業不感果感當業中設有一業唯感別報亦非行支復有一業但感𢝰報及有一業通感𢝰別此兩種業皆行支攝廣如疏述今唯別業感別報果非支證者斯義也問何故別業不攝行支答順現受業及當別業不假愛取潤緣力故非支所攝也何故不假答愛取必在命終位起當有業發潤㓛能故現業感報不由彼潤如據宿業現改人身成毒等𢝰報本識雖是人攝眼等別報即畜生報故此等業亦不由潤也故知緣生於穢土中不攝法盡攝淨法乎問何故十二因緣名支亦名緣起亦名緣生答支者疏云分義因義又瑜伽五十六云因名緣起果名緣生謂此無明隨眠不斷有故彼無明緾有此緾生故彼諸行轉如是乃至老死亦爾然五種果中以前後相望為因緣為因時非果為果時非因據義別故又云無有主宰作者受者無自作用不得自在從因而生託衆緣轉本無而有已散唯法所顯能潤所潤墮相續法名為緣生大論第十釋云由煩惱繫往諸趣中數生起故名緣起已上俱舍論明望滿四句謂緣起非緣生緣生非緣起緣生亦緣起非緣生非緣起也泛釋其相在論第九本若生淨土至諸𢙣煩惱是第十問意者若生淨土不起諸𢙣不善業者為亦不起能發不善諸煩惱耶斯乃舉業道不起問煩惱道起不起且如下例破謂地上菩薩尚起惑障生淨土現是凡夫即不起諸𢙣煩惱耶初地破戒者準唯識論等第二地位具淨尸羅能離微細破戒之垢故初地中猶有此垢也彼論九云二離垢地具淨尸羅遠離能起微細犯煩惱垢故疏云其初地時已離犯戒垢然此二地能全離故所以之望前細故淨尸羅者謂別解道定共也即通三種雖第三地始發定增能離過時此地已滿故或依別解亦能全離加行後起根本罪故非定道共能離加行後起罪故世親攝論此二地性戒成就非如初地思擇護戒性戒成就故諸犯戒垢已𫽄遠離何故初果已具性戒極喜地中當言未具大分已具仍有悮犯微細過失又論性戒初地已離入地菩薩更亦不同初二果者犯有妻孥性罪必無犯但於罪猶有悮犯今第二地悉能永離已上準疏意者即有二意一於性罪有悮犯微細過失二於罪而有悮犯性罪不犯言誤犯者非意樂破悮破戒也義燈別起悮犯愚不依煩惱別由所知障㔟力起名為別起唯識論云二邪行鄣謂所知鄣中俱生一分及彼所起悮犯三業彼鄣二地極淨尸羅入二地時便能永斷已上三地菩薩起我犱者唯識論九云四熖惠地安住最勝菩提分法燒煩惱薪惠焰增故疏云即除第六識等中俱生身見等攝非謂一切已上又同論云四微細煩惱現行鄣謂所知鄣中俱生一分第六識俱身見等攝最下品故不作意緣故遠隨現行故名微細彼鄣四地菩提分法入四地時便能永斷疏云世親攝論云微細煩惱現行俱生身見等攝此最下品故不作意緣故遠隨現行故應知是微細義意大同此中言第六識俱身見簡第七識俱等者等取我所邊見及我慢我愛與見俱者皆是此品及等取彼定愛法愛至下當知如何此名微細解云最下品故謂第六識亦有分別身見等法彼為猛名上品第六識中獨頭貪等名中品通不善性故此望於彼二最下品故行相最細唯無記故又不作意緣故名下品即是任運生故名下品非如見斷𭤽思等方生故又遠隨現行故即無始來隨逐於身不捨於身故名下品非如分別起者逢善友等便捨於彼故此名下品由此三義故名微細此等障菩提分法故四地斷問如何身見等障菩提分法答由有身見等俱愛迷執身故不得觀身為不淨觀法為無我法等故障菩提分即通障也已上問是所知障何故或燒煩惱薪或名微細煩惱現行障答論釋此云彼昔多與第六識中任運而生執我見等同躰起故煩惱名今四地中既得無漏菩提分法彼便永此我見等亦永不行疏云亦顯以上所知障立煩惱名雖有別頭生者皆多分與煩惱同一躰而俱起故立煩惱之名由所知障斷故煩惱之未亦永不行從煩惱名故為斷已上問何故初二三地不斷我見等答論云初二三地行戒修相同世間四地修得菩提分法方名出世故能永𭓯二身見等疏云初地行二地行戒三地行修相同世間世間有情多作此三福業事故未能修證菩提分法今四地修得菩提分法方名出世故能永𭓯二身見等二身見者謂初見道已離第六識中分別身見今此後離第六識中俱生身見𥁞處𢝰名二身見非今離二如第四定言苦樂正斷所知障身見等并永不起煩惱障中身見等故二身見已上問何故四地所斷俱生我見此與第六識俱非與第七識俱我見答論云第七識俱執我見等與無漏道性相故八地以去方永不行七地已來猶得現起與餘煩惱為依持故已上第七識俱身見等法與第六人空無漏性相故七地以前猶有漏道故未全伏八地以去無漏相續方永不行七地以來得現起者與貪嗔等餘煩惱等為依持故若許第七識俱七地以前者即貪嗔等已前應無依持故七地已來有愛佛菩提障者入第七地斷細相現行障細相現行障者所知障中俱生一分執有生猶取流轉細生相執有尚取還細相故前六地取還相作意勤求未能空中起有勝行今第七地既除此障能於無相不專勤求乃於空中起有勝行所言空者無相空理此真空中起於有觀真俗二境合本後二智少須㓛用能得故是名愛佛菩提之障此用加行起有勝行能愛修菩提行故也唯識論云八無相中作加行障謂所知鄣中俱生一分令無相觀不任運起前之五地有相觀多無相觀少於第六地有相觀少無相觀多第七地中純無相觀雖恆相續而有加行由無相中有加行故未能任運現相及土如是加行鄣八地中無㓛用故若得入第八地時便能永斷已上謂前五地觀心劣故無相觀少有相觀多第六地中能觀染淨平等如故多住無相少住有相第七地中純住無相猶有㓛用豈非七地起加行心愛修菩提第八地中雖修菩提行任運起不用加行故離愛義故安樂集七地以前有相趣求名愛佛障為八地治彼集云凡相有二種一於五塵欲境妄愛貪染隨境執著此等是相名之為二者愛佛㓛德願生淨土雖言是相名為解何以得知如十地經云初地菩薩尚自別觀二諦勵心作意先依相求終則無相以漸增進躰大菩提盡七地終心相心始息入其八地絶於相求方名無㓛用也是故論云七地已還𢙣貪為障善貪為治八地已上善貪為障無貪為治今願生淨土現是外凡所修善根皆從愛佛㓛德生豈是也已上愛佛約人愛菩提約法是人法異非別物焉諸𢙣煩惱者煩惱二性一不善性能發𢙣行自他故二無記性不發𢙣業非極故今簡第二有䨱無記故云諸𢙣於十煩惱分別二性嗔唯不善一性所攝起則必惱自他故現世他世皆名為餘九通二故唯識論云嗔唯不善自他故餘九通二已上此惣而言若約三界分別俱生委分二性同論六云上二界者唯無記攝定所伏故在上二界定唯無託不問分別俱生皆爾若欲界繫分別起者唯不善攝發𢙣行故若是俱生發𢙣業者亦不善攝自他故欲界應分謂分別起者唯不善必發𢙣故俱生者有二若發𢙣業亦不善攝所謂嗔性一向不善餘貪癡慢三惑少分更通不善自他故餘無記攝細不障善非極惱自他處故餘者即除嗔外餘五煩惱謂身邊二見定唯無記攝餘貪癡慢三惑少分亦通無記是有三因一由微細二不障善位亦起故如第七識俱者三非極自他瑜伽五十八數現行故若并之者即四因也當知俱生身邊二見唯無記攝不發𢙣業雖數現行不障善故重顯身邊二見唯無記性不發𢙣行所以同前本生彼凡夫至𢙣不生耶答第十問文即有二先直尺次如地下例尺直尺中雖具煩惱等者煩惱現起必據因緣彼土凡夫具足煩惱雖有內因為其外緣不善境界彼處無故不同分別俱生一切發𢙣業者不現行也例尺中如地獄衆生等者問案俱舍等十不善中地獄三通成就現行謂𢙣語雜穢語嗔恚貪業道及邪見成就而不現行𭣦生偷盜邪誑語離間語無成及現而何云起貪邪見耶故俱舍第十七云且於不善十業道中那落迦中三通二種謂𢙣語雜穢語嗔三種皆通現行成就由相罵故有𢙣語由悲叫故有雜穢語身心𭤽𢤱不調由互相憎故有嗔恚貪及邪見成而不行無可愛境故現見業果故業盡死故無𭣦業道無攝財物及女人故無不與取及欲邪行以無用故無誑語即由此故及常離故無離間語即由此故者指無用故光記云貪及邪見成就不現行由未離故所以成就不現行者無可愛境貪已有故貪業道不現行雖有涼風觸身起貪輕非業道如輪王北洲貪輕非業道以𢙣欲他財貪方名業道故地獄中有生所得智知前身造業來生此中現見業果無邪見業道現行餘五業道既非成就亦非現行所以者何業盡死故無𭣦業道乃至廣已上答貪邪二種雖不現起而成就故望餘五業都無成現𢝰以云起也本豈彼淨土至諸煩惱耶第十一問即有其二初豈彼淨土頓不起等者預惣徵生彼土者既是凡夫未發無漏人法二空豈頓不起不善外餘一切煩惱次為亦得起等者正別問有䨱無記煩惱起不本迷理煩惱至法執煩惱答十一問文即有二一順𢝰徵明一切惑非頓不起二然此下順別問明彼土惑有䨱無記初文中迷理煩惱等者顯示所發煩惱躰性以是凡夫等者更立煩惱可發道理以是凡夫未悟真如實相法故迷理俱生彼土亦起非頓不起一切諸惑分別起等者遮不起惑唯識論等分別惑緣邪教起至下文而彼淨土無邪教故我見不行我見即是諸見之本如本疏云以此我見為所依本諸見得生故名一切見趣所依趣者所歸處也根本我見既不起故未分別惑亦不可生分別惑生具依三緣一邪師二邪教三自邪分別故唯識論云要由𢙣友或邪教力自審思察方得生故已上今略表教非遮餘二任運煩惱等者重成可發俱生所由一任運煩惱不緣邪教生故二能生人既是凡夫故以凡夫故可發不緣邪教惑也斯乃𢝰明起俱生惑不起分別以尺𢝰徵自下別明俱生惑中不起不善更發有䨱以解別問也次文中然此煩惱等者直辨淨土可發無記然此任運起諸煩惱依對法論若此惑中能發𢙣業亦是不善不發𢙣行有䨱無記對法第二云自性不善謂除染𣲇意相應及色無色界煩惱等所餘能發𢙣行煩惱隨煩惱雜集第四糅云謂欲界繫不任運起者是不善若任運起能發𢙣行者亦是不善所餘是有覆無記已上今對法者任雜集糅非彼正文唯識論第五雜集而彼淨土所起諸惑不發𢙣行故唯有覆無記性攝所謂十中疑及邪見取戒取四種煩惱唯分別起諸論共許要由𢙣友等三緣生故淨土中必不可起身邊二見貪嗔癡慢六通俱生及分別起任運思察俱得生故唯識第六顯第一瑜伽第八此六通俱生分別故六一分思察生邊於淨土中亦不可起上文遮言一切分別煩惱不起即此等也此六一分任運生邊就於淨土方應分別嗔必不可起一向發𢙣故身邊二見亦容得起不發𢙣故餘貪癡慢起不善邊必不可起無記起邊亦容得起故淨土中俱生惑起者二見全分及以貪癡慢少分也經遮不善等者教釋成大經但明無不善聚不遮有覆故非𢝰無一切煩惱愛佛愛菩提法執煩惱者指示蕳監恐有人謂於淨土中貪求菩提是煩惱貪故蕳別云彼土愛佛菩提是法執惑非煩惱障薩婆多許緣無漏貪是善法欲今大乘愛佛貪皆染𣲇收與法見俱起愛執故問分別俱生我見其差別如何答唯識論一云然諸我執略有二種一者俱生二者分別俱生我執無始時來妄熏習內因力故恆與身俱不待邪教及邪分別任運而轉故名俱生此復二種一常相續在第七識緣第八識起自心相執為實我二有間斷在第六識緣識所變五取薀相或𢝰或別起自心相執為實我恐怖今者我何所在耶即初我俱生我也又言我者分別我也修道我義言我分別我何所在耶現觀之時此相故唯斷見非修道中無常見故顯第一瑜伽第八於五薀執斷計常或是俱生或是分別不蕳俱生無常見故𠰥爾前師如何會尺後所文此依𢝰語非許常見亦通俱生常見無相狀故如禽獸類造集等但為有我非為計常必由邪分別等故然此二初則文全理踈後則文顯理全俱生常見有相狀故俱取無失具如唯識第六論疏貪等煩惱修道所斷者謂除見品所攝上二界修道所斷各有五除嗔如是修道所斷煩惱𢝰有十六已上瑜伽論五十八云薩迦耶見此復二種一者俱生二分別起俱生者一切愚夫異生乃至禽獸并皆現行分別起者諸外道等計度而起大乘入道章云四顯俱生分別者若是煩惱不因邪教及邪分別邪師等力自任運起此等之類名曰俱生若𢙣友及邪分別邪教等力方得生者名為分別其根本惑十種之中貪嗔慢癡身見邊見此六種而通俱生及以分別若疑邪見取戒禁取此之四種唯分別起要由𢙣友或邪教力自審思察方得生故其隨煩惱既依根本煩惱而生若依根本俱生起者即二十種能依隨惑皆名俱生若依根本分別惑起能依隨皆名分別本經言生彼至請為解釋第十二問小經衆生者皆是阿鞞致大經宣生彼國者皆悉住於正定之聚然諸經論明阿鞞致位非下凡述正性定之聚道登聖果今既凡夫設生淨土頓成聖人亦證不退若不得者觀經等若復得者衆經論兩鉾楯請為解釋觀經等者雖上文引大小兩本三經一意今觀經或雙觀經名為觀經問阿鞞跋致即正定聚故論注云正定即是阿鞞致又慈恩云不退正定名異義同準此等釋三賢位不退可名正定聚今何約聖答大智度論及𢏏勒論初地證位名阿鞞致故慈恩小經疏云阿鞞致者阿之言不鞞致言退轉故大品經云不退轉故名阿鞞致也問阿鞞致有何勝用答大品經云阿鞞致位是更不為諸魔所動更無退轉故大論云此人入不退轉位菩薩名入菩薩位自知自證不隨他語不墮𭂫夫數名為得道人一切世事不能動心閇三𢙣趣門若據彼論與𢏏勒問經論同故彼論云菩薩未證初地正位雖無量劫修集善根而未能得不退轉未得畢竟無怖心此二論即初地為不退位故𢏏勒論云何不退轉答以諸菩薩證得初地畢定因故以見道力離身見等諸煩惱方名入菩薩位自證二空真如過凡夫地爾時有九種過一位過初入菩薩位初得出世間心位故二家過謂生在佛寂以依般若生故三種性過謂種性尊貴無可譏嫌以大乘行生故四出過謂過一切世間道世間道所不能攝故五入過由入出世間道法故六身過以善住菩薩法中以大悲為躰故七處過以善住菩薩正受而不捨世間而不染故八業過謂入三世平等真如法中順空聖智生命相似法故凡畢竟過謂入如來種中令佛種不斷究竟必證𣵀槃道故即不退轉位在初地已上又智論三十七云人身中有八万戶蟲侵食其身是阿鞞鞞致菩薩摩訶薩身無是蟲何以故是菩薩㓛德出過世間以是故是菩薩無是蟲戶已上彼分假生死名蟲身身故知阿鞞致身無戶蟲者初地已上法性身也故云出過世間下論文云分假生死大智度論文等言受蟲身身大品經言阿鞞菩薩身中無八万戶蟲已上初地菩薩名阿鞞致大品大論等是其明據但三賢名阿鞞致得阿鞞致氣分不墮三途故非真阿鞞致故智論四十五云阿鞞致性者是菩薩未得無生法忍未從佛授記但福德智惠力能信教諸法畢竟空是名阿鞞致性中住得阿鞞氣分故如小兒在貴性中雖未成事以性貴故便貴已上既云氣分及在性中故未得無生三賢位非真不退也本此兩經文至邪定聚也答第十二問文有其三一初至淺深亦別𢝰許難者意以淨穢異故兩不同二然娑下至正定聚也別明淨穢二土正定聚等三不得一下結成第一𢝰中此兩經文實成乖返者預許難者義意觀經等與衆經論名為兩經準上問者省略論言然淨土等者正述兩經成相由謂淨穢土既殊能生人亦異故為居穢土於初地位正定聚不至證位遇緣退故未證之位不論正定為生淨𭃯於信等位正定聚未證聖果得處不退免輪回故由此義故正定聚高下不同阿鞞致淺深亦別也第二別明中二一明穢土阿鞞致有多種蕳異淨土二淨國下明若淨土中十信五心及未入信一切衆生皆正定聚蕳異穢土初明穢土中亦先明四種退文有摽列釋起盡可見問摽文云根行淺者多遇退緣邪風所扇悉皆退轉若據此文唯可得論信位二退何至列釋泛明證行二種退乎答準摽文者須論初二而明證行因述經論廣四退次文行證位三阿鞞致是則翻立後三種退由斯三四亦非無用信退者約初五信位退生邪見斷善根故第六心名為不退信雖造𢙣業墮地獄等而大乘信成就不失不能邪見無因果成闡提人故六心已上可名信不退本疏三云不退𢝰有四種一信不退即十信第六心二證不退入地已往三行不退八地以上四煩惱不退謂無漏道所斷煩惱若十住第七心等名住不退即應有五已上又彼通贊立信位證行四不退玄一師小經釋亦立信不退明知相宗許信不退但要決云今明退有其四種十住毗婆沙論云一位不退即修因万劫意言唯識觀成不復退墮𢙣律儀行流轉生死二者行不退已得初地真唯識觀捨二乘心於利他行得不退也三者念不退入八地已去真得任運無㓛用智於定散中得自在故無念退也四者處不退者雖無文證約理以成已上此文不立信不退是且依十住論明位地不退不六心已上信不退也位退者十住位中前六心位彼位猶得退作二乘等故問起信十住等諸論廣申三賢悉證位不退如何相答此依本業瓔珞經意是故下文即引彼問本業瓔珞示現退更非實退故五教章云本業經十住第六心有退者起信論中釋彼經文為示現退也為慢緩者䇿勵其心故而實菩薩入發心住即得不退也已上釋大衍論同述示現退義答瓔珞經明初住七住二習種姓初住習種姓者彼經上云所謂銅寶瓔珞菩薩字者所謂習種姓中有十人其名發心住菩薩治地菩薩修行菩薩生貴菩薩方便具足菩薩正心菩薩不退菩薩童真菩薩法王子菩薩灌頂菩薩七住習種姓者同經上云從初一住至第六住中若修第六般若波羅蜜正觀現前復值諸佛菩薩善知識所護故出到第七住常住不退自此七住以前名為退分佛子若不退者入第六般若修行於空無我人主者畢竟無生必入定位佛子若不值善知識者若一劫二劫乃至十劫退菩薩心如我初會衆中有八万人退如淨目天子法才王子舍利弗等欲入第七住其中值𢙣因緣故退入凡夫不善𢙣中不名習種姓人退入外道若一劫十劫乃至千劫作大邪見及五逆無𢙣不造名為退相故起信論依初住習種姓而作示現退會釋今依七住習種姓而釋六心退轉義各有其證不足致疑故彼本疏立七經不退如向已同小經疏云不退轉者有其三處一依瓔珞本業地前第七住名不退轉住若修行者進退多在第六住若至第七住畢竟不退是人入種姓菩薩數也二依㫆勒問經及智論云菩薩若未登初地正位雖無量劫修集善根而未得不退轉若至初地以見道力離身見等諸煩惱故斷菩提心相退因故更不退三依資糧論云若菩薩得無生忍時即住不動地必當作佛更不退轉此即當於八地以無生忍在七地故得無生忍已至八地中更不退轉又云若依瓔珞本業經文至十住位中彼經云若新發心菩薩若進若退多在第六住廣乃至即出到第七住中即當不退自七住已前名為退分已上弘決第三亦引本業第七住位不退義但天台意十住始終皆悉不退會六住退即有多義一呼信為住愍喻辨惑章第二義二為怖地前菩薩速令入初地佛權退其實不退依龍樹釋三學十住依僧侃疏四名別義通謂以別教三十心位對性地故性地初心名為退位依宗名別義通五內無護持外值𢙣緣雖不退位不免退墮依授決集意雖有多義不閞相宗許十住位斷見修惑故證退者十地已前諸𭂫夫位於所證法尚有退故謂入觀時雖少入定作真如觀多生散心住外門境故唯識論云多住外門疏釋云然多起散行少能入定作真如觀名多住外門已上住外門時於二取所引隨眠未能伏故二取現行名為退失是故論云故於二取所引隨眠猶未有能伏㓛力令彼不起二取現行本疏釋云瑜伽論勝解行菩薩於三處妄失猶起煩惱或時捨戒所諸法如暗中射或中不中故此位中自分別煩惱未盡煩惱所知名為二取隨眠種子現行所引又地持論九云解行菩薩或時起邪身口意業有時貪著五欲境界或顛倒受生或妄正念或時退捨大菩提心或犯菩薩戒解行住下忍時如上中上忍不如是又五教章引瑜伽論云勝解行住菩薩轉時何行相或時具足聰惠於其諸法能受能持於其義理堪能悟入或於一時不能如是或於一時具足憶念或於一時成於妄類廣乃至或於一時聞甚深廣大法教而生驚怖猶預疑惑如是等類名勝解行位已上問華嚴經解十住菩薩云除諸煩惱永盡無有餘無得觀是則佛正法論何經云未斷二取所隨眠等答本疏會云彼依伏因邪教邪師所起不共無明伴煩惱類盡非盡一切自分別生煩惱及俱生煩惱又佛法㓛力能一切煩惱非十住位已能一切煩惱下此論文資糧道中於分別二取雖漸伏未全伏故已上行退者七地已前由三義故名為行退亦名念退一生怯劣聞上勝法自心怯𭋘不進修故二行間斷不能念中恆修勝行故三有漏生人法二執及餘有漏心間起故問初地已上七地以前於一行中能修諸行何行不堪而生怯劣答初地修檀雖能圓滿於餘戒等不能圓修故於前行雖名堪能後行中更為不堪世間出𠀍有相無相㓛用無㓛用等淺深明䀲不可勝計如其所應初不及後故曰怯劣次八地者此下正明三種不退於中先明初行不退八地菩薩由三義故名行不退及念不退一修諸行於諸行中修諸行故即簡行退生怯劣失二行相續念中二空觀行故即簡行退行間斷失三不雜漏無有一念起世心故即簡行退有漏生失於諸行中修諸行者案瑜伽論及十地論地前菩薩於一行中但修一行初地已上一行之中兼修諸行八地已上於諸行中修一切行故本疏云然初地已前於六波羅蜜一行中修一行初地已去於六波羅蜜一行中修一切行八地以去一切行中修一切行七地已前唯於六度唯有修一以一切行而莊嚴之八地已去於万行中具修万行然所修願力智度漸次勝前別立其名非唯修此已上問若初地擅具戒等行何二地等亦修戒等答初地檀中所修戒者中下戒品非上尸羅故有微細悮犯破戒二地極淨尸羅圓滿故能離一切破戒過失忍等諸行準之應知具四不退故名阿鞞致者八地位中第四不退方圓滿故就其盡處名為具四非言今具如四地離二身見及第四定於苦樂故是名真阿鞞致也餘七地等者明下地中所立不退第四故不名真實阿鞞致若從一義者此下明證不退初地菩薩預聖惠流斷除見道分別二障證得遍滿法界真如故名為證此證一得永不可故名不退望行不退非真不退故云一義結名少分復此義也此具證行兩種不退者前具行不退已名阿鞞致今具證不退亦名阿鞞致故云具兩不退亦名阿鞞致非謂當位具兩不退若堅執文不應理故斯乃為顯當位亦是阿鞞致非位信二合取上位阿鞞致也例如上明行不退唯取當位不退三言全不得名阿鞞致下明位不退唯取位行證信言無初一不退今亦可然唯取上位當位不退名阿鞞致蕳餘位信非阿鞞致望上下文相顯著若迷此意上下諸文義紛失乃至七地等者還明當位行不退故隨少分名阿鞞致謂七地前無漏勝行不相續故前雖名非阿鞞致證不故隨分亦名阿鞞致也依菩薩者此下明位不退即有其二初準瓔珞六住已前退菩提心作二乘等七住已上無此退故名位不退於四不退中等者準前應知為成當位亦阿鞞致非信不退合取上位阿鞞致也無初一不退者下位不退非阿鞞致望上下義如向隨分亦名者前亦遍雖言非阿鞞致位不捨故隨少分亦名阿鞞致也斯乃資糧論八地菩薩名阿鞞致是則全分得盡處故㫆勒問經及智度論初地菩薩名阿鞞致是則隨分不盡得故本業瓔珞七住菩薩名阿鞞致亦是少分上二故如是於彼位證行三雖名阿鞞致菩薩而未曾有於信不退名為阿鞞致菩薩故行不退唯取不其信不退唯不取也問阿鞞致𥘿翻不退既云信不退豈非阿鞞致答阿鞞致是正定聚正定聚者不生𢙣趣故智論云一切菩薩畢定者即是阿鞞致阿鞞致者不墮三𢙣趣已上六信已上信心不退不斷善根作闡提故雖名不退而遇𢙣緣退造𢙣業墜墮𢙣趣那名阿鞞致菩薩今明淺深阿鞞致為顯淨穢不往三𢙣若信位論阿鞞致其理不應彼位還沉三𢙣趣故下文云十信菩薩為邪風散動退菩提心退菩薩行輪回三𢙣道非阿鞞致也若據信者應蕳別言信阿鞞致不可直云阿鞞致故經論中雖位不退等名阿鞞致菩薩所未曾見十信菩薩即名阿鞞致菩薩若依起信者明初發心住亦名位不退謂十信位名為外𭂫亦曰輕毛出仁王十住不爾入內凡位善根堅固不為邪風所扇動故依此穢土等者還結十信非阿鞞致準前應知二明淨土不退異穢土中淨國土若十信等者直明淨土凡夫未入正定聚而名阿鞞致而退法等者引例釋成謂退法等五種聖者雖是退姓若生天上無退緣故不退起惑淨土𭂫夫亦復如斯無退緣故悉名為阿鞞致也六種姓者俱舍論云言退法者謂遇小緣便退所得非思法等言思法者謂懼退失恆思自𭓯言護法者謂於所得喜自防護安住法者離勝退緣雖不自防亦能不退離勝加行亦不增進堪達法者彼性堪能好修練根速達不動不動法者彼必無退光記云言退法者謂遇小緣便退所得非思法等遇小緣退言思法者謂懼退失所獲㓛德以刀扣頭恆思自𭓯言護法者謂於所得恐退失故喜自防護安住法者離勝退緣不自防亦能不退離勝加行亦不增進多住自位故名安住堪達法者彼性堪能好修練根速達不動不動法者不退動故彼必無退已上雜集論十三云退法阿羅漢者謂鈍根性若遊散若不遊散若思惟若不思惟皆可退失現法樂住思惟者思害自身不思惟者不欲𭓯自身退現法樂住者謂退世間靜慮等定思法阿羅漢者謂鈍根性若遊散若不思惟即可退失現法樂住若思惟已能不退失護法阿羅漢者謂鈍根性若遊散便可退失現法樂住若不遊散即能不退住不動阿羅漢者謂鈍根性若遊散若不遊散皆能不退現法樂住亦不能練根者謂轉下鈍根成上利根是故不動法不能練根性是利根故堪達阿羅漢者謂鈍根性若遊散若不遊散皆能不退現法樂住堪能練根不動法羅漢者謂利根性若遊散若不遊散皆能不退現法樂住已上五退具者光引婆娑六十云有𭑕經由五因緣令時解阿羅漢退沒忘失云何為五一多營事業二樂法戲論三好和鬪諍四喜涉長途五身恆多病已上又𣵀槃三十四云退五種一者樂於多事二者樂世事三者樂於睡眠四者樂近在家五者樂多遊行以是因緣令比丘退今文相順婆娑論問前五種姓生退轉者為退種姓為退得果答俱舍論云四從種姓退五從果非先已上於前五中思法等四皆有可從種姓退義從思法退至退法姓乃至堪達退至安住中間二姓退義準知退法一種無退姓理由此種姓最居下故更無退處故云四從種姓退等五種皆有從果退退無學果成於初二三果故也思法等四俱有退姓及退果義而並非先謂先有學住於思法今至無學亦住思法姓之與果必無退理有學無學二道所成極堅窂故學位護等隨至無學亦住護等必無退義後修練根所得思等四種姓彼從此姓容有退理非學無學二道成故有學聖者退不退相準可知謂諸有學先凡位中所住種姓彼從此姓亦無退理世間出世二道所成極堅固故論及光記其義分明故彼論云謂諸無學先學位中所住種姓彼自此姓必無退理學無學道所成堅故若諸有學先凡位中所住種姓彼從此姓亦無退理世出世道所成堅故若住此位後修練根所得思等四種姓彼從此位容有退理光記云謂諸無學先學位中所住思等四種種姓彼從此性必無退理以學無學二道所成極堅窂故若諸有學先凡位中所住思等四種種姓彼從此姓亦無退理以世出世二道所成極堅窂故文中正明無學有學義便兼明若住無學及住學位從退種姓後修練根所得思等四種姓彼從此姓容有退理以此種姓非二道成不堅窂故已上問如思法等二道所成無退轉理退法種姓亦二道所成退其果若言退者頌云五從果非先論云五種皆有從果退義雖俱有退然並非先明知五人俱二道所成必不退也若不退者其姓最劣雖經二道何不退失答論云二先位中住思等姓必無有退此所得果唯先退法有退果義準此論文退法種姓雖經二道猶退其果但至論者光記云所以不言先退法者以先退法有退果義故此文中言並非先不攝退法或可此文言並非先從多分理實退法先亦退果已上問有宗之意許羅漢退其理不明阿毗達磨作此言欲貪隨眠由三處起一未斷隨眠故二隨應境現故三正起非理作意故大乘對法論第四亦同之一煩惱隨眠永未斷故二順煩惱法現在前故三不正思惟現前起故如是煩惱方乃得生是名緣起已上羅漢既斷一切煩惱何更起惑初後二果俱無漏道證然初果不退羅漢那退故𭑕經云聖惠斷惑名為實斷若有退者寧名實斷又𭑕經云我有學應不放逸諫彼放逸為懼退失羅漢若退何不諫答退不退別由根利鈍根羅漢應起事相浮偽修惑初果不退斷迷理惑見真理故俱舍云又見斷惑迷諦理起名依無事修所斷惑迷事生名依有事諦理真實揩定可依聖惠已證必無退理事相浮偽無定可依斷迷彼惑有失念退或修斷惑非審慮生昧鈍性故見所斷惑由審慮生推度性故聖不審慮於事中失念惑生審慮不爾如於繩等爾謂蛇故修斷惑聖有退起非由爾可起見惑聖若審慮便見諦理故聖見斷定無退義已上由三因故起煩惱者約有煩惱羅漢起惑唯由境界故𣵀槃三十四云退因緣復有二種一內二外阿羅漢人雖無內因不離外因以外因緣故生煩惱故則便退失已上會𭑕經者若凡夫人以有漏智斷八地惑退猶受生無漏聖惠斷有頂惑後雖退失無有受生故聖惠斷名為實斷誡有學者一來不還以世俗道得彼二果於行住時由失念故易起煩惱後以聖惠斷餘修惑成無學果善達諦理雖退起惑非容易起是故別誡有學退失凡依有部初果不退後三果退若依經部初後不退中間二果容有退理依宗輪論及大衆部前三有退羅漢無退問經部意不許羅漢退如何分別六種姓義答彼部意者退有漏定非退應果無漏種姓謂有鈍根於彼所得現法樂住退失自在利根不然無退所得故於所得現法樂住有退無退論退不退非約果位論退不退故退靜慮名為退法思此靜慮名為思法護此靜慮名為護法安住靜慮名為安住堪達靜慮名堪達法不退靜慮名不退法對法論亦約現法樂住論退不退如向雜集論十三問六種姓中幾練根耶答不動種姓不能練根本利根故瑜伽五十七云前五種姓皆能練根俱舍婆娑亦同此又顯論云第五堪達種姓練根非前四人對法論云第四安住不能練根前三種及堪達種姓俱得練根問練根唯限無學位耶答俱舍頌曰學異生亦六練根非見道論云唯於信解異生位中能修練根如無學四善根位名信解異生且止傍論可釋本文十信假名菩薩者瓔珞下云始凡夫地值佛菩薩於教法中起一念信便發菩提心是人爾時住前名信想菩薩亦假名菩薩亦名字菩薩其人略行十心所謂信心進心念心定心惠心戒心回向心護法心捨心願心復有十心所謂十善心五教章下云始從凡夫之位佛菩薩正教法中起一念信發菩提心是人爾時名為住前信想菩薩亦名假名菩薩名字菩薩若穢土之中等者辨於穢土中立三聚名三聚名義如第三記小乘燸頂造五逆者俱舍論二十三云燸必至𣵀槃頂終不斷善光記云若得燸法雖有四失而有一德如文可知四失者退善斷善造無間業墮𢙣趣一德者必至𣵀槃也若得頂法雖復有退造無間業墮𢙣趣三失於前頂法更增畢竟不斷善根三失者退善造無間業墮𢙣趣也問身在穢土即成淨土決定業者三聚之中是何所攝若正定聚者經云衆生者阿鞞致豈非得生後始名正定聚設雖成定業生在穢土何名正定故起信等十信菩薩名不定聚餘凡夫若依之不名正定者成五無間業決定應墮地獄故名邪定聚翻之思之決定順次可生淨土亦可名為正定之聚答不定聚攝居退處故在退位故經文及釋約生淨土正定聚莫謂能成決定業故生在穢土尚名正定邪定聚例夫必齊等法門立隨時殊故凡於淨土正定聚但有勝緣念進修無退轉故名正定聚正者純善果也定者不流轉也又能修正道名以為正不退其道即名為定故今文云念進修大乘聖道決定不退故得名為正定聚也由此義故設成決定在穢土時尚以可屬不定聚也處既輪回不可約處不退論正定聚位必退轉不可約位不退辨正定聚只是不定聚具足正信故由佛願力成往生業也𣵀槃正果離繫擇者無漏擇力斷煩惱繫能證解故名離繫擇者蕳擇即惠異名擇力所得名擇是不生即理乃𣵀槃是果故云𣵀槃正果離繫擇問今約處不退消正定聚文壽經文云生彼國者皆悉住於正定之聚是第十一正定聚願成就文也然彼本願令其土人天所起行速階不退其不退者是位不退若爾何彼願成就成處不退又小經云衆生者皆是阿鞞致亦是可述本願之意答大經正定之聚小經阿鞞致諸師所解更非一準所謂鸞師彼人天所起諸行由佛願故速入大乘正定之聚其正定者便是三賢所以知者十住論中所明二道十信惟越致菩薩至初住阿惟越致所行道故論注云但以信佛因緣願生淨土乘佛願力便得往生彼清淨土佛力住持即入大乘正定之聚正定即是阿鞞致願生彼國乘佛願力便得往生者顯示此土凡夫所行依攝凡夫願速得往生彼清淨土佛力住持即入正定者顯示彼土人天所行依正定願速入不退同注下云凡是生彼淨土及彼菩薩人天所起諸行皆緣阿㫆𨹔如來本願力故生彼淨土所起之行依佛力者明此土人所修念佛據佛願力速得往生次第十八願故彼土人天所起之行依佛力者明彼淨土人天起行據佛願力速至正定次第十一願故彼土菩薩所起之行依佛力者明彼淨土菩薩所行據佛願力速至補處次第二十二願故明知鸞意正定聚者修得所成非處不退又安樂集判易行道云正定聚者阿鞞致不退位也又和尚云證得不退入三賢亦同彼意若據慈恩便有三義一初地二七住三處不退故小經疏云彼是不退轉地衆生彼皆得不退轉云何但以念佛發願而不斷惑即得往生答彼當不退但以地勝緣強長時無間遂得不退非亦生彼即是不退廣乃至今準觀經衆生彼得不退轉但謂初地得生法二忍更不退轉又云若據衆生彼得至七八地者位太高若至初地者即與觀經相應故彼經云衆生彼有經一劫半劫得入歡喜地已上此不據資糧論八地不退準觀經依智度論及𢏏勒論釋初地證不退而已又同疏云又若依瓔珞本業經文至十住中彼經云若新發菩薩若進退多在第六住廣乃至若衆生生彼得入七住名不退轉此事必然以時長久修緣強故已上此據本業第七住位不退也又同疏云又有釋者彼無七種退緣故令生者皆不退轉一無五退具如婆娑云一長病二遠行三常誦習經業四常營事𭄽五恆和諍訟此五因緣令心勞倦是名五退具二長壽於無量劫供佛聼法倍隨勝人即長時修故不退三無女人故無欲愛心而六塵境界見聞觸者令心不染而發菩提心即無染愛依故不退四無不善事及不稱心故不退五無𢙣友常見諸佛一生補處菩薩故心慢墮則敬修故無退六由彼佛願力故不退無量壽經云其有衆生一生我國乃至成佛不更𢙣趣除示現生若不爾者不取正覺又十住毗婆娑若人欲得現身至不退轉者當稱念西方無量明佛七為利益衆生不退智度論云阿鞞致有二一得無生法忍者二未得忍而是生死身結使未斷佛知其人必當斷故為利傍人如來亦記彼菩薩是阿鞞致釋迦亦知我等衆生得生於彼必得不退故遠亦名不退故言皆是阿鞞致已上下第六卷西方要決及迦才憬同作處不退釋斯乃佛意含多義故古今諸師解各述一邊問若約位證不退者未階彼位時應名不定聚若爾便無諸邪聚及不定聚未階不退時雖應名為不定聚而遂不退必至正定類故名為正定聚如彼未來得非擇有為諸法有為類故名為有為餘文易了不可煩釋本如法華經至何願生乎第十三問文有其二一引經教二若然下正難先教中又聖教者成實論云行者以不樂世間故能深樂若不厭世則於寂不能深樂是故應習一切世間不可樂想三歸五戒慈心猒離㓛德經云如上布及受三歸五戒慈念衆生福復不如起一切世間不可樂想福所以然者起一切世間不可樂想福能令行者生死苦終成佛道故其福最勝也已上次正難中若然等者𢝰難一即耽著等者別難即有其二一上所舉法花兩文謂誡著樂屬癡所盲嫌無惠心然淨土中偏有五欲何離相二上所舉又聖教言謂無猒心不樂𣵀槃然淨土中無苦可猒何求寂本斯義別也至欣求𣵀槃答第十三問文有其二先𢝰非難次正解釋正釋中二一穢土五欲至正等菩提釋法華文難二又願生下會又聖教難初釋中穢土五欲增長貪心等者色等五境名為五欲境能生欲因中果故曰五欲所謂穢土色等增長貪染煩惱若起必造𢙣業若造輪回𢙣趣三障雲閞四趣海深沉淪因緣莫先耽境故經言著樂癡所盲等也淨國不爾雖有衆樂須生出世無漏之心更非有漏染著之樂大乘法樂三昧定樂者天親論云愛樂佛法味禪三昧為食謂淨土中食一乘味能生喜樂具如第一記佛地等又在三昧長養諸根心身安祥無生疲倦是名定樂此等諸樂皆是𢏏𨹔願力薰成平等性智難思作故能導凡情令增聖道所見是淨妙之色無一色非三摩鉢地所聞皆則解之聲無一聲非𨹔羅尼門嘗一味而方變醍醐聞一香而忽入法界微風寶草觸能除塵勞之垢法塵提亦覺無生之忍是故今稱讃二文且證色法二種境界能生種妙花是色境也大乘法樂即法境也初後二境能增道德中間四境例而亦爾觀無量壽及大小本稱讃寶積平等覺經廣淨境增佛道相恐繁不引後學詳關如是所有諸境若見聞覺知者不長貪染更增㓛德凡八方上下無央數諸佛國土所有樂事二百一十億諸佛淨𭃯嚴重妙儀皆悉攝在㫆𨹔寶國何比穢土放逸境界問上云五欲那論法境答起過多有五塵境界故明穢相且五欲生㓛德法通於六塵故辨淨相泛論法境次釋中亦二一明於穢土已猒苦故得生已後更不猒苦謂願生人猒穢土苦求𣵀槃樂方樂生西方能修菩薩行居穢土時已有猒欣即生淨邦得生之後抉樂無退修菩薩行可求寂豈須亦彼有苦縈身故猒其苦方𫤭欣求寂之慮二明求𣵀槃非唯猒苦謂或聞諸佛㓛德不可思議是佛寶也或聞六波羅蜜諸道品法是法寶也或覩諸菩薩遊戲神通是僧寶也或嗅香嘗味等是餘依報㓛德皆能進道趣求𣵀槃非唯一途更不可言極樂世界無苦可猒遂不許欣求𣵀槃也本如論中至不受苦耶第十四問意可見論中者如智度論二十三云有諸聖人雖無所亦皆有苦如舍利弗風病苦畢陵伽婆蹉眼痛苦即此義也如離越羅漢者別出其類𮦀寶藏經云昔𦋺賔國中有阿羅漢名曰離越山中坐禪時有一人失牛逐蹤至離越所時值離越煮草染衣即自然變作牛皮染汁自然變作牛血所煮染草變成牛所持鉢釫變作牛頭牛主見已即投收將詣王所王即付獄𨒬十二年恆與獄監飼馬除糞離越弟子得羅漢者有五百人觀覓其師不知所在業緣欲𥁞有一弟子觀見師在罰賔獄中即來告王我師在獄願王斷理王即遣人就獄撿挍至獄中唯見有人威色憔忰鬢髮極長而為獄監飼馬除糞使還白王獄中都不見有沙門離越弟子復白王言願王教有比丘者悉𥊸出獄王即宣令有僧悉出離越聞已𩯫髮自落袈娑著身踊出空作十八變王見是事五躰投地白言尊者願受我懺悔尋即來下受王懺悔即問言以何業緣在獄受苦離越答言我於往昔亦曾失牛逐蹤詐他徑一日一夜後墮三途受苦無量餘殃不盡今得羅漢猶被誹謗以是因緣一切衆生應護口業莫相誹謗離越昔所人是𮝻支佛以是因緣故約此報已上問既云過去定業之報應是正業何餘殃感報證耶答若是餘殃若亦正業必受報故名為定業本此義不定至定不受苦答第十四問文即為二一直釋難二尺如下例而證例中亦二先六種姓辨據在所不受苦報次舉闍王以示𢙣業不必招報阿闍世不受苦者普超經下云舍利弗王阿闍世所入地獄名賔吒晉曰集欲適入尋出其身不遭苦惱之患又云王阿闍世從集欲輕地獄出生於上方去是五百佛國其世界曰莊嚴佛寶英如來至真等正覺今現法當復重見首從聞深經在於彼土即當逮得不起法忍阿闍世於普超經會從首菩薩聞法界平等理得順忍後生上方莊嚴國土從首聞法得益故云重見首問𣵀槃經得無信根普超經明獲順忍何相耶答無根信者以位未定此人本無信佛法僧名為無根今生信心名以為信如樹無根生芽荎故𣵀槃經二十云世尊我見世間從伊蘭子生伊蘭樹不見伊蘭生檀樹我今始見從伊蘭子生檀樹伊蘭子者我身是也檀樹者即是我心無根信也無根者我初不知敬如來不信法僧是名無根已上位未刊定何難忽諸經相此外既多是逗緣耳餘文易覺不須煩釋
