body:
  text: 本經言有四至生西方耶第十二問文有其二一廣舉諸業令知五𨒫順生定業二如何下正難觀經五𨒫往生初文先明四業家中前三是定業者准俱舍論定有三業一順現法受者現法謂現身受謂異𤎼謂此生造即此生受若出其躰准對法論始從慈定定無諍定預流果阿羅漢果起已於彼造作若若益必得現報又於佛為上首僧中造善𢙣業必得現果又有餘猛利意樂加行所行善不善業亦得現異𤎼二順次生法受者謂此生造第二生受生謂生處若出其躰又對法云五無間業能得生異𤎼三順後法受者謂此生造第三生後受乃至多生皆名為後在第二生後故并不定業合成四種言不定者不定受故謂不定受異𤎼故或於三𠀍時不定故𠀍不定故立不定名不定受異𤎼故者時報俱不定故或於三𠀍時不定故者報定時不定故具此二義故名不定問若四業家不定之言兼二義者與五業家有何差別夫五業家者三定業上更開不定以為二種一異𤎼定時不定謂果必受時於三𠀍即成不定二異𤎼與時俱不定謂果與時俱是不定知四業家不定業者只是第二不定義非是第一異𤎼决定時不定業故俱舍論述四業家不定相云非定受故立不定名無諍彼四業家不定業者唯異𤎼不定義也又今論云或感不感報故全同俱舍若爾者何言具二義非直理必背論文答二義者即依圎暉非私辨立彼師亦非無其證據所謂光記四五兩家存其二義一二家各別二開合不同非各別義此中非別以為正義圎暉師意依彼正義為顯四五兩家一義就四業家亦許異𤎼定時不定業也若爾不可言四業五業更無差別本是開合非別義故光記云問四業五業為同為異解云或有同有異若三定業及不定中異𤎼不定時不定兩皆同若不定中異𤎼定時不定五業有四業即無此即異故五業家於不定中開為二種問何故四業於不定中無異𤎼定時不定耶解云四業約時辨定不定時與異𤎼無別躰性若於𤎼定必於時定即是定攝故於不定無異𤎼定時不定者又四業家解不定云非定受故立不定名以此故知於不定中所感異𤎼或受不定五業家言於不定中有異𤎼定時不定故知兩不同又下文評取四業所為善明知與五差別不同問若四業家無異𤎼定時不定者何故正理論師破例八業家云謂如𤎼定時不定業時不定故既共許為順不定受云云彼論既言共許不定明知亦有異𤎼定時不定者解云彼言共許五業家共許或八業家共許又解云四業五業義皆相似開合為異五業家於不定中解開兩種一異𤎼定時不定二異𤎼不定時不定雖約異𤎼開為兩種若時義邊俱是不定故於不定雖開二種其義不殊若作此解四業解於不定中亦有兩種凡言造業於時難定若於時定異𤎼必定以時離𤎼無別躰故以時依彼異𤎼果故自有業於異𤎼定時不定故異𤎼果自有躰故以異𤎼果不依時故由斯理故於時不定中可兩種又下文解現業中云於異𤎼定位不定者此業必能招現報果又正理論正義家破八業家云謂如𤎼定時不定業時不定故既共許為順不定受云云彼論既言共許明知正義家同共許也又正理論但破八業家時定𤎼不定不破八業家及五業家𤎼定時不定以此故知四業五業開合為異四業家云非定受故立不定名者或非定受異𤎼故立不定名此約異𤎼或受不受名不定或於三時中非定於此時受異𤎼故立不定名此約受異𤎼三時不定名不定故不相下文評取四業不言五業者以義同故但言四業即是五業故不別雖有兩解後解為勝時依異𤎼可言時定異𤎼亦定異𤎼不依時立不可言於異𤎼定時亦定又准諸論於不定中皆有兩種更無異已上今論言或感不感報准光記會俱舍論文更可通釋問此四業中何業㔟力強何業劣耶答若經部意順現受業其力則強是故亦受順生順後順生受業其力漸劣亦受順後不受現果順後受業其力最劣唯受順後不受現生故順現生二種業感雖不一𠀍而唯名現等是約初𤎼斯乃經部正量部及以大乘亦許一業感多生多業引一生之故也如雜集論第八云於此業中從初𤎼位建立順現法受等名不唯受此一位異𤎼若業於此生造即從生已去異𤎼成𤎼名順現法受業若業於此生造從無間生已去異𤎼名順生受業於此生造度無間生已去異𤎼成𤎼名順後受業已上若毗曇意順現非必𭤽順後非必𭋘而有感果遲速不同只是生死法爾因果也如外種近𤎼是劣遠𤎼即勝所謂蔡經三月半𤎼麥經六月即能結實蔡豈勝麥佛相業雖順後業其力勝餘云云次又有八業者是經量部喻師義也即有四句開為八業第一句者於時分定異𤎼不定此分三種一順現時定果報不定若現受果即能受得若現不受更永不受故於時定其果不定二順生時定異𤎼不定若順生受方能受得順生不受更永不受三順後時定其果不定若順後受方能受得彼時不受更永不受第二句者此但為一謂業報定時分不定彼五業家果定時不定業即是也第三句者果時俱定此亦有三一順現時果俱定二順生時果俱定三順後時果俱定彼四五家三種定業即是也第四句者此但為一謂時果俱不定彼四五家時報俱不定業即是也第一句時定果不定兩家共不許時分若定果亦决定以時離果無別躰故是故正理論云理必無有果𤎼不定時定不定業時定唯是果𤎼定中位差別故非離異𤎼別有時躰如何時定非異𤎼耶已上而喻師所以立者有情業躰無盡數故如𭃯那定其時緣闕遂不感果得非擇在報定時不定業何無時定報不定業今第一業彼第二句第二彼第一第三第四如次彼第三第四耳第一第三是定業者問今論第一是報定時不定四五業家俱屬不定何言定業答報定時不定為不定業約對三業時報俱定今定業者相望第一句時定報不定第四句時報俱不定雖時不定報一定故名為定業所望異故各據一義餘如文解不能訓釋本此四種八至有何疑也答十二問文有三意一會所難文屬密意二於諸下至𢘻得消證而解大乘實義不立定業三今觀下釋成念佛消除五𨒫第一會難中九部不了教者𣵀槃第五卷云以諸聲聞無有惠力是故如來為半字九部經典而不為伽羅論方等大乘已上同第七云九部中不明佛性法華經云我此九部法隨順衆生入大乘為本以故是經故以九部屬不了教𭾂別語耳通而為論小乘亦有廣問記三謂有記莂六道因果又阿𭇥中亦授㫆勒當作佛記是授記經又有自唱善哉無問而又阿𭇥中有大空經明是老死誰老死為人法二空即方廣成論所明實義空者即其義也當知小乘通具十二故𣵀槃云先雖彼聞十二部經但聞名字不聞其義今因𣵀槃得聞其義又云先雖得聞十二部經我意猶謂故不如是大𣵀槃經捐阿𭇥時言先得聞大品經云魔作比丘為菩薩聲聞十二部經問若爾何故云小九部答有十二者小乘中非大乘義故別讓三存於九部證得實理身心常住小乘灰斷無未來化故無廣經縱令法空為方廣文小乘根鈍必假緣無任運故闕無問自雖有授記作佛少故小乘中無彼三也又大有九部除因緣喻論義大乘之人以根利故不假此三斯亦別論通語大乘何無此三又𣵀槃十四云又有者名十一部菩薩能大乘方等同十九云復有十一部經除毗佛略已上大乘如來是常一切衆生皆有佛性正理為方包𭁻為廣又言方等理融無二亦名為等聲聞所無故但十一若小乘定有九部者不應復有十一部經既取十一亦通十二為緣別或於三或於一大小一一名義智論三十三對法論第六廣明云云第二證解中𣵀槃十九懺悔者父王無辜撗加𨒫害因𭓯父己心生悔㔟心𢙉故遍躰生瘡其瘡臭穢不可附近尋自念言我今此身已受花報地獄果報將近不遠其母韋提希以種種藥而為拊之其瘡遂增無有降王即白母如是瘡者從心而生非四大起若言衆生有能治者無有是處時有六臣一日月稱二曰藏德三曰實德四曰𢘻知義五曰吉得六曰無所畏各諫王遣六師所王疑不往時耆婆教令往佛所臣聞佛智者有二一者不造諸𢙣二者作已懺悔愚者亦二一者作罪二者覆藏雖先作𢙣後能發露悔已慚愧更不敢作猶如得水置之明珠以珠威力水即為清如煙雲除月則清明作𢙣能悔亦復如是王若懺悔壞慚悔者罪則除清淨如本又臣聞等者經云臣聞佛修一善心破百種𢙣大王如少金能壞須㫆亦如少火能燒一切如少毒藥能𭓯衆生少善亦爾能破大𢙣雖名小善其實是大何以故破大𢙣故乃至廣又三十一等者師子吼菩薩舉諸經業果决定疑有善𢙣定受業者不應見佛性及以成阿耨菩提所謂𠀍尊如經中若畜生得百倍報施一闡提得千倍報施持戒者得百千倍報施外道斷煩𢙉者得無量報施不退菩薩及最後身諸大菩薩如來𠀍尊所得福報無量無邊不可稱計不可思議純陀大士若受如是無量報者是報盡何時當得阿耨菩提𠀍尊經中復若人重心造善𢙣業必得果報若現𠀍受若次生受若後𠀍受純陀善業殷重心作故當知是業必定受報若定受報云何得成阿耨菩提𠀍尊經中復記一切衆生若無三界業者即得菩薩如法句偈非空非海中非入山石間無有地方所之不受業又阿泥樓馱言𠀍尊我憶往昔以一食施八万劫中不墮三𢙣一食之施尚得是報何純陀信心施佛具足成就檀波羅蜜若善果報不可盡者謗方等經犯五𨒫罪四重禁一闡提罪云何可盡若不可盡云何能得見於佛性成阿耨菩提佛會彼故云如是謂師子吼所舉諸經為於業緣心輕不信欲度彼故作如是重業既有定不定義知一切業皆是不定問何業定受何不定受耶答經自釋云有智之人以智惠力能令地獄極重之業現𠀍輕受愚癡之人現𠀍輕業地獄重受廣乃至以是義故一切諸業不名决定已上又言或有重業可得作輕等者同經三十二云如蒼蠅為唾所粘不能自出是人亦爾於小罪中不能自出心初無悔不能修善覆藏瑕疵雖有過去一切善業𢘻為罪之所垢𣲇是人所有現受輕報轉屬地獄極重𢙣業善男子如小器水𣇣塧一斗其味醎苦難可得飲是人罪業亦復如是善男子如有人負他一錢不能得償故身被繫多受衆苦是人𢙣業亦復如是師子吼菩薩言𠀍尊是人何故令現輕報轉地獄受佛言一切衆生若具五事令現輕報轉地獄受何等為五一者愚癡故二者善根少故三者𢙣業深重故四者不懺悔故五者不修本善業故復有五事一者修集𢙣業故二者無戒財故三者遠離諸善根故四者不修身戒心惠故五者親近𢙣知識故善男子是故能令現𠀍輕地獄重受師子吼言𠀍尊何等人能轉地獄報現𠀍輕受善男子若有修習身戒心惠如上所能觀諸法同如空不見智惠不見智者不見愚癡不見愚者不見修集及修集者是名智者如是之人則能彼集身戒心惠是人能令地獄果報現𠀍輕受是人設作極重𢙣業思惟觀察能令輕作是念言我業雖重不如善業如疊華雖復百斤終不能歒真金一兩如恆河中投一斗鹽水無醎味飲者不覺如大香象能壞䥫鎖自在而去智惠之人亦復如是常思惟言我善力多𢙣業𮊵𭋘我能發露懺悔除𢙣能修智惠力多無明力少如是念已親近善友修集正見已上阿闍𠀍王不入地獄者問普超經阿闍𠀍王入陀羅地獄何云不入答言不墮者依𣵀槃經所謂彼經第二十云爾時佛告諸大衆言一切衆生為阿耨多羅三藐三菩提近因緣者莫先善友何以故阿闍𠀍王若不隨順𦒿婆語者來月七日必定命終墮阿鼻地獄是故近因莫若善友又二十云阿闍名為不生𠀍者名𭜨以不生佛性故則煩𢙉𭜨生故不見佛性以不生煩𢙉故則見佛性以見佛性故則得安住大般𣵀槃是名不生是故名為阿闍𠀍已上明知闍王順𦒿婆諫免於地獄安住𣵀槃普超即是一機所見不須會通又雖墮尋出不𮞸苦患速生上方莊嚴國故名為不入如第四記具彼經鴦崛摩羅得阿羅漢者新言鴦𡩷利摩邏此云指舊曰鴦崛摩羅訛也准賢愚等所邪師教殺於千人而取一指以為鬘冠首必得天上勝報將欲𡧱母以死指數𠀍尊悲愍方行道化遙見𠀍尊竊自喜曰我欲生天此事决定師教在茲𭓯佛𭣦母當生梵天謂其母曰老今且止先當𭓯彼大沙門尋釰往𨒫𠀍尊如是於是徐而行凶人捐鬘疾驅不逯即彼唱曰住大沙門淨飯王太子我是鴦啒摩今當裁一捐時𠀍尊言何守鄙志捨於善本激𢙣根源此人聞誨悟所行非求入法中精勤不怠證羅漢果𣵀槃十九即得地獄因緣發阿耨多死三藐三菩提心是經異不須和會瑜伽論未得解等者玄贊云瑜伽第六十依未解者建立定受業故言解者謂𠀍道伏斷乃至得聖成無學等即同𣵀槃經未入佛法名决定業若入佛法名不定業已上拪復鈔大同之此據大分自因而若約別緣之所加者我等所修亦定業若不爾者今何成觀經乎如是等下結餘如文解要集今文證五𨒫不定業訖注曰轉重輕受具出放鉢經云云本如諸論中至何業攝耶第十三問先文次正問文中諸論者大小乘諸論中廣明四種業先小乘者俱舍十六云又經中業有四種謂或有業黑異𤎼或復有業白異𤎼或復有業黑白異𤎼或復有業非黑非白無異𤎼又云佛依業果性類不同所治能治殊黑等四光記云佛依業不同所治殊能治殊隨其所能黑等四又解佛依異𤎼因異𤎼果性類不同前三業依有漏所治無漏䏻治殊後一業又解依業不同通立四種依果不同前三種依所治殊前三種依能治殊後一種已上三尺差別其相可知欲界不善名黑業者非直業黑其果亦黑故云黑俱舍論云諸不善業一向名黑染𣲇性故異𤎼亦黑不可意故已上此論意業染𣲇故名黑果不可意為黑若據實論業亦可通不可意黑向不可意境作不善業故婆沙云黑有二種一染𣲇黑二不可意黑此中業由二黑故名為黑異𤎼但由不可意黑故亦名黑光法師依此婆沙會俱舍云諸不善業亦應名不可意影現可知略而不故婆沙一百一十四云黑有二種已上色無色善業名白者論云色界善業一向名白不雜𢙣故異𤎼亦白是可意故已上准黑可知無色之善攝不攝義至下可辨欲界善業名雜業者欲界善業雖是善性而𢙣雜故名為雜業異𤎼亦雜非愛果雜非唯愛故俱舍論名為黑白業義與今同謂欲善性白而非𢙣他黑交來淩雜善故名黑白業故論云此黑白名依相續立非據自性所以者何以無一業及一異𤎼是黑是白互相故問五趣善俱得黑白名答光記云於欲界中不善業果非必應為善業果雜如斷善人造諸𢙣業及地獄中受異𤎼果欲界善業果必定應以𢙣業果雜如五趣中造善業及四趣中受異𤎼已上於五趣中所造善業及除地獄外四趣中所受異𤎼必應以𢙣業果間雜知黑白名不限人天問不善業果非必應為善業果雜善業果何必為不善業果雜答圓暉疏云不善業果非必應善業果雜如闡提身即無善業於地獄中無可意果欲善業果必為𢙣雜以欲界中𢙣勝善故欲邪見能斷善根欲界善業不能斷𢙣故欲界𢙣𭤽於善也已上問欲界善業為𢙣雜者已離欲未離欲善俱得此名耶答光記云欲善業果名為雜者據未斷若細分別已離欲者作欲善業非𢙣業雜雖為因時非𢙣業雜受果之時必𢙣果雜以因從果𢝰名為雜或相雜類故名為雜以欲界中𢙣勝善故𢙣名黑不名白黑善名黑白不名白已上無漏業名非黑白無異𤎼業者彼非有漏黑白業曰非黑白再論之者無漏亦白其躰清淨離垢故能壞有故名無異𤎼次大乘者對法論第八云復次有四種業差別謂黑異𤎼業白異𤎼業黑白異𤎼業非黑白無異𤎼業能盡諸業黑異𤎼業者謂不善業由染𣲇故不可愛異𤎼故白異𤎼業者謂三界善業不染𣲇故可愛異𤎼故黑白異𤎼業者謂欲界繫雜業善不善雜故云何一業亦善亦不善此中不約生𭃯那相一種業亦善不善然約意樂及方便𢝰一業是此經意約此二種若黑若白互不相似建立一種黑白業故或有業意樂故黑方便故白或有業方便故黑意樂故白意樂故黑方便故白者猶如有一為欲誑他先現其相令信已故行於惠施乃至出家方便故黑意樂故白者猶如有一欲令子及門徒遠危處安由憐愍心現發種身語𢙣遂於此時發生雜染非黑白無異𤎼業能盡諸業者謂於加行無間道中諸無漏業以加行無間道是彼諸業斷對治故非黑者離煩𢙉垢故白者一向清淨故無異𤎼者生死相故能盡諸業者由無漏業力永黑等三有漏業與異𤎼習氣故已上今同俱舍對法半異白業通三界善業黑白業名意樂方便故也次未知下正問應知本有四業至攝業不盡答十三問文有二如次三界攝不攝義初四中二業所攝先摽二業攝次非餘二業若未得上等者釋二業攝謂若未得上界定心以欲生得聞思心修西方業者此用雜業往生淨土若伏欲惑得上界定生西方者此白業生極樂也次中有不然者先非前義此三種業等者𢝰示此業約穢土業非淨土前四業中除無漏業但論有報故云此三且雜業等者別明淨業非雜業攝謂雜業者名因果俱雜不可意往生淨土無有衆苦一向安樂寧容雜果一向安樂蕳其憂苦是名報土喜樂圓滿如第一記攝大乘及佛地論若唯白等者明白業非淨土因謂其雜業有上失故白業淨土因者未得靜慮未離欲人是因何業方生西方故知下結謂雜業名感其雜果唯白業非一切得故知淨業非前業攝前之四業淨因故攝法不盡於理何妨又無色等者例證成四業攝業不盡謂有處文以無色業四業不攝以此例知淨業亦非四業所攝問指於何文言有文耶答俱舍論所𭑕經文即有二一無色業四業不攝上所引論言又經中文是也二無色業四業所攝彼論亦言然經中有處亦文是也然今問中言白者色無色業已依次以無色業白業攝望於此指無色業四業不攝而言有文故論第十六云何故不言無色界善傳若處有二異𤎼謂中生有具三種業謂身語意則非餘然經中有處亦光記云毗婆師傳若處有二異𤎼謂中有生有具身語意業則非餘於無色界有生無中有意無身語是故不經中有處亦無色善業名白異𤎼業彼據善業可意果故已上俱舍論兼攝不攝義對法論偏白業攝今亦已存四業攝義故知即捐相所言有文也本又大小乘至極樂國也第十四問先文次正問所言大小乘論等者先言小乘俱舍十五經所三種業而作頌云福非福不動欲善業名福不善名非福上界善不動招愛非愛善𢙣報故欲善不善名福非福上界善名不動業者次頌述曰約自地處所業果無動故光記云非如欲界有動轉故立不動名謂欲界中有餘異趣異處滿業由別緣力資助彼故令於異趣異處中受以或有業能感外財官位內身形量顏色身及受樂等滿業於天等四趣中此業應𤎼由別緣力所轉故於人等四趣中此業便𤎼已上次言大乘對法第七經三種業云謂福業非福業不動業福業者謂欲界繫善業非福業者謂不善業不動業者謂色無色繫善業問何故色無色繫善業名不動耶答如欲界繫中餘趣圓滿善不善業遇緣轉得餘趣異𤎼非色無色繫業有如是事所受異𤎼界地决定故是故約與異𤎼不可移轉名為不動又定地攝故為不動唯識疏云福者勝義自躰及果俱可愛樂相殊勝故非福者不可愛樂自躰及果俱不可樂相鄙劣故不動者不可改轉義其業多少住一境界不可移動故已上問上界業果無動轉者何故聖者依無雲等三天故業生淨居天又中間定小修習者生梵輔天四禪比丘第四靜慮中有現前謗釋𣵀槃生奈落迦此豈非有動轉義耶答大小乘論俱無動者約有漏業論不移動更所不無漏雜修殊勝㔟力助彼故業令生淨居例如無漏增上緣力資助漏業感成變易若依小乘許聖者方造業故修習五品雜修靜生五淨居非據故業彼中間禪小修習者同一處故生梵輔天故光記云不多修習便為梵輔同一處故四禪比丘非以彼業直生地獄謗釋種法邪見等故乘此𢙣業墮在地獄是故諸文更非相本有於三至非業也答十四問即有二如次三界攝不攝義初中十六觀若得上界定者若聞思惠修十六觀亦福業攝若依修惠行十六觀即不動業為令知此別故云若得次可知本未知得生至而往生也第十五問文意可詳本案稱讃淨至有彼益耶答十五問文有其三一據經而摽其益數二何者下列一益三略舉下結嘆第二列中有三十益一受用妙土益謂彼淨土阿㫆𨹔佛後得無漏大悲薰成故淨土論云正道大慈悲出𠀍善根生言正道者無分別智大慈悲者無分別後得智相應㓛能憂苦之因果名悲與喜樂之因果名慈此二種智同無漏故名為出𠀍彼無漏善因而起故名為生也攝大乘明因圎淨云出𠀍法㓛德所生釋曰二乘善名出𠀍從八地已上乃至佛地名出𠀍出𠀍法為𠀍法對治出𠀍法為出𠀍法對治㓛能以四緣為相從出出𠀍善法㓛能生起此淨土施不以集諦為因此句明因圎淨何者為出𠀍善法無分別智無分別後智所生善根名出𠀍善法佛地論云勝出𠀍間善根所起或諸聲聞獨覺智道名出𠀍間如來善根過彼名勝此佛淨土如來識中無漏善根為因而生與攝論同出勝顯示超過二乘出𠀍善根淨土論但言出𠀍善不云出勝是文略耳或直蕳漏言出𠀍善若蕳二乘如攝論等可謂出斯乃三大阿僧劫所修習諸利他無漏純淨佛土因緣成就為土生因故云種㓛德莊嚴今此娑婆諸𢙣煩𢙉集諦為因所生起故到處唯聞愁歎之聲六道同然無安身地彼安養界阿㫆𨹔佛無漏願智巧能莊嚴不以有漏業惑集諦為因緣故得往生受用如是㓛德莊嚴清淨佛𭃯快樂非一其德下顯自下諸益從此益成故為第一二受用法樂益謂得往生唯以受用大乘法味能任持身長養善法無有偏小塵坌身故淨土論云愛樂佛法味禪三昧為食愛樂即是受用之義大乘法味名為佛味蕳二乘法禪三昧者應一乘相應定攝大乘明持圎淨云大法味喜樂所持釋曰大乘十二部經名大法真如解等為味緣此法味生諸菩薩喜樂長養諸菩薩五分法身此句明持圎淨佛地論云如是淨土眷屬圎滿於中止住以何任持廣大法味喜樂所持謂於此中大乘法味喜樂所持食能令住是任持義問淨土超過三界行處云何有食又無漏法不應名食能長養三有衆生此斷有故應不名食答是佛地問全依小乘論自會云是任持因故亦名食如汝宗中生色界等入無漏定亦應名食非過去食應名為食過去無故此亦應爾是任持因故為食如有漏法雖障無漏然持有漏得名為食無漏亦爾雖斷有漏然持無漏云何非食此淨土中諸佛菩薩後得無漏能能受大乘法味生大喜樂又正躰智受真如味生大喜樂能任持身令不斷壞長養善法故名為食已上上受用字應流至此今此娑婆無量劫間希遇佛法如一滴入大海中歷歲流轉然後得之極難可得藥王燒臂普明刎首儒童捨身常啼割肝𭾂皆表難值之志也故法花云是諸罪衆生以𢙣業因緣過阿僧劫不聞三寶名而生彼國與諸菩薩等無有異恆受大乘一味法樂豈非勝益三奉事佛尊益無量壽佛其土教主常為法王攝受住持故淨土論云正覺阿㫆𨹔法王善住持正覺蕳因覺㫆𨹔蕳餘佛言法王者蕳不自在住持者名不散不壞攝大乘明主圎淨云如來所鎮尺曰如此相淨土如來恆居其中最為上首故言鎮此句明主圎淨佛地論云宮殿定有主依持故如來所都謂大宮殿諸佛𠀍尊為主非餘以殊勝故唯屬𠀍尊或唯𠀍尊住持攝受非餘所能自受用土雖遍法界一自變各自為主不相障礙他受用土雖諸佛變然一合相亦一相身攝受為主不相障㝵已上佛常為主人恆可奉今此娑婆有羅𭃯為君則土相噉有愚暗為主則民烟稼雖值堯舜禹湯之化亦非無紂皇武之無為不厚不足為鎮又見聖尊親近供養最以為難師子吼言我等無數百千劫修四無量三解今見大聖牟尼尊猶如盲龜值浮木菩薩尚爾何凡夫佛在舍衛二十五年一城中居三億衆生不見不聞在𠀍尚爾何後故法華云諸佛興出𠀍懸遠值遇難正使出亍𠀍是法復難而彼極樂佛住持國主而恆鎮護值遇非難見聞甚易故為妙益四供養諸佛益彼土衆生非直供養無量壽佛又能任意供養他方諸佛如來謂每日晨朝或三時六時等中各以衣裓盛衆妙花飛到八方上下無尖數諸佛所前而作禮供養敬衣服伎樂名香飲食等諸供具隨意出生供養亦爾或以食時還到本國飯食經行受諸法樂或平且往及晚暮來或須去亦須還故淨土論云兩天樂花衣妙香等供養所餘經論其文極廣今此娑婆所有人天志趣不廣神通不𬾨不能遍至十方𠀍界供養諸佛如來大衆或耽己土穢濁不敢往詣淨𫭫或顧我身鄙賤不伺嚴淨境界而彼衆生𮠪願乘通面奉諸佛鎮致供讃豈非希奇故為勝事五諸佛授記益於如上諸佛如來前次第𮐃記决定當得大菩提事故觀經云於諸佛前次第授記成等正覺菩薩所期縱行佛道未來時事尚未决定甚為不審而一一佛面以示捐豈非凞怡故立為益六福智圎益五度名福第六為智乘此福智能至道場故云資糧彼土菩薩現前修習普賢之德超出於常倫諸地之行故云滿淨土論云能令速滿足㓛德大寶海案十地經及彼論等菩薩進修階級不輒𨒬多塵劫積無量勳然後乃成一地㓛行縱相續修三時遠計笇難及生退崛輪回無窮而㫆𨹔𭃯以佛願故一㓛德無速不滿如好堅一日生長過百丈七速證菩提益如上資糧圎滿故道場之處豈遙耶故稱讃經云速證無上正等菩提如卷初辨八大集會益極樂𠀍界普賢文殊觀音㔟至花聚山海等久住遊方諸大薩埵𭃯土死滿猶如盛市佛地論明輔翼圎滿云諸大菩薩衆所雲集諸大宮殿常有無量大菩薩僧共所雲集諸來朝者名為輔翼既有無數大菩薩僧常來輔翼故無𭜨歒能為𭓯已上此等大士一聞其名尚非少緣得一席然彼衆生常會一處更互交接俱得相見問訊敬親近羕習大悲𫝊風大智成熏豈不勝利故小經云諸上善人俱會一處即其義也九常無退轉益退所得必依因緣因謂內因即諸煩𢙉緣謂外緣即天魔等淨土之中無有此事故不退轉佛地論明攝益圎滿云諸煩𢙉撗𮉐垢謂於此中遠離一切煩𢙉𮉐垢及諸撗即諸煩𢙉名為𮉐垢如是即名諸撗因煩𢙉𮉐垢此中無故所作撗此中亦無又煩𢙉者謂一百二十八根本煩𢙉𮉐者即是無慙愧等垢者即是諂誑憍等撗即是彼所發業及所得果若所知障或諸隨眠名為煩𢙉即彼現起名𮉐垢本惑名𮉐隨惑名垢所知障等名為撗此中何法名為攝益即離煩𢙉灾撗緾垢名為攝益如𠀍封主雖不攝受且不為灾對戶亦言主攝益我此亦如是又現證得解煩𢙉灾撗緾垢殊勝福智故名攝益又次明無畏圓滿云如是淨土離內灾撗攝益圓滿亦應無有外怖畏因故次示現無畏圓滿遠離衆魔謂於此中遠離一切煩𢙉蘊死及以天魔或能令他遠離四魔如是四種是怖畏因由是能生諸怖畏故此中無彼故無怖畏煩𢙉魔者謂一百二十八煩𢙉并隨煩𢙉薀魔者謂五取薀死魔者謂有漏內法諸無常相天魔者謂欲界第六自在天子如是四種皆𡧱諸善法故名為魔由離是四魔故無諸怖畏初地已上諸大菩薩在淨土中離四魔無五怖畏已上淨土中無內外因緣不生退崛又要集中舉五種因釋不退義一佛悲願力常攝持故二佛光常照增菩提心故三水鳥樹林風鈴等聲常令生念佛念法念僧之心故四純諸菩薩以為善友外無𢙣緣內伏重惑故五壽命永劫共佛齊等修習佛道無有生死之間隔故已上今此娑婆修道得果極難成就煩𢙉內催令心擾濁𢙣緣外𭷣令行退轉或發二乘心或還三𢙣道魚子難長菴果少𤎼如瓔珞經諸退行菩薩等即是也而淨土人觸事增道於物進行畢竟不退必至補處乃至證得無上菩提故十住論云彼尊無量方便境無有諸趣𢙣知識往生不退至菩提故我頂禮㫆𨹔佛有此利故今立斯益十行願增進益無如上生退轉故念增進無有間斷無退有進翻例可知十一鳥群宣法益無量壽等諸經中廣鸚鵡等諸鳥宣揚如來正法佛地論明眷屬圎滿云次言無量天龍人非人等常所翼從謂大宮殿惟有天等眷屬無有餘類等者等取藥刃揵達阿素洛揭路茶堅捺洛莫呼洛伽等莫呼洛伽即攝大蟒云何淨土超過三界所行之處而有天等以為眷屬天等皆是三界攝故淨識如是攝受變現為嚴淨土故不相或有成就所化有情示現如是變化種類如為調伏劫比拏王現化無量轉輪王衆眷屬圍繞或諸菩薩化作無量天龍等身住淨土中以供養佛或自化身為天龍等翼從如來故無有過已上八部衆中揭洛茶者金翅鳥是也推餘鳥類亦應眷屬如來等變若小經意偏㫆𨹔佛變化所作又攝大乘云淨土中實無此衆生欲令不空故佛化作如此雜類此句明眷屬圎淨准多者可以佛變為其正義或佛菩薩各變作故佛地論中隨廣舉之餘且偏述故不相十二風樹法益小經云風吹動諸寶行樹及寶羅出妙音如百千種樂同時俱作聞是音者皆自然生念佛念法念僧之心無量壽經道場樹云風徐動吹諸技演出無量妙法音聲其聲流布遍諸佛國其聞音者得深法忍住不退轉至成佛道又云第六天万種音樂不如無量壽國諸七寶樹一種音聲千億倍也智論九十三淨佛國土品云風吹七寶之樹隨所應度而出聲者是菩薩欲使衆生易聞法故七寶之樹出法音聲寶樹遍滿國土故衆生便聞法餘心不生但生法心准此等今作樂者暢法為樹樂益問佛有無量神通之力化無量身若令法何須樹林音聲法答智論會云衆生甚多若佛處現身衆生不信謂為幻化心不敬重如有衆生從人聞法心不開悟若從畜生聞法則便信受如本生經菩薩受畜生身為人法人以希有故無不信受已上此文亦應證次上益明知變化畜生樹木演暢正法皆示希奇也十三池水法益觀經云其摩尼水流注花間尋樹上下其聲妙演苦空無常無我諸波羅蜜今此娑婆𢙣尋伺業惑相應能感成故若依若正所出音聲無一可意鵄梟鵰鷲鳴梢團風旋嵐響峯洪濤大波廽海聞無安恱之情臨有厭背之慮上之三益如次翻斯學者可詳不能廣述十四諸樂𫝤法益無量壽云亦有自然万種妓樂又其樂聲無非法音清哀亮妙和雅十方𠀍界音聲之中最為第一觀經云無量樂器以為莊嚴八種清風從光明出鼓此樂器演苦空無常無我之音彼大樹緊那洛琴音長老迦亂威儀舞是天帝釋外樂之衆雖有妙曲而不可及第六天上妓樂逸韻以自轉輪王乃至他化自在天上所有音樂一轉勝千億倍故有漏劣天僅彈孝養一曲尊者大聖尚起振舞第六天万種妓樂尚所不及之無漏莭宮商相調種法愛習凡夫聞而敢哉問第十二與今益差別如何答前別明林樹法今𢝰明諸樂𫝤法故開為二更不混亂十五永絶三塗益第一本願云設我得佛國有地獄餓鬼畜生者不取正覺三途名出四解經地獄名火塗猛火成苦故雖有寒獄從主名火正地獄在地下二万其傍地獄或在山林河海或在䥫圍山間從本處故名為地獄若翻苦具可名一切畜生名血塗食噉血肉故略有三種水陸空陸有三品重者土內不見光明中者山林輕者人養種類極多苦相非一餓鬼名刀𭏚加以刀杖故此有三品重者飢餓火莭炎不聞漿水之名猶如地獄中者伺求蕩滌膿血糞穢輕者時薄一飽塞海填河驅加刀杖故從其輕名為刀塗三途受苦壽命等別不遑具盡廣如經論彼土之中永絶此趣諸佛淨業之所令致攝大乘明處圎淨云出過三界行處釋曰三界集諦為行三界苦諦為處淨土非三界苦集所攝故言出過三界行處此句明處圓淨惣證別其義揭焉龍樹讃云若人生彼國終不墮𢙣趣及與阿修羅我今㱕命禮問何故別云四十八願答上諸益多依小經觀經自下多依壽經本願為顯此義別言本願故摽文云案稱讃淨土經觀經及無量壽經四十八願中略舉三十益甚合此文問若爾第二十五六七八九益本願不載答初之三願依悲花經後之二願推尋本願成立願義至文當辨十六真金色身益第三本願云設我得佛國中人天不𢘻真金色者不取正覺觀經云行者身作紫磨金色彼土衆生其身金色內外清淨設第六天王比彼土衆生光顏容色不相及逯猶如乞凶在帝王邊今此娑婆論顯色者黑白優劣者形色者好醜是非以優劣故愛憎忽起以是非故見𢢔即生三有苦海為此范范六道嶮山因之峨峨是故菩薩興大悲心立平等願我國土身色純金第一無比不如人天身色優𤰞展轉相故龍樹云人天身相同猶如金山頂諸勝所㱕處是故頭面禮問准智論等四八相中有金色相何故別願答三十二相經論異所謂廣長舌相及金色相不攝四八等且依無量義示為丈六紫金睴者惣明顯形二色㓛德次豪相月旋等者別明三十二相中不宣金相明知金色非四八攝今本願文亦復如是先𢘻皆金色無有好醜者𢝰願顯形後三十二相者別願一相其相中不可有金相若爾何難四八相願有金色相別不可立十七形無美醜益第四本願云設我得佛國中人天形色不同有好醜者不取正覺前是顯色此則形色同異德失准向可知毛西施為頻呻增好嫫母倭傀容儀㫆醜薰蕕不同器梟鸞不接翼不如淨𭃯有情一類無異狀容色端正非天非人皆受自然無之身無極之躰十八具足五通益第五六七八九本願一如文不可具載彼土人天皆具神通妙用難測隨心自在夫不運步見十方色又不起座聞一切聲知六趣心如向明鏡計宿𠀍事似者手掌無數佛𭃯須往來法界衆生𭃯那濟渡撗度十方竪亘三𠀍無處不通無時不應今此娑婆於五神通誰得一通非燈日無以照非行步無以至雖一紙不見其外雖一念不知其後焚籠未出隨事有㝵而彼衆生無有一人不具神德不於百大劫中而種相好業不於四靜慮中而修神通因只是彼土任運生得之果報不亦樂乎要集之意龍樹讃云其有生彼國具天眼耳通十方並無㝵首聖中尊其國諸衆生神變及身通亦具宿命智是故㱕命禮釋神通名及漏盡通有無如第四記釋五通相如第七記十九住正定聚益第十一願云設我得佛國中人天不住定聚必至度者不聚正覺成就文云生彼國者皆𢘻住於正定之聚所以者何彼佛國中無諸邪聚及不定聚正定名義階位不同如第四記然今論意約處不退釋正定義迦才等師亦正定願屬處不退由此義故異第九益彼約聞法得不退智如觀經生於七日得不退轉和尚釋云證得不退入三賢亦其義也問處不退者名不還生𢙣趣中如智論云不生𢙣趣名阿鞞致若爾與十五益有何差別答第十五益狹偏三途故今正定廣若生淨土不還生六趣四生及二乘中故二十無諸不善益第十六願云設我得佛國中人天乃至聞有不善名者不取正覺第四論釋淨土不起不善云生彼凡夫雖具煩𢙉由闕𢙣境不起何妨縱有𢙣境既佛本願不可生𢙣闕其境不可起理㫆顯明也二十一壽命長遠言十五願云設我得佛國中人天壽命無能限量除其本願𢔜短自在若不爾者不取正覺成就文云聲聞菩薩人天之衆壽命長久不可勝計往生衆生壽命無量無生死苦若有別願雖生他方自在生非是業報今此娑婆所有苦中以生死苦甚為大矣大梵天王處高臺閣也泣一劫半於三朱之袂釋提桓因居喜見城也憂億千歲別於五𮕱之露於下界於人間故彼劫初諸大王頂生喜見照明王等有三十二大人相莊嚴其身七寶導從人天敬愛王四天下皆㱕於死復有蛇提羅等諸小轉輪王自以威力王𨵻浮提身色端正自恣無乏善通射術所向背伏是等諸王𢘻不免死又諸仙聖迦業香摩等行諸苦行得五神通捫摸天地造作經書皆不免死又諸佛辟支佛阿羅漢心得自在離垢得道皆為死王之所磨其餘凡夫推而可量一切衆生無能過者嗚呼命念去甚於山水形步𮕱危於槿花且趍朝市夕㱕泉原昨撫玄𩯫今成白骨一息不追千歲永逝香長夜眇苦輪無常為基誰不猒乎而彼人天金剛之力無有死遐長之壽無有別離乃至證得無上菩提未得變易如捨分假猶處有漏似得無漏遍是㫆𨹔願力豈非衆生益二十二衣食自然益三十八願云設我得佛國中人天欲得衣服隨念即至如佛所讃應法妙服自然在身若有裁縫檮染浣濯者不取正覺成就文云衣服飲食衆妙花香莊嚴之具猶第六天自然之物若飲食時七寶鉢器自然在前等願唯舉衣然依此文合立一益若准論者有三種食今應三昧所現嘉肴今此娑婆衣不𮑇形食難支命飢寒二困人理殆盡至冬八夜求短褐而臥霜盛夏三旬趍餐而奔炎𡸁於蒼海催蹄於高山終日心痛通夜身疲在想二事豈非顧一瞬哀繫衣食之獄墮名利之坑矣是㘴前𠀍不殖德本積財不施貪求無猒縱求得亦長年難保或為王賊或為水火壞縱此灾無常忽來彼子方溫裘也猶抱生死之羞𭸟道嘗滋味也未養法性之身矣而安樂國万種𦂶𥿭百味飲食自然盈滿隨意而現身心濡無有味著微妙快樂次至無為具如經不能一二問香味觸三為假食性唯在欲界不通上界令心昏昧故令身沇重故睡眠性故長等故穢土三界猶有不受淨土中有香飯等成假食乎答淨土五塵皆是如來後得無漏大悲流現實非假食而未離欲分假身者託佛所變為有漏色香味觸以能受用雖是有漏亦假食性不同穢土起眠等增益穢質如來方便令其初心觸無漏境破有故若變易身及如來地勿假假食住持於身自在報故攝釋云如來及八地已上菩薩實不受食不假食自身安住然順𠀍間示現受食示現假食其身安住名示現食已上問按佛地論但約佛果示現食云何八地已上答攝釋會云論據果滿略不明因實爾八地亦不假假决定已受變易身故已上二十三唯受衆樂益三十八願云設我得佛國中人天所受快樂不如漏𥁞比丘者不取正覺新舊攝論明淨土中但有樂受無餘二受至第六記當辨其相今此娑婆憂苦非一身心無安廣明之者其相雖多略而論者四苦八苦經論具不須勞解而彼𠀍界無有三塗苦難之名但有自然快樂之音是故其國名曰安樂第六論釋無衆苦相二十四三十二相益第二十一願云設我得佛國中人天不𢘻成滿三十二大人相者不取正覺衆生者妙相具足端正殊妙人中輪王雖有此相非是明圎若比之彼土人天者甚為鄙陋無以為類其餘人無一相穢質塵垢醜𢙣𤰞賤豈同彼邦菩薩聲聞人天一溉俱𬾨妙相表裏映徹清淨無垢濁水莫染不能受塵豪相月旋項有圎光旋髮紺青頂有完𮫀淨眼明鏡上下齊眴脣舌赤好猶若果表万字趺具千輪手足軟皮膚細滑如是等相一難述非如菩薩百劫修百福亦如輪王𠀍作𠀍福只是佛願任運所成行者住心可思此益二十五無實女人益悲花本願云願我𠀍界無有女人及其名字又准和尚及興師解三十五願可為淨土無女人證彼法花不得五果大集經明是三塗因淨土妙處最應嫌却非其道器如已上辨二十六無有小乘益悲花本願云令我𠀍界無有聲聞支佛乘所有大衆純諸菩薩無量無邊無能數者除一切智天親偈云女人及根二乘種不生國若有濁分一三安養清淨無有五濁故皆大乘問壽經本願明有聲聞觀經小經及十住論智度論中亦有小云何相答無二乘者無根敗二乘故有聲聞者有大乘聲聞故至下當辨二十七離諸八難益悲花本願云無三𢙣道八難之名無有受苦之名及不善不樂名言八難者如第三記已上三益非壽經願悲化亦是一佛願故兼證也二十八得三法忍益第四十八願云設我得佛他方國土諸菩薩衆聞我名字不即得至第一第二第三法忍於諸佛法不能即得不退轉者不取正覺三法忍者興師疏云即伏忍三位名為三法忍瑜伽亦勝解行地有下中上品三忍故餘多為深位得益此義不爾聞名益故若謂聞名漸次得者何但三忍問三十種益生淨土後於自土中之所得益而三法忍攝他方益何證極樂得三法忍答他方菩薩尚聞名益自國人天寧無此益故依第四十八願意立此益也又此依第二十八道場樹願用立此益若彼國人天見此樹者得三法忍一者音響忍二者順忍三者無生忍此是自國人天所得彼即他國菩薩利益明知今益依二十八願開立也問此三忍何忍位乎答興師疏云有初二三地尋聲得悟聲如響故云音響忍四五六地捨詮趣實故云順忍七地已去捨相證實故云無生忍者惠心安法故此必不然初地已上皆已證實應無尋聲赴實故有初在十信尋聲悟解故次在三賢伏業惑故後證實絶相故云無生忍此亦非也未入十信若生彼土不得法忍本願故今即尋樹音聲從風而有而非實故得音響忍者無乖甬義順者不空義悟境無性不於有而順空故云順忍觀於諸法生絶四句故云無生法忍二十九身常光明益壽經云此諸衆生於七寶花中自然化生跏趺而㘴須之頃身相光明智惠㓛德如諸菩薩具足成就雖彼願中不此事願成就中既光明故知本願亦含此義所謂三十二相之中項有圎光又按觀佛經一相皆有種光明如經云完𮫀相光白毫相光乃至額廣平正相面上三輪相髮際相如是衆相一相中皆出金光等准此等讓四八相不別願身力堅固益二十六願云設我得佛國中菩薩不得金剛那羅延身者不取正覺那羅延者即是神名此云人種真諦師翻為天力矣俱舍論明其力量云謂凡象香象摩訶諾健那鉢羅塞建提伐浪伽怒羅那羅延後力增前十倍有前六十倍增歒那羅延半身之力比一倍成那羅延光記云於凡像等十倍增故後力增前十倍一凡象謂西國凡受用象二香象西國別有一類好象名為香象擬戰時用三摩訶諾健那是神名此云大露形四鉢羅塞建提亦是神名鉢羅此云勝塞建提此云薀五伐浪伽亦是神名此云妙支六努羅亦是神名此云執持七那羅延有可知已上寶記正理云有餘師此量如千藹羅伐拏天象王力此象王力其量云何三十三天將遊戲𮏑象王知已化作諸頭種莊嚴往天宮所諸天眷屬數有多千乘已騰空如持撶速至戲𮏑隨意歡娛天人大象王力㔟如是此力千倍等那羅延已上又按𣵀槃第十一小牛大牛青牛凡象野象二牙象四牙象雪山白象香象青象黃象赤象白象山象優鉢羅象𭷖物頭象分陀利象人中力士鉢揵提八那羅延十住菩薩一支莭後力增前十倍一切凡夫者身中諸莭不相到人中力士莭頭相到鉢揵提身諸莭相接那羅延身莭頭相拘十住菩薩諸莭骨解墦龍相結是故菩薩其力最大問何故立此願答色心二法相依而住淨土衆生心力強勝如本願云國中菩薩智惠辨才若可限量者不取正覺成就文云其諸聲聞菩薩天人智惠高明神通洞達咸同一類身力若𭋘應不能持堅固心力例如大德法救言諸佛如來身力無邊猶如心力若異此者則諸佛身應不能持無邊心力况身力堅於事自在何不立願問何此中不立利生益攝論明業圎淨云一切衆生一切利益事為用尺曰凡夫二乘名一切衆生隨其所能為正教令如修行離四𢙣道離生死離二乘自愛行名一切利益此句明業圎淨佛地論云如是淨土持圎滿作何事業作諸衆生一切義利謂於此中自能現作一切有情一切義利或令一切有情自作一切義利現益名義當益名利𠀍間名義出𠀍名利離𢙣名義攝善名利福德名義智惠名利如是等別雖在定由先所修加行願力任運能作一切有情一切義利已上此乃喰受大乘法味任持力故𠀍作一切利益事業此益為大何不開立是故要集立接結緣樂答三十種益皆約自利略而不論化他益耳凡淨土益不可勝計示一察万故云略舉本㫆勒所問至豈不借矣第十六問初引次難之意慈等十念一別念而行亦勝如何十聲稱𢏏𨹔佛一種劣行而得往生本往生西方至無異類者答十六問文即有二一明淨土行業非一二子須下還破計第一正明中文亦有一先法合次故定散下重證釋成初明法中往生西方行門非一者𢝰摽或有三福等者正示諸行謂觀經三福等也所問經十種法各得往生共是聖教互淨業何因是非而失二利如入流等者舉奉公道非一喻往生業異品吾朝𪝥者無能知者然值宋僧令咨决時斑朝録而授如入流九品大唐官有九品自一品至九品者官位入流者從七流入仕流猶自凡流入聖流也縣尉乃九品官最下位也後官其次已上縣羕主薄知縣以至中品太守及上品羕相者也或能精𤎼一經大唐𪝥書即有九經然七人或精𤎼一經𫝤試文場可以入官九經者尚書毛詩周易周禮禮記春秋論語孟子孝經或為進士之學試經及第出官謂之進士及第也或為流外勳品流外者非試九經之流因有㓛勳於朝𨓍特賜官品也或為七色出身七色者非試經而出官或父祖有官以恩例䕃序而出官謂之恩澤官或百姓富聸以家戝入朝𨓍賜以官品謂之納粟官或邊淮戰鬪有㓛朝賜官謂之賞官如是等類則有七色者色目此七色非進士及第而得出身也或作十年品子大唐七人三年一次試科舉或有士人一次試中科舉朝𨓍恩例許三年後特賜於官故謂十年品子也皆得入流𢘻為羕尉言進士出身七色出身十年品子雖有多品皆可入仕流羕尉者乃下品官之位也豈限一業作文林郎業文林即乃下品官之極位言為士人豈可以一經一業而不作文林郎業耶往生亦復等者合法應知二重釋成中定散兩門等者廣捐三經所諸行謂觀經定散兩門𢘻得往生無量壽明三輩修福皆淨𭃯因小經中述唯念佛名終感佛又上舉兩經顯示釋迦所定散淨業非一唯念佛名者顯示㫆𨹔本願唯是稱名非餘㫆陀教者即指本願生因在稱名故云唯念此乃明惣搜二尊教往生之道非只一徹雖有兩義後義為正蓋教兩字非捐小經學者思擇或持大乘等者別出兩經所行躰受持大乘在上輩生孝養二親在中輩生稱念佛名在下輩生今文略舉上中輩善具應言或偏稱佛名是示一行影顯諸業以三輩各有諸善故𠀍出𠀍者此下三門束述諸行一𠀍出𠀍間門孝養等是𠀍間善受持等是出𠀍善二定非定行門十六觀定三福等散三業分別門而作沙門等身業善讀誦大乘等口業善且從者只云身口應舉意善所謂觀察菩提心等如是諸善俱生淨土豈彼經十念一門第二子須下結破中亦二先明衆經殊唯執一不可非餘次又修下明因果万品限是一類不可無異如迦才云衆生起行機有千殊往生見土亦有万別已上又𢝰明因果種種相令知淨土行業非一非必別述極樂因果万差相也本夫菩薩修至願陳斯旨第十七問此問意菩薩慈悲在苦者門如父母不離病子猶如獵者不離獸山復如海人不出𩵋渕理須身遊穢界常救沇淪衆生而何捨此願生於彼無始繫屬今在窂獄菩薩大象寧棄群徒本夫發菩提至以喻得解答十七問文有其二一𢝰明菩薩有二類其第二類不堪居穢二為此下明退行菩薩生淨土理第一文中夫發菩提心等者先附問端明菩提行須愍𭇥識廣興濟度然行有淺深者此下正述菩薩根行不同先摽次釋後證起盡應知行有淺深者准正釋文已得不退名為深行末得不退名為淺行前堪處穢後可生淨如十疑云一者久行菩薩道得無生忍者實當所責二者未得無生忍已還及初發心凡夫菩薩者要須常不離佛忍成就方堪處三界內於𢙣𠀍中救苦衆生根有上下者深名上根淺名下根淺深上下是文相對非必別類謂位不退其根必勝位猶在退其機必劣故雖摽淺深上下正釋淺深顯是一類也又根上下不可必依次位淺深案十住論十信惟越致菩薩有二種一漸轉進二敗壞怯𭋘前名大人志軡信等五根極堅固故次名儜𭋘怯劣翻向應知未至不退上根者不退今摽雖俱舉行淺深及根上下唯釋淺深影顯上下又智論云新發意菩薩機解軟𭋘雖言發心多願生淨等機是機根解謂惠解二俱軟𭋘不可居穢聲色所失二利故解至不退根自勇𨦣此之二類冝在穢土處穢不染逢𢙣不變如鵝鴨入水不能濕故若深學等者此下正釋深學摽位大悲辨性不退顯惠力得不退故不思已大悲增上唯欲益他如斯菩薩多在穢方廣行利物少生淨土者如彼天親及龍樹等不退菩薩願生淨土親羕㫆陀淺行摽位大智辨性退轉顯惠分智增菩薩雖非無悲不如悲增偏為於他隨位在退若遇𢙣緣失菩提心造衆𢙣業自利他俱得壞廣如等者現證如第四記廣本業問大悲增故得不退大智增故有退轉答不爾為顯居在穢土生淨土二種性類論其悲智增上義也非謂悲故能得不退大智增故生退轉也問若爾何故摽章中不摽此二答是摽文略或攝機根不別摽耳第二明生淨土中亦二先立理次會難初文言為此者淺行菩薩若居穢界為此故願生淨土離彼𢙣緣等者明不退緣即有六因一離𢙣境緣二親近聖尊故三恆聞正法故四與勝友會一處故五歷事諸佛散花供養聞法增進故六無二乘闡提外道等類𭁎壞故雖復苦等者正會所難雖生淨土非捨衆生自利之行利他之本自利之本若不堅固利他之未亦軟𭋘故如維摩云自疾不能救而焉能救諸疾人即此義也於安樂等者捐示廣釋文依智論故云已彼集下云如智度論曰如二人俱見父母眷屬沒在深渕一人直往盡力救之力所不及相與俱沒一人遙走趣一舟船乘來濟接得出難菩薩亦爾若未發心時生死流轉與衆生無別但已發菩提心時先願往淨土取大悲船乘無礙辨才入生死海濟運衆生又同論云菩薩生淨土具大神通辨才無㝵教化衆生時尚不能令衆生善𢙣增道進位稱菩薩意若即在穢土濟者闕無此益如似逼雞入水豈能不濕也又同上智論云若凡夫發心即願在穢土濟衆生者聖意不許何意然者龍樹菩薩釋云如四十里氷如有一人以一殊湯投之當時似如少减若經夜至明乃高於餘者凡夫在此發心救苦亦復如是以貪嗔境界順多故自起煩𢙉返墮𢙣道也已上嬰兒不離母鳥子未成翅等諸喻如十疑論先事不忘者後事師也先王所瑩者後王鏡也諸德勤誨不可不據誠具出離祕術之門重病除愈規摸之良藥也百𠀍万代正欣道者冝赴侄路勿𣱵異轍往生用心唯在斯矣本淨土論云至羅漢等耶第十八問意之淨土論云二乘不生若准論者彼界云何得有聲聞而經中有阿羅漢若依經者非彼界無二乘弟子經論相如何會釋本此有四尺至亦如是也答十八問文自有四第一義意論言二乘種不生者非三乘中聲聞緣覺瑜伽論明法爾五性中緣覺乘及人天乘緣覺乘者生無佛𠀍獨證菩提若聞佛出先入無餘如花嚴中掌光智淨土常有佛不故不可生也又不信有十方淨土何因願生人天乘者無性有情斷三乘種無菩提牙生死流轉畢無出故不可得生淨土决定成菩提處問瑜伽論中不五姓今何依所以彼論第二十一聲聞地中有般𣵀槃法無般𣵀槃法二類不餘類第六十七决擇分中四種姓不定姓依斯他宗難瑜伽論都無此文答雖一處並無五姓一論前後明五姓謂彼本地分二種補特伽羅於中般𣵀槃種姓內可有四姓第三十七五十二三乘定姓畢竟無姓六十七明聲聞菩薩不定無姓四種姓聲聞地獨覺地菩薩地各述三乘法爾種姓第八十出回向大菩提聲聞又菩薩地住無種姓補特伽羅等畢竟無姓惣讀一論上下首尾五姓分明不可致疑是故佛地論第二云由法爾故無始時來一切有情有五種姓一聲聞種姓二獨覺種姓三如來種姓四不定種性五無有出𠀍㓛德種姓如餘經論廣其相分別建立前四種姓雖無時限然有畢竟得度期諸佛慈悲巧方便故第五種姓無有出𠀍㓛德因故畢竟無有得度期諸佛但可為彼方便示現神通離𢙣趣生善趣法彼雖依教勤修善因得生人趣乃至非想非想處必還退下墮諸𢙣趣已上所捐餘論即是瑜伽及莊嚴論據斯疏云依瑜伽等有五種姓摳要亦同請邁等師捐上下文辨五種姓皆此意最澄所難且依一處不列而已問楞伽二五姓中云大惠何者無性乘謂一闡提者無𣵀槃性何以故於解中不生信心不生信心不入𣵀槃即有二種一焚燒一切善根二憐愍一切衆生作盡一切衆生界願大惠云何焚燒善根謂謗菩薩藏作如是言彼非隨一修多羅毗尼解是故不入𣵀槃大惠憐愍衆生作盡衆生願者是為菩薩方便作願若諸衆生不入𣵀槃者我亦不入𣵀槃大惠白佛言此二種中何等一闡提常不入𣵀槃佛告大惠菩薩一闡提常不入𣵀槃何以故能善知一切諸法本來𣵀槃是故不入𣵀槃非捨一切善根闡提何以故大惠彼捨一切善根闡提若值諸佛善知識等發菩提心生諸善根便證𣵀槃已上此經意者五姓皆成三乘菩提論何相答莊嚴論第一種姓品中五種姓四同瑜伽第五性中出時邊畢竟二種無性時邊有四頌曰向行𢙣行𢙣律儀人伏善根普斷諸白法斷善根人無有解分無小乘解分善根善少無大乘解分善人已七四人名時邊四亦無因畢竟無者無𣵀槃因故樞要云此中時邊應云暫時梵云𣵀迦羅阿波利䁥喃達磨𣵀者也迦羅時也阿名無波利圎也䁥喃𡧘也達磨法也則時無圎法若時邊等者應云迦羅案多阿波利䁥喃案多是邊故餘義同前已上會楞伽摳要上云楞伽所二種闡提初是斷善根具邪見者後是菩薩具大悲者初者有入𣵀槃之時後必不爾以衆生界無盡時故無姓有情不成佛故大悲菩薩無成佛期然第五性合有三種一名闡底迦二名阿闡底迦三名阿㒹底迦一闡底迦是樂欲義樂生死故阿闡底迦是不欲義不樂𣵀槃故此二通在斷善根人不信愚癡所䨱𮑇故亦通大悲菩薩大智大悲所薰習故阿㒹底迦名為畢竟無𣵀槃性故此無性人亦得前二名也前二久當會成佛後必不成楞伽但具前二名有性闡提莊嚴通有性無性二種闡提已上故知楞伽焚燒善者名斷善根非畢竟無由斯本疏辨教所被云依楞伽經被五種姓依大般若被四種姓莊嚴論等與此稍異溜州釋云楞伽五性皆有性又瑜伽六十七决擇分中設五難六答决建立畢竟無性具如摳要又佛地論所捐經論畢竟無性决定而有何懷疑心問若論定業二乘俱不可生淨土若不定姓獨覺亦生故仁王八百万億大仙緣覺來至佛所佛頂經明無量無邊𮝻支佛人來入佛會既至佛所何不生淨答緣覺即是無佛𠀍證果故多取灰斷作𠀍無二佛之想不小分故云多生無佛𠀍界第二義中二先難第一義次今二下述正義初難中前義不然者惣非若以二乘者牒計即聲聞等者正難有二一緣覺不生聲聞生者何故言大乘善根界大義門土唯嫌緣覺非聲聞耶二非但無女人根二乘三種躰亦無彼三種譏嫌名若所嫌二乘緣覺人天者更亦不可有人天名如無有餘女人等名然淨土盛有人天名明二乘者聲聞緣覺非緣覺與人天也問若爾淨土有聲聞名豈非譏嫌答第二義意淨土聲聞名不定姓雖有其名定非譏嫌或從古號亦曰聲聞如論注云仍本立名又要决云小乘之人要生大志乘此為業即得往生從彼舊名號聲聞也疑曰小乘之目作譏嫌何因彼方必稱斯號答曰聲聞愚自利過深不解益他謂譏嫌耳雖存古號即大聲聞益物既𪪺乃為良稱故法花云我等今者真是聲聞以佛道聲令一切聞西方亦爾雖有小乘並是真聲聞故無譏嫌等過也曇鸞仍本直名慈恩從彼舊名同異如何次今二乘下正述義中二先正釋可知次問曰下重問答問意易詳答中亦二先正述義論言二乘種不生者約於定姓經有聲聞者是不定姓廽心向大漸悟類也次天親菩薩等者例尺成謂准攝論天親菩薩依瑜伽論釋攝大乘是天親依瑜伽證據今淨土論亦應依彼五性義故就定性而言不生言攝論者𭩮論序云披决定藏以釋攝大乘唐𠀍親攝論序頌云從廣决擇少分言略釋攝大乘故决定藏决擇分名也第三義中言愚法者未回心類此不可生故論言二乘種不生不愚法者已廽心類此即可生故經述有聲聞弟子異淨影愚法不愚法雖修小行者非謂回心復修小行謂此之人雖本修小以今信大願生淨土或雖回心猶由本執修行小行以為往生業如中品類為生淨土修小法等雖有二義後義為正第四義者文有其二一略明淨土聲聞羅漢非是小乘一阿羅漢名下廣例釋成第一略釋中彼以回心等者顯彼聲聞非實小乘謂彼土小以廽心向大所修聖道斷惑證理皆為無上大菩提故不名二乘也所謂此人以必定須斷人法執正習雙亡證得二空究竟滿足方得名佛果既大果因何小因二執具如第一記證二無我名得二空二障種子名正二障重號習此二隨應初地乃至金剛心位並能斷盡故云雙己彼為先是等者辨彼從舊得小乘名謂彼聲聞為本小乘欲斷人執證於人空乘舊執故亦於淨土先斷人執取彼四果名阿羅漢亦曰聲聞然非實小也第二阿羅漢下例釋成中即亦有二一明聲聞羅漢名通大乘而成淨土聲聞羅漢亦非小乘二然直下明頓漸類斷惑證理次第前後而成淨土漸悟菩薩先斷人執立四果名初文中先四分別明羅漢名通唯識第三雜集十四對法第七智度論等二乘無學及如來地立羅漢名問更有何義佛名羅漢答以佛亦具𭣦𮚆不生應供義故智論二云何名阿羅訶阿羅名𮚆訶名𭣦是名𭣦𮚆如偈佛以忍為鎧精進為錍持戒為大馬禪定為良弓智惠為好箭外破魔王軍內煩𢙉𮚆是名阿羅訶復次阿名不羅呵名生是名不生佛心種子後𠀍田中不生無明糠故復次阿羅呵名應受供養佛諸結使除盡得一切智惠故應受一切天地衆生供養以是故名阿羅呵唯識論云此中所阿羅漢者通攝三乘無學果位皆已永盡煩𢙉𮚆故應受𠀍間妙供養故永不復受分假生故疏釋云阿羅漢者此正云應當之義應斷煩𢙉故應受供故應不復受分假生故若但言應即通三義故言如來應不言應供若著供字唯得一義便失二義已上問何故離所知障不名羅漢耶答疏云所知障躰不障解無能發業潤生用故問何故離變易死不名羅漢耶答疏云二乘無學有變易生此非由煩𢙉所招起故已離繫得解故無分假死已上次法花通明二名通大謂我等今者真是聲聞者證其聲聞名通大乘昔聞佛四諦聲教信受精進而出三界名曰聲聞回心不然以佛道聲令一切聞故名聲聞謂依回心安住佛乘以佛乘聲𫝊令利他異彼自度故名為真斷障章中今文釋大乘聲聞與今全同拪復抄云四十年前不得名真聲聞今日方得名真聲聞以佛道聲屬於佛令一切聞屬衆生此聲聞二字全取他名有財釋也已上我等今者真阿羅漢者證其羅漢名通大乘文舉一因成羅漢義法花處佛十號亦與今同舉二彰餘𣵀槃經等言如來應不著供字其義即同今淨土等者依例尺成淨土二乘𢘻皆趣求無上菩提非二乘種等者離躰離名為種名種者種子二乘心種不生現行無漏種子為二乘躰故種是躰為已發等者結釋應知如法花經者此下重證决定大乘聲聞羅漢阿難授記在彼經第四人記品至結集時取羅漢者智論二云時大迦與千人俱到王舍城𦒿闍崛山中苦語阿闍𠀍王給我等食日送來今我等結集經藏不得他行是中夏安居三月初十五日戒時集和合僧大迦入禪定以天眼觀今是衆中誰有煩𢙉未盡應逐出者唯有阿難一人不盡餘九百九十九人諸漏已盡清淨無垢大迦從禪定起衆中手𭷣阿難出言今清淨衆中結集經藏汝結未盡不應住此斷汝漏盡然後來入殘結未盡汝勿來也如是語竟便自閇門阿難思惟諸法𣱵盡殘漏其夜㘴禪經行殷勤求道是阿難智惠多定力少是故不即得道定智等者乃可速得後夜欲過疲極偃息却臥就𣏞頭未至𣏞廓然得悟如電光出暗者見道阿難如是入金剛定破一切諸煩𢙉山得三明六神通共解作大力阿羅漢即夜到僧堂門敲門而喚大迦問言敲門者誰答言我是阿難大迦言汝何以來阿難言我今夜得盡諸漏大迦言不與汝開門汝從門䈁孔中來阿難即以神力從門䈁孔中入禮拜僧足大迦手摩阿難頭言我故為汝使汝得道汝無嫌恨略抄迦言等者彼經上云大迦入貧里乞食時維摩詰來謂尊者言大迦有慈悲心而不能普捨豪從貧𠧒迦住平等法應次行乞食為不食故應行乞食為壞和食相故應取揣食為不受故應受彼食以空聚想入於聚落所見色與盲等所聞聲與響等所嗅香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性乃至一食以施一切供養諸佛及衆賢聖然後可食如是食者非有煩𢙉非離煩𢙉非入定意非起定意非住𠀍間非住𣵀槃其有施者無大福無小福不為益不為是為正入佛道不依聲聞若如是食為不空食人之施也時大迦聞是語得未曾有即於一切菩薩深起敬心復作是念斯有家名辨才智惠乃能如是其誰不發阿耨菩提心我從是來不復勸人以聲聞辟支佛行已上迦既發如是誓願何結集日令阿難勸取小乘果故知阿羅漢等者結阿難所證之果即非小果阿難從佛等者結阿難所修之行是大乘行若不爾者兩故知言即繁重過二然直下明頓漸斷惑證理相成淨土漸悟四果名中先舉例次今此下依例釋成初中直往先斷法執煩𢙉者明頓悟類先斷法執直往迃𢌞斷二執義如第一記本求佛道名為直往蕳別行回二乘之道法執能障菩提實智故彼菩薩作意先斷如本疏云若求佛者先斷法執但今文約俱生二障分別二障初地入心並頓除盡不可言先斷於法執故以修道人執煩𢙉金剛心斷蕳異先斷法執之義俱生法執於十地中地先除故云先斷俱生我犱至金剛心方頓斷除即得成佛故為後斷故本疏云或有先斷煩𢙉障不斷所知障如二乘等求𣵀槃故或有先斷所知障不斷煩𢙉障住出初地等菩薩此依種不依重趣一切智故或有亦斷煩𢙉所知二障謂入初地金剛心菩薩此依種若依重十地皆得已上准之故知言先斷者應是俱生法執煩𢙉法執名煩𢙉如第四記從本已來者下辨直往菩薩先斷法執所由菩薩從本期一切智法執能䨱三菩提果故作意欲斷其智障望聲聞是無䨱無記不障道故不可斷之若望菩薩有䨱無記能䨱道法是故偏猒故𭩮論十云復次此無明應知於二乘非染𣲇於菩薩是染𣲇釋曰二乘修行不為入十地此無明不障二乘非二乘道所破故不染𣲇二乘菩薩修行為入十地此無明障菩薩十地為菩薩道所破故染𣲇菩薩佛地論七云若法執等所知障躰亦在無䨱無記心中二乘無學亦現行故無學位中無有不善有䨱無記此就二乘名為無䨱若望菩薩是染𣲇故亦名有䨱故所知障亦名無䨱亦名有䨱一躰二名所望別故若所知障就二乘無䨱無記四無記中何無記攝異𤎼生攝以從異𤎼識生起故已上言有䨱者俱舍論云䨱於聖道加行令不現故名為有䨱唯識論云䨱謂染法障聖道故又能𮑇心令不淨故無䨱翻之不待言矣故攝論等者證所知障染𣲇菩薩既言極盲暗豈非障惠日故𭩮論㱕敬序云智障𫽄盲暗謂真俗別執由如理如量無分別智光破成無等覺人執煩𢙉鄣於𣵀槃者明聲聞人先斷我執夫煩𢙉者擾濁有情能而在生死窂獄不令方至𣵀槃之城然二乘人唯求自利深猒生死不能修習一切解是故偏求斷煩𢙉障無心欣慕斷除法執不障𣵀槃故唯識云二乘但能斷煩𢙉障求解故所知之障不障彼故菩薩俱二果別故已上諸二乘人斷人執得般𣵀槃名為解非真解以未能證法空真如而得一切解故也如義燈云今二乘人不能證彼真如理躰但能悟此理躰上離煩𢙉障染䨱義邊名證解以二乘人不能證悟法空真理但名解非真解已上次今此下依例成中此聲聞在七方便中等者明淨土聲聞依本執先證小果七方便中七方便前者顯中三品本位分限𢝰論不定性本位者玄贊有二義一者若曾得二乘果發心向大名為漸悟二者但從曾發二心曾修二行來未能證果然歸大者皆名漸悟又法花義决云設是凡夫未求於小即求大乘但不定性亦名漸悟以必不能一往超故必中退故拪復抄云設是凡夫具二乘性或行彼行及聖回心皆名漸悟已上知慈恩意漸悟本位非必證果七方便中及方便前具二乘性發心求大亦名漸悟今亦可然故云七方便中等文不舉果不定性者為述中品往生果故此中三品先求聲聞深猒人執後雖發心生大乘土還依本習為四諦先令斷除人執煩𢙉見修兩惑其斷見惑名曰預流非住彼道名預流也如雜集論十四云何緣菩薩超離生位而非預流耶由得不住道一向預流行不成就故何緣亦非一來耶故受諸有無量生故何緣亦非不還耶安住靜慮還生欲界故已上斷修惑已名阿羅漢如阿羅漢無諸惑故如唯識論三云十地菩薩雖未永斷一切煩𢙉猶如咒藥所伏諸毒不起一切煩𢙉過失一切地中如阿羅漢已斷煩𢙉故亦彼名阿羅漢對法第一雜集第十四雖有此名只是菩薩位行而已問所四諦大小乘中是何法耶若言小乘許所得益是大乘益能之法何小乘法若言大乘還依本習所四諦何大乘法答小乘四諦以依本習為所故大小人空躰雖無異大乘即依非安立諦證得真如小乘即據安立諦觀開悟人空入門異故非理亦同若爾淨土所四諦安立有作四諦觀故不可言大但至得益若論躰性小乘人空所以者何大乘人空真見道中並證二空非前後得四諦理故所聞法所得利益雖可屬小而發大心離灰斷情唯求菩提為彼所作皆是大乘漸次行攝如彼漸次止觀修行云云或四諦者是大乘法四諦六度十二因緣皆通大小名目雖同其義有別如十六心相見道中菩薩亦用四諦觀等發菩提心趣求佛果所聞之法所得之益不可言小故般若云若智若斷是菩薩無生法忍又云念處道品是摩訶衍法花經云汝等所行是菩薩道豈非回心小乘道法皆會一乘得大乘名故下文云生彼淨土通聞漸頓二種大乘會三歸一之教明漸頓法俱是大乘問若爾何云依本習答直爾不二空一實亦先不令得法空理安立諦先斷人執此皆准依宿習之法非謂四諦是小乘法後義為勝文理有故迃回等者正述經名聲聞別名菩薩所由謂迃回人通得二名直往菩薩但名菩薩不得小名佛以一名蕳彼漸頓二衆弟子故言有無量聲聞菩薩亦爾也本衆香𠀍界至非小乘耶難第四義例衆香難極樂聲聞非是大乘謂衆香國與𫽄樂𭃯俱大乘清淨佛土者何因衆香無有二乘唯有菩薩而極樂𭃯乃有聲聞豈非二乘土而有小乘耶衆香𠀍界香積佛土出維摩經如第二記本此二佛土至二衆別也救第四義此二佛土等者𢝰會相衆香𠀍界等者別會相衆香𠀍界唯直往生謂於娑婆修行八法無有瘡願生彼故唯聞頓教悟大乘法故經彼唯有菩薩無二乘名言八法者如第三記極樂𠀍界廣攝頓漸其漸悟者回心向大願故通聞漸頓二種之法發起大心行菩薩行依前宿修先斷人執雖行菩薩道然先斷煩𢙉名為聲聞號曰羅漢雖得二名非實小乘其義如向故俱並者此下結成本如小乘四至而不生也第十九問難意若准小乘三行滿百劫修相下品忍位方證不生若約大乘為利衆生不受變易地上菩薩猶未能得𢙣趣非擇二乘𤏙等亦復如是如俱舍云𤏙必至𣵀槃頂終不斷善忍不墮𢙣趣第一入離生如何凡夫一生淨土永絶𢙣趣而不生也一生蕳自在極𢙣顯非器一聲示小行如何此人以此微㓛即得永閇三途門戶問初地斷異生障得𢙣趣非擇如何地上不得不生答智力結生非由業力謂地上位故起煩𢙉雖生𢙣趣利益有情自故意力非繫生故云猶自如本疏云七地已前代諸有情受三途苦乃是實身本决擇分善至其義不妨答十九問文即有二一會所難二述正義第一會難亦二初决擇分善等者明小乘人居在退處三乘𤏙頂是退位次然薩婆多等者明薩婆多亦許忍前得𢙣不生得位然不决定何𭤽拒難忍位前得𢙣趣非擇者大論七十四舉所破迦栴延義云毗尼阿婆陀那中從見燃燈佛以來名阿毗致已上釋迦菩薩值燃燈佛第二僧滿第三僧初頂法位也此時既得阿毗致非忍前得𢙣趣不退又婆沙第七云問若爾菩薩為九十一劫不墮𢙣趣是何力耶答能障𢙣趣不必要由順决擇分所以者何或施或戒或𤏙或頂能障𢙣趣若鈍根者得忍方離已上此等即是薩婆多許忍位前得𢙣趣不生分明證也加之優婆塞戒經初僧離五種障一不生三𢙣趣二不生邊地三諸根完具四不受女身五常識宿命明知經論共許忍前得非擇第二今生下正述義如文解矣
