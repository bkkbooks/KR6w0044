body:
  text: 本念阿㫆𨹔至亦無量不是第一問如上所解念𢏏陀佛㓛德無邊念諸餘佛㓛德亦爾本此有二義至亦不來救答第一問文自二義第一義中即亦有二一直釋義二難成義直釋意云念一切佛功德平等所以者何由諸如來同具㓛德悉斷二障所念㓛德無差別故能念㓛德亦無勝劣也二若爾下難若㓛德齊者何故如來於諸經中偏讃念阿㫆陀佛耶答其實下答難中二先正解釋次例成初正解中但以淺識等者明佛蕳機偏讃一佛令其至心謂若至心㓛德即多如隨願十方淨土實無差別令諸衆生專心有在是故讃嘆彼國土耳此是如來密意方便者明如是皆是如來意趣門教夫密意者機為先不盡理義也次例中衆僧清淨堪為戒師諸如來㓛德齊等皆為歸處摽心一師以為和上比行者專念於一佛發其戒緣即勝余者類念㫆𨹔㓛德無量言和上者亦云和尚亦云鳥波陀那此翻親教師從於和上𠧒大戒故此亦如是者下合釋應知第二義中即有其二一先許佛果平等㓛德無差別二然以下明繫屬異利益不同法爾繫屬共不共義如第六記若屬此佛等者準彼論𢝰解由屬不屬差有度未度異屬此佛等者別解由屬不屬稱念佛名心至不至應來不來本如無量壽至如何會釋是第二問先後難問二經相如何答大經屬念佛於小福小經名念佛於多福於一種善大小名異故成相也阿㫆𨹔經名多福者如選擇襄陽石碑經本云一心不亂專稱名號以稱名故諸罪消滅即是多㓛德無量壽經屬小福者除大小菩薩之外凡夫所修皆名小福其小善中有念佛故問不生少善名何善耶若言余善悉生何屬不生若言往生經不生如何會釋答西方要決不至心念名為小善往生要集輪廽善業以屬小善推今論意異此等義既以念佛名大善故自余諸善名小善者其義顯著經言不生功力弱故望念佛故如和尚言隨緣雜善恐難生也靈芝亦同本各有一意至據義不同答第二問文分為二一𢝰二別第一惣中各有一意者摽無量壽經者釋彼約數少此就用多故不相第二彼人下別解中亦有其二先正解次合先解中彼人唯念等者顯示數少有三一法數少唯修念佛不修諸余道品法故二時數少一念㓛成不假長時永劫時故三勞數少唯舉聲稱不送難行苦行勞故雖有三義法數為本故云唯有念佛無余修道福也此念阿㫆陀佛等者顯示用多先釋次證後結可見次合中有摽釋合如文可解摩尼珠多少者狀少名少德多名多如止觀五云如如意珠天上勝寶狀如芥粟有大㓛能淨妙五欲七寶琳琅非內蓄非外入不謀前後不擇多少不作妙稱意豐儉蓋是色法尚能如此况心神靈妙寧不具一切法耶𭤩決釋云大論云古佛舍利狀如芥粟能滿自他菩提妙果名大㓛能已上而今文言價直多故名為多者其德多故價直亦多故不相愚人不別者賢護經二云如有人賣摩尼寶有愚癡人見其寶已即便問言仁者此寶其價云何寶主答言汝今當知是寶精勝世間所無非可造次以世價論也吾今且此寶㓛能威德力用粗以約耳𡖖若欲知此摩尼寶光明所照近遠若于𡖖今若須當以真金布滿此地而乃相與彼愚癡人聞是語已便大𫪻笑種種呲是摩尼寶竟不酬價如是賢護彼未來世諸𢙣比丘聞此經中勝三昧寶無有信心多生笑更興誹謗其事亦爾已上價越三千者法華經云爾時龍女有一寶珠價直三千大千世界本如上所釋至德亦多耶是第三問先顯所信次問其念有相無相世人多疑以無相心念法身佛㓛德無邊以有相心念報化佛㓛德不幾故今問難欲遣疑情本俱悉多也至理無也答第三問俱悉多也者惣顯有相無相念佛㓛德甚多次法身下別釋有三一明淺機用有相二明斷二障及植彼因如次應修無相有相三明真佛佛事理異故有相無相修因亦別第一文中先辨法身念佛㓛德不可思議無所得心躰真理者問既觀真如豈非所得答金剛般若疏云有所得者謂分別心妄所執法也無所得者謂智證真時無彼分別之所得法也但言無彼分別心之所得名無所得不智內真以為所得也已上準之分別執實我法能執心名有所得心所執法名有所得法無所得者翻斯可知無執我法名無所得非觀如以為所得無相之念者無相即是𣵀槃異名能離十相故名無相如第一記𣵀槃經及佛地論觀彼之念名無相念問真理無相何故名實相及一相答無相即是真實相故名為實相準此無相為如相故名為一相諸經中一切諸法皆同一相所謂無相而為相故如無垢稱疏及金剛般若疏等中委分別次如淺學者下辨淺學修有相觀及稱佛名亦能獲得無邊㓛德如下輩等者證釋成下三品人一生已來唯作𢙣業將命終時𪫞怖失念豈作無相念法身理唯念名號方得往生信知有相者已下結成第二文中植彼因者極樂言彼謂斷二障修無相念若植彼色相極樂因修有相因又言彼者指斷二障謂直斷障修無相觀今植彼斷二障遠因願生淨圡修有相觀淨土往生為斷二障證二空故第三文中真佛者法身名真報化名權理事不同如其次第釋真權佛無有相因如應可擬本若作諸法至佛名號耶是第四問實相妙觀能除衆生微細罪障如觀音諸法實相除罪法是勝口稱除業何不命終之時教而令修乃勸令稱佛名號耶本誠如所責至不教實相答第四問文有其三即摽釋結第二釋中四義辨其臨終不教實相於中先列數次隨釋三惣辨知識不可誤教次隨釋中一人𢙣者此下品人一生已來唯習𢙣業未曾得修佛法世俗二種善根但教令稱猶恐未間况能解了諸法實相𥌒者無以與乎文章之觀聾者無以與乎鐘鼓之聲既無願𢙣人何教深理二法深者大器晚成大㓛漸成二空真如理致深遠如此愚人卒爾成乎三苦逼者平生學人常修此觀病苦所逼猶作不成自生來未曾修習現今衆苦𮉐繞身心始教令修無相觀法道理不可也彼元照者天台門人南山長徒兩宗法水稟羕一器渕𢮿碩德也三觀圎融之窗前一實中道月光艷四分十誦之中五篇七聚香薰馥然宿霧曾坐禪不安心身如㫪食乖例觀解忽緣慮並亡多日熏習片時捨亍時知此行非自己分𦆵稱佛名堪於修行即病中願云若我病愈披玩聖教製淨土書興往生云云而後病愈還行道法如所發願即造觀經㫆𨹔經疏𭤩淨教亍今世行諸佛之中唯歸㫆𨹔万行之內專貴稱名自行化他唯在西方造次顛沛偏事往生矣當知實相甚深妙觀苦惱所逼難凝其心證果羅漢尚遇病苦士生空觀起二道惑具縛凡夫寧受死苦住法空理出三界有羅漢具人之勝劣病苦死苦之輕重生空法空觀之淺深退起出離之易難學者推尋悉之悉之四時促者平生熏修多歲尋思猶不能曉茲臨終少時方始修彼妙觀必定不成言少選者暫時之義本草序例文選等中皆用暫訓三徒唐下惣辨知識不可誤教既有此四不可授理善知識者徒設不堪實相妙教善知時事者第四名時前三為事時是臨終𢙣深苦事具足無闕如何不辨猥教示乎大聖冝知等者明知識顯佛智逗物如來大聖冝知臨終人學必不得故不教彼人令觀實相是故知識深顯佛智善逗物機不授實相也或善知識不教於彼令觀實相是深顯示佛智善逗也第三以此四緣已下惣結也本若人一生至亦往生耶是第五問一生修行者顯示定善及上六品或臨終命者舉下三品此兩類人罪根消死可往生而此人時命猶不斷更經多日方始壽終為更念佛方生淨土為不念佛唯由先修得往生耶問上摽二類何下唯問念佛更修非余行耶答文言省略且述要行具足應言為復更須念佛及觀念等方生淨土為不更修亦往生耶本得往生也至恐不得生答第五問文有其二一惣明有縱延多日亦得往生二然有下分別二類第一類者修福之後雖經多日更不造𢙣起無記心此諸無記不感𢙣報乘前念佛即得往生諸無記心者有䨱之外無䨱無記有䨱無記非自他猶䨱道法隱弊自心令染𣲇故資益𢙣種容有㔟力引令起故無䨱無記𢝰有四故言諸無記異𤎼威儀工巧通果此四雖起而不成過其性薄弱無隱䨱義非成故四無記如俱舍第七及補闕章等曲分別明第二類文即有二先直明義謂念佛後多時不死更興𢙣念作不善業此人多恐不可生淨次經言下證釋成後𢙣能前之念佛於中初花嚴遺教二文證𢙣消善經言一念者花嚴經如前已引又言瞋恚者遺教經非重指前如經言若縱恚心則自妨道失功德利忍之為德持戒苦行所不能及能行忍者乃可名為有力大人若其不能歡喜忍受𢙣罵之毒如飲寸露者不名入道智惠人也所以者何瞋恚之害則破諸善法壞好名聞今世後世人不喜見當知瞋心甚於猛火常當防護無令得入劫㓛德𮚆無過瞋恚已上一瞋恚𭓯善法如是餘諸罪障諸善行舉一顯諸故言也如經言者分別業道經證業先感果一終時業最先受報二重心造業先𭷣果三輕重等先造前又雜集第七云問若一有情成就多業云何次第受異𤎼果耶答於彼身中重者先𤎼或將死時現前者或先所數習者或最初所行者彼異𤎼先𤎼又俱舍云略有三種能先引杲一者極重如負債𭤽者先𭷣二者近作臨終時逢善𢙣友所起善𢙣先果三者數作謂一生來元數造業能先果已上彼經數作俱舍減先作各文省略具如雜集經三義中今正取初下結文云此人為後有罪故謂近最後作𢙣業故此人多恐不可生也問若約後類道理不明如何淨業成就之後還作不善留生死乎謂所成業佛力相加非唯自力增上勝緣之所住持寧為𢙣業所消乎此有二義一云此人無漏佛願為增上緣而成業故更不可犯生死重𢙣例如初果道共戒力法爾不作𭣦生等業彼即小乘此既大乘彼亦自力此是他力彼入定有出定即無此恆成𤎼不能斷絶義推小乘自力至極不及大乘他力初心若爾淨業決定成者何劣小乘道共戒力消逆雲於十念之風彰帝於寸心之月不生定惠翅越生死之山不假斷證車至𣵀槃之城皆是佛願難思妙用寧與小乘諍其德乎故本願云若不生者不取正覺念佛業𤎼若不生者四十八願便為徒設但今論文立此義者為令懈慢者起進心故且依法相論善𢙣用互有𭤽劣如對法論善𢙣業𭤽劣中云又故思所造一切善業望不善業皆名𭤽力故思所造諸不善業望諸善業皆名𭤽力又故思造業異𤎼決定不斷不知名𭤽力業此中意一切善不善業無有差別但異𤎼決定諸聖道力所不斷者皆名𭤽力業已上今亦如是任法性相所引花嚴遺教經等皆據大分自因而非述他力住持㓛能一云此人猶居退位處亦退境縱成淨業若遇𢙣緣何不還造重𢙣罪業流轉生死深存此理故作此釋下文亦明業成就後退不生義既非一處為假乎又觀念門引觀佛經明成三昧後生貢高起邪念等失甘露味生貧賤家邪命𢙣風吹慢火燒所得念佛三昧猶如狂裊壞蓮花池觀佛三昧既以如斯念佛三昧亦復應然雖由佛願得成就業而衆生退作𢙣業故佛亦拱手所不救濟扁鵲不能治不受針藥之疾賢聖不能正不用善言之君又淨摩尼珠能清濁水若得深泥珠力不及去𭰖空遙一丈餘佛願亦爾不受法人不可化益加於可加蓋斯謂也本如觀佛三至此火花也是第六問先引經次問同異文意分明本以四義故至海經也答第六問文即有三謂摽釋結釋中有四行相語佛各引兩經令知同異文義易了不須重釋本九品生人至遂無優劣是第七問舉異難同行有優劣者世戒行三福不同故聖多少者無數千五化佛比丘等衆異故花開早晚者一宿日夜七日六劫等差別故臺花差降者金剛紫金為𭹀臺異金蓮七寶為寶花殊一種金花者上品下生持金蓮花下品下生見金蓮花其言同故本此有三義至有差降也答第七問文自三義第一義意下品下生金蓮花者是來佛所乘坐花非行者座何與上品論同異乎其人障重等者明但見佛座不感佛相由謂十念力業故淨業速𤎼雖預來細障猶殘䨱佛容故但見佛座不見佛也第二義意下品下生金蓮花者引導蓮花故異上品此人鄣重不佛來唯依報蓮來精神故觀經等者證成自義兼非後義若是行者所坐蓮花經何不坐寶花也問本願文云大衆圍繞現其人前此義如何佛願乎答金花引生猶佛變故不可願如夢見佛來攝也第三義意行人坐花雖與上品同是金花形量大小莊嚴優劣自分以為二品蓮異問第一二義行者不坐寶花往生若不坐者諸品皆坐此品何爾若言坐者此人見座歡喜即坐不我座者如何得坐答準上八品坐花可生罪鄣重故僅見佛座若見引花雖不廣見自所座花命終已忽坐花也問若第三義無能引者如何往生上之八品猶據聖引極愚人獨往不迷答第三之義唯言見自所座蓮花不佛應謂佛來唯見自座如第一義見座非餘本下品中生至以成劫耶是第八問意可覺本淨土諸師至此方劫也答第八問文即有二一先摽餘解二正述自義第一餘解中先述於義次立於理言諸師者亰師憬等師許此方數第二今釋下述自義中先𢝰非前次正解釋有摽釋結尺有三義謂例教理第一例者例欲諸天壽命長短皆彼天笇顯淨土劫亦彼方數明初天歲數中若取𨵻浮提等者此之計笇未刊定所以者何以人間五十年為彼四王天一日一夜故三五十五彼三十日當此間一千五百歲乃至彼天一年計當此間一万八千歲數彼十二年即當此間二億一万六千年也若以此間万八千年為彼一月人六百歲為彼日夜三六十八万八千歲即當一月若五十年為一日夜一千五百万八千歲如其次第一月一年若據餘不足致疑今據俱舍成此都合恐是文誤也已上五天命漸增者人間百歲為第二天一日一夜乘斯晝夜三十日為一月十二月為一年彼壽千歲若以𨵻浮日月計笇三千年為彼天一月三万六百歲為一年人二百歲為第三天一日一夜乘斯晝夜成月成年壽二千歲人四百歲為第四天一日一夜乘斯晝夜成月及年壽四千歲人八百歲為第五天一日一夜乘斯晝夜成月及年壽八千歲人千六百為第六天一日一夜乘斯晝夜成月及年彼壽一万六千歲也如俱舍云人間五十年下天一晝夜乘斯壽五百上五倍增故云皆增下天一倍合釋可解不須重辨第二教者文有三一初至開之時也明上品中生花開淨土日夜二上品中至彼日月也明中生經宿如彼土日夜下生日夜亦彼方笇三日月下明晝夜既彼方劫數亦應彼劫初文有二先出經次尺經義釋中花開經宿等者謂顯彰上品中生花開時分既取彼土大寶花經宿開時分明知花開經一宿者用彼方數故經意如彼淨土大寶蓮花經宿晝開此紫金臺亦經宿開夜即花合等者諸佛淨土無日月故以花開合知晝夜也如悲花經第一蓮花尊淨圡云更無日月亦無晝夜以花合鳥捿而知時莭已上無晝夜者無用日月明暗晝夜知時節者準余事而知晝夜等又俱舍云持雙已上日月並無依花開合建立晝夜如㸸物陀鉢曇摩等又依諸鳥鳴靜差別或依天衆窹𭓺不同已上明無日月處據花開合等辨晝夜別也半劫為晝等者顯日夜時分曉花開長短如花嚴經云娑婆世界一劫為極樂國一日一夜等問何以得知大寶花例彼土花令知中生花開時分彼方歷數誰知以此天上寶花晝開夜合而令例知中生坐花此方宿開答淨土經中嘆大寶花豈是人天有漏花耶大者顯非人天花量寶者顯是衆寶莊嚴如言大寶花王座也寶花若則淨土花者所例經宿何此方耶今文花開時分然天上長人間時短何以彼長令知此短若言是例天上寶花夜合晝開非同時分諸品皆花開時分此品何令唯知開相故知經舉淨土寶花開發時節顯當品經宿時分是摽一類言經宿開豈無朝生暮花開類二上品下明下生日夜中亦有其三一直明例上品中生經宿即開上品下生一日一夜蓮華乃開亦彼日夜二不然下徵尺成中先責淨土寶花容此日開謂彼中生一宿花開既淨土宿例知下生一日一夜還可彼方其理顯著若言下生日夜不然此方數者寧容淨土大寶蓮華取此晝日而開敷耶下生日夜既此方故中生經宿亦容此方宿若此方彼大寶花亦容此方晝日開故次若彼下設責上花開遲下花開速謂若彼大寶花開以取彼日夜中生花開乍同彼時下生一日一夜開翻乃同此方日月者中生花開還乃可晚下生之者上下分花遲速義乖理必不然三故知者下結歸正三日月下述例日月劫亦彼方其義應推故云可知第三理者文即有二一初至劫花開耶明中品七日遲下品六劫若依經宿即開之日月花開乃用彼方若依汝等自許之義經劫花開乃用此方中品中生七日花開彼方七日彼方七日唯花嚴經當此七劫下品中生六劫花開此方六劫此方六劫亦準花嚴當彼六日若爾寧容中品中生花開之日遲於下品六劫花開耶約穢中品遲下一日故也二又下品至四十三劫明下品上生七日遲下品中生若日月花開用彼方若經劫花開用此方下品上生經七日彼四十九日彼四十九日準花嚴經即當此間四十九劫下品中生經於六劫此方六劫此方六劫亦準花嚴當彼六日故約穢土下品上生花開遲於下品中生四十三劫或本言二一默也若約淨土上生遲下四十三日第二教證已成立故立第三理責遲速失三以此下惣結不用此方劫數言道理者以例教理惣名道理非𢩁第三問要集明據此方劫數以四例成其中第三引平等經胎生者言於是間五百歲中不能得出憬興等師亦以此文證此間歲邊地既依此間歲數彼六劫等何淨土劫答今依觀經所依別故各解鉾楯至經者譯人加歟法護所譯不言此間此外異譯多所相諸師悉以法護為良學者思擇又於是間者捐彼淨圡謂前後文淨土故指自國言於是土間五百歲中不能得出又西方集成會通言作此解者於此間五百歲者言住城中之間非指此方間矣已上灮明山意指城之內言於是間所謂於此邊地城間彼土歲數五百年中不能得出故是間者指城間五百歲者指彼土笇非謂人間數五百歲也如愚推者為取極樂日月歲數召言是間謂胎生人於此淨土間五百歲不能得出古德之義猶為量耳本彼既經劫至彼花中耶是第九問意可詳本準依下品至各有差降答第九問文即有二一先引經二次述成在於花間經劫數者是由罪障若不由障在花內者何因九品華開不同各有差降本若彼有罪至感苦報耶重難前義花開遲速由罪障者有其業鄣何不感報耶本雖有罪種至長命之報重救前義文有其二一初至不得現行明有罪種不感苦報二但有下明不感報餘鄣猶在成華開障第一文三一明以由念佛等力罪種㔟用故不感苦果謂雖有罪種以其得生次前生中發菩提心至心念佛諸罪故縱有微細罪業種子不能為因𭷣生苦果諸罪消者念佛之力罪種用令不可𭷣其苦現行名為也微細業種者是業種子業種子者名十𢙣等不善思數種子熏成本識之處蕳其現行十𢙣業等故云微細㔟用若以極𮊵劣雖有種子不生苦現故知下結罪之義二又以下明淨妙身無由苦果而得現起三又以下明佛本願令其苦果不生現行第二但有下明餘障猶成花開障中亦有三一直顯樂由餘障故花不速開二故無量下引胎生例而成化生亦為餘罪花不速開言餘罪者彼罪業種微細㓛能感果用念佛等力雖已伏而得微細㔟用能障其花開也由疑彼佛不思議智者經具疑於佛五智然唯言疑第二不思議智𠀍人多有此一疑故謂修念佛及三福業求淨土者生疑惑曰吾是流轉生死凡夫無始罪業不可勝言如何一生已來修福輒得除可生淨土為治此疑故言不思議智不思議者佛果智力自在難測能少作多以多作少以近為遠以遠為近以重為軴以輕為重以長為短以短為長如是智力不可思議愚人不辨此智能故方疑少時修念佛等多劫罪若信佛智力不思議何疑少善能多𠍴玩其積礫不窺玉渕者未知驪龍之所蹯習其㢢邑不覩上邦者未知英雄之所久熏有分妄執狼疑無得神智餘之三智疑相深細邪惠者作非頑愚疑故且示一又別所疑四智中此智居初舉初顯後非有別由也疑王智相如略論解及憬興等問準略論者述疑第二唯舉念佛何言廣修三福等善疑佛智耶答經言以疑惑心修諸㓛德故所修不𢩁念佛一善異譯經中泛明布持戒等善彼略論者且就要行唯舉念佛問既起疑心如何得生答準異譯經信不信名為疑者謂此之人或時能信或時能疑信疑交𮦀不得一向故由信得生淨土壽經言猶信罪福即此義也雖信尚疑故受邊難亦經言疑惑不信即此義也具如傳通記中引覺經等解疑心者往生之義三猶如𭣦下引例重成餘鄣但有障花開力無招報㓛謂𭣦等業於地獄中雖感異𤎼有其餘㔟還生人天障長命報而令短壽名等流果花開之障亦復如是以念佛力引果用故雖無感異𤎼苦報猶有餘㔟障花開也十𢙣業道等流果者俱舍十七釋三果云十𢙣業道各招三果其三者何異𤎼等流增上別故謂於十種若習若修若多所作由此力故生那落迦是異𤎼果從彼出已來生此間人同分中受等流果謂𭣦生者壽量短促不與取者資財乏匱欲邪行者妻不貞良誑語者多𮞸誹謗離間語者親友乖穆𢙣語者恆聞𢙣聲雜穢語者言不威肅貪者貪盛瞋者瞋增邪見者增癡增上果者所有資具由𭣦生故光澤鮮少不與取故多𮞸霜雹欲邪行故多諸塵埃誑語故多諸臰穢離間語故所居險曲𢙣語故田多荊𮑾磽確䶠鹵雜穢語故時候變改貪故果少嗔故果辣邪見故果少或無也已上異𤎼果通於三𢙣趣俱舍從重偏云地獄故對法論云十不善業道異𤎼果者於三𢙣趣中隨下中上三品受傍生餓鬼那落迦異𤎼已上等流增上諸論同約若得來生人同分時謂從𢙣趣沒後生人中感得自身衆具𮕱名等流果感得所有外事𮕱名增上果也明增上中時候變者於耕作事寒溫等時乖變改轉貪果少者田𦤏稼穡果實鮮少嗔果辣者對法論云嗔恚故果味辛苦邪見果少者準貪可知又對法云邪見故果味辛苦或全無果問何因十𢙣各招三果答俱舍論云令他受苦故受苦異𤎼果斷他命故來生人中受命短促為等流果壞他威故感諸外物鮮少光澤為增上果已上𭣦生業感三果如是餘之𢙣業如理應思準之故知異𤎼等流增上三果如其次第令他受苦斷命壞威業所感也所謂𭣦生遠加行位取刀杖等追走責怖壞他威故感增上果所有資具賤少光澤近加行位打切他肉令迫逼故感異𤎼果受諸劇苦根本業位他命斷故感等流果是依顯相且一邊通而論者斷命壞威亦感異𤎼令他受苦亦感餘果俱不善故光記云問斷命壞威俱是不善應感果𤎼何故唯受苦感耶解云理亦能感而不者為令他苦相顯偏問等流即是增上果欇受苦壞威應亦能感何故唯斷命能感解云意據增上邊理亦能感而不者以斷他命業望彼短壽有別勝用故偏之問增上寬通應三並感何故壞威能感非餘二耶解云餘二理亦能感增上而不者以壞他威相顯別已上問等流如何僧上欇耶答言增上者異𤎼果上亦受果故名為增上若據此義等流亦異𤎼果上增受果故可攝增上也問若爾何故別名等流答約相似義別名等流謂斷他命令短促故後感短壽從此相似別勝能故立等流名故光記云言等流者是相似義如斷他命令壽短促今時壽命還短促故盜等準釋已上如不善業建立異𤎼等三果別十善業道於人天中三果差別如其所應亦當建立故對法四云十善業道異𤎼果者謂於人天趣中受人天異𤎼等流果者謂即於彼處各隨其相感得自身衆具興盛增上果者謂即於彼處各隨其相感得所有外事興盛已上本觀經言下至得往生耶是第十問先次難即有二先難重除罪法若罪前無罪可除何故觀音後實相罪障耶次若有下難有罪可除而得往生若後有罪可除者何因不障生於淨土而令往生耶本此有微細至除罪也答第十問文即有二一略會所難二以彼下廣解所難第一文中此有微細等者略會先難據念佛力業前以微細障猶未盡故經觀音罪鄣也然罪鄣微等者略會次難罪障餘㔟力用微劣念佛力強不鄣往生也第二廣解中以彼罪人等者廣解次難先示𢙣用次顯善德然念佛等者廣解先難謂前念佛行相故唯罪細障猶在故花開後遇於觀音㔟至二尊大悲音聲為甚深諸法實相而能觀察法身妙理所緣境界能緣正智俱微細故始能除彼微細業障故經言除罪也問往生已後障花開罪與花開後聞法除障為同異不若言同者既鄣花開未除之前何得花開若言異者念佛已細能鄣花開如是細二障之外更有何障花問之後始得除耶答二障別物謂花開鄣細中也於彼花內經劫數位皆得償盡花方開已故論注云經十二劫償五逆罪聞實相位所除罪障細中細也鄣佛相好㓛德等法不令明了故觀實相能令斷也本何故無量至遂有差別是十一問先引次難問此義既在第三卷中分明述釋何重問答第三卷釋三階義次雖釋此義通兩經而未明上下卷鉾揗意故今重釋耳本此無別也至於教開悟答十一問文有𢝰別𢝰解可知第二法藏下別釋中二一明願文從少至多二大聖下明願成就從多至少初中有三先明無逆多少皆生次如逆下明有逆者滿十必生不滿不生三久學下明論主爾不得本願之義第二釋願成就中釋迦預知等者本願文言乃至十念唯除五逆故人迷斯典浪起推求執逆者滿十亦不生故釋迦願成就時言乃至一念而顯願意若能十念逆罪皆生乃至一念不生故除上下卷文互一十顯教分明此乃欲令未來衆生於教開悟也本未知念佛至上心罪是十二問先審次難初審定中言上心者心之現行名為上心故𭩮論三云論曰此種子出世淨心未起時一切上心惑對治釋曰此第一為顯猒𢙣對治由此聞熏習明了正理能知諸塵過患於非理及諸塵生猒𢙣此猒𢙣心能對治上心惑即是聞熏習㓛能故明猒𢙣對治種子即是聞熏習菩薩未知欲知根名出世淨心此心未起之前是聞熏習屬聞思位在聞思位中昔未得聞思惠時由見倒及想倒見修所破煩惱恆起上心生四𢙣業感四𢙣道報由得此法未生煩惱及業果報悉不得起嘉祥大乘玄論云攝論師云地前伏四住上心初地已上方斷種子已上此等皆是心之現起名上心也次正難中若種子等者難種子謂初地見道要須聖道斷除二障分別種子證二空時亦斷𢙣趣諸業果等故唯識論九云雖見道生亦斷𢙣趣諸業果等而今且能起煩惱是根本故疏云等者等取𢙣趣非業及非異𤎼及等餘增上果等法及人天趣中分別所起業及果故直言𢙣趣攝不盡故能起之中但煩惱以所知障與之俱故惣名煩惱已上理通神目之為聖運載遊履稱之為道未得聖道寧罪種若言念佛㓛力勝故罪種者念佛㓛德雖復無邊此是有漏聞思等心何容即用無漏道力殊勝修惠能斷業種若上心等者難上心謂罪福心不得俱起無二上心如何念佛上心罪念佛現在罪業上心不俱起故過去上心不可言自去法故未來上心亦不可未生法故本非種子至力益能轉答十二問文分為二一惣二俱非二上心下別非上心種子兼明是罪種㔟用於中亦二先明念佛不上心謂上心者名一𭃯那現起思數𭃯那起法自能謝不假他力故上心罪𭃯那自不須念佛方始除也又善𢙣不俱等者明不俱故無除義謂念佛時上心之罪自己先或時未來上心未起言或時者對其已起非對是正念佛時也正造罪時念佛已亦不俱起念佛不其上心罪問何故有為諸法時不假於因緣力耶答雜集論六云謂一切法從緣生已不待壞緣自然壞以不待餘緣自然壞故最初生已決定壞已上俱舍論云不待因無非果故諸法生時必由因緣生果有故能生亦有諸法時不待因緣其無法非躰有故因緣亦無問若爾何故婆沙論言阿毗達磨諸大論師諸法生俱待因緣答諸法生有主客因言主因者是四相中生二相與法恆俱謂法生時由生相力由力因用𭤽勝恆不離法故名主因言客因者餘六因等因用非勝或時有無故名客因今約客因婆沙據主故不相又經部意諸法時不論主因故光記云又解經部生雖無實躰然假有諸法生時由主客因生諸法時不由因如擲物在空去由人力下即不由已上大乘意不相應法皆是假法四相中不可有躰為因也故今論言上心自不由念佛也次唯下明念佛力罪種用不躰中唯種子等者明彼罪種㔟力故雖有罪躰得名罪如唯識疏及斷障章云伏斷者折種子力令不生現名伏現行今義復爾由念佛力令其種子感果㔟用𮕱微不能現起招報也猶如𮊵瘦者下寄喻釋成故六種等者結示益分濟六種轉依者唯識論十云轉依位別略有六種一力益能轉謂初二位由習勝解及慙愧故本識中染種㔟力益本識內淨種功能雖未斷障種實證轉依而漸伏現行亦名為轉初二位者地前資糧加行二位此位漸伏亦名為轉之因故能伏轉故習勝解者勝解者勝解行位十信三賢信唯識理增勝解故名勝解位及慙愧者四加行位言慙愧者是勝解行增勝相故煩惱現行深能慙愧故名慙愧此等位中未斷障種漸伏現行染種㔟力益淨種㓛能故名為力益能轉念佛亦爾𢙣種力益功德能故屬力益能轉依二通達轉謂通達位由見道力通達真如斷分別生二障重證得一分真實轉依在見道位未圓滿故名一分出三修習轉謂修習位由數修習十地行故漸斷俱生二障重漸次證得真實轉依除於見道餘之初地及以九地名修習位四果圎滿轉謂究竟位由三大劫阿僧耶修集無邊難行勝行金剛喻定現在前時永斷本來一切重頓證佛果圎滿轉依窮未來際利樂無盡五下劣轉謂二乘位專求自利猒苦欣唯能通達生空真如斷煩惱種證真擇無勝勘能名下劣轉通學無學一唯自利二有欣猒三唯達生空四唯斷煩惱五唯證真擇由惠蕳擇得此故六無勝能無勝能者無一切智等勝能故六廣大轉謂大乘位為利他故趣大菩提生死𣵀槃俱無欣猒具能通達二空真如雙斷所知煩惱障種頓證無上菩提𣵀槃有勝堪能名廣大轉具六義故名廣大轉翻下劣轉可知其義是名六種轉依之位與攝論九既有同異彼攝論通達轉依在前六地唯識會云攝大乘中通達轉在前六地有無相觀通達真俗間雜現前令真非真現不現故已上前六地中以有相觀通達俗諦以無相觀通達真諦真俗觀惠間雜而起或真觀現非真不現謂入觀時非真現真不現謂出觀時又有相觀現真不現無相觀現非真不現由此義故通達轉在前六地又攝論修習轉在七八九十四地之中唯識會云修習轉在後四地純無相觀長時現前勇猛修習斷余重多令非真不顯現故已上此等名異不能曲述問力益能轉在資糧加行下品𢙣人十信已前流轉𭂫夫何屬彼位答自力門時第一轉依在願行位他力門日此轉㓛能通在十信已前凡夫乘佛願故一念十念㓛力能自第八識染種㔟力不招苦報益自第八善種㓛能即獲往生未解二空鄰見修道未伏二障伴內外凡如虴附驥尾則涉齊鴻鸖之翮似劣夫從輪王則行等神通之力彼綽禪師同一稱之㓛於十信万劫之修今群疑論比十念之德於一大僧之行真宗精要淨教心也𭥬此等改執思惟聖道得益淨土出離難易懸隔取捨焉在矣問轉依何義答唯識論九即有二初意云轉謂轉捨亦是轉得由數修習無分別智斷本識中二障種子故能轉捨依他起上遍計所執及能轉得依他起中圎成實性圎成實者即通菩提𣵀槃二種有無為門圎成雖𢩁無為真如漏無漏門圎成亦通有為大菩提故故轉本識煩惱障種得大𣵀槃轉本識中所知障種證大菩提是故名為轉捨轉得依謂所依即第八識依他起法依他起法與遍計執及圎成實為能得故轉捨遍計轉得圎成莫以本識不為所依故彼本識方至果位名為轉依是則流轉還二依轉之依故名為轉依依主釋也問遍計所執躰性都無何言轉捨答本疏云由所執故起有漏法有漏法斷所執名捨非別有躰名為捨也已上次師意云依是真如真如即是生死𣵀槃迷悟所依愚夫顛倒迷此真如故受生死沇淪憂苦聖者離倒悟此真如故得𣵀槃畢竟安樂由數數習無分別智斷本識中二鄣種子故能轉依如生死及能轉證依如𣵀槃故新淨𣵀槃名為轉依前義所捨即通二障所得泛通菩提𣵀槃後義菩提非識性故不名轉依本頌意者轉得識性名轉依故問依真如𣵀槃者如何立能所耶答真如本來雖性清淨而離染時假以名新淨𣵀槃是故假新𣵀槃為能依本有真如名所依也轉依義如本疏及以補闕章等委細分別本此念佛力至𢙣趣報不是十三問依念佛力罪㓛能罪種躰性猶不者未知已㓛能種子後遇𢙣緣造𢙣業時令已種更有㔟力還感𢙣報耶本有亦不至遂躰永答十三問文分為二一𢝰略答二如諸下廣例釋成第一略答文有亦不者還許難意謂問端云更有㔟力能感𢙣報容有此義故惣言有不如下文云義亦應有第二廣釋中亦有其二先二例釋成業種更感𢙣果於中如諸菩薩等者明菩薩伏煩惱種子後還現起謂諸菩薩修習善法猒伏惑種不令現起後遇𢙣緣退起煩惱現行煩惱熏習力故令已伏種轉有㔟力而還現起也如斷障章云今大乘聖道斷隨眠必不退伏者有退義𣵀槃經言若世俗道而斷煩惱以還退故名無常今方亦然退等種種姓依定障建立非退果然菩薩等以無漏道所伏亦不退有自在故如舍利弗至十住第六心猶退以退起煩惱先有漏伏故已上準此者六住已前令所伏惑還現行也又勝解行菩薩妄失退起貪等煩惱如第五記引瑜伽論及地持等或七地已還故起煩惱令已伏種轉有㔟力是以智力所故起故與今雖異已伏惑種生現行義既相似故亦可為例亦如二無心定等者重引其例先無想定者唯識論七云無想定者謂有異生伏遍淨貪未伏上染由出離想作意為先令不恆行心心所想為首立無想名令身安和故亦名定已上文即有五一顯能得謂有異生一類外道得故言有聖人能猒却故蕳言異生二顯離欲謂伏三禪遍淨天貪未伏第四禪已上貪三顯行相謂作出離作意為先執無想天作𣵀槃想故四顯所謂此定不恆行心六轉識間斷恆不現故名不恆行故本疏云前之六識名不恆行數間斷故五顯定名謂彼定中六識皆想為首彼諸外道以想心數為生死因故加行位唯偏猒之故言為首首是頭首先首義故名無想也諸有心定令其身心俱平等故目之為安怡恱名和此無心定由定前心令身和恱如有心定亦名為定問以何方便入此定耶答疏瑜伽十二云觀想如病如𬽜如箭入第四定修厭背想作意於所生起種想中猒背而住唯謂無想微妙於無想中持心而住如是漸次離諸所緣心便已上問此依何地修得之耶答唯識論云定唯屬第四靜慮此定果所第四禪故不依餘地也問此定有漏無漏中何乎答唯識論云此由猒想欣彼果入故唯有漏非聖所起疏云不通無漏者猒想欣彼無想之果入此定故即為六行有所欣猒非如定為止息想雖猒而無所欣果故唯無漏次盡定者唯識論云盡定者謂有無學或有學聖已代或離無所有貪上貪不定由止息想作意為先令不恆行恆行染𣲇心所立盡名令身安和故亦名定已上文亦有五一顯能得謂二乘聖俱解者即能得入蕳惠解故言有也獨覺亦有不得定部行類中未得通者故本疏云有獨覺不得定即部行中乃至亦有不得通者獨一者必得故已上有學聖中除初二果及惠解第三果者蕳此類故言或有學身證不還得此定故二顯斷伏謂已能伏無所有貪或斷之者得此定又非想貪若斷皆得此定三顯行相謂二乘者猒患六識有漏勞慮或觀無漏心動故若菩薩欲發生無心靜相似𣵀槃法故此名止息想作意也四顯所謂不恆行六轉識恆行第七相應染𣲇相於中二乘即除第七我執染𣲇菩薩亦除法執染𣲇各望自乘為染故本疏云令除不恆行及恆行染者謂若二乘即除人空之染菩薩亦除法空之染各望自乘為染故對法第二五薀論云恆行一分若第七唯有漏唯人執者即第七全不行望第八是一分故即以此文為證唯有漏若有法執二乘除人空分菩薩雙除非全無第七已上安惠師恆行有二謂第七八定之中第七已第八有故云一分非謂第七分而為二此義意者第七唯有人我見故聖道定無學三位無有末那故彼全無名恆行一分護法正義許有法執二乘但入生空定人執故云恆一分對有法執故名一分菩薩若入法空定雙人法二執末那猶有平等性智相應第七末那故云於恆行一分疏載二意如應分別五尺定名謂不恆行恆行染𣲇名盡令身安和故名為定問定若第七識者今何唯云猒於六識令不現行答相從無想故隨順小乘故約於全故唯識七云二無心定者謂無想盡定俱無六識故名無心已上此亦同今問菩薩何位入定耶答唯識論云若諸菩薩先二乘位得定後廽心者一切位中能起此定若不爾者或有乃至七地滿心方能永伏一切煩惱雖未永斷欲界修惑而如已斷能起此定論已入遠地菩薩方能現起盡定故有從初地即能永伏一切煩惱如阿羅漢彼十地中皆起此定經菩薩前六地中亦能現起盡定故已上初明漸悟謂於小位已得定不還羅漢廽心之後一切三位中能入此盡定惠解并初二果人廽心向大非一切地得此定以前未得此定故也次明頓悟此亦即有智增悲增有一類七地滿心方伏三界六識煩惱雖未能永斷欲修惑如已斷者能起此定瑜伽論已入第七遠行地菩薩方起此定故是約悲增或初地後即能伏除一切煩惱廣十地中能起此定入楞伽七及十地經第八中前六地亦入此定故是約智增問依何地修此盡定又為有無漏耶答唯識論云此定初修必依有頂遊觀無漏為加行入次第定中最居後故雖屬有頂而無漏攝若修此定已得自在餘地心後亦得現前已上遊觀無漏蕳於根本斷惑無漏次第定中最居後故者明定依非想所以謂九次第定中深細最居後故即依非想極靜地方能猒心至微心得入定餘下地心不能作微心相微心者定之前第二念心細於前心是名微心此微心後第一念修入定復細微心目微心故此定必依非想地非餘地也傍論已訖須釋本文𢙣業亦爾者下依例成先由念佛伏罪種後退造𢙣令舊罪種更生感用次若復下明不退相謂若從此念佛罪種已來長遇勝緣進修佛法𢙣微善盛乃至往生能入聖道罪躰永本𢙣業種子至㓛能不是十四問準已𢙣相翻而難謂念佛力除罪種感報㓛能令不招果念佛等善應能感得淨土㓛能由造重罪亦可耶本以善翻𢙣至可不信答十四問文有其二一略答二廣解略釋可知第二如一下廣解中亦分為二先花嚴及遺教惣成𢙣亦能善根非善種者如𢙣中辨唯善種感果㔟用非種躰如瑜伽抄言善根有二種一種子二現行唯斷現行非種子折伏㔟力令不起現行名之為斷非斷種子已上故知下結相反次如一生下別示臨終善𢙣更互相勸誡進退最後𢙣一生善者智論十九云有一比丘得第四禪生增上慢謂得四果初得初禪謂得初果乃至得第四禪謂得阿羅漢持此自高不肯進道臨終之時見四禪隂便生邪見謂無𣵀槃佛為欺我𢙣見生故失禪中隂阿鼻相現命終生彼諸比丘問佛阿蘭若比丘死今生何處佛言阿鼻獄諸比丘大驚坐禪持戒便至爾耶佛如前答竟而偈言多聞持戒禪未得漏盡法雖有是㓛德是事難可信墮獄由謗佛非關第四禪已上是依臨終生邪見故消一生善墮地獄也臨終善一生𢙣者如觀經文顯著也又智論二十四臨終善𢙣互消一生罪福以此準下明其勸誡一發心後至命終暮當須用心勿起𢙣念諸善品專心念佛往生淨土四修策勵三業勸進深銘心腑莫生忘任重道遠不擇地而息家貧親老不擇官而仕煩惱任重生死道遠不擇四儀而行出要罪𢙣家貧佛法親老不擇三業而修淨因𮄎不安廗凝觀念於西方寶樹之曉風食不甘味拂妄執於南浮荊𮑾之夕露不及探湯意在於斯本今學淨土至以除疑是十五問上來就九品文料蕳自下更約念佛三昧問難解釋今者先問三昧證據問第五論中引㫆𨹔經及花嚴等八部經典證念佛文經極廣今何重問其證據耶答彼不分別定散二善直廣出念佛諸經今別問定善念佛三昧成就故下答文及諸問答皆約三昧分別解釋本諸大乘經至當得知也答十五問文分其二一略解二如花嚴下廣釋第二廣中先列經論即有十二經一論名等者等取寶積經大悲經大般若經大集念佛三昧經大乘起信論等是等經論泛明念佛如花首等者明所列諸經立於異名花首經名一相三昧者安樂集引彼經云佛告堅意菩薩三昧有二種一者有一相三昧二者有衆相三昧一相三昧者有菩薩聞其世界有其如來現在法菩薩取是佛相以現在道場若轉法輪大衆圍繞取如是相𭠎攝諸根心不馳散專念一佛不捨是緣如是菩薩於如來相及世界相了達無相常如是觀如是行不離是緣是時佛像即現在前而法菩薩爾時深生敬聼受是法若深若淺轉加尊重菩薩住是三昧聞諸法皆可壞相聞已受持從三昧起能為四衆演是法佛告堅意是名菩薩入一相三昧門已上知一相者觀一佛相不雜餘緣名為一相如文殊般若經名為一行三昧繫心一佛專念一佛義不故花首經言者下明所列諸經相略花首文殊𣵀槃不餘下文中花嚴觀佛賢護等凡一代教勸處極多有志學者一披覽本念佛三昧至而修學耶是十六問修道次第者菩薩所行隨淺深位次第不亂念佛三昧其行次第攝不故問而已本此正是菩至修學次第答十六問文別有三一略解二廣釋三結成正是菩薩修道次第者是初略解也如花嚴經清疏云問法門無量何以初友便教念佛答略有十義一念佛三昧衆行先故智度論云菩薩以般若波羅蜜為母般舟三昧為父故二依佛方能成勝行故三㓛高易𤎼以獎物故四觀通深義能遍攝故五消重罪為勝緣故六雙兼人法易加護故七十地菩薩皆念佛故八三寶吉祥經初故初此念佛海雲法妙住依僧為次第故凡即心即佛易一境故十為表初住緣佛發心樂供養故已上二何以下廣證釋中有其二先徵次答中亦二初後釋中經百一十城者問八十花嚴明五十三知識四十花嚴五十五知識六十花嚴述四十二知識何言百一十城耶答舊譯六十本云一百一十諸善知識新譯八十本言一百一十城今依此故於文無失然列知識數未足者經文省略不舉盡也或云準五十五知識文百一十者往復相遇也又探玄記云惣括前後知識有五十四位分得生童子及有德童子即為五十五人各有自分勝進故有百一十也自分者授自所知一法故勝進者教後知識故又普賢行願品奧注云善財童子親近羕事𭃯極塵數善知識行五十五聖者善知識此等異取捨在情皆教一法門者一知識言唯知一法故是則為顯難值之意非彼知識實不知餘又前諸知識言唯知一法是顯行布門後普賢文殊二知識不言知一法是顯普賢門彼𭤩決言前漸後圎即此意也菩提心万行首念佛万行次者問檀度是万行首戒度是次如何相答止善戒法為先行善念佛為先利生檀度為先各有所由不相乖也餘文可知不可解釋問知識何義有何勝能答先名義者花嚴疏十云言善知識者謂能令於未知善法令知未識𢙣法令識或二字並通識約明解知約決了然知識有五一知識世間善𢙣因果而令修得二猒世樂而欣𣵀槃三有悲心相心修度四以無相惠令物修行五令無障得修滿普賢行此五前前非真唯第五人能行此是人善友若約法友教理行果皆善友也已上次勝能者法花經云善知識者是大因緣𣵀槃二十云一切衆生為阿耨多羅三藐三菩提近因緣者莫先善友何以故阿闍世王若不隨順𦒿婆語者來月七日必定命終墮阿鼻獄是故近因莫若善友已上問何名善財耶答𭤩決一云善財童子初託胎時於其家內有一大藏皆出七寶樓閣自然周匝有七種物從於七寶生七種牙善財生已牙高二尋廣七尋又其宅內五百寶器盛滿衆寶又七寶器更互生寶以是因緣諸婆羅門善明相者字曰善財已上本此念佛三至為何人得是十七問文意易詳等者等取十𢙣五逆等𢙣人也本此三昧者至是三昧也答十七問先略解次如花嚴下廣釋中先花嚴者證聖念佛三昧成就賢護經證凡夫及以持戒念佛廣通四衆故凡夫也清淨持戒是持戒也持戒即是万行根源故言正是合修念佛戒根清淨三昧易成若犯戒者極難成故今文彼經第一卷思惟品也又第三卷戒行品中廣出家菩薩成就清淨戒行具足不在家菩薩修八𨵿齊持戒比丘修梵行者常行敬此等所多約持戒明三昧成又如第五百年未一百歲中正法時比丘𢙣行時誹謗正法時持戒減時破戒熾盛時三昧廣行此亦宣造𢙣破戒通獲三昧觀佛經造𢙣破戒成三昧同觀佛經初文證犯戒者次文兼證五逆罪等念佛三昧又同經云為諸菩薩四部弟子謗方等經作五逆罪犯四重禁偷僧物比丘尼破八戒齊作諸𢙣事種種邪見如是等人若能至心一日一夜繫念在前觀佛如來一相好者諸𢙣罪障皆悉盡已上又如有犯禁戒見像純黑猶如炭人此亦宣持戒梵行能成見佛賢護經清淨持戒成三昧同當知此念佛三昧者聖人凡夫持戒破戒善者𢙣者有逆無逆有志修行無不得益誰有智者不依行乎隂陽之和不長一類萬民之主不阿一人平等利益無限攝受類例亦爾唯在行者心專不專勿論三昧境現不現本念佛三昧至為見何身是十八問其義可知本通論念佛至修學次第答十八問文別為二一略解二廣釋第一略解念佛𢝰通於三身佛能觀心有相無相性差別故所念佛通事理身也第二然準下廣釋中花嚴經等明觀色身佛名念佛三昧次賢護經第一卷證事理觀通名念佛三昧以此準知者分於經文配事理佛又即等者亦分經義配細次本何因得念至請陳其教是十九問先問所得境界不同次復如何見者問其聖教所見之相文意顯明不可解釋本一切行道至以除疑惑答十九問文分為三一明行人不依教得失差別二謹案下出教所見明境界別三既有下結成依教以不可疑第一明得失中何但誑惑百姓亦是王法罪人者此文即是以顯法謂不依教偽行佛法誑誘愚夫非直自他亦佛法如國吏等政不憲法非但誑惑百姓亦是王法罪人言王法者是王政法掠王政道是故言王法罪人也百姓諸愚夫王法諸佛教第二出教所見中先述經於中得淨心念佛三昧門者是第十八念佛三昧得此三昧自心明了見一切佛今文益恐文落得嚴淨𭃯念佛三昧門者是第九三昧得是三昧一切佛𭃯隨心變起天魔外道無能壞者亦普得覩十方諸佛得淨業念佛三昧者是第十九三昧其益下明得圎滿普照念佛三昧門者是第一三昧其益廣通諸佛及以其諸眷屬嚴淨國土今略舉四具如經皆大菩薩所得三昧故經言諸大菩薩次今日衆生等者明今時衆生所得三昧以根行淺未具足得一切三昧二十五種三昧者四十七卷云㓛德雲比丘告善財言善男子我唯知此普門光明觀察正念諸佛三昧是能了知菩薩圎滿清淨智行諸大菩薩得圎滿普照念佛三昧門悉能得見一切諸佛及其眷屬嚴淨佛𭃯得一切衆生遠離顛倒念佛三昧法門隨一切衆生所應悉令清淨得一切事究竟念佛三昧門正念修習諸佛十力得諸法中心無顛倒念佛三昧門悉得覩見一切佛雲於彼佛所聞法受持得分別十方一切如來念佛三昧門悉見一切世界海中諸如來海得不可見不可入念佛三昧門於微細境界見一切自在境界得諸㓛德不顛倒念佛三昧門於一切劫常見諸佛未曾遠離得隨時念佛三昧於一切時常見諸佛得嚴淨佛𭃯念佛三昧門起一切佛𭃯無能壞者普見諸佛得三世不顛倒念佛三昧門悉見三世諸佛及其眷屬得無壞境念佛三昧門於一切境界悉見諸佛得靜念佛三昧門於一念中悉見一切世界中一切如來示現𣵀槃得離日離時念佛三昧門於一日中悉見一切如來遊行教化得廣大念佛三昧門見一切佛身結跏趺坐充滿法界得微細念佛三昧門於一毛孔見一切佛成等正覺得莊嚴念佛三昧門於一念中見一切佛於一切世界成等正覺神力自在得清淨事念佛三昧門見一切佛惠光普照轉妙法輪得淨心念佛三昧門自心明了見一切佛得淨業念佛三昧門見一切衆生諸業如鏡中像得自在念佛三昧門見一切莊嚴法界諸佛充滿得空等念佛三昧門見如來身普照法界及空界已上此經所列𢝰別合論二十一種八十花嚴亦同此數花嚴合論同彼慈息述贊云花嚴經入法界云有人至心念佛得二十一種諸三昧門佛及菩薩影像現前衆生業道好醜悉現已上準此等應言二十一五字不正餘文可知本念佛三昧至是假矣是二十問先許菩薩所得三昧見種境次然今下更疑今時無智男女獲得定境是以四由疑三昧境一今時者蕳正像時未世濁亂難見聖故二男女等者蕳其出家諸士女等非道器故三不知者蕳有智者愚癡不可修三昧故四暫入者蕳長時修暫時不可得勝利故童男女者重舉幼稚疑非器利如是等類至心稱佛即言得見諸佛聖衆事同劇戲法不應然寧容高僧碩學精勤修習猶恐不成斯無知類能得三昧耶將非此法是假矣本今持道俗至勘苻佛教答二十問文別為二一略解二廣釋第一略解中咸生此疑者先示此疑非今難者準教驗時者次述利益苻於時運無量壽經賢護經中末世益準此教驗今時不可疑也第二且如下廣釋中即有其三一正述義二且入下次會其難三然其下辨境真偽初正述中且如世尊等者出爾獲道果例在日後者廣指得道若時若機如來後付法聖人所化雖衆不如毱多故特摽也如付法藏第三云如是化度無量衆生皆悉獲得阿羅漢果其得道者一人一籌長四寸滿一石室室高六丈縱廣亦爾於是名稱滿𨵻浮提世皆號為無相好佛化緣已便自思惟我今以法供養畢利安化樂同梵行者使諸四輩獲大饒益紹隆正法令不斷絶𣵀槃時至冝應度告諸大衆却後七日我當𣵀槃爾時即集十方羅漢及諸學人淨持戒者不可稱數諸優婆塞無量百千尊者於是飛身空現十八反使諸四衆生大信心於無餘𣵀槃而取後度以室中籌而用焚十方羅漢亦入𣵀槃人天悲𡘈傷咸皆收舍利起供養已上西𫭫記言尊者鳥婆毱多唐言近護石室高二丈餘尺廣三十余尺四寸細籌填積其內室高縱撗與經相或一座間經得法眼淨者初轉法輪時陳如等一坐聞法得法眼淨如第二記引智論等或因剃髮聖道現前者𣵀槃三十五云爾時衆生中有婆羅門名闍提首那作如是言瞿曇汝𣵀槃是常住耶如是大婆羅門言瞿曇若𣵀槃常者是義不然因是無常果云何常佛言我法雖從無常獲得𣵀槃而非無常爾時世尊即為宣四真諦法婆羅門云世尊我今聞法已得正見今當歸依佛法僧唯願大慈聼我出家爾時世尊告憍陳如汝當為是闍提首那剃除髮聼我出家時憍陳如即受佛勑為其剃髮即下手時有二種落一煩惱二髮即於坐處得阿羅漢果已上或得掃忘獲阿羅漢者增一第十云爾時尊者槃特告朱利槃特曰若不能持戒者還作白衣是時朱利槃特聞此語已便詣薗精舍門外立而墮淚爾時世尊以天眼清淨觀見朱利槃特比丘在門外立而悲泣不能自能時世尊從靜室起如似經行至洹精舍門外告朱利槃特曰比丘何故在此悲泣朱利槃特報曰世尊兄見驅遠若不能持戒者還作白衣不須住此是故悲泣耳世尊告曰比丘勿懷畏怖我成無上等正覺不由𡖖兄槃持得道爾時世尊手執朱利槃特詣靜室教使就坐世尊復教使執掃㩨汝誦此字為字何等是時朱利槃特得掃復忘㩨若誦得㩨復忘掃爾時尊者朱利槃特誦此掃㩨乃至數日然此掃㩨復名除垢朱利槃特復作是念何者是除何者垢者灰土瓦石除者清淨也復作是念世尊何故以此教誨我念當思惟此義以思惟此義復作是念今我身上亦有塵垢我自作喻何者是除何者是垢彼復作是念結是垢智惠是除我今可以智惠之㩨拂掃此結爾時尊者朱利槃特思惟五盛隂成者敗者所謂此色集色是謂受想行識成者敗者爾時思惟此五盛隂已欲漏心得解有漏心無明漏心得解已得解使得解智生我生已盡梵行已立所作已辨不復受始中實知之尊者朱利槃特成阿羅漢已即從坐起詣世尊所頭面禮足在一面坐白世尊曰今已有智今已有惠今解掃㩨世尊告曰比丘云何解之朱利槃特報曰除者謂之惠垢者謂之結世尊告曰善比丘如汝所言除者是惠垢者是結爾時尊者朱利槃特白世尊而偈今誦此已足如尊之所智惠能除結不由其餘行已上或七歲沙㫆俱解者智論二十二云阿若憍陳如舍利弗目揵連摩訶迦業乃至七歲沙㫆蘇摩等皆得諸無漏法根力覺道已上又案報恩及賢愚經均提沙㫆年始七歲即證羅漢三明六通具八解以毱打頭證四向果者諸經要集雜寶藏經云佛法寬廣濟度無崖至心求道無不獲果乃至笑福不唐指如往昔時有老比丘年已杇邁神情昏塞見諸年少比丘種法聞四果心生羡尚語少比丘言汝等懸惠故以四果以用與我諸少比丘𫪻而語言我有四果須得好食然後相與時老比丘聞其此語歡喜即設種肴膳請少比丘求𠧒四果諸少比丘食其食已更相弄老比丘語言大德汝在此舍一角頭坐當與爾果時老比丘聞已歡喜如語而坐諸少比丘即以皮毱打其頭上而語之言此是須𨹔洹果老比丘聞已繫念不散即獲初果諸少比丘復弄之言雖與爾須𨹔洹果然故有七生七死移一角以當與爾斯𨹔𭇥果時老比丘獲初果故心轉增進即復移坐諸少比丘復以毱打頭而語之言與爾二果時老比丘益加專念即證二果諸少比丘復弄之言汝今已得斯𨹔𭇥果猶有往來生死之難汝更移坐我當與爾阿那𭇥果時老比丘如言移坐諸少比丘復以毱打而語之言我今與爾第三之果時老比丘聞已歡喜倍加至心即時復證阿那含果然故於色無色界受有漏身無常壞念念是苦汝更移坐次當與爾阿羅漢果時老比丘如語坐諸少比丘復以皮毱撩打其頭而語之言我今與爾彼第四果時老比丘一心思惟即證阿羅漢得四果已甚大歡喜設肴膳種種香花請諸少比丘報於其恩已上或避走令聼得須陀洹者𮦀寶藏經云昔一女人聰明智惠深信三寶常於僧次請一比丘就舍供養後時有一老比丘次到其舍年老根鈍素無知曉齊食訖已女人至心求請法敷座頭前閇目靜坐比丘知不解法棄走還寺然此女人至心思惟有為之法無常苦空不得自在深心觀察即時獲得須𨹔洹果既得果已向寺求覔欲報其恩然此比丘自審實無知棄化逃走倍生慚耻轉復藏而此女苦求不已方自出現女人見已具𮐃得道果因緣賫供報恩老比丘聞甚大慚愧深自尅責亦復獲得須𨹔洹果是故行者應當至心精誠求法若至心者所求必獲已上是約能化棄捨避走若約化人避走者須達老婢當於此義觀佛經云舍衛城中須達長者有一婢名曰毗羅甚勤家業長者請佛及僧供養老婢堅貪嫌佛法僧而作是言我家長者愚癡迷惑受沙門術即發𢙣願何時當得不聞佛名不聞僧名如是𢙣聲遍舍衛城未利夫人聞已念言須達長者如好蓮花人所樂見云何復有毒蛇護之須達婦而語之言汝家老婢𢙣心誹謗何不出時須達婦跪白夫人鴦啒魔羅弊𢙣之人佛尚能伏何老婢未利聞之歡喜語言我明請佛汝遣婢持滿瓶金助王供養未利見來而作此言此邪見人佛若化度我必獲利佛於爾時從正門入難𨹔侍左阿難侍右羅睺佛後老婢見佛心驚毛竪即此𢙣人隨我後至即時退走從狗竇出狗竇閇四門皆塞唯正門開婢即䨱面以扇如鏡無所障得廽頭東方有佛南西北方皆亦如是舉頭者上方佛住頭伏地化為佛以手䨱面手十指頭皆化為佛老婢閇目心明開見空化佛滿十方界當時城中有二十五旃𨹔羅女有五十婆羅門女諸雜類并未利夫人宮中令五百女不信佛者皆破邪見頭面禮佛稱南無佛已發菩提心老婢邪見猶未生信猶見佛故除却八十万億劫中生死之罪得見佛已走歸家白大家言我於今日而遇大𢙣對見於佛瞿曇在王宮門作諸幻化身如金山目喻青蓮放勝光明作此語已入籠中以皮䨱籠頭而佛還薗未利白佛願化邪女莫還精舍佛告未利此婢罪重於佛無緣於羅睺有因緣佛既還已遣羅睺羅詣須達家度彼老婢羅睺羅變作轉輪聖王時千二百五十比丘化為千子到須達家以彼婢為王女寶老婢歡喜敬禮聖王宣十善婢聞十善心即調時羅睺羅及比丘還復本形老婢見已即作是言佛法清淨不捨衆生如我弊𢙣猶尚化度即受五戒成須𨹔洹將詣佛所為作禮懺悔前罪求出家得阿羅漢三明六通具八解已上事同劇戲等者下述此等皆不可疑劇謂忩劇戲謂戲論一坐聞法等是忩戲以毱打頭等是戲論如其所應配劇與戲皆由宿種者下述頓得由此乃過去能殖種解分善及曾修習此道法故爾聞法隨遇少緣即能得道種解者即指外凡下種之位曾修習者即指內凡苗成之位能得道者即指聖位結實之位落業微風以隕而風之力蓋寡孟𮞸雍門以泣而琴之盛已未宿世善𤎼亦復如是故智論三十四云如𤎼癕若無治者得小因緣而便自潰亦如𤎼果若無人取微風因緣便自墮落已上次案此下準例釋成謂準彼益案此三昧賢護經第五百後一百年以佛神力廣行流布若修行者即得三昧此寧乎二且入下會其難中且入佛法者先摽根機多如思惟等者辨解文義問答徵折高僧碩德尤佳其仁半滿真教者小乘九部妙義未究故名半字大乘三部正理已顯故名滿字所言字者為言本義稱為字𣵀槃論云半字者漸教滿字者𣵀槃滿足教故名滿字攝佛果㓛德盡名滿字聲聞緣覺不滿足故名半字已上𣵀槃第五亦委矣如也一等者明一心念即見於佛士等還堪任其器如多想等者並結德失三然其下明諸行者須辨真偽合修多羅如觀經若不合者名為妄想若有合者名為正觀本花嚴經言至請陳厥旨是二十一問先次難難中有二初審後難初審定中或其人等者造業之時即有久近且舉久者故言或也其人造業後久死生然定境中仍現久時所作業相未知斯所見業相者為實為假事真難解是審假實為是本質來現境中為是自心相分假變是審質相後業者等者正難大乘及以經部共許業是思數如何得見其心法耶其義幽隱請為開解本三昧境相至所測量也答二十一問文分為三一明三昧境實難解二非但下正辨其義三深須下勸其𠈟信第二正解中即有其二先出二例成三昧境初宿住隨念通者賢護經五十力中云如來宿命智力者如來能以諸宿命智知於過去諸宿命事所記衆生此死彼或於一處初受一生或二或三或五或十或百或千乃至或受無量百生無量千生無量百千生如是乃至無量轉劫無量定劫無量轉不轉劫等皆如實知又於彼所生趣如是處如是家如是種姓如是名字如是相貌如是生中如是服食如是所作如是善𢙣如是憂喜如是苦樂乃至若亍壽命等亦如實知又於某處捨彼身已復生某處如是身相如是所如是所經乃至壽命諸過去事皆悉知故賢護如來能以種無量諸宿命智知彼衆生宿命所經始自一生及無量乃至壽命諸過去事如實知者是則如來宿命智力已上是依止靜慮於隨念前際所行威德具足中若定若惠是念通以念𭤽故此中別摽隨更事念故名隨念過去五薀是本性相等者正釋宿住通緣過去境相謂隨念通過去五薀為本性相緣知彼時自心變現相分五薀忽似彼過去本質相而現在前是親所緣此法亦爾者預標釋成至下正釋次死生智通者賢護經五十力中云如來天眼力者如來常以清淨天眼過於人眼見彼未來諸衆生輩死此生彼其所受身或美或醜或善或𢙣所得諸色或好或𢙣或妙或或生善道或生𢙣道又見衆生所作諸業或善或𢙣有諸衆生具足身口意三業𢙣訶罵聖人誹謗正法壞和合僧具足如是諸𢙣業故身壞命終生於𢙣道又諸衆生具足身口意三業善敬聖人尊重正法供養衆僧具行如是諸善業故命終得生人天善趣如是等事皆如實知賢護如來以淨天眼見諸衆生死此生彼乃至命終生於天上是則如來生死智力已上是依止靜慮於觀有情生死差別威德具足中若定若惠是死生通問天眼直緣未來死生答依天眼通生勝惠方能了知未來衆生此死生彼於之建立死生智名根本天眼但緣現在所死生智緣未來是為差別故光記云其死生智但據根本是天眼通唯緣現在言緣未來據通所眷屬也已上三明六通如俱舍論二十七及智論三瑜伽二十七對法論二十地論五廣緣未來境等者正釋死生通緣未來境相謂此通緣未來衆生死此生彼諸五薀相時自心影詑彼衆生業果相續五薀次第而現在前一無差忽似未來五薀本質相分影現是親所緣問上廣言未來五薀為本質下𢩁言所造業為彼本性相如何相答死生智通能緣未來無量劫中衆生所造善𢙣二業及以所受一果報故廣五薀為所緣境雖緣五薀今為能例只其中業所例淨業三昧境界是亦業故今下文為合所例淨業三昧所緣之業偏取未來五薀中業為本性相若通寬論如上應言五薀為質問過去未來其躰非有何論本質如龜毛等是獨影境而無本質故唯識論云過去未來非現非常如空花等非實有性已上既非實有如何論質答過去未來雖無實躰曾當有性非全無法故三味中似彼過未來本質五薀影像現前無一差異以既寄懸曾當有法相分現故彼名本質雖名本質非如現在實種生法真實有性為其本質以此義故雖過未無不同角等全無法也問第六識緣過未五薀所變相分可熏過未本質種子耶答今論雖明變於相分熏本質種否所未詳但摳要上云如第六識緣過未五薀得是獨影亦得是帶質之境熏成種子生本質故已上文有二義初釋意者獨影境故不可熏本質種子也次釋意者熏成種子生本質故是帶質境謂染善意識㔟𭤽故緣過未境所變相分熏自相分種子之上亦得熏自本質種子雖熏種子生於本質過未本質今躰性無非如五八識緣現在法時其境守性真實有性不隨能緣故帶質攝不名性境據二合義亦可得名獨影帶質過未本質今不在故是獨影義相分亦熏本質種故是帶質義故合名獨影帶質也問摳要文義未明過去已謝未來未至躰性非有如龜毛等何熏種子若熏種子其躰非無豈夫不過去未來非現非常如空花等非實有性之論文耶有漏善心懺悔無始罪障明了心之前緣前惑業變相分影為除惑業還熏染種寧非大失又妙觀察智識知未來佛果現量智之中緣當二智變相分影依知未來預薰圎鏡成事種子佛果二智非唯本性是亦悮也答摳要雖明種子熏習其義幽玄人設劬勞亦依從方成摳要意緣過去薀熏成種子緣未來薀不熏種子所以者何過去已雖無躰性已起現行將之時施應起似己相分之作用故現在心前所現相分從先置種子生起與能緣心別種所生以相分既由質生故熏己種時亦熏質種若不爾者業感意識更不可言新古合生同時無有二箇意識餘識不緣如何熏種故知後念染善意識緣前異𤎼無記意識可熏新種未來五薀躰用未起何有起似己相分之力用耶故義燈云若爾名言熏習及緣過境熏成種時豈有質耶如名言熏及緣過境以現曾有彼境可生即熏成種空花非有雖緣不能別熏成種極微亦爾元無彼質故不別熏已上此問答中只舉過去不出未來加之演祕云如第六意緣曾實境熏成實種後生實現已上又周記釋摳要今文云約曾有質師資一同緣未來法獨影境不別熏種也懺悔心前雖熏前際惑業種子即能伏故是有何失或懺悔心是善心故善心之前所現相分亦既善性何熏不善惑業種子若現行熏不善種無漏心現前際貪等煩惱影何不熏成有漏種子準唯識論云勿無漏種生有漏故許應諸佛有漏復生善等應為不善等種有漏善心緣過去時熏種子者可論相順過去五薀何以障治相之法𭤽致疑難此亦等者依例釋成謂隨自他曾𭣺三業善𢙣㓛能於三昧中託彼業相現罪福影是名淨業三昧即見諸業相也次或佛下明由佛力見三昧境謂佛大悲為增上緣於三昧中為現此相令其修斷言彼斷者自他善𢙣心中現故行者覩見修善斷𢙣三勸𠈟信中三昧境界諸佛境界如次向所明初二義業力境界者由三昧力及以佛力所成業力亦非凡愚所測知故此三境界皆不可思議也本有得念佛至為實為是二十二問先舉所見次問實身未死位見此二相故其實更難知也本此非也至須𠈟信之答二十二問即為其三一𢝰明二境並非二別釋二境並非三𢝰結也第二別釋中且如第十二等者別明前境是非謬謂普觀自往生相類斯故知此三昧中見身往生更非妄又須達長者等者別明後境是非謂須達兼見當生報準斯故知三昧業成先見往生蓮花相須達往緣出賢愚經見當果者多在臨終須達制心最𭤽盛故不待終時當果現前亦顯機故尅果令然如𣵀槃二十七云佛在王舍須達爾時為兒婦入王舍城夜宿長者檀那舍因見長者忩辨供因問其故乃知有佛尋見如來請佛至彼如來許竟須達及與舍利弗同往經營精舍七日成立所設已訖即執香爐向王舍城遙作是言所作已辨唯願如來慈哀憐愍為衆生故受是住處我知彼心即與大衆發王舍城至舍衛國𨹔林須達精舍已上當知須達顯機性故如來應現亦能灼然法花玄釋顯機顯應云須達長跪佛在月蓋曲躬聖居門閫下三天中福劣弱上二天處放逸極多者問𣵀槃三十二云菩薩受後邊身處𫥢天是亦名為不可思議何以故𫥢𨹔天欲界中勝在下天者其心放逸在上天者諸根暗鈍是故為勝已上天下放逸似有其理如何相答今亦據經不須和會但試通者所望別故放逸義異𣵀槃言下天放逸者著相重故名放逸處如智論云下地結使厚上地結使利結使厚者由受欲重所謂地居行交形與人無別夜摩天衆相抱成名之為厚結使利者樂變化天相向笑成他化自在相視成名之為利覩史多天執手成異下地厚殊上地利是故補處居在彼天然今言上天放逸者快樂極多㫆遠道故上天樂多名為放逸如正理言奇捨縱情故名放逸故快樂盛五欲縱情上二天處屬放逸也各有其理互不相餘文可知不須重釋本得此念佛至能證知也是二十三問疑其所得實是三昧頗有聖教能證知也本觀經有文至非必修惠答二十三問文即有二一證二立理證可知第二行者下依理釋中即有其三由一學此三昧遂得見佛若不得三昧寧容見佛耶謂行者平生雖種種修道未修學此三昧已來不能見佛今入道場方修三昧既得能見即知獲得是三昧也二如人下舉喻釋成是實三昧文在𣵀槃經第八卷如來性品迦問佛云何佛性難見難入佛言如百盲人為治目故造詣良醫良醫即以金錍決其眼瞙一指示之問言見不答言不見復以二指三指示之問言見不答言少見合喻云無量菩薩雖具足行六波羅蜜乃至十住猶未能見如來既則便少見如是菩薩位階十地尚不了已上人患目者喻定惠障不見衆色喻未得定大醫師者喻釋迦佛善能療眼觀法以金錍決喻修行觀初不見指喻觀未𤎼昏散猶障令境不現後更為決喻重修觀見是指針喻思惟位𦆵見淨境若無眼者喻本自有三昧躰性盲目枯渴眼根無故治不可見上䨱翳瞙能治却瞙還得見色以此見指驗彼盲眼得除翳目眼根清淨非根躰失眼根清淨喻正見境此之三眛亦復如是衆生心中定性本無如何修得如攝論疏云衆生心中若無定水佛影不現已上若不修得如何得見諸佛色身及淨土等故知是得念佛三昧也三其人下依境失不成三昧實謂常修習於三昧中常見聖境若久不修馳散五塵先所見境即不能見以此故知前所得者是實三昧也多是聞思者前之所見後既𭁆故知見聞思定也若成修惠多不可退斷欲惑故心境細又非必言退失三昧聞思相應則是顯示近來所得多是聞思非修惠定如第三卷據大集經第三五百年已後所得三昧欲聞思定本修念佛三至令成勝業是二十四問文意易了本斯益也無至卒陳難盡答二十四問文分為二一摽二尺三結第二尺中亦有其二初略示次正釋於中亦二先略立六益尺三昧益次又賢護下明三昧益其實數多初立六益中先摽列數次隨數尺一見聖衆者略一文證見一佛彼經第二見佛品中廣明十方各見百佛千佛乃至見億百千那由他佛觀經般舟文殊般若等中亦見諸聖衆若晝時不見者對於睡夢其不睡時惣名言晝二聞正法者定中所見阿㫆𨹔佛為甚深諸法實相是同賢護第一卷前文餘故不別指彼經亦云其實未得天眼能見彼佛亦無天耳聞彼法音復非神通往彼世界又亦不於此世界沒生彼佛前而實但在此世界中積念熏修久觀明利故終得覩彼阿㫆𨹔佛僧衆圍繞菩薩會中或見自身在彼聼法聞法憶念受持修行或時復得敬禮拜尊羕供養彼阿㫆𨹔佛是人然後起此三昧其出觀已次第思惟如所見聞為他廣此文證上二益今略一文證一佛法彼經第四饒益品中亦聼聞所見諸佛所正法同卷甚深品中亦定中聞諸佛法從三昧起如彼定中所聞諸法思惟其義為他宣觀經亦出定入定恆聞妙法三重罪者十𢙣破戒五逆謗法皆悉消成三昧故又觀經坐禪經及智度論第七等中亦能極重𢙣業四生淨土者又第九佛身觀云作此觀者捨身他世生諸佛前得無生忍五諸定根本者安樂集彼經云諸佛世尊之所遊戲首楞嚴等諸大三昧始出生處已上六當成佛者彼經第一云復次賢護如此摩伽𨹔國有三丈夫其第一者聞毗耶離城有一女名須摩耶彼第二人聞有女名菴羅波離彼第三人聞有女名蓮花色彼既聞已各設方便繫意勤求無時然彼三人實未曾覩如是諸女直以遙聞即興欲心專念不息後因夢已在王舍城與彼女人共行欲事欲事既成永心亦息希望即滿遂便覺窹已追念夢中所行如所聞見如所證知𭤩法二引智論七云覺己心念彼不來我不往而淫事得辨目是即悟諸法亦爾於是共至𨹔婆羅菩薩所而問其事菩薩答云諸法實爾從念生菩薩為其方便法得不退地如是憶念來詣汝所具為汝者汝應為彼方便法隨順教化令其得住不退轉地究竟成就阿耨多羅三藐三菩提彼於當來必得成佛號曰善覺如來應供乃至佛世尊如是三人既得忍已還復憶念往昔諸事了分明也思惟一切諸佛現前三昧亦復如是其身常住此世界中得聞彼阿㫆𨹔如來應供等正覺名號而能繫心相續思惟次第不亂分明覩彼阿㫆𨹔佛是為菩薩思惟具足成就諸佛現前三昧廣乃至賢護爾時彼菩薩從三昧起已來詣汝所此三昧相者汝時即應彼法隨順教化令於阿耨菩提得不退轉賢護我時則亦授彼佛記是人當來必得成佛號曰德光明如來乃至佛世尊已上問案此經以種種喻顯三昧中悟夢境終獲菩提而例念佛遂得作佛記應舉所德光明如來授記證念佛益何以能善覺如來授記為三昧益答經既舉彼三人所得當作佛益而例三昧成就得益故知賢護為彼法亦應是念佛三昧法彼所法若念佛法善覺佛記亦三昧益故今證或以能例顯所例益實如所難可德光明如來記又彼經授記品中釋迦如來昔於燃燈佛所已聞如斯三昧彼佛授記是故我今具足十號汝等一心思惟此法如我不異必當得無上菩提道次又賢護下明三昧益其實數多一百二十問者第一卷首賢護能致一百二十三疑端今就滿數言百二十世尊菩薩等者其第一問云何當得已下二問如次最未二之疑問舉初後三省略中間一百二十故云如是乃至問也佛告賢護有三昧等者明修習念佛三昧當得成就如上所問一百二十餘諸㓛德賢護當知更有等者明其勝益實是無量不可直限一百二十是故非直出世無漏㓛德具足亦具世間種種勝利如彼經稱㓛德品言若有善男女人讀誦受持是三昧典或時復能為他解現前即獲五種㓛德何等為五一者一切衆毒不能𭓯二者一切兵杖不能破傷三者一切諸水不能漂沒四者一切猛火不能焚燒五者𢙣王縣官不能得便所以者何由是三昧慈心力故賢護若人一心勤求是三昧時讀誦受持是三昧時思惟修習是三昧時為他解是三昧時若有衆毒及以兵杖一切水火𢙣王縣官能傷𭓯者無有是處復次賢護假使世間壞劫之火世界𦦨赫天地洞然若彼受持此三昧典諸善男子及善女人設令墮落大劫火中三昧威神彼火即若不者無有是處復次若人受持經時若彼𢙣王若𢙣縣官若劫𮚆若師子若𮓜狼若蛇毒若能作障得者無有是處又行經時若彼夜刃若羅𭃯若餓鬼若鳩槃若毗舍闍乃至一切非人能為障得無有是處又讀誦經時正思惟時為他時入三昧時行梵行時若失衣若失鉢乃至有諸障得事者無有是處又若患眼若患耳若患鼻若患舌若患身若患心復有諸餘患難乃至命難梵行難者無有是處廣乃至八部衆類四大天王釋提桓因大梵天王及諸菩薩一切諸佛方能愛敬讃歎敬守護攝受具如經此等利益不可勝計故結文云卒陳難盡本若如此至諸㓛德不是二十五問問意易解本三昧雖同至生佛家矣答二十五問文即有二一略解二深即下廣釋中三先明深益於中上窮聖果者示深益躰如賢護經者據教而證彼一問皆問深益佛答修習如是三昧當得成就所問勝益故知念佛三昧所益甚深殊勝於是深中凡聖益別第二問曰云何得入多聞大海獲智惠藏問無疑惑故第七問曰云何當得殊勝端正上妙色身威儀衆生樂見故第十五曰云何當得大慈大悲大喜大捨平等與樂故第十八曰云何當得智惠通達明了一切無與等者故如是等益皆聖位益第八問曰云何當得常生大姓之家尊貴之位見者敬故第九問曰云何復得父母兄弟宗親眷屬及以知識左右圍繞恆無別離故第十九曰云何當於一切佛𭃯隨意得生故最後問曰云何當得住此佛𭃯遍見一切十方諸佛聼聞正法供養衆僧非但未得出世六通而實未得世間五通而亦未捨此世界身亦無生彼諸佛國土唯住此土見餘世界諸佛世尊悉聞諸佛所宣正法如是等益多通凡位對凡益下故云上聖次今諸下明其淺益後重况諸文易了不可訓釋本於此念佛至曉諸未聞是二十六問自修得益不可勝計其義已設雖未能自修三昧隨喜他修亦能誹謗有何益請陳其事本今當為子至謗法之罪答二十六問文別為二一摽示二如賢護下正釋中亦二先引賢護明隨喜福於中然尚不如修此三昧㓛德少分者經以布施挍量隨喜今似直挍念佛三昧是文略也具足應謂不如隨喜修此三昧㓛德少分故彼經云其所獲福雖曰極多然尚不如隨喜三昧㓛德少分已上四大隨喜者經次上云菩薩應作如是念如彼過去一切諸佛各於往昔行菩薩時皆因隨喜得是三昧因三昧故具足多聞由多聞故速成就阿耨菩提如我今日亦應如是依因隨喜得此三昧因三昧故具足多聞由多聞故速得成就無上菩提賢護是為菩薩第一隨喜㓛德聚已上第二未來第三現在亦復如是菩薩應作如是念如彼未來現在諸佛行菩薩時皆因隨喜得是三昧乃至速疾成就菩提如我今日亦應如是當因隨喜得是三昧乃至速成阿耨菩提斯乃如彼三世諸菩薩佛行菩薩道時隨喜行此三昧者我亦隨喜學是三昧者名三隨喜以三世名為一番故經第四隨喜云彼菩薩復應如是念我今已得𠈟學三世一切諸如來本於過去行菩薩時皆因隨喜得是三昧皆因三昧具足多聞皆由多聞而得成佛今我以此隨喜㓛德願與一切衆生共之同生隨喜同獲三昧同具多聞同悉成就阿耨菩提賢護是為菩薩第四隨喜㓛德聚已上以前三番隨喜㓛德回願與一切衆生共隨喜修行是三昧者名為第四般舟亦同𭤩決二十住論云三世佛為三番三世菩薩一為一番更詳文意次如大品下明誹謗罪經廣故不具也本未知修此至有我教是二十七問文有其二初許嚴堂可安本尊次難處暗大聲念佛本其聖典至生疑惑矣答二十七問文有其三一明聖典無勸暗室二但修下正解難意三此乃下明學者知不修無疑第二正明中亦有二一辨初學用於暗室三昧易成謂修行人將斯暗室絶諸視聼心捨諸緣易得三昧不爾難成𭂫是世間者下依例釋成於中有三先例欲思世間難事獨居閇目思事得成而明行者可用暗室次如處下寄於現量明用暗室心不散亂後又如下辨初後學如次用捨暗室修行况喻可知二故觀下明高聲念一心難亂三昧易成於中有先觀經證聲不絶至心易成謂用暗室為令心專為令成三昧知成三昧專心為先故觀經令聲不絶豈非此人苦惱所逼念想難成令聲不絶至心便得今此等者依證釋成謂今出聲學念佛定亦復如是令聲不絶遂得三昧見佛及衆晈然在前次故大下正顯示依大小聲念如其次第見大小佛問日藏分中無此文何答論主所覽更勘他本要集中言三昧發得𠈟而可信問大念大聲者念即聲不若言一者念是心數聲是色法色心躰差如何念躰即是聲耶若不爾者既言念聲如何會通答念力大故大聲稱佛義分齊等故言念聲非謂忽念聲即一躰問念若心所如何口稱名為念佛答念名心所明記曾受不生忘失故聞佛名後更不忘思出口稱是念心所明記㓛能想在於內語顯於外故㓛讓本口稱之上立念佛名觀佛亦名念佛準此可知又有別義繁故不述云云後斯即下結成教量及以現量勵聲念佛三昧易成餘文應詳不須重釋本經言五躰至頭面禮佛是二十八問上來料蕳念佛三昧行相已竟自下一章問投地自擈差別此問意者經懺悔言五躰投而今懺悔多以自擈未知依何聖教自擈若以經五躰投地即自擈者恐是未可既言五躰何妨只是五輪著地頭面禮佛本如觀佛三至其何怪答二十八問文即為二一先經二此豈下準經釋成彼經種種懺悔中言自擈鼻中血出故豈非懺悔用自擈無教輒為誠如所難經有其其何怪為𭤩通淨教令衆生學行依聖言及理解釋群疑論信謗俱結緣同生安養界願悉見㫆𨹔聞法成正覺寬永草一甲申孟秋吉辰栁馬場二條下町吉野屋𫞐兵衛
