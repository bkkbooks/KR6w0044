body:
  text: 本生彼西方至生西方耶是苐一問三世之心無有故三世之生亦不可得以何今勸西方耶雖知生無本依心且離開示心生不得先三世心不可得者大寶積經二十六云文殊師利言大德舍利弗汝斷諸漏得無漏解心耶舍利弗言我得無漏解之心文殊師利言大德以何心得於解為過去心為未來心現在心耶大德過去心已之想未來世心未至之想現在心不住之想云何大德心得舍利弗言住世諦心得乘苐一義諦中都無有心繫縛解思益經四云佛言過去心已未來心未至現在心無住若不復更起若未至即無生相若無住即住實相又實相亦無有生若法無生則無去來今若無去來今者則從本已來性常不生已上次三世生不可得者彼維摩詰以大乘空詰𣃥勒云𣃥勒世尊授仁者記一生當得阿耨多羅三𦴭三菩提為用何生得受記乎過去耶未來耶現在耶若過去生過去生已若未來生未來生未至若現在生現在生無住如佛所比丘汝今即時亦生亦𦒳亦若以無生得受記者無生即是正位於正位中亦無授記亦無得阿耨菩提云何𣃥勒受一生記乎為從如生得受記耶為從如得受記耶若以如生得受記者如無有生若以如得受記者如無有一切衆生皆如也一切法亦如也衆聖賢亦如也至於𣃥勒亦如也若𣃥勒得受記者一切衆生亦應受記以者何夫如者不二不異已上今問意者順此念之心方會寂一之生𭜧不出如何背此理勸有相生耶本以三世推至淨佛土也答苐一問文有其三一舉以顯世諦往生故維摩下引證以明世諦往生三子豈得直下明難者生邊見捨世諦苐一以顯中亦有二初次合起𥁞可見初喻中以三世推者先示心躰不可得相猶如燈炷者此下正有四用合法四德之意出本業瓔珞彼經上明十回向云從是回向明轉照智學相似平觀名無得假得喻如燃燈有燈非初熖者非初熖有時中有燒非離初熖者非初熖無時中有燒後亦如之直以有為諸二諦皆迭遷假號故燒故知熖非今燋非始今燋非始故於今方有始熖非今故於今無燒於今燒假燒得平觀亦復如是非初心有中有得亦非初心無中有得後心亦然是故始心非今心今起非始起故於今方有始心非今心故於今無得無得於今得假得中道苐一義諦心念入法明門經合無得而得今無生而生隨義轉用𭜧之於一時中有四用者准婆娑苐三云如燈生時發明破暗時燒炷器𥁞油今論一時用故只取四婆娑分生二時加於𥁞油燈時則油必𥁞故也次此亦如是已下准於上顯世諦生法有四德一由淨土業感生時𤎼二聖衆來歸趣淨土三捨娑婆穢質四成樂淨身合前喻者感生時𤎼可合器時𤎼如火成物𤎼故歸趣淨土可合燒炷生淨土時截五趣生捨三界報如炷燒故捨離穢質可合破暗娑婆識質黑𢙣故極樂淨身可合發明彼土色身光淨故三世緣生不常不斷者依他諸法緣會則有故云不斷誰言偏無緣謝則故云不常莫執偏有言慮路非尋思境雖復諸法者𡧘與無生業報與生死言別義同𦂶文㸦顯耳如𣵀槃經云雖知衆生實無有我而於未來不失業果雖知五隂於此𥁞善𢙣之業終不敗亡起信論云雖念諸法自性不生而復即念因緣和合善𢙣之業苦樂法不失不壞已上故知二諦然不可偏執也不壞世諦者取維摩意順成述故云即其義也彼經上云如有人欲於空地造立宮室隨意無礙若於空終不能成菩薩如是為成𤎼衆生故願取佛國願取佛國者非於空也已上不捨大地不壞世諦也依於空建立真諦也苐二引證明世諦生中亦二初經大士詰身子者彼經下云爾時舍利弗問維摩詰汝於何沒而來生此維摩詰言汝得法有沒生乎舍利弗言無沒生也若諸法無沒生相云何問言汝於何沒而來生此於意云何如幻師幻作男女寧沒生耶舍利弗言無沒生也汝豈不聞佛諸法如幻相乎答曰如是若一切法如幻相者云何問言汝於何沒而來此已上此是證其苐一義諦沒則去義彼處去也生則來義此處來也今文無去無來故言無沒生者即其義也下經言有世界名曰妙喜者此下二文證世諦相經次文云佛告舍利弗有國名妙喜佛號無動是維摩詰於彼國沒而來生此已上維摩詰言沒者為誑法者又經云舍利弗沒者為誑法壞敗之相生者為誑法相續之相菩薩雖沒不𥁞善本雖生不長諸𢙣已上此二文明世諦生世諦假名非真生故云誑法真生者不生不故𣵀槃云不生不名大𣵀槃次今勸下正明世諦生苐一義中雖無生理世諦因緣非無其義如身子云住於世諦心得苐一義諦都無有心繫縛解又賢護經三云彼法界中本無諸法亦無衆生云何言度但世諦中因緣度耳本金般若至此實難矣是苐二問初引二文次如何下正難初經意若欲見佛色若求聞佛音是𭂫夫人行邪道者法身妙而非妄識緣境故彼論云如來法身不應如是見色聞聲以何人不能見謂𭂫夫人不能見故次文離一切相者諸佛遠離我相人相衆生相壽者相故名離一切相彼論上云我相者見五隂差別一隂是我如是𭑭取是名我相衆生相者見身相續不斷是名衆生相命相者一報命根不斷住故是名命相壽者命根斷相者復生六道是名壽者相如經無復我相衆生相人相壽者相故是名四種我執之相人相命相一躰異名本般若觀經至願詳其致答苐二問即有其二初文略明有相無相俱是佛不可是非次亦乃下廣會通兩經初文中㸦是邪者般若勸無相有相邪道觀經勸有相無相為邪道如是㸦深有𣥜趣勿信謗交懷自成重罪矣問觀經邪觀成之時見雜境故能觀亦名為邪觀也故和尚云觀日見日是正見餘雜類是邪何以理觀屬於邪觀十三觀行者不可觀餘若無觀理何嫌言邪若期餘門出離者修理觀非淨土行期本異修行亦別何貶屬邪答若和尚意誠如責觀想雜妄想故觀成之位見於雜類以現境推能觀位定起邪想故名邪觀𣃥名他觀經言若不合者名為妄想即此意也今論意者由三義故差其理觀亦名為邪如次下釋資師釋各據一義又靈芝云雖是佛教大小觀法若非往生淨土之觀並是偏邪非同外道邪見之邪已上是亦餘大小觀法名為邪觀苐二廣會通中即有其三一就人二就學三就就人者人即是根怯弱暗鈍名淺根人勇𨦣明利為深根者觀經為淺根觀色相身般若為深根觀法性佛淺人學深者舉機法相失而述佛對根於中甘露命經有誠文者𣵀槃八偈云或有服甘露傷命而早或有服甘呂壽命得長存或有服毒生有緣服毒死無礙智甘呂謂大乘典如是大乘典亦名雜毒藥如酥醍醐及以諸石蜜服消則為藥不消則為毒方亦如是智者為甘呂愚不知佛性服之則成毒已上就學者般若邪道是誘引辭也謂引初學取著𬼜相令進無相而前相是邪道於中先明定觀門戶從淺之深謂初學人未足觀實相故且教色觀調練其心引令進修無相法身如入海從淺至深故十住論云行者先念色身佛次念法身佛何以故新發意菩薩應以三十二相八十種好念佛如先轉深入得中㔟力應以法身念佛心轉深入住上㔟力應以實相念佛而不貪著已上加之觀佛賢護中為初心人多𬼜相夫寒者不貪尺玉而思短褐飢者不願千金而美一喰初心學者須思擇矣久學之人者正明為機邪非邪見攝者只是邪執非因果撥無邪見故問若爾何故觀佛經一云欲觀佛𨱳當作是觀不得他觀若他觀者名為邪觀名為狂亂名為失心名為邪見名顛倒心設得定者無有是處答邪見躰廣餘之四見不攝者亦名邪見故唯識云及非四見諸餘邪執如增上緣名義遍故已上一者名遍不正名邪諸不正見皆此攝二者義遍一切邪皆入此攝故觀佛經廣異正見亦名邪見今別蕳重故非相如上生疏云若別邪見唯斷善根類若不正名邪見𢙣見皆是已上又十地論苐三釋經而諸𭂫夫心墮邪見文出九種邪見非必因果撥無見也如慳人學布施者此下例顯佛善巧攝大乘論六云若人於戝物有慳心為除此心先為讚歎布施若人已欲樂行施是下品善根如來後時更呰此施令竭作其餘勝行若不由此意讚則成相已上是則四意趣中衆生樂欲意趣也而諸愚人莫知善巧執文迷義今亦如是為其進修且言邪也𭂫隨文取義招五種過一不正信二退勇猛三誑他四謗佛五輊法文正在十地論義廣通諸餘典就者行者若色即是空觀色非邪不空故若迷色不空觀色是邪般若𥾸之名為邪行者若空即是色觀空非邪不色故若空異色觀空是邪觀經𥾸之名為邪此依誤自分美醜何閞二境色空二法即是諸佛二智境界勿論是非若曉此宗觀色恆正若迷斯趣觀空常邪正在情更非閞境問若尓者有色心情修色相觀終成邪道應無往益答三之中今就故不許情隔若據前偏觀色相亦得往生此即當上輩生者問空色義異如何相即答今言空者苐一義空色者依他依他色法圎成為躰不離用名空即色用不離躰言色是空若不離門義為若斯若不即門空色躰別有為無為義各別故非如性宗全性起修如雜集論云此色空性非即色亦不離色別有空性色即是空性即是色乃至識亦爾次下尺云為對治一性分別故如是言此色空性非即色乃至此識空性非即識由自性異故以者何色是遍計執自性空性是圎成實自性故為對治異性分別故如是言亦不離色別有空性乃至自性即是識由遍計執自性無相故離彼無性不可得故已上本金般若至前經相是苐三問初直引三經證佛無去來相次准此已下正難觀經有相去來初引證中一二可知苐三證云文殊師利言者准苐一卷應是法界躰性經夫法性離三際相故言不住文無前際不來之言恐是略也取捨者用捨也千是非是故言不取百非非故言不捨又不取不捨者如次釋上不住去謂不住是不取之義不去即不捨之義也如佛地而淨法界無去無來無動無轉佛地論云捨此就彼名去捨彼就此名來無動無轉初摽後釋已上例彼今然遠離六入者離色心五根是色苐六即心色心有為故得遠離無觀者尋思路名無觀非是𭂫夫分別識境故如經言彼識不能知即其義也次正難中觀經化佛來者不論報化惣名化佛從真流現應機冝故如佛地論四句分別中云三亦受用亦變化謂為地上菩薩現種身令諸菩薩受法樂故隨時改轉不定故若曲論者上輩來應是受用阿𣃥𨹔兼化來故謂本願力他受用身直來接中下二輩應是化身壽經中輩具如真佛故觀經中輩眷屬皆比丘故本甚深實相至𢘻為妙答苐三問文有四釋三釋次苐而在一處苐四越在重難答未謂又𥾸遍計文即是也苐一釋中甚深實相者明法身本無去來以佛本願者明現化身十方往還如金般若論云諸佛化身有用彼法身諸佛不來不去故言用者去來用故次下言去來化身佛如來常不動從真起化者自行二身名為真身化他二身名為化身如佛地論七云或處佛有二種身一者生身二者法身若自性身若實受用俱名法身諸㓛德法依止故諸㓛德法集成故若變化身若他受用俱名生身隨衆冝數現生故同論四云如經言善男子如來都無去來事而言如來去來者就受用身及變化身無相過已上准此今言化身去來者應化他二身真不去來者應自行二身亦他受用名化身者如向已辨又金般若論云去來化身佛如來常不動此亦二身通名化身論上偈言是福德應報為化諸衆生自然如是業諸佛現十方故謂他受用同福德報亦化他身故可屬去來化身也問自受用身亦名真者何故文云平妙理法身如來本無生答法身言通自受用故以佛本願無限大悲者四智相應㣪得大悲何不攝真耶又明化云隨機應物故知真者亦攝自受用身而已以化即真者此下正會難以真統化即真故化亦無去來前經據之從真流化應物機故化必有往還觀經就之故彼此無有背又西方下是苐二尺遙指月氏龍軍無性故云西方彼師意者如來能證離言法性永離色聲戲論法唯有大定智悲三法故佛無來現亦無法然以如來慈悲本願為增上緣有情識上文義相生似如來色身相現似如來身實見聞者意識上現從增上緣名佛法及現身也故法珠林章云龍軍論師無性菩薩及佛地論一師佛實不言佛地一師者彼論一云有義如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛由耳根力自心變現故名我聞釋經我聞即有二義是苐一義次義云聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根而起名為佛聞者識心雖不取得然似彼相分明顯現故名我聞唯識疏述龍軍義云謂佛慈悲本願緣力其可聞者自意識上文義相生似如來此文義相雖自親依善根力起而就本緣名為佛佛實無言若依本乃無文義唯有無漏大定智悲已上法既尓身土亦然故龍𫤭記云以明躰者諸師不同龍軍堅惠金軍皆言諸佛但住法性無別受用變化二土唯往生輩有耳謂佛悲願為增上緣往生善根為親因緣生者識上淨土相顯已上今准此明往生相彼佛不來此生不往阿𣃥𨹔佛慈悲本願㓛德種子增上緣力令諸衆生自心變現見去來相是實自心相分非開化也故不去來𥾸於佛㓛德彼德湛然而不動故有來去絇衆生相分彼相變現見去來故又有尺言下苐三義中如來應機者此中意十方迎生是佛化身化佛身從佛鏡智大悲流現鏡智之用能生能現諸身土影像差別故佛地論四云大圎鏡智相應淨識有二種用一因緣用謂淨識中具有一切能現能生身土鏡智淨法種子若遇外緣即便變現身土境界種影像及能生起平智相應心品行相差別二增上緣用謂佛淨識善根願力生起故若諸衆生自因緣具爾時淨識即便資助令得無障生長成滿是故鏡智體雖是一能現能生諸法影像待外緣故非頓現起有難者言若圎鏡智是諸有性一切智影像生因云何影像相有差別此之智躰無差別耶會此難故言躰雖是一能生能現諸法影像又有難言若一切時常能為因何不恆時頓生一切衆生及自智影像釋此難故言待外緣故非頓現起現化佛雖有往來而能現智任運無有作意分別是故以摩尼天鼓梁攝論十二云如摩𡰱天鼓無思成自事如此不分別種佛事成尺曰如意寶無有分別能作彼衆生願求事如天鼓無人扣擊能隨彼衆生欲之意謂𭜨來𭜨去受欲生猒諸佛亦爾已離分別能起種利益衆生事利益事有二種一化身利益如意寶二法利益猶如天鼓已上論文分現形法二種利益今則合化身利益此乃顯示鏡智大悲任運而起利益之事不取出事為也或偏可須摩𡰱之而舉天鼓同文故來然現化者此下會難經謂現化有往來而彼經言不往來會有二義一𥾸真身而作是此或下至前已尺竟文是也前已釋者指苐一尺彼會前經屬於真故問若尓者與苐一尺有何差別答苐一之尺據化即真化亦不來故不來去言猶攝化身今苐三尺如來真身無去來義現化身隨機往來故不來去言不亘化身故遙異也或𥾸生者此下一義會不去來謂色五薀有為遷流一念無住生已即不可移動受用變化亦是有為故前經中不來去然相似相續似有往來故相續道中假有往來實無往來也念不住生已即者正尺有為法生相如雜集六云是故色念生生已不待緣自然壞以不待壞緣自然壞故最初生即便壞已上又俱舍論一云此有為法亦名世路已行正行當行性故或為無常吞食故已上諸有為法𠛴那中行過去法是已行之性現在法是正行之性未來法當行之性以世為路故名世路無常四相是能吞食有為諸法是吞食此吞食終可破壞故名為世無常依故名世路世即路持尺也真諦師云路為行食如万里之路行不已終則𥁞五隂亦尓為無常行故終則𥁞已上當處生當處者顯不去此至彼之義異處生異處者顯不捨彼來此之義此即明有為無行動俱舍論云諸有為法𦆵得自躰從此無間必歸無若此處生即此處無容從此轉至餘方演祕引成實論云諸行實無至餘方義有為法性念故相續假往來者顯示相續道中假有往來之相智論二十二云三界皆是有為生先有念無今有後無念生相似相續生故可得先知如流水燈炎長風相似相續故人以為一衆生已上入大乘論云生之法皆𢘻是空生輪轉無暫停時相似相續故妄見有實猶如燈焰念生𭂫夫愚人謂為一㷔已上法師物木論者證有為法不可移動准續僧傳及法珠林釋僧昔安帝時居京兆人便著般若無知論不真空論物不論𣵀槃無知論并注維摩制經論序作論竟以示羅什歎曰䄅人空苐一者僧其人也旋嵐偃嶽者正以四𢪱示不相宗鏡三十三云不論云旋嵐偃嶽而常靜江河竸注而不流野馬漂鼓而不動日月歷天而不周疏云前風非後風故偃嶽而常靜前水非後水故竸注而不流前氣非後氣故漂鼓而不動前日非後日故歷天而不周鈔云然自體念不同則初一念起時非苐二念時乃至最後吹著山時非初起時則無前念風體定從彼來吹其山也且山從初動時以至倒臥地時自躰念不同則初一念動時乃至最後著地時非初動時則無初動山體定從彼來至著地時斯皆風不至山嶽不著地雖旋嵐偃嶽未曾動已以此四物世為物然雖到嶽歷天皆不相知相到念自住各不且如世間稱大莫過四大中動莫越風輪以性推本實不動已上𠀍謂能只是四物實不餘有為法推可察矣問曰𣵀槃下至斯何理耶重難前一邊義言有為佛故不去來謂𣵀槃經三身常今何言佛生不住此是天台及𣵀槃學者之難也捨無常色獲得常色者𣵀槃經三十四云色是無常因是色獲得常住之色受想行識亦復如是已上若𥾸難意經㫖者因位五薀皆是無常未究竟離無明念故念變無常相故果位五薀俱以常住道中無念可論故若亦別就天台意者別人後心方具常色成二轉時獲常隂故圎人初心即具常色分假質㝵猶不捨故又言諸佛師謂法者同經二十六云諸佛師謂法也心緣於法為心師已上法謂𣵀槃即實相法心崇此法常順名師若能順法捨邊邪僻得清凉地故此法能為諸佛師以法常故諸佛亦常者一事法即是真如全躰法故如法常住諸佛三身㫮𢘻常住如下文云三身疑然今消經文准難者意相宗不然唯識論𣵀槃經獲得常色文疏釋云又𣵀槃經㽵嚴論轉無常薀獲得常薀已上而㽵嚴論𥾸相續常釋𣵀槃明知法相非難者意也具如答三身凝然者本地三身俱躰俱用凝然不是不變義法華論記云三身俱是凝然常住即此意也釋曰此之至論成立更救前難文有二意初且順難出𣵀槃學者三身並常義次有一般下正據宗義會難經苐一文中一般大德者般猶是品如云千般𣵀槃經文本業經者𣵀槃經文如向引本業經下云以果身常故應身亦常具苐一記中之苐二正義中即有三初引攝論及般若論尺報化身非凝然義二諸作者下立理尺成三以此衆多下惣結成也初引證中依攝大乘論者世親攝論十云佛受用身及變化身既是無常云何經如來身常住此二依法身常故又流身及變化身以恆受用無𠇲故數現化不𣱵絶故如常受樂如常施貪如來身常應知亦尓尺曰經如來其身常住佛受用身及變化身皆是無常云何身常故次成立二身常義謂此二身依法身住法身常故亦為常又受用身受用無故為常其變化身恆現覺般𣵀槃相續不斷故亦為常復以喻顯此二身是常住義猶如世間言常受樂雖受樂非唯無間而得言此常受樂又如世間言常食非此食恆無間斷而得常食應知二身常義亦尓已上者取大㽵嚴論及佛地佛地論七云㽵嚴論常有三種一本性常謂自性身此身本來性常住故二不斷常謂受用身恆受法樂無間斷故三相續常謂變化身沒已復現化無𥁞故如是法身雖離一切分別戲論而無生故名常二身雖有念生而依常身無間斷故恆相續故名為常如來色受法一切常住依此道理非無生無漏種子修習增長生起故生者皆一向記故色心皆見是無常故常住色心曾不見故已上述記苐十亦引㽵嚴雖同名常義有差別以初一身自性常住後之二身從生因生般若論者重引證成報化二身從因生故必歸義此先引其證也天親般若論上云於實名了因亦為餘生因唯獨諸佛法福成苐一躰此義云何菩提者名為法身彼躰實無為是故於彼法身此二能作了因不能生因餘者受報相好㽵嚴佛化身相好佛於此為生因以能作菩提因是故名因顯彼福德中此福勝故如經何以故須菩提乃至皆從此經生故已上言二者一者受持二者演此二種法能趣菩提但於法身為證得因不能生因法身本有不可言從般若生故只覺本有故名了因報化二身依修成故般若㓛德為能生因故名生因論次上云受持法及不空於福德福不趣菩提二能趣菩提何者為二一者受持二者演如經乃至受持四句偈為他人故佛地論七云金般若論受持演彼經㓛德於佛法身為證得因於餘二身為生因故已上此論亦顯法身不生報化生三身章云𣵀槃經有二種因一生因如牙生荎二了因猶燈照物般若經言一切諸佛法皆從此經出一切諸佛從此經生天親論釋言於實為了因亦為餘生因已上二立理中諸作者皆是無常者從因生法名作性若是凝然應同法身從了因成又應非隂亦無緣言動作者亦廣立理即有其四報化若凝然者一應無五隂凝然無為無為非隂故二應無緣慮凝然圎成離慮依他故三應無言凝然常住言即聲是無常作性故四應無動作凝然不動作即若生作動非無為故初一惣就二身躰成後三別就佛三業成緣慮言動作如次意語身三業也三惣結中以此衆多義理者惣指攝大乘已下諸文義道理廣如唯識者報化二身生之義唯識論廣立量成立故論十云清淨法界無生無性無變易故為常四智心品依常故無斷𥁞故亦為常非自性常從因生故生者歸一向記故不見色心非無常故已上者取佛地論如上引又絇遍計執者此下苐四義上來雖有三義不同而未曾絇遍計執今始至此義尺經謂帶遍計迷𭑭衆生即執心外有佛往來佛為破彼遍計執前諸經不來不去若依他非有似有往來相者非無其義故觀經言有往來各據一義故不相次維摩即是其義彼經中云文殊師利既入其舍見其室空維摩詰言善來文殊師利不來相而來不見相而見文殊師利言如是居士若來已更不來若去已更不去以者何來者無從來去者無至去可見者更不可見已上經不來相者心外更無往來義故言而來者據依他性而有非有似有往來故不見而見准之應知本法句經言至談奬除渴是苐四問初直經明名字空次准經正難稱名初經中為有者初句有無相對次句假實相對餘文易了本依諸大乘至詮者也答苐四問文有三意初至之喻作矣並述名字性空及名字有詮表俱有以二佛以下至沇輪𢙣道別許名字空道理而會難經三若言名字下別明名字有詮表而成稱名往生義苐一並述二中即有其二初並二次唯能下並成二義初並中先引維摩及攝大乘證名字空次遺教意證名字有詮經言文字性離者先維摩彼經上云一切言不離是相至於智者不著文字故無懼何以故文字性離無有文字是則解已上一切言不離遍計執妄分別自何以故妄情周遍計度於計度彼諸法假立名字由立名字而起言隨如是言起如是執著即生菩薩智者於如是名無有著心以解中文字性離無文字故如對法苐七云於計度彼諸法假立客名由隨客名而起言隨如是言起如是執著菩薩於如是一切名正不隨觀正隨不觀故不生執著已上是故名字假無有定實也問唯識論二云名詮自性句詮差別文即是字為二依豈非名字有實躰而詮法性耶答有為諸法其性如幻亦若圎成言思路故彼自性證智知更不及言詮假智是故名字及與假智唯於諸法共相而轉不能自性故唯識論二云真謂自相假智及詮俱非境故謂假智詮不得自相唯於諸法共相而轉疏云但心取法自躰相言不及假智緣不著之為真此唯現量知性離言及智分別又云如色法㝵為自性火以𤏙為性水以濕為性但可證知言不及苐六意識隨五識後起緣此智發言語但緣法之共相非彼自相已上准此名字唯於共相而轉不緣自性故云不能詮諸法也但論言詮自性者自相共相即有多重謂於共相猶有分別自相共相共相中自相名字尚可詮論絇此意故云名詮自性非言即緣不可言慮諸法自性故彼處疏云諸法自性非名詮唯現量證名唯詮共相今言詮自性者即是共相之自性自性者躰義差別者躰上差別義即自相共相皆有躰性及差別義故已上問共相云何名字緣又共相中何更分別自共相耶答共相是名字詮者疏云言共相者如言色時餘非色一切色法皆在言乃至言青非青一切青皆在言貫通諸法不唯在一事躰中故名共相為假也已上故知色言乃至青言貫通諸法唯得共相不獨詮表一事自性是躰次共相中亦論自共者疏云如五薀中以五薀事為自相空無我理為共相分薀成處色成於十處名自相薀名共相一色薀䛷十故於一處中青黃類別類名自相處名共相於一青類中有多事躰果青非華以類為共相事名為自相一事中有多微以事為共相以為自性如是展轉至不可為自相可為共相故以理推無自相躰且不可言法躰名自相可為共相又云如色薀是自相漏無漏是共相色薀之中色處是自相色薀是共相色處中青是自相色處是共相又青是共相隨一樹是自相樹是共相枝是自相枝是共相為自相已上問何名假智又言詮假智云何不得自相答假智言詮不得自相者疏云言若著自相者火之時火應燒口火以燒物為自相故緣亦如是緣火之時火應燒心今不燒心及不燒口明緣及俱得共相言假智者唯識論云然假智詮必依聲起疏云謂此假智及詮必定依聲而起如聞某甲即便緣之或起言故必依聲如作色及色言由聞他聲之為色方能了故已上問若尓者嬰兒未聞他人教聲及生無色不聞他聲如此類應無假智答疏釋之言此理不然如鼠聞猫聲及或見鵄即便急走豈彼生已能起證智耶此前生曾為猫鵄之食噉今既見已有此智生定知如前還被彼即便急走生無色亦尓無始及下界曾熏習故已上又言名義互為客者次攝論然即𡧘默無言者次引遺教意證名字有詮彼經首云釋迦牟尼佛初轉法輪度阿若陳如最後法度須𨹔羅應度者皆已度訖已上言𡧘默者舉能化主梵言牟𡰱此翻𡧘默故唯識十云大覺世尊成就無上𡧘默法故名大牟𡰱此牟尼尊得二果永離二障亦名法身疏云成就無上𡧘默法者梵言牟𡰱此言𡧘默法者離言法也或離過故名為𡧘默已上牟尼是惣成𡧘默法通諸佛故摽惣顯別故云𡧘默彼經惣別並摽故言釋迦牟𡰱釋迦是別限我主故牟𡰱是惣通諸佛故遺教經論云惣相者如經牟𡰱故別相者如經釋迦故惣別相者佛故是中釋迦者示現化衆生巧便故復𡧘姓尊貴故牟尼一切諸佛㓛德故已上或復𡧘默只顯無非摽化主如云無言堪然宴坐者捐不時謂佛坐樹下成菩提後觀於化衆生性欲深著五欲盲無見若佛乘不能信受破法不信定墜三途寧不法疾入𣵀槃如是思惟經三七日故法華云我始坐道場觀樹亦經行於三七日中思惟如是事乃至廣是名為無言宴坐時若依十二遊經佛成道苐三年始度五人苐四年化大迦及三兄弟第五年化目連身子已上准此者無言時莭似經多年是皆小機見次苐非閞大機如斯無言終不法佛出何為誰得解然佛尋念過去諸佛行方便設三乘法度人天衆即應尓時𤘽鄰始得法眼淨益乃至最㣪須𨹔羅證得羅漢舉初後益顯一代故唯摽二人明知名辭即有詮表異俗𭑭談食不飽𤘽鄰比丘初得道者𣵀槃經十四云為陳如初始法名轉法輪乃八万諸天得須𨹔洹果智論六十五云初轉法輪八万諸天得無生忍陳如得初果已上陳如比丘亦名𤘽鄰大長經作𤘽輪毗耶娑問經號阿若居鄰蓋是梵音不同而已玄贊經云六人曾供養佛五八取稻華供養一人待𤎼五人初悟一人在㣪即須陀羅五人中陳如得初果四人在善根至復初方得已上須𨹔羅最後益者𣵀槃四十云佛告阿難是娑羅林外有一梵士名須陀其年老已百二十雖得五通末捨𢢔獲得非想非想定生一切智起𣵀槃相汝可往彼語須言如來出世如優曇華於今中夜當般𣵀槃若有作可及時作莫於後日而生悔心阿難汝之彼定信受何以故汝曾往昔五百世中作須𨹔子其人愛心習猶未𥁞以是因緣信受汝言尓時阿難受佛勑已往須作如是言云云須言善哉阿難我今當往至如來尓時阿難與須陀還至佛廣乃至是法時須𨹔羅得阿羅漢果已上次並成二義中唯能殊不可談食得飽者如來一代不由故能會實理永異法句不可談貪得飽也故佛地論云以淨法界離名言故一切名言皆用分別起為境然諸教法亦不唐捐是證法界展轉因故如見字𦘕義已上金般若論云隨順者隨順證智法彼法應取如人未到彼岸取筏故已上因言會理故捐月之𫤭者楞伽七云如癡見捐月觀指不觀月計著名字者不見我真實智論九云如人以指月以示惑者視捐而不視月人語之言我月令汝知之汝何者指而不視月此如是語為義指語非義也釋依義不依語文名字性空故捨船之喻作者金般若經云汝比丘知我法如笩喻者法尚應捨何非法同論云修多羅法中證智不住故以得證智捨法故如到彼岸捨船故已上苐二許名字空會法句經中即有其三初佛以愚夫報著者正明彼經名字空由謂愚迷執名不離躰故聞讃我起愛起喜若聞我生憎生憂火宅之𦦨愛河之昏波更莫不先𭑭執名相佛為之名字性空故法句云若名字空者於諸呰誹譏及以讃譽不應嗔恚何以故誹謗呰及以讃譽二俱空故次縱令讃者明讃名字不屬其身謂若讃無榮於汝身亦無辱於汝身喻如食不飽談火不燒故經云不由他人語令汝成劫賊亦不曲他人語令汝得羅漢即其義也三故知名字下結成故知俗中讃名字性本無而不屬法𭂫夫迷執浪起愛憎諍名於朝沇身於渕喻如尋影入水求釰船矣苐三別明名有詮證成稱名往生中亦即有三初預舉喻令知名詮謂火來命男至如是一呼𠮦應詮如筌蹄喻故知名字不空必得詮筌蹄名𩵋㝹詮筌流捕𩵋器蹄尋跡㝹具周易云蹄者以存㝹得㝹而𭜎蹄筌者以存𩵋得𩵋而𭜎筌則知言教以表義未得義者寧拂言乎故宗鏡録云若不假立言詮無以蕩其情執因得月不無方便之門獲兔𭜎自合天真之道已上次故使梵王下正明聖會詮梵王唘請轉正法輪者惣明梵請言辭能起聖妙應十方梵王請轉法輪出於華嚴又大集經云如來能知善方便故初得菩提點然而住無宣待梵王請尓時尸棄梵王六万八千諸天人來至我頭面作禮合掌而言唯願如來為諸衆生轉正法輪法華經云尓時諸梵王及諸天常釋并餘諸天衆請我轉法輪問佛自可何待人請答感應道理容待扣故如勝云即生此念時佛於空中現佛法甚深不可輒尓故如法華云止不須我法妙難思請尚難許何獨能請之人可生福故金光明經云請佛轉法輪能謗十二部經罪三藏奧肯煥爛於龍宮者別明後教法流布謂過去七佛遺教結集三藏𢘻在龍宮故胎經四云彼宮中有七寶諸佛諸法深藏別七寶函滿中佛經嘉祥淨名玄論龍樹𫝊云華嚴凡有三本大本有三千大千世界塵偈一四天下塵品中本有四十九百八千八百偈一千二百品此二本並有龍宮龍樹不誦出也唯誦下本十万偈三十六品此唯有三万六千偈三十四品故知華嚴名數在後分矣菩提流支云佛滅度以六百年龍樹從海宮持出已上探玄記云華嚴經有六本一恆本於一毛端處念中以塵數身𥁞未來際常無有𠇲息此非可結集亦非下位受持二大本以須𣃥山聚筆四大海水黑下書一品不可窮𥁞如是品過塵數諸大菩薩以陀羅𡰱力所受持也已上二本非結集本三上本結集中之上本也有十三千大千世界塵數頌四天下塵數品四中本有四十九万八千八百偈一千二百品已上二本並祕在龍宮非𨵻浮人之受持故此不傳五下本有十万頌三十八品天竺𫝊也六略本六十卷本是也十万頌中前三万六千頌要略出也此土𫝊也華嚴兩本既在龍宮餘經亦在言煥爛者分明義也玉篇云煥呼切明盛也切韻云爛郎肝切又明也今舉龍宮影顯餘處十二部經照彰於鷲嶺者別明在世教滋盛亦舉鷲嶺影顯餘處人天𭂫聖咸稟至言者顯示在世衆生親稟佛言教至猶也言之佛語最故五道四生並遵遺訓者顯示後衆生遠遵佛遺法麗象光朗吐梵音之昔言廣被導𭇥類於十地金容影晦殘真文之今遺訓逈宣群生於三途誠知現常之益化之利偏假名辭也三聼聞讀誦已下正明讀經念佛㓛不唐是故應知名字有詮也本瑜伽師地至有何意也是苐五問上來䉼蕳有相往生訖自下會諸論許凡夫得生瑜伽師地論云三地菩薩方生淨土者七十九云復有二種一者清淨二者不清淨於清淨世界中無那落迦傍生餓鬼可得亦無欲界色無色界亦無苦受可得純菩薩僧於中止住是故名清淨世界已入苐三地菩薩由願自在力故於彼受生無有異生及非異生聲聞獨覺若異生菩薩得生於彼問若無異生菩薩及非異生聲聞獨覺得生彼者何因緣故菩薩教中作如是菩薩意願于彼如是一切皆當往生答為化懈怠種類未集善根化衆生故密意作如是以者何彼由如是勸勵時便捨懈怠於善法中勤修加行從此漸堪於彼生當得法性應知是名此中密意已上准此者地前凡夫不可生淨也本諸經論文至離鄣而答苐五問文有三意初惣明淨土不同得生亦異二亦如下至即得往生別明諸經淨土非一准而會難瑜伽論三故知下結成初文可了苐二別明中即有其五一依仁王明唯佛居名淨土初地已上六七二識雖成無漏感見淨土而因位間本識未轉其變土猶有漏故三賢十聖居淨土名果報土不名實淨以苐八識果報識故變之土名果報土遙異天台實報土名果報之土彼苐八識事因業果名異𤎼識亦名果報五趣四生彼識為躰故名果報識具如苐一記若至佛果本識已轉以與圎鏡智相應故彼變土唯名淨土問唯佛一人居名淨土者因位居皆可名穢土耶答有漏變名穢土故因位本識變𠛴土猶名穢土此有何失問𠰥尓何故十地之中有漏六七變亦名淨土答淨穢相對於事不定今唯佛變名淨土故其餘因分本識變不名淨土既不名淨非穢者何本業經云佛子土名一切賢聖居之處是故一切衆主賢聖各自居果報之土若凡夫衆生住五隂中為正報之土山林大地共有名依報之土初地聖人亦有二土一實智土前智住後智為土變化淨穢經劫數量應現之土乃至無垢地土亦復如是一切衆生乃至無垢地𥁞非淨土住果報故唯佛居中道苐一法性之土已上此經同於仁王一切衆生及無垢地𥁞非淨土住果報故明望佛土有漏本識變國土皆名穢土𭂫准今論淨穢相對即有四雙八隻一因果對謂果位居為淨土圎鏡智現無漏土故因位居名為穢土報識變有漏土故二自在不自在對謂苐三地居名為淨土除無漏定鄣得定自在故二地已前即為穢土未得無漏定自在故三證未證對謂初地已上名淨土證人法空得無漏故地前名穢未得真如是有漏故四自他力對謂𭂫夫依佛願力生名淨土自回六趣名為穢土又元曉師論淨不淨有其四對一因果對同今苐一二一向不一向對謂八地已上一向出三界故七地已還亦淨不淨言亦淨者若受願力出三界故亦不淨者依故意力故起生死心生三界故三純雜對謂歡喜已上名淨土純菩薩故三賢已前居不淨𭂫夫二乘即雜居故同今苐三四正定非正定對唯正定聚居為淨三聚衆生居名穢土同今苐四今論闕一向淨穢彼師自在淨穢以義推之㸦有其意若為合論成五番耳二依瑜伽明三地菩薩生淨土中若𥾸行戒修者戒修三如次初二三地行之今修為要或𥾸已行三法皆得唯識論九云初二三地行戒修相同世間四地修得菩提分法方名出世疏云初地行二地行戒三地行修相同世間有情多作三福業事故未能修得菩提分法今四地修得菩提分法方名出世離無漏定障者能離無漏定障苐三地始滿故唯識論九明十重障中苐三地障云三暗鈍障謂知障中俱生一分令聞思修法忘失彼障三地勝定惣持及彼殊勝三惠入三地時便能永斷又論云三發光地成就勝定大法惣持能發無邊妙惠光故疏云此地中成勝定謂三摩地𨹔羅𡰱此名惣持惣持有四一法二義三咒四能得忍此地治遲鈍性於三惠有忘失障今此地無𭜎彼法名大法之惣持法謂教法殊勝之教名為大法此定及惣持為因能發無邊妙惠光故惣持以念惠為性謂以聞思修三惠照了大乘法故因得定斷障聞思轉勝非由定力親能起已上問十地配十度禪定苐五地何故𥾸戒修苐三地修定答述記云問若苐五地修定度者何故三地名為發光定答障三地除成𤎼至五地已上無漏定障苐三地除其定成𤎼至苐五地究竟圎滿是故苐三地始得定自在故十方淨土隨願往生瑜伽論意據此義故言苐三地菩薩方生非尓前菩薩得生問何以得知瑜伽論言苐三地者是發光地彼論立七地十三住七地苐三淨勝意樂即歡喜地若尓誰知苐三地者是歡喜地何初地見淨土者仁王瓔珞佛地攝論諸經論同許也瑜伽亦尓何發光地由斯元曉無量壽經宗要云此苐三地是歡喜地以就七種地門苐三淨勝意樂地故已上浮丘集云苐三地者七地門中苐三地也謂種姓地為一勝行地為二淨勝意樂地即是初地為苐三地此釋甚應道理答論文意泛非一愚膚是非不可輒之先出異釋如元曉𥾸七地門判苐三地如上難又燈六云對法苐六深密經瑜伽七十九皆惣相如瑜伽七十九淨土或三地菩薩往生十地亦在其中周記釋云燈或三地至亦在其中者八九十地名為三地既是三地處於淨土以苐十亦在其中即苐十地在淨土中已上溜州之意苐八地證相土自在依真如現土自在名願自在故後三地中苐三地名入苐三當苐十地又景法師云約相三地得定依定修觀方得往生故作是遁倫記泰釋云理實而言初地二地菩薩亦得生彼今據淨土無欲三地已上離欲菩薩生於彼故但三地生於彼土已上此尺中景法師准今論意且述此義深本論以論云由願自在故於彼受生願自在生可依勝定歡喜地位雖亦往生得定力相未增上更不可云由願自在即生淨土戒修三初二地中雖亦修習而隨相增一地修一故定自在義在三地三地言源出𭰹密七地建立遙起瑜伽故佛地論苐一云𭰹密三地已上乃得生故已上而彼經中但十地不明七地何云七地門中苐三准深密經瑜伽三地應是十地中苐三地故佛地論疏云就實而言初地已上皆生淨土然深密三地已上乃得生者以淨土之色依定而生隨相而論三地已上方得靜慮證於定境而得生故已上若存此義難㔟消𥁞智者可知瑜伽七地者一種姓地未發心位姓者類也未入僧三乘種類具故云種姓位也二勝行地資糧加行位也資糧者十信十住十行十回向加行者十回向後有暖四善根位也三淨勝意樂地初歡喜地也四行正行地自二地至七地五定地苐八地也六定行地苐九地也七到究竟地苐十地佛果也十三住者一種性住二勝行住三喜住初地四增上戒住二也五增上住三地六覺分相應增上惠住四地七諸諦相應增上惠住五地八緣起流轉止息相應增上惠住六地九無相有㓛用住七地十無相無㓛用住八地十一無㝵住九地十二最上成滿住十地十三最如來住佛地三依諸經論通明初地菩薩生淨土中若以得無分別智者顯示能斷緣真如智名無分別謂彼智自勝妙便能會緣真如離計度五種相故疏攝論云離五種相以為無分別智性一離無作意𤎼眠醉非彼智故二離有尋伺地苐二定以上非故三離想受𡧘靜故即智不成定無心故四離如色自性便非是智大種故五離於真義異計度故計度是有分別非無分別故栖復抄云無分別智有二義一離能取取相名無分別二真如理是無分別智證此理名無分智初證之時不見能證證言語道斷心行處心與境理與智會境如智如境名為如名無分別已上前無分別即智持業釋也後無分別之智依主尺也問無分別名唯𡱈根本智耶答不尓通三謂唯識云惠學有三一加行無分別惠二根本無分別惠三㣪得無分別惠已上三智雖異皆緣真如故疏尺三智緣云言緣者彼頌言諸菩薩緣不可言法性即真如是遍計執法皆不可言不可言性謂二無我顯真如是即無分別智緣也即是三種無分別智緣也已上明無分別智名緣如絇單重根本智亦有其三種唯識九云般若有三種謂生空無分別惠法空無分別惠俱空無分別惠已上人法二犱見道煩𢙉者顯示斷二執具如苐一卷記見道煩𢙉蕳修道斷俱生惑此乃見道斷分別二執起名見道煩𢙉也證得遍滿者顯示證遍滿法界如苐一記百法明門者本業經上初地云三觀現前常修其心入百法明門謂十信一信有十為百法明門又同下云謂十信心是一切行本是故十信心中一信心有十品信心為百法明門復從是百法明心中一心有百心故為千法明門復從是千法明心中一心有千心為万法明門如是增進至無量明轉勝進上法故為明法門百万阿僧㓛德一切行𥁞入此明門已上又心百法名百明門謂百法論云心法有八心有法有五十一色法有十一不相應行法二十四種無為法有六是為百法名義具如彼論故對法抄中菩薩地五位百法為明門矣又一念百種法門名百法門此三義俱載九品義得生諸佛淨土者顯示其答謂智能斷惑證顯真理故得生佛前也四依淨土經明凡夫往生中若以本願大悲者顯示能他力一切凡愚者顯示機緣此則廣攝九品人故略言乃至大石乘舟樴則渡於雲濤漫小蠅附驥尾則凌於宇宙眇誰言是石蠅之㔟乎𭂫夫往生亦復如是妙也神也不可不歸但菩提心𢘻得往生者明其行成得益謂菩提心是成行心若具此心無行不成此心特要故云但行若成就往益定故云𢘻得問准觀經意菩提心是上輩具何泛論九品行成答九品𢘻具菩提心不諸師異非適于今若和尚意下六品唯福分往生如鸞綽許九品皆具菩提心𢘻得往生今同鸞綽此論始終明九品皆具此心故經不者上輩之令流諸品例如三心又大經三輩𢘻具菩提心觀經九品豈不然耶五正會難中不可直依瑜伽論者明不可偏依瑜伽論於諸謂楞伽初地龍樹往生樂仁王經明初地菩薩見百佛土又華嚴宣初發心𭂫夫菩薩願生淨土故初二地并地前人𢘻得生淨何直執一即背諸乎楞伽記龍樹者彼經九云於南天國中有大德比丘名龍樹菩薩能破有無見為人我乘大乘無上法證得歡喜地往生安樂國仁王明初地見者彼經云從一地乃至㣪一地自行處本業清淨化衆生位有十一地及佛行處一切知見故本業者若菩薩住百佛國中作𨵻浮四天王修百法門二諦平心化一切衆生又瓔珞云歡喜地百寶瓔珞七寶相輪四天王一萬子為眷屬現百法身入百佛土化十方天下全同仁王問瓔珞經次上文云現百法身入十方佛土作五神通入如幻三昧現作佛土無量㓛德不受三界𭂫夫時果已上入十方佛土者似不限百佛土如何相耶答言十方者語其方𫭫言百佛者辨其貟數故前後文不成相或百佛者絇於恆時入十方者就於別時初地菩薩若依別緣若作意時應入十方諸淨土化群生故十地經云得見百佛能入世界教化百佛世界衆生是明恆時見百佛土又經云以神通力大願力故見多百佛乃至見多百千億那由他佛是明別時見諸佛身也但天台云依於教門百佛土論其實義不可思議非相宗意華嚴經𭂫夫往生者彼經云願我臨欲命終時𥁞除一切諸障㝵面見彼佛阿𣃥𨹔即得往生安樂國問是普賢願何足為𭂫夫往生證答寄能化普賢顯化往生改願我字為人名者往生之益通一切故澄觀疏云應改於願我二字為是人字則無惑矣今且依文則可知不生華藏而生樂略有四意一有緣故二欲使歸憑情一故三不離華藏故四即本師故同記云不生華藏下言略有四意一𣃥陀願重偏接娑婆界人二若聞十方皆妙此彼融通初心忙忙者無依託故方便之三樂去此有但十萬億佛土華藏中有佛𠛴皆塵數故不離也四即此苐三十九偈讃品云或有見佛無量壽觀自在共圍繞乃至賢首如來阿閦釋迦彼並云讃本尊那之德已上又彼經云念佛三昧必見佛命終之後生佛前見彼臨終勸念佛又示尊像令瞻敬此諸文即是𭂫夫往生相也苐三故知下結也本攝大乘論至論相也是苐六問攝大乘論對法論有四意趣四祕密者後魏佛𨹔扇多攝大乘論上云然有四種意趣故及有四種密語漸次一切佛語隨順釋應知陳真諦攝論名四意四依隋達摩笈多論號四意四合義唐玄奘二論同稱四種意趣四種祕密言雖少異意頗不別問四意四祕差別如何答陳釋論云如來心先緣此事後為他故名為意由此因衆生定入正定聚名此因為依隋論云意與義異相者若世尊心有在而者為意由決定令入佛教中者名義唐無性釋論云遠觀於他欲作攝受名為意趣近觀於他欲令悟入名祕密同世親釋論云意趣祕密有差別者謂佛世尊先緣此事後為他是名意趣由此定令入聖教是名祕密已上𭂫佛一切正法不出四意及四祕密此二之四由三性故能可了若離三性無別道理亦了之先四意趣者以斯四種了如來祕密言教令生開悟故對法云由此意趣故方廣中一切如來有祕密應隨了已上此四皆以如來後智以為躰性由緣一切差別義理為利衆生安立教故謂能化者遠方便中先觀於彼化之人冝以何法而攝受之名為意趣攝釋云先後別思量名意趣謂理趣思量理趣故名意趣有戝尺也趣謂其境意是相應智用此二以得名故已上魏論上云一法同意趣謂我是無量無邊時號毗婆尸正真正覺陳隋二論同名平意玄奘兩論及對法論㽵嚴論中俱稱平意趣謂過去毗婆尸與今釋迦牟𡰱實是別佛而經中我於彼時名勝觀是依法法平二一通平二佛法身無差別故二別平由資糧䒭因果㓛德㸦相似故此中為意趣故名平意趣攝釋楞伽云大惠菩薩白佛言何故世尊言我是過去一切諸佛言以四故一字平過去及我同名佛故二語平謂三世佛皆有六十四種義妙梵音言語法我亦同彼三身平我及諸佛法身色身相好㽵嚴無異無別四法平我及諸佛皆得三十七菩提分十力無畏諸㓛德故依此四種唱言我是𭷖留𭮑又云問本以意趣諸祕密如言彼佛即是我身有何祕密復如何決答勝觀釋迦本非一躰經言彼佛即我身道理有乖故云祕密談佛意趣據平理言彼是我以會相餘三准此已上魏論云二者時莭意趣謂若稱多寶如來名者即定於阿耨多羅三𦴭三菩提如無量壽經若有衆生願取無量壽世界即生尓陳隋二論同名別時意唐論對法俱稱別時意趣謂念多寶得菩提果實在異時而經中若人稱念多寶佛名即時逮得阿耨菩提是佛意為令懶墮善勝進上品㓛德故也不由唯誦佛世尊名即得佛果此意長養先時善根如有言由一金錢得千金錢豈於一日營覓得千必由別時此一金錢遠為千因故作此誦持佛名亦復如是一稱名因遠為不退於菩提因佛意實期異時言與意時分異故名別時意故攝釋云言雖此意在他時言與意時分有異為別時故無性釋云謂觀懈怠不能於法精勤學者故是言若誦多寶如來名者便得決定由唯發願便得往生𭫸樂世界此意長養先時善根如世間但由一錢而得於千意云最初一錢是彼後時得千之因一因中千之果法亦如是又云問持名願往何祕密耶答持名發願皆是其因後時方得定菩提往生淨土經依今因於當果言持名即是定往生安樂故名祕密已上魏論云三義中間意趣如經供養若千如許恆沙供養親近已得大乘義尓陳隋二論同名別義意論對法論俱稱別義意趣謂以證相寄教相證相者地上菩薩證得大乘實理之義教相者十信𭂫夫聞法思惟了大乘教之義生證義難應事諸佛能得成就教相義非必是難而經中大乘義㓛由逢事恆沙諸佛言雖似指教相中義意於證義言事多佛方能義言與意義有不同名別義意故攝釋云雖談此義意至別義言與意義有不同名別義意故攝論云若已逢事尓殑伽河沙佛於大乘法方義無性釋云謂證相大乘法義與教相大乘法義甚有差別由此故言於河沙佛方能義意云義有二一證理之時名為義即證相大乘在初地已上菩薩證二聼法聞思之時亦名義即教相大乘在十信前𭂫夫聞聖𭂫階位而有不同故言差別問言逢多佛方能義何祕密耶若據教中義實非難言逢多佛方能悟豈非祕密故以別義意趣通之佛雖於教相中義本意在彼證之義故事多佛方能之故𣵀槃經云初依菩薩供五恆佛方十六分之少分已上魏論云四順衆生心意趣謂或有衆生讃行布後者復謗如是布如是持戒及餘者修事陳名衆生樂欲隋稱隨人心意唐二論同號補特伽羅意樂意趣謂為有人如來先讃布㓛德後時為此人之如斯佛意隨人得成何以故若人於戝有慳𢗞心為除之先讃布若人已欲樂行布即是下品善故如來後時更呰便令渴𠈟其餘勝行若迷此意一法讃則成相布既尓戒亦然是有漏修故可呰若無漏修則無義故攝釋云雖於一法讃不同為對化意樂故尓名衆生意趣故攝論云謂如為一補特伽羅先讃布後還呰如於布尸羅亦尓無性釋云先為慳貪讃嘆布後為樂戒呰布為欲令𢔜勝品善故讃戒准可知問此教何名祕密答於一中讃復而豈非是自語相故是祕密觀化器意樂不同對彼而不相已上佛設四意攝釋有文如對治祕密中前四次四祕密者魏論上云四種密語漸次一者勸發漸次或聲聞乘或大乘中衆生法性勝故順世諦現陳名令入依隋號令入義唐二論同稱令入祕密謂大小乘依世諦理補特伽羅及一切法自性差別為令悟入世俗諦理如聲聞乘中有諸有情如大乘中為化怖斷諸有情故心常令人悟入世俗諦理故名令入玄贊九云一令入祕密謂為聲聞色有為令無怖漸入聖教非一切有已上魏論云二者相漸次隨諸法相中示現陳號相依隨名相義唐二論同稱相祕密謂於宣諸法相必三性此三自性諸法㧾相若欲了別一切法相須三相故名相祕密玄贊九云二相祕密謂依三自性一切法皆無自性無生破犱有相之為無非一切無已上魏論云三者對治漸次八万四千衆生行陳名對治依隋名對治義唐二論同稱對治祕密謂為對治衆生貪種差別能治道八万四千如斯安立衆生對治煩處故名對治祕密㽵嚴論中治八種障謂彼頌云輊佛及輊法懈怠少喜足貪行及𢢔行悔行不定性攝釋四云按㽵嚴論略而言之一除輊佛障者謂有情見於如來始生王宮道樹成佛薀道時近疑無種智生輊𦸑想為治此人故大乘經往昔毗婆尸佛即我身是絇平意故作斯二除輊法障者謂有衆生披於尺典文淺義非不生遂於佛教生鄙淺心輊而𦸑之為對治此故大乘於無量恆沙佛修大乘行乃能生言生者生證也依別義意故作此三除懈怠障者謂有情雖令發心謂行難修而生懈怠不肯進習為對此人故大乘願生安樂及稱無垢月光佛名決定當得據別時意作斯也四除於少喜障者謂有情已修少行謂有得便生足想更不進趣為治此人故大乘中於一善根或讃或冀令衆生不執一法生喜足心令遍修善依意樂意故作斯五除貪行障者謂有情貪此穢土五塵境界而不修習勝妙之因為治斯執故大乘諸佛國界妙樂事而令求趣六除慢行障者謂有情待己高貴見佛居穢𠛴身命俱短及諸下事便輊𢢔之為治斯過故大乘身命修長國界嚴麗諸德圎明無有可𢙣七除悔行障者謂有情輊佛法僧恆生追悔為修善敬崇事障修勝善故大乘於佛菩薩起不饒益事得生善道修善乎修勝善八除不定障如疏可知已上疏云令捨聲聞下劣意樂記大聲聞當得作佛又一乘更無苐二已上又攝釋云問八障中前四意趣云何得言對治祕密之治耶答意趣別分四祕密中但苐三攝開合異也若尓意趣祕密何殊答有二尺一云意趣絇彼能者意趣祕密據彼難二云謂能化者遠方便中先須觀他化根器宜以何法而攝受之故名意趣又親對機善巧方便法開悟名為祕密良由如來意趣善巧有方便故依祕密義對彼根冝有益便故設教皆名祕密意趣是能祕密是遠觀根性近設方便依祕密義趣祕密教故二別也議曰廣略不同大意無別已上魏論云四者發願漸次隨異義言音聲字義餘隨有偈陳名翻依隨翻義唐二論同稱轉變祕密謂別義言字轉顯別故如無性論有頌言覺不堅為堅善住於㒹倒煩𢙉𢙉得最上菩提論自尺曰覺不堅為堅者強流散名為堅非此堅故名不堅即是調無散亂定即於此中起堅固惠覺彼為堅善住於㒹倒者謂於四㒹倒善能安住知是㒹倒決定無動煩𢙉𢙉者為化有情精進劬勞疲𠉮故如有頌言處生死久𢙉但由於大悲如是得最上菩提者是得諸佛三菩提義已上若取此偈明了文則成相覺定為散住於㒹倒不可有得菩提義故若祕密義即正相翻明義即應理故又神𬇦師云若依隱密義尺頌即四如意足偈初句四念住二句四正勤三句能得最上菩提若依顯了義尺即是散亂㒹倒懈怠故不能得菩提已上對法苐七雜集十六廣引諸經述轉變相恐繁不敘問何故煩設此轉變梁釋論云欲令衆生依理文以理為依不應依文故此偈或有人𢢔輊懱者自不能如理義欲破彼𢢔心故此偈是名翻依已上自攝論至此百有餘年者後魏有一十五帝王其間寒暑百六十回當苐十代前帝恭王普泰元年辛亥佛𨹔扇崛多始出攝大乘論本三卷其後至亍唐高宗代已𨒬百四十七年謂後魏更有十三年後問有二十二年隋三十七年唐高祖九年大宗二十三年高宗三十四年而高宗御苐二十年永隆二年辛巳導和尚入今論師是導面受故當一百二十餘年故云百有餘年又佛陀譯後歷二十一年保定三年關未陳真諦同譯攝大乘設依此譯猶以可謂百有餘年餘文可知本攝論言唯至無益也答苐六問文有三意初至別時之意正明本論別時唯願非念佛二有釋下至別時之意舉通論家計三今此下廣破異計顯十六觀念佛法非別時意苐一正明別時意中攝論言者先本論明通論諸師以此文證言一切不生今詳此文下正明論意謂梁論云復有言由唯發願於安樂佛土得往彼受生隋論云又如經唯願得生樂世界唐論云又如言由唯發願便得往生樂世界異譯諸論𢘻云唯願唯言標是蕳持義謂蕳去行持取其願也更無有行唯孤有願故曰唯願若唯願而得生者是別時意即非發願時命終生於淨土故今時念佛者顯示下品下生念佛三業相應行願相扶非是唯願故神泰攝論疏云由唯發願不修其行便得往生樂世界乃至廣若依觀經會此文者由唯發願得往生彼是別時意若十念成就即是行故非別時也已上意業善行者彼下輩人臨命終時隨知識教起往生心是其意業口稱南無正是語業合十指於佛前抂一躬於西方乃至動舌直向面𢘻是身業非如五種正行各別起禮拜得以知者經云聲故彼迫苦其身羸劣不能起禮既𭁆念故不可觀察故只口稱上三業相此文全同京師大師親緣之釋而有人云彼釋各別舉三業行若執彼義今文如何若言是述下品稱名故稱念上三業相應彼釋惣明𣃥𨹔攝取故非一行上三業相者辨增上緣云衆生稱念次三經云專念名號至下結文云念佛三昧明知三緣皆是稱名更不可今述下品下生稱名若亦言彼導師尺各別三業今感師非各別行師資意樂不儡同者不出前難二師同釋念佛三昧豈非俱是稱名之上三業相應有二師自異者應云相文義既同更無別由何強曰無其異同論𢪱差別論藏破也論主此者預示惑者不細文義謂諸論明成佛別時或云唯誦佛名或云稱佛名是顯示非稱名一行直得菩提若念佛往生別時論文何因如前別時不言唯稱佛名生西方者是別時既以不言念𣃥𨹔佛及修三福是別時教故知念佛即得往生非別時也諸論明往生別時必言唯願蕳行明矣何同成佛別時即云唯稱蕳去餘行持取念佛者惑者矇朧不細論文豈非誤甚苐二舉論家計中即有二師解初師意用三福妙觀𢘻屬發願以為別時推此計意𭂫夫起行不可生淨故猶屬願云唯發願次師意者別下品十聲稱佛特攝發願合以為別時謂論師直雖舉願言意亦取其念佛之行下品十念其㓛少故猶屬願也苐三今此下廣破中即有二一初至何斯也㧾破二計二如俱舍下別破二計惣破中二先審次破文相可見別破中破初師次又下破次師初文中如俱舍者例而示觀經文不可諍初一字者俱舍論苐十四云若諸近事皆具律儀何緣世尊言有四種一能學一分二能學小分三能學多分四能學滿分已上此經部難謂有部意𭣦五戒皆悉受得方名近事若不受一不得此名故經部難言諸近事皆具律儀何緣世尊於五戒中言有四種塢婆素迦一能學一分謂學一戒二能學小分謂學二戒三能學多分謂學三戒四戒四能學滿分謂學五戒言學者受一戒乃至受五戒若尓何必具足五戒名為近事論述有部答言謂能持故作是能持先受故能學言不尓應言受一分理實絇受具律儀以具律儀故名近事已上此有部通經學之言謂絇能持故四種先雖具受五支律儀而後遇緣便生𡙇於其五中或有能持一分或持五支故作是能持先受故能學言若不尓者此經亦應言受分何故乃言學一分故此四種但據能持理實而言絇受三歸具五戒以具五戒故名近事私訓釋依光記此則就學一字兩部諍義也次兩字者同論苐八云何故經一類有情於無間業作及增長己無間必定生那落迦已上此大衆部難中有造五𨒫已既言無間生那落迦明無中有若有中有應成有間論主通云此經意彼往異趣及顯彼業定順生受若但執文應要具五方生地獄非隨闕一或餘業因便成太過又言無間生那落迦應作即生不待身壞或誰不許中有是生那落迦名亦通中有死有無間中有起時亦得名生方便故經言無間生那落迦不言尓時即是生有已上此會無間兩字而通此意謂經言無間定墮地獄異趣間及顯順生無餘生間若但執文定無中有應要具五方生地獄非五𨒫中隨闕一罪方生地獄亦應唯此五無間業能生地獄非余業因能生地獄若不生者犱者之言便成太過又言無間生那落迦應作業已苐二𠛴那即生地獄不待身壞然有造無間業或經十年方生地獄異之即生名言無間生那落迦或生之名亦通中有生方便故亦名那落迦此名不可樂地獄中有亦不可樂故經言無間生那落迦不言尓時即是生有何相如是大小論藏據一兩字𪞚義得失不能廣述乃觀經者正明經行文顯然不可𭑭混言𢘻願謂觀經𬾨陳行門或述三種散善為淨業正因又云汝行大乘行此行者或十六定善為西方淨業又云行者聞行人之如何惣將為發願文二又以下破次師文舉八由一惣依三經及餘經明本論師更不可以念佛為別時謂論師立四意四依尺諸經其文難愚者可迷尺幽義令愚亦知然如觀無量壽念佛往生文義顯然愚智皆文者即是諸經諸文義者他力本願令𭂫夫生何不了須於論尺會屬別時問此義不明誰能得許文義顯然如彼稱多寶佛不退菩提文義顯然無有不了雖然一行至不退者無其理故論家為別時意趣念佛往生亦復如是往生道理經雖明𭂫夫生淨實無義故亦為別時有何妨答至於菩提决定不退㓛由菩薩万劫行然念多寶佛之一行即至彼者其義不應故論家搜是別時意往生不尓依報易故若人至心信佛願力以佛威故設雖𭂫夫而生淨土處故此義分明論師何作別時之二法藏比丘者此下三由別據經今先依大經本願文諸佛本願皆是了義無𭇥密意將別時意而發其願耶彼本願中即言念佛不得往生不取正覺不言唯願人不生者不取正覺故知念佛者並結念佛在本願中故非別時唯願不在本願故是別時問如今文者許念佛者皆本願行答未必然也念佛餘行俱可生故明念佛往生義之次兼餘行顯其往生非言同在本願中也或復十九二十願中舉於諸行以為來迎果遂由雖非生因而彼諸行既入在四十八願中定非別時故取矣三稱讃淨土經者謂佛有了不了義然諸佛𡸁其證誠者為令化知是了義而非不了三周證明四佛誠言即其義也何諸佛舒舌證誠特在今經豈將舌相證別時法現不誑之舌相者金仙論云從三大僧劫來不曾𭑭語故得廣長舌相已上躬不曲則其影亦直𮠪不誑因感實語果故曰不誑之舌相令衆生覩相聼言者經中不言此土衆生見佛舌相及聞彼言今推作尺謂吐舌相誠實言為令此機斷疑生信當機衆生若不見聞證誠何為理必然故須作此彼稱讃經及𣃥𨹔經略之也又要記云發起影向二衆見彼土舌相當機結緣隨冝不定已上乃謂別時之教者還明諸佛舒舌不可證誠別時教門謂往生教別時之意未往生後至初地往生淨土佛不可證如彼龍樹天親往生福惠勝妙堪入淨土故人不疑佛亦不證故知𭂫夫一形十念㓛德不多即生淨土衆生難信故舒舌證也四阿𨹔經者前願後宣行願具𠯁得生淨土非是別時五淨土論者此下三由別據論文今先依淨土論彼兩論同一師造寧容世親製淨土論即言念佛得生西方非別時意尺攝大乘乃曰念佛是別時非即得生阿毗達磨俱法相何淨土論帶別意趣大乘論偏述顯了如是兩人者重立理責如猶若也謂兩論若別人造容許論師意樂各別設兩師何必攝論得經㫖趣淨土論即迷其聖言二論共世親造文義故非以論求於人意者將攝大乘唯願屬別時與淨土論念佛往生推求世親論師之意言別時者應是唯願非念佛行問二論同一師造故不可相者道理不明彼唯識論與法華論俱天親造而法華論依法華意明一乘𣥜唯識論依深密意宣五性理依異能依亦別若尓誰知淨土經中明別時故須依經淨土論且明念佛即生阿毗達磨法相故須依經攝大乘直念佛別時答釋異部經設雖一師有相義強不例如天親釋大小經其義懸隔故唯論論與法華論一乘五乘宗且差攝大乘論雖釋阿毗達磨經攝大乘品而通斷一代相𭂫夫往生若別時意何憚言唯蕳去行耶莫謂兩論依異故能依亦別梁論回向偈云衆寶界如覺德業我句義生善因此願𢘻見𣃥𨹔由得淨眼成正覺全同淨土論回向偈明知天親居地前位願生樂加之四意趣者諸經散在而非直辨夫何經中一部唯明平意趣不餘事乃至唯衆生欲意不餘事然觀經唯𭂫夫往生淨土不間餘事若淨土經偏屬別時豈非是立偏傍一部別時之經即成大失
