body:
  text: 然以阿㫆陀佛殊勝本願增上緣力者正辨地前菩薩等依願力故得入報土凡本願者意不出三一攝淨土二攝佛身三攝衆生且其中攝衆生願者亦通𭂫聖謂本為𭂫兼及聖故今本願者𢝰指攝取地前菩薩及以聲聞凡夫諸願也此等諸衆識心劣故所變淨土不及地上諸大菩薩微細智心所變妙土然此佛有廣攝五乘願故各託其願為增上緣還能同地上菩薩見微妙莊嚴亦得見故名生報土故下經而釋成曰又如觀經第九觀云阿㫆陀佛真色身高六十万億那由他恆河沙由旬八万四千相好唯是他受用身佛非是地前所能觀見下文言然彼如來宿願力故有憶想者必得成就故知乘宿願力觀見受用之身亦乘宿願之力生受用土已上經言非是𭂫夫心力所及然彼如來宿願力故者述修定𭂫夫依願力故定觀成就能見佛義而論廣指攝地前之願明知五乘所託願者各攝𭂫夫二乘等諸願也和尚釋云由託佛願以作𭤽緣致使五乘齊入安樂集云㫆陀淨國位詼上下𭂫聖通往者今此無量壽國是其報淨土由佛願故乃詼通上下致令凡夫之善並得往生亦全此意問今家依託如來本願勝力和尚述正由託佛願以作𭤽緣道綽判由佛願故通上下所言願者唯是應名生因本願何云指廣攝五乘願以是義故若念佛者託十八念佛生因願行余定散託第十九二十諸行生因願故師資應釋依託佛願答推所難意應云非彼生因之願都不為所化增上緣若爾立生因外諸願有何詮要有願故知一諸願若是生因若不生因皆與行者為增上緣而可助成往生大益就中五乘所託本願生因願者四十八中何是人天生因之願何是二乘生因之願何是菩薩生因之願設雖許第十八十九二十三願即是人天生因願而二乘菩薩生因之願四十八中所不見也若言二乘菩薩之人更不別乘生因之願唯𢝰乘攝聲聞菩薩一諸願名託佛願何妨凡夫不亦別乘生因之願乘攝𭂫夫諸願故名託佛願若言二乘菩薩同乘第十八等三生因願而得往生其理不然四十八願意趣各異攝取下機攝取上機不可混亂然此三願諸師一同釋攝凡夫下機之願全不云攝聖人本願何况和尚觀念門中窮理問答定三箇願所攝之機但是𭂫夫而若言通攝聖人者近背和尚遠諸師既無所據誰敢信者况生因願獨限十八十九來迎二十果遂更非諸行直因本願何以凡夫所修定散及二乘等所修福智廣攝彼願進退徵難無有所遁故論注云問曰法藏菩薩本願及龍樹菩薩所讃皆似以彼國聲聞衆多為奇此有何義答曰聲聞以實際為證計不應更能生佛道根芽而佛以本願不可思議神力攝令生彼必當復以神力生其無上道心譬如鴆鳥入水魚蚌咸死犀角觸之死者皆活如此不應生而生所以可奇已上法藏本願者指十四願龍樹所讃者指十住論次上並計審他方二乘得生極樂由乘聲聞無數本願全所不言乘十九等而第十四聲聞本願唯願我土聲聞無數更以不論聲聞修因明知增上緣本願者非必限生因願也問義猶不明三賢菩薩雖未證得二空真如既是經一大阿僧雙修六度福智資糧為有緣生八相成道於諸佛土隨意往生二乘雖亦未證法空斷煩惱障得生空理分假生死今將捨非淨土者生何處耶是故此等大小聖人設雖不乘生因本願若只乘𢝰攝聖人願可得往生垢障𭂫夫智力尤𭋘福德極少若不乘於生因之願不可輒得往生報土依此意故託佛願之文隨應可得意所謂若約二乘菩薩不生因願名託佛願若約垢障淺識𭂫夫指生因願應名託願同名佛願所自異有何妨况三福善㓛用微劣佛若不為生因本願何得直為淨土生因答如本自通非生因願諸餘本願亦成強緣令諸衆生攝入淨土故定散人設雖不乘生因之願何不生淨土既有報法高妙淨土不嫌凡夫殊勝本願彼願何故不為𭂫夫勝增上緣攝入彼土例如聲聞無數本願報土不嫌聲聞願故攝於聲聞得入報土但至地前菩薩聲聞福智勝故不乘生因可得往生凡夫福力最微𭋘故不乘生因不可往生淨土難者不論他力須依福智勝劣階降而辨往生淨土不同今論他力何得言依機類差別彼乘不生因願往生此非生因不可往生是則偏自力執心不知本願增上極致之所致也所謂攝於菩薩聲聞願為彼機已成就故令彼機類攝入報土又攝𭂫夫願為此機已成就故令此機類攝入報土而何為聖人成就願其力強故即攝其機若為𭂫夫成就諸願力𭋘故不攝其機又為凡夫願未成就故不攝之雖已成就機品劣故不得攝若言未成故不攝凡夫者其理不然四十八願一成就願成就文尤揭焉故若言已成就其機劣故不攝之者既不攝機何言成就唯存機勝劣不𮨇願成不豈非天愛須詳此理諸佛願力非辭所覃大乘妙用𣥜趣難知唯𠈟而信莫致疑懷次託佛願文隨應得意似無所詮非生因願直獨為緣不生因願亦增上緣何強蕳別云攝聖願即不生因名託佛願攝凡夫願但是生因名託佛願今師和尚師資一同泛約攝機名託佛願非獨十八名託佛願何况師資論生因願唯限稱名未見自餘定散諸善名本願行次三福力𭋘若亦不立生因願者不可直為報土生因此難甚非善躰本是真善妙有上機修之尚成菩提一實觀智一大𭤩願能資助故况用回向亦成淨因由此隨願等經隨行者願万行皆生十方淨土今經中明三世諸佛淨業正因何處聖教定此善躰是劣故不願生因不可生淨次下文云有所得心通於三性善不善業咸能感報今三福等悉是善業寧容不感淨土之報而今云何唯以無所得而得往生有所得心不得生者出何經文既無聖典何所依憑已上行躰即是淨土正業此文分明心莫廢或人問曰諸行若非生因願者何生淨土毗沙門堂云㓛德故生也云云難者閇口去全與今意同故知三福善躰本妙不可嫌言非報土因若言善躰三世諸佛淨業正因不可嫌而凡夫少心修行之時難至報土佛已成就攝彼凡夫少心願故此亦非難非是凡夫心力所及然彼如來宿願力故大聖金言我等所貴誰致疑耶非本願行不須生淨近比學者思此事難如愚意者不足言難若嫌所修三福善躰即是三世諸佛淨業正因有何不足不生淨土𠰥嫌能修彼佛本願為增上緣攝𭂫夫故亦不可疑由此義故和尚難垢障凡夫云何得入答由託佛願以𭤽緣今師問云何地前𭂫夫得生釋依託如來本願勝力如是等釋雖約小機難入報土使致問答而未見三福行躰劣故言不須生十方淨土就中和尚所及餘師解尺中定判非本願行往生諸佛淨土諸佛既爾㫆陀亦然若言諸佛淨土之中雖非願行而得往生安養不爾非本願行不可往生此義不然無異因故問非生因願定散餘行亦託本願往生淨土獨稱本願㫆陀名號有何勝能又餘諸行非生因願乘攝𭂫夫願得往生別設生因願似無要况許非本願而言本願自語相豈得𥁞理又師資同釋諸行生因和尚述曰逢遇小緣授其小戒以佛願力易得往生豈非是戒善即本願又云直是㫆陀願重致使想者皆成誠知定善即本願故行成見佛此外往𭂫夫之人乘佛願往生淨土非生因願其義如何今師亦釋凡夫託願往生報土與和尚同答非生因願餘定散善亦雖託願得生淨土而彼行業成就極難非是生因本願行故唯乘𢝰攝凡夫願故念佛行法成就極易別是乘生因本願故亦乘攝𭂫夫願故念佛已假攝機攝行第十八願雖同攝機為蕳餘願不論行躰只名攝行云𢝰別二種增上緣力餘行唯乘𢝰攝機願更不乘別攝行本願於中乘二緣念佛其力𭤽例如彼云二道所得極堅窂故判七義勝特得生勝名分正助二業獨立正定稱𭾂是生因本願唯稱名故也加之灮明攝不攝化佛讃不讃諸佛證不證諸經勸不勸往生難不難付屬有無流通遠近此等皆是本願非願二行差別何無甲隱次諸行皆乘攝𭂫夫願設生因願無其詮者𢝰攝凡夫願雖亦攝機令生淨土而別立生因願者修生因行彼願𭤽故行躰速成菩薩為此故別設生因願行速成故万機皆悉易得往生其義先假自顯著矣但是別立生因願故㓛能殊勝若以餘行為本願時亦有勝能而別念佛立本願者選擇已設二義釋通私不可會次雖非本願而託本願深有其意趣豈自語相非本願者非生因願託本願者託攝𭂫願舉要言之若有人問行定散善凡夫託佛本願往生即答應言此義唯然若有人問定散之行皆本願行即答應言此義不然不得此意更致疑難何開義趣次出師資釋為諸行業生因願證此事不明豈非前言五乘往生皆託本願故釋託願所出解尺皆此意也授其小戒以佛願力等者若是為釋小戒即佛本願為釋凡夫託佛願生若言不釋小戒即是生因本願何為諸行本願之證若亦言釋小戒即是生因本願此文不然淨影師許中三品是三果聖人和尚破之非是三果唯是小根凡夫之人乃遇小緣僅受小戒乘攝凡夫願而得往生何云小乘三果聖人此但分別機品𭂫聖不論去行本願非願不可為諸行本願證定善義釋亦此意也由佛願故凡夫觀想成就見佛往生淨土如上消經宿願力故此外或云善𢙣凡夫得生者莫不皆乘阿㫆陀佛大願業力為增上緣或云或想或觀除罪障皆是㫆陀本願力等皆明攝機非論行躰今所責者如釋念佛行躰即是本願餘行亦有名本願行若無其釋言諸行亦生因本願只是人情不可信用黑谷何度見於託佛願等文而不憚彼定判諸行非是本願未學酙不可迷執書不盡語義趣難極見一端察万途今唯是付師資之釋述大旨也料蕳願文問答選釋略所不明云云增上緣力者問準俱舍等增上緣者能作因設雖有力無力別亦同踈緣不可為令凡生報土強勝緣力若爾何故名增上緣答小乘論所明增上緣如所難意是𭋘緣唯識論等明增上緣躰廣力強餘三緣中所不搹者皆屬此緣是故躰廣𢝰而言之四緣皆得增上緣故論云四增上緣謂若有法有勝㔟用能於餘法或順或雖前三緣亦是增上而今苐四除彼取餘為顯諸緣差別相故又云然增上用隨事雖多而勝顯者唯二十二應知即是二十二根已上二十二根增上緣躰故知此緣其力尤強生善𢙣趣以業力等名增上緣見異地遠境以定通力名增上緣𭂫夫生淨加佛願力名增上緣亦復可然是強勝緣因論生論四緣何等答因緣者唯識論七云一因緣謂有為法親辨自果此躰有二一種子二現行種子者謂本識中善染無記諸界地等㓛能差別能次後自類㓛能及起同時自類現果此唯望彼是因緣性現行者謂七轉識及彼相應所變相見性界地等除佛果善極劣無記餘熏本識生自類種此唯望彼是因緣性已上等無間緣者論云二等無間緣謂八現識及彼心所前聚後自類無間等而開導令彼定生已上所緣者論云三所緣謂若有法是帶己相心或相應所慮所託此躰有二一親二踈若與能緣體不相離是見分等內所慮託應知彼是親所緣若與能緣躰雖相離為質能起內所慮託應知彼是踈所緣親所緣能緣皆有離內所慮託必不生故踈所緣能緣或有離外所慮託亦得生故已上增上緣者如上所此四緣相文廣義繁是傍論故委不述耳還能同彼地上菩薩所變淨土者依佛願故地前所見同於地上所見淨土不思議力非𭂫所測二會中佛地論等者等取瑜伽唯識等論此等諸論皆判地前不生報土佛地論云地前大衆見變化身居此穢土為其法地上大衆見受用身居佛淨土為其法已上瑜伽論云三地菩薩由願自在方生淨土無有異生及非異生聲聞獨覺若異生菩薩得生於彼唯識論云他受用身亦依自土隨住十地菩薩所冝變為淨土是據自力分判地前地上所居二土不據他力別願勝緣三例釋成中只如眼論言等者先明眼緣境行相論者即是俱舍等論謂眼略有三礙相一唯見障內色不見被障色二唯見欲界境不見異地境三唯是離中知非是合中知又智論二十三云眼見近不是遠見前不見後見外不見內見晝不見夜見上不見下以此礙故已上文意不出今三種義然法華經等者次明據他勝緣眼見與前三種翻謂依法花別威力故眼得見內外諸山誰言不見被障之色又見上界微細諸塵莫謂不臨異地之境又依照鏡見自根是合中知不可遍離中知矣知者俱舍論云眼耳意根境不至三相所謂眼及耳意三取不至境是名離中知根之與境不相必付中有空緣根能取境若著根無空緣時不能取之鼻舌身三與此相能取至境是合中知根之與境親相付著中無空緣而根取境婆娑論云三根合中知謂鼻舌身三離中知謂眼耳意亦同俱舍內外𢏏樓山者法花道𨗴記云經㫆樓山者此云𫥢山亦云殊持山內外者此山有五一大四小大者在中小者在邊而四面住在𨵻浮提西隅大海在目真鄰陀南又栖復鈔云㫆樓山此云灮明山即十寶山之通號常有灮明故以為名也阿迦尼吒天者玄贊云阿迦柅瑟掃此云質礙究竟阿伽質得義柅瑟掃究竟義阿迦尼吒訛也色究竟天也已上又解深密經及攝大乘論等者深密經三云然即此心如是生時即有如是影像顯現善男子如依善瑩清淨鏡面以質為緣還見本質而謂我今見於影像及謂離質別有所行影像顯現如是此心生時相似有異攝大乘論五云㫆勒菩薩言世尊若定境界色相與定心不異云何此識取此識為境釋曰若有別識為識境則唯識義不成𠰥緣自躰為境事亦不成以世間無比類故廣乃至論曰譬如依面見面謂我見影此影顯現相似異面釋曰此譬為顯但有自面無有別影何以故諸法和合道理難可思議不可見法而今得見由如水鏡等影實無別法還見自面謂有別影已上經論譬定心自見定心見定心者定所變色即自心故今譬依他見非分境眼根本是離中知故不能得見合正根塵然由水鏡即能得見與清淨根合在一處自面扶根彼水鏡中無有別影但有自面因緣合故乃見自面何離中知故義燈云問大乘鏡中既實無像云何解深密心意識相品云如一影生緣現前唯一影起等佛地經云如依圓鏡衆像影現答就他宗及世間許取以為喻亦復無經部雖無實影取似亦復無𭁆攝論云由迷亂故謂見影像等據自實義以破他宗故解深蜜云如鏡為緣還見自質非鏡有影已上樞要下釋依他八喻中云又如影像於鏡等中還見本質而謂我今別見影像而此影像實無所有非等地善𢙣思業本質為緣影像果生亦復如是唯識云鏡像補闕章云水鏡等中現面像等似本質故名為影像此亦不爾無垢稱云如鏡中像等喻之於無今若云有便經𭁆若云無者何故八喻依他耶答約第六識自所變相似鏡等有非是全無故喻依他談實見自面等非在鏡中實有面像等第六分別謂在鏡等為影像已上此等解尺與今無異大乘實義依鏡緣故見自本面不可致疑依他八喻出攝論五一幻事二陽熖三夢境四影像五灮影六谷響七水月八變化問若眼根緣鏡像色時眼識同緣答不爾水月鏡像法處攝色非五識境只是眼根照鏡為緣意識緣像也法處色者雜集一云法處攝色者略有五種謂極略色極逈色受所色遍計所起色自在所生色極略色者謂極微色極逈色者謂離餘礙觸方所色即空界色唯識疏云極略極逈但是第六意識分折為極微故第八不緣演祕釋云折根器等為極微者名為極略折像等色為極微者名為極逈受所色者謂無表色唯識疏云受所色中若定道共色即此不緣第八識不緣此定道無表唯以現行思為躰故大乘意者以定相應現行思數名定道戒故第八不緣也別解表業此亦不緣以亦思故大乘意者別解戒思為躰故第八亦不緣也無表色可爾是思種故既緣諸種故得緣之大乘意者許別解無表是思心所種故第八既緣有漏種故得緣此別解無表若爾如二無心定等皆依種立應亦得緣問也由此即是心等種上差別㓛能但緣種躰不緣別能即不緣者無表亦爾是且種上差別㓛能亦是防色之別能故知如彼亦不得緣第八識唯緣種子躰不緣種上差別㓛能彼二無心等種上差別㓛能故第八識不能緣之若即不緣種㓛能者別解無表亦思種能故如彼之二無心定亦不得緣遍計所起色者謂水月鏡像色唯識疏云遍計所起色若唯是鏡像水月此亦不緣第八識亦不緣此色第六識遍計起故若唯意緣通根塵者亦此中攝故演祕云獨頭意識緣根塵等由分別生亦名遍計所起攝也第八所緣諸根塵等以𢝰從別以暗從明皆本處攝故不緣遍計所起之色第八境𢝰六識境別故𢝰從別本十處攝第八境暗極幽隱故六識境明顯彰故暗從明本十處攝故第八識不緣遍計所起之色已上四色定是假法無別種故自在所生色者謂定所生色此中有二一者實色謂大威德定所生色故唯識論云略此識所變境者謂有漏種十有色處及墮法處所現實色同疏釋云第八亦緣法處實色謂威德定所行境色如瑜伽論五十四卷彼極分別應如彼會言墮者是攝義即是法處攝色之異名也已上所假色謂餘假想定所生色是無別種假法攝故第八不緣故唯識疏云又定所生色中如十一切處觀亦此中攝十遍處定所生之色亦是定所生色攝也第八緣不答曰不緣假想色故此論文但緣實色不緣假故第八所緣必有用故彼無實用第八不緣已上具如對法第一瑜伽五十五若言下進退徵若言有見障外等三能者便與俱舍等論相若言無此三能者復與法花等經相故知下自和會論由自力經約他緣並無乖準之故知佛地論師據自因地前不生無量壽經據他力明凡夫入報亦不鉾楯問今雖此等他力證未為正證由彼法花法威德力眼雖見障外之色及上界塵彼所緣境既是有漏鏡像亦爾何足凡夫由願力為生報土證穢土境界雖非己分若由勝緣自可得見無漏佛境雖有勝緣輒不可見他勝緣力加於可加之故答是先為破佛地所自力性相證據他見非分境次重定自在所生色亦同此意後觀經兩處之文及以佛地一師之便是正證也夫乘神風者造天地非難御龍舟者涉江波甚易佛願難思盍攝凡入報哉四重例證中三初威德定例本願力次觀經正證㫆陀報佛凡夫依願入彼土義三佛地亦證凡夫見報佛義初彼威德定中定自在所生色者百法論疏云定自在所生色者定通無擁名為自在果從彼起名彼所生所生即色名所生色自在之所生色名自在所生色已上若以事證彼十六觀成之時心眼開發見寶地等便其義也此色皆是法處攝色而非眼根所得境界故云非是色塵如俱舍論第十三云瑜伽師修靜慮時定力所生境界色非眼根境故名無見不障處所故名無對若謂既爾如何名色釋如是難與無表同此經部難有部經無見無對色證無表色灮記云瑜伽此名相應即觀行者異名與無表同者有部亦許無表色是無見無對故也大威德定者瑜伽論六十五云要具威德極靜定心方能為緣生此無見無對諸色同論抄云是無漏故名為威德聖者法故名為威德其此定色得實作用如實作色若非威德定色唯令他見非實作事不如實作義燈云有異生定所生色亦有實用故云威德定者是根本定非勝者起名威德定今謂不爾若許異生定變實色何故瑜伽第十云謂超第二阿僧耶變有實用若云彼通變此定變者此亦不爾通變是勝尚超第二劫變方有用定力是劣云何𭂫變即許實有故威德定是勝人起已上演祕云威德定者有威德者所起勝定名威德定此有兩釋一云自在菩薩及二乘者所得之定故瑜伽云非是一切所有定心皆有能生此色㓛能唯一類有故知尊聖二云亦通異生依定久習得自者蕳非自在名一類有亦無其𭁆前解為勝已上斯乃已得自在菩薩以無漏定勝威德故變香味觸現魚米等令與有情人皆受用資養依根所餘假想定所變色猶如夢境離心之外更無別色故唯第六意識所緣然彼勝定令其果色通於五八兩識所緣故云能令凡夫所見今此等者例合釋成今依本願令地前人生受用土亦復如斯不可一向判言不生問大威德定為無漏為通有漏若言通者瑜伽抄云是無漏故名為威德若唯無漏者瑜伽論云又此定色但是世間有漏無漏由定而生唯識疏五十四云法處所攝勝定果色彼果彼境是實物有定心所緣名境勤求起故即名為果即通有漏及與無漏此謂聖者得威德定變為此色饒益有情已上此等相云何會通答若菩薩所得大威德必是無漏謂菩薩依大悲相應純淨無漏後得智觀察有情所須物例如彼云唯大悲心神通變境資養有情近亦名食此令有情觸無漏境為破有媒故四食章云若無漏者親非資有究竟為破壞有故近可為食已上况義燈釋欲界有情第八所變定果實色不屬上界之義云雖名通定果然非上界𭠎以漏無漏不相順故已上菩薩所變無漏定果非假食性有漏第八所變相分假食性有漏無漏食非食性不相順故不隨本質上界也若二乘所得大威德定必是有漏謂以二乘無漏多緣諦理不能變香味故略纂述大威德定變實境云若菩薩是無漏若二乘是有漏若爾瑜伽論通漏無漏者通論菩薩二乘所得彼杪無漏者且約菩薩所入定也問為十地中皆得此定為但八地已上菩薩得入此定若言通者義燈瑜伽云謂超第二阿僧耶變有實用豈非唯八地已上菩薩所變有實用若言者二乘有漏大威德定變有實用何况七地以前菩薩無漏定力不變實用答地上菩薩皆變實用後得無漏智自在故何劣於二乘所入有漏定但至燈者且為破他言異生得此定超八地有實用文不七地以前起定問無漏大威德定所變相分亦應無漏破有何受用彼增益依身况上定境彼香味觸寧為假食唯識論云假食唯於欲界有用故答義燈云設菩薩等變假無食用設有實用據為增上生欲界有情所變香味觸三而以為食亦不取本質故不通上已上此文意定起無漏性非正食然欲有情受用菩薩所變魚米等者是菩薩所變為增上緣有情第八自變彼境而受用也菩薩所變雖上界繫而有情自第八所變下界繫故能受用之長養身分不直取菩薩所變本質為食故無食通上界之𭁆次觀經中先第九觀證㫆陀廣大身量是他受用身故非地前所見次雜想觀明𭂫夫依願憶想成就生受用土問何以身量廣大即得為報身證答此義預先明畢今案此論凡夫生報土者觀經誠證也教主六十万億那由他恆河沙由旬所座蓮花是八万四千化佛無數國土分量究竟如空廣大無𨕙際豈非十八圎滿中分量圓滿耶明知非地前境界况具八万四千相好非報身何問報身如來更不可論身土分量遍法界故起信論云一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能𥁞知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身有無量色有無量相有無量相有無量好廣乃至不可窮𥁞離分齊相已上六十万億身量八万四千相好者淨土佛是雖變化身而身量大具衆相好有何𭁆耶故觀佛經十云毗婆尸佛身量高顯長六十由旬其佛圓灮身此金色八萬四千相一相中八萬四千好一一好中無數金灮一灮中有恆河沙化佛已上穢土化身猶有八万四千相好况於淨土勝變化身答他受用身有大小者佛地唯識等所定判彼佛地論一師雖存無其齊限之義而非正義起信論意容亦同彼或三乘異生之境且云無邊或心解故離分齊相若見者隨機證悟可見大小故探玄義云蓮花藏世界雖遍法界對地上菩薩機現有增減已上淨土化身量廣大亦具八万四千相好者無經論證誰敢信之毗婆戶佛相好不似常途恐是一機見不足為難矣雜觀指今第九觀云非是𭂫夫心力所及若化身者地前𭂫夫心力何不及又今文言唯是他受用身非是地前所能觀見又金般若會釋中云阿陀佛身長六十万億那由他由旬非是地前凡夫所見化身佛也三身章因起果相門云且如阿㫆陀佛眼如四大海水眉間毫相如五須㫆山身高六十万億那由他恆河沙由旬應是初地菩薩所見已上又下諸別中云初地自見百大千界一盧舍那阿㫆陀佛量是此所見已上義濵記云阿㫆陀佛量是所見者上文中云阿㫆陀佛身高六十万億那由他恆河由旬即初地入心菩薩所見盧舍那量上生疏云梵經云我今盧舍那方坐蓮花座亦如阿㫆陀佛眼如四大海水眉間毫相如五須㫆山法花亦云衆生見劫盡大火所燒時我此土安天人常充滿常在靈鷲山及餘諸住處是法花等皆他受用已上此等所釋皆第九觀屬受用身問初地能化坐百花然㫆陀坐八万四千座何初地所見答養神集云至初地能化坐百花是百臺上更有八万四千花例如二地能化所坐千花上重有百万蓮花已上準此尺者應言初地能化亦坐八万四千花座㫆陀亦居百臺座故安然菩提心義云摩訶俱絺羅經云㫆陀處百臺梵經云盧舍那坐千臺是他受用方處也已上問今經由㫆陀願力觀見報身若是觀見者何為實生證答定善修因既由宿願得成就故見報佛身往生之果亦由願力故不可疑故今文云故知乘宿願力觀見受用之身亦乘宿願之力生受用土問是誰知乎廣大身量上地能化丈六八尺地前所見若爾彼佛何唯報身答定教主躰第九觀文彼丈六等以神通力於十方國暫時所現不可定為彼土教主故觀經云阿㫆陀佛神通如意於十方國變現自在或現大身滿空中或現小身丈六八尺所現佛身既遍十方何以得為一國教主𭂫極樂是報身土者明據非一今論及慈恩意向已述耳又同性經云復有阿㫆陀如來蓮花開敷星王如來龍主王如來寶德如來有如是等生淨佛剎所得道者彼諸如來得初佛地如來在此地中作是神通如我今日神通無異廣乃至若欲見彼佛報者汝今當知汝今日見我現諸如來清淨佛剎現得道者當得道者如是一切即是報身摩訶俱絺羅經云㫆陀處百臺安然菩提心義證報身淨土論云一心專念作願生彼修奢摩他𥧌靜三昧行故得入蓮花藏世界佛地論第一如實義者他受用土云若隨菩薩所冝現者或在色界淨居天上或西方等處所不定疏第一釋云阿㫆陀經在西方云悲花經第三無上念王願云令我世界無有聲聞辟支佛乘所有大衆純諸菩薩無量無邊無能數者除一切智九品往生義云璟師悲花本願為報身願楞伽經九云於南天國中有大德比丘名龍樹菩薩能破有無見為人我乘大乘無上法證得歡喜地往生安樂國養神集證報身土前四教證後二理證也三佛地論中前淨土最極自在淨識為相等者問有三意一先直問謂前第一卷已淨土如來無漏識為躰相云何會中有聲聞等名為眷屬而不相是舉果圎滿難眷屬圓滿次有何相者還徵相相後諸聲聞等同菩薩見故成相者重述相聲聞等同大菩薩見報佛身聞妙法故成相彼論答中雖述三今舉第二所以不第一第三者第一云彼會聲聞見穢土故第三云彼會聲聞佛等化故不足為證故不也佛地論二云前淨土最極自在淨識為相云何會中有聲聞等而不相有何相諸聲聞等同菩薩見故成相若聲聞等亦如是見可作是諸聲聞等雖預此會障見淨妙業礙故猶如生盲不見如是淨妙境界不可難言既不能見不應在衆以雖不見如是淨妙而見穢土化身故雖同一會自業力故所見各異如見真金謂為火等如於一處四種衆生各別見等或復如來神力加被令暫得見聞妙法此是如來不思議力不可難以根地度等化亦無過為欲莊嚴法會故或佛化作或諸菩薩之所化作已上同論一果圓滿云最極自在淨識為相謂大宮殿最極自在佛無漏心以為躰相唯有識故非離識外別有寶等即佛淨心如是變現似衆寶等如前已境界相故如入青等遍定者識所現相此即如來大圎鏡智相應淨識由昔所修自利無漏淨土種子因緣力故於一切時遍一切處不待作意任運變現衆寶莊嚴受用佛土與自受用身作所止處利他無漏淨土種子因緣力故隨他地上菩薩所冝變現淨土或小或大或劣或勝與他受用身作所依止處已上準佛地論最極蕳因位自在蕳有退淨識蕳有漏相者躰相謂佛果大圎鏡智相應無漏第八識所持利他種子變為衆寶莊嚴淨土而應地上菩薩所冝故彼淨土唯識為相攝大乘通因果所變若約彼者淨識之言不可言唯第八識菩薩第八未為淨故知因果第七淨識為增上緣亦可攝淨識之言也梁攝論云最清淨自在唯識為相釋曰菩薩及如來唯識智無相無㓛用故言淨淨離一切障無退失故言自在此唯識智為淨土躰故不以苦諦為體此句明果圎淨已上不可難以根地度等者撲揚攝釋云案佛地婆娑正理俱舍謂有三度即地根人度謂越度超過之義上地利根及以上位如次超於下地鈍根及於下位以名為地根人度已上且依俱舍述三相者論二十六云有法類道及世俗智成他心智餘則不然於九智中有法類道及世俗智成他心智若知他無漏心以法類道他心智知若知他有漏心以世俗他心智知餘五不然無漏他心智不知有漏心故非苦集智是無為故非智他心智是見性𥁞無生智非見性故非𥁞無生智此智於境有決定相謂不知勝及去來心勝心有三謂地根位地謂下地智不知上地心根謂信解時解根智不知見至不時解心位謂不還聲聞應果獨覺大覺前位智不知後勝位者心位者是人今論第六及攝釋等皆名人度舊俱舍云過地根人三灮記云既下地智不知上心義準能知自地下地一切下地智不知上地心若知自下即有差別故婆娑九十九云曾得有漏心所法有十五種是他心智所應取境謂欲界及四靜慮各有下中上三品心所法曾得有漏他心智有十二謂四靜慮各有下中上三品他心智此中初靜慮曾得有漏他心智下品者能知欲界三品及初靜慮下品曾得有漏心所法中品者能知欲界三品及初靜慮下二品曾得有漏心所法上品者能知欲界及初靜慮各三品曾得有漏心所法如是展轉乃至第四靜慮曾得有漏上品他心智能知欲界及四靜慮各三品曾得有漏心所法如曾得有漏十二種他心智知十五種曾得有漏心所法未曾得有漏十二種他心智知十五種未曾得有漏心所法亦爾無漏心所法有十二種是他心智所應取境無漏他心智亦有十二種謂四靜慮各有三品此中第二靜慮無漏他心智下品者能知初靜慮及第二靜慮各唯下品無漏心所法中品者能知初靜慮及第二靜慮各下中二品無漏心所法上品者能知初靜慮及第二靜慮各三品無漏心所法如是展轉乃至第四靜慮上品無漏他心智能知四靜慮各三品無漏心所法問何故上地下中品有漏他心智能知下地三品有漏心所法上地下中品無漏他心智不知下地中上品無漏心所法耶答有漏無漏心所法建立各異謂有漏心所法依相續建立有一身相續中成就三品有漏心所法無漏心所法依根品建立無一身相續中成就二品無漏心所法况有成就三者建立既別故知有異已上灮記且述地度差別根位應知既不能知上根上位義準能知自根下根自位下位𣵀槃疏五云若依毗曇有三種度義一人度二根度三地度下果不知上果能知下即是人度鈍根不知中上中上能知下即是根度初禪不知上禪能知下即是地度已下正與今同文人度等言所攝根地人度知不知別是自力分若論別緣下根知上乃至下人知上不可以自力難他力此師意明下述論意合經義矣神威願力暫見永生雖似事異其例自成故論文云此由如來不思議力彼是一時化緣令暫得見今此是不可思議本願力令亦得生斯有何過也問彼佛地經報身土者於穢土中撗所示現非竪報土若撗報土凡夫應見何例極樂竪淨土耶答論撗竪土是天台意餘相宗等不須依用故佛地經報身土者於彼一處隨自業力各變淨穢不相障得其中淨土實而非假非離此外別有竪土隨機處見自在宮如向所辨五因前問起中有二問答初問例地前生他受用土難地上亦可生自受用土答有三義初義名為自故設雖有願他不可生次義土極妙故設雖有願他不可生後義既是自土無本願故他不可生問初二兩義許自受用土有本願耶答且附問難故似許有本願謂問意云地上亦乘本願應生自土故且附彼答縱雖有本願是自土也是極妙也他不可生第三實義自土既無化他本願故不可生問何故自土無化他願答既許自土何亦得有化他本願自利二身前佛後佛其躰同故更不可有不同本願雙卷義記云問彼佛具有三身依何名無量壽答他受用及變他身所以者何法及自受用諸佛平等故彼他受用及變化身諸佛本願有差別故住世教化長短亦異依本願故得別名已上遊心安樂道云若依三乘西方淨土通成四土一法性土二實報土三受用土四變化土於中法性實報一味平等周遍法界非餘所測受用變化𮠪願𡸁感隨機所欲指方可得已上次問意化若生自義不成故他不生者自受用身互得見自義不成答中佛是究竟解等者自受用身圎證一如常平等故自他互應不𭁆自義應他自者自應於他名為應他應於自名為應自菩薩或障未除𥁞等者以諸菩薩能迷惑障未除𥁞故所障諦理未得圎證何能生佛自土之中二明雖見異法樂同故猶名生報中又縱令地前菩薩等者先明地前所見不可及地上所變次然以諸大菩薩等者明所見雖異法樂同故亦名為生他受用土謂地前見雖異地上然以如大菩薩受用法樂無有憂苦唯有喜樂更無恐物等差別故亦名為生他受用土是即所見雖異地上所受法樂更無異故名生報也問他受用土雖有勝劣而不可出十種淨土何亦其外得見劣土又所見若異受法樂何同答由心細境優劣者唯識道理不可致疑十地所見猶有差別况於地前𭂫夫見乎但受法樂無有異者受用土中衆生根性一味等味而唯受用大乘法味無受餘乘故雖地前若得生彼如大菩薩喰一道妙味長五分法身菩提資糧莫不具足十八圎滿中是名持圓滿故佛地論云於中止住以何住持廣大法味喜樂所持謂於此中大乘法味喜樂所持食能令住是住持義已淨土超過三界所行之處云何有食又無漏法不應名食能長養三有衆生此斷有故應不名食是住持因故亦名食如汝宗中生色界等入無漏定亦應名食非過去食應名為食過去無故此亦應爾是住持因故為食如有漏法雖障無漏然持有漏得名為食無漏亦爾雖斷有漏然持無漏云何非食此淨土中諸佛菩薩後得無漏能能受大乘法味生大喜樂又正躰智受真如味生大喜樂能住持身令不斷壞長養善法故名為食如是淨土住持圎滿已上梁攝論云大法味喜樂所持釋曰大乘十二部經名大法真如解等為味緣此法味生諸菩薩喜樂長養諸菩薩五分法身此句明持圎淨食此法味作何等業論曰一切衆生一切利益事為用釋曰𭂫夫二乘名一切衆生隨其所能為正教令如修行離四𢙣道離生死離二乘自愛行名一切利益此句明業圎淨攝釋四云廣大法味是能生法喜樂二種是所生法由因大法喜樂生故取彼所生為二食也已上化土不爾聞一音一恐怖一歡喜一猒離一斷疑三乘道殊法樂喜別故維摩上云佛以一音演法或有恐畏或歡喜或生猒離或斷疑斯則神力不共法已上此名化身三種語業中辨揚化業能也佛地論六證彼語此是如來本願所不思議力所發化語一音能包一切衆德三起信同佛地一師中又起信論云從初發意等者起信論云一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能𥁞知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身有無量色色有無量相有無量好所住依果亦有無量種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不不𭁆如是㓛德皆因諸波羅蜜等無漏行業及不思議董之所成就具足無量樂相故為報身又𭂫夫所見者是其色隨於六道各見不同種異類非受樂相故為應身復次初發意菩薩所見者以深樂信真如法少分而見知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如然此菩薩猶自分別以未入法身位故若得淨心所見者微妙其用轉乃至菩薩地盡見之究竟若離業識則無見相以諸佛法身無有彼此色相通相見故已上此起信論許通地前見他受用若得見者何妨得生例如地上見報身故許生彼土此以一義通佛地論一師所解者彼起信論初發意見報身者可有二義一信成就發心在十住位二證發心在十地位今約初一義同佛地論第二一師許凡夫等亦見報身故云此以一義通佛地論一師所解通謂會通即同義也或起信文據初地已上證發心等者此約後一義若依此義不可同佛地一師所解問佛地一師明如來神力加被故見報身起信論意許菩薩信樂真如法故見於報身二力既別何相同耶答信而非證不可離他力見報身故而同也第二變化下通聖人生化土難中先牒前難此有現一身等者正釋通義文有三義謂初至各別何妨第一義也此義意現一佛身理通報化隨冝現故地前𭂫夫直見化土地上菩薩即化見報凡聖所見各別何妨所見雖異極樂本質是變化故名聖生化如佛土章云法花亦言衆生見劫𥁞大火所燒時我此土安穩天人常死滿十地所見乃是報土故前所見乃是化土隨宜而現已上下不得生至有何妨廢第二義也此義意下之地前不可生於上受用土以下不能見勝妙上又業劣𭋘不得往生上能見下為欲接地前𭂫夫地上菩薩生變化土有何妨如佛地論云受用變化二土同處聼法徒衆所聞雖同所見各異不相障得上亦見下不見上各利益安樂事成已上又地上菩薩至亦無有過第三義也此義意地上菩薩生化土者非本身生即是化身亦無有過金灮明疏云唯此經文既在穢土為地前衆即聲聞是實諸大菩薩應在淨土既亦烈在穢土之中即是變化不爾此等諸大菩薩八地已上受變易身如何此界有情得見已上又玄贊云化佛淨穢土中聲聞等實菩薩為權報土之中菩薩為實聲聞等㩲即此義也三義文終何妨有何妨廢無有過者即結三義也復次一義文有二義第一如先但下不至有何妨廢付第一答更通伏難非是別義伏難意云地上菩薩即化見報名地上菩薩亦生化土者地前𭂫夫即報見化可名地前亦生報土若爾何故汝許𭂫夫生故極樂唯化土耶通意者下不可得生上受用以下不能自識見勝妙土又業劣𭋘不得往生上能見下為欲攝地前𭂫夫生變化土有何妨又地上下是第二釋其義如前本極樂世界至是無漏土是第三問上來料蕳報化已訖自下問答有漏無漏問向前所明報化土中就亍何義為此問耶答既言既許就報難也意云既許𭂫夫生報為彼報土是有無漏若約變化安有此言佛地論中亦就報土問有無漏本如來所變至衆𢙣過患答第三問文兼兩意若約本土名無漏土若約自變名有漏土所謂凡夫依託如來無漏本土自識變現極似如來所變無漏勝有漏土而生其中故離衆過如唯識論云彼親所緣雖皆有漏而所牧質亦通無漏又智首小經抄云有漏識心所現淨土雖是有漏以託如來無漏淨土為本性相依之變現亦如佛土躰性雖別同處同時不相障得亦名淨土以是隨順無漏義故已上意與今同問佛心云何無漏設雖無漏土何復無漏前十五界是有漏故答佛果轉依即是究竟無漏界攝諸漏永盡非漏隨增性淨圎明具此五義故名無漏一諸漏永盡者能除漏義能詮所詮皆能除漏是即離彼相應義二非漏隨增者即是顯非所緣義三性淨者蕳二乘無學善有漏等薀雖彼亦離二種之而非性淨無學已前有漏善類故亦與第七所知障俱故非性淨四圎者蕳於一切有學㓛德彼無漏因未圎滿故五明者蕳於二乘無學無漏彼雖圎果而非是明非勝妙故既有五義是故佛果所具㓛德皆無漏攝唯識論云諸漏永盡非漏隨增性淨圎明故名無漏疏云具五義性名無漏界又論十云四智心品如何唯無漏道諦攝故唯無漏攝謂佛㓛德及身土等皆是無漏種姓所生有漏法種已永捨故雖有示現作生死身業煩惱等似苦集諦而實無漏道諦所攝已上然雜集論前十五界皆有漏者唯識佛地會釋如上所問一種土中云何得二人所變別答唯識道理義應然故佛地論云謂初地上菩薩衆雖不能集諸佛自利受用淨土而能集會諸佛利他受用淨土諸佛慈悲於自識上隨菩薩冝現妙土菩薩隨自善根願力於自識上似佛所生淨土相現雖是自心各別變現而同一處形相似謂為一土苦集其中已上若相宗意於水一處由業力別花宅等塵並生不𭁆性宗明義於水一塵業各別故妄見不同問何故名有漏答俱舍論云諸漏於中等隨增故名有漏灮記云漏者泄過無窮謂諸煩惱作諸不善等染𣲇事是故名漏苦集二諦諸漏緣時依境力故能緣漏力隨順增長故漏所緣苦集二諦皆名有漏由有漏故有戝釋也大乘不然法成有漏皆由第七恆染𣲇識謂第七識無始已來起我執恆染𣲇故然諸有漏由與自身現行第七相應煩惱同時俱起互成緣生方成有漏由茲董成有漏法種後時善等現起之位成有漏義唯識論五云又善無䨱無記心時若無我應非有漏自相續中六識煩惱與彼善等不俱起故已上論文意起善無䨱無記心時若無第七我執煩惱此善等心應非有漏自身相續六識相應一切煩惱與今所起善無記心不俱起故論正述云然諸有漏由與自身現行煩惱俱生俱互相增益方成有漏由此薰成有漏法種後時現起有漏義成疏云諸有法由與自身現行煩惱俱生俱互相增益方成有漏自身者蕳他身不已現行蕳種子唯種不故廣乃至俱生俱蕳前後發相增益者為緣相成義又云有漏現行起故薰成有漏種後時善等起有漏義成亦非無始無因故成有漏亦非漏種逐故成有漏已上亦非無始無因等者蕳薩婆多彼許無始無漏種子只依他成有漏故亦非漏種逐者蕳經部意許自身中有漏種子隨逐善等種故善等成有漏故也雜集第三明有漏六義如燈廣釋不能具述問如小乘由他煩惱緣隨增故有漏義成何由第七我執染𣲇答論釋云非由他惑成有漏故勿由他解成無漏故本若是有漏至何界所攝是第四問已料蕳有無漏訖自下問答界攝不攝本此有二釋至是三界攝答第四問文自二義第一明界攝義中文有三意一明有漏三界躰不別故土有漏故應攝三界二若未下至為悉見不正述欲色界攝三以此準知下結也初𢝰釋中有漏三界者如𣵀槃云有漏即是二十五有即三界故又無性攝論云三界者謂欲等愛結相應墮在三界釋曰舉欲界愛等色無色界愛結無漏清對彼有漏名之為墮本疏四云四智俱善亦非界攝非有漏故有漏是界義故界是義故是釋論言亦非界攝非有漏故明知三界是有漏義也二正述中亦有三初明約修因欲色攝次彼淨下至是欲色天於淨土中正辨二界三故無量壽下經而證初約修因中若未離欲等者準對法論未離欲義即有三別一未能伏欲界繫染未能證得三摩地故名未離欲二雖彼已得三摩地斷伏欲染而外色等尚未離欲業增上力所生故亦名欲界繫三生色無色界者亦有未離欲業種隨逐故亦名欲界繫謂第八識同時任持三界業繫諸種子故今約第一名未離欲此未離欲人所修善即有二種一生得善依生得惠所起善故生得惠者婆娑云生便得故名生得謂由先串習力故不由思惟不假加行任運起故名生便得乃至蟻卵皆具比惠今之我等受持讀誦十二分教行三福業皆是生得惠所起善故婆娑云十二分教受持讀誦究竟流布是生得惠二方便善依方便惠所起善故方便惠者加行修習所得惠故對法論云方便得者依止親近善丈夫故聽聞正法如理作意修習淨善法隨法行已上於此惠中有三惠別謂聞思修聞思在欲修惠在色今除修惠舉未離欲善之故也讀誦大乘修三福者舉生得善十六觀等者舉於聞思加行得善欲界聞思行十六觀猶往生故此之二善便以欲界心修行故由此二善往生衆生所變淨土是欲界攝問何以得知今言欲界加行得十六觀者是聞思善而非修惠成實論云須尸摩經中除七依更有得聖道處故知欲界亦有已上由七依處盡漏得聖所謂初禪至無所有七地皆是斷惑修惠依地故也除此七依亦許有入聖修惠定是名欲定妙音師亦立欲界定遺教經稱曰電灮定無漏發疾譬如電灮若有漏定住時則久不得此名誰知今言十六觀者依此等欲界定耶答此難未得今論義趣所以者何此論始終若依小乘則須毗曇若明大乘多由唯識所未曾見據成實宗故下文云當在娑婆孝養父母修行三福作十六觀念佛等業此等業當起之時未得色界心即是欲界生得善聞惠思惠心若得色界定即是色界修惠之心第三卷云十六觀與念佛三昧有淺有深即於四靜慮未至中間禪於修惠中作十六觀及念佛三昧淺即依欲界聞思惠心亦得修十六妙觀作念佛三昧故觀經言如此想者名為粗見極樂國地若得三昧見彼國地了分明不可具故知想成粗見為欲界聞思心也得三昧明見為色界修惠心也已上全同今文明知欲界加行心修十六觀者是聞思非欲界定欲界定者名欲界中立修惠定今云聞思其義遙異再論聞思散而非定故也問云何名為聞思修惠答三惠章云聞謂能聼即是耳識能聞於聲成是生長圎滿之義以聞為因聞所成之惠名聞所成惠思謂思數由思籌度勝惠方生因相應思所成惠名思所成惠或因於思所成之惠修者證義明證境故躰即定數因定相應所成惠或因於定所成之惠已上是名別躰三惠位在七地以前復有義三惠位在八地已上謂於一惠義分三故名義三惠三惠章云七地已前定散心間皆容得起八地以上無漏相續都無散心十地經八地以上於一切法能堪能思能持彼論解云如次即是聞思修惠雖一惠躰一剎那中能取外教而尋於義名為聞惠能深籌度先理後文名為思惠於此二中能證明顯即名修惠聖智迅速於一念惠義分三故實無別躰已上若已離欲得色界身等者準對法論已離欲義即有五別一分離欲謂於此地乃至能斷八品染故二具分離欲謂已能斷第九品故三通逹離欲謂由見道離欲分別不善等故四伏離欲謂由世間道捐離欲染故五永害離欲謂由出世道永斷欲惑故今約第四名已離欲以有漏智伏欲界惑得色界定名已離欲也問世間道離欲界惑者為分別俱生一切皆斷耶答不爾唯識論六云諸有漏道雖不能伏分別起惑及細俱生而能伏除俱生惑漸次證得上根本定已上此顯伏修惑中者非伏分別及修斷細修中者除身邊見及此相應言漸次者顯非頓伏問何以有漏道所伏惑唯是修惑非見惑耶答唯識論云彼但迷事依外門轉散亂動正障定故已上修道所伏之惑一但迷事生二依外門轉蕳見道貪等唯緣內見等生故三此所伏煩惱躰散亂故四動正障於定是事定有漏事定此惑障故是為修得色界定者故得此定修十六觀所生淨土是色界攝大乘不許有漏實斷若依毗曇有漏亦斷下八地惑無色界衆生無實色身等者顯示淨土非無色攝若有修得無色定者名無色人謂無色定可感無色更不可生有色淨土以無此定果實色身而可生淨故也問今言無色界衆生者應生彼人何約修定者答欲色二界皆約修定無色亦然生彼者據前世業命終之後得生淨土此有何妨故第四卷云得無色定者其退性者退起欲色煩惱生於西方若不退者必不生淨土彼淨土是欲色二界攝故已上是約修得不約生在今復須然但文言無色界衆生者修得彼定者名無色衆生是即因上立於果名猶如決定作地獄業名地獄人定心示現其理可然者此有二義一義顯示雖無色業果淨色有定心暫時示現淨土妙色如瑜伽五十三云無色界定於一切色得自在故已上既於諸色能得自在何不示現淨土色質斯乃欲界得彼定者乃生彼界來下佛所聞淨教者能發阿世耶變淨土色二義今𢝰顯示無色有定變色非謂必現淨土妙色斯乃上明無色繫業不生色義故更令知彼界猶有定所變色如唯識論云無色界中緣有漏種彼第八識緣有漏種猒離色故無業果色有定果色於理無已上問誰知今文許定果色往生淨土何別苦勞答定果色者一世之中所現色身何隔生位尚更不捨得生淨土例如無色定果色身終不留成變易色身故疏七云又無色身可得留故一切下色身得非擇故非定所生色可成身留故已上既非無色定果色身得成變易何亦生淨問彼定果色與通果色為同異不答演祕云通智定躰實有別五通本依四本定起定惠均等名為靜慮靜定慮惠此惠力妙能發境故名通色無色無通惠力劣故唯有定力自在變作一切色處故疏三云色無色天皆由通力現身境等此有何過以瑜伽論但通依靜慮無色現色但定所生以惠不均故無通也又疏云亦由通力色界諸天佛前聼法令此界生見彼身等能見之者雖未得通色界天等以通力故變為色身令彼得見下界見者名由通力又疏云無色界無通佛邊聼法令他得見但是定力亦非是身以無根故或名身有積聚故演祕云問既無其根云何得言佛邊聼法答第六識𥊸不待於根故瑜伽云聞謂比量已上無耳等根故但意識不依附根比量知聞根又若有者五識現證疏云由定力變異身器者瑜伽五十四色無色天變身万億共立毛端是平等心無色既無通即唯是定力色界亦有亦令互相見故演祕云按彼論云心自在轉微細性者謂色無色二界諸色如經有平等心諸天曾於人中如是如是資熏磨瑩其心隨此修力內住一毛端空量地處展轉更互不相妨礙釋曰色界二色名為自在一定心現二自在定所感報色無色但一定心所現二界定色因自在是𢝰業果故得名為生死𢝰報言𢝰報者蕳別報果別報者名異𤎼生不名異𤎼謂前六識異𤎼無記名異𤎼生及別報果彼前六識從於第八異𤎼生故名異𤎼生滿業果故名別報果若第七識名異𤎼生不名別報非業感故彼第八識名異𤎼識既由善𢙣惣報業之果生死𢝰報八地已上二乘無學第八識亦前業感故異𤎼識名通至八地已上二乘無學位也是故論云此名唯在異生二乘諸菩薩位非如來地猶有異𤎼無記法故疏云此名唯在異生二乘有學無學及第十地已還菩薩皆有此名有漏果故金剛心菩薩云何猶有異𤎼識名有漏皆捨故由此義故種子生現異時云此心菩薩未捨此識以此文證如來地方捨故若不爾者爾時已捨何不名佛及不此位已捨此識既不名佛及不捨明圎鏡智此時未生入如來地方捨此識智方生故若金心已捨此識今此但約多分為論亦不相其如來地純無漏善無記故已上問薩婆多許命根同分是引業果真異𤎼躰何以第八識為真異𤎼躰答定生死𢝰報小乘計非一謂化地部計別更有窮生死薀是𢝰報躰大衆部計有根本識是𢝰報躰上座部與分別論者計別更有分識是𢝰報躰如此異計不同之中薩婆多計命根同分是𢝰報躰諸計皆是大乘所破大乘實義以第八識為真異𤎼莫致疑妨問阿陀那名通至二乘無學菩薩八地已上其相如何答唯識論云此能執持諸法種子令不𭁆故名一切種疏云現行識執持諸法自他自本識他轉識種子令不𭁆故名一切種釋因相義又論三云或名阿陀那執持種子及諸色根令不壞故云梵云阿陀那此云執持諸種有色根故此通𭂫聖已上二乘無學八地已上第八本識尚持有漏雜染種及無漏種故阿陀那名通至二乘無學菩薩八地已上又此之名通至佛果本識持無漏種令不𭁆故由此疏云謂從無始乃至如來盡未來際利樂有情位謂名阿陀那此名執持已上問本識有十八名今何唯舉三名答唯識論明此第八識有三位名一我愛執藏現行位今賴耶名二善𢙣業果位今異𤎼名三相續執持位今阿陀耶名也雖有餘名長短分限不過三位故論捨留唯舉三名是故疏云謂此識躰𢝰有三位一我愛執藏現行位即唯七地以前菩薩二乘有學一切異生從無始來謂名阿賴耶至無人執位此名執藏二善𢙣業果位謂從無始乃至菩薩金剛心或解道時乃至二乘無餘依位謂名毗播迦此云異𤎼識至無所知障位三相續執持位謂從無始乃至如來盡未來際利樂有情位謂名阿陀那此名執持或名心等長短分限不過三位已上十八名者義燈頌云無沒無相論云一切法種子無所隱沒故本一切之法根本相宅無相論云種子之宅舍故藏執藏故種一切法種子故無垢梵云阿未羅持執持故緣中邊云是余識生緣故顯無相論云五根四大等皆於此顯故現瑜伽云諸法皆於本識上現故轉無相論云與諸法為依與起故心定之所起故名心自在微細性也乃至瑜伽不言共立或本不同或是疏主準於餘文故言共也故智度論第九十三云遍淨天六十人坐一針頭疏色界亦有亦令互相見者瑜伽既色界諸天亦變身等故知不唯無色界也問變幾塵耶答疏云此通五塵三十七通能變為色香味觸又淨土中變五塵故五十三無色界定色能變一切故五十四勝定果色唯有顯色等相以彼香等生因闕故又無用故此約色界異生及無色界波羅蜜多聲聞唯能起色聲觸不能起香味以無加行心因別起亦不能令自他有用故若十地菩薩及色界波羅蜜多聲聞即許起之故花嚴等云聞無色界宮殿之香法花云灮音及遍淨初生及退沒聞香悉能知即菩薩等入彼定變演祕云因闕之義略有兩釋一云種子名因彼無種故名因闕二云因者所以之義彼無生香等道理故問設許有之何理耶若許定心而現香味香味隨心上地所繫此即上地而有香味諸教過由斯定心不變香味兼疏所明合為三釋言加行心即是因也或疏所解不異前二加行之因即前二更無別也疏文無用者香味依於假食施設彼無假食縱有香味而何所為次於淨土辨欲色中彼淨土寶地上者是於欲界等者問依未離欲已離欲別分別二界何亦約處何况一人或時居地或時住空如何就處定欲色界答穢土修因有勝劣故淨土在處亦有高下此有何過例如穢土欲色二界若空若地時而移住非無其義今所論者約常住不遊遍義師云因順餘方有二義一隨本業謂往生者或有資人業生或有資天業生雖生彼形無異狀因順本業有人天名二因居處謂彼土中或有地居或有空居雖彼果報形無異狀隨所在處有人天名故舊本云其國中無有須𢏏山其日月星辰第一四天王第二忉利天皆在中已上約業果分別上下同今解也三引經證中大經兩文其意可見問云何分別四天王及帝釋等耶答大分人天非委主伴三結中彼之淨土有漏心所變即欲色二界攝者問有漏心所變必欲色界攝初地已上七地已還有漏所變土亦三界所攝耶答有漏所變欲色攝者此約凡夫不閞聖人地上既得無漏智故雖亦有漏心自變為淨土不可如凡夫名欲色界也問上文云以有漏心不離三界故三界即有漏即三界既言有漏即三界攝三界攝義有漏所變為其所以何地上有漏心所變土非三界攝設存此義有漏名寬三界名地上有漏非三界故若爾誰知如第二義淨土有漏非三界攝答淨土欲色攝者凡夫之人起有漏智已伏欲惑名已離欲彼得色定可生上故此人盛起色界煩惱未得伏以此繫心修十六觀故其業感淨土色界未離欲者未能起有漏智伏欲惑盛起欲惑以此繫心作三福等故其業感淨土欲界地上異之初地入心斷𥁞三界二障分別伏盡三界煩惱俱生無起三界繫結業心淨土淨自力自證殊勝報土雖有漏變寧名三界既非未離欲凡夫故所變淨土不可得名欲界亦非已離欲凡夫故所變淨土不可得名色界但有漏三界有寬挍故同第二義者第一之義有漏三界無寬狡者約地前非通地上謂無狡第二之義有漏三界有狹者亦約地前非通地上謂有狹俱不論地上有漏故是全非難問第二義云有漏名三界名者即是凡夫等有漏識心所現淨土亦得名有漏不得名三界既云等故不限凡夫地上聖人所起有漏所變淨土亦可屬界答等言等取三賢菩薩及三果聖非等地上也問攝不攝義俱約地前有漏心者有何證耶答上問云極樂世界既許凡夫得生為是有漏土為是無漏土然答曰凡夫之心未得無漏依彼如來無漏土上自心變現作有漏土而生其中次問云若是有漏土三界之中何界所攝然答曰此有二釋一有漏淨土欲色攝二雖是有漏不名欲色略抄上下鉤鎖皆約凡夫而非地上加之佛地論意雖許地上有漏心土不名三界方所圎滿名出過三界行處故佛地論云如是淨土方所圎滿既超三界異𤎼果地已上復一義云地上所變有漏報土猶三界攝有漏即三界有漏故况從初地至第七地身猶分假三界分假既分假身所起有漏心所變土寧非三界云問若存此義上問答約𭂫夫有漏心所變土亦背佛地方所圎滿答源雖出凡夫有漏所變土終通地上有漏心所變土有何防難從狹之是則常途方所圎滿約佛所變不地上有漏所變名三界也已上二義學者取捨問若存三界所攝義者淨土論及攝大乘佛地論等所謂淨土論云勝過三界道究竟如空攝大乘論云出過三界行處釋曰三界集諦為行三界苦諦為處淨土非三界苦集所攝故言出過三界行處此句明處圎淨佛地論云非如三界自地諸愛執為己有所緣相應二隨增是彼異𤎼及增上果如是淨土非三界愛所執受故離二故非彼異𤎼增上果故如𣵀槃等超過三界異𤎼果地智度論云無欲故非欲界地居故非色界有形故非無色彼淨土論與智度論別明西方攝大乘論及佛地論通報土明知一切受用淨土非三界攝答嘉祥觀經疏云江南云是三界所攝何者未斷三界煩惱而得往生故此地云非三界攝何以知然論云無欲故非欲界已上今述兩義故非偏執但諸論者約無漏變無漏所變非三界故佛地云此用本來無分別智後得無漏善法種子三無數劫修令增廣為此淨土變現生因已上更不可有漏所變名三界攝又雖有漏心所變土似佛所變本質土故器世間相有情受樂等一切事不同穢土名非三界釋籤六云若大論中明安養國非三界者亦是娑婆三界耳若就彼土具有三界璟大經疏云智論非二界者且蕳穢界故義亦無過但此等釋約變化土第二明界不攝義中雖是有漏變淨土等者此順佛地論等明出過三界本既是有漏至非三界耶重立道理難第二不攝義如文可知本雖知有漏至三界所𢪛救前不攝義文有二意初明三界名有漏名廣故名有漏不名三界二只如下舉例釋成謂如𭂫夫得生西方許是𭂫夫而非五趣以彼正報人例此依報國何以有漏即名三界於中先例次成例中無量壽等者證淨土中無五趣義初一經獨明離穢趣次兩經合明彼無趣言五趣者佛地經云如世界中五趣可得所謂地獄餓鬼畜生人趣天趣同論釋云諸阿素洛種類不定或天或鬼或復傍生故不別已上瑜伽論中亦三趣攝婆娑正義攝鬼道既許下釋成如文可解矣本彼土凡夫至於理無妨重難前例難例難正能例若不成所例不可立故至答文並述二意經文但言無三趣等者問前文引撗截五𢙣趣文今何云不有人天答為致疑難且舉小經無三𢙣趣况撗截五𢙣趣者明離穢土五趣之相非淨土無人天趣小經正舉淨土所無故引而言不人天本若是𭂫夫至煩惱增也重救不攝義大分有二一初至不可迷執救例上難即成自義二又諸法相下廣立教相述淨土有漏不可名三界第一救上難成自義中文有四意一初至人天趣者先所難二若是人趣至其義何妨兩邊反問明彼土𭂫夫不可名人天亦彼土有漏不可名三界於中若是人趣至衆生耶即是一邊謂淨土凡夫若是人天趣者為四州人為四天等天若言四州四天等人天趣者四州之中有北州難四天等有長壽天難此等難處何名淨土寧令衆生勸往生耶言八難者玄贊九云凡難有八謂三𢙣趣為三四生佛前後五諸根不具六邪見世智辨聰七邊地即攝北州八長壽天成實論四輪摧八難一住善處謂生中國除五難謂三𢙣趣邊地長壽天二依善人謂遇佛除生佛前後三發正願謂正見除邪見世智辨聰四宿植善根除諸根不具已上準之淨土當具四德除却八難一無三𢙣趣故無初三難二化生佛前故無第四七八難三諸根明利故無第五難四正智成就故無第六難既非難處何言四州四天等人天趣鬱單趣者此云勝生壽福俱勝余三州故若言是人至其義何妨亦是一邊謂若言淨土人天雖名人天而非四州等人天者四天下等外別有人天耶若言有者云何淨土衆生人天而非四天下等人天四天下外不可有別人天故又言四天下等外有別人天亦三界外有別有漏其義何妨三若言四天至名三界也假作轉計令歸自義謂汝若轉計言以四州等外無別人天故淨土𭂫夫只名凡夫不名人天趣者例之何妨淨土名有漏不名三界四以彼五趣下準例結成第二廣立教相中有三初至三界攝也舉諸名寬狹例有漏三界寬狹二又如下至乘法樂也舉第八識三種名例無三界名有漏名三又託下至煩惱增也舉二例顯有漏所現非三界繫初舉寬狹中先摽次釋摽有四對一世間名寬有漏名二有漏名寬三界名三界名寬四生名四生名寬五趣名四對如次前寬後狹世間最寬五趣至狹第二第四為當文詮此二如次正例義故次何者下釋第一對中亦如如來所變國土等者即是躰淨相穢土也如下所引維摩經問如來所現穢土佛自見穢土相答唯然相似凡夫所變本質現故慈恩釋云化土必隨三界所處任物化生即便現故已上所現順機能見何異若有現者須如所現亦見之故釋第二對中引智度論文出彼論第三十八意證有漏心所現淨土得名有漏不名三界謂彼論明淨土非界即言地居故非色界無欲故不名欲界亦有形故非無色不言無漏心所現故出三界也知非界者但是有漏所變淨土器世間相布安立及彼有情利樂等事異穢三界名非三界布法用安立者器世間建立相也釋第三對中四生唯取異𤎼五薀有情世間者生者依業所生果故即取異𤎼無記五薀為四生躰故限有情不通非情若論三界廣攝善染外器中有四生狹三界廣也具如俱舍世間品釋第四對中有是化生而非是五趣者中有化生故四生攝是能往故不是趣攝俱舍論設論云四生攝五趣非五趣攝四生不攝者何所謂中有佛地經云五趣因果同論釋云五趣因者謂中有身以與五趣為方便故趣是所趣中有能趣故非趣攝就生類別建立四生是故中有亦生所攝有義中有趣方便故在趣中此言因者業煩惱等果即五趣前義全同俱舍論意及淨土衆生等者成自許例謂如五趣不攝化生中有三界亦不攝化生淨土也二舉第八識三名例中一名阿賴等者阿賴耶者此翻云藏具能藏所藏執藏三義故阿陀那者此云執持此識執持諸法種子及有色根令不失故言異𤎼者梵名毗播迦此云異𤎼識界趣生躰故具如下明今例意者此之三名下位第八悉能具之二乘無學八地已上雖能捨阿賴耶名而異𤎼名阿陀那名猶不能捨有漏三界名亦如是凡夫之時雖有三界及有漏名而生淨土捨三界名唯有漏三界名唯在穢土不通淨故有漏名寬非啻在穢亦通淨故賴耶名只在有學及七地故後二名廣通於無學及八地故是故之例而成義問何故阿羅耶名不通八地已上答唯識論二云初能變識大小乘教名阿賴耶此識具有能藏所藏執藏義故此釋藏義通含三種謂與雜染互為緣故釋能藏所藏義有情執為自內我故釋執藏義能所藏者能持一切雜染種故種名所藏此識能藏亦與雜染所薰所依彼雜染法即名能藏此第八識名為所藏故論文云謂與雜染互為緣故故又攝論云謂與染法互為緣故言雜染者不限染𣲇通名有漏是故疏云諸有漏法皆名雜染非唯染法言執藏者第七識恆執藏第八為內我故論文云有情執為自內我故又攝論云為染末那所緣義故又唯識論云謂諸聖者斷煩惱障究竟盡時名阿羅漢爾時此識煩惱重永遠離故之為捨此中所阿羅漢者通攝三乘無學果位皆已永𭓯煩惱賊故應受世間妙供養故永不復受分假生故已上又云然阿羅漢斷此識中煩惱重究竟盡故不復執藏阿賴耶識為自內我由斯永失阿賴耶名之為捨非捨一切第八識躰勿阿羅漢無識持種爾時便入無余𣵀槃已上此識中煩惱重者第八所持煩惱障種名為重勿阿羅漢無識持種者羅漢若無第八識躰無持種識故金剛心斷重時即應入於無餘𣵀槃無識持種何因得續有漏果報勿阿羅漢其時度故不得捨第八識躰此中捨約執藏義以過重故不約能所藏論捨也問二乘無學不轉第七彼第七何不執第八為自內我若執為我何云無學無賴耶名答二乘無學能除第七煩惱障故更無第七煩惱障執自內我故言捨賴耶非約所知二乘無學雖不斷除第七相應所知障種而所知障不別執彼為自內我是故唯約煩惱障種論執藏義由此疏云有情執為內我故解執藏義唯煩惱障義非所知障義不爾無學應有此名此不別執為其我所及與他我名自內我又論云謂諸聖者斷煩惱障問二乘無學及與八地已上菩薩第八識躰可有能藏所藏之義彼第八識方與雜染互為緣故答二乘無學八地已上捨賴耶名約執藏義而得論之若不爾者更不應謂彼無學位捨賴耶名二乘無學雖能斷除煩惱障種猶有所知及與有漏善無記種成能所薰八地已上有二障種及與有漏善無記種成能所薰故尚應有能所藏義是故疏云義雖具三正取唯以執藏為名不爾二乘無學八地菩薩應有此名三名闕一即不得名一者執藏義也又同疏云此中捨唯約執藏以過重故不約能所藏以為捨也又摳要下云據實賴耶但以執藏今舉能藏有大自在似常一故別似於我顯為我愛之所執藏義意正以所執藏故名阿賴耶若以能藏解阿賴耶佛果應名若以能藏所藏義解二乘無學八地已去應得此名故唯執藏名阿賴耶闕即非也今舉能藏彰雜染藏佛唯有一能藏二乘無學八地已去有二能所藏以外有三藏故以執藏名阿賴耶已上問準摳要意佛唯有一能藏無二何疏三云此能執藏亦通無漏所藏不通無漏一師所解豈非相答其意各異先疏言能藏執藏亦通無漏者佛果位第八識亦能含藏無漏種故云能藏平等性智所緣執故云有執藏非約妄執言有執藏應見燈第四釋次摳要言唯有能藏更無妄執藏義故非無性智緣執理也唯識義意問異𤎼識名亦通二乘無學菩薩八地已上其相如何答唯識論二云此是能引諸界趣生善不善業異𤎼果故名異𤎼已上此第八識引諸三界五趣四生善𢙣業異𤎼果故名異𤎼集起義故依所知依故異異𤎼故識無相論云分別事識也根大衆部立為根本識生化地部名窮生死薀有上座部及分別部立為有分識都有十八具如燈釋
