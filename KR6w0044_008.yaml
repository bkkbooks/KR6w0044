body:
  text: 本法華經至常生難處是第一問法華明謗法者居難處不見聖王觀經此人方生極樂見佛聞法既成相是故問起常生難處永不見佛者彼經云如斯罪人永不見佛衆聖之王次下文云如斯罪人常生難處兩文合置於一處言難處者惣八難處別是三𢙣趣此經謗法之人得生西方者文云十𢙣五逆具諸不善十𢙣五逆別舉二罪具諸不善惣顯諸𢙣故諸不善文攝謗法故下論云如此愚人無𢙣不造亦此意也本觀經言如至不得生也答第一問文有其二一直會難二又禪下變難第一直會中觀經言等者是據觀經通法華文謂觀經受苦無窮由此故雖知謗法重罪難下文即云念佛罪以此準知法華雖常生難處念佛罪消能見彼佛故知無窮反成有窮難處捨離而得勝處第二反難中禪師教皆欲等者先述禪師教本意謂彼師法華等教致問難意欲證第三階有逆無逆俱不生淨此則廣衆多聖教欲證邪人不生淨土又初教欲證等者述今問意次廣欲證等者前後難未知第二等者審第二階謂汝廣衆多聖教欲證邪人不生淨土若爾未知第二階人亦謗法華不常生難處不念佛生淨不若許下難若第二階謗法華人念佛得生何因彼常生難處而為其證若第二階謗法花人不得生淨第二階人亦謗不生何為偏證第三階人不得生也本維摩經言至求生淨土是第二問文意可了維摩八法等者彼經下云維摩詰言菩薩成就八法於此世界行無瘡疣生于淨土何等為八饒益衆生而不望報代一切衆生受諸苦惱所作㓛德盡以之等心衆生謙下無礙於諸菩薩視之如佛所未聞經聞之不疑不與聲聞而相背不嫉彼供不高己利而於其中調伏其心常省己過不彼短恆以一心求諸㓛德是為八法等心衆生者注云等心尊卑情無分別不嫉彼供者注云羅什曰推其致供之由於宿行嫉之無益冝應修善以理處心故嫉不生也恆以一心求諸㓛德者注云釋僧曰塵垢易增㓛德難集自非一心專求無以剋成言瘡疣者經音義云不音尤皮上結起也廣韻云創初良切文云傷也禮曰頭有創則沐今作瘡疣結病也釋名曰疣丘也出皮上聚高如地之有丘也丘璞云地自然生又聚也大也準之菩薩修行八法心無傷痛名無瘡疣又鈔批云持戒清淨無破戒故曰無瘡疣亦可以能持戒識達教相凡所運動無諸過患故曰無瘡疣也已上所以八法第三階為往生法者如第三記本案禪師立至當根何義答第二問文有二意一明禪師當根為宗二然古下反難初文中陵架古今者廣韻云陵力膺切大阜曰陵釋名陵崇也躰崇高也又犯也侮也侵也遲也架屋又搆也亦作枷刑具也枷璅也準之陵架輕𦸑義也陵用侮訓侮亡甫切慢也又用侵訓架用構訓或用枷訓時處人義如第三記第二反難中古來盛德等者明禪師所解遙異諸師於中先嘆諸師德次未有下正述其異嘆德中窮法門之巢冗者廣韻云巢鉏交切文鳥在木上曰巢在曰窠爾雅大笙謂之巢冗胡決切窟也山名鳳皇所出已上又慈恩傳云帝城為𭫒跖之窠河洛為𧲣狼之已上宗鏡録第六十九云今欲會有歸空應當先立後破須知窟方可傾巢已上準此等盡法幽玄喻窮巢也然禪師等者正難彼所立當根義相兩經觀經具足此三義故可為當根維摩二何言當根本菩薩處胎至生彼佛國是第三問先次難文意分明問彼懈慢者淨穢二土中是何耶若言淨土何不佛若穢土者何莊嚴勝又何名懈慢耶答彼經云皆由懈慢執心不窂智首鈔云以責故名為懈慢約人得名又阿㫆𨹔佛變化彼國且息懈慢雜修衆生遂令入極樂世界故十因云又非唯有胎生邊地亦於道中且有化城謂懈慢國莊嚴微妙國土安樂今雜修者先生彼土遂生極樂又云設邊地於極樂為疑惑之輩假化城於懈慢以接雜修之者諸餘淨土未必如斯已上隨機化城不可比類常途淨穢但約莊嚴殊勝者淨土攝也能化有無暗以難測只是現土且接雜修非別佛有如彼邊地故經論中不有佛又可有能化經文不是略而已邊地即在極樂界中故不可有別能化佛懈慢異彼國在別處莊嚴亦殊不可例同彼界邊地但下別釋屬化淨土非今釋意問淨土中有既得現起乘觀音臺如何中間落別國答㫆𨹔變作且一類令生彼故設雖極樂中有起得轉生彼國而不可招轉異國𭁆業別𤎼應可生彼何云𫽄樂中有轉移此人本為往生𫽄樂已修淨業然心不固淨業難𤎼故生彼國機欲向極樂業躰𤎼懈慢故非轉生乘花臺不亦未分明設雖乘臺彼臺即是應懈慢非極樂臺問三心具足猶生懈慢若具三心必生極樂若言不具不可生彼答既云執心不窂固故雖具不堅落在懈慢是雜修𭁆行𮦀行者其心踈遠不能親近所求所歸由此𭁆故直不生彼且留化城非全不具問若爾專修行者其心不堅亦可生懈慢耶答既云專修何不窂固是正行德謂正行者心常親近相續不斷在於㫆𨹔由此德故直生淨土不止化國正行者中雖有緩心而異雜修故不可生懈慢國也問生極樂界中邊地者猶三心生別界何具三心答隨分不欣何生懈慢明雖不窂而具三心邊地疑心非一向疑或時能信或時能疑信為本故終生極樂依疑心故且處胎中今雜修者其心踈遠故生別國雖踈而具故離輪回但智首抄云懈慢國者即疑城也為中下品若約此意懈慢邊地一而非異同在極樂三輩攝在非是今意又恐經不可依用云云本只由此經至實不相答第三問文即有二一約雜修失會二約化易生通第一約雜修會中亦二先禮讃正會彼經次斯乃下結成先文中四修靡墜三業無雜者示專修躰謂專修者安心起行作業三種專在㫆𨹔不雜餘事故云專修亦名無雜今四修者即是作業敬無間無餘長時是作業行相貌故也言三業者即是起行五念門中身業禮拜口業念佛意業觀察是名三業異禮讃中五念皆行第二卷分為願行故安心略之若有行則必具其心故不論耳或三業者通攝心行五念不出三業㓛德三念門在於三業二念門心在於意業故三業言即攝心行下文言唯願唯行者重述三業無雜之相故知三業通願行也餘一切等者述專修相廢是捨也謂捨自餘諸願諸行唯願唯行西方一行其一行者即是五種正行隨一若禪林意念佛一行或五正行惣以為一各有其理不可偏執斯乃正行順極樂故若修之者念念心願繁於㫆𨹔不能浮散故此人名唯願西方唯修一行願一純專在西方是名專修無雜之相𮦀行不爾以其行躰非㫆𨹔故若修之者念心願不係㫆𨹔見讃十方淨土文者心願徐動欲所讃土禮拜餘佛觀察餘境亦復如是被𭷣於行願心動轉非純願行故此人名通發諸願通修諸行願俱雜非專西方是名雜修間雜之相問案論文意諸願諸行是雜修相唯願唯行是專修相若爾誰知諸願行者通願行十方淨土等唯願行者願行西方淨土事斯乃不論正雜差別唯願西方唯修一行是名專修故隨願符合專修此非十方偏在西方名專修者而何行正名專修雜名雜修耶答行躰自有親踈㓛能成專不專故名專雜如向已辨凡專雜者就欣西方可論差別何約通欣十方淨土辨其雜修所謂修雜願西方者心不窂固故直不生暫留化城本通欣樂十方淨土何必此人得生㫆𨹔所作化城故經云或有菩薩摩訶薩從初發意乃至成佛執心一向無若干想無嗔無怒願樂欲生無量壽國一切衆生其生彼者四部比丘尼優婆塞優婆夷皆同一金色西方去此𨵻浮提十二億那由他有懈慢界其土快樂作倡伎樂乃至如論億千万衆時有一人生阿㫆𨹔佛國何以故皆由懈慢執心不窂固斯等衆生自不𭣦生亦教他不𭣦有此福報生無量壽國已上此經不願十方𭃯故知唯就欣求西方論專雜差自不𭣦生教他不𭣦者顯示行躰即非五種正行指修雜行為懈慢國及淨土因更不可疑所謂執心不窂固故雖留懈慢此人本行不𭣦等業終生無量壽佛國也故諸師禮讃二行其專修者偏約正行擇昳小經疏云善導和尚立有專雜二修雜修者謂散漫修諸善業回向莊嚴也專修者身須專禮阿㫆𨹔佛不禮餘佛口須專稱阿㫆𨹔佛不稱餘號不誦餘經咒意須專想㫆𨹔佛不修餘觀若專修者十即十生百即百生若雜修者百中或得一兩人生千中或得三五人生已上若雜行者能回得生故云回向莊嚴也既餘禮餘號觀等唯觀㫆𨹔禮拜㫆陀明修雜行名為雜修行其正業名為專修大智律師淨業禮懺儀序云復見善導和尚專雜二修若專修者百即百生若雜修者万千一二心識散亂觀行難成一志專持四字名號幾生逃逝今始知歸已上十因云故知一心者唯等持定依斯行者餘一切諸願諸行唯願唯行念佛一行散漫之者千不一生專修之人万無一𭁆已上此書前後唯修正行名為專修凡專修者名其心專注於淨境謂其正行自然德能修之心注於極樂若修雜行自然𭁆能修之心不注極樂設一心行㫆忌淨土行躰即非㫆𨹔事故專修名唯正行不通雜行但隨願成專一義非彼經曲二修相所謂只論所求專不明去行何證行躰專修義耶問有人義云三心四修五念具足已名專修故知不論正雜二行三心四修名雜修此義如何答禮讃已二行德失如前已辨言解行不同專雜有異不云三心四修故二行有異心行不𬾨非修道者何以此人對心行𬾨真實行人而辨德失凡諸經論及人師作辨法實行勝劣皆約法躰不約行人今亦如是論行德失令依行者取捨有在就能修人辨其德𭁆有何要矣加之雜行立失述心不親近憶想間斷何異雜修失言係念不續憶想間斷又彼釋云若欲捨專修雜業者欲是樂欲若不至心名雜修者何人欲樂我不至心故捨正行修雜行者名自樂欲修雜行人又許一二三五往生若不如法名雜修者如何得生就中雜行難具四修且禮拜雜行者若禮東方諸佛菩薩已背西方何名敬㫆𨹔者無間無餘亦名常親不斷若雜修者心常間斷名踈雜人如何具彼無間無餘設雖就彼自許四修非為極樂之四修故是故得知四修唯五念正行不通𮦀行是故擇映等諸人師敘二修約正雜行如上所若爾莫謂不論正雜三心四修具惣名專依此文理正雜專雜一物非異雖躰是一得名各異所謂二行名所行躰自然正雜其義如彼選擇集述二修者名能修相貌專注雜散如向已辨學者思擇雜修之者万不一生等者惣二行德失問禮讃許雜修之者少分往生今云万不一生何相耶答万不一生者消千中無一上舉經文云億千万衆時一人生阿𢏏𨹔佛國許雜修中少分生義論讓於經不細明之故不可一二三五問禮讃不云雜修之者落生懈慢彼千中無一者揚留娑婆不生淨土今万不一生者載生懈慢不進𫽄樂彼此既異何令相同答禮讃不明生懈慢國是文略也處胎經中生懈慢心不窂固豈非雜修心念散漫不專注耶故雜修中立亂動正念係念不續憶想間斷回願不重等𭁆亦云不至心是不窂固相故懈慢類為雜修人千中無一非必留娑婆者其中應有生懈慢國万不一生非必生懈慢者其中應有留此娑婆故非相即此經下別行德失先舉雜修失以合處胎經若不雜修等者次舉專修德以合隨願經言此業者是正業即通五種之行隨願經就所求處其願專一非就去行論行躰專故引所求專證去行專也故知雜其行者非言雜修彼此諸行為極樂果修餘事故云雜其行專其業者準可知次結成中豈是彼國難往而無生者進也勤也𭤽也今用進訓謂豈淨土難行而無生進只雜修𭁆不進生彼上引經云不能前進生阿㫆𨹔佛國即此意也第二約化土易生通中又報淨土等者是以別義會處胎經謂彼經中時有一人生㫆𨹔國者顯示報土往生極少染著懈慢不能前進者顯示化土往生極多若依此義懈慢國是化佛淨土非必㫆𨹔暫變化城問若非㫆𨹔所變國土欲生西方前後發意何生彼國答今非暫變不㫆𨹔成所作智別變化土卜一國故欲生報土心不窂固生其化土本如觀佛三至沉有異是第四問文即有二一先出文二若準下難觀經一聲往生初文中如觀佛三昧等者彼經第三云若生垢𢙣不善心者若有犯佛禁戒者見像純黑猶如灰人釋子衆中五百尺子見佛色身猶如灰人比丘衆中有一千人見佛色身如赤土人優婆塞衆中有十六人見佛色身如黑象腳優婆夷衆中二十四人見佛色身猶如聚墨比丘尼衆中有比丘尼見佛色身如白銀色優婆夷衆中有優婆夷見佛色身如藍染青色如是四衆觀佛色身所見不同時諸四衆聞佛是語啼𡘈兩淚合掌白佛我等今者不見妙色五百釋子自頭髮舉身投地鼻中血出佛生我家佛初生時衆人皆見純黃金色唯有我等恆見佛身猶如灰人亦如𮊵瘦諸婆羅門我等宿世有何罪咎唯願佛日為我解是語已自頭髮啼𡘈如前𭓩轉自撲爾時慈父出梵音聲安慰諸釋子諸四衆善男子等如來佛日出現世間正為除汝等罪垢汝等還三匝禮世尊足五百釋子詣阿難所禮敬阿難白言尊者我之與汝俱生釋家汝獨聰明𢝰持佛語猶如𭂁水置於異器我宿罪故不見佛身何聞法是語已對阿難𡘈爾時如來以梵音聲告諸釋子過去有佛名毗婆尸般𣵀槃後於像法中有一長者名日月德有五百子聼明多智廣知世間一切文𮒛星宿曆數無不貫練其父長者信敬佛法常為諸子觀佛亦甚深十二因緣諸子聞已疑惑不信父老耄為諸沙門之所誑惑我諸書籍都無是義父今何處求覓得此時父長者愍諸子故隱匿佛法不為宣是時諸子同遇重病父觀諸子命不支久到諸子所一一兒前泣淚合掌語言汝等邪見不信正法今無常刀割切汝身汝心煩悶為何所怙有佛𠀍尊名毗婆尸汝可稱之諸子聞已敬其父故稱南無佛又復告言汝可稱法汝可稱僧未及三稱其子命終以稱佛故得生天上四天王處天上壽盡前邪見業墮大地獄受苦獄羅𭃯以鐵刃刺壞其眼受是苦時憶父長者所教誨事以念佛故從地獄出還生人中貧窮下賤尸棄佛出亦得值遇但聞佛名不覩佛形毗舍佛出亦聞名𭷖樓𭮑佛出亦聞其名𭷖那𭇥牟尼佛出亦聞其名迦佛出亦聞其名以聞六佛名因緣故與我同生雖生此處我今身相端嚴乃爾汝見我身如𮊵波羅門我身金色𨵻浮擅金色不得比汝見我色猶如灰人佛告諸釋子汝今懺悔向佛懺悔心眼開見佛色身端嚴妙如須㫆山光顯大海尋時得道成須𨹔洹髮自落成阿羅漢三明六通皆悉具足因論智論三十三云如淨飯王𭤽令五百釋種出家佛選堪得道者將至舍婆提城所以者何未離欲故若近親里恐其破戒令身子等教化之初夜後夜專精不寐是故得道已佛還將至本國一切諸佛還本國時與大會諸天俱至迦羅婆仙人林中去迦毗羅婆城五十里是諸釋種所遊戲此諸釋子比丘以精進故以夜為長從林入城乞食覺道路長佛知其心偈云不𮄆夜長疲𫽄道長愚生死長莫知正道佛告諸比丘汝本在家時放逸多睡今精進故覺夜為長在本家時駕乘遊戲今著衣持鉢步行疲𫽄故路為長乃至廣五百釋種得道因緣經論何答釋種數多若是經論應別五百如增一琉璃太子登王位後集四兵衆向迦毗羅取諸釋種九千九百九十万人放醉象令踏𭣦諸於釋種竟還歸本國過七日後王及兵衆身壞命終墮阿鼻獄如𣵀槃經琉璃太子多害釋種取万二千釋種諸女刵劓耳鼻斷截手足推之坑塹準此等釋子釋女其數𫽄多若爾得道容有多類或又一類然彼經論互示一緣不相背也臨命終時受種苦者彼經只同遇重病不言臨終種受苦此人既犯謗法重罪當果決定在阿鼻獄若爾苦患不待命終忽然而起現應受苦遇重病豈無苦惱由此理故云受衆苦父更教令稱南無達摩僧伽者父逼教令稱三寶名子稱佛未及法僧命終生天故彼經云未及三稱其子命終以稱佛故得生天上故云乘念佛善此則顯示無法僧善也問謗法重罪未得除何先生天後生地獄答以敬禮父無至心故罪障未除後生𢙣道口稱佛名㓛德多故先得生天故下文云如負債𭤽者先𭷣念佛福𭤽暫生天趣謗法罪重還落𢙣趣至彼不心𦆵得稱毗婆尸佛名抑謗法忽生天趣今發信心恆唱㫆𨹔本願名號何不除罪直生樂邦本彼雖念佛至有斯別也答第四問即有三一正會兩經一念沇有異二如下還明彼念佛先𭷣相三此彼下結第一正會二經中文立五由一彼雖下彼一念生於退處故還輪回此一念生不退處故進清先明一念生退處相於中如箭射空等者智度論九十九云如善射之人𠈟射空箭去雖遠必當落地已上論喻佛身相好光明是有為故終歸磨今取而喻有漏善報還墮𢙣趣喻義通故互用耳今此往生等者次明生不退處相於中豈比天宮五欲等者結成謂豈比淨土有情於天宮五欲放逸同天上衆生於淨土六度精勤比同兩字互成而已又比之言恐應以字謂豈以天宮五欲歡娛縱情造𢙣而同淨土有情修諸道品逯無所得又比之言恐應此字此彼兩字相對來故是傳誤理為先矣二又彼下是其一由彼一念無菩提心故終以退墮此一念發菩提心故進彼岸文但舉彼經無道心影顯此經具菩提心三又本下是其一由彼一念無本願故更落苦界此一念乘本願故不受𢙣趣文但舉此經有本願影顯彼經無本願四又不下是其一由彼一念不至心但依父命故罪不還沇𢙣趣此一念能至心故直生淨土終免退轉文但舉彼經不至心影顯此經至心義五又謗下是其一由彼一念不可謗罪依於觀經謗法之罪當最下品須具十念罪始除彼唯一念故罪不生天還墮此一念可十𢙣輕罪一念之力能得故生下上品勝進不抅文但舉彼經不謗法影顯此經能十𢙣餘文應知本經言內有至神鬼魔耶是第五問先次難如文可詳所言經者大品經云復次內有煩惱魔外有天子魔意與今同邪三毒者凡夫未斷三界見惑見惑爛漫能生邪行謂邪為本所起三毒無方執境是故名邪能害惠命故名為毒泛論躰者貪嗔癡慢應同邪毒慢入癡攝故但云三若入聖位所起貪等名正三毒雖復有欲非婦不亦於自妻能離非時非處等事雖復有嗔不他命蟲常任運去刃四寸雖復有愚不計性實謂斷見惑得入空智雖有事中獨頭相應了法從緣不計實有道共戒力性離邪行故於三毒無邪曰正此依止觀第六之意今亦凡夫所有三毒名邪毒阿難為無邪三毒人故知聖位三毒名正三毒又智論三十四云世間正見是無漏智惠根本以是故國中無三毒之名貪欲有二種一者邪貪欲二者貪欲嗔恚有二種一者邪嗔恚二者嗔恚愚癡有二種一者邪見愚癡二者愚癡是三種邪毒衆生難可化度餘三易度無三毒之名者無三邪毒之名已上此論意者但就凡位分別邪正所以者何對出世間有漏見中分邪正故又言餘三易度豈非正見凡夫易度斯乃雖未至於聖位性無邪心此之所起三毒名正性有邪心此之所起三毒名邪其理相應莫令偏執若存此義邪三毒凡夫正三毒通凡聖但今論意凡夫三毒名邪三毒問設雖凡夫既是念佛求生淨土如何忽名邪三毒耶答禪師僻見不足千言西方要決云專心念佛願往西方邪毒轉增豈非倒見所以何者娑婆濁界理合常居特生猒捨即邪嗔矣西方淨土聖者堪遊不揆下凡發願生彼即邪貪也所以然者皆為無明即邪癡障也此之三毒內積心田設令念佛感魔鬼神如何得往淨土受生已上問神鬼魔有何差別答魔者𥘿言能奪命者魔有四種煩惱五衆天死魔也內起貪等方害善法亦令心身能生憂惱有漏五隂四相催一篋無全異𤎼終盡相顯現能壞命根第六天主有大㔟力能壞人善見入道無不惱亂故此之四同稱曰魔此就分假以論四魔若約變易明四魔者三魔可悉八地已上諸大菩薩示現作魔為其天魔具如玄贊第九分別初一生死因後一生死緣中二生死果於中死魔雖實命餘者亦能作命緣亦智惠命是故名𭣦者𢝰而言之若神若鬼有情非情沮壞善根惱亂行人悉皆名魔故智論云何者是𭜨𮚆略若衆生法非衆生法能但壞菩薩無上道心非衆生者若疾病飢渴寒推押墜落等衆生者魔及魔民𢙣鬼邪疑不信者斷善根者定有所得者實定分別諸法者深著世間樂者𭜨賊官事師子虎狼𢙣獸毒蟲等衆生賊有二種若內若外內者自從心生憂愁不得法味生邪見疑悔不信等外者如上如是諸難事惣名為魔已上故知神鬼亦屬魔也今從於別故三別列雖有四魔今論所辨多是天子即有三事能破行人謂戲笑語言歌舞等是從愛生打鞕拷破截等是從嗔生五𬉹身自餓捉巖等是從癡生或作種種形恐怖菩薩或作上妙五欲惱亂菩薩或轉世間人心作大供養貪供養故則𭁆道法或轉人心令惱行者又初令乖善起𢙣若不隨者即終令隨善起造寺使散妨定若不隨者令墮二乘魔實不解二乘道法但行當之使不入大具如智論六十七八兩卷中明神鬼者或合為一或開為二今論既云事神事鬼開而為二在文分明言其差別如香象起信疏云魔者天魔此云障得鬼者榫惕鬼神者精媚神也已上天台止觀云槌場發者若人坐時或緣頭面緣人身躰墮而復上翻䨱不已雖無苦痛而屑難耐或攢人耳眼鼻啾㗫作聲閙人耳此鬼似批抱四目兩頭弘決云啾㗫者楚詞云啾唧蟲鳴又云啾鸞聲㗫少語也魔似彼聲故已上又云時媚發者大集明十二將在寶山中修法緣慈此是精媚之主㩲應者未必為惱實者能亂行人若邪想坐禪多著時媚弘決云大集十二時獸者若五行中名十二背者似也此十二神似彼故也大集二十四云東方海中有琉璃山高二十由旬中有象龍南方海中有頗梨山高二十由旬中有蛇馬羊西方海中有白銀山高二十由旬中有獲雞犬北方海中有黃金山高六由旬中有豬鼠牛所住之窟經各有窟名東方樹神南方火神西方風神北方水神一方各有二羅𭃯女及五百眷屬隨其方面各自供養其方三神其窟云是菩薩住處一獸皆云修聲聞慈晝夜常行𨵻浮提內人天敬已曾於過去佛所發願一獸每一日一夜遍𨵻浮提餘十一獸安住修慈從七月一日鼠為其首二日牛乃至十三日還從鼠起是故此土多有畜獸能行變化是者十二神也釋摩訶衍論四種障礙人云魔者令作𢙣事外道令捨善事障身為鬼障心為神略抄是為神鬼魔差別相也本以有邪三至而來惑也答第五問大分為二一廣反難令開悟難者二若爾所下問答正通難者所經第一反難中二先正反難令開悟次上來下結初文中惣有十三子假一以有邪下至有邪三毒明一切凡夫邪三毒有無相初牒計次正難即有二一凡恆見佛難謂若邪三毒感神等者一切凡夫具邪三毒縱不念佛及修淨業應諸時處常應見佛亦命終時皆應見佛持花來何修淨業獨見此境二凡無邪毒難謂若一切凡夫恆不見佛者彼應無有邪三毒不感佛故二又至心下至不曾見佛明修淨業邪三毒因亦非是因初審次難即有二一佛勸不法難謂若念佛齊戒等是邪三毒因者是何謂耶亦慈父尊何勸不法而修善下翻例難謂若此等善乃招神鬼破戒等𢙣返無感神等二非因見佛難若念佛齊戒等非邪三毒因者此能法我修能見神鬼魔汝無此因何不見佛三若以此文下至神鬼魔也明感神等不必依有彼邪三毒初牒計次正難是無邪魔嬈難謂若以此邪三毒經為證定所見是魔即應無邪三毒人不為衆魔所嬈若不所嬈者何阿難等聖者為衆魔所嬈故知一切邪毒未必感魔等亦一切聖非為諸魔不所嬈亂豈閞命終見佛皆是神鬼魔也阿難心生迷惑不請者智論第二如下明之又同論云法師心欲法化衆生而口不能言現是魔事如魔入阿難心佛三問而三不答已上優婆毱多在定等者案付法藏經第二烏婆毱多唐言近護法道利夫婦俱證阿羅漢者乃下一籌四寸填積石室高二十餘尺廣三十餘尺單已及別者雖證不記魔三波旬便生愁怖而作是念優婆毱多大集衆會必當教令出吾境界我今當往壞其衆意於法時雨真金寶或雨花瓔光色明淨化作白像七寶莊嚴現為女人端政奇特舉會欲觀無聼法心於三日中演深法味乃至無有一人得道魔王歡喜深自慶幸優婆毱多即入三昧觀察思惟是誰所作魔王復以真珠花瓔著其頂上尊者即觀知魔所為便作是念𢙣魔垢㢢壞亂正法如來何故而不調伏即觀佛心使已化之便以三尸謂蛇狗人化作花感魔令至而謂之曰汝與我深識厚今還以此用相酬𧸙魔大歡喜舒𩒐受之至其頭已還見死尸蟲蛆欲出臰難近乃至廣婆娑論一百三十五廣明欲所繫死尸魔增惶恐為尸故便陷入地更出騰空又從大海水中復入蘇迷盧腹盡力擺𦆵不能去魔既困㢢自度力窮漸歷六天求欲免既不能得往梵宮邊請大梵言唯願哀愍解我頭上仙人所辱梵王告曰吾不能去可還歸依本繫仙者魔下聸部五躰投地禮尊者言大德唯願慈悲救我前𠍴去尊所報尊者告曰汝能從今乃至如來聖教未更不惱亂諸苾不魔曰唯然為魔解去三尸云云四又有邪下至有邪毒故明魔形言喈惱亂人先𢝰非謂若邪三毒感神鬼魔何其魔等唯變佛像次𣵀槃經言下證正難是見聞皆魔難𣵀槃經魔現比丘等四衆形來惑行者又魔嬈人非唯形相多緣言教佛教弟子辨其魔及以佛令物覺知意在於斯故觀經定中所聞能辨邪正與修多羅合名佛若不能合名為魔若如下重責若如汝解有邪三毒所感魔者即汝所見四衆皆應是魔由汝身中有邪毒故又可云所聞皆魔是文略也五又見佛下至是魔法也明法正不出魔初牒計次審後難即有二一法真應勤難謂若由法真能出魔境故魔來現身縱雖實魔更須勤心修念佛等以是法真出魔境故二不律見佛難謂若法不真能長三毒感彼衆魔現佛形者不律儀悉長邪三毒應常見佛及臨終時感持花若爾下設責若不律儀依長邪毒見佛者觀經所聖衆來此教返應耶三毒法此諸聖衆應並是魔即應此經是魔法也屠兒魁膾茶羅等者𨹔羅云屠者不律儀也亦名𢙣律儀正言茶羅此云嚴𢡠𢙣業自嚴行持摽𢡠搖鈴持竹為自摽故法花烈六經云及畜豬羊雞狗畋獵𩵾捕諸𢙣律儀畋音徒賢反取禽獸也𩵾音語屠反捕魚也𮦀心有十二屠羊養雞養豬補魚捕鳥豬師作𮚆魁膾守獄咒龍居犬伺獦𣵀槃有十六牛羊豬雞為利故買肥已轉賣為利故買買已屠𭣦即為前八鈎魚獦師劫魁膾捕鳥兩舌獄咒龍對法第八有十四屠羊養雞養豬捕魚獦鹿罝劫盜魁膾𭓯牛象立壇咒龍守獄讒好為等象者恆處山林調執野象立壇咒龍者習咒龍蛇戲樂自活讒者以離間語壞他親持用活命俱舍有十七論十五云不律者謂屠羊屠雞屠豬捕鳥捕魚獵獸劫盜魁膾典獄龍煮狗及罝等言類顯王典刑罰及餘聼察斷罪等人但恆有𭓯心名不律儀者言屠羊者謂為活命要期盡壽恆欲𭓯羊餘隨所應當知亦爾光記云龍謂以咒術繫龍蛇戲樂求物以自存活言煮者茶羅等諸猥𢙣人造諸𢙣類西國呼為煮狗人非常煮狗或可煮狗以死所食西方汗狗故以摽名餘名可知等言以顯王等謂𢙣王非理𭣦害典刑伐謂典刑人伐人聼察謂御史等斷罪謂大理等大數而言𢝰有十二餘未者等字以𢪛已上所等有五合成十七類未盡故亦云等也六又有邪三至為魔得便明可開悟魔嬈於心初𢝰非次但阿下正難是惑亂心難即有其二先明惑亂相於中四十八願等者其教證有諸傳記等者示其現證汝須聞此等者明無依信反生誹謗教證名聞現證曰見謂聞此本願妙法見諸往生善相道理須發菩提之心專心修學而不生信見修行返生誹謗是汝邪毒能感神鬼魔令汝顛倒須覺其事此即魔來壞亂汝心何現佛形方名三毒感神鬼耶次且佛將下智論證魔亂心彼論二云大迦葉言汝更有罪佛意不欲聼女人出家汝殷勤勸請佛聼為道以是故佛正法五百歲而𮕱微是汝𥥛吉羅罪阿難言我憐愍瞿曇㫆又三世諸佛法皆有四部衆我釋迦文佛云何獨無大迦葉復言佛欲𣵀槃時近俱夷那謁城脊痛四疊漚多羅僧敷臥語汝言我須水汝不供給是汝𥥛吉羅罪阿難答言是時五百乘車截流渡令水渾濁以是故不取大迦葉復言正使水濁佛有大神力能令大海濁水清淨汝何以故不與是汝之罪汝去作𥥛吉羅懺悔大迦葉復言佛問汝有人若四神足好修可住壽一劫若減一劫佛四神足好修欲住壽一劫若減一劫汝默然不答問汝故默然汝若答佛四神足好修應住一劫若減一劫由汝故令佛世尊早入𣵀槃是汝𥥛吉羅罪阿難言魔㢢我心是故無言我非𢙣心而不答佛大迦復言汝與佛疊僧伽梨衣以足踏上是汝𥥛吉羅罪阿難言爾時有大風起無人助投衣時風吹來墮我腳下非不敬故踏佛衣大迦復言佛隂藏相般𣵀槃後以示女人何可耻是汝𥥛吉羅罪阿難言爾時我思惟若女人見佛隂藏相者便自羞耻女人形欲得男子身修行佛相種福德根以是故我以示女人不為無耻而故破戒大迦業言汝有六種𥥛吉羅罪盡應僧中悔過是時阿難長跪合手六種𥥛吉羅罪懺悔已上𥥛吉羅此翻應當學辨罪故又翻守戒吉羅雖小開放逸門塵不多水當漸入沒海而死若能堅禁浮必全故云守戒四神足者一欲神足二勤神足三心神足四觀神足俱舍論二十五云何緣於定立神足名諸靈妙德所依止故如經言吾今為汝神足等神謂受用種神境分一為多乃至廣足謂欲等四三摩地此中佛定果名神欲等所生等持名足光記云謂諸神靈勝妙㓛德故名為神定是彼神所依止故名之為足神之足故名為神足經既神受用種神境分二為多等故知神靈妙德足謂欲等四三摩地故知是神所依止定名之為足論主釋經此中佛定果名神欲等四因所生等持名之為足故知此神非即是定以實而論定為躰性而言四神足者從因四就果名神就用稱足故婆娑云一三摩地由四因生故從所因立四名稱問從四因生為據同時為據前後解云此據同時立名與定同時雖有多法此四資益等持勝故欲謂希求勤謂勤策心謂所依觀謂觀察故從同時為名故婆娑云謂於俱有相應法中資益等持此四勝故已上論文又解此據加行立名欲者欲起此定謂加行位由欲力故發定起勤者勤修謂加行位由勤力故發定起心者心所依謂加行位由心力故發定起觀者惠觀察境謂加行位由觀力故發定起加行位中雖有多法此四資勝從四為名故婆娑云謂加行位或由欲力引發等持令其現起廣乃至或由觀力令現起已上故知下結魔來惑亂未必現形令汝心錯為魔得便七又魔來顯至亂汝心耶明有隱顯魔初正示顯魔易覺除隱魔難知遣次只如下證難是隱魔不覺難即有其二先依經論明隱顯魔言顯魔者彼經四十云爾時世尊知已即告陳汝言阿難比丘今為所在陳汝言世尊阿難比丘在娑羅林去此大會十二由旬而為六萬四千億魔之所嬈亂是諸魔衆悉自變身為如來像或有宣一切諸法從因緣生或有言一切諸法不從因生或有言一切因緣皆是常法從緣生者悉是無常或有示現神通變化身出水火或身上出水身下出火身下出水身上出火時世尊阿難比丘見是事已作是念言如是神變昔來未見誰之所作將非世尊釋迦作耶欲起欲語都不從意阿難比丘入魔𬚰故作是念諸佛所各不同我於今者當受誰語世尊阿難今者極受大苦雖念如來無能救者以是因緣不來至此大會之中文殊師利阿難比丘今在他處去此會外十二由旬而為六万四千億魔之所惱亂汝可往彼發大聲言一切諸魔諦𥊸如來今大𨹔羅尼一切天龍𠃵闥婆阿修羅等聞是持名無不敬受持之者是𨹔羅尼十恆河沙諸佛世尊所共宣能轉女身自識宿命爾時世尊即便之阿摩𣵀磨蓇伽𨢸魔羅若竭捭三那提娑婆他娑檀尼波羅魔他娑檀尼摩那斯阿拙啼比羅菴羅賴垣婆嵐㫆婆嵐摩莎當泥富那摩奴賴綈爾時文殊師利從佛受是𨹔羅尼已至阿難所在魔衆中作如是言諸魔眷屬諦聼我所從佛受𨹔羅尼咒魔王聞是𨹔羅尼已悉發阿耨多羅三𦴭三菩提心捨於魔業即放阿難略抄乃至𡸁欲等者重依智論明其隱魔謂佛將魔乃密𮑇阿難心故不生覺知請久住世如向已辨前證𮑇心今證隱惱故無其妨次爾只下正難應知八又薩𨹔至及誤於人明宿有善因魔不能嬈亂即有二先經次難是無宿善魔嬈難先經中薩𨹔波崙等者大品經云是時薩𨹔波崙菩薩白十方諸佛言何等是我善知識所應親近供養者十方諸佛告薩𨹔波崙菩薩言汝善男子曇無竭菩薩世教化成就汝阿耨多羅三𦴭三菩提是汝善知識汝供養曇無竭菩薩若一劫若二若三乃至過百劫頂戴敬以一切樂具三千世界中所有妙色聲香味觸盡以供養未能報須之恩何以故曇無謁菩薩摩訶薩因緣故令汝得如是等諸三昧得般若波羅密方便力諸佛如是教化安慰忽然不現是時薩𨹔波崙菩薩從三昧起不復見佛作是念是諸佛從何所來去至何所不見諸佛故復惆悵不樂誰斷我疑復作是念曇無竭菩薩久遠已來常行般若波羅密得方便力及得𨹔羅尼於菩薩法中得自在供養過去諸佛世為我師常利益我當問曇無竭菩薩諸佛從何所來去至何處爾時薩𨹔波崙菩薩於曇無竭菩薩生敬愛樂尊重心作是念我當以何供養曇無竭菩薩今我貧窮華香瓔珞燒香澤香衣服𢟷蓋金銀真珠瓔珞波梨瑚琥珀無有我當賣身得財為般若波羅密故供養法師曇無竭菩薩何以故我世身無數無始生死中或死或賣或為欲因緣故世在地獄中受無量苦惱未曾為清淨法故供養法故身是時薩陀波崙菩薩中道入一大城至市肆上高聲唱言誰欲須人誰欲買人爾時𢙣魔作是念是薩陀波崙愛法故欲自賣身為般若波羅蜜故供養曇無竭菩薩當得正問般若波羅蜜及方便力云何菩薩行般若波羅蜜疾得阿耨多羅三𦴭三菩提當得多聞具足如大海水是時不可沮壞得具足一切㓛德饒益諸菩薩摩訶薩過我境界亦教餘人出我境界得阿耨多羅三𦴭三菩提我今當壞其中爾時𢙣魔𮑇諸波羅門居士令不聞其自賣聲除一長者女魔不能𮑇爾時薩𨹔波崙賣身不憂愁啼𡘈在一面立啼泣而言我為大罪賣身不售我自賣身為般若波羅密故供養曇無竭菩薩爾時釋提桓因作是念是薩𨹔波崙菩薩愛法自賣其身為般若波羅蜜故欲供養曇無竭菩薩我當試之知是實以深心愛法故捨是身不是時釋提桓因化作波羅門身在薩𨹔波崙菩薩邊行問言汝何以憂愁啼𡘈顏色憔悴一面立答言波羅門我愛敬法自賣身欲供養曇無竭菩薩今我賣身無有買者自念薄福無財寶物欲自賣身供養般若波羅蜜及曇無竭菩薩而無買者爾時波羅門語薩𨹔波崙菩薩言善男子我不須人我今欲祠天當須人心人血人髓汝能賣與我不爾時薩𨹔波崙菩薩作是念我得大利得第一利我今便為具足般若波羅蜜方便力得是買心血髓者是時心大歡喜恱樂無憂以和心語波羅門言汝所須者我盡與波羅門言善男子汝須何價答言隨汝意與我即時薩𨹔崙右手執利刀刺左臂出血割右脾肉復欲破骨出髓時有一長者女在閣上遙見薩𨹔波崙菩薩自割身體不惜壽命即下閣到菩薩所問言何因緣困苦其身用是心血髓作何等菩薩答言賣與波羅門為般若故供養曇無竭菩薩長者女言賣身自出心血髓供養曇無竭菩薩得何等㓛德利菩薩答言是人善學般若是人當為我菩薩所應作所行道我學是法學是道得阿耨菩提時為衆生作依止當得金色身三十二相八十隨形好大光無量明大慈大悲大喜大捨四無所畏佛十力四無礙智十八不共法六神通不可思議清淨戒禪定智惠得阿耨菩提於諸法中得無礙一切智見無上法寶分布與一切衆生如是等諸㓛德利我當從彼得之是時長者女聞是上妙佛法大歡喜心驚毛竪讃薩𨹔波崙菩薩言善男子甚希有汝所者妙難值為是一切法故應捨如恆河沙等身何以故汝所者甚大妙汝今所須盡當相與金銀真珠等諸𭹀寶及花香等供養之具莫自困苦其身我亦欲往曇無竭菩薩所共汝植諸善根為得如是妙法如汝所故爾時釋提桓因即復本身讃菩薩言善善男子汝堅受是事其心不動諸過去佛行菩薩道時亦如是我實不用人心血髓但來相試汝願何等我當相與菩薩言與我阿耨菩提釋提因言此非我力所辨是諸佛境界必相供養更索餘願薩陀波崙言汝若於此無力汝必見供養令我是身平復如故是時菩薩身即平復無用瘡槃如本不異釋提桓因與其願已忽然不現爾時長者女莊嚴七寶車五百乘身及侍女種寶物供養之具持種種水陸生華及金銀等菩薩薩𨹔婆崙菩薩五百侍女各載一車漸東去見衆香城七寶莊嚴七重圍繞七寶之塹七寶行樹皆亦七重其城縱廣十二由旬豐樂安靜甚可喜樂人民熾盛五百市里街巷相當端嚴如畫橋津如地寬博清淨遙見衆香城既入城中見曇無竭菩薩坐高臺法座上無量百千万億衆敬圍繞法見曇無竭菩薩時心即歡喜如比丘入第三禪攝心安穩見已下車俱到曇無竭菩薩所爾時曇無竭有七寶臺赤牛頭檀以為莊嚴真珠羅以䨱臺上四角皆懸摩尼珠寶以為燈明及四寶香爐常燒名香為供養般若波羅蜜故其臺中有七寶大床四寶小床重敷其上以黃金書般若波羅蜜置小床上種𢟷蓋莊嚴垂䨱釋提桓因與無量百千万諸天以天𭦟𨹔羅花未栴檀磨衆寶屑以散臺上鼓天妙樂於空中娛樂此臺是時薩陀波崙及長者女等花香寶物供養般若及曇無竭菩薩已合掌敬一面立已白曇無竭菩薩言我求般若波羅蜜時於空間中聞空中聲言善男子汝從是東行當得聞般若波羅蜜我受是語東行不久作是念我何不問空中聲我當何處去是遠近當從誰聞我是時大憂愁啼𡘈於是處住七日七夜憂愁故乃至不念飲食但念我何時當聞般若波羅蜜我如是憂愁一心念般若見佛身在空中語我言善男子汝大欲精進心莫放捨以是大欲大精進心從是東行去是五百由旬有城名衆香是中有菩薩名曇無竭從是人所當得聞般若是菩薩世是汝善知識我從佛受教誨已東行更無餘念但念我何時當見曇無竭菩薩為我般若波羅蜜我爾時中道住於一切法中得無礙智見得觀諸法性等諸三昧現在前住是三昧已見十方無量阿僧諸佛是般若波羅蜜諸佛讃我言善善善男子我本求般若波羅蜜時得諸三昧亦如汝今日得是諸三昧已遍得諸佛法諸佛為我廣法安慰我已忽然不現我從三昧起作是念諸佛從我何處來去至何所我不見諸佛故大愁憂乃至廣文要故不恐繁薩𨹔波崙者薩𨹔𥘿言常波崙名啼以其小時喜啼故父母名常啼或此菩薩行於大悲心濡故見衆生苦為之悲泣是故衆人號常啼或聞空聲不久便即後心念我何來問以是因緣憂愁啼𡘈七日七夜因是義故天龍鬼神號曰常啼曇無竭者𥘿言法涌般若法水涌出湛故又云法盛行於道法最滋盛故如智論中廣分別焉問經中不明長者之女有宿善故魔不能𮑇答智論九十八釋云除一長者女以其為佛道世集㓛德故魔不能𮑇復有人言是薩𨹔波崙不應死故令一女人聞有人言是曇無竭菩薩神通力故令長者女得聞如是三唱無人買者便大愁憂已上論有三義今據第一故云宿善次以此經準者此下難三初結前生後二義亦下明有宿善故聞淨教深信解行以合長者女因宿善魔不能𮑇於中先合釋故稱讃等者證依宿善信行淨法無量佛所曾種善根者所有宿善廣大無邊非可造次以計挍也如賢護經第二卷云已於過去諸如來所修行供養種諸善根當知此輩非於一如來所修行供養種諸善根也亦非於二三四五乃至十如來所種諸善根也亦非於百千億數諸如來所種諸善根也賢護當知此諸善男子善女人已於過百千數無量無邊諸如來所修行供養種諸善根方得聞此念佛現前三昧聞已生信心開意解即以為實無復疑樂欲書𭂁讀誦受持乃至為他廣是義已上故知下結由此故知修西業者皆是過去無量佛所種諸善根魔不𮑇心深生信解𢙣魔但嬈小福不信之人不壞多福信厚之者如小樹裁小兒能破大不可破何念佛㫆𨹔別願護持攝受或時光明照攝或時聖衆圍繞魔不得便其理決定如靈芝云白中𮚆不來即此義也二汝等見聖者此下正難謂無宿福彼無信心魔𮑇其心及以誹謗修行淨教如賢護經云或有衆生善根薄福德鮮少過去未曾親近諸佛供養羕事聼聞正法但為我慢所降嫉妬所道利養所䨱名聞所𭷣𢙣支所壞廣行放逸不持戒善如是之人聞此三昧誹謗輕無一信心謂為不實志性頑愚意無開解復作是言如斯經典非佛所乃是世間鈍根比丘愚癡邪見自作文章嚴飾詞句當知是人遠離無上深妙法寶永失無上最勝法利也已上捻鼻不聞栴檀之香開口大摩尾之價頑騃之類根㢢之輩不覺為魔所嬈翻乃笑我有魔早生覺察無二利九又依經文至為魔得便明隨法真不所見為魔佛初牒計次審定後正難難即二一見魔為佛難是設而難法若真正不可見魔亦𠰥實魔不可為佛故云縱使二見佛為魔難是亦設難法若邪不見真佛亦若真佛不可為魔故云縱也如諸外道者例示見佛更無其益非謂外道見佛為魔子今定者此下重責法之邪正先審次難文意易詳十又維摩經至於正見明得正法其心不動現遇實魔不可有畏即有其二先證次正難是魔不正見難先證中天魔波旬等者彼經上卷菩薩品中明持世菩薩不堪問述維摩有自在神力智惠辨才波旬者注維摩云魔波旬者者羅什曰波旬䄅言𭣦者常欲斷人惠命故亦名𢙣中𢙣凡𢙣有三種一𢙣二大𢙣三𢙣中𢙣若以𢙣加還以𢙣報是名為𢙣若人不侵無故加害是名大𢙣若人能供養敬不念報恩而反𭓯之名𢙣中𢙣中𢙣魔王最甚也僧曰波旬䄅或名𭣦者或名極𢙣斷人善根因名𭣦者亂佛僧莫之大故名極𢙣矣狀如帝尺者注維摩云羅什曰釋是佛弟子知其不疑故作釋形來也無盡燈者經云無盡燈如一燈燃百千燈者皆明終不盡如是諸婦夫一菩薩開導百千衆生令發阿耨多羅三𦴭三菩提心於其道意亦不盡隨所法而自增益一切善法是名無盡燈也汝等雖住魔宮以是無盡燈令無數天子天女發阿耨多羅三𦴭三菩提心者為報佛恩亦大饒益一切衆生注維摩云僧曰自行化他㓛德㫆增法光不絶名無盡燈故知下釋成此義下例合優婆下重證彼禮佛者𩒐繫三尸降伏魔事如前已明尊者告言佛𣵀槃後經千百歲我身乃生如來法身吾今已見所未見者謂佛生身仁今頗能為我現不魔曰此事甚易我能為之願尊見時勿便致敬令我獲罪尊者曰爾即時為魔解去三尸魔王歡喜謝尊者已便入林中即自化身作如來像三十二相八十種好威光赫𭴩過千日月復更化作諸苾衆右舍利子左大目連尊者阿難持鉢隨後又與阿若陳那等千二百五十人俱如半月形從林而出時尊者優婆毱多見已歡喜得未曾有五躰投地作禮讃言無量俱劫淨修身口意以是故獲得如是殊妙身魔王悚懼尋化身已上依婆沙論次假令下正難謂縱使同汝之所解所見皆魔於其𢙣魔作真佛想何正見十一又維摩經至作真佛想明一切魔皆是行不可必畏即有其二先經次正難是㩲魔不謗難先經中十方世界等者彼經中云十方無量阿僧世界中作魔王者多是住不可思議解菩薩以方便力故教化衆生現作魔王廣乃至住不可思議解菩薩有威德力現行逼迫示諸衆生如是難事凡夫下劣無有力㔟不能如是逼迫菩薩如龍象蹴踏非驢所堪無垢稱云示現為魔王者多是不可思議解菩薩唯有龍象能與龍象為戰諍故玄贊尺分假變易四魔中此文證變易天魔八地已上菩薩示現故經既言多非無實者今言皆者即名多也釋籤二云入地菩薩能作魔王魔王不盡是彼入地菩薩故但云多以實行者不堪惱於深位菩薩故云非驢所堪次縱使者此下正難縱使見魔還菩薩有何所畏𭤽生誹謗乎只如等者乘彼師計還明不別魔佛須惣敬禮問上假既云作真佛想與今何差答彼就法真作真佛想今約魔㩲作真佛想是為其別不應混同作生盲觀者彼普真法名生盲衆生佛法故如第三記已明其義如彼普法惣凡為聖普敬設要汝於佛魔亦惣敬作真佛之想言設要者設即陳也要是約也謂凡短陳同聖長約同凡聖一躰故云設要廣韻云設識別切也陳也合也要於笑切約也約儉也束也少也又準別訓設謂合也要謂束也合束凡聖為一躰義也十二又魔作非至𮚆不能為明魔非魔為業𭆞差即有二先明四句次正難是二句所攝難先明四句中初列次尺釋初單句如㫆勒下生時等者下生經云㫆勒已成佛道爾時魔王名曰大將以法治化聞如來名教歡喜踊躍不能自勝七日七夜不眠不𮄆廣乃至爾時大將魔王告彼欲界人民之類汝等速出家所以然者㫆勒今日以度彼岸亦當度汝等使至彼岸問何故此魔作非魔業若是㩲行以方便力既現作魔何不示壞若亦實者可憂我能出境界何勸佛道答好世之中衆生質直心不曲故魔亦正直不作魔業如法花中光明佛國無有魔事雖有魔及魔民皆護佛法㫆勒魔王亦復如是尺次句如今衆生等者如智論云若諸衆生及非衆生令人造𢙣沮壞善根皆名為魔如前已辨今略非情具亦可存次二句知次何必汝下正難汝語何非第二句及第三俱句經言下明自己覺知不落彼難我能知汝語是魔既能得覺豈為所𭓯如經言若人覺賊不能為所言經者𣵀槃第十八云佛者名覺既自覺悟復能覺他如有人覺知有賊無能為菩薩摩訶薩能覺一切無量煩惱既覺了已令諸煩惱無所能為是故名佛已上借文成義意各得十三又如薩𨹔至何所畏也明精勤勇猛魔不能壞亂即有其二先經次正難是魔不壞精進難先經中如薩𨹔波崙等者大品經云爾時曇無竭菩薩法日沒起入宮中薩𨹔波崙菩薩作是念我為法故來不應坐臥當以二事若行若立以待法師從宮中出法爾時曇無竭菩薩七歲一心入無量阿僧菩薩三昧薩𨹔波崙菩薩七歲經行住不坐不臥無有睡眠無欲恚惱心不著味但念曇無竭菩薩何時當從三昧起出而法薩𨹔波崙菩薩過七歲已作是念我當為曇無竭菩薩敷法座是時薩𨹔波崙與長者女及五百侍女為曇無竭菩薩敷七寶床五百女人各上衣以敷座上薩𨹔波崙菩薩敷座已求水灑地而不能得所以者何𢙣魔蔽令水不現作是念薩𨹔波崙菩薩求水不得於菩提生一念劣心異心則善根不增智惠不照於一切智而有留爾時菩薩作是念言我當自刺其身以灑地令無塵土來坌大師我何用此身此身必當破壞我從無始生死已來數喪身未曾為法即以利刀自刺出血灑地無異心故𢙣魔亦不能得便是時尺提桓因讃菩薩言善善男子汝精進力大堅固難動不可思議汝愛法求法最為無上善男子過去諸佛亦如是以深心愛法惜法重法集諸㓛德得阿耨菩提已上故知行者勇勤魔不得壞如𣵀槃六云汝等不應畏魔波旬若魔波旬化作佛身至汝所者汝當精進堅固其心降伏於魔時魔即當愁憂不樂復道而去已上復道而去者復本魔道而還去也與今全同兩土砂礫石枯骨木枝者經無此論亦不述今家所定有憑據或凖諸魔亂礙道法加此語耳問若求水無尚可尋餘處何出血灑答智論問曰不見水時何以不作是念當於何處得水灑地答曰薩𨹔波崙以先有水處即時皆無知魔所作是故自於四大分中刺水分灑地身中水種雖多血是命之所在故以灑地已上次我今下正難上來下結文意可觀第二若爾下正會難者所經中文有問答中若爾等者上來既許有邪三毒猶見實佛若爾所經中既有邪三毒感神鬼魔如何會通答中意凡夫三毒不覺是非作三業𢙣壞正見奉事神等此名內有邪三毒外感神鬼魔雖有邪毒親近知識發菩提心修諸善根正見不壞無神鬼魔縱有衆魔亦不得便諸佛外加道心內𤎼何有魔鬼而來惑也本西方淨土至有何優劣是第六問上來會經異破他謬解已竟自下西方𫥢相對辨勝劣等文意可了不須重釋本此處之優至當思勉勵答第六問文有三意一先明不及問釋二然前德下正釋優劣相三雖二處下誡二處行者互是非第一不及問釋者惣論兩處淨穢遙異苦樂洪別有識易知何勞更問是故為不足問然前德已具言優劣不須勞釋是故為不足釋有淨土之論者天台十疑云大有優劣且論二種又道綽四義於勝劣迦才三義辨得失矣今所指者多當十疑即云論故亦古師故綽禪師雖是古德不言論故迦才師雖是名論非前德故第二然前下正釋中亦三摽釋結釋中先列次釋文自為十二各有摽釋結耳第一化主優劣者都教主菩薩安養導師佛果因果位別故成優劣迹現凡夫者㫆勒菩薩從得初地乃至補處已經三十三大僧能得五百不退轉定久來離欲不所塵染無有道理生欲天中在人間受婆羅門種為是化凡夫示生人天故云迹現故大般若經云菩薩雖數安住微妙靜四種靜處及四無色而能捨還受欲界種雜穢下劣之身已上縱當成佛只現化身者縱許釋成謂縱成佛是應化佛不及報今在因何於佛已成正覺者蕳未成妙覺居處淨土者蕳迹現凡夫多現受用者蕳只現化身言多現者淨土教主通於報化而同性經淨土佛唯是報身若準此經淨土㫆𨹔多容報佛是故云多據實而論下設許本同以迹異㫆勒㫆𨹔俱是古佛有何優劣而為化物㫆勒降迹殊師弟道在果名師居因為弟問何以得知㫆勒古佛答觀音文殊等諸菩薩皆是本佛㫆勒亦爾是故縱許而論本實若細分別㫆勒㩲實未刊定經無故當成已下結尺當成現者結因果勝劣化佛報佛者結果成優卑覺滿未滿者釋上當成現成句當成未滿現成滿故現現妙者釋上化佛報佛句化佛現報佛妙故第二在處勝劣者𫥢穢土亦是欲界安養淨土亦超妙𭃯金石不可比雲泥安文耶第三眷屬勝負者𫥢男女安養唯男如法花云即往𫥢天㫆勒菩薩所於采女天中誤樂快樂女人苦器猒而有餘何同𫽄樂與純菩俱會一處少者非蕳於多第四壽命長短者𫥢四千年安養無量歲非只短促然亦死豈比𫽄樂無𫽄不今中者唯約處所不閞菩薩菩薩定壽四千歲必無中故俱舍云諸處壽量皆有中除北俱盧處彼定千歲此言諸處中者約處所非別有情以諸處中有別有情不中故謂住都史多天一生所繫菩薩及最後有菩薩佛記佛使隨信法行菩薩輪王母懷彼二胎時此等如應皆無中光記云諸處壽量皆有中唯北俱盧定壽千歲此約所居止處非別有情有別有情不中故謂住覩史多天一生所繫菩薩無始已來為多生死之所繫今唯一生所繫未得成佛故云一生所繫此菩薩定壽四千歲必無中最後有謂依此身定得無學名最後有若未證果必無中後成無學已亦有中佛記佛使謂事未終必無中事終已後亦有中事終已後亦有中隨信行隨法行謂在見道十五𭃯那必無中出見道已亦有中菩薩母懷菩薩時輪王母懷輪王時未生已來必無中後生已去亦有中此等如應皆無中已上問無上世尊猶有中補處菩薩何因不爾何諸佛出世不定機緣若𤎼速可成佛不可必滿四千歲壽是故㫆勒第九減人壽百歲時上生𫥢第十減初八万歲時下生閻浮釋迦人壽二万歲時𫥢天百歲之時降於人中二士一生時節長短加之當減四佛出世第十五減九百九十四佛出世此等菩薩何滿壽命答婆沙論云有唯都史多天壽量此菩薩成佛及瞻部州人見佛業𤎼時分相稱已上若依此理縱雖諸佛出世不定不可死謂菩薩有難思㔟令其長短必相應故真諦師云定壽四千歲盡可下生人中若佛出世時不相應者或數死數生尚住彼天或以別業延四千歲壽已上亦是演促劫智之力不可以人情憶度也佛有者或捨第五分壽或捨第三分壽是顯隂魔得最自在菩薩異之不可例同中有無法爾道理不可必依因果不同例如見道十五𭃯那使無中第十六心證果之後方有中又不必依果報勝劣北俱盧州無中上界諸天即有中因果中準可知第五內外差別者𫥢有內外院不同安養不爾純一不退內外雖異㫆勒眷屬故世親云師子覺是在外眷屬然生外院尚歸𢙣趣豈同彼九品俱不退準上生經及以彼疏內院即是窂度提願力造作外院即是諸天共造此皆莫非㫆勒菩薩威神之所加被也外耽五欲不免輪回者雜阿含三十一云人間四百歲是𫥢𨹔天上一日一夜愚癡無聞凡夫於彼命終生地獄畜生餓鬼中多聞聖弟子於彼命終不生地獄畜生餓鬼問內院有女人退緣何其不退答上生經云聞法解悟得不退轉同阿𭇥不生三𢙣上生疏云此經亦言諸有敬禮㫆勒如來聞名稱名暫觀毫光下至聼聞㫆勒所一句法義歸依生彼定不退於無上正覺無量劫罪皆盡消無量法運生長已上明知內院必是不退雖有女人無有欲事是故不退悲花經第四阿閦土云若有衆生聞此妙聲一切皆得離於欲心所有女人成就一切諸妙㓛德猶如𫥢天上天女無有婦人諸不淨事廣乃至若諸男子發欲心至女人所以愛心視須之間便得離欲心自猒離即便還去尋得清淨無垢三昧上生疏云雖有天女種侍衛或佛菩薩之所化為或實天女彼聞皆能不退之法猒欲過患必無退轉佛力所加心生決定豈由欲界即退耶已上覺師子道亞世親等者西𫭫記五云有聞二三賢哲每相語曰凡修行業願覲慈氏若先捨壽得遂宿心當相報語以知所至于後師子覺捨壽命三年不報世親菩薩尋亦捨壽時經六月必無報命時諸異學咸皆譏誚以為世親菩薩及師子覺流轉𢙣趣遂無靈鑒其後無著菩薩於夜初分方為內人教授定法燈光忽翳空中大明一天仙乘下降即進階𨓍敬禮無著曰尓來何暮今名何謂對曰從此捨壽命往都叟多天慈氏內衆蓮花中生蓮花開慈氏讃曰善來廣惠繞周即來報命無著菩薩曰師子覺者今何所在曰我旋繞時見師子覺在外衆中耽著欲樂無暇相𮨇誰能來報無著菩薩曰斯事已矣慈氏何相演何法曰慈氏相好言語莫能宣妙法義不異此然菩薩妙音清暢和雅聞者忘倦受者無猒又十疑云又聞西國傳云有三菩薩一名無著二名世親三名師子覺此人同生𫥢願見㫆勒若先亡者得見㫆勒誓來相報師子覺前亡一去數年不來後世親無常臨終之時無著語云汝見㫆勒即來相報世親去經三年始來無著問曰何意如許多時始來世親報云至彼天中聼㫆勒菩薩一坐旋繞即來相報為彼天日長故此處已經三年又問師子覺今在何處世親報云師子覺為受天樂五欲自娛在外眷屬從去已來惣不見㫆勒諸小菩薩生彼尚著五欲何凡夫為此願生西方淨土定得不退無此障故不求生𫥢也世親來報傳云六月論云三年餘大同矣問世親菩薩四加行位故摳要云筏蘇畔徒唐云世親無菩薩同母弟也位居明德道鄰𫽄喜言明德者即是𤏙位而師子覺道之者位應三賢不退何耽欲境忘道法答彼師子覺應十信居在退處著欲樂故十疑云諸小菩薩生彼尚著今道者資糧加行有次而論非言近續問義燈一云後九百年北天笁境富婁沙富羅此云大夫國有國師婆羅門姓尸迦有三子同名婆藪盤豆此云天親今云笩蘇畔度此云世親雖同一名亦復立別號第三天親於薩婆多部出家得羅漢果別名比鄰特婆比鄰特是其母名婆譯為子亦云兒長兄是菩薩根性亦於薩婆多部出家後得離欲思惟空義不能得入欲自𭣦身有賔頭盧阿羅漢在東毗提河觀見此事從彼方來為小乘空觀意猶未安謂理不應爾因此乘通往覩史多天咨問㫆勒菩薩為大乘空義還下思惟即便得悟名阿僧伽此云無乃至廣第二子亦於薩婆多部出家學多聞遍通憤籍神戈携朗無可為儔戒行精高難以為兄弟既有別名故法師但稱婆藪盤豆所餘因緣廣如本傳所依瑜伽論廣造諸論解釋大乘弘非空有及造此論已上若準此第三弟者獲得羅漢何生外院著欲樂耶答師子覺外亦有一子得羅漢歟或異耳問案淨土論及攝論偈世親願生安養淨土然何言生都史多天答菩薩死生皆順物機為利益故示現異也如大法鼓經上云佛記離車童子言佛𣵀盤後正法欲餘八十年作比丘持佛名宣楊此經不顧身命百年壽終生安樂國得大神力住第八地一身住𫥢天一身住安樂國已上亦如天台往生二途𪪺決云當知䡄物隨機順緣設化不可一準婆藪般豆德鄰無著者摳要一云無著菩薩亦登初地證發光定得大神通事大慈尊請此論已上既得初地故內凡菩薩鄰近也問無著若是地上菩薩者或身居報土何生𫥢答為引機故應生而已又為自𤎼故法身菩薩尚生化土增道生七地已前分假身又為本緣故無本屬㫆勒菩薩是故願生覩史多天也故知下釋成中造十𢙣者欲界諸天及鬼傍生人中三州十𢙣業道皆通成就現行二故俱舍云餘欲十通二餘文可覺第六色身美醜者𫥢五𮕱色身成變安養不爾恆常無𮕱或兩腋𣲇出或光明隱蔽者雖摽五種正舉二相二相正是身分𮕱減餘三只是身上嚴具今論色身故不也言五𮕱者佛本行集經五云爾時護明菩薩大士天壽滿已自然而有五𮕱相現何等為五一者頭上花萎二者腋下𣲇出三者衣裳垢膩四者身失威光五者不樂本座若依俱舍光明隱蔽小五𮕱攝大中不明故知此論依本行經或不論大小顯示色身著𮕱相若須此義亦依俱舍大小五相者論十云然諸天子將命終時先有五種少𮕱相現一者衣服嚴具出非愛聲二者自身光明忽然昧劣三者於沐浴位水滴著身四者本性囂馳今滯一境五者眼本凝今數瞬動此五相現非定當死復有五種大𮕱相現一者衣染埃塵二者花萎捽三兩腋𣲇出四臰氣入身五不樂本座此五相現必定當死光記引正理云五小相現非定命終遇勝善緣猶可轉故大五相現決定命終設遇強緣亦不轉故非此五相諸天皆有亦非此五一皆具惣集而故言有五已上𣵀槃十九亦五相次第雖異大同俱舍故無量壽下經而證第六天衆猶不能自下諸天推而可量粟散王者案仁王經世間帝王有其五種四輪王外皆名粟散拪復鈔云小王是粟散王粟者喻散者多也小王數多猶如散粟已上弘明集云䄅皇漢武閻浮提內唯王震旦五種王中粟散王劫初一番王也如日羅禮和國帝王亦粟散攝準釋迦譜及四分律從民主王至淨飯王凡有八万四千二百一十諸王於中即有轉輪聖王及粟散王欲知者往尋同夫聚墨以金山者文云百千万倍不相類等故作此喻第七相好有無者𫥢天人四八相有諸美醜安養聖衆三十二相悉皆具足第八神通差別者𫥢諸天五通不𬾨僅有報通不能越界亦無歷事安養異之一五通滿足二能界𫭫三遊供諸佛言五通者天眼天耳他心宿命如意身通若加漏盡即成六種此六皆稱神通者如瓔珞云神名天心通名惠性天心者天然之心也惠性者通達無得也毗曇亦云鄣通無知若去即發惠性當知天然惠性與六法相應即能轉變自在故名神通地持論云神謂難測知通謂無擁得意同瓔珞天心即是難測知義惠性即是無擁得義言報得者通有三種一生得通謂依宿習鬼畜等中有發神通二報得通謂勝果報諸天人等飛騰自在三修得通謂依靜慮修習所得定果神通釋籤六云有生得通如鬼畜等有報得通如諸天等有修得通如聲聞及諸外道已上問第五即是宿住通願乃至第十漏盡通願六通既具何云五通答漏盡通願諸師諍論九品義云問此第十願令彼土衆生得漏盡通耶答若依憬興師意應云得漏盡通故彼疏云想念者即所知障貪身者即煩惱障盡二障漏故若依法師意不必是漏神通故彼疏云第十念令不起漏染不起非必是漏盡通必從修而得不通生所得故前五通者皆通生得及修所得此中所多是生得生彼國皆能得故已上今論處但言五通不論漏盡實義難知文不故問若無漏盡者便悲花願故彼經云人天無別皆得六通以宿命通力乃至得知百千万億那由他劫宿世之事以清淨天眼悉見百千億那由他十方世界亦見其中在處現在諸佛微妙法以清淨天耳悉聞百千億那由他十方世界現在諸佛法之聲以他心智故知無量無邊那由他十方世界衆生之心以如意通故於一念中遍於百千億那由他諸佛世界周旋往反令是衆生悉解無我及無我所皆得不退於阿耨多羅三𦴭三菩提已上答諸師不會悲花本願膚才難測後哲酙試通之者悉解無我及無我所者同於壽經第十願意只除現起不斷種子然屬漏盡名六通者且伏惑上論斷㓛也雖有惑種不作𭓯如阿羅漢實能斷故若論實義惑障未斷非是漏盡是故諸師多由五通又準悲花應云六通雖言五通未漏盡故和尚云三明自然乘佛願彼漏盡明是漏盡通豈非有願今亦可然問漏盡必從修習而得若依本願應生所得如五通願皆生所得答雖假修成由本願故應速成就五通不須顯得智惠故唯生得不可類例斷惑證理第九不善起不起者𫥢諸天起不善心內有煩惱故外遇境界故菩薩無願故安養衆生不起染心雖內有煩惱由無外境故㫆𨹔有願故所言願者第十不起想念願也第十罪多少者一稱㫆勒名除千二百劫生死之罪一唱㫆𨹔名八十億劫生死之罪舉五十劫及百億劫因便兼列非文正意故要集云十罪多少謂稱㫆勒名除千二百劫罪稱㫆𨹔名除八十億劫罪已上問㫆勒稱名罪何劣於彼禮敬答機緣不同教非一又稱名云若一念頃禮不論時應是多時第十一受樂差別者𫥢苦樂憂喜受間安養不爾無有憂苦第十二受生不同者𫥢生膝上懷中安養宿華裏寶殿膝上者俱舍論云隨彼諸天男女膝上有童男童女欻然化生即為彼天所生男女懷中者瑜伽第五云又一切欲界天衆無有處女胎藏然四天王衆於父母肩上或於懷中如五六歲欻然化出上五天如次如六七八九十歲已上花裏寶殿二類生相謂疑佛智生於宮殿信心淨者託於寶花若邊地類攝入三輩花裏約外宮殿就內九品義云彼經云處宮殿者是望內相此經云在蓮花者是約外相謂於花中經多時彼便謂處廣大宮殿又往生者或居宮殿或在蓮花人不同彼經取宮殿此經據蓮花各據一邊已上邊地三輩攝不難知略以十二下結得失不盡第三雖二下誡是非中二先直誡次何但下明失益生本諸有學者至請除其惑是第七問前辨勝劣就勝卑下恐其難生知足穢土亦是欲界同一繫地業惑易感安養淨𫭫亦是殊方凡夫修業恐難得往駑蹇之乘不千里之途斗筲之子不秉一天之重遠望淨𭃯復以如斯捨易求難豈非迃滯是以下引現證責僧史所載道安真諦及玄等古今碩德咸謂難生作𫥢業今何勸彼本此疑也誠至請審詳之答第七問文即有三一先述難詳旨歸二然尋下正釋所疑三上來下結歸淨土第二釋中二先摽同異次一觀下隨釋初釋十五同後釋八種異文各有摽釋結問唯述異門可令知易何並辨同答執者偏謂西方難生為破其情先明同門既十五同猶不可言西方難生有八異易義㫆著故下文云上來同文十五猶不可於難生異有八門而乃言難生問前十二勝劣與今八種異門有何差別答彼直辨二處勝劣是更述往生難易其義遙異不可混亂第一觀行同中思惟𫥢卒者為定為散若言散善既同觀經寶樹等觀若言定善何感欲界散地之果答是散善攝欲界業故經言思惟蕳其修惠定散雖異思惟義齊故云觀同問觀彼依正可得罪若言罪境是有漏不可罪例如日水境有漏故不罪若言不何得不退生菩薩處答可有罪菩薩住處故㓛德所成故日水罪人師諍也彼雖不不可例此日水非是㫆𨹔依報亦是假觀非正觀故彼宮殿等菩薩依報亦是正觀非假觀故又一義云不可罪有漏境故但繫念思惟潤生於彼處為是益故教令思惟故彼經稱名等行能罪障觀宮殿等不云罪已上二義俱未定第二持戒同文意分明第三十善同中思惟十善行十善者思惟十善所具㓛德名為思惟直行十善名以為行又於十善有止作二門故智首云十善有二一止十善謂三業令不造𢙣二行十善謂放生布施禮敬實語軟語和合語饒益語不淨觀行慈悲住正思已上思惟止𢙣名思惟善正行十善名行善也若泛論者此之十善通於三界及不繫法故通能為天淨土業故瑜伽云若十善道通三界及不繫通無漏故第四懺悔同中鼓音聲等者經不懺何證同義故彼經云十日十夜六時專念五躰投地禮敬彼佛堅固正念悉除散亂若能念佛念不絶十日之中必得見彼阿𨹔佛答五躰投地時容有懺悔心如上生經言五躰投地誠心懺悔觀經亦言五躰投地求哀懺悔又觀佛經言五躰投地如太山崩向佛懺悔此等經多五躰投地懺悔䡄則故今證也第五造立形像同中有為㓛德者𢝰論有為無為㓛德二空妙理無為㓛德名勝義善無漏四智及以有漏造像等善有為㓛德名自性等三種善根依他性攝有因緣作故名有為然偏所以造像等善名有為者是緣因種成化菩提若觀行等惠名先故是了因種剋證無為從果立名故緣因名有為㓛德了因亦名無為㓛德若約當躰了因亦是有為法也又緣因是有為本故別名有為非對了因名無為也第六聖同中㫆勒菩薩來此人者問要決云捨生不同者捨命生天無人攝若生淨國聖衆來如何相答要集雖載兩釋不同不能通釋今論據經無有過失試以二義會要決文一㫆勒無來願故攝引之力非是最大故且屬無如小力名無力小塧言無塧二菩薩來不如佛嚴重略有四異一化主勝劣菩薩小身三十二相好不圓佛廣大身八万四千妙相嚴顯二光明勝劣菩薩唯放眉間毫光佛放遍身無數光明三眷屬勝劣菩薩與天子俱來佛與化佛菩薩俱來四散華勝劣菩薩唯雨𭦗𨹔羅花佛兩種微妙寶花餘絃管等䡄則優卑準可知且出四種𬾨不可計呼劣屬無非適于今如𢙣子名無子賤人言無人自下九同文義分明次釋八異中一願有無者先釋次㫆勒別無令攝衆生知足願無願猶如自浮度水㫆𨹔既發四十八願攝引凡夫有願亦似乘舟而遊今言願者廣指攝取凡夫本願又要集云一本願異謂𢏏𨹔有接願㫆勒無願接言似來願若接凡夫廣名引接要集亦不可來問𢏏勒何無攝凡夫願答菩薩因願應對果成知足暫是一生所繫何為彼天設本願耶故三部經不其義問觀音普賢花聚山海等所發誓願因位成利㫆勒盍爾答彼遊方士久住大悲不事成佛故所發願多對因中㫆勒即是釋迦補處僧行滿併待果成是故不彰對因之願準婆娑㫆勒不明因行現居因故釋迦不專果成現在果故若爾雖有對因本願一假化不而已二光明異者先釋次𫥢行者慈氏神光不來攝受修西業者㫆𨹔白毫及毛孔光項上圓光一相好所放光明皆照十方念佛衆生攝取不捨喻可知問上經云㫆勒菩薩放眉間光何無光攝答彼接䡄儀非恆時護念㫆𨹔光明難思別益從平生修至臨終攝取護念片時不捨安得比類三守護異者文有法易覺知矣四舒舌異者先明舌證有無次如𫥢下立理而責五衆聖異者二聖發願獨在淨土花聚願者方等𨹔羅尼經三云爾時花聚菩薩即於佛前而自立誓若有衆生憶念我名日夜六時念不縱求生妙樂世界若不往生者我終不成等正覺山海惠願者十往生經云佛告海惠菩薩汝向所問阿㫆𨹔佛國有何妙樂一切衆生皆願生彼如汝所見其事如是時山海惠菩薩白佛言世尊我等今者願一切衆生皆悉生彼然我等亦願生彼佛記之曰正觀正念正解皆悉生彼問花聚本願何必極樂彼經上云我從東方妙樂世界為佛所遣故來救此雷音比丘令住堅固故求生妙樂者應是東方妙樂世界何云𫽄樂答經下文云爾時花聚即以右手接取西方妙樂世界舉著空猶如大士取阿摩勒果置於右掌無所妨得爾時大衆遙見西方妙樂世界河池華樹莊嚴之事無不明了爾時大衆歡喜踊躍至心禮敬無量壽佛各求生妙樂世界已上發願已後攝取𫽄樂令時大衆至心求生故知所願妙樂世界西方𫽄樂也東方妙樂世界者舉從來方非所願界彼經𢝰以十方世界名為妙樂於中所願即應西方問與守護異有何差別耶答彼惣明化佛菩薩等護念是別明一雨菩薩別願守護故分為二六罪異七重𢙣異文意易了八教異者如執者𫥢易生西方難往而經無唯是人情無量壽經既𫽄樂易往上生經等不𫥢易生故名教異文為二意先明情量難當佛意次然無下證而明淨土易生初中此乃等者顯示只是人情竟無經縱使下舉聖凡道窮四果尚昧衣珠者法花五百品云以無價寶珠繫汝衣裏今故現在而汝不知已上斯乃五百羅漢不知信樂慙愧衣裏繫於一乘寶珠位階十地猶昏羅者最勝疏云入十地菩薩妙觀察智障如羅此即由有細所知障已上唯識疏云第十地菩薩雖皆遍有可名為圓未清淨故知羅中觀月等故不名為明已上唯識論名佛果出障圓明位第十地雖分究竟餘習尚有如隔羅而觀諸色入道章云大階等覺月猶迷小位聲聞衣珠尚翳與今全同同諸摸象者𣵀槃三十二云如有王告一大臣受王勑已多集衆盲以象示之時彼衆盲各以手觸大臣即還而白王言臣已示竟爾時大王即呼衆盲各同言汝見象耶衆盲各言我已得見王言象為何類其觸牙者言象形如蘆茯根其觸耳者言象如箕觸其頭者言象如石其觸𮮱者言象如杵其觸腳者言象如木臼其觸背者言象如床其觸腹者言如甕其觸尾者言象如繩善男子如彼衆盲不象躰亦非不若是衆相悉非象者離是之外更無別象善男子王喻如來正遍知臣喻方等大𣵀槃經象喻佛性盲喻一切無明衆生如彼盲人各象雖不得實非不象佛性者亦復如是非是即六法不離六法五隂及我名為六法經喻不知佛性今不辨聖教不知義同故得借用司南語者常言指南律抄枇花嚴寺大覺造云濟曰如漢時諸人皆作指南車並不得躰或指東或指西唯𪯹乎子作獨南也案書中指南車起於黃帝與尤戰於琢鹿之野尤作大霧兵士迷於四方帝作指南車以示四方已上資持記云古有作指南車亦名司南以示迷方者餘文可了不須重解
