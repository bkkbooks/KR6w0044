body:
  text: 本佛藏經至諸佛訶責是第一問上來料蕳得生惑業起不起相已竟自下雜明業行徃生等種義文即有二一直引佛藏經誡有所得二今既下准經正難先引文中汝當念佛等者顕示有所得行謂教六念有相行令觀𣵀槃是無相行二行雖異愛執即生名有所得若執有相是增益執亦名常見若執無相是减執亦名断見今言六念者如文所列𣵀槃第十八及大般若三百七十智度論第二十一廣明其相欲知尋披然此六念增减不同或八念更加念死念入出息或十念更加身随念寂靜念如是教者名為邪教等者事理二行雖是妙善為破有執且属邪教乃至供養名行魔教如般若以色聲求即是邪道又𣵀槃云若有得是魔眷属非我第子無所得義令如是等無量眾生離魔眷属為佛弟子智度論云除諸法實相餘皆是魔事與今意同又言寧成下重引經文顕示我見及隂等見皆有所得謂我見等者示人我見類即有四種一我見五隂差別一隂是我如是妄取是名我見二眾生見身相續不断作實生執名眾生見三壽見命根断復生六道於此妄執名壽者見四命見一報命根不断住故執名命見金般若論明四種我相即今四見也泛述我相種非一謂亦名有情亦名意生摩納迦養育者數取趣命者生者合有八種依大般若更加士夫作者受者知者見者合有十三是皆世間種之我相亦有聖教所我相謂預流果一來不還無學聖者二十七賢十三位聖三乗十地即是教中種我相此兩種我皆人我攝問世間我順己妄情聖教我有何益耶荅是䟽問荅即彼釈曰由四緣故一言易故二順世間故三者能除無我怖故四有自他染淨信解事業等故隂入界見等者示法見類執三科法躰是實有此並等者述引文意謂此二文並為有所得心作念佛等世尊作此種訶責或名邪教及言寧成五逆罪等又並者語一訶責並義名多故下述云作此種即此經等者向已引教誡有所得自下重引同經成勸無所得我先受者是邪教者方今聞無所得法故覺前所受有所得法即是邪見問何名有所得無所得荅我者常一主宰義所謂執有堅實自性即名為我若計自性必有所得理無情有故云有所得若解識變諸法皆因緣作非有似有如夢等境無實所得情有理無故云無所得故𣵀槃第十七云復次善男子無得者則名恵菩薩得是恵故名無所得有所得者名為無明菩薩𣱵断無明闇故無所得是故菩薩名無所得復次無得者名大𣵀槃菩薩安住如是大𣵀槃中不見一切諸法性相是故菩薩名無所得有所得者名二十五有菩薩𣱵断二十五有得大𣵀槃是故菩薩名無所得復次無得者名為大乗是故名無所得謂有所得者名為聲聞辟支佛道菩薩𣱵断二乗道故得於佛道是故菩薩名無所得復次無所得者名方等經菩薩讀誦如是經故得大𣵀槃是故菩薩名無所得有所得者名十一部經菩薩不修能方等大乗經典是故菩薩名無所得復次無所得者名為空世間無物名空菩薩得是空三昧無所見故是故菩薩名無所得有所得者名生死輪一切凢夫輪廽生死故有所見菩薩𣱵断一切生死是故菩薩名無所得復次無所得者名常樂我淨有所得者名無常無樂無我無淨菩薩𣱵断是無常等名無所得復次無所得者第一義空菩薩觀第一義空心無所見有所得者名為五見菩薩𣱵断是五見故得第一義空名無所得已上雖文廣能離我法名無所得二執滯情名有所得餘文可解不湏重釈本諸佛法至逗根機者荅第一問文即有二一初至逗機不同惣明機冝不同故法成八万讃途異用捨𭆤差二然即佛有至相好之躰正明為深學教無所得為其初心勸有所得及為示理事隨所欲三當湏下結明不可生於讃第一惣明中諸佛法皆為逗機等者顕示隨情法難可思議謂機有淺深大小不同惑有人法見修差別故佛陳應法化彼物機為後學深機呵有讃空為初學淺機空有或為大機令小學大或為小機令先學小後學大乗論甘則忘𨐌好則非素豈遂不從事哉夫深淺者大乗機中初後差別大小者小衍相對分別而已明惑相中人者人執法者法執見者見惑修者修惑二執為本能起二惑本未並論故云人法見修差別問何故今論惑差別耶荅惑有差故令機不同故囙明機兼明惑相但諸本中言或人等若依此本人法見修便所學法謂人法二空名為人法見修二道名為見修此乃並舉機法二種令知法要化物機也問應謂為小機令大學小而何故言令先學小乗後學大乗例如言為大機小學大小機中有後不學大終入無餘何荅若約小機誠如所難大學小若約佛意唯必在大豈令眾生大取小故法花云雖示種道其實為佛乗意明欲引入其大乗也但如下出讃空有相違經誡勸大小相經此經所者指佛藏經餘有聖教者無上依經云佛告阿難一切眾生若起我見如湏𢏏山所不懼何以故此人雖未即得出離常不壞囙果不失果報故若起空見如芥子我即不許何以故此見者破表因果多墮𢙣道未來處必背我化已上此兩經名空有相即述上淺深次法花及十輪經者此兩經為大小相即述上小衍小乗三藏者蕳大乗三藏法華明四安樂行中遠離十種小乗者是其隨一故而言不得親近玄賛引天子所問經云佛告天子如貧人食是輪王毒故二乗者持戒精進即是菩薩破戒懶堕故不應親近來為法不悕親近利敬已上但天台意者小乗三藏者未必對大三是直名耳花嚴法相對大名小恵𮏑法師立四種失難於天台一涉大乗失謂若有三藏則名三藏教大既有三藏何不名三藏二大無三藏失謂但小乗名三藏有大乗無三藏失三特教主失謂經既云貪着小乗三藏學者以小乗言為能別故知亦大有三藏四有無不定失謂若如一切有部立三藏故小可名三藏若如經量部不立三藏故不可小乗定立三藏守護章引之會玄賛亦許大乗三藏素怛覧者謂大乗經是帯意趣未决法相帯意趣者雖是甚深而随情故所法門猶有相謂空言中或遍計都無名空或依他假有名空或圎成離眾相名空雖同空亦𭇥有義所謂遍計雖是理無而情即有依他性理有情無圎成實性妙有真有為遣著相約離眾相假空無如是等故一門皆帯別意趣難暗其意學者為之多生解如俱舎言素怛覧言囙別意趣阿毘達磨依法相言毘尼者大乗所明三聚十重等大戒也阿毘曇者如來所三藏法中阿毘達磨方為根本亦可通於菩薩所佛所者解深蜜經阿毘達磨經等是也雖是經典性相决釈究竟了教不同素怛覧帯於意趣所謂顕了都無䨱相有如有無如無事為事理為理乃至淺深輕重大小自共相等一所無有相是為定極奥藏妙教佛意盡故法相顕故是名大乗菩薩三藏𭩮攝論一云此菩薩藏凢有幾種亦有三種謂修多羅阿毘達磨毘那耶此三由上下乗差別故成二種謂聲聞藏菩薩藏此三及二云何名藏由能攝故此攝何法一切應知已上對法第六又於大小各立三藏全同攝論明知論藏亦許大小俱有三藏問為佛在世有三藏名若言有者智論一百云佛在世時無三藏名但有持修多羅比丘持毘尼比丘持摩多羅迦比丘若言無者法花經云貪著小乗三藏學者荅同論云未有三藏部別之名要是結集之時載於文記當得藏名雖無藏名亦有修多羅等名故即云但有持修多羅比丘等若尒何故法花安樂亦不親近小乗三藏學者故知佛在時已有三藏名解云如來玄記其名非謂已有如五部名別佛亦其記已上十論經無力餘池者彼經第六偈云無力飲池河誰能吞大海不習二乗法何能學大乗先信二乗法方能信大乗乃至廣第二正明機法相順中亦二先顕示初學後學異故觀於法身色身不同於中佛有真應二身等者惣明二佛兩機自行二身名為真身化他二身名為應身如瓔珞經等二種之身第一記釈但今論唯法身名真次下言法身深妙離有離無等故變化之身名為應佛次下言初學之軰觀彼色身三十二相八十隨形故若廣論時自他受用亦可通念然法身下別明深學念法身四句並已者四句繁多中論偈云諸法不自生亦不從他生不共不無因是故無生是則名為自他共有無囙四句對法論云不從自生者謂一切法非自所作彼未生時無自性故不從他生者謂彼諸緣非作者故不從共生者謂即由此二種囙故非不自作他作囙生者緣望果生有㓛能故又不差別謂待眾緣生故非自作雖有眾緣無種子不生故非他作彼俱無作用故非共作種子及眾緣皆有㓛能故非無囙生是故如是自種有故不從他待眾緣故非自作無作用故非共生有㓛能故非無因若緣起理非自非他遣雙句者猶為甚深𢙢惣亡四句是故緣起㝡極甚深已上四句推驗諸法無生此無生理即名法身准佛地論離空離有離異離盡所謂法身其躰實故離断無謗此名離空非遍計有離建立謗此曰離有空有而非空有相故名離異謗遍一切處為諸法躰故号離盡謗或有相無相亦有亦無非有非無或相即相離亦即亦離非即非離或生常住亦常亦非常非常非無常如是等句不可勝計先意知矣今似且出第三四句言離有離無故一切四句在迷情則皆非在悟情則皆是故義林章云由此應言迷情四句四句皆非悟情四句四句皆是已上今迷句故云並亡百非俱𬽐者無量義云其身非有亦非無非囙非緣非囙他非方非圎非長短非出非沒非生乃至廣是為真身深妙之相然深學士安住此理心不驚動淺識著相不亡分別故佛藏經令除二執訶有所得觀無所得若初學下別明初學念色身謂初心士觀無所得即成二失一未解安心失蕳上心不驚動真如實相第一義諦未曾揞心故云未解安心解猶不及行證乎二𢙣取空失蕳上令除二執觀無所得言因果寂不心怖罪更起蓋纏故云𢙣取空大空藏經云若起𢙣見名第三波羅夷云何𢙣見或得空解𤼵少智恵師心自樹謂證無生見心即強能破諸法無佛無生撥諸囙果一切皆空何者有罪何者非罪若有分別即礙即非真於貪欲中莫生怖礙無怖礙故即是菩提豈有觸與不觸男女等相即便抱執鳴吸乃至犯四重造五逆㤙德𢘻壞慈悲捨見行善言有所得欺之如土不知俗會真無弁事融理而自於己惜身惜命求財求福如此癡空不空身命祝念吉祥平等實空豈如斯哉當知邪僻空心甚可怖畏若墮此見長淪𣱵沒尚不得人天果報何大𣵀槃耶故止觀第四引論云大聖空法本為治於有若有著空者諸佛所不化又引經云於諸法生疑心者能破煩𢙉如湏𢏏山若空起見不所化已上是名初心解空僻取若不為其廣善𢙣因果淨穢差別等事何能𤼵善心𢙢怖罪障乎意馬未馴鈍牛徒𭷣故示以色身勸以相生也故賢護經者此下引經證為初後機勸法身色身念佛先引賢護如是思惟随何方所者顕示諸佛在十方故行者先可思惟觀念何方故經曰獨處空閑如是思惟於一切處隨何方所即若西方等者顕示行者思得西方故彼經曰即若西方阿𨹔如來應正等覺是人尒時如所聞已應自作如是想念如我所聞彼阿𢏏𨹔如來應供等正覺今在西方經途去此過百千億諸佛國土彼有世界名曰極樂如是如來今現在彼處大眾中法教化然而是人依所聞故繫念思惟觀察不已了分明終獲見彼阿𢏏𨹔佛已上如是觀色身者今所引文𢝰示可觀彼佛色身下文具明端坐繫念專心想佛必見彼佛應正等覺若於晝時不能見者若於夜分睡夢中阿𢏏𨹔佛必當現也此等之文今不引盡故云如是向下又有經言者彼經下文又有經明色相觀及無相觀下猶亦有經言不盡故云向下有經如宗鏡言向下更廣開釈非向下字為前句未更捐別經云有經言也故彼下明成三昧人重請問其所見佛言世尊是中云何念佛精勤修習得生此𭃯耶時彼阿彌𨹔佛復告彼言汝若今欲正念佛者當如是念今者阿彌𨹔如來應正等覺具有如是三十二相八十隨形好身色光明如融金聚具足成就眾寳輦轝放大光明㘴師子座沙門眾中如斯法其所者謂一切法本來不壞亦無壞者如不壞色乃至不壞識等諸隂故乃至四大十二入等壞不壞如是如是乃至不念彼如來亦不得彼如來彼作如是念如來已如是次第得空三昧已上言色已者捐上色觀色身訖故經云彼作如是念如來已如是次第等者捐上法身故經曰如是次第得空三昧知彼經對初後機如次教令色身法身論第七卷引今文竟云以此准知前是阿𢏏𨹔佛色身即是觀報化色身念佛三昧也後得空三昧即是觀法身念佛三昧也已上問得空三昧無有所見何見諸佛如住生法二空觀時一切境皆不現前荅此人本解色不背空即是色故雖觀空得見十方諸佛色身無有其妨三力相加諸佛現前如明眼人清夜觀星故般舟翻而為佛立彼經亦名現在佛立定經修理觀人不觀色佛諸聖教不可不慎二空觀時諸境不現者根本智𤼵證真如時今空三昧非必證位也又觀佛者今所引文畧觀法身經通色相舉後顕初故要集中引今論已下即註曰觀佛經第九觀佛一毛乃至觀具足色身已有所引之十力無畏三昧等文也已上作此註意是為顕示今論所引觀佛經文初色觀後明理觀故非唯明法身之觀亦通色身之觀也若無註文後學恐誤謂所引文唯法身故註令知應見要集尋常念相亦有法身者即法身十力等者不共㓛德是其報身亦名法身以不共法為自躰故二身俱非初心境界故云如是妙處非凢夫境亦下結云後學之徒念法身佛即此義也如十住論云新𤼵意菩薩先念佛色相躰相業相果相用得下㔟力次念佛力無畏等四十不共法心得中㔟力次念實相佛得上㔟力同偈云不貪着色身應身法身亦不着報身善知一切法永𥥤如空法身是於力等立法身名也相業者三十二相囙如𣵀槃二十六師子孔問云何得佛三十二相佛囙廣荅業各不同智論第五明三十二相業有共有別相果者四八相如無量義經及彼論第六束而為頌觀佛第一智論第五廣明其相躰者能變心躰相用者各利他用四十不共法者彼論第六念生身三十二相已次念法身㓛德法謂四十不共偈云諸佛是法身非但身故佛法雖無量不與諸人共已上下以偈言束頌四十謂六神通三波羅蜜三輪十力四無畏等具如彼論廣分別之地持成就品明一百四十不共謂三十二相八十種好十力四無畏三念處七無上智論等文十八不共十力四無畏四無㝵大悲三念處為四十不共云云言十力者佛有二力一身力二心力言身力者等那羅延亦有二如俱舎論今十力者即是心力一處非處智力處謂道理非處翻此如善因能感愛果造不善業能招𢙣果斯有是處如善因能感𢙣果造不善因能感愛果必無是處佛智能知處非處名處非處智力處智之外非處智寳䟽引正理云為無因外道之計即處智為𢙣因外道之計非處智畧抄又對法論云處非處智力者謂依止靜慮於一切種處非處智具足中若定若恵及彼相應諸心法一切種處非處智具足者謂於一切種囙非囙智無着無礙現行中所有三摩地等又云由處非處智力折伏一切世間無因論者𢙣因論者宣無倒增上生道諸外道等於增上生或謂無囙或謂自性自在等為因故名無因𢙣因論已上二業異𤎼智力知如是業感如是果顕宗論有兩初云謂若分別如是類業感如是類諸異𤎼果無𦊱礙智名業異𤎼智力此如俱舎業果俱知即得名為業異𤎼智次云或名為自業智力謂善分別如是類果是自所造業力所招非妻子等所能與如是類業必招自果不可貿易無𦊱㝵智名自業智力此雖亦似知業果知業為本故得名為自業智力婆娑論名為業法集智力業則是因法則是果集通因果業是能集故集通業法是所集故集通法是故集言通業法二與俱舎論名異義同又對法論云自業智力者諸於一切種自業智具足中若定若恵及彼相應諸心法於一切種自業智無著無礙現行中所有三摩地等又云由自業智力折伏一切世間不作而得論者無倒宣善趣正道諸外道等謂不作業自然得異𤎼故名不作而得論已上三靜慮解等持等至智力光記曰靜慮謂四靜慮解謂八解等持謂三摩地等至謂八等至此等並是定之異名智能如實知靜慮等名靜慮等智力已上婆娑論云此智通緣三性諸法所以者何若如緣彼無相定者必緣加行所起不善或緣障定染無記法故得名為三性之法又對法論曰靜慮解三摩地三摩鉢底智力者謂於一切種靜慮解等持等至智具足中若定若恵及彼相應諸心法於一切種靜慮解等持等至智無著無礙現行中所有三摩地等為躰故又云由靜慮解等持等至智力悟入一切有情心行心所修行故名心行已上四根上下智力能知眾生等五根有上下故亦知中根別不言者待對勝劣既知勝上劣是勝攝豈不得知劣根耶故顕宗云雖有中根而待勝劣是劣勝攝故不別顕已上問此智亦緣断善根者若言緣者断善身中無有成就信等五根此智是名緣信等根何緣断善若不尒者婆娑論緣断善者荅断善身中雖現不成信等五根惣相續中亦有過未信等根故彼智能緣去來信等故顕宗云断善根者惣相續中亦有去來信等善法又對法論云根上下智力者謂於一切種根上下智無著無礙現行中所有三摩地等又云由根上下智力悟入一切正法器以信等根若善成就能為法器故已上五種勝解智力光記云勝解即是心所法故顕宗云若如實知諸有情類意樂差別無𦊱㝵智名種勝解智力又對法論云種勝解智力者謂於一切種差別勝解智無著無礙現行所有三摩地等又云由種勝解智力悟入一切勝劣意樂已上六示種界智力光引顕宗云若如實知諸有情類前際無始數習所成志性隨眠及諸法姓種之差別無𦊱㝵智名種界智力應知此中界與志性隨眠法性名之差別已上又對法論云種界智力者謂於一切種差別界智無著無礙現行中所有三摩地等又云由種界智力悟入一切可破隨眠諸煩𢙉性已上七遍趣行智力光引顕宗云謂如實知生死因果及知道無𦊱礙智名遍趣智力已上一切諸行皆能趣果名遍趣行又對法論云遍趣行智力者謂於一切種遍趣行智無著無㝵現行中所有三摩地等又云由遍趣行智力悟入一切大小乗教法所攝境界已上八宿住隨念智力能知過去宿住事故言隨念者光記云以念強故此中別摽隨更事念故名隨念已上又對法論云宿住隨念智力者謂於一切種宿住隨念智無著無㝵現行中所有三摩地等又云由宿住隨念智力悟入一切資糧前生所集聖道因緣是名資糧已上九死生智力能知眾生此死生彼又對法論云死生智力者謂於一切種死生智無著無㝵現行中所有三摩地等又曰由死生智力悟入一切當來㓛能性已上第八第九二力差別者光記引顕宗云謂如實知自他過去宿住差別無𦊱㝵智名第八力若如實知諸有情類於未來世諸有相續無𦊱㝵智名第九力十漏盡智力言漏盡者謂𣵀槃択緣漏盡為境名漏盡智力或漏盡身所得智故名漏盡智又對法論云漏盡智力者謂於一切種漏盡智無著無㝵現行中所有三摩地等又云由漏盡智力悟入一切三界出離由如是悟入已随其所應宣解出世聖道已上此十皆名力者一善能降伏謂伏薀等四魔故二善能記別一切問論謂於處非處乃至漏盡一切處所有問論記別無滯㝵故又光引顕宗云此後三力即是三通以六通中此三殊勝在無學位立為三明在如來身亦名為力神境天耳設在佛身亦無大用故不名力且如天眼能見有情善𢙣趣中異𤎼差別由此能引殊勝智生亦正了知能感彼業由此建立死生智名神境天耳無此大用是故彼亦不立為力然不別他心力者義已攝在根等力中以他根等中有心所故已上天眼所引殊勝恵名死生智通三明六通至第七卷具明之矣四無畏者一正等覚無畏謂佛自言我於諸法正等覚者而天魔等立難即言如來世尊於如是法非正等覚佛於是事正見無畏故得安穩無怖無畏對法論云正等覚無畏者謂依止靜慮由自利門於一切種所知境正等覚自德号建立具足中若定若恵及彼相應諸心法如經言我是正等覚者有世間沙門婆羅門若天魔梵依法立難或令憶念言於是法非等正覚我於是事正見無緣以於此事正見無由故得安穩住無怖無畏自我處大仙尊位於大眾中正師子吼轉大梵輪一切世間沙門婆羅門若天魔梵所不能轉已上二漏盡無畏謂佛自言我於諸漏已得𣱵盡若沙門等立難即言佛於諸漏未得永盡佛為通釈無怖畏故對法論曰謂依止靜慮由自利門於一切種漏盡自德号建立具足中若定若恵及彼相應諸心法如經言我諸漏永盡如是等廣如前如前正等覚無畏更可例知三障法無畏佛言染法必能為障䨱善若外難言染非能障佛為通釈無怖畏故對法論云依止靜慮由利他門於一切種障㝵法自德号建立具足中若定若恵及彼相應諸心法如經言又我為諸第子障㝵法染必為障乃至廣亦准前無畏應知四出苦道無畏謂佛言於道必能出一切苦若外難言道非出苦佛為通釈無怖畏故對法論曰謂依止靜慮由利他門於一切種出離道法自德号建立具足中若定若恵及彼相應諸心法如經言又我為諸弟子出離道諸聖修習决定出離决定通達設有世間沙門婆羅門若天魔梵依法立難或令憶念言修此道非正出離不正盡苦及證苦邊我於是事正見無緣乃至廣記已上舉要言之荅難無懼故名無畏前二是自利由智断差別故後二是利他由遠離所治法修習能治法故光引婆娑云如是所十力四無所畏一一力攝四無畏一無畏攝十力故則有四十力四十無畏然前初無畏即初力第二無畏即第十力第三無畏即第二力第四無畏即七力者依相顕理實世尊成就四十力四十無畏依根本但言成就十力四無畏問何故於恵立無畏名荅俱舎論云此無畏名目無怯懼由有智故不怯懼他故無畏名目諸智躰已上無畏即是智所成故名諸智躰非躰即智故彼論曰理實無畏是智所成不應言躰即是智正理論曰應言無畏是智所成理實應然但為顕示無畏以智為親近因是故就智出無畏躰夫無畏者謂不怯懼由有智故不怯懼他故智得為無畏因性已上於如是十力四無畏俱舎婆娑以智為躰對法論通取助伴心所法以為躰性各有其義非互也三昧解者是三解門無漏三種等持能與𣵀槃為入門故名解門一空三摩地謂空非我二種行相應等持光記引婆娑一百四云對治故者謂空三摩地是有身見近對治故問空三摩地有空非我二行相有身見有我所二行相此中以何等行相對治何等行相耶荅以非我行相對治我行相以空行相對治我所行相廣如彼已上二無相三摩地謂緣諦四種行相應等持𣵀槃離十相故名無相緣彼三摩地得無相名十相者何謂色等五男女二相三有為相住無為故不之三無願三摩地謂緣餘苦集道諦十種行相應等持言十行者苦二行相謂非常苦加集四行及道四行便成十種苦集二諦皆是有漏可猒患故道雖無漏加行位中並作是念道如舩笩方應捨故能證彼定得無願名皆為超過現前所對苦集道境可猒捨故空非我行相非是所猒非是所捨以與𣵀槃相似故此二行相不名無願由前期心不願此故立無願名故光引婆娑云期心故者謂無願三摩地諸修行者期心不願期心不願三有法故問彼於聖道亦不願耶荅雖於聖道非全不願而彼期不願三有聖道依有故亦不願問若尒何故修聖道耶荅為趣𣵀槃故修聖道謂修行者作是思惟究竟𣵀槃由何趣證思已定知必由聖道故雖不願而要修之如越暴流要𠗦舩笩廣如彼論已上大乗明義唯識章云瑜伽等中明離繫之方便亦名三解門離繫者解義即究竟果方便者門義即因位本後二智清素云能觀之智離繫故名解門謂此三智是入淨土之所由處故名為門空者是境解門者能智名隨境立名故言空解門餘二准之問其空等境躰名何物荅此有二義一云若約偏增所執為空境依他名無願境圎成為無相境遍計所執躰性都無故名空依他不可願求故名無願境圎成離十相故名無相境此依瑜伽一相義也二云空等三境各通三性遍計所執無我所故名空境不可願故名無願境無十相故名無相境依他起性無我所故名空境不可願故名無願境無遍計執種相故名無相境圎成實性無我所故名空境離諸戲論無願求故名無願境無十相故名無相境具如唯識論第八并䟽等弁諸神通者廣指六通非汝凢夫所學境界者歎德難思非不為境故次文云復當繫念佛㓛德故知下結觀佛經意同賢護故云故言等也二又樂觀下明順機欲謂樂觀理示以無相欲念事佛以相好佛𨹔化物必任機情若機欲能成利益無有是處𠒎脛雖短續之則憂鵠脛雖長断之則悲鍳性長短法王神德耳若互者獲罪無窮如二人洗父之脚便令折寧真子耶本十方淨土至示世界耶是第二問文相分明不湏重釈本此有三尺至修淨業也荅第二問文有其二一約勸不勸分別二又經下就了不了解釈第一文中二先摽次釈自三義起盡可見一明有無勸中如𣵀槃曰過四十二恒河沙世界者或本云三十二恐字闕一點安樂集亦云四十二是釈迦佛所現報土故般舟讃曰釈迦如來真報土清淨莊嚴無勝是綽禪師亦属報身土問第二第三許有勸文何忽相荅是與義機小文畧而属無雖機緣小勸文不具有其義故與而亦許又今第一所引淨土不勸生故言無勸文何以第二第三為難二明有勸機小中遠接妙喜世界安置此土者維摩經下云是時大眾渴𠈟欲見妙喜世界不動如來及其菩薩聲聞之眾於是維摩誥心念吾當不起千座接妙喜國上至阿迦尼天下至水際右手断取如陶家輪入此世界猶持花示一切眾作是念已入於三昧現神通力以其手断取妙喜世界雖入此土而不增减於是世界亦不迫隘如本無異現此妙喜國時娑婆世界十四那由他人𤼵阿耨菩提心皆願生於妙喜佛土釈迦牟尼佛即記之曰當生彼國時妙喜世界於此國土所應饒益其事訖已還復本處舉眾皆見畧抄既言十四億那由他故不攝一切亦言饒益其事訖已故不通未來故知無機緣可勸也三明勸文不具中二先隨願及藥師經勸餘方淨土者隨願經中廣明徃生十方淨土其義可解藥師經者即彼經云諸有信心善男子善女人等應當願生彼佛世界斯等經中雖摽餘方不如西方教文委𢘻次何者下徵只如下解文有五義成周𢘻相一顕凢夫者諸佛淨土凢類難生但吾𢏏𨹔由本願故不蕳凢聖齊導淨𭃯如明王之任人不賢愚二明未來者處宣為未來世所未曾見諸餘經中令勸未來欣於餘土但此淨教遙潤遐代松寒日不凋矣三彰造罪者十𢙣五逆闡提謗法無不迴生高妙淨𭃯地前尚憚於造𢙣但極樂界能攝善𢙣類良近之制木不論曲直四諸佛證者舌相盛證獨在此會𭾂是大善名㓛德不輕非一佛諸聖亦讃猶太平之㓛非一人之畧五多本者大師釈迦開渲諸典專明𢏏𨹔早依多典莫執一兩文若三人占則從二人之言以有如斯之多義故西方淨業易可依行諸經既無前件等文者𦀽文不具捐前五義名前件文如言上件謂諸經中無如前之五義文也或件是分諸經無如前分義第二明可依了教中經文勸依等者先𢝰顕示依了義經不依不了義所言經者𣵀槃第六法四依一依法不依人二依義不依語三依智不依識四依了義經不依不了義經言依法者即是法性不依人者即是聲聞法性者即是如來聲聞者即是有為聲聞之人不如來常住不變不應依止若有人如來常住即名如來應當依止依義不依語者義名覚了義者名不𮊵劣者名曰滿足義者曰如來常住不變故應依止何等語言所不應依所謂諸論𦂶餙文辞如佛所無量諸經貪求無猒多姦諭諂現親附現相求利又復唱言佛聼比丘畜諸奴婢不淨之物金銀寳寳糓米倉庫牛羊𤉢馬敗賣利如是等語所不應依依智不依識者所言智者即是如來若有聲聞不能善知如來㓛德如是之識不應依止若知如來法身如是真智所應依止若見如來方便之身即是隂界諸入所攝食所長養亦不應依是故知識不可依止若復有人作是者及其經書亦不應依依了義經不依不了義經者名為菩薩具實智恵隨於自心無㝵大智猶如大人無亦不知是名了義不了義經者謂聲聞乗聞佛如來深密藏處𢘻生疑恠不知是藏出大智海猶如嬰兒無所別知是名不了義也又聲聞所應證知者名不了義菩薩所應證知者名了義若言如來食所長養是不了義若言常住是名了義若言如來入於𣵀槃如薪盡火名不了義若言如來入法性者是名了義聲聞乗法則不應依猶如初𥝷未得果實故不應依大乗之法則應依止以方便力究竟度生是故應依經以多義雖四法意即不出聲聞乗法名不依止菩薩乗法為依止義已上𣵀槃經意維摩經亦畧三藏法師釈等者彼觀經䟽未知誰造文亦未見若是論主所製憬興觀經䟽云感法師於三福業開為十三句云云若是論主所造觀經䟽中明此義欤有人云淨土章䟽目錄云觀經䟽二卷恵感師作是論主造恵字借音云云四重了不義委釈四分律鈔江東杬洲花嚴寺沙門大覚撰依𣵀槃經聲聞乗法猶如初𥝷未得果實是故不應依聲聞乗門如是名不了義也大乗之法即應依止是名了義若依此理諸大乗經名了義聲聞乗名不了義然瑜伽論三十五豈諸大乗皆為了義如經欲即是道恚癡亦復然故大乗經非皆了義今以義解了義畧有四重一法印非法印門二詮常非常門三顕了隱密門四言畧語廣門第一法印非印門者法印有三一者諸行無常二𣵀槃寂靜三諸法無我若一切教為此三種理印所印名為了義三法印即非了義由此道理三藏十二分教無非了義不三法印理非㒹倒能捨煩𢙉與業及諸苦故諸外道教皆非了義非三印印非不㒹倒不能永捨感苦果故𣵀槃云一切外道所可言𢘻是𭑭語故唯有佛語是了義經順三法印可㱕依故其佛所毘奈耶亦可㱕依第二詮常非常門者如𣵀槃云聲聞乗者名不了義無上大乗乃名了義若言如來無常變易名不了義若如來常住不變是名了義瑜伽决択七十五世尊徃昔唯為𤼵趣聲聞乗者以四諦相轉正法輪雖是希奇然是有上是未了義即是大乗是了義經聲聞乗名非了義此中一徃依乗所明非諸大乗無不了義非聲聞乗離無了義第三顕了隱密門者瑜伽論曰諸菩薩於如來所深植清淨一向澄清准依如來了義經典非不了義了義經典為所依故於佛所法毘奈耶不可引集以佛所不了義經依種門弁本性義由未决定當生疑惑非了義故即依此文於大乗中顕了言教名了義隱密言教名非了義言名顕了所詮究竟名為了義言非顕了所詮之理又無究竟名不了義第四言畧語廣門者雖是大乗明顕之教初但畧詮理未盡所明未周名為不了不是所詮非究竟理名不了也由此即顕諸聲聞等亦有了義其言廣者名了義經此依義言有廣畧名了不了非約所詮理是究竟非是究竟名了不了若准此義大乗經中亦有了不了義小乗經中亦有了不了也此上四門初門為令眾生捨邪㱕正離生死名了不了一切佛經皆名了義外道所名不了義第二門者為捨小㱕大名了不了一切大乗皆名了教諸小乗教名為不了第三門者為令捨隱㱕顕一切大乗顕了言教皆名了義雖是大乗法隱密名為不了第四門者為令知廣畧名了不了諸重煩雜言畧不盡皆為不了非重煩雜言廣盡故名為了義已上次今此下正明觀經等具有四義了義經故可依此謂內外中即是內法大小相望亦是大乗非是第二未了教故顕了義經廣依正離頌雜失故應言廣是故淨教能具四義得了教名足可依行餘經雖餘佛淨土四義不具名不了義非可依行本諸論中至如何捨命是第三問言諸論者通指大小阿毘達磨先小乗者俱舎十云死生唯許捨受想應捨想應心不明利故餘受明利不順生死光引正理云非明利識有死生義以死生時必昧劣故由此故下三靜慮近分心有死生理以根本地無捨受故又婆娑九十八云梵捕梵眾依未至地心命終結生大梵依靜慮中間心命終𦀽生所以者何命終𦀽生心唯捨受想應捨受唯在初靜慮近分地有非根本地故准正理婆娑根本地中無有捨受已上次大乗意唯識許死生之位唯第八識然第八識唯捨相應故知大乗命終受生但是捨受但今所論似小乗約喜捨受而為論故是隨轉問三受相望喜樂𭤽故不在死生三性相望善染是強死生亦不可在善染荅光記尺云二受望捨強不得有生死捨躰通三性善染容死生本有一師釈至不相妨也荅第三問文自二義第一義許喜受徃生先直釈義次會論問此義何證若依歡喜踊躍文者誰知彼文將命終何以彼文為喜受命終證㨿耶大乗意以第八識為死生識今經大乗寧許六識喜受位命終乎若無誠證何輙會諸論属穢土受生荅第十九來迎願是為令其行者住歡喜心不起㒹倒預此儀後何喜受轉捨受心故觀經歡喜踊躍即得徃生讃經明慈悲加祐令心不乱即得徃生若轉異受何非心乱靈芝云所感聖境故必歡喜軀留神去如蟬十万億𭃯那即至彼佛願力與眾生業力替身改報如反掌矣要記云彼見聖眾來歡喜勇猛住喜受心不待捨受忽捨身命是故經命欲終時不命終彼懷玉禪師含咲而終教信髑髏眼口似咲若非喜受彼何尒耶此解極妙古今而絕已上經歡喜將命終者第二義意不可為難次大乗許命終受生第八識者淨土徃生意識現在喜相應時本識同非異時故不可同此穢土受生轉識先去本識後雖同時去意識與喜受相應善心本識與捨受相應無記經意識邊言歡喜踊躍今亦依經不述本識命終義也第二義許捨受徃生先直釈義次會經將命終者多在五識現之時亦通意識獨在之時有意識殘多時住故正命終者命盡𭃯那委論臨終便有三位如第四記餘文易了本觀經之中至專行念佛是第四問文即有二先引三經次若盡下正問相若壽經盡形為本者小經一日等觀經一念等便為談若觀經十念為本者小經七日壽經壽盡形亦復何為小經時分縱容不定若望大經短同觀經攝若望觀經長同大經攝所望異故為兩邊難問壽經盡形念佛者是何文耶荅指三軰文捨家欲而作沙門一向專念等者盡形相故又𢝰明一世勤修即其義也本一念十念至由斯意也荅第四問文有其二一𢝰明三經所長短時俱非二然念下正釈難意第一𢝰釈中如語實語者言應所名為如語謂若事如事理如理無有言是真實無有假故名實語其義可解第二正釈中亦二初明徃生機類𤼵心有晚壽命有長短故三異聞淨土教早晚等者惣述三經異意聞法𤼵心時節不別早晚遲速義亦惟同而所以兩重舉者准兩邊難謂初壽經為本難小經觀經為通彼故言聞淨教有早有晚早是大經晚即小經觀經先舉早者壽經為本能致難故次觀經為本難小經壽經為通彼故言𤼵心時有遲有速遲是觀經速即小經大經先舉遲者觀經為本能致難故小經時分縱容不定或属晚或属速准前應知若臨終者此下別明三經異相先述觀經中若臨終之日等者觀經對臨終始聞善知識教𤼵心念佛徃生淨土故下文云故觀經對臨終之者有命未盡等者次述小經此經對有命未盡經日始已故下文云阿𢏏𨹔經對經日死歴日類多故有一日七日等別如其壽命等者述大經此經對多時不能盡長壽故下文云無量壽經對長壽不死者不可命促等者重述三經各隨一義初十二字述大經意謂不可命促斯項長命之機湏令其人長時念佛後十二字述小經意謂不可壽終百歲短命之機湏令其人一日名不明觀經是文畧也或小經攝故觀經下廣𦀽三經或長時長日修念者顕示大經機類多種謂上長修㓛德者盡百年人今長時者一二年等長日者十百日等復長時者一二時等長日者一二日等雖有二義共顕大經機多類也二又此三別下顕示盡形一日二日一念十念如次上中下軰之業謂九品中各有多種故花開時有早晚別悟道亦尒一徃大分即為九品然其品数千差萬別故云九品各有多種經有殊等者𦀽釈而已本此娑婆世至生西方耶是第五問先引維摩明娑婆界所有勝事諸佛淨土所無有彼經下云維摩誥言此土菩薩於諸眾生大悲堅固誠如所言照其一𠀍饒益眾生多於彼國百千刧行所以者何此娑婆𠀍界有十事善法饒益眾生諸餘淨土之所無有何等為十以布攝貧窮以淨戒攝禁以忍辱攝嗔恚以精進攝懈怠以禪定攝乱意以智恵攝愚癡除難法度八難者以大乗法度樂小乗者以諸善根渡無德者常以四攝成就眾生是為十已上次又此下引大經文意可見准此等經於此穢土修道還勝淨土起行何故能勸捨此生彼本若如所難至勸生淨土荅第五問文有其三一豫反質二今此下至生淨土也正釈所難三如大集下引證而勸生第一反質者若如所難一切淨教皆不合如上所引維摩經十種勝事雙卷經一日修道此等利益淨土無故而淨土教慇懃勸生有何意也第二正釈中亦二先會維摩謂維摩等讃住此界不退菩薩雖居穢土不為𠀍着猶如鵝鴨雖在水中不為水波之所濕溺菩薩亦尒雖處生死不為生死之所𢙉害不失自行化他自然是故能讚觀經等中勸生淨土退性菩薩自居穢土逢於𢙣緣廣造諸𢙣被聲色自他俱沒迫鷄入水安有所作是故能勸如俗典云臨渕而羨𩵋不如退而𦀽初心菩薩機解耎弱直臨生死渕羨濟人天𩵋不如退詣諸佛淨土長法性身𦀽方便網能作救故智論中寄扵多喻明初𤼵心菩薩可欣淨土如次下文別廣分別菩薩根性兩類不同如何乃引維摩經讃大人志幹居在穢土饒益眾生文即言我但於此穢土可修佛道何湏生淨次雖知下會大經雖知穢土一日修行其㓛莫大當彼百年以逢善希遇𢙣退多故勸徃生問淨土聖眾根性明利堪修道法彼百年行寧齊此間一日修行荅穢土中有十種勝事立大悲行得其便冝故一日行實勝淨土百年之行所謂苦𢙉眾生多故大悲即應成菩薩行淨土快樂無苦可論既闕悲境不能成立菩薩勝行如天下無害雖有聖人無所才邦中無為雖有賢者無所立㓛故維摩云此土菩薩大悲堅固照其一𠀍饒益眾生多於彼國百千㓛行乃至廣上具引之大經下曰汝等於是廣植德本布恩恵勿犯道禁忍辱精進一心智恵轉相教化為德立善正心正意齊戒清淨一日一夜勝在無量壽國為善百嵗所以者何彼佛國土無為自然皆積眾善無毛髮之𢙣已上此乃由境有無差別論淨穢修行勝劣故要决云修行之機泛有兩位未登不退難居穢土欲修自行多有退緣順觸情便生憂喜愛境竸𤼵𢙣業復興無法自安還沇𢙣趣若也修因万刧法忍已成穢土堪居方能益物既成自行已免輪迴十事利他諸方不及依餘佛土依報精花眾具莫所湏應念既無乏少欲何人自餘九事准斯可委所以自知不退住此無妨廣業益他勝諸佛國當今學者去聖時遙三毒熾燃未能自在若生淨土託彼勝緣藉佛加威方得不退已上故知大經等中所讃穢土修行即是不退菩薩六度勝行非是鈍根小福智行夫代大近者必傷其手行人未得不退位地樂住穢土能二利何不思量都無去意故下誡云行者今日未是不退菩薩而即欲住娑婆𠀍界修道不願徃生西方甚為失也第三引證而勸生中二先引大集明他方菩薩猶怖暫時來至此界初心人無由久住善男子彼佛𠀍界等者先娑婆𢙣相言彼佛者即指釈迦經上文云尒時𠀍尊為頻婆羅王是法已東方有國名曰無量彼中有佛名五㓛德常妙法教化眾生有一菩薩名曰日蜜至心聼法已上故知五㓛德佛對日蜜菩薩宣娑婆相預示大眾隨女人語故断絕善根等者若人順女壞善根堕在𢙣趣非必言成断善闡提如在經女人失云一毛孔中恒出於欲火念燒善根故不可親近智度論曰女人見一度永𦀽輪廻業何犯一度定堕無間獄玄賛亦引智論云清風無形猶可捉蚖虵𭇥毒猶可觸女人之心難可得執釰向歒猶可勝女賊害人難可禁已上是故有女人穢土中必有三途若無女人諸淨土中無有𢙣道法花經富樓那尊者成佛土云無有諸女人亦無諸𢙣道道暹釈曰無有女人故亦無諸𢙣道計知𢙣趣洪基莫先女人毒虵僅一𠀍之身女人能壞多生之身毒虵唯害有待之身女人即法性之身𭾂此謂也又准娑婆四州之人一期行度數不同若南州人不可勝計西州若多十二度小或十度東州若多七八度小四五度北州若多三四度小一二度故四州中多欲唯在此閻浮提此州之下獨有地獄非餘三州其理在斯悲哉我等生在閻浮欲境盈眼深著色塵愛染𮉐情將去無處為天為地望截無力非定非恵何時永絕胞胎之緣速得託寳蓮之臺矣乃至云者彼佛咒名随如真忍𨹔羅尼日蜜菩薩受此神咒向娑婆界宣彼咒乃至廣尒時日蜜菩薩者此下顕示菩薩將來此生怖畏想猶如生聾等者本在胎內耳不聞聲眼不見色名生聾盲以眾生闇無恵言生癡者生即眾生癡是愚癡且舉其癡顕餘貪等或生得癡名為生癡非是由邪師等力起任運方起名生所得或生癡者能生愚癡隨女人意雖有三義初解為正佛言善男子等者明菩薩不可生怖畏汝今不為現在利益後生利益當為饒益一切眾生汝非彼娑婆界中維摩誥耶何故生怖尒時日密菩薩嘿然不對善男子何故嘿然日密菩薩言世尊彼維摩誥即我身是也世尊我於彼土現白衣像為諸眾生宣法要或時示現婆羅門像或剎利像或毘舎像等復有無量無數菩薩等者明日密菩薩所將眷属同欲來此欲大事者菩薩退事名為大事彼眷属眾其心未定若徃彼界近𢙣知識生諸㒹倒豈非菩薩一大事耶言不定下述於經意明彼土菩薩恐𠼃來至此界行者今下顕謂他土菩薩猶恐𠼃來今日眾生未位地欲住娑婆修道不願徃生西方甚為大失彼神龍不居網𮊁之池鳳凰不翱維羅之里禽獸無識猶察於安危人倫有情寧不覚沉好𢙣難述得失應弁尤足可猒何不願求次瑜伽明穢土中𢙣事易得善事難得淨土中與此相為是多勸徃生淨土文在彼經第五卷末義可解耳本淨土中無至如法不是第六問先举例次正難而有化鳥法者𢏏𨹔經云彼佛國土無三𢙣趣欲令法音宣流變化問化佛菩薩等能法何故鳥樹等亦法荅智論九十三云問曰諸佛有無量不可思議神通力何以不變化作無量法度眾生何湏樹林音荅曰眾生甚多若佛處現身眾生不信謂為幻化心不敬重有眾生從人聞法心不開悟若從畜生則便信受如本生經菩薩受畜生身為人法以希有故無不信受又謂畜生心直不誑故有人謂畜生是有情之物皆有欺誑以樹水無心而有音聲則皆信受本有二尺一至不相也荅第六問文自二義第二無義中亦一先直立無義以經不有論亦無故淨佛剎中應無化女難日下難前唯有難言即釈荅文𢙢落也或第二解是正義故為顕前義更非盡理不救而已第二有義中觀音授記經化無量女人者彼經曰尒時觀𠀍音及得大㔟至菩薩摩訶薩與四十億菩薩前後圍遶於彼𠀍界以神通力各為眷属化作四十億莊嚴寳臺是諸寳臺縱廣十二由旬端嚴妙諸寳臺上有化玉女八万四千或執箜篗琴瑟笛琵琶皷如是無量眾樂器奏妙音儼然而住或有玉女執赤栴檀香沇水香或執黑沇水栴檀香儼然而住尒時觀𠀍音及得大㔟菩薩與其眷属八十億眾諸菩薩俱莊嚴寳臺𢘻皆同等如力士屈伸臂項從彼國沒至此𠀍界時此菩薩及聲聞眾見此宝臺歎未曾有各作是念此諸寳臺從安樂國至此𠀍界為是佛力菩薩力耶尒時花德藏菩薩羕佛神力白佛言是誰威力佛言是觀音及得大㔟神通之力於此𠀍界現大莊嚴時花德藏即以菩薩種天眼觀子東方恒河沙等諸佛𠀍界彼佛前皆有觀𠀍音及得大㔟莊嚴如前敬供養皆阿𨹔佛南西北方四維上下亦復如是畧抄皷音聲王經者下卷之中作多解釈其一尺云又受用土中化分叚身諸位菩薩現胎生身有父母等化變易位現化生身便無父母可合今義但佛意難測故或敘化淨土或約受用土或作法門釈或作穢土釈不可定属一途也為化下位等者正會相皷音經有父母等為化下位即是七地已前分叚身位為化彼故示有女人或以愛欲初心人而為令入離欲三昧示現女人如悲花阿閦佛土中有化女上已引之維摩經曰以欲釰引令入佛道即此義也化上位者亦有二義一八地已上變易菩薩名為上位為化彼故現化生身不樂父母故無有女二不退菩薩便名上位非必八地彼已離欲不可示有女人攝引無女人者𢝰捐淨土論等淨土無女人故經論女人有無非相也本如𢏏勒𤼵至𦀽使念耶是第七問初先引經云何下難彼經即淨業念言非凢愚念不雜𦀽使念若准之者今時𭂫愚未登聖位不除𦀽使云何徃生此乃經意捐慈等念雖名為非凢愚念等今難意者廣疑一切念佛之人非聖雜𦀽不得徃生要疑云准此經夫念佛者非是凢愚不雜𦀽使方成淨業今修行者聖位未登𦀽使不除如何得徃如今念佛㓛不狂疑網稍淹請𡸁割折已上全同今論非偏約彼經機問起也所言十念至下具引要集所引似小相本非凢愚念至類可知也荅第七問文即為二一先顕問非二此經意下正釈經旨三如大下引例而成第二正釈中二初𢝰明經意謂彼非凢愚念不雜𦀽使念者非謂聖人念及断惑念但是欲顕此之十念肖生死順生出𠀍次𭂫愚下曲釈今十念永異𠀍凢愚念雜𦀽使念謂凢愚眾生多樂穢土順生死流今修十念背生死流順𣵀槃路故言非𭂫愚念又𭂫愚人增長煩𢙉及𦀽使業今修十念趣賢聖法順断惑門故言不雜𦀽使念也此中順生即是因義順引當果故名為順例如彼言順解分順択分第三引例中名聖所受戒者受大戒者必為證聖以此義故凢夫受持名聖所受是則因中果名聖問要疑同今之問意釈亦同耶荅不尒遙異故要云今欲徃生淨土作業之人知此娑婆苦切死滿特生猒背不可久居聞西方勝樂無專誠注想誓徃無疑既能永苦流長辞染界即非薄淺尒随生但能念佛求徃彼方道悟無生當來作佛意專廣度法界眾生能運此心定生妙剎有斯勝解故非愚也言不雜𦀽使者使謂十使𦀽謂九𦀽念佛之心即第六識心王正起欲作𢙣業𦀽使煩𢙉容可得生正念佛時具遍行五所及善十一所不動諸𦀽無因起故心緣異境𦀽使爰生注想佛時𦀽使眠伏故言不雜𦀽使念佛也廣乃至念佛淨心性乖𦀽使心正念佛諸𦀽不行有間断時無妨趣起非盡言不雜也聖人惑盡此界足安不勞念佛求生彼土也本若念阿𢏏至長時苦行是第八問提懈怠心難精進行文相分明不湏重釈本此有數意至宣湏用心荅第八問文有其三一略明聞淨教後不可待終方始念佛二一即下至一念即生廣釈三冝應下約勸進門明𤼵精進對治懈怠其益弘深第二廣釈中即立三因明不可待終方始念佛初至豈成道理明𤼵心求菩提者聞淨法湏能精進是為初因蕳二三因故摽云一即汝欲願等者先明問意但縱六情不志菩提推汝問難之意但欲避斯苦得彼土快樂更不求無上菩提道若㨿此義就終一念是設許也若為志佛等者正明𤼵心求淨土者不可期終謂若為志菩提雖愍諸有情於此穢土𢙢退菩提就彼淨土登不退位方欲無間長時修万行者何為今聞淨土妙法不肯修行返事放逸期終時念若欲下述空流生死徒沇苦海恨聞此法晚至今生而湏晝夜𤼵勤精進大𭁽不遊㝹侄大志不拘小節若能志求無上大果為度法界一切眾生願生淨土欲證不退如何所𭷣有漏小樂捨縱情更造十𢙣讓千終日不縡修行無愧慙言豈成道理傳聞前禪林寺常傷歎曰十刧正覚之日久照生死之雲九品淨剎之月高晴安養之空引一念之誓甚於疾風攝十𢙣之德喻於巨海我在何處晚至今生泄此之益徒輪廻矣斯言妙苻今恨歎勸甚以甘心二又若下至深湏覚察明長修短修福德惟別多念一念次位不同何捨長時多行偏期臨終少行是為二因於中若乗終念等者正明長時短時念佛㓛行不齊悟道亦別所謂若人常能念佛一念者𢘻熏成自己第八識種㓛德積集故云念增道若增長罪用减故云罪業轉福多罪少成其上軰豈同臨終僅唱一念得生下品且衣下舉於俗欲念長短謂彼衣食細雖異𭾂形除飢而尒取捨此念佛多少㓛行利益不同何長修即就短念貪好衣食曾無此言今聞淨法捨長取短是汝煩𢙉令狂其心若亦鬼魔壞乱佛法實推心底曾無一念願生之心二利俱失深湏覚察三又汝下至一念即生明臨終念雖亦能生多遇緣難終於㓛是為三因於中汝今時者先明平生聞淨教不肯修行臨終念佛万難一徃身心調內無苦𢙉起居輕利外具善緣猶以不修臨終一念雖知亦生然諸因緣𢙢万不一徃或善友下正出十緣誡偏待終初一顕順緣難值後九弁緣易逢九縁中初二如次身語意即為內緣後六外緣逢水火乃至墜高巖等皆外灾故且㨿少分略述十緣廣論繁多故云難周諸難廽勿㤁待後懈怠比丘期明日者𭾂此謂也今者𠀍上諸願生類皆欲夢後必生淨土雖有此想未致其勤在家妄執吉祥奢不拘出家追求資緣邪命無絕哀哉朝露貪名利夕陽憂浮生可慙佛𨹔知見可悲眾照鍳夫富與貴人之所欲然而以其道不招不來貧與賤人之所𢙣然而以其道不退不去行者猒欣亦復如是數猒苦𫭫疑探湯之思懇志樂邦專渴水之念湏本自頎莫欲俄倒第三勸門中永離𭾂𮉐者𭾂謂五𭾂一欲貪𭾂二嗔恚𭾂三惽眠𭾂四掉悔𭾂五疑𭾂入阿毘達磨論曰欲界五部嗔名第二𭾂欲界惽沇及不善睡眠名第三𭾂欲悼舉及不善𢙣作名第四𭾂欲界四部疑名第五𭾂已上俱舎論云如是五種純是圎滿不善聚故色無色界無有不善然此五種純不善故唯在欲界非色無色已上問惽眠掉悔各有別躰何故立為二𭾂耶荅俱舎論云食治用同故合立一食謂所食亦名資糧治謂能治亦名非食用謂事用二名㓛能由此經中作如是惽眠雖二食非食同何等名為惽眠𭾂食謂五種法一𧄼瞢眠之先二不樂情不欲也三頻申由勞事身業疲倦所生能起頻申因從果名四食不平等飲食過差身心沇昧果從因名五心昧劣性所境不明為昧能取力為劣從用為名何等為此𭾂非食謂光明想起光明想心即𤼵悟惽眠不生非益彼故名為非食如是二種之事用亦同謂俱能令心性沇昧掉悔雖二食非食同何等名為掉悔𭾂食謂四種法一親里尋或時尋思諸親里事二國土尋或時尋思諸國土事三不死尋或時尋思我不死來當作如是事業四随念昔種所更戲笑歡娛羕奉等事或時随念徃昔所更事緣親里等由散乱故而增悼举有不情而生憂悔何等名此𭾂非食謂奢摩他如是以由定故悼举及悔而不得生二種事用亦同謂俱能令心不寂靜由此食治用同故惽眠掉悔二合為一已上問𭾂者䨱障為義謂障善法令不生起故雜集七云能令善品不得顕了即是𭾂義䨱𮑇其心障諸善品不令轉故已上若尒諸煩𢙉等皆有此義何故如來唯此五荅俱舎論云唯此於五薀能為勝障故謂貪恚𭾂能障戒薀惽沇睡眠能障恵薀悼舉𢙣作能障定薀定恵無故於四諦疑故能令乃至解知見皆不得起故唯此五建立為𭾂已上論文載經部立破不能廣述又准對法論於樂出家覚邪行奢摩他毘鉢舎那修捨五位為障故別立五𭾂謂於樂出家時貪欲𭾂為障希求受用外境界門於彼出家不欣樂故於覚邪行時嗔恚𭾂為障於所犯學處同行者正𤼵覚時由心嗔恚不正覚故於止舉兩位惽眠掉悔𭾂為障謂修止時惽沇睡眠為障於內引沇沒故若修舉時悼舉𢙣作為障於外引散乱故於修捨時疑𭾂為障遠離定不能捨故𮉐謂十𮉐俱舎二十頌曰𮉐八無慙愧嫉𡠩并悔眠及悼举惽沉或十加忿䨱無慙慳悼举皆從貪所生無愧眠惽沇從無明所起嫉忿從嗔起悔從疑䨱諍已上然品類足𮉐有八不忿䨱毘婆沙宗𮉐有十𮉐𮉐縛有情置生死獄故名為𮉐論文云根本煩𢙉亦名為𮉐經欲貪𮉐為緣故知𮉐名非隨惑又雜集七云數增盛𮉐繞於心故名為𮉐由此諸𮉐數增盛𮉐繞一切觀行者心於修善品為障礙故謂修止時惽沇睡眠為障於內引沇沒故修舉時悼挙𢙣作為障於外引散乱故修捨時嫉慳為障由成就此於自他利恡妬門中數搖動心故修淨尸羅時無慚無愧為障由具此二犯諸學處無羞耻故已上是為八𮉐繞善心相故別立𮉐也無慙愧者俱舎論云於諸㓛德及有德者無敬無崇無所忌難無所隨属名無慙即是敬所歒對法尺無慙為諸善士訶猒法名為罪中不見怖畏名無愧尺無愧又正理論云有獨處造罪無耻名曰無慙若處眾中造罪無耻名為無愧廣如彼尺嫉慳等者俱舎論云嫉謂於他諸興盛事令心不喜慳謂財法巧相令心恡著悔即𢙣作如前已弁指第四卷緣𢙣作法名𢙣作謂緣𢙣作心追悔性𢙣作在昔追悔在今眠謂令心昧畧無有巧力執持於身悔眠二𮉐唯取染汙悼举惽沇亦如前尺亦捐第四身心重性身心無堪任性名為惽沇令心不靜名為悼举除嗔及害於情非情令心憤𤼵名為忿隱藏自罪名為䨱已上䨱諍者論云有䨱是貪等流有是無明等流有是俱等流有知無知如其次第已上言等流者是彼本惑近等流果若有知人䨱貪等流貪等流貪著名利而䨱藏故若無知人䨱是無明等流愚癡不解而䨱藏故如其次第委諸心所躰性作業如對法第一及唯識第六餘随煩𢙉不立𮉐者如光記解傍故畧耳本讃淨土至大菩提耶是第九問准大經疑讃文意易弁本計此苦中至速證菩提荅第九問即有其二初畧明穢土修行生退轉故遲淨土二彼雖下泛述中亦二先明淨土唯不退速證菩提次於此下明穢土行多退轉故不速證各有法文相可了本念佛言少至有何義耶是第十問念佛言少僅逕六字習学不難其命終人一時極迅速二加以苦逼不能修餘戒定恵等是故偏勸念義足未臨終者一修習時長二無苦迫以𢙉神慮何意不觀空無相等三昧及修餘道品唯勸念佛有何義耶三昧義如前已釈本行者一生至故勸行也荅第十問文有其三一初至亦生淨土明為不能廣行唯勸念佛二又念佛下至亦成其行明為散心眾生偏勸名三又修諸行已下明念佛多故偏讃勸第一明為不堪教念佛中二一先明機類不同勸行不一於中行者一生等者惣摽機根不同故觀經中分定散兩門及散善中成九品別利根心靜等者別明設定散事理教門謂為利根心靜教修有相無相之觀其無相觀者諸法實相故云平等甚深法門若為鈍根散乱唯行三福九品之業故云唯行三福之業問觀經不明無相定觀何無相觀以属定行荅雖觀經偏明有相觀同定善故探餘經攝在觀中於義無失又經分定散兩門者通捐諸經故知如所應定中攝在有無相觀非獨觀經名為經也唯偏勸等者𦀽經廣勸二如其下正明唯湏念佛之意第二明為散機勸念佛中亦二一𢝰明念佛通於定散或深或淺者深即定通有無相之觀以次文云定即甚深故淺即散口之念以次文云不妨諸務故斯乃深淺定散相對上下明之非躰異故各別摽示是且消文若論通相定有淺深淺即事定深即理定散有淺深淺是生得深是聞思問口念佛本願妙行能除重罪何属淺耶荅且㨿行相以属淺近所謂不假甚深觀恵不用殊勝方䡄只是散口不論時處其相似淺非以㓛少故名為淺若不尒者今論何存七義勝耶或依常教散心念佛且属淺近謂諸教談望甚深理以事相行為淺近法今且順彼更非盡理若約本願等別緣力口名号利益難思何名淺矣二定即下別明念佛通定散初定念中凢夫十地同名甚深對淺散故花嚴等者引五部經證事理念先花嚴明事理念佛三昧者如彼經云淨業念佛三昧門見一切眾生業如鏡中像普照念佛三昧門悉能覩見一切諸佛第七論云花嚴經多觀佛色身名念佛二昧是為事定又彼經云現在非和合去來亦復然一切法無相是即佛真躰又云一切法不生一切法不若能如是解諸佛當現前是為理定次𣵀槃經者即彼經云若人但能至心常修念佛三昧者十方諸佛恒見此人如現目前是事三昧又廣明如來常住觀是理三昧次文殊般若者即彼經云繫緣法界一念法界等義通事理是故天台引證無相和尚属有相念佛第七論云文殊般若多明觀色身名念佛三昧次大集賢護者彼經初明觀佛色身後明空三昧第七論引證事理念次觀佛經者彼經中初廣明觀色身後畧明觀法身如上引之如善戝等者摽五經中且出花嚴述深念相㓛德雲比丘為善戝童子廣明二十五種念佛三昧至第七卷委可釈之次正明散念中一切眾生者顕口念不嫌其機若行若㘴者顕四威儀中應修念文举行㘴影顕住臥時處雖廣不出四儀故云一切時處不妨諸務乃至命終亦成其行者顕示非直平生易修乃至臨終亦得成就第三明念佛多故偏讃勸中亦三初直明諸行徃生經惟少念佛徃生其教多二畧申下粗證念佛多三如是下𦀽三引證中畧举八經載十四文觀經有四文是下三品為三加第九觀文故壽經有四文三軰為三加第十八願故餘之六經唯出一文故文十四小經其始故摽云一不云二等是文畧耳問所引諸文為通觀唯名荅多應名非是觀念先小經及觀經壽經四處文者𢘻是口散善故言名号故般舟賢護兩經同是念𨹔自荅言當念我名故皼音聲經亦應名故彼經云若有四眾能正受持彼佛名号以此㓛德臨欲終時阿𢏏𨹔即與大眾徃此人所令其得見見已尋生要集念佛證㨿中引十經已云此中觀經下品阿𢏏𨹔經皷音聲經但以念名号為徃生業與今同矣花嚴經非亦觀念臨終示像即勸念佛感得光明豈非念攝取光明偏在故臨命終時尒勸定義不應故清云依西𫭫法有欲捨命者令面向西於前安一立像亦面向西以𢟷頭掛像手指令病人手投𢟷脚口佛名作随佛徃生淨土之意兼與燒香鳴聲𦔳佛名若能行之非直己者得生佛前𢬃亦終成見佛光已上占察經唱諸佛名生彼國故必是名故彼經下云復次欲生他方現在淨國者應隨彼𠀍界佛之名号專意誦念一心不乱如上觀察者定得生彼佛淨國善根增長速證不退已上如上觀察者上為利鈍二機真如唯識二種觀十方國中應有西方故引而證故元照引彼經訖云我𢏏𨹔獨在本願問觀經四文非皆名下品中生聞佛十力威德及戒定恵等除罪徃生又第九觀光明遍照文非必名誰知彼念佛者觀念行人荅下品中生雖經不念佛名号今證念佛非念何故第七論云如下軰三人生來造𢙣𡸁終念彼佛名号豈能作彼無相念耶又和尚云聞𢏏𨹔名号即除罪多刧五會讃中亦述名故一家相羕而下三品是名徃生次第九觀念佛眾生是名者京師定今與彼同案論意名義相應光照名問本願念佛名念者有何證耶荅今論定不可致疑第三卷云壽經含此三品𢝰合而言乃至十念得生淨土經意言若不造逆人不論念之多少一聲十聲俱生淨土三品者觀經下三品也第七卷云法藏比丘以少至多而𤼵願言臨終之者忽遇勝緣方勸佛徃生淨土或得佛一已從後𠀍或得佛兩口即就命終或更得三四五六乃至七八及與九十隨少隨多皆生淨土又第六卷七義勝引十念願以成義是等其證問別𤼵一願其意如何荅六八願中不立餘生因本願唯念佛門別𤼵生因一種本願故云別𤼵和尚云𪪺誓多門四十八偏摽念佛㝡為親要集下云四十八願中於念佛門別𤼵一願此等同今問般舟賢護所明念佛是名者其義不明三卷般舟經云阿𢏏𨹔佛語是菩薩言欲來生我國者常念我數常當守念莫有休息如是來生我國佛言是菩薩用是念佛故當得生阿𢏏𨹔佛國常念如是佛身有三十二相𢘻具足光明徹照端正無比賢護經曰因此三昧得見佛故遂請問彼阿𢏏𨹔佛言𠀍尊諸菩薩等成就何法而得生此佛剎中耶尒時阿𢏏𨹔佛語是菩薩言若人𤼵心求生此者常當繫心正念相續阿㫆𨹔佛便得生也廣乃至時彼菩薩復向阿𢏏𨹔佛言𠀍尊是中云何念佛得生此剎耶時彼阿𢏏𨹔佛告彼言諸善男子若汝今欲正念佛者當如是念今者阿𢏏𨹔佛如來應正覚具有如是三十二相八十隨形好色身光明如融金眾智論三十九云復次菩薩常善修念佛三昧因緣故所生常值諸佛如般舟三昧中菩薩入是三昧即見生阿𢏏𨹔佛國便問其佛何業因緣故得生彼國佛即荅言善男子以常修念佛三昧憶念不故得生我國問曰何者念佛三昧得生彼國荅曰念佛者念佛三十二相八十隨形好金色身出光明遍照十方如融𨵻浮檀金其色明淨已上故知兩經念佛三昧即是色觀荅一卷般舟經云阿𢏏𨹔佛報言欲來生者當念我名莫有休息則得徃生佛言專念故徃生常念佛身三十二相八十種好巨億光明徹照端正無比在菩薩僧中和尚及今論依一卷經云念我名是故異訳三卷般舟及賢護亦應通一卷般舟三卷般舟陂經亦曰波賢護分已上四經同品異訳三卷經始彼佛荅言當念我賢護經言正念相續波經言常念佛意准一卷本應是名以今文深存此意故上搮般舟賢護兩經下言常念我名莫有休息諸訳經同下明觀念是顕觀念亦得生行故知佛荅包𭇥觀智論偏依下明色觀非名若尒諸文不相也三𦀽中今勸等者正𦀽若行下舉易修德為多勸由將為穩便者穩謂安穩便謂便冝要集下文全摸之耳本生彼淨土至如何會釈第十一問彼土凢夫若言不起不善方道理未断隨眠如何不起諸不善業若言起者即本願第十六願曰國中人天乃至聞有不善名者不取正覚故本生彼𭂫夫至諸𢙣不起荅十一問文即有三一初至已不現行畧釈二然不下至作佛事等廣釈三為此下𦀽也第二廣釈中亦三初不善不行自有多意者摽示二或緣下正釈文举六所由一已断隨眠謂聖道已起断惑種子故不善諸業更不起也二已伏現行謂修聖道方便力故伏煩𢙉現不令業𤼵此二如次以由能𤼵惑断伏故所𤼵不善不現起也三無隨應境謂見聞覚知增進佛道𢙣境故令諸不善而不現前四逢遇善友謂以常值遇觀音㔟至等善緣故五殊勝資具謂飲食衣服等諸勝資具令過不生故六本願威德謂依彼佛本願力故雖有惑種不得現行者𦀽成荅義謂上問難以具煩𢙉為不善因故今𦀽釈雖有惑種由此等緣不得現行也問今約煩𢙉具足凢夫成其問難何故第一立已断由荅義便惣顕淨土不起𢙣行之由若約凢夫實如所責問第四卷中已解不善煩𢙉不起行相煩𢙉若不起業亦不起理在絕言何故煩重耶荅彼解煩𢙉道此業道門是故二文更非繁雜三故下𢝰證淨土歴諸境時不生貪濁增長善根於中二文正證自土次如香積等者举例比彼經下云於是經摩誥不起千座居眾會前化作菩薩相好光明威德殊勝𮑇於眾會而告之曰汝徃上方界分度如四十二恒河沙佛土有國名眾香佛号香積上曰其界一切皆以香作樓閣經行香地𮏑皆香其食香氣周流十方無量𠀍界時彼佛與諸菩薩方共㘴食與諸菩薩方共㘴食汝徃到彼如我詞曰維摩誥首𠀍尊足下致敬無量問訊起居少病小𢙉氣力安不願得𠀍尊所食之餘當於娑婆𠀍界作佛事令此樂小法者得弘大道亦使如來名普聞時化菩薩即於會前于上方举眾皆見其去到眾香界礼彼佛足又聞其言廣乃至於是香積如來以眾香鉢盛滿香飯與化菩薩時彼九百万菩薩俱𤼵聲言我欲詣娑婆𠀍界供養釈迦牟尼佛菩薩欲見維摩誥等諸菩薩眾佛言可徃攝汝身香無令彼諸眾生起惑着心又當捨汝本形勿使彼國求菩薩者而自鄙耻又汝於彼莫懷輕賤而作礙想所以者何十方國土皆如空又諸佛為欲化諸樂小法者不盡現其清淨土耳時化菩薩既受鉢飯與彼九百万菩薩俱羕佛威神及維摩誥力於彼𠀍界忽然不現湏之間至維摩誥舎即化作九百萬師子之座嚴好如前諸菩薩皆㘴其上化菩薩以滿鉢香飯與維摩誥飯香普熏毘耶離城及三千大𠀍界時毗舎離婆羅門居士等聞此香氣身意快然歎未曾有於是長者主月𭾂從八万四千人來入維摩誥舎見其室中菩薩甚多諸師子座高廣嚴好皆大歡喜諸地神空神及欲色界諸天聞此香氣亦皆來入維摩誥舎時維摩誥語舎利弗等諸大聲聞仁者可食如來甘露味飯大悲所熏無以限意食之使不消也有異聲聞念是飯少而此大眾人當食化菩薩曰勿以聲聞小德小智量如來無量福恵四海有竭此飯無盡使一切人食椯若湏𢏏乃至一刧猶不能盡所以者何無盡戒定智恵解知見㓛德具足者所食之餘終不可盡於是鉢飯𢘻飽眾會猶故不賜其諸菩薩聞天人食此者身安快樂如一切樂莊嚴國諸菩薩也又諸毛孔皆出妙香亦如眾香國土諸樹之香已上
