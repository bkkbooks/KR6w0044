body:
  text: 三又託下舉二例顯有漏現非名三界中有三初直釋有漏變土非三界相二如有漏心下舉二例况三故非三界下結也初直釋中本性相者慈㤙處名為本質餘諸師通用二名義燈瑜伽七十三云復有餘二相一本性相二影像相者非唯色相若名詮𢝰名為相如前七識亦名本性相俱為苐六緣為質故土亦非緣䒭者此明淨土非三界相言二者灮記一云然能惑有𭤽有弱一相應謂諸煩𢙉彼同時心法令於緣不得自在二緣謂惑緣境有毒㔟力此緣令不自在就緣中復有其四一同部同品二同部異品三異部同品四異部異品井前相應有五就五中断強證断弱非證言強弱者一相應其力最強二同部同品其力次強三同部異品其力次強四異部同品其力稍弱五異部異品其力㝡弱於五中前三是𭤽㣪二是弱若断前三随其應證得擇㣪之二種能力非由断彼而證擇寳記同之又義燈云能緣王與惑俱時不得自在為相應法之故相應即持為名能緣王為境拘名緣已上淨土不尒貪想念𢘻不起故同時王無㸦相亦無於境起毒用義故諸煩𢙉不能随增故佛地云非如三界自地諸愛執為已有緣相應二随增是彼異𤎼及增上果如是淨土非三界愛執受故離二故非彼異𤎼增上果故已上二舉二例中如有漏心緣道諦煩𢙉不增者如有漏心緣道諦煩𢙉不增道無漏性漏故㸦不隨順㸦不增長如踏炎石足暫不住俱舎論一云緣道諦諸漏雖生而不隨增故名無漏光記釋云諸漏於彼無漏法中不隨增故謂無漏法性於漏必非相應可為漏境然性相㸦不隨增不可對漏名有漏若道諦緣不隨增若於空非擇非緣非隨增又論十九云六無漏緣九上緣惑於緣境無隨增義以者何無漏上境非攝受及相故謂若有法為此地中身見及愛攝為己有可有為此身見愛地中有隨眠緣隨增理如衣潤濕埃塵隨住非諸無漏及上地法為諸下身見愛攝為己有故緣彼下惑非緣隨增住下地心求上地是善法欲非謂隨眠聖道𣵀槃及上地法與能緣彼下惑相故彼二亦無緣隨增理如於炎石足不隨住灮記云若聖道諦𣵀槃諦與能緣彼惑相若上地法與能緣彼下惑相故彼無漏緣與上緣二亦無緣随增理已上六無漏緣者九十八惑中有緣道六種煩𢙉謂見道断諦下惑有三種別邪見疑癡邪見撥無諦𣵀槃疑𣵀槃癡闇𣵀槃故此三惑能迷諦名謗惑見道断道諦下惑亦即有三邪見疑癡邪見撥無无漏道諦疑道諦癡闇道諦故此三惑能迷道諦名謗道惑是名為六無漏緣惑緣無漏惑無由彼境增煩𢙉力性相故其義如上九上緣惑者九十八惑中欲界苦集二諦之下有九煩𢙉而緣上界謂苦諦下即有五邪見取戒禁疑癡集諦下四邪見取及疑無明合則有九皆緣上界此之煩𢙉雖緣上界無由彼境增煩𢙉力上境薀勝故不随增如下劣人於尊勝者雖能現見不為𭓯問欲界苦諦身邊二見以何義故不緣上界荅俱舎論云不執彼為我故邊見必由身見起故灮記云身生下界必不執彼上界諸法為我邊見必由身見起故身見既不邊見亦不生猶如觀日輪减眼根者勝經云第一義過一切眾生心識緣亦非一切阿羅漢辟支佛智恵境界譬如生不見眾色七日嬰兒不見日輪法華玄云大人蒙其光用嬰兒喪其精明釋籤云菩薩大人蒙般若光諸法之用二乗之人既無此用是故譬之如七日嬰兒若視日輪令眼失光故名為喪准此意眼根者是七日兒或壯年人亦觀日時目不暫住其眼精故云减本若不許是至淨居天上二問難不攝義有漏心變道理當問更難相教無量壽經欲乃至淨居天故本此是施設至非實天人更救經於中有二先直救經次於前下判二義正不直救可見次判之中於前二初為正者於三界攝不攝義中初攝為正以者何異𤎼識是界趣生躰生彼眾生及諸菩薩未異𤎼何得為非實人天是約能居以顯居正若實人天趣依必可三界故問彼土眾生諸菩薩未異𤎼苐八識故名實人天其理不明證二空理断二種障十地菩薩及金剛心何名人天經論明五乗相人天之外菩薩故八地已上既成變易更不可名欲色人天人天名本在分故况於未離欲已離欲不同建立淨土欲色界別何以大聖攝實人天荅中宗實義囙位不捨異𤎼識躰故唯識論云或名異𤎼識能生死善不善異𤎼果故此名唯在異生二乗諸菩薩位非如地猶有異𤎼無記法故已上若分叚若變易不捨異𤎼必是三界故佛土章云化必有異𤎼識在異𤎼識在必是三界攝何得出界義燈云菩薩有漏諸現起識猶是有漏属界地故非離三界有別眾生随生何土約苐八識皆属界故又云既以識名言種子為親囙生明變易生躰是有漏是無漏界外生死者依勝緣非離三界有別有情仁王般若云三界外有別眾生是外道義非諸佛教已上今亦此意也變易生死猶属三界何况淨土分攝彼菩薩未異𤎼何得非三界人天但分別五乗差別者依行非論實躰故非相問難不攝義文猶未盡何先評取荅正就淨土立理文問荅已竟然餘經難未盡故重雖勝鬘問難而為令知正意此盡先評二次問結云依此㣪復為斯問荅文初云此何惑更為斯問斯乃顯示此問傍来也本若𭂫夫至復為斯問重難不攝義問前已立理教為難意不異今何重難荅若惣論之難有二意謂道理及經也而教有惣別不同故先壽經別樂今勝經惣變易非界外無生難有漏果皆可界攝教有惣別故更難今問意者文有其三初至非人天惣牒觧二如勝至三界身耶正經難三依此下指示蕳初牒中若𭂫夫變淨土者苐二對意感之生彼者牒苐四對意次正難中如勝至生死實報難前牒謂若𭂫夫變淨土雖是有漏非三界者如勝經無漏感變易生死非三界攝有漏變淨土寧非三有攝生死實報彼者指有漏淨土也故彼經云又如取緣有漏囙而生三界如是無明住地緣無漏囙生阿羅漢辟支佛大力菩薩三種意生身已上取者取支名諸煩𢙉是四住惑此惑為緣資有漏而生三界無明住地是知障此障為緣資無漏而生變易故知無漏變易非三界攝有漏淨土必三有攝也是化生至三界身耶難次牒謂生彼者不同餘穢土人天造𢙣受苦果以是化生故非人天趣者未知淨土化生𭂫夫非三界生五趣狹故設雖不攝淨土化生三界故何非界攝瓔珞經三界之外有眾生者是外道義故淨土𭂫夫應是三界身實非三界身耶安多竭者外道師也本業瓔珞經上云佛子復以近况遠𭂫夫善心中尚無不善何况無相心中而有無明佛子而言善𢙣一心者是併沙王國中外道安𨹔師偈明闇一相善𢙣一心已上兩部經無三界言若恐應轉仁王經意合瓔珞仁王般若三界外有眾生者外道義非七佛本此何惑至三界身也重救不攝義文即有二一還徵難不出前意二淨土下正觧難於中亦二初至三界義者會初難斯乃還依苐二對意述有漏心變器界非三有攝次淨土下更會次難斯乃還准苐四對意述雖𭂫夫有漏色身非三界身今此亦尒者如四生五趣義淨土化生非人天趣今此難義亦以尒雖是𭂫身不名界身也但今文中不會兩經試通之者先勝經無漏變易生死非界者此明變易非三界相更不有漏分生死皆非三界有漏名三界狹故例如彼云雖無經亦無次瓔珞經三界之外無眾生者是約處謂三界無邊際故除此處何有淨土故淨穢塵元在一處而有三界繫業果者感三界生受苦輪廻亦有淨土勝業果者得淨土報受樂常住皆是業力令然也非三界外有淨土塵由此義故三界外無別眾生若約業感不繫邊者何云界外無別眾生故法華䒭或而生五道或却入生死或驚入大宅界繫之外無眾生者此便為加之勝經言變易生死非三界攝智度論明出三界外有妙淨土驗知界外有不繫生又仁王云我三界外別有一眾生界蕆者外道大有經非七佛天台䟽云此是理論云三界外有變易生死者此論不繫三有故名為外若論處不出三界之𫭫也故知界外無別眾生而言出者以煩𢙉無定繫處故云出耳已上如彼䟽會仁王經今通瓔珞亦復如是但天台意三界之外有眾生者只限變易今之三界不攝義意三界之外有眾生者更通分叚變易二土許樂亦有漏分叚而非界故本此義更難至界之身耶重難前義若言淨土𭂫夫身非三界身者淨土之業亦非三界若言業非三界者未離欲者在娑婆界修行三福作十六觀欲界生得聞思恵善若得色定修恵之心及生色界願求西方即色生得聞恵修恵無漏之心不能感報除欲色業何物生淨業既界攝果何不尒色無思恵上界定心易起故將欲思惟忽成修故無色聞無耳根故唯識章云色界觀中通聞修恵無色界觀唯修無餘色界無思無色亦無聞諸教同故撲揚云以稍斂心即入定故云無有思有耳根故云得有聞無色無根故無聞也三恵章云欲界地有二謂聞思成不定界地非離染地設欲後時堕思中故欲界之心行相故色界地有二謂聞修成若欲思時堕修中故上界地心行相細故由此無色亦無思恵上地雖有恵與思俱不由思成相非明了諸善性者或是生得或是聞修定非思恵無色界有一即修恵要由耳根聼聞法已成恵彼無耳根故無聞恵已上今明色界生靜慮故不論思恵其義應知無漏之心不感報者無漏即業感能治破廢有故對法論苐八明四業中云非黑白無異𤎼業能盡諸業者謂於加行無間道中諸無漏業以加行無間道是彼諸業断對治故非黑者離煩𢙉垢故白者一向清淨故無異𤎼者生死相故能盡諸業者由無漏力永黑三有漏業與異𤎼習氣故已上問十地勝楞伽經明無漏業感變易生何言不感荅唯識論會此文云有聖教中為無漏出三界者從助囙言助囙者無漏㣪得緣事智俱思業大定智願相應由知障緣㔟力助現有漏身命業囙若助過去有漏業囙改轉身命令成殊妙是名變易故其正囙躰是有漏𦔳囙無漏依之論云由此應知變易生死性是有漏異𤎼果攝於無漏業是增上果已上問法華玄云若依大乗此無漏猶名有漏大經云福得㽵嚴者有為有漏是聲聞僧既非無漏不別惑猶受變易之生則無漏為囙無明為緣生變易土即有報也已上此依𣵀槃許無漏業猶名有漏即感報義妙苻十地經何荅論文既會属於𦔳囙何疑難但𣵀槃經名有為有漏者是證人空不證法空無為不且属有為得生空無漏未得法空無漏無漏不且属有漏例如秘言二乗迴心未至上地亦名聖者得生空智断煩𢙉故亦名異生未得法空智未断知故已上亦名異生亦名有漏可此意矣故知彼經非生空智直名有漏也合家變易元異我宗云云今分生死者論云謂諸有漏善不善業由煩𢙉障緣𦔳㔟力感三界異𤎼果義燈云且分生取名言熏習識五種而為親囙福及非福不動三業為勝增上能招感緣一切煩𢙉惣能為𤼵業潤生之緣勝經無上依經寳性論皆隱識名言親種但顯增上業名為囙業潤生惑名之為緣已上於中有二一散二定散中亦二一如十二囙緣生唯欲界全上界小分依生得善得果報別二依勝聞思生得善心轉延福壽雜資起唯在欲界心猛利故定中有三一有漏定願轉福壽行唯欲界有二生四靜慮廣果天下及四無色唯有漏業熏三品禪生三生五淨居有無漏雜樞要之意變易生死者論云謂諸無漏有分別業由知障緣𦔳㔟力感殊勝細異𤎼果義燈云變易生死即前識五果種子皆為親囙欲界福業并色不動除無想及五淨居為近勝緣依四靜慮緣事無漏㣪得大悲相應定願而為遠勝緣若無漏無勝堪能感變易生由知障方𤼵大悲願故起無漏資身故業故此論云無漏定願資有漏業今隱資但舉能資及以能𤼵勝劣兩緣既以識名言種子為親囙生明變易生躰是有漏是無漏界外生死者依勝緣已上於中有二一有漏𤼵願并無漏合資故業皆已現行無明為緣資二八地已上唯無漏定資現行智障並已無故摳要之意問變易分段名義如何荅先分者唯識論云身命短長随囙緣力有定際限故名分䟽云此異𤎼身命短長或一歲一日乃至八万劫随徃業囙惑緣之力有尒時若身若命定際限故名為分可為一分一段故名分段也義燈云言分者分謂有限即謂命根謂差別即五薀躰捨此受餘有差別故此差別身命有齋限即謂之分名分命属身故即依主釋或此分叚俱通身命亦分亦段名為分即持業釋已上次變易者唯識論云由悲願力改轉身命無際限故名變易䟽云謂由大悲救生大願得菩提力故改轉舊鄙𢙣身命成今殊勝身命轉先劣身命成今妙細身命前有定限謂此州此界此地定尒時今此業此州此界此地際限不定如資色界廣果天身過五百由旬命過五百刧或减於彼乃至欲界人天亦尒變是改義易是轉義改轉舊身命生死而成今身命生死故名變易已上問變易生死何人受之荅論云有阿羅漢獨覺已得自在菩薩生三種意成身已上有阿羅漢獨覺者蕳其定姓是故云有已得自在菩薩者是第八地於相及土已得自在故舊云大力菩薩是於相土有大力故意者随意願成勝妙身故舊譯中名意生身彼義随意而得生故若成變易更非新生只是改轉令成勝妙何名為意生身耶故䟽云舊云意生身此言意成身彼義随意而生今意随意而成但轉易故非新成故不可言生問知不障有餘𣵀槃亦無𤼵業潤生之用如何資助無漏之業令感生死荅知障雖不障解無𤼵業潤生之用為證菩提利樂有情即湏法執資智受生是即無漏勝定勝願力相加故如阿羅漢延壽之法資現身囙或即資過去感今身業令其果長此故論釋資助相云既未圎證無相大悲不執菩提有情實有無由𤼵起猛利悲願又知障大菩提為𣱵断除留身久住又知障為有漏依此障若無彼定非有故於身住有大助力已上文有三初不執菩提可求有情可度為實有者何能𤼵起猛利大悲猛利大願以知障可求可度執為先故方能𤼵起無漏之業彼業為囙法執為緣感變易果次由知障大菩提為断除彼㽞身久住之為緣此断緣㣪此知障能為一切有漏之依以躰遍依有此障諸俱行法不成無漏此依障若断除無能依有漏決定非有以此義故㽞身久住依有知變易身既有漏異𤎼若無知障有漏依何身久住故知為久住緣本前言是其至非三界也救前更難文有三意一反質更不可重徵二雖知下至感報長正明界繫業由佛力招非繫報三非是𭂫夫下結歸大乗道理勸令生物𠈟信第一反質中此但失名而不失躰者躰即有漏躰名是三界名謂此但失三界之名而不能失有漏躰也故上論云雖知有漏躰性不出三界然以別義但得名有漏不得名三界與今意同第二正明中而此報業以果攝囙者有本云而此業報是不正本謂雖有漏心感報不名欲色彼報妙故以果攝囙不得名為欲色界業淨報之業呼言報業故此本正不過万六千歲者欲天㝡頂他化天業感於一万六千歲壽人間五十年為四王天一晝夜乗此晝夜三十日為月十二月為年彼壽五百歲上五天漸倍增謂人間百歲為忉利天一晝夜乗斯晝夜成月及年彼壽千歲夜摩四随如次人二四八百千六百歲為一晝夜成月及年如次彼壽二四八千万六千歲也此乃欲界𢙣勝善劣善業僅感万六千歲𢙣業遠感一中劫故圎暉云善業感一万六千歲𢙣業感一中劫故知欲界𢙣勝善劣已上而生淨土壽無邊際斯乗彼佛本願力故言願者即指眷属長壽本願也餘如文觧不湏重釋本𭂫夫眾生至言生淨土是第五問上来料蕳有漏淨土界攝不攝訖自下問荅有漏國土是穢淨不問意可見本淨有多種至穢相淨也荅第五問文有二意一廣明土差別二今此下正指示定攝苐一廣明中亦有三意初淨有多種者惣摽次有真下至𭂫夫別就淨土述有四種真實相似有無漏對究竟非竟囙杲相對此有通𢩁謂真實淨通於囙果通囙者十地無漏心變土通果者佛果變是無漏故相似淨土一向有漏亦是囙位究竟淨土𢩁在無漏佛果位中無有漏故非究竟淨通有無漏囙位之中漏無漏雜故十地菩薩無漏變即是無漏七地以前及三賢有漏變是有漏故也此四種中𭂫夫徃生安養淨土相似淨土及非究竟淨土攝也三有躰下至穢土是通就淨穢四句分別今前三句上四種攝第四一句非上攝但三句中躰淨相穢究竟淨攝究竟淨通自行化他躰淨相穢化他少分躰穢相淨相似淨土及非究竟中有漏心變土攝躰相俱淨真實究竟及非究竟中無漏心變土攝心躰名躰變名相躰淨相穢者佛心無漏故名躰淨假示不淨故名相穢次維摩證者彼經上云佛語舎利弗我佛國土常淨若此為欲度斯下劣人故示是眾𢙣不淨土耳譬如諸天共寳器食随其福徳飯色有異已上如十地已還本識者有漏能變有三種殊一十地本識彼未曾得成無漏故約彼變土則有漏苦諦攝二有漏六七識謂雖初地轉六七二識證妙觀平二智而出觀位猶是有漏此時變心有漏故土還有漏苦諦攝若無漏時土則無漏道諦如其七地已前兩識有漏無漏心間起故變淨土亦通二種八地已上苐六意識純無漏故彼變土唯是無漏道諦攝佛地論一云如是地上菩薩淨土為是有漏為是無漏有義無漏謂自心中㣪得無漏淨土種子願力資故變生淨土於中受用大乗法樂以初地上諸菩薩眾證真如理得真無漏處真法流住真淨土常見諸佛故變土是真無漏道諦攝有義有漏謂自心中加行有漏淨土種子願力資故變生淨土於中受用大乗法樂以彼菩薩雖證真如得真無漏而七地来煩𢙉現起乃至十地猶有修断煩𢙉種子及知障苐八識躰能持彼故現受薰故猶是有漏無記性攝有為無漏道諦攝定是善若苐十地中苐八識躰是無漏善應知佛地不能執持有漏種子不應受薰苐八識躰既是有漏無記性攝變淨土云何無漏善性攝又一有性無二實身其身尒時既是有漏依淨土云何無漏是十地菩薩淨土是妙有漏苦諦攝如實義者十地菩薩自心變淨土有二若苐八識變淨土是有漏識相分攝故是有漏身依處故雖無漏善力資薰其相淨妙而是有漏苦諦攝随加行現亦尒若随㣪得無漏心變淨土影像是無漏識相分攝故従無漏善種子生故躰是無漏道諦攝已上今則准依如實義者慈㤙亦同述記十云自受用者唯淨無漏識之變既唯佛能知變非餘知變故他受用身土躰唯是淨然能變者通有無漏如来及十地中菩薩無漏㣪得變即純淨無漏若十地苐八識并五識及七地以前有漏散心及有漏㣪得變即純淨有漏無他受用土躰是穢者非有穢心之變故問既許有漏識亦能變土他受用土云何必唯淨荅本質佛變者非穢故能變之者無煩𢙉穢故無穢識故以變之土唯淨通有無漏已上問十地已還有漏苐七變土者為離苐六別變佛土荅不然有漏苐七但緣苐八見分非餘與四煩𢙉相應染汙何離苐六獨變淨土而今有漏六七識者六識之次言便舉七非言有漏第七變土又第七識第六依根能依六識變土之時依託根故根識俱舉非獨第七無漏第七與平性智相應故㓛能勝妙獨變淨土也問囙位無漏六七二識變之土是無漏者為六七抆佛變佛土而為本質變其淨土為佛變上亦自第八變有漏土為本性相變無漏土荅若得無漏其識自在縦雖不𣐀自本質土而直尒𣐀佛變土便應變為自相分土例如由彼定通力緣異地遠境直抆他變不𣐀第八變本質又第八變為其本質更變相分不可有失問直抆佛變淨土應名本質若名本質之名本在自識第八相分何他佛變名為本質荅直𣐀他變時彼他變亦有本質義分故今論及䟽皆以佛變名為本質餘之二句應准知矣本如維摩經至得生淨土重維摩難前義謂若𭂫夫生淨土躰穢相淨者如維摩經随其心淨即佛土淨𭂫夫未能淨於其心如何生淨此之心淨經文乃約十地者既云心淨應無漏心彼無漏心在十地故若不能得佛無漏恵如何得見純淨土故彼經次下文云螺𮫀梵言仁者心有高下不依佛恵故見此土為不淨耳舎利弗菩薩於一切眾生𢘻皆平深心清淨依佛智恵則能見此佛土清淨又佛土章云持𮫀言我見釋迦佛土嚴淨復有無量寳㓛德㽵嚴亦他受用土持𮫀乃是第八地故已上明知證得平佛恵名心淨也本淨土有多至不相妨也更通維摩難文有二意一先明淨土非一途二諸佛下正會維摩成觀經義第一先明淨土非一中有究竟淨心者五雙十隻各言心者土不離心故舉心差以顯土別一究竟未究竟者佛果名究竟十地已還名未究竟二有漏無漏者七地已前名有漏心八地已上名無漏心初地之中雖得無漏猶有漏心間雜起故朢八地上純無漏心應名有漏三有相無相者六地之前名為有相七地之位即名無相唯識意前之五地有相觀多無相觀少於苐六地有相觀少無相觀多苐七地中雖純無相觀而有加行苐八地中純無相觀而無㓛用故知有相無相心者六七兩地相意也四伏現断種者願樂位中伏二執現是伏現行伏義亦通諸異生類故下文云觀經伏現行惑初地見道断二障種名断種子五自力他力者自淨其心感得淨土名自力淨心穢𭂫夫依佛力故見清淨土為他力淨苐二正會通中二初以二義會後結初諸佛如来至亦陵空也即為一義此義意者維摩心淨約十地消次又彼言淨至現其淨土亦為一義此義意者維摩心淨属佛果判後彼本此未下結初義之中逗機法其義不定者明對機法不可一途如釋論云上味妙藥依疾障顯能化教法由機根現疾前無藥機前無教已上若言一概病藥忽故不可偏執維摩非觀經㫖究竟淨心十地之位者十地無漏名為究竟問何故十地立究竟稱况上文云究竟淨者諸佛世尊相如何荅究竟之言不𢩁佛果亦通十地故攝論梁論十二云諸菩究竟由得淨三身是無分別智至勝自在故究竟有二種一清淨究竟二自在究竟清淨究竟者初地始得清淨後於地中轉清淨至十地究竟清淨自在究竟者不但得三種清淨名究竟復有別究竟謂十自在如論㣪又同論七云究竟道中謂出離障垢最清淨故釋曰究竟道有二種一有學究竟二無學究竟此位最清淨智恵生處故最細障盡無餘故名究竟位諸地乃至如来地皆有此究竟義已上問若尒五雙中究竟未究竟者廣應通十地名究竟何唯𢩁佛荅上問荅中究竟未究竟囙果對故應異苐四伏断故苐一雙中究竟之言雖限於果今復以義十地之位立究竟稱也不信觀經伏現行惑者顯示觀經徃生即通苐七苐十兩隻也問觀經徃生𭂫夫諸惑紛綸未能伏断何故云伏現行惑耶荅今論之意十六觀機若論修恵伏下界惑得上界定由斯義故言伏現行煩𢙉起者語未得定前故不相若散動機信心清淨修三福業及念佛䒭業惑力不感穢生故且属伏下品十念属苐一轉依蓋此意也又得生㣪定散二機皆伏煩𢙉不可現行設雖平生煩𢙉間起而臨終時其心清淨惑不現来得生之後遂伏不起故變土即應是伏現行淨土次義之中彼言淨謂究竟淨心者問維摩經云寳積當知直心是菩薩淨土菩薩成佛時不諂眾生来生其國深心是菩薩淨土菩薩成佛時具足㓛德眾生来生其國大乗心是菩薩淨土菩薩成佛時大乗眾生来生其國乃至六度四攝亦復如是若菩薩欲得淨土當淨其心随其心淨則佛土淨已上經菩薩心淨土淨今何就佛論心淨義荅彼經云舎利弗我此土淨而汝不見尒時螺𮫀梵王語舎利弗勿作是意謂此佛土以為不淨以者何我見釋迦牟𡰱佛土清淨譬如自在天宮已上知心淨者通於菩薩及如来心故此二義如次約十地佛果也後結文中彼本此未依他依者佛變為本生變為未言依他者他謂如来眾生變依佛土現故言他依者他謂眾生佛變即為生變依故師苐道殊遂分勝劣者上本名勝師道勝故名未為劣苐道劣故雖同名淨彼勝此下故維摩與觀經不相妨也本彼西方淨至無穢土耶是苐六問上来料蕳有漏亦淨已訖自下問荅淨土處亦有穢土不先惣問次兩邊難一邊立理難若言四方淨土之處有穢土者如何名淨土一邊教難即有二先梵難謂彼經云我今盧舎那方坐蓮華臺周迊千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成正覺已上若無穢者盧舎那佛千華上有百億國皆穢土淨土之處若無穢者何蓮華藏世界淨業之上而有穢土彼既有穢樂亦尒次維摩難謂彼經云螺𮫀梵王語舎利弗我見釋迦牟𡰱佛土清淨譬如自在天宮舎利弗言我見此土丘陵坃坎荊𮑾沙礫土石諸山穢𢙣死滿已上此方穢處即有淨土樂淨處何無穢界本此有二釋至欲生彼故荅苐六問有二義起盡可觀苐一樂處無穢土義中舉七以釋成義一淨妙故若其有穢即有亦淨亦穢之過不可云淨處二色法質礙不相容故若淨穢塵同處並生無有是處三有雜乱過故若淨穢躰一處即有其躰混乱不可分別何稱淨土何名穢國四觀經不故若有者何不五四十八願不見故若有者何不明六徃生眾生應生穢故若有者何不生既不生知無也七徃生眾生可見穢故若有者何不見既不見知無也苐一是惣餘六即別六之中前二㨿道理次二就教證㣪二約現量雖有此義不會行難知非盡理義也苐二樂處有穢土義中雖文雜𭆞而會七囙以成立義謂同處同時不相障礙者會苐二囙於中二色不並生者行不了淨穢兩土皆遍十方者此立道理而明淨穢一處如此穢土即有淨土者更依維摩而明此穢有淨如盧舎那者亦依梵而明彼淨有穢不相雜染者會苐三囙若其不㝵亦不雜故不礙囙通不雜囙故結不礙文之次以明不雜也各随見淨穢不同者會苐七囙各随生淨土穢土者會苐六囙如前難並是小乗者前七囙是今義難故名為前難非一故惣集言並難意小故行云非大作如是下重廣教顯同一處廣如攝大乗論者攝大乗中別而不云淨穢同處且是唯識境無實故随心淨穢見土差別如論𠀍親論九云鬼傍生人天各随其應事心異故許義非真實釋曰謂於傍生見有水處餓鬼見是陸地高原於人見有糞穢處猪傍生見為淨妙可居室宅於人見淨妙飲食諸天見為臭穢不淨如是眾生於事中心見異故應知境義非真實有已上諸佛淨穢更亦應尒故指彼論况彼論中佛地經顯示十八圎滿淨土彼淨土者今日釋迦現淨土相彼經故處穢現淨其義必然故佛地論明三界處即有淨土如上䒭者取佛地唯識大乗經者佛地經及法華雖知同處下顯示樂唯淨非穢謂西方處雖有淨穢今稱淨土寳㽵嚴邊一向清淨而非有穢心穢眾生不生故也譬如見火不能見水若約此見唯火非水若能見水更不見火若約此見唯水非火淨穢亦尒淨土之邊是非穢土之邊亦非淨土問有漏𭂫夫既得徃生何言心穢眾生不生荅穢有輕重不可一摡上下文意有漏名穢若㨿其義實如責今繫重不生淨土名為心穢分伏業惑得生淨土且属心淨望各異不足為難經唯淨下會苐四苐五囙謂彼觀經及本願中唯淨土不有穢為令餘方眾生偏頎觀淨邊故也今不會苐一囙者彼惣不離別故本如安法師至廣陳玄肯是苐七問初直举彼論問荅意次雖有下彼幽故重請妙釋初之問中安法師淨土論者樂邦文𩔗二云又此方諸法師各造論著書先讃西方道安法師徃生論六卷已上淨土疑門遵式云道安和尚徃生論六卷懷感禪師群疑論七卷已上如此書中雖載其名亦其文未本朝恨不見𨵃問舉三相苐一質異見者淨穢二土雖實一躰機見異故淨穢別耶苐二異質異見者淨穢二土躰實異故各見異耶苐三無質而見者淨穢本無而機見耶次彼釋下彼荅中一質不成者問宗鏡八十九云安法師云淨穢二土四句分別一質不成淨穢虧盈異質不成一理齋平無質不成緣起萬形有質不成搜玄即冥已上如何相荅一異相對有無相對四句雖成異質有質其義相似是故苐二苐四句合為一句耳今云異質不成搜玄即冥彼云異質不成一理𦙟平又云有質不成搜玄即明苐二四句非各別義也嘉祥淨名玄論同大乗論中但三句正與今同又宗鏡云實則即異即同即有即無若㸦相形𡙸則一異兩乇有無雙空若圎融無礙則即一即多即無即有是無有無是有無多即是一之多一是即多之一有無即事理無礙一多兼事無礙由此重故華嚴蔵𭃯一塵中皆見法界已上此性宗明義學者思擇矣本安法師恵至起万形也荅苐七問文有二意先嘆彼俊戈顯觧有由次然且下廣釋彼義初嘆徳中恵悟開明者智能察境通達無礙名為開明神襟俊者識名神襟如無垢稱䟽云既清梵行且閑神襟戈過千人稱讃曰襟俊踈兩切明也貴也恵是心神是心王数並嘆如大宗褒云智通無累神測未形于時大乗經論文義未周者自摩騰入漢法兩方潤僧會遊昗恵日再朗以来雖得人修解之囙世樹菩提之業而安公時經論未滿彼遷化後𥘿羅什翻五十餘部陳真諦譯四十八件加之曇曇曜佛𨹔菩提屈多笈多諸師継出数十部唐三蔵惣將大小二乗凢六百五十七部譯布中夏宣揚勝業此聖典𣃥天未見故曰未周拪復抄云周朝遠法師設教不同將如来一代時教判四宗亦大相似然攝教不盡當時遠法師判教時經論未足至唐三蔵時方滿足已上周朝猶尒東晉乎故唐侍臣曰臣讀三十國春秋見安事實是高行愽物之僧但彼時佛法来近經論未多雖有鑽研其𭛹非如法師躬窺淨𫭫討眾妙之源究泥洹之跡者矣實為手菩薩者高僧傳五云釋道安姓衛𫞕常山扶栁人也家世英儒年七歲讀書再覧能誦年十二出家神性聡敏而形貌陋篤性精進𪰎戒無師與弁意經可五千言賷經入田自息就覧暮即暗誦師異復與成具光明經一卷减一万言之如初暮復暗誦師執經䨱之不差一字師大驚嗟㣪為受具戒遇佛澄見嗟嘆眾見形貌咸共輕澄曰此人遠識非尒儔也事澄為師講法安更䨱講疑難蜂起安挫紛安先聞羅什在西國思共講折每勸堅取之什亦遠聞安風謂是東方聖人恒遙而礼之初安生而便左臂有一皮廣寸許著臂採可得上下也唯不得出手時人謂之為手菩薩安終㣪十六年什公方至什恨不相見悲恨無餘之神德具在於傳今略不准此𫝊意安手有菩釧相故𠀍人歎曰手菩薩智首小經抄云晉朝道安法師人稱為寳手菩薩亦其義也𨰢荒途以開轍者不待教泛立法式皆符聖意悉會經論謂諸經三遙順佛地論眾僧氏姓妙合阿含經加之布薩羯磨一切行儀後所来與安同佛道未曲以譬荒途安公善正故云開轍故鈔批云道安非直撰此法布薩法式復布𣇣一切佛法行用儀䡄㣪經律来與安宴然同也故靈祐法師嘆云安和尚𨰢荒途以立儀故安非𭂫類已上摽玄㫖於性空者高僧傳云盧山恵遠以道安為師聞安講般若額然而悟故知𣃥天好達空理矣次廣釋中文即有三一釋一質不成淨穢虧盈初直釋相謂淨穢土淨穢心現心淨土淨心穢土穢心躰本殊土寧一耶故曰一質不成故淨穢虧盈次佛足下引證中佛未足指安地者未案地前此界偏穢故云穢盈淨虧盈滿虧佛已案㣪此界偏淨故云淨盈穢虧足指案地者彼經上云於是佛以足案地即時三千大𠀍界若干百千寳嚴餙譬如寳㽵嚴佛無量㓛德寳莊嚴土一切大眾歎未曾有而皆自見坐寳蓮華已上問已案地㣪一切見淨故云穢虧其義應理未案地前梵王見淨何偏淨荅今言虧盈者約未達見謂身子心未悟人唯見穢土不見淨相佛加之㣪唯見淨土不見穢相故論虧盈若約證者恒見淨土何有虧盈螺𮫀梵王即其人也二雖復下釋異質不成搜玄即即有二義初義意者淨穢二心為二土躰雖心有二土成兩相然同一處不相鄣㝵同處同時現淨穢故即曰異質不成故搜玄即兩相然同在一處不可分成二故也計此下還破安破意應觀次亦可淨穢者是苐二義淨穢事土真理為躰其理深玄非言慮境故言搜玄即若依此義更不可言異質雖成三無質下釋無質不成緣起万形淨穢二土依眾緣生雖同處現而淨穢殊蓋是依他起性理有情無不同遍計執情有躰無故言無質不成故緣起万形也本淨穢二土至以顯微言是重難淨穢同處義淨穢雖異莫不皆是色香味觸造與地水火風能造八合成質礙為性如何同處諸不障壞彼色性無質礙能既法相義難通釋言八者一切色法入事俱生随一不减謂色四塵為造地四大為能造此之八事名為八復有一義成實論意四塵為能造四大為造故唯識䟽二云成實論師名師子曾本於数論法中出家囙立彼義云由色香味觸四塵以造四大是無常法此中四大惣得成根為五根躰已上嘉祥法華義䟽云毗曇則四與四大常俱故四大造四成四大已上若准之者今文應是成實論意謂四塵色香味觸者举能造四四大造地水火風者舉造四大即造四大造即地水火風兩重持業尺也但荅文云是薩婆多故以前義可為正矣本唯執至質礙者重救色法鄣㝵難文有三意一明難小乗之意非大乗義二只如大乗至義可知矣明大乗意㝵無定相三故身子丘下正明淨穢同處義苐一明難小乗意非大乗義中唯執有質礙性者俱舎論二云十有色有對五根五境稱之為十躰是色故名為有色此十色界成更相障㝵故名有對是㝵義即論釋云謂十色界自於他處被礙不生如手㝵手如石㝵石或二相㝵手石名二豈是大乗通相妙䏍者瑜伽論五十四云謂由分別覺恵分折諸色至邊際建立非由躰有唯識論一云諸瑜伽師以假相恵於色相漸次除折至不可拆假已上對法苐四亦同此故知有質㝵者非大乗意問若諸無實體性何故建立荅雜集苐六釋云為遣一合想故若以覺恵分分折有諸色尒時𭑭執一切諸色為一合想即便捨離由此順入数取趣無我性故又為悟入諸有色非真實故若以覺恵如是分折有諸色至無有尒時便能悟入諸色皆非真實囙此悟入唯識道理由此順入諸法無我性故已上苐二明礙無定相中即有其二先述大乗意時量不定以例質礙無定相時即演七日為其一刧䒭者維摩經中云諸佛菩薩有解名不可思義若菩薩住是者以湏𣃥之高廣內芥子中無增减湏𣃥山主本相如故而四天王忉利諸天不覺不知己之入唯應度者乃見湏𣃥入芥子中是名不可思議解法門又以四大海水入一毛孔不嬈𩵋黿水性之属而彼大海本相如故諸龍鬼神阿修羅不覺不知己之入断取三千大千𠀍界如家輪著右掌中擲過恒河沙𠀍界之外其中眾生不覺不知己之徃又復還量本處都不使人有徃来想而此𠀍界本相如故或有眾生樂久住𠀍而可度者菩薩即演七日以為一刧令彼眾生謂之一刼或有眾生不樂久住𠀍而可度者菩薩即但一刧以為七日令彼眾生謂之七日又舎利弗住不可思議解菩薩以一切佛土嚴餙之事集在一國示於眾生又菩薩以一佛土眾生量之右掌飛到十方遍示一切不動本處十方世界有諸風菩薩𢘻能吸著口中而身無外諸樹木亦不摧折又十方世界劫盡燒時以一切火內於腹中火事如故而不為𡧱已上斯則遣著別情於二空之風顯平性於一實月唯識悟入令其淨用自在變現名住不思議解相也次質礙亦尒下正明質礙無定以木礙木以石礙石者示其礙相或本云以手礙手俱非無理但俱舎云如手㝵手水鬼火者攝大乗九如上唯識章云一境唯識阿毗達摩經云鬼傍生人天各随其應事心異故已上唯識論七云又成就四智菩薩能随悟入唯識無境一相識相智謂於一處鬼人天随業差別見各異境若實有此云何成能悟入者十地之位随悟入者地前之位䟽云相即境各有別故相之者名相者或相即者人境俱別故相者識名相識生此識囙名為相菩薩之智了知此相唯是內心故一切法亦唯心變鬼膿河𩵋宅路天寳嚴地人清冷水空定唯空非一實物㸦相返此雖非有遍計執然業類如是各變不同舊云一境應四心今言境非定一故應言一處已上無性攝論釋相識相智云相者識名相識䟽釋相者即有二釋一言相謂是則境火五境相異故言者能變假者相之者依主釋也二言相能變假者鬼五類種異故相即者持業釋也相者識名相識相者相状即境躰也依境生識故云識囙悟入唯識菩薩了知此鬼類各變膿河境唯是各內心變故一切法唯心變境若實有非心變何故一水成膿河若如古即有取心外境之失故義演云心外既無實境何得一境應四心耶但可言一處中有四相境應四心也處義故心外無境故不可言一境但可言一處已上此是共中不共見也苐三正明中身子丘𡊫者丘謂丘陵𡊫謂坎故彼經云我見此丘陵𡊫坎是則國土不平相也万境万心随心淨穢者一境界皆心變故若有一塵可知一心若有万境亦万種心随心淨穢見土淨穢譬如形端則影直源濁則流昬唯識妙𣥜豈𢩁質礙者𬼜法即通礙不礙故礙者如手不礙如淨穢本有漏之心至佛國嚴淨是苐八問文意應見問苐五問云𭂫夫未得無漏淨心随心變土還有漏之土即名穢國何得亦言生淨土彼與今同何重問耶荅上問意難有漏之土可名穢土而彼荅曰躰穢相淨今問意難躰若是穢其現土随亦可穢何心躰穢現相淨然今荅曰躰既是淨得現穢相何妨躰穢而現淨相上下問荅相望得意上難有漏可名穢土今難躰穢不可現淨故其相異也維摩經何故言者彼經上云尒時舎利弗作是念若菩薩心淨則佛土淨者我世尊本為菩薩時意豈不淨而是佛土不淨若比佛知其念即告之言於意云何日月豈不淨耶而盲者不見對云不也世尊是盲者過非日月咎舎利弗眾生罪故不見如来國土嚴淨非如来咎本躰既是淨至教修行也荅苐八問文有其二一明心有多㓛能土現多相二又由下明佛力穢心現淨相苐一明心有多㓛能中躰既是淨者佛心躰淨而現穢相共許理故以為准例躰淨相穢其義若成躰穢相淨有何恠故知一心有種德現眾多相問佛是法王大術難思設雖躰淨而現穢相𭂫夫未得自在淨用何以躰穢而現淨相例不𪰎其義安成荅非離他力獨現淨相故上文明躰穢相淨述依如来清淨佛土自識變似淨土相現佛自現穢𭂫夫依他變於淨相此義雖異淨而現穢而現淨義分𪰎故以為翻例問依託佛力現於淨相即苐二義今苐一叚只明心徳何存他力荅心力佛力異故雖開得為兩叚而非其意㸦成鉾楯能加加不相離故苐二明由佛力現淨相中即有三意初正明由本願為增上緣令有漏心現淨土相二又佛下廣明佛神力顯令心穢變淨土相三令此下寄於佛力勸生𠈟信二明神力中即亦有三初明令上人見穢不見淨如眾香世界菩薩維摩經下云上方界過四十二恒河沙佛土有國名眾香佛号香積廣乃至時彼九百万菩薩俱𤼵聲言我欲詣娑婆世界供養釋迦牟𡰱佛并見維摩誥等諸菩薩眾佛言可徃攝汝身香無令彼諸眾生起惑著心又當攝汝本形勿使彼國求菩薩者而自鄙耻又汝於彼莫懷輕賤而作礙想以者何十方國土皆如空已上彼佛既誡云莫懷輕賤又下卷云尒時眾香世界菩薩来合掌白佛言𠀍界我初見此土生下劣想今自悔責捨離是心以者何諸佛方便不可思議為度眾生故随其應現佛國異已上知見穢相不見淨相二或能下明令下人見淨不見穢如彼足指案地儀式三或令下明令淨穢俱見如寳中現淨穢寳現者觀無量壽經云是寳中映現三千大千世界一𪥂佛事指此文言及穢國一切佛事者即釋迦一化也十方佛國亦於中現指此文言十方淨土也餘文可了本如大品經至大乗法也是苐九問上来䉼蕳淨處有穢土已訖自下問荅有相趣求文有其二初大乗四經明諸法皆空次如是下依經難有相得生苐一經中如大品經內空者大品苐五云何為內空佛言內法名眼耳鼻舌身意眼乃至意眼空乃至意空非常非故何以故性自尒是名內空何為外空外法名色香味觸法色乃至法色空乃至法空非常非故何以故性自尒是名外空何為內外空內外法名內六入外六入內法內空非常非故何以故性自尒故外法外法空非常非故何以故性自尒是名內外空大般若經初分二十空謂內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空苐二分十八空合散空與無變異空為散無散空合自相空與共相空為自共相空苐三分十六空除散空共相空不可得空自性空凢經論空数不同謂㽵嚴論明三空瑜伽苐十四空楞伽經中宣七空十地論十空𣵀槃經十一空仁王經明十三空顯揚論中弁論十六空深密經二十空是眾生根緣万差迷遍計非一准故佛随時冝其能空数不同也今淨土即是外空眾生即是內空者內空即空於內六根執我外空即空於器世間執我故內空名有情外空約外器雜阿毗曇論七云內空者謂內入空作無我思惟外空者謂彼土物吉蔵仁王䟽云內空者謂內無入六神我外空者外六塵無我已上問內空外空若空依正此外何立內外空耶荅為內外法合起我執之機作合觀問若尒何故有為空無為空外不立有為無為空荅唯識章云內外法門同是有為合觀即易有為無為合觀即難是故不又云觀內外二法離合有我故觀離合以破彼犱有為無為二法不然是故不合已上但吉蔵云內外合觀皆無我有為空者色心囙緣和合生諸隂入界無有無為空者空数非数也亦應有為無為合觀文略故也已上道蔵䟽亦許有為無為合觀又維摩經言諸佛國土亦復皆空者經問疾品云文殊師利言居士此室何以空無侍者維摩詰言諸佛國土亦復皆空又問以何為空荅曰以空已上者顯文不盡故經次文云又問空何用空荅曰以無分別空故空又問空當於何求曰當於六十二見中求又問六十二見當於何求荅曰當於諸佛解中求又問諸佛解當於何求荅曰當於一切眾生心行中求已上經以無分別空故空者明空相空於有漏遍計執是名空有亦名分別空空之有能空之空有空別故即性空也於能空上亦執為實而起法執故空能空是名無分別空能俱空無差別故是相空也如廣百論云有有皆順執心空空皆妄執又此空言是非表非唯空有亦復空即其義也二乗之人且得性空不得相空不断法執故也又言菩薩云何觀於眾生者經觀眾生品云尒時文殊問維摩詰言菩薩云何觀於眾生維摩詰言譬如幻師見幻人菩薩觀眾生為若此如智者見水中月如鏡中見其面像如時炎如呼聲響如空中雲如水聚沫如水上泡已上以假有法譬眾生相如芭蕉堅如電久住如苐五大如苐六隂如苐七情如十三入如十九界菩薩觀眾生為若此如無色界色如燋芽如湏𨹔洹身見如阿那含入胎如阿羅漢三毒如得忍菩薩貪恚禁如佛煩𢙉習如盲者見色如入定出入息如空中鳥跡如石女兒如化人煩𢙉如夢見已𥧝如度者受身如無𤇆之火菩薩觀眾生為若此已上以無法譬眾生相文殊師利言若菩薩作是觀者云何行慈維摩詰言菩薩作是觀已自念我當為眾生如斯法是即真實慈也已上般若經言如者金剛般若如上已引又言實無眾生者彼經云善男子善女人𤼵阿耨多羅三𦴭三菩提心者當生如是心我應度一切眾生度一切眾生已而無有一眾生實度者苐二如是下依經正難文意可見本如向至何是何非荅苐九問文有二意一先明佛教随機不可是非二然佛法下正會難成義苐一明教門順宜相中二初明向明大乗空義入聖證理唯此一門更無餘路如智論三十七云空是十方諸佛深奧之蔵唯一真門更無餘門能破諸邪見戲論是相應不可壞不可破是故名為苐一已上次少行菩薩下明有事相趣求於中亦二初惣明少行菩薩修菩薩法欲求佛果非無種法門句義如何引畢竟空獨真佛語畢竟空者大品經云何為畢竟空畢竟名諸法至竟不可得我法全空如識非無然混諸法畢竟空者為遣實犱令入真理故理趣分䟽云然畢竟空但能入門非平性平者真如之躰也非空非有今從方便名畢竟空為觀有情為畢竟空證得故已上次今觀經下別明西方淨教此亦佛語何為將彼空難斯淨教苐二正會難成義中三初至自他約二諦釋俗諦出離二深密下至言誠可誠約三性明依他生三又空有下明空有一雙俱以俗故空若益機有亦湏然初約二諦中二一直釋二諦道理二故維摩下證成二諦直尺中亦有二先直釋相次故教有二下誡學者謗初釋相中然佛法不離二諦者先明法不離二諦如智論三十八云佛法中有二諦一者世諦二者苐一義諦為世諦故有眾生為苐一義故眾生無有百論下云諸佛法常依俗諦苐一義諦此二皆實非𭑭語也已上其俗諦是依他起性彼依他法非遍計有名為非有囙緣會故假有非無稱曰似有廣百論十云世俗諦者謂従緣生世出世間色心法親證離展轉可言親證為先㣪方起此世俗諦亦有亦無假合成猶諸㓜事従分別起如夢為有相可言名世俗諦已上苐一義諦圎成實性彼圎成理諸法實躰非遍計都無故云妙有非依他假有故云真有亦名真諦名勝義諦苐一是其顯勝之目以名義真者是其絕𭑭之稱勝義應知世與苐一審實不故俱名諦唯識論明就於二諦各有四重如彼䟽及二諦義林章中弁然其二諦非一異者明二諦非一非異謂以真俗無俗不真一切諸法皆歸故云非異若論二邊真諦無為俗諦有為故云非一若但分別而不融通法成差異若但融通而不分別事成混濫故順眾生二諦門性相歴然一異平䒭𭂫未有無波之水曾無不濕之波以波徹水源水窮波未如性窮相表相達性裏湏知真俗相𬾨性相㸦存勿㨿一門猥生偏滯俗諦若立淨土安無佛或破眾生相者此下明佛用二諦意謂為破諸相令歸無相偏明真諦諸法空為求淨相令猒穢界具俗諦教囙果相寧用一鎰而開多庫化冝方便理湏如斯次誡謗中諸大乗經三蔵聖教者蕳小乗三蔵謗正法罪專大乗明故大小三蔵如苐五記信不具足名一闡提者出𣵀槃經如苐三記十輪經具明其罪者大方廣十輪經苐六云若於三乗随輕一下至一頌不應親近或共交遊或共住止或同事業若有親近或共交遊或共住止或同事業但言當堕無間地獄已上處廣明不可具載次證成立二諦中亦二先直成立次子湏具讀下重誡學者謗初成立中故維摩經言者引彼經五文明二諦𭓩然初二文在彼上卷中是寳積菩薩歎如來徳偈也離有離無四句者顯示諸法不有亦不無句有離有四句經文略故只舉兩單或亦言中攝在餘句故應具言非有非無非亦有無非有無又言雖觀者是苐三證文在彼經問疾品終謂經云雖行止觀助道之法而不畢竟堕於是菩薩行又下文云雖觀諸佛國土𣱵家如空而現種清淨佛土是菩薩行今𭆞雜二文一句文復可云𣱵皆空苐一義諦也不堕世諦法也而無文者即是省略成就一切諸法者是苐四證文在彼經弟子品中湏菩提昔乞食至維摩詰室時維摩詰取鉢滿飯語湏菩提雖成就一切法而離諸法相乃可取食云云今文之初應云又言而無者略或苐三初云又言非苐四終配二諦非苐三影略顯成二證耳又言雖知者是苐五證已如上次大品及諸經意文可觀矣次誡謗中上下𭆞綜者𭆞謂𭆞雜綜即綜交編為義明空諸經非偏忌有子湏具讀經文上下除信謗心却讃語勿徒疲勞自他俱二約三性中即亦有三一略釋三性二汝大乗下會空經成有經三而子但見下亦重誡謗初釋三性中深密者廣雖摽諸且依唯識方明三性三無性義餘經論文義無先三性者一遍計執性於依圎二性或增益執有或减執空當如斯執情中現偏有空相即名為遍計執性遍計者能執名執者情現稱能迷妄情周遍計度故名遍計緣𭑭境為執取故執此之執躰性都無但是𭑭情計度為有是故名為情有理無唯識論云周遍計度故名遍計䟽釋曰周義釋遍度義釋計唯苐六識能周遍計度苐七識是此類故亦名遍計但名計而非遍故今依正義由此應作四句分別有遍而非計謂無漏諸識有漏善識能遍廣緣而不計執者有計而非遍謂苐七有漏識有亦遍亦計謂有漏染行我法執苐六識有非遍非計謂有漏五識及苐八識私云護法正義能計之心六七兩識安恵䒭意八識起執謂五八識唯有法執七唯人執六通二種云云品数眾多為彼謂能遍計𭑭分別䟽釋曰以此計心品類眾多為彼此躰是何謂能遍計𭑭分別即是一切能起遍計依他心即由彼𭑭分別遍計種遍計物䟽釋曰𭑭分別故遍計種遍計物者躰也即能計心起執也謂𭑭執薀處界若法若我自性差別䟽釋曰此性即是𭑭執薀處界一切義理若法若我此二種中自躰性及差別義此即心外非有法也即是由有能計心躰計有物也問此計法自性非有何故名物及名種荅随能計心故為物心多品故為種躰非種也計無法亦可名物有無二法皆名物故言種者随能遍計𭑭分別心計此無物當情亦有種相故此𭑭執自性差別𢝰名遍計執自性如是自性都無有䟽釋曰𭑭執心外法我自性差別躰性非有如龜毛等躰定無故㧾名遍計執自性問遍計執躰性都無𭂫夫𭑭心何以為緣而得起耶荅彼以心中現依他相為緣故論云攝大乗是依他起遍計心緣故已上緣者必是有法遍計心是為緣而得起也於此依他謂實有或謂實無故當情中增相現𭑭情即名為能遍計心中現相為遍計此二俱是依他法也心中現法似情現相名遍計執是似我似法上起實我實法執此當情現即非實法譬如龜毛角䒭法問圎成實性何非遍計荅論云真非𭑭執緣境故依展轉亦遍計已上以真理非執緣故不為計亦展轉為踈緣非是相分不相似故問如遍計為緣遍計執亦緣荅論云遍計執雖是彼境而非緣故非遍計已上遍計執雖遍計境非緣緣法必是有法遍計執是無法故㨿有躰法立遍計故彼執非遍計境義廣通有無諸法故遍計執亦名境緣義𢩁在有法故唯依他由此義故唯遍計是緣二依他起性依他緣起故為其名論云依他眾緣而得起故已上謂心法依四緣生色法即是依二緣起色心二法囙緣生故如幻假有其躰非無且色法従二緣生者一囙緣二增上緣言囙緣者阿頼耶識持種子增上緣者風雨地種踈緣如斯親踈二緣和合生草䒭囙緣生故雖無自性而非都無如幻如夢非有非無是名依他於此如幻草色凢夫迷執為實色其心中現幻夢草即是依他執以為實當情現法是名為先遍計執或有一類空見之者撥無此色執為都無其心中現似都無相亦是依他是執實無即名减遍計執心法従四緣生者四緣如前生義應知三圎成實性一切諸法疑然常住妙理為躰其理真實不生不是即名圎成實性論云二空顯圎滿成就諸法實性名圎成實顯此遍常躰非蕳自共相空我有漏無漏門無漏有為離倒究竟勝用周遍亦得此名已上生法二空顯真理一圎滿二成就三實性具此三義名圎成實如何真理具此三義一躰周遍無處不有故即圎滿義二躰常住非生故是成就義三躰非諸法實性故名實性言遍者蕳異自相諸法自性只𢩁法躰不通餘故唯真如法能遍諸法言常者蕳異共相諸法共相躰非實有不應彼躰性常住是故常言蕳於共相非者蕳異空我小乗外道執空我躰是常遍彼躰非法實性故非言蕳於空非之言方蕳我無漏有為亦具三義而得此名有為無為門圎成實唯限無為有漏無漏門圎成實亦通依他即是淨分依他法也此之三性不即不離攝大乗中譬虵繩麻顯三性相闇夜有繩愚人謂虵種怖畏眼昡心騷手足振動其時覺者教令曉悟迷乱深故輙不及覺数思惟漸醒悟遂除其迷即知虵空如斯知已見於其繩相㒵似虵形似故愚眼迷以為虵是一重覺而猶執繩為真實躰猶数思惟遂知繩空其躰是麻更無實繩相但是眾緣造作如幻假有非有非空其麻即是繩實性也彼實虵相及實繩相此麻中一向遠離三性諸法亦復如是愚者迷眼譬能遍計種怖畏譬生死苦覺者教示譬佛菩薩實虵之相譬實我相即知虵空譬得生空實繩之相譬實法相亦知繩空譬得法空彼假繩譬依他躰似虵形㒵譬似我法其麻實性譬圎成實麻中常無實虵繩相譬理無相三性如此次三無性者一相無性謂依遍計執立相無性遍計執躰相非有如空華故名相無性二生無性謂依他起立生無性依他雖有而非偏有必帯空義取帯空稱為無性其空義者即依他起無自然性非躰全無名為無性三勝義無性謂依圎成實立勝義無性真理性離諸戲論相是名真空取此空義假稱無性非圎成實其躰全無後二無性雖非躰無如斯法尒具一分空取其空義假無性於此二性𭑭執為實佛為對治此增益執無性言是密意㣪二無性執空躰空上古諍論若南寺義三無性躰皆是執是執空義若北寺義相無性躰即是執㣪二無性如次依他圎成為躰是躰空義依圎二性處有一分空義是無性今明者是北寺義先徳未輙莫是非論云謂依此初遍計執立相無性由此躰相畢竟非有如空依次依他立生無性此如幻事託眾緣生無如𭑭執自然生故假無性非性全無依㣪圎成實立勝義無性謂即勝義由遠離前遍計執我法性故假無性非性全無如太空雖遍眾色而是眾色無性顯已上二會成中或約圎成者約圎成會圎成實性離戲論相名畢竟空其躰真有名實非空或約遍計者約遍計會其相應知今淨土者絇依他成淨土徃生就依他性明囙果相何偏執空非有教法三重誡謗中二先釋次證中故經文者無上依經又大乗實寳經云寧起我見積如湏𣃥莫以空見起增上𢢔以者何一切諸見以空得𠰥起空見則不可治佛蔵楞伽密嚴經亦有此我見唯背𣵀槃空見兼向𢙣趣諸教誡誠在於斯三明空有皆俗随機中空有皆俗者上来文釋空苐一義空有俗諦而對利鈍今文意者空有俱俗苐一義諦非有非空有空皆是順機豈於一雙俗更成是非耶如廣百論云為除空見諸法有為除有執多空教若空若有皆是教門二諦章𣵀槃云随順眾生有二諦䒭苐一義諦非空非有者唯識論云我法非有空識非無非有非無故中道釋論云非真非俗中道苐一義諦廣百論云悟法真理非有非無勿起有無分別戲論本淨佛國土至淨佛土也是苐十問𭂫淨土者一得徃生超生死清不退故無量壽言次泥洹若尒者著相𭂫夫心有得何得徃生此乃別就淨土經意難有相生當湏依諸大乗經者此下廣引經論難有相生謂依諸大乗及中論百論無得行可生淨土今觀經或觀色身或稱名𡇅存心住相未免輪廽如何得生有無得者𣵀槃十七廣明其相如苐五記舉要言之於事理法心存於相分別欲求名有得心於相離諸分別無得故金剛般若䟽云有得者謂分別心𭑭執法也無得者謂智證真時無彼分別之得法也俱言無彼分別心之得名無得不智內真亦為得也已上中百論明無得者樞要云佛𣵀槃㣪囙彼人天部執竸𫤭多著有見龍猛菩薩證喜地採集大乗無相空教造中論䒭宣暢真要除彼有見聖提婆䒭諸大論師造百論䒭𭤩闡大義由是眾生復著空見無著菩薩亦登初地證𤼵灮定得大神通事大慈悲尊請此論瑜伽慈㤙傳四云又以中百論㫖唯破遍計執不言依他起性及圎成實性師子光不能善悟見論稱一切無得謂瑜伽立圎成實亦皆湏遣以法師為和會二宗言不相著會宗論三千頌已上者取十二門論今舉三論宗依故彼論亦是龍猛造義同中論故嘉祥大乗玄論云十二門大同於中論也本若能觀一至一切淨土荅苐十問文有二意一明人有三軰殊故有相無相各生二又佛淨土下明土有理事報化異故有事理修行俱生苐一明能生人有三𨋅殊中三初至無量壽國述上軰生修無相觀二然𭂫下至而得徃生明中下軰用有相行三以徃下至𭂫夫亦生惣以結成有相無相定善散善咸得徃生初文中若能觀一切諸法畢竟空者惣明無相觀無能觀觀離分別及不分別者別釋空觀相離諸分別者釋無能觀離不分別者釋無觀謂無能觀故離分別無觀故離不分別是名諸法相也故唯識論云若時菩薩於緣境無分別智都無得不取種戲論相故尒時乃名實住唯識真勝義性智與真如平䒭俱離能取取相故已上若如斯觀為上軰生者引出人問經言善義趣未明作觀只是能而未行者故和尚云但言善未論其行又云聞諸法空其心怚然不生疑滯何今得言作此觀察荅經言汝行大乗苐一義故知行具𠯁人也但和尚釋資師相不適于今或復會云云二明中下軰用有相中然𭂫愚人在俗紛擾者先明中下根機不堪空觀謂迷𭂫愚於自識之依正認為他法於幻化之色聲執為實有𭑭出二見絲纏苦聚之質愚用無明翼投生死之火在俗務中紛擾不靜闇經論義無實相如何頓修苐一義諦無得觀或復淨持戒者正顯中下軰湏有相行謂持戒孝養十善摽中軰行專稱念佛舉下軰行此諸行雖有得亦是不可思議殊勝㓛徳皆得徃生如經具豈唯言無得徃生不信觀經十六觀又有得心通於三性者重舉理釋成謂有得心通三性中無記有得不能於感報善及不善有得心咸能感報今三福䒭雖有得悉是善業何不感淨子今云何者還責有得不徃生者無其證㨿今觀經者證釋成初引有相觀罪徃生次有相散罪徃生如此經者結文可視三以徃生下惣結成中有𭂫有聖者先明修囙差別於中𭂫聖大小者舉能修人有相無相者示修行利根鈍根者顯根不同長時短時者明行時莭多修少修者行分𪰎而有三軰者此下次弁得果階級問今論意者為聖人徃生攝三軰九品若言攝者觀經九品大經三軰皆是𭂫夫未見聖人若言不攝上明修囙言有𭂫聖下明得果言三軰荅難知若安樂集聖人徃生属上𨋅生淨影亦同若和尚意及義䒭不攝九品又要集云然聖人徃生九品攝不攝更應思擇若言攝在會經文者雖云𭂫夫不聖者如經定善不攝九品要集之意攝於九品豈以略都云云無耶若言不攝通今論者上廣明得生機類多下別舉三軰九品果自之狡有何妨廢故知徃生者即結先結徃生果品類差殊次結此土修囙淺深各別以徃生者非唯聖人者問准今文意為無相生属於聖人若言属聖苐六卷云此上品中生人十信五心已前人既言十信五心已前上中無相苐一義不可言聖若言不属今文難消以何者言有得亦可徃生以徃生者非唯聖人𭂫夫亦生故也明知無得者聖人徃生若結修囙有淺深各別中有二意不可但言至不得生也明修行有相無相別以徃生者至𭂫夫亦生明能修人有聖人凢夫差此乃非言有聖𭂫別故有無得有得異也苐二明生土有事理殊中生理淨土修無相囙者問如苐一義行生事九品者豈非無相囙生事相土又理土者為何淨土若法性者彼非修囙感果土何荅無相修囙生無相土有相修囙生有相土者囙果相對一徃義也夫淨土者二十九句㽵嚴皆是畢竟空理為其躰故真俗相依非一非異而其修囙有事有理故且以事囙對於事土以其理囙對於理土也非行理人得生彼上更不見二十九句依他俗諦非修事人得生彼土亦以不證畢竟空理圎成實性生報淨土修無漏囙者若依通報化義者地上菩薩修無漏囙方見報土地前𭂫夫㨿有漏行能生化𠛴今則其意也問無漏破有何感報土荅演秘無性論云無分別智當於何處感異𤎼果者謂於諸佛變化受用二身會中此非異𤎼囙能治彼故即增上果假名異𤎼於此資薰餘有漏業令感異𤎼故立此名已上問無分別智若是無漏何生化上荅感異𤎼於佛變化土者恐應地前加行無分智土既有本未者理土為本事土為未亦報為本化為未也囙亦有勝劣者無相為勝有相為劣亦無漏勝有漏劣也
