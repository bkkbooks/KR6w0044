body:
  text: 本如無量壽至有何義也是第一問上來䉼蕳𭂫夫徃生已竟自下會經異破他解先兩經次弁相文意易解本古今大德至足十念人廣舉異計通第一問文分為二一㧾摽異釋二正別列第一摽中有十五家者問璟𫤭大經䟽云從昔會尺自成百家今何唯云有十五家荅為顕數多㧾而言百非滿百家如彼書云百䖝來百媚成其例且千不可勝計况當𫤭師世異尺可來加豈只十五家乎苐二一觀經下別列中苐一懺悔不懺悔者元曉師義大經宗要云彼觀經中不除五逆唯除誹謗方之罪今此兩卷經中言除其五逆誹謗正法如是相云何通者彼經其雖作五逆依大乗教得懺悔者此經中不懺悔者由此義故不相也已上自上下諸師解釋合論非謂必是大師正覧或有上世論家不見或有後代亦非覧只文當示義同耳若難此義者論自破云若念佛能罪者何囙言不懺悔遂被除也又觀經取逆經文何處有懺悔之語憬𫤭破云既十念中念別八十億刧生死之罪應無悔與不悔別故若更有別懺悔法者即於下品下生文中都無故第二輕心重心造者尺家更勘𫤭師破云謗正法必有輕重不可唯言除不生故此破意者五逆有輕重心造故壽經除重觀經取輕者謗法亦有輕重心造何壽經除重觀經不取輕唯除無摂此師意許觀經不摂謗正法故即有此破今論不尓許觀經亦取謗法故若試破之於𭓯父母壞㓛德田不假輕重心無論長短時决定囙故必感其報何由心輕重弁業轉不耶俱舎論眀决定四囙云若造業由重煩𢙉或淳淨心或常作或於增上㓛德田起㓛德田者謂佛法僧或勝補特伽羅謂得勝果勝定於此田雖無重惑及淳淨心亦非常行若善不善起諸業或於父母随輕重心行害事如是一切皆定業攝餘非定受言勝果者一預流果断見惑𥁞初出見道故二阿羅漢断修惑𥁞初出修道故一來不還非断二惑𥁞非是初出不名勝果言勝定者一従定出謂此定中得心寂靜似𣵀槃故若從此定初起心時心𭓬靜若寄喻如入𣵀槃還復出者二従無諍定出謂此定中有緣無量有情為境增上利益意樂随遂出此定時有為無量㝡勝㓛徳熏修身相續而轉三従慈定出謂此定中有緣無量有情為境增上安樂意樂随逐出此定時有為無量㝡勝㓛徳薰修身相續而轉是名勝補特伽羅出具如彼論苐十五苐三唯五逆與兼謗法者鸞大師義論註上云一經以具二種重罪一者五逆二者誹謗正法以此二種罪故以不得徃生一經但言作十𢙣五逆罪不言誹謗正法以不謗正法故是故得生又寂一義大經䟽云造五逆者有其二種一造逆事而不壞言不謗正法二造逆事亦壞於信誹謗正法後者加行意樂俱壞前者行壞意樂不壞二俱壞者業不可轉意不壞者業猶可轉觀經就信不壞者故云誹謗正法已上興師破云有難此云彼經亦云具諸不善若不謗法即不可言具諸不善如何乃言唯造五逆得生淨土此難非也若謂彼經具諸不善故亦攝謗法者即五逆應属諸不善故不湏別今即應憚随順及言合集之義而相尺相尺者即諍頭數故罪既各別名亦別故此破意依有及言本世流布經不置及言若順及本是相尺謂举逆者及謗者二人諍頭數故即不可言一相續中举具二者此破亦非何知及者合集二人設雖一身二罪中間便置及言能顕一身具有二罪有何妨若難之者大乗諸佛行處甚深利益𭂫慮難測我㫆陀本誓願攝化十方深重殊勝稱名㓛徳豈唯攝五逆是故餘經明謗法生今及和尚許謗罪此義而已苐四逆類正逆者未知誰義興師破云無有聖教五逆類名五逆故不可彼經五逆言類問何五逆類荅俱舎論云𣲇母無學𡰱𭣦住定菩薩及有學聖者僧和合緣破壞都婆是無間同類已上於親生母及無學尼行極𣲇染𭣦母同類𭣦𡧱百刧住定菩薩𭣦又同類𭣦有學聖𭣦羅漢類僧和合緣衣鉢資具也破僧罪同類破壞都婆此云高顕出佛身血類問何以故𭣦住定菩薩為𭣦父類夫住定者三修行滿百刧種相囙具六種决定故得住定名悲智具足成佛期近若以𭣦彼可為出佛身血同類例如𭣦有學為𭣦羅漢類荅光記尺云或有𭣦𡧱百大刧中住定菩薩是名𭓯父同類業躰菩薩㤙深猶如父故於彼造業名同類業已上菩薩雖是慈悲深重成佛隣近而未能得無漏㓛德何彼同類次會例難光記尺云以學無學同聖田故應彼造業名同類已上同得無漏故不為例問以何義故僧資具破僧罪類荅光記云僧資緣令僧離散是名破僧同類業躰已上問此同類罪如彼本罪亦應順次定生地獄荅俱舎論云諸無間同業亦定生彼有餘師非無間生光記云諸無間業同類亦定生地獄有餘師無間同類雖定生地獄非要無間即生地獄以通順後及不定故正理云諸無間類亦定生彼非定無間生非無間業故已上問苐一師意同類無間亦生獄者與彼正逆有何差別荅論文雖言二師非是異謂上言無間同類亦定生彼人誤可謂同類亦定無間生彼故餘師重申雖定生地獄非要無間生婆娑復次有如斯例非始今也故正理論直云非定無間即生更不云有餘師復有一義初師意同類亦定無間感果次意者非無間生但論正類二業別者受苦輕重可為異也且止傍論應尺本文苐五𭣺菩提心不𭣺菩提心者誾師一義觀經䟽云彼經除未𭣺菩提心造逆者此經攝已𭣺菩提心作逆者故不相𫤭師破云已𭣺菩提心若退𭁆者應如未𭣺心不得生故若不退心者必不作逆故苐六至誠不至誠者未知尺家𫤭不举之若試破者大經本願既云至心全同觀經至心之言何云壽經不至誠人苐七十信非十信者淨影一義觀經䟽云一人分別造逆罪人有上有下善趣已前常沒造逆以為下善趣位中遇緣造逆之為上如世王上人造逆必有重悔令罪消薄容便得生此經就之故五逆亦得徃生下人造逆多無重悔不可得生大經就之故不生興師举雖義相似文言頗異淨影解謂𫤭師大經䟽云有宿世中無道機者既作五逆終無生理其先𭣺菩提心雖復逢緣造五逆必生深悔亦得徃生善趣之人有作五逆謗正法故二文各談一互不相此亦不然宿世之言應無用故現𭣺菩提心逢緣造逆亦應生故又彼善趣即十信故作逆謗法必無此理已上破宿世言知難淨影又此師言十信不作逆謗者不退轉者不作逆故且為破或存初住不退之義絇住內十信也若不尓者未得其意十信位即是不定聚若遇緣退者何不造逆謗諸罪彼本業經苐六住值𢙣囙緣退入凢夫不善𢙣中作大邪見及五逆罪無𢙣不造故慈㤙及今論述六住退之義入住既尓何十信輕毛位耶諸師皆許十信逆謗即其義也但六信已去信根成就故雖作逆非為断善故下論云十信位中初五心位猶有退生邪見断善後位不然已上苐八闡提非闡提者釋主可尋𫤭師不举今破之者不除闡提有太挍𭁆不除可除一闡提故言唯除逆有太失除不可除單五逆故作五逆亦具断善者現在世中不續善者小乗談何執之耶楞伽苐二明二闡提一者焚燒一切善根二者憐愍一切眾生云何焚燒一切善根謂謗菩薩蔵作如是言彼非随順修多罪毗尼解捨諸善根是故不得𣵀槃云何憐愍一切眾生方便作願若諸眾生不入𣵀槃我亦不入是故不入𣵀槃是名二種一闡提軰無𣵀槃性今初焚燒名為闡提亦名断善問一闡提何義耶荅𣵀槃經云一闡提者其義云何佛告純𨹔誹謗正法造是重業永不改悔如是人名為趣向一闡提道又云一闡名信提名不具信不具故名一闡提苐九已未造逆者誾師一義觀經䟽云對未造者尚除亦已造者若已造令進故無此𭁆者未造應令退耶已上若言壽經除未造者已造者㫆可除之何觀經取若為已造令進趣故取之不除更無𭁆者見觀經取造五逆者未造逆者亦不進道應退造逆進者修道退者造逆破意如斯問此苐九義與和尚有何差別若同者今師何破若異者義㔟全同荅一云雖彼此同破他義邊不可直破光明大師二云為述自義先列異中雖举此義不可別破和尚義故若尓何故下文即言一徵誥荅從於多分且云一不可破曇鸞和尚義上來二義就和尚同復有一義今苐九義異和尚意抑止未造攝取已造言抑止者密意也不實不生而今義者念佛已後若退造逆實不生故以属不生有何耶凢破中正举師頗似無礼故不可載也苐十開門門者迦才師義淨土論云先制後開是諸佛常法無量壽經先以廣法蔵此丘囙緣及明徃生事故觀經後以但論徃生事故也已上興師破云前若實生後開實應不生故已上問止攝取與開義有何差別荅開二門非必二機或對一機先後開謂為其造逆故壽經先云除此人造逆若能念佛實可生故觀經後開云生故𫤭師破云除者先生者後開明約一機始終論開而已止攝隱密門帯別意趣故開顕了門未帯意趣故二異也苐十一不定決定業者義𡧘一大經䟽云又造業中若分位定異𤎼不定及俱不定此即可轉若異𤎼定分位不定雖不得令而轉重輕受若二俱定至不可轉故前三業悔即可轉苐四業者諸佛拱手故此除也又於五種故思業中二不可轉三即可轉是故二經除不除別前准四業家後標五業家至下具兩家差別興師破云不善順生後受業皆應例此五逆罪便成大過故此破意者五逆之外餘𢙣定業亦例五逆本願除之一切定業不可轉故若餘定業亦不生者唯除願文可成太過大减大𭁆言太過者除不可除不定逆故言太减者不除可除餘定業故若言餘不善業定不定俱轉故不除之者雖逃减名未避過𭁆又更應破何處聖教於五逆罪定不定若約大乗甚深益者一切定業皆成不定何壽經除故𣵀槃云未入佛法名為定業已入佛法名不定業若約小乗淺近門者一切五逆皆成定業何觀經攝故俱舎云絇異𤎼果决定更無餘業餘生能為間隔故此唯自無間隔義或造此業補伽羅從此命終定堕地獄中無間隔故名無間前約法明後約人人法雖異决定義同若言大經小乗意者諸佛本願豈随轉義問苐十一義前轉重義有何差別荅定不定業不可必依心輕重故二義遙異也苐十二𤏙頂非𤏙頂者未知作者興亦不載若作破者雖𤏙頂逆不遇大乗深妙益者何能得轉雖非𤏙頂若遇他力難測法者何不得轉𤏙頂造五逆者退彼㓛徳後更何異未彼位造逆今𤏙頂者應小乗位大乗𤏙頂更不可成逆謗故彼四加行一阿僧向滿之位能伏二取於唯識性决定信謂𤏙位依明得定𭣺下尋思觀取名義自性差別四法皆自心變假有實無初得無漏道大前相故立𤏙名彼頂法位依明增定𭣺上尋思觀取名四法皆自心變假有實無明相轉盛故名明增尋思位故立頂名何於此位即𭣺𢙣見作逆謗罪又諸經論初住七住兩種不退雖有異七住已去位不退義更勿論何况內𭂫𤏙頂位乎故知小乗俱舎論二十三云若得𤏙法雖有退断善根造無間業堕𢙣趣而無久流轉必至𣵀槃廣乃至若得頂法雖有退而增畢竟不断善根光記云若得頂法雖復有退造無間業堕𢙣趣三於前𤏙法更增畢竟不断善根苐十三種不種解分者尺主可尋興師不举准前可破問解分善其義云何荅三賢外凢名為殖順解分善四善根位名為殖順决擇分善何故此位即立彼名荅述記九云前順解既初𤼵心求究竟果故遠從彼以得自名此順决擇分隣近見道欣遠之心不如始業故從隣近以得自名已上解果名初𭣺心位偏期果故從期遠名随順解分善順分囙義决擇淨恵即名見道有漏智恵雖亦决擇而非勝故更不得名至四善根隣近見道諸為入聖欣極果心不如三賢故從期近名随順决擇分善順分如前苐十四二階三階者正是信行禪師立下別廣破興師破云眾生有三階非聖教故設有聖亦自許苐三階人不行普法有逆無逆皆不得生若如言應唯除苐三階而言除𨒫唯有言故苐十五具足十念通具不具者當論正義謂觀經具足十念故𨒫者滿十必可得生故不除壽經乃至十念故是通具足及不具足既兼不具不𢩁唯十故除耳問苐十五家今論義者大乖論文即初文云古今大徳尺此兩經有十五家共此教下文問云古今大徳雖有十五種尺為當俱是亦有非耶又云准此以下諸一徵詰未是全得經意經意者何乃至廣案文始終前十五家古今大徳一途經意者何下徵而始顕者是正今義何言列十五家中攝論正又要集云如是有十五家尺感法師不用諸師尺自云若不造逆人不論念之多少一聲十聲俱生淨土若造逆人必湏滿十闕一不生故言除也禪林要記云感法師出十五家一不用而自尺此尺皆十五家中不攝也今何荅苐十五文言及義全與今同不可言別故興䟽云有除者具十不具十𢘻不得生故生者唯具十聲故此亦不然雖兼不具十聲既亦申具十念應如彼經不可除故此之破文義全同苐十五家非只是破義相似能破之意亦似信行難今家義明苐十五全當今義故下文載信行難云若一念法少言除逆者既有十念多法何囙除者信行難今興師破彼文言義意更無相豈非苐十五即今義但出論及要集從多分若論實者唯十四家他大徳例如興師摽於百家下列中間自義也次徵詰下正述經意是其廣尺設雖前列何不徵尺如是之例不可具述又苐十五與今論義雖是相似而實不同今正義者觀經具足十念逆人徃生法壽經乃至十念無𨒫徃生法𨒫人必滿十念方得徃生淨故唯具足不言乃至無𨒫未滿亦得生故帯乃至言不直言十彼佛本願欲明一聲乃至十聲多少俱生然造𨒫人少即不生必湏滿十方徃生故即除却之不攝多少皆令徃生本願中也以此義故乃至十念餘者生法非逆生願苐十五義一念乃至九念餘者徃生之法十念之言逆者生法故於本願乃至十念分而令被有逆無逆二類徃生囙此除逆只是對九念已上無逆生法而言惣乃至十念唯除五逆或從多分故二異也若存此義璟興師破今論之義更不挙苐十五之義信行之難興師之破全一𢕿故或破苐十五雖似信行難今家言通之義兩當殊謂苐十五家若會興破者將以應云經文言惣通於具十及不具十即唯除或從多分以實而論除彼逆者就無逆生九念已上今家意通信行破既異此趣下論分明不湏勞載本古今大徳至亦有非耶自下二番問荅重就前料蕳先㧾問十五是非次別以明信行尺今是其初本諸家尺至茲異耳荅是非相文即有二一顕示諸師非二經意者何下明今家義苐一顕非中有三一諸家尺難分勝劣者明諸對各有一途難分勝劣二其苐一尺下先難苐一師初立理責其除逆義謂念佛多刧重罪何囙言不懺悔故遂被除次又觀經者尋文而責其取逆義三准此以下者讓顕苐二以下亦未全得經意苐二明今義中三一經意者何先惣徵問二觀經取逆下正顕示其義於中有三一觀經取逆者㧾明乃至言與具足語其意異故兩經除取忽成不同經意唯在斯豈得由諸義耶二且如下品者此下細弁壽經乃至含觀經下三品念故攝無逆一念及有逆十念異下品下生唯攝逆者故言具足十念謂亦如下品上生稱佛下品中生念佛不言具足以罪少故不必滿十一念已上𢘻得生故下品下生為有逆罪經即言具足十念得生淨土明知餘者一念為其逆者必十念然彼壽經含此三品惣合而言乃至十念經意言若不造逆上二品類不論念數多少一聲十聲俱生若其造逆下品類必湏滿十闕一不生故言除也此即者重述尺矣問下三品行應同稱名何下上品属於稱佛下品中生直言念佛耶荅可同稱名次下意云壽經一聲乃至十聲含此三品豈非言三品俱稱名然下中品經不言稱故且言念作蕳別尺㨿實而論下品中生亦同稱名問壽經乃至十念餘者生法不攝逆十何云含觀經三品耶荅此難不尓為明多少皆得徃生乃至十念言下雖除唯多能生逆少不生本願十念非除逆者逆十生故斯乃一念乃至十念多少相雙除其逆者若獨語十念如觀經不可除故三此乃下結由此具足乃至十念不同除不閞諸也三古來下還明諸解外設今異尺謂諸大德雖尺經今更為顕茲正義故作異耳本諸大德容至亦有錯解次別問信行禪師誤斯乃代彼門徒計今致此難故云四依菩薩下論文云如三階禪師咸以信行師是四依菩薩明知四依者從弟子計也若准鈔枇四依有三謂人法行四依者常乞食樹下坐糞掃衣腐爛藥法四依者依法不依人依智不依識依義不依語依了義經不依不了義經人四依者若大四依如𣵀槃中以大人覺為初依斯湏二果為苐二那含為苐三羅漢為苐四是皆菩薩立四果名若小者初七方便為苐一後之三依如大乗明又云以地前菩薩擬小乗七方便以初地乃至苐七地擬斯湏二果以八九地擬苐三果以苐十地擬羅漢果已上凢人四依階位不定如𣵀槃論云歡喜地為初依六地為二依八地為三依法雲地為四依天合𣵀槃䟽引舊解云今明連至三恒為初依一分八分為二依十二十四為三依十六為四依法華玄五云地前通名初依登地至五地是苐二依至七地是苐三依八地至十地是苐四依是別教四依位尺籤五云五品六根為初依一住為二依十行十迴向為三依十地覺為四依是圎教四依位玄賛一云初依供養五恒佛苐二依供養六恒佛苐三依供養七恒佛苐四依供養八恒佛鏡水抄引真諦解云地前初刧為初依初地至七地為苐二依八九地為苐三依相好刧為苐四依如此異不可具引今四依者是人四依既云菩薩人故明法四依具如下記廣引𣵀槃本信行禪師至不言除也別弁信行誤相今欲明禪師相凢有其二一先預弁行相二次随文別解苐一先弁行相者畧有五一惣明俗𫞕誕生事二別明依本宗三述立三階四弁普別二法五顕謬解自他失苐一惣明俗𫞕者續高僧𫝊苐十六習禪篇云尺信行姓正𫞕魏郡人其母久而無子就佛祈誠夢神擎兒告言我今持以相與已覺異常日囙即有妊及行之生也性殊恒准至年四歲路見牛車沒泥𭷣引囙悲不止要轉乃離八歲既臨轉涉經論情理遐挙以時勘教以病驗人彼於相州法蔵寺捨具足戒親執勞從供諸悲敬礼通道俗單衣莭食出時倫冬夏擬偏過恒習故四遠英達者皆造門而誥問之行随事直陳曾無曲捐諸聞信者莫不慎受隋初也此年如來一千五百三十四年也開皇之初延住真寺立院處之乃撰對根起行三階集錄及東山制眾事諸法合四十餘卷未病甚勉力佛堂日別觀像氣力漸𮕱𭋘請像入房臥觀至卒春秋五十有四即十四年正月四日也某月七日於化度寺造屍終南山鵄鳴之阜道俗號泣聲動京邑初信行勃興異迹時或譏通論詳未湏㼼別但奉行尅峭偏薄不倫主於佛宗亦萬衢之一術耳著集記並引正文然其表題立名無定准的雖曰對根起行幽隱捐躰標榜語事潜淪來哲儻詳幸知有㨿開皇未歲勑断不行想同箴之也別有本傳流世見費莭三錄已上苐二明本宗者五教章上云依梁朝光宝寺雲法師立四乗教謂臨門三車為三乗四衢授大白牛車方為苐四以彼臨門中牛車亦同羊鹿俱不得故餘義同上弁後代信行禪師依此宗立二教謂一乗三乗三乗者即別解別行及三乗差別并先習小乗後趣大乗是也一乗者謂普解普行唯是一乗亦華嚴法門及直進是也已上准之故知信行禪師梁光宅寺小雲法師流徒而已苐三明立三階者貞元錄云上從三階佛法下三十五部四十四卷分為五怢隋沙門信行撰集奉貞元十六年四月十三日勑右衛㓛德使牒入貞元新定尺教目錄已上於中三階佛法四卷法界眾生根機淺深法一卷僅雖得之其餘三十九卷未見及也彼三階集一部四卷𣵀槃迦佛蔵思益經三十部并地持論一部也但尺義不似常䡄文言𮤀髴未詳宗䏍故續僧𫝊云雖曰對根起行幽隱捐躰摽搒語事潜淪又下論云禪師宗途文解義常與聖教一倍相下愚未敢見其能處也盖此謂也然且依彼造集錄及今論畧弁其相者下論文云然禪師以其三義尋教知是當根法門一依時二絇處三准人已上先依時者集錄苐一云佛度一千已前猶得用一切苐一苐二兩階佛法門一切重治罸一切道俗法治罸一切道俗如大槃𣵀槃經淨度三昧經又云佛度後一千年已前由多有一切聖人一切利根真善正見成就凢夫在不故以猶得用一切苐一苐二佛法門一切重治罸一切道俗法治罸一切道俗同苐二云又於大集月蔵分經內明如來一切果威力皆𢘻普分作三分文當一分属一切大乗眾生義當属一切苐一階佛法義當属佛度㣪五百已前一切聖人唯住以㣪驗前別以初五百年属苐一階機法文當一分属一切坐禪聲聞義當属一切苐二階佛法義當属佛度㣪千年已前一切坐禪眾生別以苐二五百年属苐二階機法文當属一切破戒讀經誦經聲聞義當属一切苐三階佛法義當属佛度一千年已㣪一切破戒讀經誦經眾生同苐一云佛度一千年已後一切聖人一切利根真善正見成就𭂫夫皆𢘻普盡唯有一切利根空見眾生在捐苐三機名為空見有見眾生同苐二云文當法盡之時文當㫆勒菩薩義當一切菩薩皆𢘻普不能度得一切眾生時文當義當佛度一千年已後時如大集月蔵分經與雜阿含經同已上准此佛度後千年已前苐一苐二兩階時分一千年後苐三階時故下論云於諸大乗經中撰集三階集錄言今千年已㣪苐三階眾生唯合行普真普正佛法又云若以千年已㣪正人斯盡唯是邪𢙣苐三階已上是名絇時三階機問西方要决云三階宗要絇時機千五百年後不修淨業今千年已㣪属苐三階機即成相云何會通荅委見集錄多千年後為苐三階是准正法千年像法後為苐三階或復一千五百年後為苐三階是㨿正法五百年未法已㣪為苐三階或但五百年後即為苐三階機是依正法五百年像法已㣪為苐三階故集錄二云文當一切佛皆悉普不能得度一切眾生時義當佛度或一千年已㣪或一千五百已㣪如大方廣十輪經同苐一云苐二大叚明驗一切苐三階佛法內佛度後時莭分𦙟義一者明文當佛度五百年已㣪文當千佛不能得度一切眾生時如迦二者明文當佛度後千年以㣪文當百千万億佛不能得度一切眾生時以上佛多少次苐驗之義當佛度一千年已㣪如佛蔵經已上彼既異故今㨿一千年後要决依千五百年問若絇後三階機何下文云故知善星受持法蔵永刧沉淪不輕但行普教清彼岸又憬𫤭引信行計云提婆達多是苐三階眾生准此尺在世善星及提婆為苐三階何是相荅若絇時者三階機類雖如上而亦絇人若佛在世及五百年亦容通有苐三階機一千年後亦容通有一二階機絇時處人是就多分若論少分非無通𢩁故集錄中明少分通又如絇處者雖娑婆眾生為苐三階機而就人論此界亦有一二階機如斯多分少分通𢩁非于今如戒定恵擻正像未亦復然也次依處者集錄四云又明復湏就為眾生依處時莭駖之若多為一切利根空見有見眾生若多就一切娑婆世界處亦名一切五澤世界處亦名一切五濁諸𢙣世處若多在佛度五百年已㣪佛度一千年已後時今為顕處雖引此文此文通明時處人云又云一切娑婆世界亦名一切五濁諸𢙣世界亦名一切五澤世界位非是一切一乗世界位唯是一切三乗世界何以故一者明如大集經一部通上及下文方廣十輪經一部通上及下不見導一乗唯見導三乗以此文驗以得知已上准兩處文淨土即是苐一階一乗世界娑婆穢土苐二階三乗世界兼苐三階戒見俱破世界謂淨土國無濁故純一乗一乗即是苐一階法故淨土為苐一階處一切穢土有五濁故分一三乗即是苐二階法故穢土為苐二階處穢土亦即破戒見處戒見俱破苐三階相故穢土亦為苐三階處下論文云一切苐三階人𢘻唯居在娑婆又云娑婆世界誹謗正法呰賢聖眾生即苐三階人不合得生淨土畧抄後依人中先苐一階者集錄苐四未云苐三叚明一切苐一階佛法內一切利根眾生位常有一切兩種眾生一者明莫問一切𭂫聖俱一種相似皆𢘻普是一切一種戒見俱不破一切利根正見成就一切一乗根機諸佛菩薩大般𣵀槃經聖行品明護戒淺深分齊五行具足勝經十受章內明護戒時莭長短分齊十受具足摩訶衍經初品戒度明空有具足戒六波羅蜜具足大方廣佛華嚴經十地品苐二地明十善戒三聚戒品具足乃至餘一切甚深大乗經內明一切戒見俱不壞亦如是類以可知又亦名已下此叚後破戒不破見經文驗之以得知苐一階機即有二類一利根清淨一乗根機戒見俱不破二利根正見一乗根機雖破戒品不壞正見今是其初自下苐二類二者明一切破戒者俱一種相似皆𢘻普是一切一種破戒不破見一切利根正見成就𭂫夫一切一乗根機菩薩位常不作情一切五逆罪一切利根空見有見一闡提增上𢢔眾生𢙣𮚆狗菩薩六師外道𢙣魔陀羅無慚愧僧已上此下廣明十地菩薩現善𢙣身及未断惑煩𢙉具足凢夫菩薩為利眾生造諸𢙣業受三𢙣身為苐一階廣故不述尺義雖廣論其𢙣樞㝡上利根一乗根機為苐一階斯乃華嚴七處八會唯為一切一乗菩薩一切小乗眾生之類不得見者即名一乗彼法華經火宅品長者以三車於火宅內誘出諸子雖以三車誘出諸子心常為與大白牛車喻諸佛菩薩雖以三乗誘出一切三界眾生心常為教學大乗佛法此三內大未一內三破三乗㱕一乗以去是一乗內大乗今苐一階名一乗者大中一乗非三內大依集錄意苐二階中亦有大乗即是三乗中大乗也為顕此別預顕示耳下論文云苐一階人根正能以善䨱𢙣造罪便少苐二階人即此義也言根正者顕不壞見其造罪者示有破戒是為依人明苐一階苐二階人者集錄四云苐二叚明一切苐二階佛法內一切利根眾生位常有一切兩種眾生一者明莫問一切𭂫聖一切大乗小乗一種相似皆𢘻普是一切一種戒見不破正見成就眾生何以故明如增一阿含經苐二十六卷文當明一切種類為護戒故寧受流離王𭣦不𭣦他者皆𢘻普是又亦名已下此叚後破戒不破見經文驗之以得知苐二階機即有二類一戒見俱不破三乗正機二雖破戒不破正見𭂫夫眾生今是其初自下苐二類也二者莫問一切大乗小乗一種相似皆𢘻普是一切一種破戒不破見正見成就𭂫夫眾生何以故明如大方廣十輪經苐三卷過半後廣苐五卷减半已前畧文當作五逆罪作四重罪誹謗正法呰賢聖十一種㝡大根本重罪雖作一身兩身懺悔即得罪得三乗果文當破戒更不破見又如大般𣵀槃經苐九卷二十種喻法內明唯除一闡提已外餘一切作五逆罪但使得聞得見大般𣵀槃經即得罪即能得𭣺菩提之心又五百婆羅門由不信由被𭣦堕地獄暫入即得生善處又利根空見一闡提暫入地獄即得還生善根又如一切大乗經律論文當一切利根空見有見六師外道初時不信佛謗佛謗法後時廻心即得出世間聖道果暫時起見故尚属不破見也又如佛名經聞一佛名即無量无邊罪或四十九日或二十五日懺悔即得罪又如大方𨹔羅尼經或七日或百日懺悔即得罪即得多見無量無邊諸佛菩薩又如寳雲經或一日或二日或三日或四日或五日或六日或七日心相續念佛觀佛九種無窮無盡福德智恵善根威力得見佛即生淨土又如觀佛三昧經未得自曉續見𫝊聞他或食用三寳飲人輕賤物或暫時觀佛或暫時懺悔即得罪又如大方廣十輪經苐五卷减半已前文當義當或一身或兩身或三身懺悔不断相續即得罪即得三乗道果又如大般𣵀槃經文顕易識摩訶衍經𨒬耳品但使得聞大乗經一𨒬耳者即得常果竟永不生一切四𢙣趣者一切皆𢘻普是一切破戒不破見正見成就凢夫眾生何以故明文當以上大方廣十輪經內少時懺悔断𢙣即得罪即得出世間聖道果文當破戒不破見驗之以得知餘一切少時懺悔断𢙣即得罪少時在地獄即得幽者皆𢘻得是一切利根空見有見破戒不破見正見成就眾生又云則由利根從無始世界已來未得聞佛法已前已有少分及得聞佛法已來若得遇一切正見成就徹到緣即能學一切正善不惜身命戝盡乃至被教不退徹到成就若得遇一切邪善徹到成就緣即能作一切邪善不惜身命戝盡乃至被打被𭣦不退徹到成就常一切邪正兩種根機並有已上苐二階中雖有二機利根正見三乗機類今論之中未明行相是為依人明苐二階苐三階者集錄苐一云一切苐三階佛法內唯除一切㝡大鈍根眾生兩種瘂羊僧已外一切利根眾生皆𢘻普是一切利根空見有見眾生何以故明如大般𣵀槃經文當世間之義為一切苐三階佛法內一切利根空断一切善根皆𢘻普盡一闡眾生以此文驗以得知一者明迦業經文當千佛不能廻得一切利根空見有見眾生二者明如佛蔵經文當百千万億佛不能廻得一切利根空見有見眾生三者明如摩訶衍經佛蔵經思益三部經明一切利根有見眾生文義㝡廣㝡大具足文當無量無邊諸佛菩薩不能𢌞得一切利根空見有見眾生四者明如大方廣十輪經大集月蔵分經與雜阿含經文當一切諸佛菩薩皆𢘻普不能廻得一切利根空見有見眾生五者明如大般𣵀槃經文當一切法經皆𢘻普不能廻得一切利根空見有見眾生何以故明從千佛乃至一切佛一切經皆𢘻不能廻得一切利根空見有見眾生如上經文或唯單就一切利根空見眾生或唯單就一切利根有見眾生或莫問空有一切一種相似如餘卷內廣亦名一切利根空見有見邪見成就九種人如大般𣵀槃經迦經佛蔵經大方廣十輪經亦名一切利根空見有見九十五種道如大集月蔵分經與雜阿含經同大方廣十輪經亦名一切利根空見有見九十六種道如摩訶摩耶經何以故明文當佛度五百年已㣪文當千佛不得一切眾生時有四部經名為𢙣𮚆一部經名為狗菩薩一部經名為增上慢眾生一部經名為𢙣魔一部經名為九十六種道竸𫤭一切佛法以此文驗以得知如迦經法華經大般𣵀槃經摩訶摩耶經亦名一切利根空見有見世根機眾生如大般𣵀槃經亦名一切利根空見有見邪見成就眾生如大方廣十輪經亦名一切利根空見有見顛倒眾生如下苐二大叚內亦名一切利根空見有見行壞躰壞眾生如大方廣十輪經亦名一切利根空見有見阿鼻地獄眾生亦名一切利根空見有見誹謗一切正法呰一切賢聖眾生亦名一切利根空見有見煩𢙉窂固猶如金眾生如大集月蔵分經與雜阿含經同亦名一切利根空見有見邪見成就顛倒行壞躰壞一切三乗根機眾生又云如迦經佛蔵經大般𣵀槃經大方廣十輪經大集月蔵分經與雜阿含經同摩訶衍經如下苐一叚內八部經亦名非是一切三乗根機及𣵀槃善根眾生義當非是一切利根真善正見成就三乗根機及𣵀槃善根眾生如大方廣十輪經亦名是一切利根空見有見一切三世諸佛𭜨家一切佛法眾生如像法决疑經與多部經義同名是一切利根空見有見一切世間𭜨家眾生亦名一切利根空見有見一切諸佛大𮚆眾生又云文當義當佛度一千百年已後如下苐二大叚內於一切利根眾生內一切利根戒見俱不破真善正見成就眾生莫問一切𭂫聖皆𢘻普除於一切㝡大鈍根眾生兩種瘂羊僧猶有少分不為求一切名聞不為求一切利益不為求一切勝他故學一切佛法正善真正持戒人者不在其限文當遣㝡大鈍根眾生勸化營理僧事與出家人作和上阿闍梨學習誦如大方廣十輪經文當福德時如大集月蔵分經與雜阿含經同文當度一千年已㣪道俗莫問一切利根鈍根皆𢘻普名邪見顛倒唯有一切破戒無戒兩種眾生已上准此尺苐三階機即有利鈍其利根者若住空見若住有見諸佛不化諸法不度上文廣明其相其鈍根者㝡大鈍根無慚無愧兩種瘂咩僧勸化徒眾營理僧事為出家人作大阿闍梨學習誦故集錄二云唯得遣一切㝡大鈍根眾生兩種瘂羊僧一切三乗法勸化營理僧事與出家人作和上阿闍梨讀誦經不在限已上法界眾生根機淺深法云佛度後一千五百年後供養守護無戒破戒持戒三種比丘已上下論文云苐三階類受得戒律作大比丘即與今同利鈍雖異同世間機不出生死入𣵀槃故問集錄三云一切苐一苐二兩階佛法內有一切戒見俱不破有一切破戒不破見兩種正見成就眾生一切苐三階佛法內唯有一切行壞躰壞戒見俱破顛倒一切一種眾生已上准此者苐三階機一向戒見俱破眾生何云有持戒類耶荅彼絇利根苐三階利破戒見故若鈍根者亦有正見持戒故非相復苐三階善𢙣俱𢙣邪正俱邪不解故根機惣属戒見俱破一種眾生是為依人明苐三階惣而言之苐一階佛法唯有大乗名字無有小乗名字苐二階佛法唯有三乗名字無有一乗名字苐三階佛法唯有人天名字故集錄云又明一切三階佛法一者明一切苐一階佛法唯見有大乗名字不見有小乗名字二者明一切苐二階佛法經文三乗名字者多如大般𣵀槃經苐三十二卷過半已後大集月蔵分經與雜阿含經同苐十卷未亦有三乗名字如阿含經迦比丘不肯受佛勸捨一切十二頭陀法卷內三者明一切苐三階佛法經文世間名字者如大般𣵀槃經苐三卷過半已後文世間之義為一闡提者是又如勝經㨔半卷已前文當無聞非法眾生以人天善根而授與之者亦是問苐三階法應是普法何云人天荅若以別法擬三階機人天善根苐三階法若以普法化苐三階更不依四車宗苐一階法一乗苐二階三乗若依三車應云苐一階一乗苐二階二乗苐三階三乗十輪經䟽云普信三乗即此意也苐四明普別二法者三階集錄處雖明普別二法文義幽隱是非無地只湏編綜普別之文𬾨於後昆愚推及少雖加料蕳會不足為量集録一云七者明常學一切苐三階佛法內一切二十四叚㝡下得𢙣得若普真普正佛法僧眾主断𢙣修善解行常正常不錯常不誹謗一切正法常不呰一切賢聖乃至𭂫夫常一向唯純益無佛法亦名常一向唯純徧學一切生眾生佛法故八者明常唯學一切苐一苐二兩階佛法內一切七十種一切㝡上得好得樂別真別正佛法僧眾生断𢙣修善解行常錯常謗佛常謗法通𭂫及聖文當常行誹謗語如下苐二大叚七種𨹔羅道俗法內常一向唯純無益佛法故唯除從無量無邊刧懺悔不可得阿鼻地獄內得值一切諸佛菩薩善知識捨邪歸正已去遠作一切菩提𣵀槃少囙緣不在其限亦名常一向唯純徧學一切有眼眾生佛法已上兩叚明苐三階機修普別得𭁆相謂苐三階若學普法不堕愛增不謗三寳唯有純益無有壞此普亦名生眾生佛法如生不分眾色普法亦尓於一佛乗及三乗法不論是非普能信故於諸賢聖及一切凢莫辨勝劣俱歸敬故下論云信行禪師作生觀不別前境是聖是𭂫㧾為聖解普敬設要或化如生苐三階故名生眾生佛法是苐七叚意也苐三階機若學別法苐一苐二兩階佛法同名別法常堕愛增呰三寳唯純有無有利益唯除有成遠緣此別亦名有眼眾生佛法如有目眾生能見差別色別法亦尓分別一乗及三乗及三乗法大呵小乗小貶大乗乃至分別賢聖𭂫夫無遍歸故或化有眼苐一二階故名有目眾生佛法是苐八叚意也故苐一階機唯學一乗法苐二階眾生唯學三乗法是名別法是各別不遍學故苐一苐二兩階機根正見成就無愛增故各學別法解生死獲得菩提苐三階機空見有見成就類故若偏學一若偏學三愛此憎彼非彼是此由此囙緣成誹謗罪常沉深坑出離無期故開普真普正佛法化苐三階病藥相當治道無法不分大小人不分大小人不弁凢聖普信普歸名為普法若如斯不堕愛憎能離謗菩提不𣵀槃在近集錄二云佛度一千年已後文當義當於一切道俗內亦於一切利根空見有見有眾生內尓許一切𢙣一切邪善佛法唯有上一切二十四叚一切普真正佛法能得頓之皆𢘻普盡正是其對故何以故明一切利根空見有見眾生乃至未得法忍已來唯除一切普真普正佛法已外歸一切別真別正三寳度一切別真別正眾生断一切別真別正𢙣修一切別真別正善行一名為𢙣欲二邪教三𢙣知識四謗佛五助六師外道法六亦為他人邪道法七不聼受一飲水以自供養八增上𢢔教九順行魔教十乃至少言語亦名邪見十一乃至讀誦經亦名不淨法十二乃至分別一切佛法是非邪正長短名不淨法得罪過於𭣦三千大千世界內滿眾生𢙣如迦經餘者如佛蔵經以如餘卷苐一大苐九文叚內十三部經一者文當明一切道俗亦名一切利根空見有見眾生由分別真別正佛法內一切𢙣一切善法故常起一切貪嗔煩𢙉無量無邊若更分別一切別真別正佛法內一切善佛法輪更增長一切貪嗔煩𢙉喻如一切噎病及一切大小便不通眾生返更多食多餘漿水一種相似又讀經誦經雖無邪錯謗法通𭂫及聖𢙣亦能得生一切貪嗔煩𢙉復不能得與一切無名相法以乃至讀經誦經亦名不淨法已上此文同上苐三階內一切利根空見眾生若自歸依別真別正一切三寳令他歸即名𢙣欲邪教𢙣知識故知普者於三寳眾生断𢙣修善生起行遍修名普謂歸佛若歸法者遍歸一乗三乗之法不貽一法乃至起行不漏一行也別者翻之故集錄苐三云唯歸一切一身別三寳唯度一切一身別眾生唯断一切一身別𢙣唯修一切一身別善行不歸一切普三寳不度一切普眾生不断一切普𢙣不修一切普善行神昉法師十輪經鈔云從無始已來唯貴一切上人上法輕一切下人下法心有愛憎廣造眾𢙣以佛教末法眾生捨別行普又云世尊昔於餘經中勸偏求大乗遣捨二乗呰聲聞小智狹劣乃至不許近小乗人云何勸普信三乗随學一乗以餘經別法難十輪普法明知普者普信三乗及一乗法荅讃大小便成就謗法欲求人身尚難可得三乗果唯依此經捨別學普枯竭𢙣趣增長天人自煩𢙉亦令他成三乗行得三乗果又云一者一乗根機眾生師即盧舎那佛眾以普賢菩薩為上首華嚴經之類也二者三乗根機眾生師即釋迦牟𡰱眾以地蔵菩薩為上首即此十輪經之類是也既而人分兩位法啟二門處淨穢懸殊師又真應全隔若道三行一必貽障道受苦之非若勸一行三囙有迃廻留之𭁆有大善知識信行禪師混迹異生𭆞道賢聖應居雜染摧運𢙣時属未法類𮈣概邪正之紕故於三蔵教內獨尺此經欲使學必依根法皆應病以為時當未法根被三乗行以福德為大已上西方要决述三階師難云方今之際去聖時遙下品𭂫愚令禮懺地蔵菩薩當今有緣理可專稱並念三寳㫆𨹔淨土上行人修苐二階根𤎼一得生念今既時當濁𢙣性欲𤰞那得輙行上人之法上學下法迃廻留下起上修障道受苦法根不會豈得成㓛已上全同彼鈔又苐四卷云維摩八法苐三階眾生徃生之法是行八法名修普法許苐三階修行普徃生故然彼八法菩薩如佛不與聲聞而背以他同己不嫉不謗代一切苦求諸㓛徳至下當知三乗普信不堕愛增自他統不行嫉高普信普法也問不捨一乗三乗名為普法者何故彼經云普信敬三乗興隆我正法供養染衣者成㓛德海又云是故有智者普敬三乗不𢙉我僧徒速成無上覺已上只三乗不明四乗如何荅三乗四乗開合不同大小菩薩合為三乗開大菩薩別立一乗名為四乗故經合普信三乗但信行光宅流小雲既立四乗之教故苐一階別修一乗苐二階別行三乗苐三階普信四乗若依三車初二三階如其次苐應一二三問要决云𠈟尋普行為益深大智通賢方能棤意力淺難以輙行大聖随機遣修行別行稱根性故於理無傷假別為囙修成普業此文意者明先修別依此㓛力後修普業若尓不修別者不可修普耶荅此義不類次述三階師疑云准今修行學普為宗別念㫆𨹔乃成曲見翻為障道不免輪廻何不捨別行以随修其普已上會此難云𠈟尋普行為益深斯乃以彼立普別入我實義用成通會謂彼普行不捨万行如初地已上一行之中修諸行八地已上諸行之中修諸行故大智菩薩當能修行力智淺下𭂫眾生難可輙行彼別法者偏修一行根淺之類方可修行故佛随機為癡鈍軰令修別法行應機故於理無傷故先修別漸積㓛後至上位湏修普業豈使今時淺𭋘眾生直修万行名假彼立普別名義顕我家真實之義若不尓何會通彼難問五教章云信行禪師即立二教謂一乗三乗三乗者即別別行及三乗差別并先習小乗後趣大乗是也一乗者謂普普行唯是一乗亦華嚴法門及直進是也已上復古記一云圭峯沙門師會信行下二依立二教別行者行一歴別三乗差別諦緣度異也先習者謂大由小起亦大小俱陳也普普行者一具一切故此非𬜻嚴余宗則無已上若依此尺三乗為別一乗為普如何相荅五教章言一乗三乗於佛初二階法分為二教普真普法離一三乗無躰故更不開立只就一乗三乗躰別建立二教故一乗是普普行者圎融普門名普行非彼立普真普正故彼記云此非華嚴余宗則無若三階宗立普法者何言余無乎一乗理苐一階法何更苐三階人亦修習三乗是別別行者三乗差別名別行非彼立別真別正故香引二教化法一乗三乗非普別二普別二法是化儀故不可相集錄之義及十輪鈔也苐五顕失者即有其二一明依信感罪報二明製教世捨先明罪報者自鏡錄云恵詳三神都福光寺僧某乚於一時忽然遂業道中見信行禪師作大身遍身惣是口又見學三階人死者皆入此身口中莫知去處其僧却活囙此故來向亰報僧靜師僧靜不信遂即却歸向都矣已上僧靜不信應禪師徒又云慈悲寺僧神昉小年以來聼學十輪精勤苦行異於常人着糞掃衣六時禮讃乞食為業每誦十輪經讀誦般若者堕地獄畢至臨終時生身被地獄火燒傍身有𤇆氣于時濟法寺僧思蕳親見此事信知断學般若必有𢙣徵見身立驗已上次明世捨者尺教錄開元十八年智中云其徒既眾即以信行為教主別行異法似同天授立邪三寳勑諸寺三階院並令除去已上歴代三寳記開皇十七年云費長房錄中初列信行撰述而後同二十年断不聼流行已上自鏡錄云慈門寺僧孝慈年可五十幻少已來依信行禪師三階佛法以修苦行每三階佛法常言不合讀誦大乗經讀誦者入十方阿鼻地獄急湏懺悔後於一時在岐州三階佛法千時有一優婆夷持法華經又勸有緣同持法華經其禪師勸彼持法華經優婆夷言汝持法華經不當根機合入地獄勸令捨誦遂有數箇優婆夷捨持法華經於禪師處眾中懺悔持法華經罪其元首勸持法華經優婆夷情中不合遂於大齊日禪師為眾三階佛法當此時座下万人以來其優婆夷於大眾中燒香𤼵願言若某乚持法華經不稱佛意願某乚見身著𢙣病令大眾共知持法華經得此罪報又願生身𨺻入阿鼻地獄願眾同見若某乚持法華經稱順佛意禪師亦尓當此優婆夷𤼵願之時其禪師飲音不語面高座上唱錄者亦𭁆音不語下更有五箇老禪師亦失不語其先捨誦法華經數人囙此更𤼵心誦法華經更生慇重已上當知信行自他智者誰不悲責而不飽十五家之中誤之㝡重無甚於斯今廣徵破要决懇責盖在此耳上來苐一文前明行相已竟自下苐二随文中即有其三一初至勝佛者也明禪師尺兩經除取本願文有過咸之𭁆二又難若言至學者知焉明禪師會兩經除取經乃至十念之言三禪師又難至不言除也還举禪師難以顕今家義苐一明有過減之𭁆中二初直破彼義次諸三階下舉救重破初直破中亦二一㧾破初至𭁆經䏍歸是也以二三階別取者觀經攝是別取苐二階造逆不通苐三階壽經除是別取苐三階造逆不通苐二階故云別取二別破若依下至聖人之誤是也若依汝觀經取苐二階壽經除苐三階者法蔵願言便有大過大减兩𭁆太是大也如𠮦大名太空唯識論八云太太狹與此同意言太過者除不可除苐二階𨒫故謂彼師許苐二階者亦造五逆然願文云唯除五逆㧾除諸逆若觀經取苐二階逆壽經豈非除過不可除苐二階逆故名太過𭁆太减失者不除可除苐三階內不造逆者故謂彼師許苐三階機造逆不逆俱非別法攝機類若尓本願於別法何不除之然無文除豈非除殘可除苐三階不造逆斯乃太過苐二階之造五逆其大减者苐三階之不造逆故經文唯除五逆謗正法即有過减二咎也彼經應言者明准彼義改本願文可離𭁆謂若言唯除苐三階眾生者不除苐二故應離太過𭁆亦不言別除造逆故苐三階無逆亦可除故應離太减失故云離於二𭁆也此即法蔵者此下重進退徵責於中先牒前𭁆為聖下難謂為是菩薩聖智不足而其言語不周𢘻故起此咎耶若法蔵言無有咎者即禪師有之𠍴進言法蔵有過者不可迯責聖智不可誤故退言禪師有𭁆亦不可迯責自露顕故進退惟谷二途何為故當是𭂫者之失者結属禪師𭁆言法蔵者依大經㫆𨹔囙中𤼵願時名九品義云大寳積經名為法處清淨覺經名法寳蔵此之三名漢土異翻大阿㫆𨹔經名曇摩迦此依梵音而為名也已上菩薩在初地聖種性位中即𤼵此願名為聖人下論文云法蔵比丘如經讃是大菩薩十地聖人非是地前三賢大士斯乃依經超世願言世是破壞即有漏義超越地前世間有漏𤼵出世間無漏大願故名為聖又壽經云其心𡧘靜志無著證二空故言靜離二執故名無著異譯經即得天眼徹見十方真位天眼無障㝵故曇鸞大師及義皆為聖者即此意也次諸三下舉救重破中有二子臤一初至而何益也破有三階師救言唯除五逆者即除一切苐三階二又有尺彼至勝佛者也破有三階師救言唯除五逆者但除苐三階造逆雖有二救只尺太减失未迯太過𠍴苐一破除一切苐三階中有二重救逐徵亦尓初中有二先舉救次正難牒救中諸三階師者舉其徒救門徒非一故云諸師救意云唯除五逆言即除一切有逆無逆苐三階人以者何苐三階類純邪無正純𢙣無善三世諸佛之不救十方淨土咸故法蔵願言除五逆㧾除一切苐三階盡也純邪無正者集錄中名邪見成就眾生故亦名断一切善根眾生故如上已弁始迄今有𠍴犯者自無逆始至有逆今偏有罪𠍴過故也諸佛不救者集錄中引佛蔵及大集云佛三階眾生諸佛不能㢠得故如上明下論文云十輪經造十𢙣輪罪一切諸佛之不救即與今同淨土者集錄中引𣵀槃及十輪云苐三階眾生三世諸佛𭜨家眾生故如上已明下論文云大集月蔵分苐十卷云娑婆世界誹謗正法呰賢聖眾生一切十方清淨佛土共故亦與今同以得知菩薩願言除五逆惣除有逆無逆苐三階盡也難曰者次正破中亦有其二一初至大過之𭁆明此救未去太過之𭁆先且許太减救次難太過救先許中此雖者此救既言除有逆無逆一切苐三階故會尺太减之𭁆而全未太過之難若再論者太减之𭁆猶以不除故云雖似其義當弁次若謂觀經者此設難彼若救言觀經下品下生之中攝苐二階逆故尺太過之難者此救不然以者何阿㫆陀佛𤼵願昔時尺迦如來經今日中間若逢斯難菩薩將何紛却疑故此救未為除太過之𭁆也陳四十八願於𤼵心初住之前者若依壽經法蔵本願應云初地如向已述今㨿悲華念王𤼵誓故云初住即前非言住前成道之後亦尒即捐成道言後也問今明壽觀兩經除取何捨法蔵願遙㨿無上念三願荅為顕菩薩不避太過難是久遠且閣法蔵初地本願超捐念三初住𤼵誓如下文云教被三千化流百億四十八願遍滿十方始於輪王𤼵心於初恒河沙阿僧刧之前終於觀音補處為苐二恒河沙阿僧刧之後問念王𤼵願應多地前彼王先求人天富樂精進勤苦㣪囙寳海梵志勸道乃𤼵道心求淨土願故知位淺在於地前然別属初住有何證㨿耶荅先求人天富樂報故位非住上後初𤼵心求淨土故應是初住懸隔無量阿僧耶者問㫆陀正覺先於釋尊僅是十刧故彼𤼵心至今佛土更不可過三阿僧及余十刧如何無量阿僧刧荅玄一壽經䟽云問既論云𨒬三阿僧刧何故寳蔵佛時而𨒬尓刧荅取三阿僧者但論起行時若雖𤼵心而或時行退或時行息通取此時即𨒬無量阿僧刧故無相已上今論意許六住已前猶是退故與玄一意不可相如何其間菩薩招難始至千觀經下品方雪過耶雪者清也或本曰空義理踈遠慈㤙玄賛云𢙣聲稱譽自守清雪已上西域𫝊云雪前耻如是聖教即以雪字用清濯訓今復冝然遠水近火者遠火難亦近水難喻欲逃大過難招中間不會𭁆彼此難迯何能相救慈行鈔云去入火即此意也即韋提者結難應知二又一切下至太减之𭁆明此救未却太减失前破中且雖許會太减失以實而論亦未能以似尺太减難者依苐三階皆名造逆而逆無逆苐三階人属於逆人攝除逆言其理未盡故今為破若成者彼尺何立故亦未却太减失也文即有二先牒彼計以若去身下正難自有三一業果畢已難謂苐三階皆造逆者為過去若尓過身已受𭫸苦業與果畢非是逆人何苐三階皆𢘻逆人二未造逆罪難謂苐三階皆造逆者為今生若尓今身未曾造逆寧容苐三階咸是逆三聖教相難謂若言皆是逆人者一相論准俱舎五無間業是邪定聚順次生中定堕阿鼻亦不生余鬼畜𢙣趣若尓一切苐三階類𢘻地獄人娑婆一百十九云問何故名無間荅由二緣故名無間一現後二余趣現後者此五但是順次生受非順現法受及順後次受故名無間余趣者謂此决定於地獄受非雜余趣故名無間由二囙緣建立無間已上三聚之名至下當弁二相律五逆罪者入於佛法方得出家具足律儀五逆即是難攝故若尓何得成大比丘持得戒品三相經若唯邪定聚無有不定聚及不定業者何𣵀槃一切眾生一相續中不定業多决定業少若㨿汝茲經言故斯救亦未成除大减之失也
